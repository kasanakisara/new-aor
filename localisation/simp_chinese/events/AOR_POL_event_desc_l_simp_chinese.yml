 AOR_POL_events.1.t:0 "最后一次大会?"
 AOR_POL_events.1.d:0 "上午八点三分，勒内尔走下舷梯，将手上的箱子递给泰蒙德，后者接过箱子，与他握了握手，然后二人一起向着出口走去。他们伸腿越过一群讲着德语前来接船的平民，看到勒内尔一直在看着旁边那些说着德语等待的平民，泰蒙德率先开了口：“抱歉，先生，这里暂时还是德语区。”\n\n勒内尔耸耸肩，他只是加快了脚步，等到出了码头，他才说出了自他下船以来的第一句话——“格丁尼亚仍然这么令人作呕。”\n\n“是的，不过因为手续，所以大会还没有决定这些德裔居民的未来。”泰蒙德赞同到。勒内尔转动着自己的眼珠子，撇过码头边的一排排汽车，叹了口气。\n\n“给我讲讲这儿，最近的，什么都行。”泰蒙德为他拉开了车门。\n\n“嗯，新的制宪大会会议后天召开，农民党的领袖又号召了一次抗议和示威，不过已经被驱散了……”\n\n“嗯。”兴致缺缺。\n\n“哦……有传言说德莫夫斯基要被巴黎政府释放了，先生。”\n\n“这倒是个滑稽的谣言。”勒内尔点评到：“要真那样，伊格纳齐早就坐不住了。”\n\n“抱歉。”\n\n勒内尔不在意的摆摆手，他继续听着泰蒙德的讲述，直到他看见了前方由于汽车转过一个弯而骤然出现的人群：“那是什么？”\n\n“这应该是制宪大会的反对者。”\n\n“有意思。”勒内尔说，而汽车缓缓驶过人群。\n\n“大会开的时间有些过于久了，而且，并不是所有政党都合法的加入了大会，所以不是所有人都很期待宪法的结果。”泰蒙德解释到。“不奇怪，毕竟这大会开了这么久，却还是没有一个准确的结果。”勒内尔本想继续说些什么，可汽车已经停在了火车站边上，于是他只问了最后一句：“上次作废的选举是自由党获胜吧？”“是的，先生，但王党也不弱。”\n\n他撇撇嘴，从泰蒙德打开的车门走出去。\n\n“这该死的手续。”"
 AOR_POL_events.1.a:0 "晚点，九点二十一分开，目的地华沙"
 AOR_POL_events.2.t:0 "钢琴上的电报"
 AOR_POL_events.2.d:0 "当一切准备妥当，伊格纳齐·帕德莱斯基按下了第一个琴键，此时距离他投身政坛已有四年之久。九月的东欧平原阴云密布，隐隐听见隆隆炮声射穿九十年时光自维斯瓦河外传来，但义军战士们坚决的呐喊甚至盖过了这炮声。黑白的琴键中淌出乐章，沿河滚滚向前。\n\n随后战争再次开始了。战线双方在骇人的炮火中反复拉扯，钢琴家的双手在琴键上飞快地跃动。起义军的战士是英勇无畏的，可再无畏的意志也终究抗不下突击的人潮与炮火的清洗。压迫者的铁蹄咆哮着越过维斯瓦河，直要把西岸化作一片废墟。\n\n时间是九月六日。在那混沌而炙热的时代，暴风雨和马蹄一起打在华沙的石板路上，随风散去了大半，却总还有些继续反射着日光。\n\n华沙城到底是被攻破了。钢琴家的左手在黑白键间游移，于是全世界都听见这来自华沙的悲歌。河岸的大炮早已撤走，花丛中的大炮还在轰鸣。哪怕要再等上许久——\n\n琴声渐渐沉寂下去，这就是终局吗.....不，不，不会!因为钢琴家的手重又舞动起来，乐声愈发地高昂，直至生发出全曲最为壮丽的华彩来!\n\n结束了。帕德莱斯基从琴凳上站起来，自由世界的灯塔向制宪大会走去，向他保守的敌人走去。革命还在继续，波兰的未来还在继续——"
 AOR_POL_events.2.a:0 "肖邦理想中独立的波兰尚在人间!"
 AOR_POL_events.3.t:0 "姗姗来迟"
 AOR_POL_events.3.d:0 "当偷渡的飞机越过莱茵河畔，朝着东欧平原径直飞去，罗曼·斯坦尼斯瓦夫·德莫夫斯基和他的巴黎华沙政府成员终于结束了他们的法国之行。本是协约国的分赃不均，可法国却背叛了波兰，将波兰的合法政府囚禁在西欧的土地上，波兰本土也陷入混乱中。\n\n对德莫夫斯基政府来说，当下真正重要的事情是在制宪大会上的演说，以及防范远在天边的毕苏斯基。德莫夫斯基是了解他的，只要事态稍有失控，老将军一定会率部杀回华沙会场，将他那合法的旗号撕得粉碎。\n\n德莫夫斯基必须就这样回到他们阔别已久——至少对他们来说——的舞台上来。而这制宪大会便是一场零和博弈。只有先发制人，只有宣称正统，只有把他们一切的对手踩在脚下，他们才能真正把波兰的命运紧紧攥在他们手中。\n\n从此不再有什么犹太人阴谋，不再有什么矫饰的联邦，飞机自云端降下，不出意外要降落在九月华沙的飞尘中。德莫夫斯基侧身透过舷窗俯瞰着脚下广袤的大地，数小时后他将突然出现在制宪大会，又一个月后，他的合法政权将高票继承新生的波兰。但现在，德莫夫斯基只是一声感慨："
 AOR_POL_events.3.a:0 "“波兰啊，我们回来了!”"
 AOR_POL_events.4.t:0 "王家巡礼"
 AOR_POL_events.4.d:0 "卡尔·爱德华独自坐在放映厅中抽着烟，他既不属威廉家，也难封威尔士。银幕上的画面抖动着，除了旧放映机运作的摩擦声，听不到任何其它声音。看得出导演为了这出无声的戏剧下了相当的功夫，黑与白的宁静中炸出激烈的争吵，新王的心也随之发起芽来。\n\n于是他的眼睛一时失了神，一手撑着下巴，直勾勾盯着屏幕——他的视线穿过屏幕，直看着喧闹从那繁琐的会议上滚滚流下，作决堤势，直要淹没整个放映厅，陷他于黑暗中——可那束状的投影分明扭转了，却在那无序的泥河中硬生生撕开一条路来：从那大厦前十数级阶梯，越过街道，跨过河流，从时间的另一侧起，一直延伸到那专属于爱德华一世的座位之下。\n\n于是来自异乡的王笑起来。哪怕他的头上还没有他的王冠，脚下还没有他的土地。而预定播放的电影还在继续，除了旧放映机运作的摩擦声，听不到任何其它声音。爱德华把烟头掐灭，仿佛捏着他应有的权杖一般："
 AOR_POL_events.4.a:0 "“于是波兰王国的命运也静静发起芽来。”"
 AOR_POL_events.5.t:0 "前线外交报告"
 AOR_POL_events.5.d:0 "无边的夜色漫过东欧平原，火车一路向西飞驰而去。广阔的原野上能看到点点灯火，偶尔看见黑色的巨像，一直把手笔直伸进天空里去——没有人知道它明天将为了谁而运作。\n\n把视线收回车厢内的，毕苏斯基眉头紧锁着，雕像一样坐在座位上。车厢沉寂在一片黑暗中，只有他的目光是一如既往锐利的，而这鹰般的眼睛现在正注视着百公里外混乱的制宪大会。\n\n他还是睡不着。不只是因为前线逐渐陷入僵局的战事——还有急电中陷入混乱的会议。伦敦，巴黎，独立，附庸，东方，西方，工厂，王冠，可这一触即溃的纸牌屋外已是黑云压城。而伊尔库茨克的严寒与加利西亚的流亡岁月，数十年铁马冰河从他的记忆中奔涌而出，这是他的抗争之路，他要用大会上的几声枪响，让这条路这将成为日后独立的波兰历史上的光辉灿烂的一笔。\n\n在他入梦前的最后时刻，老将又回忆起华沙急电发来的一刻——电报不长，而语言也相当直白，但一旁他的亲信们看到了——老将的眼神先是震惊，随后转为愤怒。在短暂却令人战栗的死寂后，毕苏斯基从桌上抬起头来了。\n\n我不要什么无意义的讨论。他说："
 AOR_POL_events.5.a:0 "“我要一个强大的波兰!”"
 AOR_POL_events.6.t:0 "传奇人物的下午茶"
 AOR_POL_events.6.d:0 "“如果再不采取行动，我们就要失败了。”\n\n瓦迪斯瓦夫·埃乌盖纽什·西科尔斯基安然坐在椅子上，面前杯里的茶泛着白沫，袅袅热气从杯中升起来。一个有阳光的下午，适合茶会的好天气——而这场茶会无疑是这个下午的重点。无论是对这位百战老兵，还是桌另一边的会上来者。\n\n“西科尔斯基先生，”来人开口道，“我想您已经知道我的来意了。关于大会上的混乱，我们希望您能出手干涉。”\n\n“因此各位把我从疗养院弄了出来，”西科尔斯基问，“就为了这样一件事？”\n\n“因为您有声望，您具有统领整支军队的天才。我们相信只有这种天才也一定能领导出一个强大的波兰。”\n\n西科尔斯基把茶杯端起来，因为负伤而长期卧床之后，他的动作已经相当僵硬了。“于是你们终于想起我了——社会党，波兰军团…一直到马恩河。然后呢?”\n\n“而现在国家需要你先生，波兰不会放弃任何忠诚与它的士兵——这是一个国家的光荣。我们认同您的意见，不和俄国合作的波兰是没有独立的可能的。”\n\n西科尔斯基迟疑了一下，颤抖着把茶杯放下了。从马恩河被直到现在，养老院锁住了英雄士兵的五年——但对于一个雄心壮志的角逐者来说，多久都不算晚。\n\n来者把一切看在眼里，于是他补充道："
 AOR_POL_events.6.a:0 "“未来是您的，先生。”"
 AOR_POL_events.7.t:0 "镰刀与麦子"
 AOR_POL_events.7.d:0 "这个点是记者例行到波兰议会大厦前拍摄的时间，他们日复一日的拍摄着农民党倒化肥和议员因为细枝末节的事情吵起来的重复场面。可今天却不一样，他们受邀见证波兰新的时代来临，大量的记者快速向议会大厦靠拢，议会大厦门口不再有化肥和抗议人员，取而代之的是陆陆续续来到这里的农民。在大厦内，他们穿着尽可能平整但还是有污渍的农作服装议论纷纷，他们坐的地方一天前还坐满了西装革履且吵的不可开交的议员。过了几小时，人群纷纷安静下来。台上走来一群人，而其中，文岑蒂·维托斯拿起了手里的文书，开始宣布波兰农民党将会重建整个波兰。最重要的，他们将先对农业进行改革，让波兰农民们从旧日的农业体系中解脱出来。\n\n可以看得出来，台下的农民似乎不完全认得台上的人都是谁，全然没有因为演讲中没提到详细的国家整体改革方案而一片哗然，也没有考虑过台上的这么一批人有没有资格来领导国家。农民们最关心的则是他们所提出的农业改革，在讲完这一段后，农民们集体欢呼，庆贺着新的时代将会到来："
 AOR_POL_events.7.a:0 "“下一次来到这里的会不会是工人呢？”"
