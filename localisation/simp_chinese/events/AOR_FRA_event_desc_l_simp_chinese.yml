 FRA.6.t:0"其言昭昭..."
 FRA.6.d:0"这是一封呼吁正义的，有良知的，无惧暴政和强权的国际社会为正义而行的通告：\n所谓“大不列颠及爱尔兰联合王国”对爱尔兰民族的压迫由来已久，从盎格鲁-撒克逊文化对凯尔特文化的系统性清洗到爱尔兰大饥荒的人为惨案，都是“联合王国”系统性压迫和掠夺爱尔兰民族血淋淋的证明。因此，自古至今，爱尔兰人民为争取自由、独立与尊严而发起的独立运动，必然是人类追求与生俱来的正义与平等的权利所发起的抗争。\n法国政府始终秉持着对民族自决权的尊重与支持，密切关注着爱尔兰的局势。然而，近期联合王国政府对爱尔兰独立运动采取的残酷镇压和血腥手段，令我们深感震惊与愤慨。在此，法国政府作为对世界秩序负责任的大国，必须站出来，对联合王国政府的暴行予以强烈谴责。\n联合王国在爱尔兰岛的行动堪称暴政的典范。对潜在的“独立运动”，联合王国军队特许无限制交火权，多次枪击和平示威的爱尔兰民众，制造多起惨案。“黑棕部队”等准军事组织甚至联合王国部队本身指控实施法外处决、酷刑及任意拘留，以及无差别无证据逮捕大量爱尔兰“公民”，制造政治恐怖。而对爱尔兰平民，理论上的“联合王国公民”，联合王国政府一面明目张胆的在法律条款上限制其权利，在实际经济，政治，教育等领域直截了当的将爱尔兰人“二等公民”化。\n联合王国政府对爱尔兰的残酷镇压，不仅给爱尔兰人民带来了深重的灾难，也严重破坏了国际社会的和平与稳定。这种公然践踏民族自决权和人权的行为，是对国际秩序的公然挑衅。它引发了爱尔兰地区的持续动荡，威胁到周边地区的安全与稳定，也损害了联合王国在国际社会的声誉和形象。法兰西共和国作为有担当，有责任心的世界大国，在此呼吁国际社会高度关注这一问题，共同谴责联合王国政府的暴行，维护国际社会的正义与公平。"
