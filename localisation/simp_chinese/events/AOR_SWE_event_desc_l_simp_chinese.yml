NOR_Axis.1.d:0 "一群挪威独立运动支持者煽动了许多奥斯陆市民在奥斯陆市中心的大街上进行游行。目前警察已经参与维持秩序。"
NOR_Axis.1.a:0 "不必多虑。"
NOR_Axis.2.t:0 "奥斯陆的暴力游行"
NOR_Axis.2.d:0 "一群挪威独立运动支持者煽动了许多奥斯陆市民在奥斯陆市中心的大街上进行游行，并且打砸抢街旁的店铺，在大街上点燃燃烧弹，甚至向市政府内投掷燃烧瓶。目前特警和军队已经参与维持秩序。"
NOR_Axis.2.a:0 "剿灭这些乱民！"
NOR_Axis.3.t:0 "对哈康陛下的刺杀未遂"
NOR_Axis.3.d:0 "今早王宫内传来消息，有一个挪威独立运动极端分子闯进王宫内，试图暗杀睡梦中的哈康陛下，所幸宫内的警察迅速反应并逮捕了这个叛徒。同时，奥斯陆的许多人发动了一场叛乱，试图推翻现有政权。"
NOR_Axis.3.a:0 "消灭这些叛徒！"

#开局事件链
Tosca.1.t:0 "自新大陆"
Tosca.1.d:0 "“啊。”\n\n新任的美驻瑞典-挪威联合王国奥斯陆领事，伟大的法尔豪森先生今日在骂了好几句脏话后从一艘游轮上缓缓步入他忠诚的奥斯陆。\n坐上领事馆的车后，他一直在思考这“大西洋明珠”究竟有什么魅力，让上一任领事仅工作了三天就愤而请辞，并在辞呈之中大骂瑞典的政府工作不力，指责“这狗一样的王国政府养这些狗娘的私生子都在干嘛！”对于一个有良好素养的使节而言，这实在是太不文雅了。\n不知不觉间，汽车已经驶到了领事馆前。秘书立刻把法尔豪森领进了领事馆里。法尔豪森见惯了整洁的大厅，见到面前充满了构成主义之美的会客厅还是不禁吓了一跳：四脚朝天的办公桌，四处乱飞的传真纸，和墙上用红油漆写下的大大的美式脏话，居然让这个场景意外的和谐。法尔豪森出神时，天花上摇摇欲坠的吊灯又突然掉了下来，玻璃渣子四溅开来，更是让整个图景更为美丽。\n\n于此优雅协和之景色之中，法尔豪森先生的心情居然以外的愤怒——原因无他，不过一个燃烧瓶。趁着混乱，似乎有一个二十出头的小伙子随手把一个瓶子扔进了会客厅里。不得不说这是很现代的创意，毕竟能往1782年红酒瓶里面装汽油的人在伟大的领事看来多少沾染了过多的现代气息。\n如同天主亲自摇动手风琴一般，整个会客厅开始燃烧，纸张在上升气流的作用下满房间乱飞，如同扑火的飞蛾，点燃会客厅里的几乎一切物件，包括一瓶近一升的纯酒精。“砰”的一声，酒精爆炸开来，法尔豪森高贵的燕尾服突然燃烧起来。真是有趣！\n\n半个小时后，这场欢愉的大火终于被扑灭，秘书又一次把法尔豪森领进了领事馆，只是空气有所不同，气温略微升高。\n“先生，您有什么嘱咐吗？”秘书弱弱地说。\n\n法尔豪森沉思良久，说道：“我要辞职。”\n“什么？”秘书不敢相信自己的耳朵。\n“我要辞职，他妈的辞职！你还听不懂吗，混蛋！”法尔豪森摔下这么一句话，随即摔门而去。"
Tosca.1.a:0 "创纪录的时长：一小时二十二分。"
Tosca.2.t:0 "混乱的间隙"
Tosca.2.d:0 "“日你妈，要钱，要面包，要牛奶，要安全！”“寄生虫滚出去，挪威人滚出……”“哎哎，你骂谁？你这个混蛋（啪的就是一巴掌），瑞典老混蛋！”。抗议的人群在瑞典与挪威之间的话题中乱作一团。\n\n童话中的所有主人公似乎都在鸡鸣中苏醒，而汉克则不得不被楼下的人群所震醒。\n“哎哟…怎么一个个这么早就出来闹？这才几点啊……”。\n\n此时太阳刚刚从地平线脱离，缓缓升起。汉克做好了一天早晨的所有准备，走下楼去，刚一开门，没走几步，心中烦闷的他突然感觉到了一丝凉意，原来是远方的风吹到自己的头发上，就像没有帽子一样-唉，你还别说，我帽子呢？汉克环顾四周地面，这也没有，那也没有，哪儿都没有自己的帽子，仿佛自己从来没有戴过一顶帽子出门。\n\n“我真希望今天早上发生的一切都是假的，我现在还在梦里呢……”\n“我去，我钱包呢？”\n\n噩梦破碎，现在的汉克来到了自己的公司上班-邮政局，自己则是局里头的成本会计。最近几天的工作可繁忙了，挪威、瑞典场地的邮件跟发了疯似的往外往内传；哦，对，亲爱的国王与政府还要叫我们提防布尔什维克，真的，累了，太累了。\n汉克现在已经趴在了他的办公桌上，手头的笔都拿麻了，信件如雪花般不断的传，汉克的手如扭动的蠕虫般不停的写。物价、人力费、储蓄费…怎么这么多都让自己弄？\n结束了将近9个小时的工作，汉克终于能在太阳完全落山之前赶回自己的家，洗一个舒舒服服的热水澡。\n此刻的他正全身赤裸的躺在浴缸里，享受着温暖的流水。\n而现在，已经放了一个小时水的他感觉到了一丝不对劲-嗯？水声呢。他进去浴室一看，没水。那马桶是怎么有水的，他提了提把手。\n\n也没水。\n\n我水呢？\n\n最后他跑到邮箱前，看到了那份停水道歉信。"
Tosca.2.a:0 "“由于水费上涨20%，您已经超支使用，我方已经强行暂停您的供水服务”"
Tosca.3.t:0 "托斯卡之吻"
Tosca.3.d:0 "“此事必须完成。你明白的。”\n“嗯。”\n\n秋雨如注。\n奥斯陆国家剧院的幕后，托斯卡·布伦希尔德女士静静地坐在一把直被木椅上，望着窗外飘落的红叶。宽大的服装正好适合塞两把自动步枪。\n今天是普契尼《托斯卡》在国家剧院的首演，这部伟大的歌剧可谓是经久不衰。似乎是作为一种政治宣传的必要，哈康国王也将会落座这次首演的观众席。\n\n这对于等候已久的托斯卡而言是一个好机会。聚光灯下，她是一个优秀的歌剧演员，清亮优雅的女高音总能在每次演出时让人神魂颠倒。然而很少人知道的是，她也是一位挪威独立阵线成员。在演唱之外，她的枪法也毫不逊色。今天是一个好机会，组织已经给他下定了任务，要求在这次汇演中暗杀哈康国王。\n托斯卡没有一点犹豫，随即答应了。她也累了。在王国生活30多年，她不在感到任何生命的活力。接到这个任务时，她只有一个请求：给她一张去俄罗斯的船票，投奔这黑暗世界的大光明。这将是一场最盛大的落幕，一切都将会就此结束。\n托斯卡深呼吸了一口气。\n\n第二幕的尾声。\n斯卡皮亚把托斯卡搂在了自己的怀里。而托斯卡此刻拔出自己衣服里藏着的两把自动步枪，大吼一声：\n\n“Questo è il bacio di Tosca!”\n\n随即，她一手举着一把步枪，开始扫射。由于出席观演的主要都是瑞典高官，因此她已无所顾忌，一边唱着“为艺术，为爱情”的咏叹调，一边跳入观众席，精确地扫荡剩余的目标。\n她已是如此绝情，她已是如此悲愤，一如得知卡瓦拉多西之死的托斯卡。"
Tosca.3.a:0 "何其悲惨，何其不幸。"
Tosca.4.t:0 "俄耳甫斯的回头"
Tosca.4.d:0 "“不！你不能再这样了！”\n“可是这难道不是我们共同的目标吗？为了挪威人民的解放？”\n“但是你怎么下得去手！”\n\n奥斯陆一处不知名的码头。\n海因里希抓着托斯卡的裙摆，死死地盯着自己面前的这个朋友，眼中的悲痛和愤怒近乎要溢出来。\n“托斯卡，我不敢相信你居然能干出那种毫无人性的举动！你难道可以眼睁睁地看着那五十几个人在你的枪口下死去而毫不愧疚吗！那是活生生的五十几条生命！\n“而你的理由，居然也是如此的虚伪：为了所谓的解放？这么个解放居然值得你去杀死这么多人？你岂非不知道他们背后的责任，他们在世界上是如此不重要，以至于你杀死他们的时候连颤抖都没有！\n“托斯卡，卡瓦拉多西的情人之名，你真的不配冠有这个名字，而应当被称作美杜莎！我曾经觉得你的歌喉是上帝的恩赐，但如今只能感觉到你是冷冷冰的机器。”\n“那么你要怎么办？”托斯卡不为所动。\n“你居然还会问我！”海因里希又生气又想笑，“如果你愿意，我将拉着你去警察局，但我想你已经不再愿意了。我只是祈望你还能抱有一点来自人性深处的良心！”\n\n良久的沉默。\n“好。”托斯卡的声音突然响起。\n“什么？”\n“我会和你去警察局。但我有一个要求。请你不要在路上回头，否则你将会永远失去我。”托斯卡生硬地说道。\n“为什么？”\n“请不要问。”\n\n于是海因里希走在前方，托斯卡走在后方，两个人向着警察局走去。\n起初，海因里希的思想十分复杂。他不知道自己该不该回头，也不知道自己做的事情到底对不对。\n他为什么要听他身后这个残暴的女人的话呢？他难道不知道这个人很有可能直接在路上给他的脑袋来上一枪吗？但是一种本能驱使着他前进，或许是对生的渴望，或许是对死的渴求。\n但这种怀疑从未消失。\n灯火渐熄。终于行到了市中心，海因里希突然心一紧——万一托斯卡已经走了呢？万一这个诡计多端的人已经埋伏起来，准备给他死亡的一击呢？如同命运的指引一般，海因里希蓦然回首，只见托斯卡依然跟在他身后，似乎十分诧异。\n海因里希顿时感到了历史的重演，如同俄耳甫斯在冥界的边境上的回头一样，自己将彻底失去她——\n\n并且不止她。\n托斯卡黑洞洞的枪口已经指向了她的卡瓦拉多西。"
Tosca.4.a:0 "“再见，海因里希。”"
Tosca.5.t:0 "今夜无战事"
Tosca.5.d:0 "“什么东西！”\n\n火光冲天的奥斯陆，漆黑的夜空被接连不断的巨大爆炸照得犹如白昼。西格约比恩只能坐在市政厅里，望着窗外火光冲天苦笑。\n这些抗议不只是独立示威的，还有反独立示威的，比如前几天的国家剧院事件，已经被定性为了恐怖袭击，但是有人赞成有人反对：有的反对者觉得这是一场正常的示威，有的反对者觉得将这定性为恐怖袭击太轻了，应当定义为苏俄对王国的战争行为，更有甚者赞成直接干预苏俄内战。当然更多的人都不清楚自己站在哪一方，只是为了游行而游行。这些人目的各不一致，有的还互相反对，但是他们唯一的共同诉求就是反政府，这甚至可以让红旗，联邦旗和挪威旗在一起挥舞。政府这是犯了天条吗，西格约比恩不禁苦笑了笑。\n\n好累啊。\n有的人说政府不负责任，但是政府已经在尽力搜捕凶手了，不管他是谁。西格约比恩足足一个星期没有睡觉了——不是因为什么愚蠢的责任心，而是单纯的睡不着，毕竟这帮工作人员也太有责任心了，每半个小时给他打一通电话，想睡觉也睡不着。\n转过头来，看向自己面前的政府工作报告。目前可以确定的是凶手已经逃向了苏俄，调查工作也只能告一段落。\n\n真是不知道该在“指导意见”上写什么，毕竟自己什么都没干呢。可以确定的是，能在上面用同一批复："
Tosca.5.a:0 "“已阅。”"

