## REGENCY CONFERENCE
SWE_Regency_Conference_opening_tt:0 "§Y王政会议§!决议组将启用。\n\n在接下来几日的会议中，诸位摄政委员会成员将和4位王位候选人进行沟通、质询和推举，最终交由联邦议会投票裁决。§Y您§!将可以通过§Y王政会议§!决议组了解会议走向，通过后续事件推举特定的王位候选人。\n但请注意，形形色色的§V反对分子§!仍然在阻挠王政会议的进行，他们可能使用极端手段破坏会议，或阻止会议产生有效结果。\n而§Y联邦派§!和§Y一王派§!之间的斗争也需要得到控制，他们各自希冀着一份未来，试图借由他们的新王而实现。来自国联的§Y英法盟友§!也并非善茬，他们会试图支持各自的傀儡候选人。\n§g同时在聚光灯之外，也有被罢黜的力量，试图破坏这一切……§!\n\n§Y祝好运！祝好运……§!"