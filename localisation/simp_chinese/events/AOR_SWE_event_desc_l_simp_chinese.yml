SWE.22.t:0 "瑞典向我们请求贸易准许"
SWE.22.d:0 "我们西方的邻居瑞典-挪威联合王国申请通过一项双边贸易协定，旨在达成两国之间的农业-工业贸易，打破此前近乎冰封的贸易关系。此举并不符合一般的意识形态要求，但是明显有利可图。我们需要和他们开展这一贸易协定吗？"
SWE.22.a:0 "我们没有理由拒绝。"
SWE.22.b:0 "还是让他们自生自灭吧。"

SWE.23.t:0 "苏联同意协定"
SWE.23.d:0 "苏联方面的消息报告，苏联政府已经同意这一协定，两国边界上的芬马克口岸已经开始熙熙攘攘的贸易了。"
SWE.23.a:0 "不错。"

SWE.24.t:0 "苏联否决协定"
SWE.24.d:0 "这些顽固的布尔什维克否决了这一协定，他们似乎要闭关锁国，直到有人用武力敲开他们的国门。"
SWE.24.a:0 "这是他们的损失。"

SWE.26.t:0 "瑞典请求和我国签署军事合作协定"
SWE.26.d:0 "瑞典申请和我国建立一系列的合作关系，包括工业建设和军事工业的发展。我们是否要同意这一协定？"
SWE.26.a:0 "我们没有理由拒绝。"
SWE.26.b:0 "这只不过是虚伪的面具。"

SWE.27.t:0 "[FROM.GetName]同意协定"
SWE.27.d:0 "[FROM.GetName]同意了和我国的贸易协定，我国的经济将得到进一步的发展，同时他们的军工产业也将有一定进步。"
SWE.27.a:0 "这不错。"
SWE_Trade_decision_tt:0 "将解锁扩大合作的决议。"

SWE.28.t:0 "[FROM.GetName]否决协定"
SWE.28.d:0 "[FROM.GetName]否决了和我国的贸易协定，他们十分粗暴地拒绝了这一要求。"
SWE.28.a:0 "这是他们的损失。"

#联邦和平解体事件
SWE.11.t:0 "震撼世界的七日"
SWE.11.d:0 "奥斯陆几乎被纸张淹没了。\n无论是宣扬挪威独立的政治传单，还是针对主要挪威独立运动领导人的通缉令，都已经几乎遍布这座大西洋明珠的每一个角落。奥斯陆市长西格约比恩几乎要被着无限的混乱所强行窒息。他的市政厅的大多数官员几乎都已经上街游行，整个政府机构已经停摆，并且他还要面对着近乎无穷无尽的抗议人群————他们正在砸他办公室的门，威胁这位奥斯陆的知名人物，要求他签署一份命令承认运动的合法性，否则就扔一发炸弹进去轰死他。见此情况，西格约比恩只能叹一口气。谁叫他是这倒霉的政府机关的首脑呢？\n“难道警察和军队不能够阻止他们吗？”西格约比恩的妻子坐在他旁边，难以置信地看着快要撑不住的门，有气无力地说道。毕竟这位来自哥德堡的美丽夫人没有经历过如此场面，西格约比恩并未置评。他的幕僚则向前走了一步，说道：“很明显，军队什么的是站在他们那一边的。您就不用指望外援了，开门吧。”\n西格约比恩同样不予置评。\n\n门在颤抖。\n\n所有人都在颤抖。\n\n世界在颤抖。\n\n轰的一声，门倒塌了。一排卫兵迅速冲进了办公室，包围了西格约比恩。但是他们的枪口对准的不是所谓“暴徒”，而是他们的长官。\n“先生，请立刻做出决定。”为首的士兵用生硬的书面语说道。\n\n于是西格约比恩颤抖着拿起一支钢笔，看着足足一个小时前就被塞进来的宣言草稿，颤抖着拧开钢笔的笔盖，低下了他的头。"
SWE.11.a:0 "世界在等待"
SWE.12.t:0 "永恒的一小时"
SWE.12.d:0 "“先生，您不能在这里过境。”\n“可是我不能回家吗？！”\n\n\n瑞典的一座边境小镇上，一个老人举起拐杖，指着自己面前的卫兵，破口大骂。“我就住在你们现在建起的这座愚蠢的墙的另一侧不到500米的地方，然后你们这些母狗养的私生子就要阻止我回到属于我的温暖的家，难道你们不是应该被处决，然后扔到波罗的海里面喂鱼吗？！”\n“先生，这是命令。您嘴中所提到的‘联邦政府’已经在今早十时整解体了，现在您是挪威公民，如果您要离开瑞典王国的地界，请徒步一小时到最近的口岸。”\n“即使直线距离只需要走五分钟？！”\n“我想是的，先生”\n“那就让这口岸见鬼去吧！我要准备破门了！”\n老人忽地举起拐杖，击打向了面前的卫兵。“你妈的，这种不合理的条约就不应该存在！老子活了六七十年了，一辈子都是联邦的公民，你他妈的怎么敢的，居然敢阻挡我通过！我告诉你，妈的，我在瑞典这片土地上走过的路比你吃过的盐还多！”\n老人就这么抽打了卫兵足足一个小时。他感受得到这时间的漫长，一股气前所未有的愤怒和无力感同时裹挟了他，使他不能正常的做任何事，只能抽打面前的这个人。\n\n过了好久，老人终于结束了抽打，深呼吸了一口气，对着面前的卫兵说道：“很抱歉，我失态了。”\n“但不要再管我了！因为......”"
SWE.12.a:0 "“我们的时代，结束了。”"
SWE_11_tt:0 "§R哦，不······§!"
SWE_Norweign_Independence_boom_tt:0 "§R一切都完蛋了。§!\n\n§Y感谢您游玩AOR瑞典-挪威联合王国，联邦已经解体，有关后续的内容将在未来更新。在此，谨代表AOR全体组员对您的游玩再次表示由衷的感谢！§!\n§Y如果您对本mod有任何建议，欢迎访问我们的官方Bilibili和知乎账号！§!"

#挪威独立运动行动
