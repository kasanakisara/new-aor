#王位更替事件
SWE.1.t:0 "奥斯陆刺杀"
SWE.1.d:0 "怡人的风自由的穿梭在一座座楼房之间，鸟儿的啼叫声通过令人爽朗的空气传到了每个王国公民的耳中。今天的瑞典的空气是葡萄酒味的，整个国度都被粉刷匠们漆上了粉红色。当清晨的第一缕阳光照射入埃沃尔的宅邸的时候，埃沃尔正在与自己的妻子享用早餐，当埃沃尔咽下最后一片夹着草莓酱的吐司后，他们便手挽着手出门去了。\n\n这是一个难得的休假，埃沃尔正好利用这一“王国的情人节”来兑现他和妻子画饼了许久的约会。他们走上奥斯陆的大街，城里竟然罕见的和谐了起来，那些时常罢工的瑞典可怜虫们今天已经消失不见，用报纸做被的流浪汉们也被警察驱逐的一干二净。瑞典与挪威的国王!哈康七世即将巡视这做城市，并发表情人节演讲!埃沃尔看着广场上的告示，十分满意自己的这位国王是一位浪漫之人。在这个年头，能有这样的国王属实是个幸事：德意志人早就迷失在了内战之中，美利坚人还在为着自由和独立而战，而他们瑞挪联合王国的合并为国王的子民们带来了长久的和平，埃沃尔的报社生意也能继续做下去。想到这里，埃沃尔便喜悦到难以自己了，他的国王为他带来了多少惊喜啊!他赶快亲吻了一口自己的妻子，这时的她是那么的贤惠且端庄，就像八月的晚风一样迷人。绝对不出一年，埃沃尔的事业就可以更上一层楼，而他也可以带着孩子离开奥斯陆，去买一栋与世隔绝的大房子，对，就在冰岛!和他那孩子一起看日出日落，度过每一个难忘的瞬间……\n\n当埃沃尔从想象中抽身出来的时候，尊敬的哈康国王已经在他的视线中了。没错，他那伟大的国王正和他那动人的妻子一同乘马车过来，道路两旁是遍地的鲜花，人群们早就簇拥在街道旁观望着这位国王。埃沃尔马上就反应了过来，赶忙牵着妻子那布满老茧的手，挤到了人群的最内部。“我亲爱的子民们!大家情人节快乐!在这美好的一天中，与自己的所爱之人尽情的相拥吧!”哈康挥舞着帽子，笑容满面的看着两侧的人们，随后便深深拥抱了自己的妻子，再加以浪漫的法式湿吻，人群中传来巨大的欢呼声与喝彩声，整座城市都洋溢着幸福。埃沃尔一把搂过自己的爱人，无声的笑着，埃沃尔敢打包票，这绝对是他最开心的一天之一。\n\n一声枪响。\n紧接着是稀稀拉拉的无数声。\n\n人群中的欢呼声突然变成惊恐的尖叫声，这个联合王国的国王在亲吻他妻子的一瞬间被一颗子弹传颅而过。有人开始不断的向人群中射击，人们四散而逃，浪漫的歌舞剧突然在此刻变成了一部烂俗的恐怖片。\n\n埃沃尔看着自己血肉模糊的胸口，在看看自己惊恐到面部已经扭曲的妻子。他到底该说些什么好呢？他努力回想自己妻子的名字，可好像怎么也想不起来了。他将因关心而扑向她的妻子一把推倒，转而向哈康的方向奔去，他没多少力气了，重重的倒在了半路上，在丧失意识前的最后一秒，他的视线与哈康对上了。\n\n哈康呆滞着看着埃沃尔的尸体，随后转身看向自己的妻子，深深的吻了下去。"
SWE.1.a:0 "永别了，吾爱。"
SWE_Haakon_Death_tt:0 "§V随着哈康之死，联邦最混乱的时代拉开序幕······§"
SWE_Warning_Imcompleted_tt:0 "\n§V警告：之后的内容尚未完成，如果您执意游玩，请做好应对各种神秘bug/内容缺失/不明乱码的准备。\n\n感谢您游玩Aurora of Red:rise from ruins，随着奥斯陆的一声枪响，命运女神挣脱了人类的束缚。\n\n下一次，还能抓住命运吗？§!"

