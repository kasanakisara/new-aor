SWE.2.t:0 "我们的新王"
SWE.2.d:0 "鲁普雷希特从斯德哥尔摩皇宫乘马车而出，前往斯德哥尔摩教堂举行加冕仪式。在马车中，他撩起他的头发，稍作整理-就像当年在慕尼黑皇宫前那样意气风发，不过相比金碧辉煌的巴伐利亚宫殿，瑞典的皇室住所倒显小家子气了。\n\n即将登基的国王，需要绕过斯德哥尔摩几乎所有的主街道，才能到达教堂。街边百姓欢呼雀跃，守卫不时地拉起护栏，以显示百姓十分欢迎这位远道而来国王的场景；尽管做了层层准备，但是瑞典与挪威即将迎来的新国王，还是发现了街边出现的大横幅：蠢蛋德国人滚出去！……哎哟哟，在巴伐利亚有人骂自己，看来在瑞典也不安生！\n\n到达目的地后，已是下午1点，他被比他看起来大20岁的两位大臣搀扶着下车，此时的太阳正值当空，稍微燥热的空气让鲁普雷希特心中多了一丝烦闷，而两位大臣早就满头是汗，毕恭毕敬的为新国王引路，文武百官早就在教堂内等候多时了。\n\n经过繁琐的加冕仪式后，来自德意志巴伐利亚的鲁普雷希特，终于带上了那顶象征着斯堪的纳维亚至高权力，瑞典皇室的稀世珍宝-埃里克十四世皇冠。最重要的加冕仪式已经宣告结束，而卢普雷希特早就冒出了一身汗，不知是过于繁琐的加冕仪式让他感觉心累，还是他仍然在疑惑着自己取得的馅饼是否真实-就像在巴伐利亚的梦幻，高贵的权杖，一瞬间就被枪炮撕裂。\n\n“不，绝对不能发生这样的事，我是一个国王！”鲁普雷希特在心里这样呐喊。此刻，已是瑞典与挪威两国人民的王，德意志巴伐利亚国王，法兰克尼亚和施瓦本公爵，莱茵行宫伯爵的鲁普雷希特一世，再也不想丢掉任何一个自己的领地，那天生的权力，他必然要在今后的日中牢牢地攥在自己的手里！于是他现在就想公开在礼堂发表演讲了，他从王座上走出一步，张开嘴巴。"
SWE.2.a:0 "只可惜，他到现在还不会一句瑞典语。"
SWE_Rupprecht_desc:0 "鲁普雷希特一世，蒙上帝洪恩的瑞典-挪威联合王国国王、巴伐利亚国王、法兰克尼亚和士瓦本公爵和莱茵行宫伯爵，已经降临世间。\n作为曾经的维特尔斯巴赫家族公子，鲁普雷希特的青年是在养尊处优的巴伐利亚王宫里度过的。他在成年后成为了德军总参谋部的一位将军，挫败了法军试图收复阿尔萨斯-洛林的“第十七号计划”，因此也被誉为“世界大战中最伟大的王室将军”。\n可是就在帝国风光无限时，可恶的布尔什维克分子发动了革命，摧毁了帝国。鲁普雷希特和一些维特尔斯巴赫家族成员逃离了巴伐利亚，开始在欧陆流浪。他们先后逃到了荷兰、法国，最后是英国。在这段期间，鲁普雷希特坚定了他的志向：摧毁世界上所有的赤色分子，重新赢回那本应属于他的王位。如今他受到邀请，成为了瑞典的国王，他的夙愿也实现了一半。\n\n§R是时候毁灭这帮无法无天的家伙了！§!"

#联邦暴力崩溃事件
SWE_Destruction_tt:0 "§Y随着以布兰亭为首的紧急委员会宣告终结，瑞典陷入无休止的战争和黑暗之中。北欧雄狮，低下了它的头颅。§\n\n§V感谢您游玩Aurora of Red:rise from ruins，正义和秩序已经背离瑞典，无数恐慌的民众将自生自灭。\n\n下一次，还是不要毁灭的好。§"
SWE_Anarcho_tt:0 "§R计划失控，安那其分子已经掌控了奥斯陆······§"
SWE_Absolutism_tt:0 "§R这帮农民······§"
SWE.7777.t:0 "子夜"
SWE.7777.d:0 "坦克的履带声碾过废墟的寂静，对于一场发生在城市腹心的暴动，这可真算得上大手笔。但是血腥的巷战战局依旧没有明显改观，峡湾两岸，整座曾经名为奥斯陆的废墟在燃烧。\n显然隶属于王室正规军的坦克部队正从峡湾东南平坦的政府控制区沿着瓦砾遍地的街角巷尾向西部推进，无政府主义者正依靠西部密布的公园与整齐划一的街道与政府军展开周旋。每一栋房屋，每一片灌木都可以成为杀人者的藏身之处。巷战的血腥表现的淋漓尽致，火光与厮杀遍布每个十字街口。人力，人人都知道政府军目前兵员捉襟见肘，为了减少伤亡，履带声逐渐响起，这些钢铁巨兽不惜倾巢而出，以它们的钢铁身躯保卫宝贵的士兵，而对于极度缺乏重火力的无政府民兵来说，这些钢铁巨兽就是他们终结的宣告。\n“轰!”强大的直射火力彻底拔掉了对面那栋楼，垮塌的砖石房屋激起巨大的烟尘，又一片区域要被突破。无政府民兵根本没有统一的指挥，他们的理论自相矛盾，他们的战斗力一盘散沙，被彻底剿灭不过是时间问题。\n正当此时，瓶子碎裂的声音在坦克顶响起，火光瞬间吞噬了钢铁巨兽，缺乏步兵掩护的坦克无助的转动炮塔，只有阵阵浓烟和不断舔舐的火舌从观察窗透过。坦克部队被迫狼狈的退出一线，但争夺废墟的巷战仍在继续，直到日出，鲜血染红奥斯陆街道之时，无政府主义者的军队才会终结这一切。"
SWE.7777.a:0 "这不是结束，甚至不是结束的开始，这是开始的结束。"
SWE.7778.t:0 "雪夜"
SWE.7778.d:0 "“他们不过是一群走投无路的农民罢了。”皇家步兵师瑞典营的上士皮尔换班警戒着阵地对面的“叛军”——一群主要武装为草叉和斧头的瑞典村民。越发冷酷的冷战铁幕下，明面上恪守中立的瑞挪粮食储备难以为继，北欧严寒的冬季更是肆无忌惮的摧残秸秆重压下的农民。又是一个阴雪连绵的糟糕天气，疲敝交加的步兵师被迫又一次面对手足同胞。这次，也许温热的鲜血才能驱散雪地的寒气。\n“打倒挪威国王!瑞典是瑞典人的瑞典!”“不为挪威人上税!”“瑞典至高无上!”村民们又一次在军队的封锁前高喊口号，草叉和斧头破开一道又一道铁丝网封锁。士兵们徒劳的对空警告射击反倒像是在纵容农民们越发激进的行为。皮尔上士身旁的士兵径直端起步枪，瞄准带头的村民就要扣下扳机。“你疯了？“皮尔一把打掉即将吐出索命火舌的栓动步枪。”都是瑞……“看见陌生士兵彰显身份的挪威营徽，皮尔上士剩下半句话梗在了喉咙里。双方的争吵几近立刻升级为了蹩脚的互相侮辱，谁也说服不了谁的双方逐渐形成了对峙的两派，说挪威话的和说瑞典话的面对面。枪尖对枪尖。\n农民们显然注意到了这异常的骚动。“你们站在谁那边？”有人高喊。"
SWE.7778.a:0 "“站在你们这边。”"
SWE.Destruction.t:0 "最后的时分"
SWE.Destruction.d:0 "无论如何，斯德哥尔摩算是完了，曾经优雅的街道与桥梁铺上了纵横交错的街垒与战线，宛如道道撕碎城市的伤疤。但埃里克的人生还不算完，在瑞挪政府摸爬滚打了多年累积的交情与真金白银的有力“说服”下，斯德哥尔摩紧急委员会疏散的机票给他留了个位置。望着跑道上闪耀着王冠金狮之徽的运输机，哪怕上气不接下气，一丝释然的弧度还是在埃里克嘴角扬起。\n“要我说，陛下简直是胡搞。”拥挤的机舱里，埃里克旁边的财务大臣的牢骚自从埃里克挤进飞机便没停过。“都什么年代了还妄想以一个君主的身份绑死两个民族，甚至妄图染指更多权力。”“是啊，现在还害得我们被暴民像撵狗一样撵出首都，还得给他擦他臭烘烘的屁股!”说到这个，大伙群情激愤起来，“军队呢？军队在哪里？”“忙着镇压什么无政府主义者和瑞典的暴民呢!”“天杀的挪威猪!”“你说谁？瑞典蠢驴……”沙丁鱼罐头般拥挤的机舱里爆发了如国会往日般的吵闹，真是可笑。\n埃里克受够了这一切，望向窗外后退的越来越快的跑道，心想着起飞时的颠簸说不定才能让他们闭嘴。钢铁巨鸟摇摇晃晃的升空，巨大的颠簸和明显超载的机舱让所有人歪七扭八的挤作一团。“至少安全了“埃里克长叹一口气。\n密集的炮火声骤然响起，埃里克眼角撇见机场橘黄色火球在附近的树丛中咆哮，飞曳而来的防空弹幕粉碎了运输机机翼上闪耀的王冠金狮。埃里克随即失去意识，只感觉天旋地转，大地与天空绞作一团不定形的漩涡。"
SWE.Destruction.a:0 "永别了，世界"

#国策配套事件
SWE.3.t:0 "瑞典向我们寻求签署贸易协定"
SWE.3.d:0 "瑞典-挪威联合王国大使近日向我国外交部长提出了一项请求，请求通过签署一份贸易协定的方式使得两国的关系更加紧密，包括双方共同科研，贸易关税减少等。"
SWE.3.a:0 "这是一份划算的合同。"
SWE.3.b:0 "我们不是现世的伯多禄主教。"
SWE.4.t:0 "英国同意支持我们"
SWE.4.d:0 "英国方面已经和我们达成协定，双方将共同合作发展。"
SWE.4.a:0 "好耶！"
SWE.5.t:0 "法国同意支持我们"
SWE.5.d:0 "法国方面已经和我们达成协定，双方将共同合作发展。"
SWE.5.a:0 "好耶！"
SWE.6.t:0 "英国否决提议"
SWE.6.d:0 "英国方面称因为自身国情原因，很遗憾不可以向我国提供任何帮助。"
SWE.6.a:0 "很遗憾。"
SWE.7.t:0 "法国否决提议"
SWE.7.d:0 "法国方面称因为自身国情原因，很遗憾不可以向我国提供任何帮助。"
SWE.7.a:0 "很遗憾。"
SWE.8.t:0 "请重置"
SWE.8.d:0 "请重置"
SWE.8.a:0 "请重置"
SWE.9.t:0 "一天"
SWE.9.d:0 "“现代人的生活总是不变的，至少主体上不变。”\n\n正如往常任何一天，安德里亚斯吃完早饭就出门上班了。虽说他所做的工作毫无变化，但周围的环境或多或少会有改变，而今天格外的多。\n\n街景有了不少变化，之前在街心被蒙上布的雕像终于揭幕了，金属制的雕塑在太阳下映映生辉，两个分别身着挪威与瑞典国旗图案衣服的男性搂着对方的肩膀，笑盈盈的迎着朝阳，而下面用双语写着“我们是兄弟”。周围有几个小孩子在旁边又蹦又跳，十分激动。安德里亚斯笑了笑，走入了办公楼。\n高楼原本秃秃的墙面现在不少换上了颇有美感的宣传画，比如挪威冰封千里的峡湾。宁静的景色下标着诸如“人民平等”一类的字眼，给人以极好的心情。安德里亚斯如往常一般买了份报纸，除了新闻，报社还特别邀请了一位评论员写文章，对未来的经济与平等问题进行了良好的展望……\n安德里亚斯把报纸放到一边，自语道："
SWE.9.a:0 "“嘛，起码现在看来不错.”"
SWE.10.t:0 "焚毁禁书"
SWE.10.d:0 "正是风景宜人的时节，梅拉伦湖畔热热闹闹的举行大会，这里即将举行最大的烧烤派对，不过烧的不是生物意义上的食物。湖畔广场中间堆放的书跟山一样高，由于大多书的封面都是红的，以至于从远处看是好似一坨大铁矿。\n\n“好吧，让我来看看都是什么……呜，《取得政权的道路》瑞典语版，有意思，我之前可没见过，出版社不知道捣毁没有，哦，还有这个……《马克思演讲全集》，妈的，俄语版，咱们这儿肯定有俄国布尔什维克！”安德斯把这些乱摆的书翻了一通，虽然说是一个字都没看进去，但他的眼里全都是瑞典克朗。\n\n“知道上面发来的指示了吗，收缴300公斤的书…反动书就等于两周的薪水，收缴一吨的书等于两个月的薪水，然后两吨……诸位，还用我继续说吗？”安德斯眼里冒着金光，而他的下属们都跟饿狼似的盯着这一摞子书，仿佛一堆小狗要从一个狼王口中抢食-但这确实是安德斯命令他们收缴来的，但这个老混蛋只愿分兄弟们五成啊。\n\n“要是你们自己能找，就别跟着我走，警局不是你当叫花子的地方，分功劳是自有公道的。”安德斯紧紧握着他的警棍，做了一些交代事由后，便领着另一帮子人拉开了一面大横幅-“斯德哥尔摩警察局公开有关销毁颠覆国家政权、毒害社会及青年思想的书籍”，又拉开一幅-“布尔什维克的手伸到哪里，哪里的恶徒就泛滥成灾”的口号。\n\n接着，一位小警员用一桶子汽油泼洒如小山一般的书，并顺着将油洒到外围，形成引线，然后点火。没过一会儿，那呛鼻的焦味连带着到处乱飞的纸渣从天而降，将整座广场中心变得漆黑，并顺着风飘到了梅拉伦湖里，连路过的海鸥都要遮掩着头，迅速飞过这片已经被污染了的地方。\n\n警长和他的警员们得意洋洋，这可是11吨的书，整整11吨对国家和自己身边的人危害至极的反书；尽管在这广场上烧起来的只有不到两吨，但是实际收缴的总数，还是够他和跟班们平白无故的休假一个月，并继续领更高的工资。就是吧，在这过去的几个小时里，他们的肺，或许要比他们的大脑更需要修养。"
SWE.10.a:0 "“咳咳，这烟熏味儿咋还能这么大呢”"
