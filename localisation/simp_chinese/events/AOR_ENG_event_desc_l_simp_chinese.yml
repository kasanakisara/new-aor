news_ENG.1.t:0"《伦敦之下》出版"
news_ENG.1.d:0"重磅消息，由皇家出版局（Her/His Majesty's Stationary Office）出版的架空类历史小说《伦敦之下》已经出版，目前，售卖此书的书店门口已经排起了长队。这本书可谓是架空历史小说的巅峰之作，皇家出版局召集了来自剑桥大学，牛津大学等知名学校的历史学家共同编撰了这本书籍，其中的考据之深，甚至可以作为一本历史史料进行阅读。《伦敦之下》的故事发生在一个德国赢得了世界大战世界中。在此书中，德国并未焚烧维也纳，同时对奥地利采取怀柔政策，最后成功与奥地利，俄罗斯组成了三皇同盟并与英国，法国，意大利所构成的协约国对抗。而法国占领菲斯这一事件，成为了世界大战的导火索。最后，德国成功占领了法国和意大利，并将法国拆分为数个小王国，俄罗斯爆发了革命成为了共和国，并在英国所领导的协约国的支持下依靠美国（此文中的美国在英国的帮助下成功成为了一个高度发达的正常国家）与英国的援助存活下来。本文中的主人公乔治，是一位在战后成为富豪的参谋部成员，并在生活中遇到了一位试图逃离德国专制铁蹄的比利时女子并与之交往，最终赢得了她的芳心，在他追求比利时女子的同时，他还与同伴们一同制定了入侵同盟国，光复民主欧洲的计划，故事的最终以英国成功击败了德国的公海舰队与主要部队结束。故事中所展现的奇妙但不失合理的历史故事英国领导下协约国伙伴的辉煌，以及英国人自发的爱国精神，受到了英国民众的广泛欢迎，据皇家出版局统计，《伦敦之下》的销量已超过20万本。"
news_ENG.1.a:0"“这简直就是文学史上的灾难！”\n“但这也是爱国的模范，约翰。”"

