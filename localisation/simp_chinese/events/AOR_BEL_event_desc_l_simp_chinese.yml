 BEL.5.t:0 "归家之旅"
 BEL.5.d:0 "已经不知道站了多久的皮特尔斯抬手擦除了脸上的汗水,眺望着海面。似乎要将目光穿过海湾,穿过非洲大陆,穿过西班牙等地,到达3394海里远的故乡。然而,目光终究是穿越不过这些障碍的,他一把拽下因为汗水腻在头发上的圆筒帽子,打结的头发快要被连带着扯下来,皮特尔斯却毫无感触,摇了摇头,无论如何,总算有了希望。正转身准备离去,他不由得愣住了……不知不觉,他背后已经聚集过来一大波试图徒劳眺望故乡的士兵了。只要还有希望……他握紧拳头,眼眶湿润,旁边的士兵却已经先于他哭出声来。"
 BEL.5.a:0 "终于......"
 
 BEL.21.t:0"第四个年头(上）"
 BEL.21.d:0"里杨缓缓地将蜡烛吹灭,这是他在刚果过的第四个生日。\n\n利奥波德维尔的夜是冷清的,这里没有像布鲁塞尔一般的热闹与烟火气,反倒是一种扑面而来的寂寥感。\n\n或者说,深深的孤独感。\n\n不再有狂欢和派对了,他再也不能在午夜时分与朋友们在鲁汶的酒馆喝个烂醉,然后一路晃晃悠悠欣赏沿途的夜景,然后互相搀扶着谈天说地,聊工作,聊人生,聊政治。几个男人自以为是的指点着国际局势,“嘿!有个英国佬往沙皇头上扔了包该死的炸弹!”然后哄笑成一团,直到天边泛起鱼肚白。\n\n可谁能想到呢,炸弹马上就扔到他们的国家了。\n\n每天看着落日而归的邮差生活草草收尾,入伍通知如同法院传单一样让里杨·朗伯喘不过来气。“那个软蛋,你他妈快点把你那把枪玩明白了,真以为战场上还能有人给你收殓？”根本没有时间训练,里杨和他的朋友几乎是摸了几下枪就上了战场。夕阳,美酒与华夫饼的日子是遇不到了,炮弹,飞艇与硬面包倒是天天见面。\n\n“还好,老子比那群德国佬更不怕死。”朗伯的家早就在刚开战时被敌军炸成了废墟,父亲早早的就转移到了南边,朋友一个接一个的在他面前死去,他早已成为了一具尸体了,只是尚存呼吸。前进,再前进,砍下一个天杀的德国人就是赚了,他们毁掉了我的所有生活,毁掉了我的一切。民族主义的花在里杨心中开放,而战场就是其最好的养料。他的人生只剩下了每天五点半国王的宣讲和战场上的硝烟,他开始变的更激进,更疯狂,冲在了前线的最前线,最后啊,伊普尔战役发生了,他作为为数不多的比利时士兵参战了。\n\n当里杨拿到少尉军衔时,他几乎快疯了。伊普尔的毒气没有将里杨从死循环中解脱出来,反而是让他加官进爵了,他的肺部严重损伤,不能进行剧烈运动,他转移到后方休养。他从此只用负责后方事业了,前线的将领特地前来看望这一位“不畏死亡的比利时战士”,他成为了比利时人宣传的最典范,这里的环境实属不错,他住在最好的医院,没有飞机从头上无止境的侦察了,没有脏乱差的战壕生活了,当一切都结束,他大可以走向政坛,成为比利时一颗耀眼的新星了。\n\n唯一让里杨担忧的是,战争的阴影每天都在他的梦中浮现,敌人的机枪中的子弹如骤雨般从无人区的那边扫射过来,自己不受控制的恐惧和担忧…战争的后遗症就像散不走的蚊子一样萦绕在他的周围……"
 BEL.21.a:0"战争结束的和战争开始一样突然,比利时输了。"
 
 BEL.22.t:0"第四个年头(下）"
 BEL.22.d:0"所谓的比利时共和国的成立让里杨疑惑了许久,他实在不相信他为之奋斗的国家居然输了,后方的他渴求着别人给他带来最新的新闻和讯息,在那个下午他跑出医院拦住形形色色不同的人,接近崩溃的问着这个共和国的真假。\n\n一切当然是真的了,朗伯坐在街上哭了,后来是被护士拖回去的。“那些人就是狗娘养的叛徒!他们怎么能做出...”里杨的话被哽咽声盖过了,尤其是看到共和国要员中有自己昔日的同行者时。\n\n还好,上帝给朗伯了一个惊喜。国王的一纸命令让他前往刚果为新的比利时奋战,他毅然决然的答应了,通知书上的文字很官方,朗伯知道这不是阿尔贝亲自写就的——他只是负责签名罢了。可他还是将国王的签名仔仔细细的描了一遍,贴在了他的日记本上,这是莫大的安慰与荣誉了,国王还与自己站在一起。借道法国,从敦刻尔克出发,和他的国王一起到刚果去,他的国家需要他。他的人生只剩下了比利时了,他真的不想放手了。\n\n晕船,呕吐,昏沉,他在船上过完了自己的三十岁生日。\n\n转眼间,已经是来刚果的第四个年头了。战争早就结束,他也沦落到训练新兵,镇压原住民的待遇了,不过实在没有办法,里杨也能理解。身边的士兵们都称呼朗伯为“不知疲倦的怪物”,每天早早起床,对着国王的肖像敬礼后,赶着那群新兵软蛋们起来训练,他们真弱——和他刚入伍时一样。朗伯的工作是一个闲差,负责镇压当地的那些黑人们,哦,那是“为了比利时而建设临时首都”。\n\n思绪渐渐回到现实,他什么时候变得这么爱回忆过去了呢。\n\n“操,你人呢,那群黑鬼们又罢工了!”同事的急促的声音从楼梯间传来。\n\n里杨看着还没开动的蛋糕楞了一下,转身飞奔下楼,一切还要继续,他要去叫醒他的士兵和他一起去解决罢工的问题,他还要活下去。\n\n这里是刚果,有他的士兵,他的国王,和他的比利时。"
 BEL.22.a:0"“喂!十秒内都给我到齐!”"
 
 
 BEL.20.t:0"大洋对岸的故事"
 BEL.20.d:0"“不!爸爸,不要再打了!我求求你!”\n\n小男孩撕扯着男人的衣角-那男人比他高出许多。一切的抵抗仿佛都是徒劳的。男人一把拉开男孩,将皮带缓缓解下,走向黑暗的墙角,阵阵抽泣从那里传来-另一个更小一些的男孩正瑟瑟发抖地站在那里,仿佛迎接自己的命运似的,一动不动。男人挥舞着皮带,划破空气,传出愤怒的轰鸣……\n\n啪!\n\n“梅因兹!”\n\n阿尔伯特下意识伸出手,却扑了个空。\n\n“亲爱的,又做噩梦了吗？”他感觉额头上放着一只柔软的手,慢慢吁出一口气,扭头过去,“不,玛丽,”他伸手捋了捋妻子的长发,“只是又梦到梅因兹了,但却是那么真实。我们是那么小,老头子伸手要打他,我……”\n\n“嘘……,”玛丽竖起一根手指,放在阿尔伯特唇前,“过去的事就不必再想,梅因兹最终会理解你的。明天就是你第一天上班了,好好休息,好吗？”阿尔伯特翻身平躺在床上,轻轻合上眼睛。\n\n可他又怎能忘记弟弟呢？\n\n红日升上天空,年轻的公务员仍睡眼惺忪。他走上冷清的布鲁塞尔街头-战争刚刚结束不久。街上几乎看不到一个人,除了那些谈笑风生的英国宪兵。阿尔伯特一直都不喜欢他们,他们不像他在自由大学里遇到的那些英国学生(这直接颠覆了阿尔伯特对英国人的理解）这些宪兵举止粗俗,常常酒醉,有时还在夜晚闯进商店搜掠。但阿尔伯特又能做些什么呢,他只不过是布鲁塞尔市政府的一个普通雇员罢了。\n\n “Putain de britanniques(他妈的英国佬)……”\n\n公务员暗地里骂了一句。可不知是酒精刺激了宪兵们的“大”脑还是忠于协约国的晨风向“伟大的英国士兵”通风报信,一只强硬的拳头砸向了阿尔伯特的脸颊。瘦弱的阿尔伯特不如他那“失踪”的弟弟健壮,如同一根小木枝遇见飓风。直直地倒下了。\n\n他的鼻孔流出鲜血,他的眼窝开始淤青,他的心血开始上涌……“不,我不能这么做,我还有个家要养活!”,梅兹家的一家之主咬了咬牙,缓缓起身,两个英国宪兵的笑声如此刺耳。但他也只好装作听不见,朝着政府大楼的方向走去。\n\n这条道路阿尔伯特已经走了数年,大街两旁的弹痕还清晰可见。大学毕业后,他便成为了比利时王国政府的公务员。不久大战开始,德军的铁蹄迅速踏进比利时的大门,国王,首相和少部分国家公务员流亡刚果。战争结束后,低地三国迎来统一,原比利时政府的公务员大部分被解雇,阿尔伯特则是幸运的,他得以继续任职。可他今天却在这条路上感到一丝死气。\n\n“好吧,政府大楼到了,一切就像以前一样,都如计划般进行。”\n\n梅兹先生整理了一下衣装,用手帕擦干鼻子上的血迹,快步踏上楼梯,来到他的办公室。\n\n“阿尔伯特·梅兹!赶紧过来!”\n\n一句带有奇怪口音的法语吸引了年轻公务员的注意,他惶恐着来到声音的源头。\n\n“长官,您找我。”\n\n阿尔伯特下意识地说出这句话,他的头低着,尽力不让自己的上司看到眼窝的淤青。\n\n“抬起头来!”\n\n阿尔伯特不情愿地把头抬起。\n\n“瞧瞧,这不是能抬头嘛,”坐在一旁的一名英国军官起身拍了拍公务员的肩膀,“那位操着奇怪口音法语的是你的新上司,他叫海克·范·佩西,好好听他的话,你会过好日子的。”他大笑着出去了。\n\n阿尔伯特感到浑身一颤,一股莫名的不适感让他想吐。\n\n“现在,Belgisch(比利时佬）,你是我的秘书了,资料上写你是自由大学的高材生,但管他的呢,既然那些英国大人们把我拉到了这个位置,我说什么你就必须去做,听到了吗!现在,去给我把这办公室收拾的干干净净,不得延误!”\n\n “是……”阿尔伯特弱弱地应了一声,就像犯了错误的小学生一样。"
 BEL.20.a:0"生活会越来越好的,对吧？"
 
 BEL.19.t:0"夜莺"
 BEL.19.d:0"战前,年轻的公务员是同行里的佼佼者,老领导皮埃尔曾经想在退休后举荐阿尔伯特接替自己的职位,可惜战火来临。现在这位兢兢业业的年轻人却不得已干肮脏下贱的活,领着微薄的薪水以补贴家用。但他必须忍住,他还有最后一位亲人要保护,不能让愤怒冲昏了头脑。\n繁重的体力活持续了数天,阿尔伯特连安安全全地去上班都无法保证,那些英国宪兵好像针对他似的,在他常走的路上增添人手。被宪兵暴打一顿已经是习以为常了,公务员现在最大的愿望就是宪兵打他时不再创造新的伤痕,不让玛丽担心-一名护士的工作每天已经够繁忙了。\n\n这天下班回到家,阿尔伯特发现往常每天笑着迎接他的妻子窝坐在床上。他将手提包随手放下,慢慢地走向卧室。\n\n“嗨,亲爱的,”阿尔伯特搂住玛丽,“美丽的梅兹夫人今天不高兴吗？”阿尔伯特试图通过玩笑话来引起妻子的注意(这招屡试不爽）\n\n玛丽缓缓转过头来,愁容尽显,她光泽的头发乱蓬蓬的,脸颊两旁各有一道痕迹-泪痕-阿尔伯特当然知道这是什么,他的心头一紧。“没什么,阿尔伯特,”玛丽用有些沙哑的声音回答道,“只是有点不舒服,让我自己待一会吧,好吗？”阿尔伯特也无计可施,只好先劝说妻子躺下,为她盖好被子。自己则去街角的那家小酒馆坐坐。\n\n晚上,阿尔伯特点了一些酒-平常是不会喝这些的,因为酒的价格十分高昂,他不敢把钱花在不必要的地方上。但令他高兴的是竟然在酒馆里遇了自己的同学,“嘿!拉法尼耶(嗝）,好久不见哪!(嗝）” \n\n拉法尼耶转头看向喝醉的阿尔伯特,微微笑了笑,这个法国人的身上散发出一种独特的魅力,使人无法自拔。\n\n “你好,阿尔伯特,我们有几年没见了”,他拿起酒杯呷了一口,“最近过得还好吗？玛丽怎么样？”\n\n听到拉法尼耶询问玛丽的事,阿尔伯特清醒了一些。\n\n“我还可以,现在起码有个活计,不用为吃饭发愁了,”阿尔伯特突然哭起来,“但是我不知道玛丽怎么了,她最近特别消极,我感觉她不再是那个和我在农田里追逐打闹的乐观、积极的姑娘了,”泪人儿又喝了一大口酒,“有时候我觉得我就是个混蛋,想要给家人幸福,却连我妻子遇到了什么困难都不知道,更别说那个我连死活都不清楚的弟弟了……”\n\n拉法尼耶搂住泪人儿,尽自己最大的能力去安慰他,但也几乎是无用功,阿尔伯特哭得更厉害了。\n\n“听着,老同学,不要把事情想得太糟糕了,好日子总会……”\n\n一个报童撞开了酒馆大门。\n\n“阿尔伯特·梅兹先生在吗!梅兹先生!”小姑娘气喘吁吁地喊道\n\n阿尔伯特从老同学身旁窜到报童那,“我就是阿尔伯特,到底出什么事了!”\n\n“您快回家一趟吧!您家里出大事了!”,那小姑娘神情极度激动。\n\n阿尔伯特如离弦之箭般冲出了酒馆,朝家里奔去。拉法尼耶也紧随其后,他们二人都想搞明白到底发生了什么事情。\n\n小雨滴滴落在布鲁塞尔的大街上,原本空荡荡的街道顿时挤满了人。阿尔伯特冲进了人群之中,他已无心再管别人感受。\n\n啪!\n\n一声惊雷划破夜空。\n\n拉法尼耶浑身一颤,他意识到大事不妙,后知后觉地冲进人群中。\n\n “阿尔伯特!阿尔伯特!阿尔伯……特” \n\n阿尔伯特跪在碧绿的草坪上,身体前后缓慢摆动,嘴里轻声说着什么,怀里躺着一位面容姣好的姑娘,穿着一条白色的连衣裙-沾满了暗红的血迹……"
 BEL.19.a:0"布鲁塞尔突然下起了大雨"
 
 BEL.18.t:0"安特卫普平静的夜"
 BEL.18.d:0"“我的小夜莺,你为何离我远去……这是谁干的……这是谁干的!胆小鬼!无耻的混蛋!给我站出来!” \n\n “梅兹先生,”那位给阿尔伯特安排工作的英军军官轻轻说,“我手下的一些士兵对您的妻子做出了一些……无礼且过激的行为,愿您节哀,”他从大衣中取出一个包裹,“这里是一些钱,请您收下,把她安葬了吧。” \n\n阿尔伯特苦笑了一声,猛然站起来,抓住那军官的衣领,“这是金钱能解决的问题吗!她是我唯一的亲人了……你们这群禽兽!”阿尔伯特握紧拳头,砸向了那个军官。\n\n拉法尼耶见状不对,赶忙冲上前去把试图做傻事的阿尔伯特拦下,把他抱到了小巷里,“我要把你们全杀了!该死的英国佬!你们全都该死!还有那个荷兰佬……”\n\n拉法尼耶朝“发疯”的阿尔伯特扇了一巴掌。\n\n “你疯了吗!他们可是英国士兵,你要真打下去会丧命的!”\n\n “我宁可和她死在一起!她是我唯一的亲人了,没有她我该怎么办!英国佬欺人太甚……”阿尔伯特的心智濒临崩溃了。\n\n拉法尼耶看着那位老同学,心中冒出了一个成熟的想法……\n\n几天后,玛丽的葬礼举行,拉法尼耶邀请阿尔伯特去咖啡店叙旧。阿尔伯特如约到达咖啡店,但却不见老友的踪影,咖啡馆服务生偷偷塞给公务员一张纸条：\n\n “晚上六时,老地方见\n\n -L” \n\n在自由大学学习的几年里,阿尔伯特和拉法尼耶成了几乎无话不谈的好朋友,也常常谈论一些不宜在公共场合出现的话题,这时,他们寻得了一个被遗弃房屋的地下室-一个秘密基地\n\n “这么多年了,这地方还是没有怎么变过啊。” \n\n阿尔伯特轻轻推开地下室的大门,油灯的微光摇晃着。忽然,身后的门迅速关上了,瘦弱的公务员被吓了一跳。这时,拉法尼耶的身影出现在阿尔伯特的身前。“请坐吧,”拉法尼耶摆摆手,阿尔伯特不由自主地坐到凳子上,“你以为只有你的生活被无耻的英国佬摧毁了吗？看看他们吧!”十数盏油灯同时亮起,这地下室的全貌才展现在他眼前。\n\n “欢迎来到狮穴,我的朋友。” \n\n这小小的地下室俨然成为了一座秘密堡垒：墙角里堆放着半成品的火药和炸弹,正中央的墙壁上挂着比利时的三色旗,还有数十名陌生的面孔分立两旁。\n\n “这些都是我的战友,阿尔伯特,他们每一个都饱尝了英国人的压迫。这一位,安娜”,他把手指向一位女青年,“她的父亲被酒醉的英国士兵开枪射杀。”他又看向一位中年男人,“这一位,维克多,他的女儿在放学回家的路上被英军带走,失踪至今。你还认为你是独一个吗？勤劳朴实的比利时人民竟然被小岛上的英国人和他们的跟班荷兰人压迫,这是应该的吗？当然不是!为了已逝的玛丽、为了全比利时人民不再受压迫,加入我们吧!” \n\n玛丽的歌声如波浪海涛般传进阿尔伯特的耳朵,他再也忍不住了.复仇之火最终吞噬了他。\n\n “说吧,要我干什么……”\n\n午夜时分,疲惫的阿尔伯特回到那个已不能称之为“家”的地方,他的目光投向了写字桌下那个布满尘土的铁盒子,不由自主的显现出一丝笑容。拿出一张纸,把笔沾上墨,开始做他中断了很久的“必做之事”。\n\n “亲爱的弟弟,梅因兹\n\n……”\n\n几天之后,阿尔伯特因为他优秀的工作表现而升职了,并且得到了一个前往舞会的名额-英国高官和低地优秀公务员的舞会。\n\n此后,公务员阿尔伯特便再也没有消息,只有一首诗,写在他给弟弟的书信里。\n\n “年轻的公务员穿上了晚礼服\n\n他没有美丽的舞伴\n\n只有几管甘油炸弹\n\n他心爱的姑娘死在了那个夜里\n\n就像雄狮受伤的肢体\n\n他此去只有一个目的\n\n把解放的种子种进人们心里\n\n在安特卫普的静夜里\n\n人们就会听见——"
 BEL.18.a:0"比利时万岁!"
 
 BEL.17.t:0"大洋这边的信"
 BEL.17.d:0"亲爱的哥哥：\n\n这封信或许永远无法送达你的手中,但我还是要写下来,把我内心的思念和牵挂告诉你。\n\n记得我们小时候,每当夜幕降临,你总会陪我一起看星星。你总是用温暖的话语鼓励我,让我勇敢面对未来。可是现在,我们却因为这场事实上“带来更多问题”的战争而分隔两地。\n\n返乡和打仗被他们深度绑定,似乎已经变成一个囚禁我们的牢笼,透过牢笼,外面的世界在看着我们,他们有些人带着善意的同情,有些人则是在幸灾乐祸。流亡政府不停的抨击新政府“傀儡把戏”,却无意中透露了新政府保留了旧管理机构。我不清楚详细情况,只能希望你一切都会好。嫂子是个很不错的人,希望局势已经真正平稳,你们能长久、热爱的生活在一起。\n\n这段时间以来,我仍不相信我在刚果,这地方的气候能把人活吞了。每天活像被架在锅炉的蒸汽上,只能说比起打仗的时候好一些,但和当地人比,你我受到的那个混账家庭的最糟糕的待遇,也比不过当地居民所受到的压迫。真是讽刺,他们说着解放故乡受压迫的同胞,却做着可能更加慘无人道的事情。\n\n虽然这里有这么多的腌臢,但仍值得一提的是,如果天气晴朗,这地方的星星比比利时要清晰许多,有时看着星星,想到或许你也在看,就感觉我们仍然在一起谈心,一起回忆我们曾经的点点滴滴。\n\n我希望你可以一直保持着勇敢和坚强的心态,儿时只要和我有关,你总能及时出现,现在请你照顾好自己,还有你的家庭,因为你的坚定和勇气,让我觉得我不再孤单,我相信我们一定会再次相聚。\n\n最后,我想对你说：我永远爱你,哥哥。\n\n你的弟弟梅因茨"
 BEL.17.a:0"“最后一点光亮熄灭了,连同映在玻璃上的人影也一并消失…”"
 
 BEL.26.t:0"难以下笔"
 BEL.26.d:0"利奥波德维尔的原总督府——现在应该叫阿尔贝的行宫了。一处散发着古典时代艺术美学的精致小房间里,一张用大标题写着《关于刚果土人战时管理法的一些说明和申请》的文件直白地摆在了阿尔贝的面前的大办公桌上。\n\n“陛下,您也知道这是议会作出的全体决定……我们的国家需要通过您来行使有利于比利时的法律。”将文件送到总督府的保罗·范泽兰说道,这是一位年纪不到30的年轻议员。“我拒绝签字。”阿尔贝脸上面无表情。“议员先生,您要知道现在的比利时虽然远离了故土,但是我们并没有与英国和法国发生过什么能将我们通通杀死的战斗,我们现在能在刚果安定下来全部都靠的是刚果的土人,议会的提案令我震惊,这会严重危害比利时未来的前途,先生。”\n\n“国王陛下,这是议会全体一致作出的决定,根据比利时宪法,您必须要代表我们议员的意志去签署法令,否则就是做出了违宪行为,这会令您和比利时的荣誉遭到巨大损失。”范泽兰冷冷的说道。“范泽兰先生,请您现在转告卡尔东,除非他到总督府亲自向我说明,我作为比利时国王,我现在绝对不会签字!”阿尔贝站起身来,背对着议员看着身后陈列的书柜-里面放满了历届刚果总督的报告文件。\n\n范泽兰也无话可说,只好转身走人——他并没有做出一个议员向国王应有的告别礼仪。阿尔贝转过身来,慢慢的瘫坐在了椅子上。"
 BEL.26.a:"“我看到了悲剧,但不想让悲剧发生在比利时身上。”"
 
 BEL.27.t:0"权力在我"
 BEL.27.d:0"利奥波德维尔的新总督府,即现在比利时临时政府的国会,今天参会的人员却不比以往一样稀稀拉拉；在人山人海的欢呼声中,比利时首相、天主教党党魁卡尔东快步地走上台前,对着会场唯一的麦克风用极大的声音说道。\n\n“朋友们,先生们,今天的议题将会是一项重大的决定,决定着我们比利时国家与人民的前途。根据比利时宪法,如果现任国王没有能力统治国家,履行国家元首应有的职责,那么我们国会及内阁将会协助并代理国王行使国家元首的职责!我们最亲爱的陛下阿尔贝,由于突发心脏病,于昨日在前利奥波德维尔总督府进行了医护救治,可喜是身体并未有所大碍,但是陛下已经公开表明了自己暂时无力履行比利时元首的职责,因此国会应要授予内阁代理元首权的职责。而如今我们比利时的国会议员,都要自觉履行起国家与宪法赋予的职能,我们要为了一个更好的比利时而奋斗,上帝庇佑我们!”\n\n“卡尔东万岁,首相万岁,胜利属于比利时!”台下顿时爆发出一阵又一阵的欢呼声,而议会中的一部分人仍然被着眼前的景象所深深恐惧,甚至有人已经提前离开了会场。在演讲过后,卡尔东正式宣布《刚果土人战时管理法》的颁布,并取得了国会通过；从明天法律的正式颁布开始,刚果或许会发生翻天覆地的变化？"
 BEL.27.a:0"最后一步。"
 
 BEL.28.t:0"毁灭者"
 BEL.28.d:0""
 BEL.28.a:0""
 
 BEL.29.t:0"十赌九输"
 BEL.29.d:0"雅各布揉了揉发干的眼睛,他从办公桌下拿起了半瓶酒,他打开瓶盖贪婪的吸食酒的香气,随即从桌子的一侧拿出一个很脏的杯子。\n\n他给杯子倒满了酒,犹豫了片刻后一口喝了下去,紧接着他感觉鼻子像是被人打了一拳,胃也像是被硝石烫伤一样难受,他强忍着不适将酒瓶放到一边,从一旁小山一样的纸堆中抽出一份文件。\n\n这就是他的工作,收纳这些暴乱分子的文档,整理他们的资料,这一直都是一个轻松的活,但就在最近几个月频发,他们的工作也一下子重了起来,只能每天喝点酒来放松放松。\n\n而且这些酒的质量极差,低劣到连欧洲最难喝的酒都显得如此香甜可口,这玩意儿就是用香蕉榨成的,不仅度数极高,而且极其难喝,但没办法,这已经是他们能找来最好的酒了。\n\n看着名单上的一个个名字,他心里不由的胡思乱想起来:“黑人造反一般都是要枪毙处理.…但如果是白人造反,是不是可以扔进集中营了?就像是布尔人一样...”\n\n在枯燥的工作中,除了偷喝一点酒之外,推测这些囚犯的下场成了雅各布唯一的消遣,他时常跟同事们打赌,比如某某黑人要被丢进集中营,还是直接枪毙。\n\n根据他得到的内幕消息,好几处集中营都成功建立,基本上都是用来关押那些暴徒的,但即便得知这个消息,他还是输多赢少,因为对于暴徒的话,当局基本只有一条铁律,迅速审判,迅速枪毙。\n\n最近一段时间街头的暴徒越来越多了,每天枪毙的人也越来越多,到现在多到连集中烧毁尸体都是一件极其困难的事情。"
 BEL.29.a:0"唉……"
 
  
 BEL.30.t:0"耻辱"
 BEL.30.d:0"深吸一口气,涌入肺里的是热带潮湿而闷热的空气,还混杂着汗水与腐木的腥臭,直叫新兵文斯作呕。朴素到简陋的演讲台上,上校在训话。说是训话,其实只有三条准则,三条能让文斯回去挚爱的比利时家乡的准则,不断地重复,重复的从上校那张虔诚而狂热的脸庞的口中铿锵有力的吐出：“其一……土著奴工的家庭成员……就近……集中看管；其二……奴工未完成……当日工作……择其妻子儿女其一……斩去双手；其三……多日未……完成工作……斩去双手……枭首示众以儆效尤。”所有的士兵齐声重复准则,文斯的眼角里,他们全都展现出与上校一般虔诚而狂热的神色……不……他们都长着和上校一摸一样的脸……一抹恶寒爬上了文斯的心头,但他不敢表现出些许不同。\n\n转眼间又到了工厂,无数飞速运转的流水线上,成百上千被拴在毫无保护的机床边的刚果黑奴工作着。机械的轰鸣,粗重的喘息,不幸受伤者的惨叫一同构成了一曲怪诞的交响乐,而沁入灵魂的恶臭则为这地狱盛宴铺上了浓厚的底色。新兵文斯试图找出这恶臭的来由,好像,是个陈旧的木桶。好奇战胜了理智,文斯伸头瞅了一眼,那令他后悔的一眼——满桶的手,黑色的手,大大小小的手,最上面的还新鲜,或整齐或扭曲撕裂的断面暴露出森然雪白,下面堆叠的则完美的展现了腐败的威力,宛如一本死神的教科书般一层层呈现了腐败溶解的肉体如何化作泥浆枯骨。文斯想尖叫,但声音卡在了喉咙里,出不去也下不来。因为骤然间,所有的黑奴都看向了他,有臂无手者看着他,断腕滴血者看着他,断面溃烂发脓者看着他,半死不活者,森然白骨们看着他,这眼神他见过,他在一个被斩去双手后失血濒死的土著女孩眼里见过。他们沉默的涌上来,用没有手的臂把文斯按倒在地,用肘,用膝,用腿猛击他的手,他完整的手……\n\n文斯几乎是从床上跳起来的,好像这样才能逃离梦魇的追捕。他喘着冷气坐在床上,心里却没有丝毫庆幸。"
 BEL.30.a:0"他为他的比利时感到耻辱。"

 BEL.31.t:0"归乡（1）"
 BEL.31.d:0"这是文斯躲到刚果以来,第一次走出的充满恶臭味儿的窒息雨林,并再次看到那蔚蓝的大海。领头的法国教官对这一群比利时士兵不知所措的样子感到轻蔑。\n\n士兵们将在法属刚果的卢博莫港装载上船-法国政府特意指挥一群长期在几内亚湾捕鱼的渔船队将比利时士兵送到象牙海岸。为了躲避英国人的监视,文斯等人在抵达象牙海岸后,需要步行穿过尼日尔河流域,最后到达毛里塔尼亚的艾蒂安港,最后再从那里登上接应的船队,一路沿大西洋东岸航行到加来。上岸后,这是一片比利时人从来没有涉足过的土地-它的内陆边缘就犹如刚果一样,拥有着让人难以忍受的雨林和能将人摧残至死的蚊虫叮咬；再然后,士兵们将穿过茫茫的大草原,一路上有许多危险的猛兽在等待着文斯；最后,比利时军队将穿过塞内加尔与毛里塔尼亚之间的沙漠,一路上的补给微乎其微。\n\n比利时人此时就在上沃尔特的草原上,这里的道路是如此的泥泞,是令人惊奇的简陋,就连布鞋的底板都会被轻易的撕扯下来；文斯受不了闷热的军靴,但又没有草鞋,便脱下鞋来光着脚走,结果换来的却是脚底板一道又一道的伤疤。就是这么一只熙熙攘攘的部队,在非洲大陆上汇聚成了一条又一条的细水长流,奔向另一处海边。同样跟着比利时军队走的,还有一些极其渴望回到家乡而又恰好被选中作为计划参与者的比利时公民,他们已经被法国先行运送到毛里塔尼亚的港口了。\n\n比利时的队伍是没有笑容的,但也没有人抱头痛哭。夕阳西下,所有人都聚在火炉旁,开启又一天的休息。不久,领队的连长开始唱起了瓦隆地区独有的歌谣-那一连串浓重口音的法语歌词响彻云霄,惊醒了四周的野兽,也唤醒了所有即将沉睡的比利时人；火把举起,掌心拍动,就连遍体鳞伤的脚也开始随之抖动,犹如人生第一次玩耍那般愉快。"
 BEL.31.a:0"在迷迷糊糊中迎来归乡之旅。"

 BEL.32.t:0"归乡（2）"
 BEL.32.d:0"海洋接纳了无数以此谋生的生灵,处处彰显着自然之力的浩瀚无垠,在海天相接的地方,影影绰绰,是海洋上的船只在航行,这是世界航线繁忙的一天。\n\n梅兹紧紧握着瓦特的手,站在邮轮的船头上,仿佛他们第一次结婚时,出国旅行一般那么温柔,令人陶醉其中。不过瓦特裤腰带中别着的手枪则暂时打破了梦境。他们是瓦隆人,当然是完全合法的比利时公民,也是完全效忠于国王的忠实臣民,但是如今的他们却要执行有史以来最为伟大的任务-把比利时送回故乡；今天他们的身份是亚历山大（男）和卡米尔（女）,都是法国皮卡第的市民。包括自己,其他认识的亲朋或者完全不熟悉的陌生人们,都被法国人一一准备了假身份证并冠以了假姓名。\n\n这艘船是法国的“芝加哥”号邮轮。如今的轮船虽然挂满了法国国旗,里面却装载了1500名比利时士兵和300名“乘客”,比利时士兵们都在三等舱,而乘客们都在二等舱,亦或是在客舱之外,充当掩人耳目的对象,特等舱则留给了比利时的指挥官。只有一部分乘客为了对应最坏的情况,才配了手枪。\n海风逐渐用力拍打脸颊,慢慢的,这种温柔逐渐缩紧,并最终变成了不安。“亲爱的,我们是否能回到沙勒罗瓦的小木屋里……我们在下船后会被杀吗？”梅兹小小声的说。“不不不,利,我们当然不会死,我们当然能回到家里,我们当然能找到好工作的……只是现在,我们需要为国家担负一点责任罢了。”瓦特激动的说。“哦,亲爱的,相信我,相信比利时,相信国王,上帝一定会保佑我们的！”。\n\n其他乘客何尝不是如此的,为自己未来的前途而紧张,他们有的假装放松心情,实则在心中不断祈祷。有的则在轮船上真提前办起了生日宴会,也就当成了自己的葬礼。海鸥的注视下,有一瞬间,这艘船仿佛真的像昔日一样的航行,满载着比利时乘客,在海上叱咤风云,带着人们驶向彼岸。"
 BEL.32.a:0"浮现的从前,交织时光与现实"

 BEL.33.t:0"归乡（3）"
 BEL.33.d:0"德.弗里斯作为安特卫普港的一名调度员,显然没有做好他的职责。前几天他才刚丢了调度记录表,结果今天他又忘记了重要的入港登记表中客船表的摆放位置。去他的,我一个荷兰海牙人怎么到了比利时当了调度员,还要去学如此蹩脚的瓦隆语,这肯定不是我的职责！\n\n尽管如此,在前几天的安特卫普海军招待会上,他还是认认真真的给一群低级海员拍足了马屁,当时充足的精力导致到如今的他都变得昏昏沉沉。在大玻璃窗之下,阳光斜射,开始刮起陆风,气候逐渐凉爽-这是睡眠的最好时机。正当弗里斯摘下眼镜准备进入梦乡吋,一阵长笛却差点让他摔碎眼镜。他赶忙抬起头看了看-一艘巨大橙色的邮轮向这边驶来,驾驶舱的顶部隐隐约约的有着“…ag…”的掉漆字样,桅杆上挂了一面巨大的法国国旗,而甲板上则占满了不算密集的游客。弗里斯用他目前最强的大脑神经想象着这艘轮船的身份,最后他得出结论：这是一艘来自法国的“罗尚博伯爵”号邮轮,因为前两周刚改变原先的大西洋航线为北海航线,所以如今停靠安特卫普暂时休整,嗯,好像计划表上是有。弗里斯不得不感叹自己良好的记忆力和聪明绝顶的智慧,于是就变赶忙派遣港口的小职员们迎接邮轮。\n\n轮船逐渐靠岸,梯子已经搭上,弗里斯带着新的荷兰职员们迎接游客下船。不过奇怪的是,除了少部分几个笑得渗人的乘客,剩下的仿佛都没有气息一般平静。原来法国人都是晕船大户！根据荷兰的新规定,港口入境不仅要检查签证,还要检查他国乘客的身份证。目前一切正常,自己的瓦隆语或者法语沟通起来毫无困难。陆陆续续已经有100多名乘客下了岸,其中一名乘客提着怪重的箱子,结果在下船时一头摔倒在码头边,一名小职员刚想上去扶起,箱子却自己打开-里面放着两把短猎枪。职员们瞬间提醒警惕,预备抽出腰间的警棍,只有弗里斯一个人还在用瓦隆语念念自语：“低地国家联合规定,不得携带枪支等违禁物入境,先生,您的枪支已经被……”话未完,只见身旁一个高大魁梧的男性乘客拿起什么东西猛向弗里斯的头上砸过来,弗里斯顿时天昏地眩,其他几名职员仿佛也如喝醉般晕倒在地。\n\n等到醒来时,弗里斯先是将一拳打出,却扎的嗷嗷直叫-并且立刻被人捂住了。再一睁眼,带着血迹的刺刀和粗黑的步枪已经在他的面前了。而船上的法国国旗早已被撤下,取而代之的是一群黑白相间的未知士兵以极快的速度从船上冲了下来,控制住了弗里斯一行人以及所在码头附近的工作人员。乘客们充当了士兵的保护罩,在士兵们的外围围成了一圈遮人耳目。弗里斯被推到士兵的前面,后面顶着刺刀,背后有人用他听过这辈子最纯正的瓦隆语狠狠的说：“老实点,带我们去调度中心和警察局,否则一枪毙了你！荷兰人……”。"
 BEL.33.a:0"“饶了我吧……”"

 BEL.34.t:0"归乡（4）"
 BEL.34.d:0"不用多少时日,比利时军队就已经完完全全控制了安特卫普的调度中心,通信连队立刻控制了无线电设备并发送国际通告-非低地船只禁止驶入安特卫普的所有码头,非低地船只立刻驶离港口。很快,陆陆续续的外国船只离开了安特卫普港。而这一举动却引起了安特卫普港口警察局以及尼德兰巡逻队的疑惑：他们完全没有接到过尼德兰或者国会类似的通知,难不成是调度中心混入了比利时保皇党分子？\n\n大量警察和巡逻队人员倾巢出动,向着调度中心涌去,而文斯所在的小队则绕过安特卫普港的码头装货区,直插已经只有稀稀拉拉几个人的警察局和巡逻队营房。就在这时,一个丝毫不会被人注意的营房哨站却发现了小队的动向,在见到不是尼德兰士兵后,士兵向天空连开几枪发出警告,文斯举起枪一发子弹就精准的命中了那个士兵-这是在刚果练就的绝招。而此时的警察部队。以及巡逻部队已经注意到了开枪声,他们正处于警局和调度中心中间的另外一副装货区。螳螂捕蝉,黄雀在后,早已埋伏在他们周围的比利时部队立刻发起了猛攻,把警察们打的措手不及。安特卫普港口顿时枪声大作,其余的比利时军队开始迅速占领剩余的码头和港口设施。\n\n比利时故意发出的国际通告既是为了防止外来船只干扰战局,也是对剩余船只的行动信号。停泊在英吉利海峡敦刻尔克一侧,装载着比利时士兵的法国渔船队伍开始以最快的航速驶向安特卫普和奥斯坦德；同时。又有另外一艘悬挂法国国旗的轮船由尼德兰泽兰省进入了安特卫普港。而这艘船上没有任何游客,只拥有2100名全副武装的比利时士兵。如今围绕着英吉利海峡的贸易秩序已经因为比利时军队的行动而被打乱,海洋上仿佛像炸开了一锅粥一样热闹,大量的船只离开安特卫普港,又有大量的船只开向安特卫普,而其中自然混杂着运载比利时士兵的货船……"
 BEL.34.a:0"比利时人把火花打上汽油了"

 BEL.35.t:0"归乡（5）"
 BEL.35.d:0"随着一队又一队的比利时士兵下了船,以及一队又一队的尼德兰军队闻讯而来后,安特卫普的战斗到了最激烈的时刻。这座昔日繁忙无比的巨型港口陷入了如那场大战一般的战火中。比利时人们将火炮搬下了船,用抵近直射的方式对着敌军以及他们的掩体开火,炸得敌军血肉横飞；尼德兰军也不甘示弱,他们不但呼叫了附近所有的尼德兰军队,并且将坦克也开进了安特卫普。\n\n在大海之上,无数来自各国的船只本想进港休整,无奈调度中心的通告以及港口中连天的火焰枪炮声将他们阻隔在外-而他们将回到自己的祖国,在小酒馆或者大街上散播这一惊天动地的消息。在调度中心里的乘客正团团缩在一起,被二百多个防卫的比利时士兵保护着,而乘客中有一些自告奋勇的男士则拿起手枪,随着比利时士兵赶去港口装货区支援。梅兹紧紧的抱住瓦特,而瓦特则提早抽出了那把手枪,不转睛的盯着前方的玻璃窗。乘客们一刻不停地在低声喊着上帝保佑,并希望自己能够完好无损的回到故乡。\n\n文斯和他的小队正躲在另外一处装货区清点着战斗后的缴获枪械,事实上港区的战斗从并没有结束,只不过是尼德兰要求大部分敌军前往中心码头阻挠登陆部队,这些家伙才撤退的。不过既然 营区和警察局已经被占领,长官命令坚守,有片刻的休息时间,文斯还是组织外围部队各自寻找隐蔽的货仓,就地潜伏。他自己找到了一个白色的集装箱-里面装满了看起来名贵的沙发,便随便找了一个坐了上去。在一个人的小世界里沉默许久,文斯的耳边时不时传来嗡嗡的声音,夹杂着远方的炮火声,而他的脑海中却飘到了他的弗兰德斯,还有那可爱的未婚妻上。文思神经变得越来越激动；对,之后该怎么打算？还能见到她吗,她还爱着我吗？肯定有退伍金……带着她去旅游,好不好？还有……\n\n“砰！”,只见这么响亮的一声,划破了他思绪万千的世界,脑子一昏,便趴在了已经血红的绒毛沙发上,他的眼睛还死死的盯着集装箱顶：他先是听见了尖叫,然后又听见了一声枪响,仿佛感受到了子弹贯穿的剧痛-最后一群已经不熟悉的人冲进集装箱,几声枪响后,有一个人应声倒地,自己的眼睛也模糊了,只能闻到一丝曾在刚果闻到的味道……之后,当文斯被抬出去后,他已经停止了呼吸。"
 BEL.35.a:0"他想好了归乡的一切,\n却唯独没有料到归乡前的死亡"