 ORA.11.a:0"“别愣着了西蒙，站起来给大家讲两句！”"
 
 ORA.12.t:0"大会最后一天：总工会领导人选举"
 ORA.12.d:0"大会的最后一天，天气并不是很好。\n\n阴云笼罩在布宜诺斯艾利斯的上空，西蒙在越狱中被铁皮所划伤的腿在这种潮湿环境之下隐隐作痛。他的双腿不由自主的摆动着，多年狱中的生活给拉多维茨基带来的不止是一条落下了病根的腿，而还有挥之不去的心理阴影。他皱了皱眉头，只得在心里默默宽慰自己“伤痛总会好的，一切都会越来越好的。”\n\n悲伤的情绪在这种场合不宜久留，他也许该改改自己胡思乱想的毛病了，西蒙想到。注意力回到了大会上，现在是乔瓦尼在致辞：“……大会的各项议题都已讨论完毕，阿根廷未来的蓝图也初步构建完成，而现在，我们要来确定下一届的总工会领导….”\n\n台下对乔瓦尼这番话传来了善意的哄笑声，待众代表安静下来，并投票完成之后，主持者开始进行唱票，而最后的结果是……"
 ORA.12.a:0"革命工团主义将会粉碎一切！"
 ORA.12.b:0"桑迪兰和他的新大陆工团模式获胜。"
 ORA.12.c:0"毫无疑问，西蒙的改革方案得到了多数人的支持。"
 
 ORA.13.t:0"梦"
 ORA.13.d:0"西蒙走入席位，抬起头，讶异的发现大家一齐的盯向演讲台的位置，一个庞大的黑影占据了前台，他有点想发笑，因为那身影与其说是人，倒不如说是熊还能更令人信服。\n\n还来不及思考，台下一个工人代表便已经大声的喊道：“大会认为如何实现工人自治？”\n\n黑影浑厚的声音传来：“这位代表说的很好啊，针对这个问题啊，我们要紧抓危害性，提高自觉性……”\n\n“我们需要准确的答案”那位工人等不及了，刚欲要开口，却感到全身发热，回头，却发现周围人正齐刷刷的盯着他，只听到一个莫名其妙的指控：“叛国！”震耳欲聋的声音喊到。\n\n“等下，我……”那位代表懵了，西蒙也讶异的发现自己无法动弹。“叛国！叛国！叛国！”四面八方的声音和视线包围了代表，打断了他接下来的话。西蒙突然感到头晕，恍惚间仿佛看到众人拿起武器相互攻击，飞溅的木片擦过他的脸。刚才说话的人影和会场的屋顶越升越高，他还是看不清人脸，可那也不重要了，门外有人恐惧的高喊：“军政府打进来了！”“在哪里？”西蒙用力的抬起头，正看到那巨型人影正对着他笑……\n\n然后他惊醒了……"
 ORA.13.a:0"那只是一场梦，对吗？"
 
 ORA.14.t:0"一个小市民的经历"
 ORA.14.d:0"马丁内斯一大早就被掺杂着汽车轰鸣的狂欢声给吵醒了。不过他翻了个身，把脸埋在被子里，脑子里似乎对这种行为表现出了不屑，但在心里又幻想着工团分子到处枪毙人的刺激场景。\n\n楼道中急匆匆的脚步声越来越近，马丁内斯开始怀疑自己的梦境是否变成现实，他慌慌张张的起了床后拿起一根自己曾经工伤骨折时用的拐杖，小碎漫步地走在门前，先探出头，再打开门一看：自己的门上贴着一张破纸，上面还有两个大红叉。他的第一反应是以为这是要拉出去公开枪毙的符号，心里不由得一阵抽搐的痛苦涌上了大脑，在短短的一秒内开始忏悔自己曾经在公司里的所作所为，并祈求上帝对他展现奇迹。然后再定睛一看，“发现红色可疑分子举报有奖”的几个黑字，哦，原来是撕毁军政府留下的通缉令。\n\n下楼的第一眼便是看到潮海般的欢迎人群——里头还有熟悉的邻居。在床上还认为这是傻子行为的马丁内斯，也不由得自己的好奇心凑近看了看游行于中间的队伍，他们是一群身穿工作服与破大衣，人手一顶工人帽的武装队伍，并没有表现出过于喜悦或者凶狠的样子，看来军政府的话是永远不能信的，过去和现在一样。“不就是一群工人！”马丁内斯自嘲地说道。但确实又与工人不同，至少他们敢把这些平日作恶多端的老财与军人通通打跑；不过，回到现实，此时的马丁内斯呢，只有担心起他的公司，会不会被工团士兵给砸烂了的份儿了——毕竟他们的经理施米特可是有名的拖欠老赖嘛。"
 ORA.14.a:0"能把我的工资给提前结了，我就支持他们！"
 
 ORA.15.t:0"布宜诺斯艾利斯暴动"
 ORA.15.d:0"“有人说这是一场人民与人民之间的内部斗争……我是否定的——因为有些人根本就没有看出来谁是人民谁是真正潜伏于人民并祸害人民的人、反革命分子，工贼！”一位工团工会成员说。他正躲在政府大楼的角落里，对着一位不知所措的打字员发表在厕所的激情演讲。\n\n大楼之外的呐喊声与爆炸声很快就掩盖了一切细细碎语。那些支持军政府的不知名团体手持武器，开始疯狂的在大街小巷搜罗工团士兵，并公然向大街人群密集的地方投掷炸弹。一小队工团士兵来到了一处小巷子：只听砰的一声，左侧楼房二楼的窗户飞出了无数个黑煤似的东西在空中爆炸，所引发的碎片，瞬间让站在队伍前面的两位市民举报者顷刻毙命。墨菲趴在地上，头上佩戴的钢盔使得他免受于碎片的侵袭，此时嘴里还嘟囔着：“好家伙，这是学了咱们的炸弹技术造出来的混蛋玩意”。随后他命令士兵直接冲入楼房中，一阵激烈的枪响过后，不一会儿就有四具反动者的尸体被抬了出来。\n\n布宜诺斯艾利斯浓烟滚滚，仍然坐镇在市中心安东尼奥对全体工团士兵发出了命令：不得使用火炮在城内作战，要坚持以巷战的作战方式一步步揪出反革命分子，切记尽量不要波及无辜公民！今天，南美洲有史以来最大的一场巷战在布宜诺斯艾利斯正激烈地上演，反革命集团就犹如当年无政府主义者与工团主义者一般手持轻武器与炸弹，不过向的是工团士兵与公民们发动凶猛的进攻。他们也自然没有当年安东尼奥的好运气，成批成批的死在了阿根廷革命胜利后的大地上。"
 ORA.15.a:0"但愿混乱能够终止"
 
 ORA.16.t:0"解放？"
 ORA.16.d:0"瓦尔帕莱索陷落了，或者说，它的守护者根本没有守护它的意志甚至行动。自阿根廷工团的军队如拿破仑再世般翻越安第斯后，首尾不顾，斗志全无的智利军队兵败如山倒。瓦尔帕莱索，智利海军的母港，圣地亚哥通向大海的门户，就这样在一片诡异的宁静里被拱手让给了攻占……不如说是接管这美丽港湾的工团军队。\n\n这诡异的宁静同样笼罩了爱德华多·巴拉中学，古朴的教学楼里三三两两的聚着无所事事的学生，毕竟，现在谁还有心情上课呢？“真是岂有此理！”一声怒喝给这片宁静激起了些许波澜，暴脾气的本杰明率先忍不住了：“我们就这样如待宰羔羊一样向侵略者引颈就戮吗？”然而，并没有本杰明想象中的一呼百应，只有三三两两的附和。一旁的女生弱弱的回应到：“可是……可是我听外地的爸爸说，这些阿根廷人没有带来毁灭与奴役，甚至……”女生鼓起勇气吐出后半句话，“他们……解放的地方，人们反而过的更好了。”诡异的宁静再次攥紧了每个人的心脏。\n\n不过，片刻迟疑之后，有几个男生聚集到了本杰明周围，不加掩饰的讨论起义的准备，有人甚至拾起了匆忙撤离的智利军队遗落的枪械，“你，阿连德，你不是读过很多书吗？你又怎么看？”一时间，这句发问让先前一直沉默不语的阿连德顿时成为众人目光的焦点。“我觉得……我觉得……”阿连德只觉得口干舌燥，“我们要从剥削与被剥削的关系来看，智利政府及其代表的大资本主义大地主阶级利益被打倒了……这固然是好的……”阿连德拧巴的把后半句话从牙缝里挤出来，“我觉得我们应该观察阿根廷工团的正义性，即他们是否代表……”“够了！你就那么急着舔阿根廷人的靴子？”阿连德沉默了，但这种说不出口的拧巴感不止困扰他一个人。"
 ORA.16.a:0"最终，也没有人发动起义。"
 ORA.EVENT16.tt:0"§Y萨尔瓦多·阿连德·戈森斯§!还年轻，他会得出答案的。"
 
 