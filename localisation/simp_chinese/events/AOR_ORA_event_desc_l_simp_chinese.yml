l_simp_chinese:

 AOR_ORA_events.1.t:0"日薄西山"
 AOR_ORA_events.1.d:0 "即使在美洲之角，太阳也不会吝啬她的温暖，她轻拂过铁窗中人，掠过山间林木，而后更向西行。\n\n西蒙感受着脸颊的余温，享受着太阳的余晖，他知道阿根廷的太阳已经落下——长夜将至，但太阳永不消逝。如今太阳在北方闪烁，无需多日，南方也将被日光所照耀，在那之前，只需静待时机。\n\n“待到明日，太阳照常升起。“在阴湿的牢房里，西蒙如此想到。"
 AOR_ORA_events.1.a:0"黑暗中彷徨于无地"
 
 AOR_ORA_events.2.t:0"惊异"
 AOR_ORA_events.2.d:0 "蜷缩成一团的雷托那看着，看着漆黑的栅栏上断断续续的反射着近圆的光，光昏随着铁的纹路扩散着，好似诉说着其过往……\n\n“现在过了多少个小时？或者说，已经第二天了？”想着，不禁摸了摸自己浓密的胡须。呆在监舍无疑是对于火地岛囚犯最大的惩罚，如果说被逼着劳动让人厌恶，那么呆在这里简直是一种绝望，一种自己将腐烂在这里的错觉像是扼住了他的喉咙，“要是知道时间就好了……”\n\n“你待了五个小时了，一般来讲，得关一周。”雷纳托猛地回头，错愕的看着自从一开始就不说话的狱友。“虽说食堂离着不远，但声音传不过来，也就不能利用它判断时间”他自顾自的说着，雷纳托才发现他瘦的吓人，骨节都暴露出来。“第一天都不会送食物，自那之后就就能通过三餐，算时间了。”看着对方的眼神，那名狱友笑了，“我叫西蒙.拉托维茨基，从来没从监舍里出去过”"
 AOR_ORA_events.2.a:0"“别这么看我，你们头一次进来的，都想问时间。”"
 
 
 
 AOR_ORA_events.3.t:0"工人上前线！"
 AOR_ORA_events.3.d:0 "工人们虽然夺得了工厂与生产资料，但他们仍要面对军政府的威胁。尽管工会还在尽力协调着上前线和生产之间的平衡，但随着战争时间的拉长，似乎会变得更为艰难..."
 AOR_ORA_events.3.a:0"速战速决"
 AOR_ORA_events.3.b:0"速战速决"
 AOR_ORA_events.3.c:0"速战速决"
 
 AOR_ORA_events.4.t:0"守住街垒"
 AOR_ORA_events.4.d:0"我们的工人的，经过无数考验建立起来的联合工团，现在正面临着史上最大的挑战。每一名工人都必须清楚：我们的资源并非无穷无尽。阿根廷大地不是一片荒漠，两千万人民生活在这片土地上——他们是我们的同胞，我们的父母妻儿和兄弟姐妹。\n\n因此，必须为坚守每个街口、每一道防御阵地战斗到最后一滴血。夺取并尽可能长时间地保卫每一块土地。反动军队有良好的纪律，虽然他们没有保卫祖国的崇高目标，其目的只是要征服并掠夺我们的工人。而我们有保解放全南美的崇高目标，但因缺乏纪律而遭致失败。工团正值困难时期。我们必须不惜一切代价阻止、击退并消灭敌人。坚决执行上述命令，就能保卫我们的土地，解放我们的人民，打败并消灭可恨的敌人！"
 AOR_ORA_events.4.a:0"解放阿根廷！"
 
 AOR_ARG_events.1.t:0"最糟糕的一天"
 AOR_ORA_events.5.t:0"阿根廷内战白热化"
 
 AOR_ORA_events.6.t:0"曙光乍现"
 AOR_ORA_events.6.d:0"喧嚣的枪声终于结束，阿根廷迎来了久违的宁静。红黑旗沐浴着南方的朝霞，工团主义的梦在美洲扎根，但是代价呢？这片土地可不止连绵的工厂，还有土地与农民。每个人都需要粮食，就如同需要空气。"
 AOR_ORA_events.6.a:0"至少现在，旭日东升。"
 
 AOR_ORA_events.7.t:0"奔向大海"
 AOR_ORA_events.7.d:0 "“唉，你知道吗？过了许久我才知道，阿根廷的雪并不冷，冷的是这个昏暗的社会。”雷托那突然想到西蒙莫名其妙感伤的话，本就紧张的他差点没跩个跟头。“他妈的……，就不该听他的”雷托那骂骂咧咧地踢开了碎木块，警卫被上次自己夹带的钱贿赂，但也至多只有三十分钟。\n\n“那艘傻逼小船，还有那个Compañía Argentina de Pesca, CAP……”\n\n他看到了海……\n\n还有那艘船……"
 AOR_ORA_events.7.a:0"此时，距离西蒙·拉多维茨基，逃离火地岛监狱，还有5小时。"
 
 AOR_ORA_events.8.t:0"远洋之上"
 AOR_ORA_events.8.d:0 "“埃内斯托，收到信了！”一个捕鲸公司的人举着信向埃内斯托挥了挥。(我们暂且叫他大胡子，原因显而易见）\n“我知道了”埃内斯托换上了狱警服，咬咬牙“这次不能再失败了。”他喃喃道。\n\n“啥玩意？！”大胡子回了头，用很大的声音抵御海风的干扰。\n\n“我说！还有多长时间到那？”\n\n“不久了！至多三个小时，运气好，没有风浪，说不定两个小时就能到。”\n\n埃内斯托擦了擦怀里的枪，闭上眼睛靠在船舷上。\n\n现在只需要等待……"
 AOR_ORA_events.8.a:0"此时距离西蒙逃离火地岛监狱，还有一小时。"
 
 AOR_ORA_events.9.t:0"地火，地火正燃烧"
 AOR_ORA_events.9.d:0 "“雷托那，这东西你藏好”西蒙拿出一瓶液体，然后雷托那眼睛直了，只见就如变魔术一样，第二瓶，第三瓶，第……\n\n“你他妈从哪里拿来的，这什么玩意？”雷托那抓住一瓶油，闻了闻，“燃油？”他突然反应过来，“我操，你从哪里搞来的？”他略带兴奋的抓住西蒙的衣领，“能搞来这玩意还需要我帮你？”\n\n“一个老伙伴动用私人关系搞得”西蒙用一句话堵塞了雷托那的下文，“死了，被山上的石头砸死的。”他顿了顿“总之，你还是得让警卫看到你，否则你会成为嫌疑人之一。”\n\n雷托那跑回到警卫身边，压抑住某种情感，他上次拥有这种情感还是在恶作剧后，嫁祸给隔壁欺负自己的小混混，享受完全自由的时候，才有过这样畅快的情感。\n\n“你他妈要是再晚一点，别人就该起疑心了，快回去。”警卫不耐烦的挥挥手，突然觉得有股焦糊的味道，“什么玩意？”\n\n他猛地回头，看到冲天的黑烟。\n\n“什！么！情！况！”!"
 AOR_ORA_events.9.a:0"西蒙已离开监狱。"
 
 ORA.1.t:0"大会开幕"
 ORA_1.d:0"清晨，西蒙睡眼朦胧的起了身，怀着对梦境依恋不舍的心情，告别了最后一缕夜色。他缓缓走进大会的会场，太阳光有些刺眼，不由得使人眯上眼睛，拉出凳子落座，拿出材料进行最后的检查。他今天的状态格外的差，仅仅粗略的扫了一眼议程清单，他的大脑就不由自主的陷入了沉思之中。\n\n尽管FORA在先前已经经历过了一次分裂，但组内仍然还有许多不同的声音。作为第一个取得阶段性胜利的工团政权，各种前人没有仔细考虑过的问题也纷至沓来。这次大会过后，革命政权的道路到底该通向何方——马上就要揭晓了。\n\n作为里奥加耶戈斯工人协会秘书长的安东尼奥·索托，似乎对阿根廷现在的新大陆模式有一些不满。他和他支持者们认为现在的阿根廷工团已经滑落到了近似于委员会共产主义的边缘，而这是对革命工团主义的彻底修正。西蒙叹了一口气，他将不可避免的在这次会议中与激进派们产生矛盾，而他并不占优势。\n\n迭戈·阿巴德·德·桑蒂兰，工团内部为数不多的笔杆子，也是夹在西蒙与索托中间的温和派。这位年仅二十三岁的“阿根廷第一理论家”力图弥合FORA内部的矛盾，具体问题具体分析，携大家一起走向美洲革命胜利的终点。西蒙赞赏他的那些理论——当然也仅仅是理论。\n\n然后就是他自己，西蒙·拉多维茨基，内战时的总工会领导。在内战时，他的大部分时间是在狱中度过的，只能通过纸笔书信来管中窥豹式的指导革命。我们需要改革，是的，我们需要改革。革命工团主义无法适应南美洲的局势，我们需要在巨人的肩膀上谱写新篇。尽管激进派刻意的暗示西蒙的狱中生活让他脱离了实际，但让那些家伙走着瞧吧，看看谁才是脱离实际的那位。\n\n西蒙强打着精神看完了最后的那些议题，CORA的回归请求，总工会和地区工会的关系，对农民态度是否和内战时一样，军队是否常驻，审判机构是否设立….这其中的每一个议题都够工人领导们吵上不久了。\n\n西蒙还在思考着，而这时其他代表也吵吵嚷嚷的进来了。一些人在走廊与会议室间寻找彼此。忙乱的场面打断了他的思绪，他喝了口水让自己冷静下来，待大家都落座后，西蒙起身清嗓道——"
 ORA.1.a:0"“那么我宣布，阿根廷工人大会现在开始！”"
 
 ORA.2.t:0"大会第一天：CORA与FORA重新合并？"
 ORA.2.d:0"阿根廷地区工人联合会的历史要追溯至1901年，FORA创立初期，它的成员主要是无政府主义者和社会主义者，然而这两派的矛盾在实际行动当中始终没有得到调和。最终到了1915年，FORA中的大部分社会主义者离开了我们的组织，由塞巴斯蒂安·马洛塔率领成立了CORA，并前往乌拉圭成立了“美洲工会联合会”，与其他美洲共产主义组织取得联系。而剩下的FORA成员则坚持总罢工的路线，与军政府展开对抗。\n\n在革命胜利之后，不少工会代表都提出了重新合并组织的想法,尝试让FORA与CORA这对革命路线上的死敌会再一次寻求统一，CORA也对这个建议兴趣浓厚，派遣了代表来到了工人大会之中。\n\n来自帝国主义的压力正摆在每个左翼人士的面前；无论他们之间的分歧如何，他们的最终目的都是要解放全南美的人民。\n\n对此，桑蒂兰积极的肯定了这一想法，并在《抵抗报》上呼吁求同存异，积极联合。而激进派们则觉得，一个曾经背叛过我们的群体现在乞求回归是如此荒唐可笑，不过在西蒙出面调解后他们允许CORA在同意现FORA占主要领导地位后重返阿根廷。\n\n尽管现阶段这个不稳定的联盟内还存在着巨大的分歧，但与会的人们看到了，全世界都在见证：时隔数年，工人们的两个孩子又一次走到了一起："
 ORA.2.a:0"既然他们希望，就让他们来吧。"
 ORA.2.b:0"都是工人的孩子，求同存异。"
 ORA.2.c:0"自由讨论，一致行动！"
 
 ORA.3.t:0"大会第三天：总工会与各地工会关系"
 ORA.3.d:0"在总工会与地方工会关系问题上，主张集中领导的改革派与赋权地方激进派可谓针锋相对。\n\n改革派们希望在可以接受的程度之内将更大的权限给予总工会，由总工会来统一给出生产建议，并在战时快速调控全国地区工会——这些方针被激进派们批为“如苏维埃俄国一样的极权分子行为”。\n\n而激进派们则希望恪守工团主义的传统方针，各地工会拥有高度管理权，阿根廷工团绝不能滑落专制的深渊，这种改革派看来老掉牙的举动对他们而言“效率低下，不切实际”\n\n温和派在其中采取了调和的立场，他们主张调和的立场，一定程度上也使得会议不至于在此失控。“......无论如何，我们必须在这个问题上得出共识，”桑蒂兰的演讲让会场暂时安静了下来， “——决定我们的方案吧，代表们！”"
 ORA.3.a:0"各地工会当然应该有自主分配工作的权力！"
 ORA.3.b:0"总工会也需要一定的管控权，但不宜过多"
 ORA.3.c:0"由总工会统筹资源，集中力量建设工团主义！"
 
 ORA.4.t:0"大会第五天：农民问题"
 ORA.4.d:0"“农民作为小生产的代表，他们有自己的生产生活资料，可他们的生产却是我们之中最为落后的.....”激进派的发言很快受到了来自另外两方的批评。\n\n“难道我们要像托洛茨基那样，直接把他们排除在革命队伍之外吗！”温和派们难得没有和稀泥，而是言辞激烈的抨击激进派们“我们固然要改造农民，但应该是我们去领导，让他们自愿团结起来，而不是去抢劫！”\n\n改革派则提出了一种看上去相当保守的方案:农民自愿组成合作社，归总农会管辖，而总农会直接对总工会负责。\n\n尽管三派系对农民问题的处理方式都不甚完美，但南美农人的未来确确实实存在于这三个提案中："
 ORA.4.a:0"他们给不了，我们自己来拿！"
 ORA.4.b:0"农民自发集结成合作社，但工会直辖的原则不能变。"
 ORA.4.c:0"农民问题赶不得，农业生产拖不得！"
 
 ORA.5.t:0"大会第七天：军队与赤卫队"
 ORA.5.d:0"按工团主义之原则，军队这种直属于威权的暴力机关是一定要被废除的。激进派相信，工人们作为国家之主，是不需要被所谓正规军所限制的。如果工人的祖国遭受到了侵略，他们会自告奋勇地上街垒去保护自己的祖国。\n\n但在以往革命的经验中，没有人能否认民兵与职业军队的战力差距之悬殊，改革派因此选择保留军队，以便应对帝国主义的重重威胁，并为将来的解放美洲做好铺垫。\n\n至于温和派，大家都希望日后讨论——毕竟革命仍在继续，经验会证明一切的。"
 ORA.5.a:0"工人兄弟的自由，将由他们自己来捍卫！"
 ORA.5.b:0"大会结束后，我们会再次讨论这个问题。"
 ORA.5.c:0"时间会证明，拥有一批正规军是多么明智的选择。"
 
 ORA.7.t:0"大会第九天：法院和监狱？"
 ORA.7.d:0"“你们这些激进分子是不是都脑子有点问题？”一名刚刚回归阿根廷的CORA成员怒吼道，“让没有专业法律知识的人来充当审判的法官？这不摆明了是要践踏人民的道德底线？照你们这样做，阿根廷迟早有一天会陷入火海！只有一部公正的法律才能彻底解决这些问题！”\n\n“恕我直言，先生。若非工人的智慧，您根本没机会在这堂而皇之地批判我们，您和您的组织现在还会在乌拉圭苟且偷生，所以——请听我把话说完。”索托自信的站起身，对会场的大家说道，“过去我们相信我们自己，未来我们仍然需要相信我们自己，只有如此行事，胜利才并非触手可及。”\n\n如今阿根廷与以往不同，在这个新世界，她又应怎样审判罪恶？"
 ORA.7.a:0"我们必须相信工人们，不然我们和过去的军政府有什么区别! "
 ORA.7.b:0"汇聚工人智慧的地区工会能做出最公正的审判。"
 ORA.7.c:0"烦人的法律条款总比混乱要好的多。"
 
 ORA.8.t:0"大会第十一天：南美革命？"
 ORA.8.d:0"这里缺失一个文案，我需要一个好的文案"
 ORA.8.a:0"星火燎原！"
 ORA.8.b:0"星火燎原！"
 ORA.8.c:0"星火燎原！"
 
 ORA.9.t:0"大会最后一天：总工会领导人选举"
 ORA.9.d:0"大会的最后一天，天气并不是很好。\n\n阴云笼罩在布宜诺斯艾利斯的上空，西蒙在越狱中被铁皮所划伤的腿在这种潮湿环境之下隐隐作痛。他的双腿不由自主的摆动着，多年狱中的生活给拉多维茨基带来的不止是一条落下了病根的腿，而还有挥之不去的心理阴影。他皱了皱眉头，只得在心里默默宽慰自己“伤痛总会好的，一切都会越来越好的。”\n\n悲伤的情绪在这种场合不宜久留，他也许该改改自己胡思乱想的毛病了，西蒙想到。注意力回到了大会上，现在是乔瓦尼在致辞：“……大会的各项议题都已讨论完毕，阿根廷未来的蓝图也初步构建完成，而现在，我们要来确定下一届的总工会领导….”\n\n台下对乔瓦尼这番话传来了善意的哄笑声，待众代表安静下来，并投票完成之后，主持者开始进行唱票，而最后的结果是……"
 ORA.9.a:0"“哈，恭喜你！安东尼奥！”"
 
 ORA.10.t:0"大会最后一天：总工会领导人选举"
 ORA.10.d:0"大会的最后一天，天气并不是很好。\n\n阴云笼罩在布宜诺斯艾利斯的上空，西蒙在越狱中被铁皮所划伤的腿在这种潮湿环境之下隐隐作痛。他的双腿不由自主的摆动着，多年狱中的生活给拉多维茨基带来的不止是一条落下了病根的腿，而还有挥之不去的心理阴影。他皱了皱眉头，只得在心里默默宽慰自己“伤痛总会好的，一切都会越来越好的。”\n\n悲伤的情绪在这种场合不宜久留，他也许该改改自己胡思乱想的毛病了，西蒙想到。注意力回到了大会上，现在是乔瓦尼在致辞：“……大会的各项议题都已讨论完毕，阿根廷未来的蓝图也初步构建完成，而现在，我们要来确定下一届的总工会领导….”\n\n台下对乔瓦尼这番话传来了善意的哄笑声，待众代表安静下来，并投票完成之后，主持者开始进行唱票，而最后的结果是……"
 ORA.10.a:0"“让我们为桑蒂兰先生献上掌声！”"
 
