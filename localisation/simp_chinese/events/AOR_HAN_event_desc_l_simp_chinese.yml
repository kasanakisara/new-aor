l_simp_chinese:
 HAN.11.t:0 "无海军之海军国"
 HAN.11.d:0 "德意志大崩溃后，原本效忠于法兰克福的提尔皮茨，因为军费分配问题不均拒绝加入法兰克福政府。在威廉港保持独立，红色水兵起义后，革命水兵偷走了许多潜艇，使的威州在表面上与起义者决裂。不过提尔皮茨并不是一个真正的果断的政治家，处于德意志邦联中的他绝对是最好团结的对象之一，虽然看起来他是一个忠诚的帝国派与军国派，可他其实并不在乎被什么意识形态所领导，更在乎的是德意志的海上力量和阳光下的土地。被法兰克福，柏林政府，普鲁士，亦或者是他所敌对的红色势力所强行统一，皆有可能。"
 HAN.11.a:0 "“哲学家不懂经济家的话，经济家不懂军事家的话，而他们谁也不懂政治家的话。”"
 HAN.1.t:0 "一手交钱..."
 HAN.1.d:0 "这个国家暂时被规划为了不可统一势力，我们将会在后续版本更新他的内容。"
 HAN.1.a:0 "收到"