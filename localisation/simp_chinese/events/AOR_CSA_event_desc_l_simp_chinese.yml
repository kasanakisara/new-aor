l_simp_chinese:
CSA.1.t:0 "再一次宣言"
CSA.1.d:0 "在人类历史事件的进程中，当一个民族有必要解除其与另一民族相连结的政治桎梏，并按照自然法则和上帝的意旨在世界列强中取得独立与平等的地位时，对于人类舆论的真诚与尊重，要求他们必须将不得已而独立的原因予以宣布。\n\n我们认为以下真理是不言而喻的：人人生而平等，造物主赋予他们某些不可转让的权利，其中包括生命权、自由权和追求幸福的权利。为了保障这些权利，人们建立起来被管辖者同意的政府。任何形式的政府，一旦破坏这些目标，人民就有权利去改变它或废除它，并建立一个新的政府。新政府所根据的原则及其组织权力的方式，务必使人民认为，唯有这样才最有可能保障他们的安全与幸福。诚然，慎重会使得一个建立已久的政府不因微不足道的和暂时的原因而被改变，过去的一切经验也表明，人类更倾向于忍受尚能忍受的苦难，而不去为了拯救自己而废除他们久已习惯了的政府形式。但是，当滥用职权和巧取豪夺的行为连绵不断、层出不穷，证明政府追求的目标是企图把人民置于专制主义统治之下时，人民就有权利，也有义务推翻这样的政府，并为他们未来的安全建立新的保障。这就是我们这些殖民地的人民一向忍受的苦难，以及现在不得不起来改变原先政治制度的原因。\n\n……\n\n在这些高压政策的每一个阶段，我们都曾以最谦卑的言词请求予以纠正；而每次的吁请所得到的答复都只是屡遭损害。一个统治者，当他的每个行为都已打上暴君的烙印时，是不配做自由人民的统治者。\n\n我们并没有置我们的北方弟兄于不顾。我们时常提醒他们，他们的立法机构企图把不合理的管辖权横加到我们头上；我们曾提醒他们注意，我们移殖来此和在这里定居的情况。我们曾经向他们天生的正义感和侠义精神呼吁，恳请他们念及同种同宗的情谊，抵制那些掠夺行为以免影响我们之间的联系和友谊。但是，他们对这种正义的、血肉之亲的呼吁置若罔闻。因此，我们不得不宣布与他们脱离，并且以对待世界上其他民族一样的态度对待他们：和我们作战，就是敌人；和我们和好，就是朋友。\n\n…-为了拥护此项宣言，我们怀着神明保佑的坚定信心，以我们的生命、我们的财产和我们神圣的荣誉，互相宣誓。"
CSA.1.a:0 "§t万岁!!!§!"

CSA.100.t:0 "联盟国军队攻克华盛顿"
CSA.100.d:0 "自联盟国军队越过波托马克河后，华盛顿地区就迅速放弃了抵抗，联盟国陆军畅通无阻地进入了这个美利坚的心脏地带。\n\n华盛顿地区的大部分建筑得以保存，其中华盛顿纪念碑、国会大厦以及白宫、最高联邦法院等建筑完好如初。联盟国军队在华盛顿纪念碑前升起了属于自己的旗帜。\n\n尽管联邦政府早就设立了战时首都波士顿并迁往此地，但联盟国攻取华盛顿意义重大-自60年前的南北战争以来，这是联盟国所取得的最大一次胜利，但不会是唯一一次。"
CSA.100.a:0 "开战告捷，但仍然需要提高警惕"

CSA.101.t:0 "联盟国军队攻克纽约"
CSA.101.d:0 "随着联盟国的进军，目前，联盟国军队已经控制了纽约州纽约市的绝大部分地区-只有纽约劳动骑士团总部与零星的地方组织顽强抵抗，但他们起不了改变局势的作用。\n\n纽约市作为美利坚最为富裕的城市，既负担着美国对外贸易的核心，又是美国的金融中心，众多大公司总部以及银行、信托机构坐落于此，将近700万人生活在纽约市中心。当下，如何在战事管理这个庞大而复杂的城市，成为了联盟国政府的难题。\n\n但无论如何，我们终于夺取了美国北方最为重要的地区之一，这对于我们是一场伟大的胜利，但我们的使命仍未完成。"
CSA.101.a:0 "去皇后区喝一杯吧！"

CSA.102.t:0 "联盟国军队攻克匹兹堡"
CSA.102.d:0 "内战前线的胜利报告纷至沓来，联盟国已于近日完全控制了宾夕法尼亚的匹兹堡市，并且顺利以军事管理的方式接管了大部分的工业生产设备。\n\n匹兹堡作为美国北方最为重要的工业城市之一，生产包括各类金属加工品以及汽车、大型发动机、船只龙骨在内的众多产品。聚集了包括梅隆家族所拥有的匹兹堡钢铁公司以及由洛克菲勒家族取得的，原卡内基钢铁公司所拥有的巨量钢铁工厂。这座城市曾经是方战争机器的主齿轮，但现在，他终于完好无损的归入我们手中。\n\n同时，联盟国军队正加紧向宾夕法尼亚州的其他工业中心进军。阿伦敦和伯利恒等地的钢铁企业正在加快其产业的转移，但我们相信，他们的铁路没有我们的炮弹快。"
CSA.102.a:0 "我们拥有了和北方叫板的工业实力"

CSA.103.t:0 "联盟国军队进攻克利夫兰"
CSA.103.d:0 "南方人民不断的进军，让我们取得了辉煌的战果。联盟国军队于昨天进入了克里夫兰城郊，并与克利夫兰的守军和各色武装力量展开了激烈的战斗。\n\n克里夫兰的进攻战有可能是战事开端以来最为惨烈的一场战斗。大量后撤的联邦军队在俄亥俄州重组起来，五大湖地区的工业仍然源源不断地为北方运送物资，他们将在俄亥俄州与我们展开一场大决战；同时，劳动骑士团纽约总部与费城总部的武装力量也后撤至此，他们同样拥有数万甚至十万之众，而且他们极其擅长于巷战。\n\n克里夫兰是北方重要的工业城市，也是五大湖城市带的核心之一，这里坐拥着数量难以统计的重化工业，且几乎全部归于洛克菲勒所控制的标准石油以及南方开发公司所有；这里已经被洛克菲勒改造成了他理想中的现代化城市，以至于我们可以称之他为小休斯敦，这两座城市在工业结构以及建设布局上都有相似之处。\n\n联盟国政府已向北方发出通牒，要求北方接受联盟国的无条件投降公告，并开展南北会谈，惩治战犯。到目前为止，北方联邦政府尚无任何回应消息。"
CSA.103.a:0 "一战定乾坤"

CSA.104.t:0 "美国内战白热化"
CSA.104.d:0 "美利坚合众国近一年的战争仍然牵动着世界的目光。自世界大战以后最恐怖的科技文明战争已经造成了无数死伤。\n\n尽管北方在人口以及资源上都占有得天独厚的优势，但北方军队的战斗力以及北方将领的指挥能力，似乎都令我们大跌眼镜。在持续的作战中，南方军队已占领了北方的匹兹堡、克利夫兰以及纽约等大都市，整体将美国北方分成了两大块。这是连李将军时期都未曾达到的巨大军事成就。但南方军队依然没有放松-北方仍然掌控着大量的人口以及五大湖地区的工业中心，北方联邦的总统并未对北方军队的失利举行过任何公开演讲，外界猜测这是为了避免当年林肯总统的覆辙。"
CSA.104.a:0 "§9当年如何打败，今日更加以迎头痛击§!"

CSA.105.t:0 "联盟国军队攻克芝加哥"
CSA.105.d:0 "芝加哥，作为北方五大湖地区规模最为庞大的城市，在今天迎接了联盟国军队的到来。\n\n尽管长途跋涉，尽管一刻不停的战斗，但是我们的军队依旧斗志昂扬，正向着独裁政府最后的心脏决一死战。"
CSA.105.a:0 "伟大无需多言"

CSA.106.t:0 "联盟国军队攻克底特律"
CSA.106.d:0 "底特律一直是一座处于风浪中的城市。既在时代洪流的发展中成为了美国北方规模最为庞大的钢铁生产中心，又遭受了美国社会经济的轮番冲击-美国北方人民反抗独裁政府的第一丝火苗就在这里诞生。而今天，我们将继承他们的精神，继续书写底特律的辉煌。\n\n如今，底特律已经彻底被联盟国军队所掌控，北方的主要工业区都已经被联盟国控制，他们已经回天乏术。对此，联盟国政府一再向北方发出通牒，要求北方接受联盟国的无条件投降公告，并开展南北会谈，惩治战犯。到目前为止，北方联邦政府尚无任何回应消息。\n\n不过，五大湖各地区仍然存在着数量规模庞大的劳动骑士团成员，他们正做着疯狂的反抗，但也或许是最后的反抗。"
CSA.106.a:0 "抽断他们的筋骨，粉碎他们的脊梁！"

