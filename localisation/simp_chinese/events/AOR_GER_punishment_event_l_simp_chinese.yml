l_simp_chinese:

 SAX.13.t:0 "协约国军备制裁"
 SAX.13.d:0 "我国的军队数量已经超越了大战和约所规定的限制，协约国和其他各邦国正在对我们实行多方面的制裁，要求我国裁减军队数量，否则将不会取消对我国的严厉经济政治制裁。"
 SAX.13.a:0 "我们别无选择"
 GER_punishment_tt:0 "§R根据大战合约，只有我们裁军到五万人以下时才会解除限制，与协约国对着干可不是什么好选择。§!"
 GER_punishment_berlin_tt:0 "§R根据大战合约，只有我们裁军到十五万人以下时才会解除限制，与协约国对着干可不是什么好选择。§!"
 SAX.14.t:0 "协约国取消军备制裁"
 SAX.14.d:0 "我国的军队数量已经回归了大战和约所规定的限制，协约国和其他各邦国已结束多方面的制裁。"
 SAX.14.a:0 "值得庆祝"