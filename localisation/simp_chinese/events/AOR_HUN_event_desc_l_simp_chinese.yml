 HUN.1.t:"克罗地亚再征服"
 HUN.1.d:"如果说大匈牙利是一顶完美的皇冠，那么克罗地亚便是它那遭窃的冠顶宝珠。\n从十一世纪开始，匈牙利便仁慈的为克罗地亚提供庇护。从奥斯曼到威尼斯，从奥地利到塞尔维亚，每一条觊觎亚德里亚明珠的毒蛇都被匈牙利拒之门外。不仅如此，匈牙利还慷慨的赋予克罗地亚以建国和自治，哪怕在世界大战最危难的关头，匈牙利也从未放弃她天赋的海洋权力。\n但仁慈和慷慨，换来的只有背叛。腐朽的奥匈崩溃下的混乱里，自称“三一”的民族败类劫持了匈牙利的克罗地亚，躲在多瑙同盟的泡影里，做着统合斯拉沃尼亚、达尔马提亚的美梦。为了暂避世界大战的蹂躏，匈牙利苦涩的暂别宝蓝色的亚德里亚海滨。\n机会总是稍纵即逝，多瑙河防御同盟，这奥匈最后一抹残影被轻飘飘的钞票压垮，巴尔干的权力真空必要换人填补。趁着多瑙河还沉睡在和平的美梦里，趁着还没人嗅到半岛再燃的硝烟，趁着三一共和国还未捡起抵抗的勇气，让大匈牙利再次完整！"
 HUN.1.a:"从喀尔巴阡到里耶卡！"

 HUN.2.t:"旧日遗产"
 HUN.2.d:"世界大战后的一纸和约将我们同往日巴尔干的故土分隔开来。\n自匈牙利王国以来，克罗地亚一直都处于匈牙利王冠的统治之下。我们不想，也不能，更不会放弃国王的遗产。\n现在机会已经到来，匈牙利已经从大战的废墟中重新崛起，成为欧洲一股不可忽视的力量。\n而相对的，目前的克罗地亚共和国软弱无力。混乱且意欲干政的军队、勾心斗角的议会和腐败不堪的官僚系统…这一切迹象都表明，是时候收回属于我们自己的财产了。"
 HUN.2.a:"向亚得里亚海进发！"

 HUN.3.t:"重建伊利里亚信任"
 HUN.3.d:"\n奥匈帝国的崩溃为我们留下了一个深刻到残酷的教训：民族团结，帝国生死。对于现如今的大匈牙利，若不想在收复克罗地亚甚至更广大的故土时举步维艰，还需端平民族这碗水。于是，顺理成章的，马扎尔-斯拉夫联邦的光辉构想应运而生。\n早在奥匈帝国时期，为医治联合帝国病入膏肓的民族矛盾，将伊利里亚地区甚至更广大的斯拉夫族升格为帝国的第三元的药方早已开出。腐朽的奥匈帝国难以根治深入骨髓的顽疾，在世界大战中轰然倒下，赢得完全自由的大匈牙利继承了联合帝国所有的病症，但同时也可妙用同款药方。\n巧妙的是，马扎尔-斯拉夫联邦构建的时机近在眼前。深陷债务危机的奥地利抛下早已千疮百孔的多瑙同盟逃之夭夭，巴尔干火药桶的引线滋滋作响。大匈牙利的克罗地亚故土，虚弱而无人保护的三一共和国想必如离群羊羔般惶恐不堪，胆颤心惊。仅需我们允诺保护和自治，辅以适当的压力和紧迫，大匈牙利便可兵不血刃的开疆拓土，同时缓解国内的民族顽疾，用“伊利里亚”一词的信任一石二鸟，岂不美哉？\n克罗地亚的收复势在必得，但不必让这份光荣浸透血色。"
 AOR_news.229.a:"联邦是妥协的艺术"

 HUN.7.t:"衰老雄狮"
 HUN.7.d:"先前的惨烈战争曾让国家满身伤痕，经济萧条。但经过长久的休养，匈牙利已经重新站起，作为一个年轻且前景光明的民族国家而存在。\n然而，目前的情况对现任政府并不乐观。\n从议会中攻讦不断的政党，到街面上带领罢工要求结束过渡时期并举行大选的工会，都想要自己上位，以自己的方式统治匈牙利。\n更糟的是，稳定局势的监国帝萨的身体随年龄增长每况愈下，他知道自己过去为匈牙利奋斗的年轻岁月已经离他而去，应当把位置让给年轻人，而正在认真考虑退休。\n一切迹象都表明是时候进行国民大选了。\n我们应从现在到大选结束期间谨慎行动，毕竟现任政府的任何丑闻都会影响到大选结果。"
 HUN.7.a:"开始印选票吧"
 
 AOR_news.229.t:"马扎尔-斯拉夫联邦成立"
 AOR_news.229.d:"看来多瑙河防御同盟的崩溃激起的浪潮导向了一个怪异却合理的结果：匈牙利政府方面在多番造势宣传下宣布易名为“马扎尔-斯拉夫联邦”，同时邀请而原克罗地亚地区的三一共和国加入联邦。三一共和国方面积极响应联邦主张，两个前国家的残余在新联邦里如冰遇烈阳般迅速消融。\n匈牙利因其领土内部错综复杂的民族构成而与数个邻国存在激烈矛盾，马扎尔族虽为主体民族，但少数民族占比仍居高不下。曾经面临同样问题的奥匈帝国便存在将以斯拉夫为主导的伊利里亚升格为第三元的解决方案，现如今匈牙利政府重拾了这一理想，巧妙的解决矛盾，同时开疆拓土，收复趁机独立的原匈牙利属克罗地亚地区。\n但是在国际上，新生的马扎尔-斯拉夫联邦却没有得到多少祝福。南斯拉夫政府提出严正抗议，斥责所谓联邦不过是换副面具的匈牙利霸权扩张，并号召原三一共和国境内抵抗占领，各巴尔干国家也只对此发出不咸不淡的问候。\n国际观察家对联邦是否真正如其宣传的一般平等也持保留态度，有人指出原匈牙利地区和马扎尔民族的体量在联邦中占绝对优势，这是否是“多数人的压迫”还有待关注。"
 AOR_news.229.a:"伟大的成就！"
 AOR_news.229.b:"换汤不换药的扩张？"



 
