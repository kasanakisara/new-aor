l_simp_chinese:

LIT.1.t:0 "我战区前线地带爆发大规模骚乱！"
LIT.1.d:0 "由于我战区各种不可预测的紧急情况，因而推迟了原本于近日举行的全民公投选举。不过这一举动却引发了战区民众的大规模抗议；甚至，战区的本土军也爆发了要求进行公投的哗变。"
LIT.1.a:0 "都是在火上浇油！"

LIT.2.t:0 "波兰政府索要布列斯特与比亚韦斯托克。"
LIT.2.d:0 "波兰政府向战区委员会递交了一份书面请求，由于布列斯特与比亚韦斯托克的单方面公投运动已经结束，民众大部分支持加入波兰，波兰政府要求战区委员会履行“战区公告”中的承诺，允许允许公投入波的地区加入波兰。\n\n不过，我们的军官团表示，这只不过是波兰人的趁火打劫，并且对我们构建东欧反布尔什维克阵线没有半点好处。"
LIT.2.a:0 "我们要为自由阵营做出榜样！"
LIT.2.b:0 "对波兰的请求不予采理"

LIT.3.t:0 "战区进行改组的拟定"
LIT.3.d:0 "由于现有情况已不可控制，协约国理事会指导战区及时进行公投并进行政府改组，并利用战区与协约国的军事资源，将未来新生的东欧政权改造成反布尔什维克的坚强堡垒。不过，实际掌握主导权的仍然是战区委员会，那么我们该如何决定东欧平原的命运？"
LIT.3.a:0 "进行真正的全民公投"
LIT.3.b:0 "战区改组为联合政府，并扶植一个东欧德意志人统治的独立国家"
LIT.3.c:0 "最好什么都不要改！"
LIT.3.d:0 "我要革命！"

LIT.4.t:0 "波罗的资产阶级革命"
LIT.4.d:0 "全部造反了！"
LIT.4.a:0 "全部造反了！"

LIT.6.t:0 "立陶宛红色革命"
LIT.6.d:0 "立陶宛红色革命！"
LIT.6.a:0 "好！"

LIT.7.t:0 "东斯拉夫苏维埃成立"
LIT.7.d:0 "东斯拉夫苏维埃成立！"
LIT.7.a:0 "好！"
