EGY.10.t:0 "鲜红的街道"
EGY.10.d:0 "艾哈穆德睁开眼，在被如熊熊烈火般的愤怒笼罩的开罗城里睁开眼，在炎热的风随着细密沙尘吹入房间内时睁开眼。清瘦的阿拉伯青年神经质的翻出破席子下仅有的几个皮阿斯特计算明天。\n爱德华睁开眼，在尖锐到刺透耳膜的集合哨里睁开眼，在清晨的第一束光晕还阴翳在栅栏的铁锈下时睁开眼。疲惫的英国士兵条件反射的从床上蹦起来，把自己的躯体胡乱塞进靴子和腰带里。\n艾哈穆德的怒火烧的比太阳下的黄沙更烫，好像要把今生所有的诅咒倾泻给所谓带来和平与安定的英国佬。尊严早就像一尊在殖民的重锤下的瓷器般粉碎，但低三下四却只换来对福阿德的无情背叛。\n爱德华漠然的站在队列里，这具被命令驱动的发条人偶不对任何发号施令之外的动静感到好奇。一辆披着沙色和不规律的红色斑块外衣的装甲车安静的趴在爱德华面前，等着今天的士兵完成他的紧急任务。\n哈桑激昂慷慨的迈步在整个游行队伍的中间，挥舞的华夫脱党旗宛如绿色的潮水。\n爱德华麻木的端坐在劳斯莱斯装甲车敞开的机枪座上，游行的呐喊激起的震荡就在下个拐角。\n哈桑浅棕色的眸子和爱德华淡蓝色的眸子穿过街区遥遥相对。\n刹那间，万物归于黑白，这个世界仿佛只剩下他们两个彩色的人。\n机枪喷吐的火舌舔舐着这个荒诞的世界，爱德华眼神失焦，茫然的面朝鲜红的街道，重机枪的咆哮撕裂人体和惨叫的动静让他联想到大战的情景，鲜红的街道也像是魔鬼的乐园。但士兵麻木而抽离的意识好像不再是自己，而是什么别的东西平静地俯瞰着这一切。\n爱德华从装甲车侧面探出头，再次对上了哈桑浅棕色的眸子。\n爱德华猛然间痛哭流涕的捶打着可憎的的自己。"
EGY.10.a:0 "但深红的街道不会做出回应"

EGY.16.t:0 "敲门声"
EGY.16.d:0 "\n“咚咚咚”\n哈萨尼家的门口传来一阵不急不缓的敲门声。敲门者似是一位有教养的绅士，或是哈萨尼知根知底的老友，不然这阵敲门声不会让人感到如此有礼有节，规律的敲门声生动地诠释了这次敲门是家主提醒有人来访，而不是对家主的催促，让人情不自禁的想开门迎接客人。\n如果这阵敲门声不是在凌晨两点响起的话。\n等了大概半分钟，“咚咚咚”，同样的敲门声再次不急不缓的响起，好像敲在在门后全身紧绷的哈萨尼的心头。\n自知逃不过这一劫，哈萨尼扭动门把，把刺耳的吱呀声和贯穿骨髓的寒风一并放进屋里。门口立着个中等身材的男人，他身上的宽大的黑色风衣让他和夜晚的阴影一样不起眼。\n“跟我走一趟吧，侯赛因先生。”\n和屋外划过夜空的寒风一样冷酷的嗓音透了过来，“不要吵醒你的家人和邻居们，别把事情做的太难看。”\n“可是……不对……我，我，我不是侯赛因……”,哈萨尼的牙齿不知是因为寒冷还是恐惧而打颤，让他讲出来的话好像一个蹩脚的玩笑，“别耽误时间！”矮小的男人恼怒的亮出风衣里衬，黑色的手枪外壳在摇曳的路灯光照下像毒蛇吐出的信子。哈萨尼整个人开始打起摆子。\n“不……不对，门牌号！门牌号！”哈萨尼猛然抓住了自证的手段，手痉挛一样的指向门口。那黑衣男人若有所思，“忘掉今晚发生的一切。”，一边有力而无声的塞上了门。\n那人离开后，哈萨尼无力地靠在墙上。随后他听见他的邻居门口同样传来这催命的敲门声。几句在夜幕下压抑着火药味的谈话后，夜幕彻底笼罩街区，一口吞掉了侯赛因和黑衣男人。\n直到天明，一夜未眠的哈萨尼才听见隔壁妻女凄苦的哭声，“咚咚咚咚咚”焦急的敲门声再次打破哈萨尼家房门的死寂。\n“请问您看见我的丈夫侯赛因了吗？”哈萨尼瞪着深厚的黑眼圈，竭力让声音不发出颤抖，木讷着脸，迟缓的对眼前痛苦的女人挤出回答："
EGY.16.a:0 "“我昨夜睡得很早…”"

EGY.18.t:0 "书信（其一）"
EGY.18.d:0 "至弟：\n近来可好？近来因职位变动至埃及，旧之地址现不可用，请将信件送至新地址。（随信所附）\n此次职务调动，调往异国，所见所闻，颇多有趣之处，如埃及之民众，与吾国内称回回之民族颇有相似之处，可因当地动荡，需解决之事务较多，无法一一叙述，颇为遗憾。"
EGY.18.a:0 "随信所附15先令，以补贴家用。"
EGY.19.t:0 "我是贝利亚"
EGY.19.d:0 "现在我赋予你可以向法国制造好感的权力"
EGY.19.a:0 "谢谢你泰罗"






























































































































































































































































































































































































































































































