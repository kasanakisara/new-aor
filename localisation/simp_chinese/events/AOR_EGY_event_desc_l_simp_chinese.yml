EGY.6.t:0 "埃及(尚未完成)"
EGY.6.d:0 "(策划正在书写埃及策划案)\n(策划抬头，发现了你)\n“喂喂喂!埃及还没策划好啦!我还在写策划案呢!\n你探头干什么，不会给你看的!Ծ‸Ծ”\n(策划盖住了策划案)\n“快回到国家选择界面去!下。。。下。。。下一次更新，这个国家就可以游玩了。走吧走吧”"
EGY.6.a:0 "好吧好吧"
EGY.7.t:0 "方向"
EGY.7.d:0 "穆罕默德·法鲁克·扎赫拉很喜欢这只鹰。\n“瞧瞧它，真是只俊鸟！”\n确如富商先生所言，只要是识货的上流人士，看看这只猎隼宽阔而强健的翅膀上整齐排列的抖擞飞羽，再瞅瞅它鱼钩似的利爪和军刀般的鸟喙，便立刻可知这是如何的一只好猎鹰胚子。\n“你细看，熬了它五天六夜，这眼神还是闪亮的和尼罗河的波光一样……” \n扎赫拉兴致大好，喋喋不休的和恭恭敬敬立在一边的训鹰助手炫耀。大富商正要亲自上手，调教猎鹰，可远处一浪高过一浪的抗议声却让富商大人抓取鲜肉的动作恼怒的一滞。\n“去把窗户再关的严一点！” 扎赫拉训斥着仆人，“这帮暴民都已经嚣张到游行来这儿了？他们怎么敢？！”富商先生强压怒火，接着抽出一片血淋淋的鲜肉拿在皮革手套上，引导鹰恢复飞行的本能。但是鹰，饥饿的鹰，困乏的鹰，像一截枯木头一样站在架子上，只有鹰滚烫的眼神灼伤了富商的自尊。\n而窗外的游行声也愈发浩大，千百个嗓音齐声高喊，“埃及人的埃及！”，“释放扎格鲁尔帕夏！”千百个脚步踏向前方，他们的力量无可阻挡。\n富商的耐心一点一滴的耗尽，眼前这只倔鹰如同拒绝再次拥抱飞翔。单薄的窗户根本抵御不了队伍的呼号，一声高过一声的呐喊撕碎了静谧的街道。眼前的鹰轻蔑的眼神逐渐和窗外的贱民重叠……\n“砰砰砰”，数声枪响，紧接着的是人群慌乱的退散和哀嚎声！“让他们下火狱吧！”富商这样想着，带着恨意踱步到窗前。\n恨意未消，穆罕默德·法鲁克·扎赫拉猛地推开窗子，刚要将诅咒之语喷出口腔，却被一枚利剑般的隼鹰撞开到了惊愕又羞恼的一旁。\n那只漂亮的猎鹰在人群头顶盘旋，好像思考着飞行的方向。但不出几秒，鹰猛地拍打了骄傲的翅膀，飞向游行队伍离去的方向。"\n
EGY.7.a:0 "向着自由的方向"
