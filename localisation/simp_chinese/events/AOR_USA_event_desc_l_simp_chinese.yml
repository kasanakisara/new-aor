l_simp_chinese:

 USA.99.t:0"南北发生5月冲突"
 USA.99.d:0 "自5月以来，我联邦政府陆军驻扎在南方德克萨斯州、堪萨斯州、俄克拉荷马州的部队，与当地民众以及国民警卫队发生了不同烈度的冲突，而冲突似乎有再升级的迹象。\n\n冲突的起源目前尚未查明，我联邦政府人员怀疑，这次冲突是南方各州政府针对联邦政府的举措，而利用南方人民运行的阴谋计划。\n\n未等事件查明，南方国会两院委员会已经在华盛顿发表声明，宣布南方各州代表全员申请驱离驻扎在南方三州的美国联邦陆军，而南方委员会已经同意了该项决议，并即将将此决定提交至国会讨论。\n\n不过根据白宫方面的批示，美国陆军参谋部已经下令，将驻扎三州的所有联邦军队撤回北方；联邦陆军将会尽量携带所有物资撤离，而军事基地则暂且交由南方州国民警卫队保管。"
 USA.99.a:0"他们想干什么？"

 USA.100.t:0"第二次南北战争？"
 USA.100.d:0 "1921年6月12日，疑似两伙来路不明的美国士兵在南北州分别挑起了武装冲突，南北方的武装力量分别予以还击。事后，南北方在第一时间均宣布为对方所为，并在不经过双方协商的情况下，开动前线军队向对方地区进军。\n\n今天是1921年6月18日，双方军队已经在边界上开始交火；目前前线的总体局势尚不明确，但已经不复存在的非军事线两侧，有不计其数的美国平民正在逃亡。"
 USA.100.a:0"§3是谁先打开了潘多拉的魔盒……§!"
 USA.100.b:0"§t时机或许到了……§!"

 USA.9.t:0 "西部通讯全断"
 USA.9.d:0 "（目光落到第一行字）尊敬的总统阁下，未能在战争爆发的伊始及时通知您-在过去的7天，西部各州的通讯已逐渐中断。据西部边境的消息，西部各州似乎陷入了较大的骚乱之中，而目前各州政府暂停没有与我们重新建立联系。我在以下……\n\n目前西部各州总汇：\n\n加利福尼亚州（包括内华达地区）：§R暂无通讯§!\n\n华盛顿州：§R暂无通讯§!\n\n科罗拉多州：§R暂无通讯§!\n\n堪萨斯州：§R暂无通讯§!\n\n内布拉斯州：§R暂无通讯§!\n\n俄勒冈州：§R暂无通讯§!\n\n爱荷达州：§R暂无通讯§!\n\n达科他州：§R暂无通讯§!\n\n蒙大拿州：§R暂无通讯§!\n\n犹他州：§R暂无通讯§!\n\n怀俄明州：§R暂无通讯§!\n\n以上各州的目前通讯状况到此结束汇报。"
 USA.9.a:0"妈的，你他妈……又来？"

 USA.10.t:0"西部动乱加剧"
 USA.10.d:0"内战爆发半个月后，内战双方与西部各州的官方联系便骤然下降，民间的通讯也遭到了莫名其妙的中断，南北各方的社会舆论已经开始传言：西部由于陷入了南北混战的无政府状态，其秩序已经开始崩溃。\n\n1921年7月1日后，西部与东部的边界上开始出现了史无前例的逃亡队伍-其逃亡规模甚至要比上世纪90年代的西部大动乱还要再大上几倍。据西部公民的消息，现在的西部已经彻底陷入了多方势力的混战，并且除了达科他州和堪萨斯州政府幸存下来，并分别打着美国政府的旗帜（存疑，且不知支持南北哪方）维护秩序之外，其他已知的西部武装组织都在各自为战，并且相互攻伐-西部特遣军也在其中。\n\n内战爆发后，原本有大量的中西部美国公民逃往南北洲与西部州的交界处避难，但只过了一个月就随着狂奔而来的西部公民反向故乡逃亡-其中不少人遍体鳞伤，可想而知西部究竟发生了什么骇人听闻的事情。"
 USA.10.a:0"上帝保佑，别让美国再出乱子了！……"
 USA.10.b:0"§3YES SIR!§!"
 USA.10.c:0"摆脱奴役，为了§O自由之西部！§!"
 USA.10.e:0"小伙子，上马来，为了§P我们的土地§!而战！"

 USA.101.t:0 "联邦军队攻克亚特兰大"
 USA.101.d:0 "经过再三确认，本报于此刻公布本报社所取得的独家新闻。合众国战争部许可并发表的前线特别报道-联邦军队已于昨日下午攻克佐治亚州首府亚特兰大。\n\n昨日下午，联邦陆军经过激烈的巷战，已经完全清扫了亚特兰大城内的南方叛军残余，现在的南方军队正朝着东海岸以及路易斯安那州拼命逃窜。虽然佐治亚州尚未完全解放，但是南方统治区中东部的主要军事力量已经彻底瓦解。\n\n联邦军队彻底解放亚特兰大，而联邦政府也将会正式向南方发出通牒，要求南方无条件投降，并进行战后的南北谈判，审判战犯。\n\n目前南方政府尚未作出任何回应。"
 USA.101.a:0 "南方的掌上明珠坠落了"

 USA.102.t:0 "联邦军队攻克新奥尔良"
 USA.102.d:0 "今日凌晨，经过联邦海陆两军的联合夹击，新奥尔良主城区以及其附属县镇已经完全被联邦军队所掌控。\n\n新奥尔良是南方叛军政权的所谓“临时首都”，但南方叛军政权的总统加纳以及其政府主要人员，早已逃离并且停止发布对外消息，目前南方的主要行政、军事人员都下落不明。\n\n下一步，联邦军队将继续向南方进军，并最终实现美国南方的完全解放。同时，联邦政府将继续对南方发出通牒，要求其接受无条件投降。"
 USA.102.a:0 "我们可以吃到更便宜的克氏原鳌虾了！"

 USA.103.t:0 "美国内战白热化"
 USA.103.d:0 "美利坚合众国两年的战争仍然牵动着世界的目光。自世界大战以后最恐怖的文明战争已经造成了无数死伤。\n\n但如今的南方再也无法创造他们祖辈在1863年的奇迹了。联邦军队已攻克攻陷了亚特兰大、新奥尔良等多座南方主要城市。联邦军队完成了当年格兰特与舍曼的遗愿-用强有力的战斗将南方分成两大部分，并最终以包围态势进行全面进攻。\n\n而在外界的推测中，如今的南方军队仍有一线反击之力，南方仍然掌控着东南部的各州县。今天，南方叛军政权总统加纳公开宣称南方军队将会重新发起新一轮的大规模反攻，但具体何时并无说明。"
 USA.103.a:0 "§9战争持续不了多久§!"

 USA.104.t:0 "向维克斯堡进军！"
 USA.104.d:0 "向维克斯堡进军！"
 USA.104.a:0 "§9向维克斯堡进军！§!"

 USA.10001.t:0 "必要"
 USA.10001.d:0 "威尔逊总统从暗红的桌面上拾起这份雪白的总统令，有那么一瞬间，他感觉自己是从尸山血海中拾起一具森然白骨。尽管他已经通读过这份文件不下数遍，但真正落笔生效它之前，多读一遍总不是坏事。“作为美利坚合众国时任第二十七届总统，我谨代表政府下达以下紧急命令……”威尔逊自嘲一笑，在美国这片荒谬的土地上，他又有多大的权力能代表政府呢？政府又有多大权力能代表公民呢？似乎他作为总统的唯一权利，就是可以调动军队去镇压美国人。\n\n“……鉴于目前以底特律为中心的五大湖地区暴动形势已经上升至公开叛乱的地步，我们绝不能允许这种公开分裂国家的恐怖主义暴乱继续在国内蔓延……”呵，回望自南北战争以来的耻辱，这分裂的，毫无荣耀的，不合的众国，又有什么资格来义正言辞的怒斥所谓分裂国家的行为呢？“……我颁布以下命令：美国各州进入紧急状态：威斯康星州、伊利诺伊州、印第安纳州……实行从命令发布24小时后至紧急状态结束以前的无限期宵禁，联邦陆军以及各州州警将维持各州秩序……必要时可使用致命武力……我在此呼吁劳动骑士团积极响应联邦政府的号召，对暴动地区采取必要措施。”威尔逊扪心自问：真的毫无回旋余地了吗？手足相残的惨剧又要在新大陆上重演了吗？他全力弥合的南北分裂，他千辛万苦让托拉斯和南方人施舍的手里的些许权力，他展望的未来愿景又会走向何方？所有的问题都没有答案，威尔逊落下笔尖，刷刷的签下自己的名字，向天主和救父祈祷，祈祷着这必要之恶，亦或饮鸠止渴能让美国社会顺利航向下一年的光阴。"
 USA.10001.a:0 "……代价几何？"

 USA.10002.t:0 "坏牛仔"
 USA.10002.d:0 "好天气，华盛顿哥伦比亚特区万里无云，太阳直照白宫大地。透过窗户，阳光将自己打在了几张苍白的纸上，同时也打在了威尔逊愈发苍白的脸上。\n\n“西部诸州匪徒活动愈发猖獗”，“夏延市遭到匪徒攻击”，“蒙大拿铁路瘫痪”……一连串的文件，让威尔逊第一次感到自己在这总统的位置上完完全全的累了。一波未平，一波又起。虽然他早就有所预料西部的叛贼们会闻风而动，趁着联邦军队专注于五大湖事件而发动破坏；可没想到这次的行动来的是如此猛烈，西部十一州几乎都同时向白宫发送了紧电。西部铁路系统大半瘫痪，部分城市的电报线与电话线甚至完全切断。整个西部仿佛又陷入到了20年前的那场危机之中。\n\n“20年前……那时我只是个学者。”在片刻中，威尔逊又开始怀念起自己的年轻时光，曾经写给政府关于西部百姓的同情信，应该为自己拉了不少选票吧……当威尔逊站在这个高度上后，他才发现，所谓的人情，就是当他也融入其中时，之前的一切都可以弃之不用，这人情将自己锁死在了白宫之中。承诺可以在自己的良心中排空，只要自己还是总统，那就必然要为一些小人们服务，甚至于卑躬屈膝。\n\n为所有美国公民负责，只是宪法中的事；我承诺的西部政治改革做到了吗？并没有，经济改革做到了吗？也没有。但威尔逊明白一个道理：我现在还是美国总统。现在的他必须将自己的杂乱思维集中起来，去应对并处理美利坚国内的动乱状况。\n\n在短暂的思索后，他立刻吩咐国务卿起草并签署了一份《西部临时紧急状态法》，力求在最短的时间内解决西部问题。把目光抛去遥远的西部，威尔逊心中只有两个王牌-潘兴将军的西部特遣军与西部最大的雇佣兵公司“西部联合力量”。威尔逊将稳定西部的希望寄托给了他们。对于后者这些听话拿钱的亡命徒，威尔逊实则感到厌恶。而对于直接由美国陆军改编而来的特遣军，威尔逊仍然感到了一种深深的不放心，这是他在政治场合这么多年培养出来的一点敏感心理。他转过头来，背对阳光，然后俯首桌案。\n\n“把电话给我，接旧金山，特遣军司令部”"
 USA.10002.a:0 "“什么？电话线断了……”"

 USA.10003.t:0 "飞翔的雄鹰"
 USA.10003.d:0 "火车穿越广袤的大平原与层峦叠嶂的落基山脉，带着旅客们来到了遥远的西海岸-圣弗朗西斯科。除了需要提防路线上的土匪以外，这本就是西部再正常不过的事情。但在二十年前，乘坐一列列没有防护的火车到达西部，对于特遣军的老兵们来说，是记忆中不可磨灭的生死之交。\n\n旧金山梅森堡之中，西部特遣军的总部所在地。当总部的人员正慌慌张张的整理资料并向治安部队发布准备命令时，一位指挥官却站在梅森堡堡垒的天台上，慢慢悠悠的抽着烟卷，望着远方如波浪般的丛林思索。他的参谋或许实在按耐不住了，便一下子从椅子上起来，对着他说：“将军，第三、第五特遣师、和第四特遣骑兵师已经准备就绪，骑兵四师已经和大批来路不明的土匪团伙交火，现在所有军队都在等着总部进攻的命令，我们什么时候准备传达？”将军摆摆手：“只需要传达骑兵师坚决消灭土匪的命令就行了，其他三个特遣师按兵不动。”\n\n他转过头来对着参谋，面带一丝微笑。\n\n“你跟了我这么久，还不知道我想要干什么？白宫的那位先生巴不得我立刻出击去消灭这些土匪，好趁机打压我们特遣军，他在之前不就借口过铁路系统故障，然后拖延了半年的装备补给，然后最后就送了一千条枪吗？不过就是些土匪叛军，一个骑兵师足矣，况且第四骑兵师是打击他们的老手，用不着这么大的阵仗。况且他们有坦克……。”潘兴滔滔不绝地阐述自己的想法，而在参谋看来，这种聊天方式似乎与拉家常无异。\n\n“唉，正好，来试试这些法国人的坦克到底好不好用，看看他们在沙漠和山地中有几成作战能力。还有，你待会儿陪我去取文件，是关于特遣军参谋部改革的事儿的。”将军转过头来，走到防护墙边继续点了一根烟，但又不知想到了什么，把烟往下一扔一踩，就急匆匆的下楼去了，巴顿尾随其后。"
 USA.10003.a:0 "雄鹰悠闲漫步，寻找着下一个猎物"

 USA.10004.t:0 "飞翔的雄鹰"
 USA.10004.d:0 "旧金山湾区在此时已经到了她最美丽的时节-阳光明媚，水天一色，碧浪涌向陆地，为炎热带来凉意爽气。可如今的人们并没有躺在沙滩上晒太阳的心情，随着西部新一轮动乱的不断蔓延，旧金山的大街上已经充斥着大量从东边的山区逃来的难民，就连现如今价格不菲的旅馆也因为住客数量过多而选择建造“帐篷套房”供人居住，这些简易的帐篷甚至从鲍威尔大街一直蔓延到市场街。\n\n在解决完一系列事件后，包括与旧金山市政府和劳动骑士团的沟通。潘兴长长的舒了一口气，但又感到不放心，于是侧过身子来问正在记着笔记的巴顿。“现在加利福尼亚州的电报和电话处理的怎么样了，哪里还有可以联络的地方？”\n\n“加利福尼亚的主要城市，包括旧金山、萨拉克门托、圣何塞、奥克兰、斯托克顿的与山脉以东相连的电话线，基本上全部因为土匪袭扰而中断了。直接受土匪影响的大概有70%，剩下的30%就是我们和其他市政府和那些个公司领会过的，但市政府仍然留了自己的电话线。至于电报线，仍然有相当一部分可以正常运行，但是许多小城市的通讯已经处于瘫痪状态了”。\n\n“很好，但应该再派人和这些市政府商谈，要求他们也要把自己的电话线给掐断，只能留下电报线。除了加州以外的其他州政府也可以商量，但不要过于刺激他们。”\n\n潘兴背靠在椅子上，定制的镀金肩章在窗外阳光的照射下闪闪发光；会议室的大桌子上摆满了烟灰缸，里头既放着烟，又被潘兴当做了他的沙盘推演工具，下面纷纷用各种城市的名字命名。他用手拿起了其中的一个“丹佛”，把他推到了巴顿的面前。“看看，我们的特遣骑兵师现在已经掌控了整条太平洋铁路，不过中部的这些蠢蛋居然没有察觉到我们有什么动作；如果东部的动乱再次加剧，那我们将直接派兵沿太平洋铁路东进，接管科罗拉多州与怀俄明州，到时候和威尔逊有更多的筹码，能为我们争取到更多的物资。”\n\n潘兴又露出了他那奇怪的，显得幽默严肃、矛盾并存的微笑。“现在白宫那边应该已经察觉到我们在这边的动作了，那么我们现在就要加快动作，尽快将这些受干扰的铁路线全部占领。”"
 USA.10004.a:0 "“明白，长官”"

 USA.10005.t:0 "人数"
 USA.10005.d:0 "夕阳无力的将最后一缕昏黄的光芒斜斜的投向小镇，勉强为这间因深处街角阴影的酒吧提供有些许光明的招牌。下班的工人三三两两的围坐，时不时痛饮一口兑水的威士忌以麻痹过度劳累的神经，似乎没人在乎政府的戒严令。如今经济下行，通用电气把电价抬高后，整个酒馆只开了两盏小黄灯。吧台上放着的那些已经发皱的报纸，上面的标题都是类似于“底特律暴乱已被平定”“注意身边可疑人员”这样毫无营养的通报。却让酒吧一改往日的喧嚣，吸引所有人的注意力。\n\n“烂牌，不打了。”见大家都没心思打牌，稍微年长些的领班随手将纸牌扔回桌上，“这群天杀的老财走狗，这回又他妈的杀了多少小伙？千百个，万把个，啊哼？”一旁疲惫的工人接上话：“没那么夸张，那可是几百条人命啊，屠宰场一天能处理的……指不定有些倒霉蛋今天晚上就能吃上。”\n\n另一个工人打断他的同伴：“别说，这次的动静大的可是咱们没法想的，听我舅舅说，他在被疏散出城前看见了全副武装的陆军车队，车上还有新弹孔!这说明城里头还有人在抵抗，还有，城市里还有骑士团的死人堆，那个景象……”整个酒吧的讨论顿时沸腾起来，猜测的数字从虚张声势的几十到耸人听闻的上千浮动不止，有人不以为意，有人义愤填膺，有人惶恐不安，但唯独不见那几位平常最踊跃号召大家团结斗争的闹事者……酒保若无其事地听着，不一会儿便让弹琴者演奏的力度再大些，小酒馆欢快的琴声逐渐淹没了酒馆的喧嚣，响彻黄昏中的大街。\n\n酒吧的大门发出刺耳的呻吟声，一位工人模样的人吊着简单处理的左臂闪身进来，迅速带上门。“来杯杰克丹尼，要纯的。”望着有些呆住的酒保，“顺便把旧账结了，我的……还有吉米和弗兰克的。”酒保跟往常一样为他斟满最纯的威士忌，抬头问道：“他们……怎么叫你还钱？”成员一仰脖饮尽杯中苦酒，“死了，还能怎么样!”痛苦，悲愤，一切说的出，说不出的情感迸发在他的唇齿间，听起来，那么无力。"
 USA.10005.a:0 "夕阳洒落他来时的路，浸满血色"

 USA.10006.t:0 "南方一只仙人掌"
 USA.10006.d:0 "德克萨斯州的州长办公室，设计的既简洁又古典，桌子上趴着个人，面部观察年纪不算太大，但又满头白发，眼圈深陷。终于在太阳晒屁股的时候，他缓慢苏醒起来，并呼叫着自己的助理为一天的办公给予早餐的补充。还好加纳算是勤劳的政府人员-他的勤劳甚至在迪克西党内部都是出了名的，因此他并不必烦恼如此一个既庞大又富饶的州给予它的大量文件。他得以在极度匮乏之时睡一个别人不敢睡的懒觉。\n\n他翻开早晨的报纸， 哎，又是一些北方无聊的反贼新闻。他将报纸放在一边，在脑海中幻想着威尔逊率领部队将底特律的工人们全部枪毙的情景；这位看起来文文弱弱的学者总统居然也有这么野性的一面，从现在起的仙人掌杰克对他倒是有些敬佩。不过随着时局发展，西部又开始渐渐动乱起来，现在就连西部的南方州都难保自身了，这位总统又有什么办法可以解决？“呵，美利坚合众国的总统就是这么对待自己的公民的，和当年林肯一个模样……”加纳不由的感慨当代的时局，随着南北矛盾的愈发凸显，作为迪克西中坚力量的他不得不将精力放在了与杨基党的斗争事务中，并渐渐忽视了德克萨斯州发生的翻天覆地的变化-直到最近几周他才知道德克萨斯州已经成为全美第三大州的事，且远远超过南方任何一州。不过说这些无聊的并没有什么用处，他现在要做的，就是趁着白宫如此混乱的局势，再让南方的小伙子们狠狠的添上一把火。\n\n“没错，新闻记者、电报、报纸甚至是收音机，都要有北方的新闻，让南方的人民们明白，北方就是一滩烂泥的怪兽……”"
 USA.10006.a:0 "“可是南方又何尝不是？”"

 USA.10007.t:0 "诚意"
 USA.10007.d:0 "1920年的春天，太平洋铁路中央线尤如科罗拉多河解冻一般开始慢慢恢复自己的生气-尽管这条线路经常被西部人戏称为“大科罗拉多河”。\n\n第一个迎接春天的并不是绿意盎然的山地植物或者从南方回到家乡的鸟儿，西部人所见，一节节装满着枪械弹药的火车车皮正飞速驶向圣弗朗西斯科，火车的车厢都得到了加固，顶部的机枪孔无时无刻向车厢之外的一切事物展示出自己的火药味。随行的军官们一边在舒适的卧铺客车抽烟，一边又用那自以为敏锐的眼光看着车窗外，提防着未曾清剿干净的土匪发动进攻。\n\n这是一个老习惯，每当东海岸的物资和补充人员运到西部时，无论运输的多与少，潘兴总是会带着参谋和助手们亲自去迎接，以便给随火车而来的东海岸军官们留下一个好印象。今年，也不例外。当火车稳稳地停靠在站台前，将军与领头的军官亲切地握了手后，将军的参谋吹起口哨，躲在站台后的随行部队立刻开始冲到火车前卸货，这阵仗经常把一些第一次来到西部的军官吓一大跳；随后便被潘兴安排到司令部交流，然后由潘兴亲自在火车站听取物资报告。\n\n老将军顺着士兵的手，接过了一把长枪，简单地比试比试。“总统先生看来下了血本了，士兵，在你眼前的这一把枪是春田的新式步枪。”潘兴微笑地对士兵说。随后又领着巴顿视察了新一批的坦克载具。\n\n他边走边说：“这次做的有些惊动华盛顿了，东海岸已经有不少蠢猪开始讨论这些破事……估计这件事情我们都做的不太好；但至少白宫明白了我们在西部的重要地位，及时给我们送来了一批这么宝贵的补给。”潘兴突然停下脚步。“而且他们似乎没有察觉到电话线和电报线的事……”。\n\n“我们特遣军帮助西部的地方部队、警察以及骑士团训练出了这么多的武装，东海岸的那帮老爷们居然对我们没有一点可怜之情。把我撤了无所谓，可是让小子们平白无故受苦，那……”将军又恢复了他那生硬的严肃表情。"
 USA.10007.a:0"“如果他们还有诚意，那就继续保持下去。”"

 USA.10008.t:0 "他们来了"
 USA.10008.d:0 "罗斯.罗德斯在一间烧毁一半的食品店里自顾自嘟囔着。开始暴动的日子已经过去一个月了。一个月了，底特律既没有罗斯预想中市民们的欢呼，也没有骑士团与军警们的哀嚎；他从萨尼亚一路战斗到摩根大通，一路上的街景是多么的触目惊心，这座五大湖旁的璀璨巨星此时已经显尽了他颓废的模样-但战斗不会停息。\n\n他缓缓地抬头向窗外望去，火焰燃烧的声音、枪炮声、呼喊声，宛如最激烈的交响乐，哪怕一刻歇停的时间都没有。罗斯再看看自己，左肩被步枪弹打伤，最早还有四五处棍击；而这么多天，化学厂产出的医药用品都送到最前线去了，罗德斯没有得到有效的医治，伤口已经溃烂。\n\n罗德斯挪动着自己的身体向窗边靠去，他麻木的注视天花板。为什么救护组还没有到？他现在不想捋清楚这个问题，望着窗边已经尸体苍白的一位不知名工人，他先是用尽自己的力气将他从痛苦抽搐的动作中拉回来，然后从他手中抽出那只已经染尽鲜血的左轮手枪。亚当斯走了、杰克逊走了、现在这家伙也在痛苦中挣扎地死去了；罗德斯已经在这里待了5天了，这里的伤员就剩下了他一个。\n\n罗德斯从来没有学过军人的敬礼，他只是缓缓的低下头，对着这位现在稍显平静的尸体沉默了几秒；然后再把背包从他的身后拽出来，数了数，几块已经烧焦的面包、混杂着血肉味发臭的绷带、不过居然还有一瓶看起来没多大破损的酒精、一个不知道从哪儿缴获的骑士团骑士徽章、零散的20多发手枪弹，这些应该已经够罗德斯一个人在这里应付的了。他面朝已经被烧穿的天花板，闭上眼睛，已经迟钝了的脑海又躁动了起来；但他的四肢躯干依然如前几天沉睡似的平静。仿佛他又在脑海中看见了中魂牵梦索的“胜利”……么；是啊，这个梦多么迷糊，多么让人捉摸不透。\n\n钢铁的轰鸣很快撕裂了迷幻的脑海，罗德斯心里一惊。他屈着腿半跪着，奋力伸着脖子想要往外探，-联邦陆军军旗在残垣断臂之上迎风飘展，随后而来坦克、飞机迅速顺着旗帜的方向前往激烈的战场。头戴英式钢盔的美国士兵并不在意这一点小角落上的罗德斯，从他的眼睛前直直的穿过。而他们身后的大军犹如绿棕色海洋般汹涌而至。\n\n阵阵热风吹过了他的面容。罗德斯面无表情，他紧紧地握着那支被暗红的左轮手枪，握着手里的最后一枚土炸弹。最后的审判来了！"
 USA.10008.a:0"天使重临人间，而随后便是地狱"

 USA.10010.t:0 "我的工作！！！"
 USA.10010.d:0 "11月14日，斯特朗悲伤无比的星期二，自自己第一次踏进弗里曼证券公司以来就从来没有离开过他温暖的灰色港湾，即使工作加班到凌晨都没有像今天一般无能狂怒。但事实便是如此，公司的裁员计划名单上将这位“优秀员工”排在了令人注目的头等位。斯特朗今天跟上次结业大会一样坐着地铁来到了公司，最令他哭笑不得的是，他这趟车费比公司给他家发邮件的运输费还贵。\n\n拿到通知单时的斯特朗按下了思考的暂停键，整个人僵了好一会。“他妈的，火急火燎的……叫我来公司就是为了这个？”斯特朗手里拽着那张已经皱的像老木头一样的传单，破口了几句后便说不清楚话了。最后一次离开公司前，他本来还渴望着找到人事部的主任之后，能靠他三寸不断之舌批准他留下来，不过斯特朗的语言组织能力似乎不是太强；曾经的同事们堆在门口，如观赏一部喜剧般看着他在办公桌前手舞足蹈，声泪俱下的模样。主任先是用骑士团警告他，然后再叫保安把这位不太稳定的已失业者从大门口抬了出去；他那甜蜜无比拿了半年的55美元月薪也像只野鸭一样飞回了这冰冷的大楼里。\n\n斯特朗走在熟悉不过的大街上，双眼早就飘到了天边，他不敢看周围熙熙攘攘的人群了-不只是出于自己的羞耻心理，全世界好像都知道斯特朗被扔出了自己的公司，好像所有人都在用冷漠但又戏虐的眼神看着他一样；在纽约的街头，至少在现在，斯特朗感受不到任何的悲伤与愤怒。一片空白的大脑失去了以往的方向感，他只想在一个全世界最小的角落里睡上从未有过的长觉，以便知道这是自己做的一个最恐怖的噩梦-直到被一个躺在地上的人绊倒才让他从梦魇中苏醒过来。\n\n斯特朗起身啪啪身子，扭头一盯-戴着一顶破个大洞不知道是什么款式的帽子、身上穿着估计一个月没洗的工装、右手上只有两根手指、在古典优雅的摩根图书馆映照之下，标准的乞丐模样。那乞讨者抬起头来用那浑浊但仍有生气的眼光瞄着斯特朗。好吧，总有人比我还不幸，斯特朗这么想；说也奇怪，斯特朗比平时更快的在兜里掏出钱包，浑身颤抖地将剩下的10美分零钱扔在了他残废的手上，唉，也得生活呀，伙计，两顿早饭的钱。斯特朗心里抱怨着。\n\n纽约城是一座拥有600万人口的大都市，斯特朗熟悉又陌生的财富之都，一个对他不公的大都会。平时自己都是半夜才下班休息，这个城市最辉煌的一面他似乎从来没有正视过：摩登巨楼，高耸无边，久久凝视，望而生畏；似乎在代表着什么意志俯视人间，令斯特朗所感慨，不过又有些自我安慰：毕竟我斯特朗.贝格曼可是大学里头出来的高材生……偌大一个纽约城还容不下我？至于刚才那个人……"
 USA.10010.a:0"毕竟，在没有工作的纽约，没有人能活得下去吧"


 USA.10011.t:0 "写给厄尔的信（1）"
 USA.10011.d:0 "寄信点：南方 乔治亚州 亚特兰大市 桃树街455号21号公寓\n\n亲爱的厄尔，你们在北方一切可好？因为我的事实在是太忙啦，所以已经有很长一段时间没给你们沟通过了，在这里我表达我们的歉意。\n\n您也知道，我们这批人都是被北方的老板赶过来-他们在驱赶公民的时候，可真不讲民主人权。我们被驱赶过来的时候，可以说是没有哪怕一片面包，所有人也都是失业状态，我们漫无目的的流浪在南方的铁路线上，最严重的时候有几个家伙甚至去了火车站附近乞讨；而他们：福斯特、海伍德仍然对我这个老头仍然很尊重，对此我心怀感激。\n\n不过到了最近两年，我们的生活倒是相对安定-南方这里的人口管制比北方松的多（除了黑人），大部分的青年都在南方的工厂找到了工作，可是这些地方的工作环境远远比不上北方，薪水也是如此，但是他们还是把我搬进了亚特兰大的一栋小公寓里。作为领导者，怎么能够白吃白喝的拿出他人的被压迫价值？于是我自己也找了份工作，就在亚特兰大的老火车站，当临时售票员和提灯检护，虽然工资也很少，但至少每天吃的面包不是白吃的。只是寄希望于骑士团的人不要来找我的麻烦（你也不要去接触他们！）。\n\n我们除了替人工作以外就没有什么经济来源，所谓的国际也不会批经费给我们-因为他们早已经把我们遗忘了，而他们除了个人以外也没什么钱。我记得那个什么比利时的代表曾经悲观的在报纸上发过言：说我这个老头和小伙子们已经被骑士团的人扔大海里了。只是可惜我不能发声，不然的话，我一定要在报纸上好好责骂他……\n\n先说说近两年来的工作状况：我们在南方已经发展出了几个团体，都是很团结的南方劳工和黑人劳工所组成的。我想我们的主张已经在南方开始生根发芽了，在此之前，南方似乎很少有这种激进的思想因素，而我们的到来也似乎改变了这一切。就说说亚特兰大，现在居然已经有工人组织敢上街抗议了-但我的建议是不要在这个紧张动乱的时候搞全面罢工。这并不是我这个老头软弱了，变保守了，南方不是芝加哥，因为他比当年的芝加哥还要残忍-事实证明，南方的工人力量仍然不强劲，但我们在北方是如此的困难重重-现在的北方局势也是一团乱麻，以至于我们需要去南方寻找新的天地……"
 USA.10011.a:0"（翻开第二面）"

 USA.10012.t:0 "写给厄尔的信（2）"
 USA.10012.d:0 "再说说近两年的考察状况吧。先讲讲黑人群体，这里的黑人，尤其是乔治亚州，虽然名义上摆脱了奴隶的枷锁，但也仅仅只是在名词上。在我观察过的所有黑人劳动状况中，他们与当黑奴或者农奴时期的状态没什么两样-因为他们本身不受南方各州的法律保护，美国宪法中对北方黑人的法律规定，在南方甚至都不适用。大部分黑人在获得解放之后居然还要缴纳一笔所谓的赔偿费，而为了这所谓的赔偿费，黑人们也都如没有被解放之前替白人雇主干最累最脏的活-因为不少在其中加了利息，薪水奇少，有些人现在都没有还完这一笔债。\n\n就算是获得了所谓完全自由的黑人，各州也规定：没有各州县政府颁发的通行证，就不准去往北方，这一点联邦政府也没有阻止。难道我们的黑人兄弟有钱乘船回到非洲老家吗？这些践踏人权的规定不过是这些大财主们贪婪性格的本相毕露，他们就是想让黑人永远当他们的奴隶，赚取最大利益的金钱……（以下省略）虽然组织困难，但已经有一部分黑人团体拥有了团体，我们很高兴，黑人们也愿意欢迎我这个老头帮助他们。\n\n第二点，就是白人工人的问题。我相信很多北方人都没有到过南方，我可以告诉你，南方工人的条件比北方还差，地位比北方还要低贱。南方这些大财主们也把管理奴隶的方法运用到了劳工身上……（以下省略）南方各州总有一些心怀不轨的人去宣传什么“民族既定论”、“美国分裂论”，说什么南北已经分化成了两个不同的种群和民族，要求南方人民与北方人民相互脱钩，甚至连来往都不行！南方的工人们时常就被这种躁动的情绪所调动，或者说被迫被所谓的民意调动，他们对北方包括企业在内的敌视反而忽略了他们自身的压迫，仿佛只是北方的到来，让他们陷入到了这种境地。我想哪怕是骑士团也不会接受这么荒谬的言论。但这个并不是主要的，白人劳工和黑人一样，绝大部分都身背着高额债务-这些大多数都是从80年代的南方危机中剩下来的遗留物，当时的平民百姓大量失业，只能向南方和外国财团的银行贷款-而他们收取的利息又比北方财团的银行高的惊人，当然我没有任何夸赞北方银行的意思，他们同样都是工人的吸血鬼。至少现在，我敢说南方的大多数劳苦工人的债务都可以压死自己。因此他们不能轻易离开南方，他们的受教育程度和经济状况也决定了他们离不开南方-因为北方财团早就已经把南方牢牢抓在自己手里了。\n\n北方的那些只手遮天的资本家在南方拥有惊人的力量-这对于这个分裂的合众国来说确实显得奇怪，但我可以说他们就是有这样的实力。南方70%的企业几乎都在北方手中，先前的大财主只不过剩下了自己的贷款行业，而土地以及实物资产被大肆收购兼并，在南方形成了一个个庞大的巨型工厂-像约翰这些人就犹如圈养牲畜一般把南方人往他们的工厂去赶，只需要开稍微高一点，或者与北方相同的工资，便能瞬间击垮南方那些落后的企业们，将金钱的通道牢牢掌控在自己的手中。南北的这几个团体在政治上争的赤面耳红，而在经济上却是北方一边倒的全盘吸收-南方早就离不开北方，却因为南方那些保守派资本家或者大财主们的利益受到了损害，所以他们要不顾一切，如疯狗一般发起对北方的进攻，但这对于他们来说似乎是无济于事……（以下省略）\n\n我代表在南方的伙伴们，表达对你们事业成功的祝贺!请让我再次表达我的歉意。"
 USA.10012.a:0"格里特·托克维尔·斯巴达克 \n1919年12月15日"

 USA.10013.t:0 "再一次写给厄尔的信"
 USA.10013.d:0 "寄信点：南方 密西西比州 新奥尔良市 波旁街40号 国际码头邮件快递公司\n\n亲爱的厄尔，你们在北方一切可好？今天要向你问候的是一件急事，希望你能够尽快安排。\n\n你大概是知道我们那位欧洲的老朋友去世了的，已经决定了，由你来担任特别代表前往欧洲去参加葬礼，你的工作就由坎农暂时代理。\n\n记住，你要找一身还算体面的衣服-最好不让你们那边破费。然后随便坐什么船到法国的布雷斯特港，桥街区136号16号公寓。那里住着的先生是唯一认识我们的，让他带着你去见见组织。然后，说明我们的情况，别让他们以为我们早就全军覆没了。\n\n你的代号就是“热狗”，它的代号是“外国顾客”。到时候街头碰面，你说一声“热狗”，他回答一声“你要美国香肠吗先生？”，你要回答：“给我来6根！”，就对得上了。如果他先用英文回答“你是美国香肠先生吗？”你要回答：“我是热狗”，那也对得上。\n\n从这封信收到的下一天起就立刻准备出发，可惜资金上的事我没法帮你安排（国际邮件真的太贵了！）。今年的独立日你估计只能在法国或者瑞士过了，务必请在6月10号之前赶到布雷斯特！\n\n就这样了，感谢。\n\n格里特·托克维尔·斯巴达克\n1922年5月15日"
 USA.10013.a:0"这都是些什么……"

 USA.10014.t:0 "火车站（1）"
 USA.10014.d:0 "这是一个如往常一般的老人的梦境。已经66岁的德布斯最近经常做梦，是啊，又是梦见自己幻想的美好生活-美国终于在诸位同志的努力下成为了工人的乐园！工厂不再受到资本家的支配，工人们可以响应人民的号召自主生产；而此时的德布斯已经80岁了，连他的孙女都成家了，一家人欢欢喜喜的独居一栋屋子，这是多么好的景象啊……\n\n耳边嘈嘈杂杂的声音，让德布斯翻了个身，这似乎是现实与梦境交杂的地方，倒不是因为德布斯有多懒，而是他现在的身体已经很难支撑他准时起床了，此时他的脑海中依然在暗示着：要不再睡一会儿……吧？是呀，再睡一会儿吧。\n\n可惜今天早上也并不如往常一样是轻轻的敲门声，只听砰砰几下，火车站值班室的老木门边轻而易举的被撞开，随之而来的就是两张粗犷有力的大手拍了拍德布斯的肩膀，他立刻从迷糊中惊醒，抬头只看见拉福伊那一双浑浊但瞳孔发蓝的大眼睛，现在已经是早上5:10了，但离这位老人的正式起床时间还差20分钟啊。\n\n“先……生……先生！不好了，赶快出去看看吧，火车站等候室人山人海啊，连安德森站长都管不来……反正赶快去看看吧”。德布斯听见这话，赶紧的下了床，穿好了外衣就往外赶。太阳不过即将露出自己的一角，但还是能够照耀在这一片的不可名状物上，这哪是人山人海，简直就是一块块五颜六色的猪肉堆在站台和火车站前，人群的各种呼叫与痛哭声，还有另外说不清楚的嘈杂声混杂在一起，仿佛内战爆发了呢……不对，不会真的是内战爆发了吧？\n\n组织里的其他几个人早就在维护秩序，安德森站长气呼呼的跑过来。“我说尤金啊，您还是别在这里瞎掺和了吧，我害怕您进了人群就出不来了。您不是最关心时政吗，怎么，内战爆发的消息比我还晚知道吗？”。“我刚起床的时候就猜到了，没想到爆发的这么快，也更没有想到这里有这么多的人……”亚特兰大的新火车站修好后，这里的乘客在短时间内就稀疏下来，数量呈几何式下降，可现在这里都有这么多人，那总站是什么样就不可想象了。\n\n“先生……那您接下来该怎么办，您和你的同伴们该怎么办？”。德布斯看看人群，再看看小伙子，眼神闪出一道不知是感叹世事难料还是忧伤的情感，但道尽了他的沧桑。他转过头，笑了笑。"
 USA.10014.a:0 "“等吧，等到一切都有办法为止……”"

 USA.10015.t:0 "火车站（2）"
 USA.10015.d:0 "午日当头，亚特兰大吹起的阵阵热风让人汗水直流，昔日占据各大头条的飓风新闻，如今却在战火之中荡然无存，取而代之的是亚特兰大三个火车站的每日列车表名单。\n\n为逃离自己的故乡和梦想之城，从亚特兰大到佛罗里任何城市的火车票，一路在投机者的操弄和老百姓的恐慌下飙升到100美元以上，为了哪怕争取到一人前往港口的车票，逃避自命以为的无妄之灾，竟出现成百人在烈日下的拥挤中晕倒的奇观，让动荡的局势更加不安。\n\n“喂喂喂……有…（被嘈杂声音淹没）”。“新奥尔良的有没有，巴吞鲁日的呢……”。“我要两张休斯敦的！”。“哎哟，别挤了！喂，来四张丹佛……”。“到墨西哥蒙特雷的票涨到150美元了！？”。“这是…妈的，臭外地的，别抢票！”。今天，谁都不知道亚特兰大老火车站里到底挤满了多少乘客，运输公司的上司们早就消失的无影无踪，被接连裁员的车工队伍则完全无法应对如此之大的人流，售票处的窗口铁栏已经被彻底挤破挤烂，人群的躁动仿佛要把忙里忙外的安德森站长给一口吞没。站台已经完全化作了水管破裂的龙头，就连十几个警察都无法维护秩序，一拥而上的乘客，纷纷把自己的亲人或朋友，如赶猪似的塞进了拥挤不堪的车厢，更有甚者直接爬上车顶或者挂在车厢旁，蒸汽机启动的响声反而为混乱之地带来一丝异样的宁静。\n\n德布斯此时已经在组织内部开完了会，会议决定：德布斯同志将一人前往新奥尔良的左翼联盟地下组织，择机出国避难，车费由左翼联盟共同出资（200美元）；由福斯特等同志领导的左翼联盟亚特兰大组织由各种方式前往南卡罗莱纳查尔斯顿与地下组织汇合。尽管德布斯异常反对这个方案，并再次提出了之前已经被否决的新奥尔良步行方案，但少数服从多数，德布斯不得不接受。\n\n拉福伊作为维修车工倒是呆呆的坐在房间里，火车频繁的开动让他根本没有机会进行维修工作；不过，他作为在老火车站里给左翼联盟放哨的局外小伙，倒是有资格去以某种方式聆听德布斯等人的谈话。他一直目不转睛的盯着德布斯呢时而紧迫急躁又时而平和的面容，周围的嘈杂仿佛也都醉心于浓郁的美国北方口音所表达的演讲，分分沉静下来，拉福伊的脑海又开始重现几年前的东西了。\n\n那是1915年的夏季。也是个夏季，拉福伊第一次离开法裔社区去往亚特兰大，用自己的维修技能狠心告别贫困潦倒的父母，自谋生路的时候……"
 USA.10015.a:0 "言语鼓励了心灵的触碰"

 USA.10016.t:0 "拉福伊"
 USA.10016.d:0 "1915年，17岁的让.拉福伊.路易斯在新奥尔良在叔叔家中学了一手钳工和维修蒸汽机的技巧，就满怀希望去到了梦想之城亚特兰大-这座美国东南部生机勃勃的巨型都市，尽管她并没有像休斯敦那样的奢华，但那无限的机会却让所有人都垂涎三尺，并想方设法逃离自己难以忍受的贫困。\n\n拉福伊并没有拿到高级的维修资格证，因此他根本就不能在各路名牌公司旗下当上一名还算体面的职员，不过濒临停运的亚特兰大老火车站却愿意给这些穷小伙们一个机会；24美元，十小时工作，从此就在亚特兰大生活。但亚特兰大高昂的物价以及不同货币的自由通行还是让他吃了一惊，不太少的工资也并不能完全应对自己的生计，更不用说把钱寄回家了，他只能停掉自己的房租，以极低的价格租下了老火车站的一个破败的小房间居住。\n\n但从他第一次来到火车站开始，他总是能看到一帮奇奇怪怪，明明做的是工人工作，但又不是工人模样的人，说着和南方不太一样的方言，穿着破旧的西装在火车站以及其他意想不到的地方时不时出现，与那个夜晚经常提灯散步的看护老头围着转。只是曾在安德森站长的耳边听说过：为首的那个老头是纯正北方人，其实很有钱，带着这一帮不知道从哪儿来的人顺着铁路就到了这里，老头的钱在旅途中莫名其妙的给花完了，不清楚他们在北方是什么人，反正经过一番复杂的操作，这些人最终在老火车站里头安家工作，在这儿安德森也就没有再说下去了。\n\n拉福伊认为他们不过是一帮从北方来的黑帮，因为被人追杀才逃到了这，哼，北方的土财主罢了。一开始拉福伊对他们完全无感，有时候那老头还跑过来和拉福伊说一些叽里咕噜高大上的话，也就当成了耳旁风。不过从1916年起，火车站的许多本地工人们却经常跟着那个老头和那堆人上什么夜班或者是大会之类的东西。拉福伊的从众心理也让他好奇的过去望了望-包括安德森站长在内的许多人都在跟着他们混，成天就是说什么“布尔什维克”或者“争取革命”、“反对战争”之类的道理。但是一旦说到“唯物”，拉福伊却心头一惊-这与他在极少的初中生涯时听到的口径似乎不同，尽管虽然早已遗忘了课本中的内容，但是除了老头以外的另外一个大哥（后来的福斯特）所说的所谓唯物主义，却早就在自己的印象中找不到等同的位置。坏了，他们不会是一帮红色暴徒吧……那些拿着盗版主义的书的人。\n\n拉福伊从一开始的震惊与恐惧，但到后来也亲自前往夜晚课堂听课，他的的确确听到了一些，和自己在街头小巷听到的东西不一样的道理。在此之后的两年间，烦杂的工作让拉福伊忘记了很多东西，他仅仅只是记得，自己学了好多好多课程，明白了什么叫唯物主义，让他以前难以接受的这种唯物主义移植到了他的脑中，然后成为了德布斯的帮手，自愿照顾他的起居，顺便放哨。这位慈祥的老爷爷待他不薄，但拉福伊一开始也抱有一丝疑问-他的行李箱里明明还有很多钱，为什么要流浪，亲自来这种地方工作？现在，他早就明白了。\n\n热风拂过脸颊，这些昔日的团体与组织们仍然在水下沉积，但新生的岛屿，即将在这片广阔的大陆上铺展开来……只听见会议中的：总有人要留下来，对，我也是工人，我也只是普通的人，我是不是要和留下来的人一起留下来，为了所有人为我们的教导而去保留珍贵的东西。大脑中的胡思乱想已经填充了拉福伊所剩无几的学识了，但此刻，他的心却越来越激动。"
 USA.10016.a:0 "他感觉自己与他们是一条血肉"

 USA.10017.t:0 "法国，到了"
 USA.10017.d:0 "哪怕是远方大陆战火四起，欧洲进出口贸易遭受严重打击，也掩盖不了布雷斯特这个作为法国布列塔尼第一大港的繁华景象。一船又一船的煤炭与移民进入了码头，岸边黑心的海关依然赚的盆满钵满。\n\n在下船四处逛悠的水手中，德布斯的特使-厄尔·罗素·白劳德来不及给自己买午饭，就一路奔向“桥街区136号”去寻找他的联络人。白劳德虽然作为特使，但他自己的资金早就在纽约的救济活动中花的精光，那点微薄的薪水，根本不足以支持自己哪怕买到前往法国的二等船仓。还好纽约的地下工人会十分给力，费尽心思将自己送上了运煤船-并且不用支付一分钱船票。只可惜德布斯先生的要求无法执行-运煤船的环境自然不必多说，哪怕是衣服放在行李箱里，拿出来都是附着一片片的煤灰，正装穿上去和工装没什么两样。所以在找到联系人后，得赶紧向他要件合适的服装去参加葬礼。\n\n好，桥街区136号，但他傻眼了-眼前哪有什么公寓，一栋掘地而起的“皮洛士”百货大楼摆在他的眼前。坏了，德布斯先生的地址怕不是旧地址吧？白劳德此时不禁冒出一身冷汗，但自己又总不能满大街的叫“热狗”、“烤肠”之类的词汇，而且法国人大概听不懂英文……太阳已经向西边转去，将近下午3点，而此时的白劳德已经两天没有吃过任何东西了。他努力的用自己向水手学习的拙劣法语去询问路人哪里是餐厅，路人似乎看出了他是个美国人，手一指，指向了百货大楼里的一间小房间。\n\n“美国老家餐馆”？这下白劳德可找到老乡了，推开门一进-一位瘦高瘦高，穿着西装的服务员就走了过来。只见他开口就说：“您是……” 。“没错，我是“香肠”！”。白劳德打断他的话，又上前激动的握着他的手。“可算是找到了！”服务员先是诧异，然后又带着一丝尴尬的微笑说道：“您要多少？”“我要吃6个！”白劳德激动的说。随后，服务员将他领到餐桌上，他则在满怀期待的等着下一步计划的进行。\n\n然后，服务员拿了一个大盘子出来，上面满满当当的放了6个热狗。“请享用，亲爱的美国同胞！”。服务员彬彬有礼地说到。只留下了震惊并流出一丝口水的的厄尔·罗素·白劳德。“不错……至少我能在法国这破地方吃到美国的快餐。”也不管怎么想，白劳德就先啃了起来，这是他在法国吃到的第1顿饭。"
 USA.10017.a:0 "“什么，2法郎？我，我我……没有钱”"

 USA.10018.t:0 "提案"
 USA.10018.d:0 "美利坚合众国 国会众议院第xxxx号提案\n提案人： 美利坚合众国总统 托马斯·伍德罗·威尔逊\n标题：《关于在1920年至1922年间向美利坚各州特定人群发放救济金的保障措施》\n\n内容：提议由联邦政府对美利坚合众国的生命受到威胁，不能正常履行劳动义务的合法公民（除黑人、黄种人公民外）发放救济补助。\n\n提议联邦政府增加在§0《1920∽1921年间美国年度财政预算》§!中增加有关《关于在1920年至1922年间向美利坚各州特定人群发放救济金的保障措施》提案的财政支出，总计约5,000万美元，该项资金由联邦政府全权负责。关于救济活动，由联邦政府负责95%的救济活动开支，5%由南北各州政府负责。……（以下省略）\n\n南北各州政府履行上述条款的同时可以在不与该法案相违背的情况下调整救济措施，具体的救济措施由南北各州政府制定，联邦政府进行救济活动时必须遵守各州宪法条例，同时只负责救济活动的指导工作。……（以下省略）\n\n若该提案通过，则该项救济工作自法案正式生效的一周内开始实行，其有效期持续到1923年1月1日为止。\n\n投票结果公布如下\n众议院（共400席位）：§B301票赞成§!，§R45票否决§!，14票弃权，40人缺席。\n众议院北方委员会：§B赞成§!。\n众议院南方委员会：§B赞成§!。\n\n参议院（共86席）：§B70票赞成§!，§R6票否决§!，10人缺席。\n参议院北方委员会：§B赞成§!。\n参议院南方委员会：§B赞成§!。"
 USA.10018.a:0 "§Y“提案通过！”§!"

 USA.10019.t:0 "来源不明的文件"
 USA.10019.d:0 "威尔逊总统的文件柜里放着这么一样东西-\n\n“底特律大罢工全过程”\n1919年5月1日，正值芝加哥大屠杀33周年，因为一场状告卡内基公司侵犯人身自由并导致工人死亡（指不合理工作制度导致工人劳累过度而死，但公司并没有以公司赔偿制度的标准来发放抚恤金）的官司在芝加哥以败诉告终。于是芝加哥工人（主要是钢铁工人）又一次发动了罢工活动；社会舆论本认为，这又是一次小打小闹的赔钱把戏，但这一次的罢工犹如雪崩般地点燃了工人的怒火，并使罢工浪潮迅速扩张至全五大湖地区，成为了美国自1886年以来的最大罢工运动。\n\n直到1919年7月份，总罢工人数已多达200万人，五大湖地区的工业体系全部陷入瘫痪。五大湖地区的大罢工迅速得到了全国各工人团体的响应；但与此同时，美国军警以及劳动骑士团对工人运动的迅速打击，在五大湖各大城市已经造成了数百人的伤亡，这更加激发了工人们的愤怒。在底特律工人群体中的一些人物则主动发起了一项号召工人们自治的运动，而这迅速引起了底特律政府军警们的警觉。\n\n1919年7月21日，一股由底特律警局组成的侦查队于清晨不断向罢工工人们聚集的卡内基钢铁工厂靠近，在引起了工人们的注意后，双方冲突不断；在一名稽查队队员向一名工人开火并打伤后，工人们纷纷拿起自己持有的武器与稽查队对射，但最终因军警的不断加码而逐渐退缩至工厂内。直至下午以后，底特律的工人们听说了卡内基工人们的经历之后，联合号召罢工队伍拿起武器，支援卡内基工人。最终有3000名工人响应号召武装自己，前往卡内基钢铁工厂攻击了军警队伍。随后，底特律起义全面爆发了。\n\n直到7月24日，使用热武器参与战斗的起义人数已达9000人，而参与了起义全过程的总人数则达到了三万人之多；工人们几乎攻占了底特律全市的资本家企业。7月30日后，工人攻占了底特律的市政府大楼，警察局武器库以及可以生产军火物资的化工厂。而底特律的剩余抵抗力量则从警察局撤离至J.P摩根底特律分行以及劳动骑士团底特律总部。\n\n以下是本报特约评论员的评论：\n“我们可以确信，可以欢欣鼓舞的呼喊，在1917年的布尔什维克革命之后，工人革命的火花终于在美洲大陆上点燃了资本家阶级们的炸药桶！阿根廷与美利坚的工人联合起来……起（被刀割下）……万岁！”"
 USA.10019.a:0 "“哼……什么东西……”"

 USA.10020.t:0 "来自哈德逊庄园的信"
 USA.10020.d:0 "尊敬的美利坚总统-托马斯·伍德罗·威尔逊 阁下\n\n老朽因身体不便，在参加完20年企业峰会后便匆匆回到寒舍休息，造成了对贵政府人员极大的不礼貌，对此，我深感抱歉。不过既然1920年峰会由老朽主持，便欲尽地主之谊，邀请总统阁下前往老朽寒舍交谈经济、工业之道。\n\n老朽将在寒舍时时刻刻等待您的光临，期盼您的到来。最后，再次感谢对政府对我等企业人员的关心，并表达对您和家人的问候。\n\n约翰.戴维森.洛克菲勒\n纽约州 静谷县 哈德逊河滨庄园1号\n1920年9月"
 USA.10020.a:0 "“呼……”"

 USA.10021.t:0 "复兴—革命"
 USA.10021.d:0 "优美的哈德逊河滨庄园今天可热闹了。庄园外的停车场早就塞得满满当当，原本门前“闭门谢客”的大字牌早早的被摘了下来，众多社会名流以及企业家齐聚庭院，他们都在等待这次会谈的结果。\n\n威尔逊从那满是洛可可风格的大别墅中满头大汗的走了出来-脸上的表情就跟刚进入庄园所望见的，郁郁葱葱的一片植物墙差不多。原本以为与洛克菲勒的秘密会谈会要比其他大企业家们有益的多，结果不知是哪个混蛋把消息放了出去，这场“秘密会谈”最终演变成了“老约翰重出江湖”以及“总统亲门拜访，邀请洛克菲勒商谈国事”等一系列爆炸性的公众新闻。\n\n再一个，没想到这位老的骇人的老头说出来的话，倒不像一个80岁的老人。或许这是返老还童的正常效应，也或许是庸人口中所说的“疯了”的一类意思。但是威尔逊从洛克菲勒那如老鹰一般的眼睛中，看到了令所有白宫官员都会感到恐惧的眼神。\n\n“老先生，您说的工业革命，究竟什么时候才会出现，并且让美国再次‘复兴’呢？您说的美国的‘复兴’究竟是什么？”\n\n“我是说……。”洛克菲勒微微转过头来。“威尔逊总统阁下，应该需要多多关注科技界的东西了，……可能有所不知。现在美国的科技水平，已经达到连欧洲人都难以想象的地步了，问题在于这些科技没办法转化为实际成果。像我刚刚跟您说的，当年的爱迪生和特斯拉的电气发明成果，不都是在美国完成的吗，他们的发明带来了电气的革命，带来了美国的繁荣。而今天，工业革命将要再次在美国爆发了！先前卡内基公司的实验室，研究出来的新型铸铁材料可以胜任任何大马力发动机的工作-况且美国的微型发动机，以及新型柴油发动机的研发都在路上了。最关键的是……。”洛克菲勒完全把头转到威尔逊一边，用那四周布满皱纹的眼睛直勾勾的对着他。\n\n“特斯拉工作室和通用电气的发明，足够颠覆整个科技界了，电磁技术和无线电、无线输电技术，微电子可控储存技术，这些东西，都是我们这种老人无法想象的了……”\n\n“所以说，唯一能够让美国复兴的机会，就是让我们去抓住这次工业革命？”\n\n“没错，而且事实证明，工业革命的最终结果，就是由一个庞大的集团代替所谓的自由市场运作，这种产物亦或是从国家产生，亦或是从社会产生，无论如何，它能够操控国家乃至世界的经济，并且比现存的自由市场运行的更好，我们即将迎来千百年来都未知的变局……”\n\n威尔逊已经被天花乱坠的各种名词说得晕晕乎乎了，但到了这一句，他倒是异常精神过来。却又神使鬼差的说出了那句最不该说的话……"
 USA.10021.a:0 "“§R您是说，你……您想代替……？§!”"

 USA.10022.t:0 "起诉"
 USA.10022.d:0 "美利坚合众国 国会众议院第xxxx号提案\n提案人： 德克萨斯州 众议院南方委员会委员 詹姆斯·爱德华·弗格森\n标题：《关于弹劾现任美利坚合众国总统 托马斯.伍德罗.威尔逊加征关税的法案》\n\n内容：经过众议院南方委员会的调查与讨论认定，现任美利坚合众国总统 托马斯·伍德罗·威尔逊在加征关税一事存在越权行为，包括但不限于越过§0《第十五修正案》§!与§0《第十六修正案》§!对于南方州政府的海关关税规定，对南方各州的海关税制重新进行调整。以及对南方各州存在多种逾越美利坚合众国宪法的强制性命令。……（以下省略）\n\n现提案要求美利坚国会针对现任美利坚合众国总统 托马斯.伍德罗.威尔逊的加征关税法案提起弹劾议案，定最终使得该法案停止执行，剥夺其合法或非法效力。若该弹劾提案生效，则将会将该弹劾案转交至联邦最高法院提起诉讼并审理。在最高法院宣布停止该加征关税法案的合法或非法效力后，根据美利坚合众国§0《第十五修正案》§!与§0《第十六修正案》§!的原则，联邦政府需立即归还南方各州政府合法的海关制定权力，并将美利坚合众国海关的总体关税从现有的40%降至法案执行前的28%。\n\n投票结果公布如下\n众议院（共400席位）：§B156票赞成§!，§R196票否决§!，28票弃权，20人缺席。\n众议院北方委员会：§R反对§!。\n众议院南方委员会：§B赞成§!。\n§R（众议院多数投票不通过）§!\n\n参议院（共86席）：§B35票赞成§!，§R40票否决§!，11票弃权。\n参议院北方委员会：§R反对§!。\n参议院南方委员会：§R反对§!。\n§R（参议院多数投票不通过）§!"
 USA.10022.a:0 "“§R起诉未能通过！§!”\n“好……”"

 USA.10023.t:0 "1920年美利坚合众国 国会众议院选举"
 USA.10023.d:0 "1920年美利坚合众国 国会众议院选举已完毕\n\n美利坚合众国 国会众议院席位选举结果如下（共400人）\n§3扬基党§!：169人\n§t迪克西党§!：161人\n§P南方进步同盟§!：36人\n§G联邦统一党§!：26人\n§T独立或其他党派人士§!：6人\n§O西部民主同盟党§!：2人\n\n美利坚合众国 国会众议院北方委员会选举结果如下（共20人）\n§3扬基党§!：17人\n§G联邦统一党§!：2人\n§T无党派人士§!：1人\n\n美利坚合众国 国会众议院南方委员会选举结果如下（共20人）\n§R迪克西党§!：16人\n§P南方进步同盟§!：4人"
 USA.10023.a:0 "“所以这是第几次不平衡了？”"

 USA.10024.t:0 "妇女提案"
 USA.10024.d:0 "美利坚合众国 国会众议院第xxxx号提案\n提案人：美利坚合众国总统 沃伦·盖玛利尔·哈定\n原提案人：苏珊·安东尼（Susan B. Anthony）和伊丽莎白·史旦顿（Elizabeth Cady Stanton）\n标题：《关于修改§0第十六修正案§!部分内容以及保障妇女权利提案》\n\n内容：基督释放了我们，让我们得自由。\n\n根据美利坚合众国现有条件情况下，妇女受到社会冲突的日益压迫性。妇女家庭地位以及工作条件、政治权利需要得到确立与保障。现提案建议\n1：禁止任何美国公民因性别因素被剥夺选举权。\n2：禁止任何美国公民因性别因素而被动的丧失了自由的工作权利。\n3：保障妇女拥有合法个人财产的权利，禁止其具有婚姻关系者剥夺其自由财产。\n4：废除§0《第十六修正案》§!第7条附录相关内容\n\n若该提案在国会范围内得到通过，则将其提案移交给各州政府，由各州投票决定被批准其产生合法效力。若该提案产生合法效力，则该法案经联邦最高法院审核后写入美国宪法。\n\n投票结果公布如下\n众议院（共400席位）：§B186票赞成§!，§R145票否决§!，49票弃权，20人缺席投票。\n众议院北方委员会：§B赞成§!。\n众议院南方委员会：§R反对§!。\n§B（众议院多数投票通过）§!\n\n参议院（共86席）：§B55票赞成§!，§R20票否决§!，7票弃权，4人缺席投票。\n参议院北方委员会：§B赞成§!。\n参议院南方委员会：§R反对§!。\n§B（参议院多数投票通过）§!\n\n美国各州（共43州）：§B30个州赞成§!，§R13个州否决§!。\n\n-§O“提案通过！”§!"
 USA.10024.a:0 "“在权利方面，人人与生俱来而且始终自由与平等，非基于公共福祉不得建立社会差异。”"

 USA.10025.t:0 "政治活动权利"
 USA.10025.d:0 "美利坚合众国 国会众议院第xxxx号提案\n提案人：美国扬基党全体党成员\n标题：《关于停止迪克西党及南方各州党派的政治活动权利的提案》\n\n内容：根据§0《美利坚合众国宪法》§!原则，在国会拥有代表的或无代表的，在地方有代表或无代表的迪克西党成员、南方各州党员以及所属南方党派的州政府均违反了§0《第十四修正案》、《第十五修正案》、《第十六修正案》、《第十七修正案》§!等相关修正案的内容；违反了§0《独立宣言》§!与§0《人权宣言》§!等法律条文的内容。现根据国会程序提出要求停止迪克西党及南方各州党派的政治活动权利，如果该提案法律效力正式生效，要求在该提案法律效力正式生效后立即执行法案内的要求，立即将迪克西党及南方各州党派在国会的席位全部驱逐。\n\n若该提案在国会投票通过，则将该提案移交至联邦最高法院审理，在最高法院通过该提案，使得该提案法律效力正式生效后，以§0《美利坚合众国宪法》§!以及相关判例对迪克西党及南方各州党派提起诉讼。同时该法案立即生效。"\n\n投票结果公布如下\n众议院（共400席位）：§B195票赞成§!，§R144票否决§!，26票弃权，35人缺席投票。\n众议院北方委员会：§B赞成§!。\n众议院南方委员会：全体缺席。\n\n参议院（共86席）：§B49票赞成§!，§R10票反对§!，3票弃权，24人缺席。\n参议院北方委员会：§B赞成§!。\n参议院南方委员会：全体缺席。\n\n-§O“提案通过！”§!"
 USA.10025.a:0 "“一切政治结合均旨在维护人类自然的和不受时效约束的权利。”"

 USA.10026.t:0 "废除修正案"
 USA.10026.d:0 "美利坚合众国 国会众议院第xxxx号提案\n提案人：美国扬基党全体党成员\n标题：《关于废除§0第十六修正案§!与§0第十七修正案§!的提案》\n\n内容：再次爆发的内战，说明了一个严峻事实，即现行§0《美利坚合众国宪法》§!的运行框架，已经不适应现存的政治以及经济状况。提案要求修改美国宪法，废除§0《第十六修正案》§!与§0《第十七修正案》§!（即所谓的§0《查尔斯顿协议》§!与§0《西点协议》§!）。\n\n若该提案在国会范围内得到通过，则将其提案移交给各州政府，由各州投票决定被批准其产生合法效力。若该提案产生合法效力，则该法案经联邦最高法院审核后写入美国宪法。\n\n投票结果公布如下\n众议院（共400席位）：§B197票赞成§!，§R1票否决§!，2票弃权，200人-即迪克西党与南方各党派代表缺席投票（禁止投票）。\n众议院北方委员会：§B赞成§!。\n众议院南方委员会-（已停止运作）\n\n参议院（共86席）：§B52票赞成§!，34人缺席投票。\n参议院北方委员会：§B赞成§!。\n参议院南方委员会-（已停止运作）\n\n美国各州（共43州）：§B26个州赞成§!，17个州缺席投票（迪克西党以及南方州党派政治州禁止投票）。\n\n-§O“提案通过！”§!"
 USA.10026.a:0 "“整个主权的本原根本上乃存在于国民。任何团体或个人皆不得行使国民所未授予的权力。”"

 USA.10027.t:0 "总统"
 USA.10027.d:0 "在这张办公桌前面，哈定先生再一次用自己粗大的手掌掐了掐脸颊，以确信这不是他的第2次美梦经历。\n\n眼前是圆形的大房间，进去后却踩在无数冒着火焰的蒸汽机之上。周围的书统统都变成了流动的钞票，装饰古典的墙壁花纹也纷纷化作招手的人群，在向前一步想要抓住座位，却在坐上的一瞬间就§R掉入了无底深渊!§!。 呼！还好这只是做梦……\n\n没错，就这么稳稳当当，慢慢悠悠地坐在了这个椅子上，这个地方，是哈定亲爱的前总统，托马斯.伍德罗.威尔逊先生所待过4年的地方。而现在，作为第78任美利坚合众国总统，来自扬基党的沃伦·盖玛利尔·哈定先生，为自己4年前的站立俯视转换了视角。\n\n飞速运转的大脑想过了自己曾经说过的豪言壮志，又把对女性朋友们的承诺的意志高潮起来，眼前已经无法塞下任何事物，因为哈定总统想的都快要溢出来了！不过逐渐温暖的火炉，打断了高速运转的人肉机器进入无趣的思维空间。\n\n没错，就这么稳稳当当，彻彻底底地坐在了总统的位置上。1921年的新任美国总统，将会开启自己的白宫第一天生活，而他是否能够兑现自己的竞选口号？"
 USA.10027.a:0 "§Y“必定的进步与普世的繁荣！”§!"

 USA.10028.t:0 "军费提案"
 USA.10028.d:0 "美利坚合众国 国会众议院第xxxx号提案\n提案人：美利坚合众国总统 托马斯·伍德罗·威尔逊\n标题：《关于增加在§01920年∽1921年间美国年度预算陆军、海军军费开支§!的提案》§\n\n内容：提议联邦政府增加在§0《1920∽1921年间美国年度财政预算》§!中的美国联邦陆军、海军军费开支。总计约为2亿美元。\n\n若该提案在国会范围内得到通过，则移交联邦最高法院审理，若该提案通过最高法院审理，自法案正式生效时立即开始实行。\n\n投票结果公布如下\n众议院（共400席位）：§B155票赞成§!，§R214票否决§!，6票弃权，25人缺席投票。\n众议院北方委员会：§B赞成§!。\n众议院南方委员会：§R反对§!。\n§R（众议院多数投票不通过）§!"
 USA.10028.a:0 "“§R提案未能通过！§!”\n“唉……”"

 USA.10029.t:0 "沃伦·盖玛利尔·哈定当选美国总统"
 USA.10029.d:0 "美利坚合众国1920年总统大选已经结束。由§B美国北方扬基党派§!提名的扬基党总统候选人-沃伦·盖玛利尔·哈定收获25,478,995张选票与253张选举人票，以压倒性优势彻底赢得总统大选。沃伦·盖玛利尔·哈定成为了美利坚合众国历史上第38位总统，同时也是美国扬基党在联邦政府持续连任的第4位总统。他将于1921年1月30日前入主白宫。\n\n哈定在之前曾经成为威尔逊政府的副国务卿。他的竞选内容包括：§0提高妇女地位§!和§0保障妇女权利§!，承诺§0政府对经济继续改革§!，延续威尔逊总统的§0《美丽国家计划》§!等。不过由于美国政坛冲突的持续加深，关于这些竞选口号的承诺究竟能实现多少，外界表示了普遍的怀疑。\n\n同时，此届美国总统大选激起了南方多地的强烈抗议-这是由于北方政党已经连续4次赢得大选，而并执行非原先美国南北政府默认的总统轮换制；自1908年以来，已经没有一位美国南方政党的总统候选人能够当选总统。南方的激进主义者普遍认为，南方的政治权利正迅速从联邦政府流失。南方的抗议者们要求重新进行总统大选，并呼吁联邦最高法院展开对以当选总统的沃伦·盖玛利尔·哈定的投票调查。"
 USA.10029.a:0 "迪独自己菜还怪我们？"

 USA.10030.t:0 "美利坚合众国总统选举结果"
 USA.10030.d:0 "美利坚合众国总统选举结果公布如下\n美利坚合众国公民总人数：96,228,496（北方各州总人口-71,152,330（包括西部北方州）\n南方各州总人口-25,076,166（包括西部南方州））\n\n总计486张选举人票（不包括华盛顿特区）\n北方州：283张选举人票（包括西部）\n南方州：283张选举人票（包括西部）\n\n选举结果如下\n§3美利坚扬基党(北方选区)§!总统候选人：沃伦·盖玛利尔·哈定\n总获选票：25,478,995\n总获选举人票：253\n\n§G联邦统一党(北方选区)§!总统候选人：威廉·詹宁斯·布赖恩\n总获选票：1,795,336\n总获选举人票：30\n\n§t美利坚迪克西党(南方选区)§!总统候选人：西奥多·比尔博\n总获选票：5,945,877\n总获选举人票：189\n\n§P南方进步同盟(南方选区)§!总统候选人：威廉·亨利·戴维斯·默里\n总获选票：2,489,777\n总获选举人票：76\n\n§O西部民主同盟党§!总统候选人：海勒姆·约翰逊\n总获选票：691,844\n总获选举人票：18\n\n现南北方总统候选人获胜者：§3美利坚扬基党§!总统候选人-沃伦·盖玛利尔·哈定\n\n美利坚国会众议院投票结果：§3美利坚扬基党§!总统候选人-沃伦·盖玛利尔·哈定获胜。\n美利坚国会参议院投票结果：§3美利坚扬基党§!总统候选人-沃伦·盖玛利尔·哈定获胜。\n美利坚国会参议院、众议院北方委员会联合审核-§B通过§!\n美利坚国会参议院、众议院南方委员会联合审核-§B通过§!"
 USA.10030.a:0 "祝贺§Y沃伦·盖玛利尔·哈定当选第28任美利坚合众国总统！§!"

 USA.10031.t:0 "加入骑士团"
 USA.10031.d:0 "面前的烟头不受控制的被掐灭，那最后飘散一股的尼古丁也不由自主地吸进了斯特朗的肺里。后脑勺闪烁的是迷蒙的黄色灯光，在光晕的照耀下，满脸胡渣的斯特朗，那个曾经的精神小伙，此时正趴在座位上昏昏沉沉地镇定自己-他喝醉了。\n\n此时的他无论如何也不敢回家，一旦踏进大门的一步，老妈的拐面杖估计就精准的敲在了他的胸口上，但看见母亲欲哭无泪而又瘫坐在床上的画面，斯特朗就更不忍心回家了。在充满光辉的浸信会的照耀下，上帝却实实在在的将福音带到了斯特朗的面前。“为什么要让人类创造酒这种东西，明明是罪……罪过，但怪不到我头上。”斯特朗正趴在桌子上喃喃自语。\n\n“当我拿起十字架时，我认识到了它的意义所在。”斯特朗正用自己的手指比划着墙上的一副已经发黄了的海报-红白相间的十字架是那么的瞩目，在那眼花的瞳孔中，似乎下面总要比上面长的多，仿佛现在的斯特朗已经在地狱的审判庭接受终结了。“看呢，年轻的小伙，要加入骑士团了，哈哈哈哈哈哈……”坐在酒台上的肥肚子大叔发出了一阵嘲笑。他转过他那粗大的手臂，一道如闪电般的巨大疤痕让人不寒而栗。\n\n“看到了吗，孩子，这就是骑士团的枪打的。你也去加入骑士团吧，有赏金，啊哈？多多找像我这样的人，我保证……让你脑袋……开花！”\n\n斯特朗虽然身体是虚弱的，但不代表自己的大脑已经被愚蠢的酒精味所笼罩了。眼前的人明显是耍酒疯的醉鬼，不过只可惜自己不能跟他一样耍酒疯，毕竟他不认识酒吧中的任何一个人，也似乎没有足够的体量能够与其对战，不过斯特朗那强烈的自尊心，还是让他的额头变得更加通红。\n\n“嘿呦，亮起来了！”\n\n当被一众酒鬼赶出酒吧，斯特朗内心从未熄灭的怒火却又喷涌而出，他开始对着这街道角落的酒馆大放厥词，用了所有他在上学时能够听到最难听的脏话，通通骂了一遍。雪花飘了下来。在自己的气消了之后，他还是赶快逃离了这个是非之地-肯定有人听见了，对吧？\n\n在胸口不断画十字的斯特朗却萌发了一个念头：加入劳动骑士团……像我这种人，这能加入吗。但如果能够加入骑士团，再像弗里曼那鬼地方一样疯狂……对。“哇哦哦，打拼，拼命的打……打拼！”路灯的灯光让斯特朗再一次上头了。\n\n“去他妈的！”"
 USA.10031.a:0 "因为这实在太像酒吧的内景了"

 USA.10032.t:0 "加入骑士团(2)"
 USA.10032.d:0 "全美劳动联盟-劳动骑士团纽约总部\N纽约总部人事部-第7人事处-第14人事科\nR-11415号档案\n处理人：纽约总部人事部-第7人事处-第14人事科-三级学士：亨利·保罗\n保密级别：无\n档案如下\n\n前来应聘者：斯特朗. 贝格曼\n性别：男\n年龄：27岁\n出生地：纽约州 布法罗市\n现居地点：纽约州 纽约市 布鲁克林区 树屋社区\n学历：纽约大学 研究生-经济学专业\n信仰：浸信会\n工作？：无\n非法工会或共产党经历？：无\n有或曾有过非法工会或共产党经历的家庭成员？：无\n曾有家庭成员成为劳动骑士团？：无\n\n自称招聘原因：“我来到劳动骑士团就是为了执行伟大的使命，传播上帝的福音，并为美利坚国家与美国人民而奋斗，完成昭昭千禧年的壮举！”\n\n现研究表述：该名招聘者系高学历人才，适宜吸纳至§0财务/法律/档案/人事/§!宣传部门工作，但对我组织的宗教政策存在一定误解。根据人事部原则，现经过组内表决。将其吸纳至纽约总部第10宣传处。并在本人同意我方招聘后立即办理正式会员手续，定为二级学徒。\n\n最终审核结果：§O同意！§!"
 USA.10032.a:0 "§R劳动、荣耀、祖国，致伟大的劳动骑士团万岁！§!"

 USA.10033.t:0 "采访"
 USA.10033.d:0 "威廉·斯泰德与美利坚合众国 迪克西党党员 西奥多·比尔博的谈话。\n\n“尊敬的斯泰德先生，虽然您的口才确实令我刮目相看，不过似乎还遗留了一点小瑕疵……我并不喜欢您称呼我为‘美利坚合众国’的什么什么后缀，叫我迪克西党党员就好。”\n\n……\n\n“什么叫有意分离？事实上，斯泰德先生，北方所谓的那个联邦政府，压根就不把我们南方人民，当成是美利坚合众国的合法公民。我就不用举什么悲惨的例子了，就拿80年代后的美利坚宪法来说-请您查阅查阅现在南方各州宪法的规定吧，无上限的劳动规定，不受控制的土地买卖，却还要每天应对着高额负债，以及那些游手好闲黑人们的威胁！这些东西，联邦政府有管过吗？事实证明，他管不了，但他拿着人民主权来当幌子，我曾经无数遍说过……联邦政府归根结底是拥有人民主权的各州意志所结成的产物，既然他诞生了，就要为各州负责，既然他自命不凡的自认为上帝意志的继承者，他却不给我们带来任何好处。”\n\n……\n\n“您是在认为我大谈集权主义吗，那可错了，实实在在的错了。北美的先人们早就把优越的制度扎根在这片肥沃的土地之中-华盛顿与先贤们缔造的联邦制。唉，可惜，我们这种优越制度的最后一次斗争，却在80年代让我们粉身碎骨。但这又有什么悲伤的呢，因为北方各州的恶毒，远要比我们强上千倍甚至万倍，而我们却至今都没有将怒火完全爆发出来，难道各种人民就这么想做北方的殖民地吗？对，您没听错，我说的就是殖民地。”\n\n……\n\n“让我们来看看联邦政府的作为吧，从1920年的海关改革开始，包括金融改革和妇女改革的一系列方案，事实证明，都没有经过南方人民的认可，但偏偏在于我们南方的那些蠢蛋，亦或是屈服于扬基的淫威，要不干脆就是叛徒……他们怎么能和北方站到一块去，把我们的尊严置之不顾，最近这几年，南方人民已经彻底无法忍受了，我们迟早是要表达我们的意见的，而且我们马上就会行动，无论他……发表了多么华丽的安慰文章，但是掩盖不了一种本质：这种本质就是帝国统治，现在的联邦政府就是以前的英帝国，那么现在……”"
 USA.10033.a:0 "“§R我们就是北美的革命者！§!”"

 USA.10034.t:0 "飞翔的雄鹰（4）"
 USA.10034.d:0 "潘兴将军回到了自己的住所。\n\n难得的闲暇时光，在内华达山脉西边的这个角落，在这丰满草地深处的小别墅里，他又一次可以见到妻子与女儿的照片。\n\n悲情将军？不，那只是别人给潘兴的定义。望着那最醒目的桌柜上的那一张全家合照，潘兴久久不能离去。从来不是因为遭受了如此恐怖的打击，却仍然要留在西部的那个悲情将军-只是，他再也不能离开这里，也不能真正的离开了。\n\n阳光从床边洒满客厅，在这间不算小的别墅里，除了潘兴和他的影子可以相互作伴，也就只剩下他与家人的一张张照片，还有一些无所谓的家具被精致的摆放，尽管他们毫无意义，但这里确实像曾经的那个家。拿起大女儿的照片，却仿佛又不能经受住那种痛苦，便扶着脑袋将其放下。\n\n“§R爸爸，爸爸！爸……约翰！轰隆！§!”\n\n“啊……”，倾刻间就缠绕全身，又是这惨痛的经历，每一次回想起来，他就头痛欲裂。在那脑海中时刻回响的爆炸声与火焰吱吱作响的声音，以及最后一丝的哭泣，无时无刻地在折磨他的神经。就连上帝也要授予潘兴如此令人绝望的惩罚吗？为什么当时的防守如此严密，都会让绑匪溜进潘兴的家里，为什么家人不回到东部去……为什么在以为平安无事的时刻里，却忽略了不知从何而来的灾祸。\n\n他再次拿起二女儿的照片-1915年，还剩一年……在那可爱的眼睛中，却看到了另外一双眼睛。\n\n潘兴跨上马，腰间系着一大袋印第安人的头皮-这是他的战功，他第一次能够获得如此多的战利品，让他欣喜若狂。没错，这又是一个真正美国人的证明。远处帐篷的火焰仿佛锦上添花，诉说着又一个西部野蛮之地的堕落与彻底灭亡。\n\n但在这火焰之中，潘兴注意到了一个通体黝黑的印第安小孩，在这幼稚的脸庞上，却长着一只与年龄气质极不相符的眼睛。\n\n那眼睛与潘兴四目相对，身旁的烈焰不时跳动，仿佛这火焰撰写了潘兴自降生以来的所有事迹。这到底是1885年还是1916年的记忆-难道这是没有年限的场景？\n\n呼，现在的他应该走了，去回去领他的奖赏。\n\n而在潘兴即将离开这个是非之地时，那个印第安小孩却张大嘴巴。\n\n“爸爸？”"
 USA.10034.a:0 "§R“约翰！！！”§!"

 USA.10035.t:0 "白宫访客"
 USA.10035.d:0 "两个人来不及放下已经淋湿的雨伞，就径直的走到了白宫的总统办公室门前，窗外下了一中午的暴雨，以及似乎从波托马克河一侧传来的隆隆炮响，却也比不过屋内的水滴-混杂着皮鞋的嗒嗒声来的刺耳。白宫内的所有人都在急急忙忙的收拾文件，准备撤离到美利坚的第一个战时首都-波士顿。\n\n不必等工作人员前来，门就被屋中的人打开了。两人中已经满头白发的那个老头伸出手来表示谢意，但却不是他意料之中的那位谦虚的总统，真是奇怪……也不是秘书，总统办公室什么时候有常驻服务员了。\n\n再往前看，一张硕大的办公桌几乎完全要被一张同样硕大的美国地图给覆盖了，只可惜我们的哈定总统并没有指挥军队的天赋，而是继续捣鼓着他的扑克牌。数十张扑克牌就这么散乱的放在地图上，任由哈定总统来回摆弄，但谁都不清楚他到底是在看地图上的战争标记，还是真的只是在玩牌……\n\n经过短暂的寒暄后，安德鲁·梅隆与皮埃尔·杜邦坐在了摆好的座位上。哈定总统随手把手上的牌全部一扔，用手指指了指田纳西州的前线标记。\n\n“看看吧，两位先生，祖国英勇的小伙子们正在前线战斗，而作为工业大国的美利坚，竟然没能满足前线军需的要求……西部也是一团乱麻……哦，对，不是军事，两位先生找我来是干什么来着……”\n\n经过比信里更加详细的解释后，哈定总统开始抵着他的下巴，做出一副沉思的模样。\n\n“两位先生，虽然我知道你们对于美利坚国内态势的急切心情，不过嘛……如果两位先生领导企业加入我们的战线，那这会是否影响到我们美利坚一以贯之的企业中立政策？您要知道，我国的许多大公司在南方也有相当可观的资产-如果这些东西被南方的叛国者们据为己有，甚至损毁殆尽，对于我们美利坚的经济以及将来的战后建设来说，损失都是重大的……”\n\n“不不不，总统先生。”皮埃尔站了起来。\n\n"此次会谈事关重大，希望您可以谨慎考虑。您也说过了，前线的军事物资十分吃紧，而这恰恰说明了祖国需要我们。我可以以我祖上与美利坚的深厚情谊发誓，今天我们的决定绝对不会干扰了美国企业的正常运行，恰恰相反，我们从来都是与联邦政府站在一起的。！所以说……”\n\n忽然，总统办公室的灯泡在顷刻间全部熄灭，只留下了窗外轰轰作响的雷鸣声，以及窗内只剩阴影的三个人-还有一个不知所措的服务员。"
 USA.10035.a:0 "“还站在这儿干啥，给我去把应急电源给开了！”"

 USA.10036.t:0 "面包生意"
 USA.10036.d:0 "海浪轻快的敲击着船舷，汽笛鸣响一阵悠扬的号声，但并未驱散层层围拢的聒噪海鸥，更不会驱散马丁同迈阿密的阳光一般明媚的心情。\n\n“要靠港了！你们这群懒猪赶紧把货从底仓里搬上来，闷坏了你们可赔不起！”马丁一边用卡斯蒂利亚语吆喝着船员们，一边得意的在甲板上踱来踱去。\n\n伸出手，从开裂的板条箱里捻出油纸包裹抖落的一点碎渣，丢进嘴里细细咀嚼。唾液顿时变得甘美中略带苦涩，股股烟草伴着名贵香料的气息盈满鼻腔，在深吸一口咸腥的海风，马丁船长嘴角的弧度不可抑制的上扬：“一个国家居然有两种海关，美国可真是个天杀的好地方！”\n\n佛罗里达的耀眼阳光钻进他咧开的嘴角，让马丁船长满嘴的黄牙闪现出财富的光芒。\n\n……\n\n“蹬蹬噔”。靠岸没多久，舷梯上就响起急促的脚步。马丁一脸殷勤的凑上前：“路易斯老兄，老规矩，别来无……”然而，跃上甲板的是一队远远出乎马丁意料的身影，盯着他们醒目的白底红十字袖标，马丁船长硬生生把后半句咽回了肚子里-在美国碰到这些人，可不是什么好兆头。\n\n“劳动骑士团迈阿密分总部，现在代替迈阿密海关进行例行检查，请出示货物名单。”带头的骑士小队长将粗壮的前臂抱在胸前，审视着西班牙船长。\n\n马丁船长满脸堆上笑，仍旧热情的迎上去，“劳您大驾，……骑士…老爷。怎的这里也归你们检查了，之前不是海关的路易斯那小子管吗…”小队长对马丁浓厚的西班牙口语皱了皱眉，开口打断道：“那个贪污犯前阵子支部成立的时候被我们揪出来丢进牢里了，你打听他干什么？船上有什么见不得人的东西？”马丁船长心底暗叫不好。\n\n事到如今，不大出血肯定是过不了这关了。马丁肉疼的从袖管里摸出厚厚一卷美金藏在手里，紧紧握住小队长的手，让他感受这份沉甸甸的诚意：“面包！船上运的是古巴来的，上好的面包！“\n\n魁梧的小队长却发出一声短暂的冷笑，一把打落马丁船长的手，揪起他的领子大骂：“你当骑士团是那帮蝇营狗苟？政府提高关税，就是让我们抓你们这群狗娘养的走私犯！给我搜！”船长的手刚伸向腰间的手枪，但见到八支冲锋枪黑洞洞的枪口，只得明智的举起手。\n\n马丁船长沉甸甸的财富被一箱箱搬下船，而船长本人则哭丧着脸哀求着小队长：“老…不，同志，给小的留点吧，五箱……不……一箱也好啊……”小队长露出一抹玩味的笑容：“劳动骑士团秉公执法，这些货会被以合适的价格买下来。”\n\n望着马丁船长难以置信的狂喜神色，小队长哈哈大笑的补充道：“当然，是以面包的市场价格。”"
 USA.10036.a:0 "“而且，所有权归劳动骑士团！”"

 USA.10037.t:0 "斯特朗的第1次外出任务"
 USA.10037.d:0 "科尔推开了充满臭气的门\n\n“喂，那个穿白衬衫的傻……哦……先…”那个穿破烂水手服的家伙抖抖嗦嗦地从台吧上跳了下来。\n\n科尔右边一拳直接将那个醉鬼翻倒在地，再用左拳拎起来，并直勾勾地对视着他。\n\n“啊喂喂喂，他妈的，我可没犯什么事儿啊，我我这…没有，没有鸦片，没有二乙酰吗啡…哎哟，我去！”\n\n右拳第二次打到了他的脸上，而左拳则用力把他甩出了科尔的视野-这人踉踉跄跄的逃跑了。\n\n此时除了他们两个，以及脚步声，酒吧里寂静的出奇，无论是瘦小的服务生还是粗胳膊粗腿的品酒家们，直勾勾但又有点呆滞的盯着科尔。\n\n斯特朗也为科尔刚才的一番作为震住了，科尔下意识的拍了拍他的肩膀，斯特朗却一抖把肩膀缩了回去。\n\n“好了好了，宣传科的新晋学士，我亲爱的同志，现在该场所的恶徒，已经被我们亲爱的第六中队中队长科尔.李给赶跑了！”科尔用那极大的嗓门开口说话，仿佛如一头狮子般，正对着所有人展开他的血盆大口。\n\n“刚才那个人……之前是个毒贩，混蛋，可惜了，没让他丢了脑袋，但他可是我们当地骑士团的黑名单成员，这个地方就是他曾经的交易场所，他竟然还敢回来！我难道就不能为社会出口恶气吗？”科尔正在自顾自的讲着；而斯特朗则赶紧跑到一旁，带着那几个同属宣传科的小学徒们，一起把劳动骑士团的巨大的宣传图标，正正当当地贴在了酒吧的墙壁上。\n\n“学士先生，这是您的第一次执勤任务，虽然说工作量不大，但来这种地方，可足够把某些人吓跑了……\n\n“中队长…科尔同志，万一恶徒们撕了我们的海报，然后，要是有枪，我们可怎么办？”斯特朗惶恐不安地站在科尔的旁边，身边还有更加张皇失措的学徒们-他们似乎已经看见了吧台后面的大手枪。\n\n“同志们，我们为什么有能力来这种鱼龙混杂的场所贴我们的宣传报？”\n\n“因为您…伸张正义？还是……”\n\n“哼哼……”。科尔招呼进外面的中队成员进来，他们人人都拿着一把冲锋枪，腰间别着只属于骑士团那风格的治安棍。“任何地方能贴我们的宣传报，这正是我们力量的证明。”科尔双手叉腰，仿佛再次在这个地方宣誓骑士团的权威。\n\n这时，斯特朗才想起来，他在酒吧里看到的那张海报。在当时，他就觉得十分奇怪，凭什么在最醒目且脏的要命的墙壁上，却贴了一张干干净净，与酒吧毫不相关的告示。不过那血红十字的符号，在现在，却给斯特朗带来了一丝安稳。"
 USA.10037.a:0 "“还好啊，我当时没借着酒劲儿把他抠下来……”"

 USA.10038.t:0 "到圣弗朗西斯科去"
 USA.10038.d:0 "“妈妈，什么时候才能到圣弗朗西斯科，还是明天？”卡米拉不厌其烦的大声喊叫。\n\n在这黄沙漫天的大地上，这沙哑又稚嫩的声音吸引了加州秃鹰的注意，那又秃又丑的脑袋从巢穴中探了出来，直直的盯着大风中行走的队伍。\n\n妈妈赶紧捂住了卡米拉的嘴，又环顾了四周-除了远方的红岩和孤零零的几个仙人掌，以及随处可见风滚草，什么都没有，哪怕连一匹马都没有看见。\n\n妈妈将卡米拉扛在自己的肩上，在她的耳旁说。“我跟你说了多少遍了，不要发出声音，哪怕是遇到了野兽和人，也不要发出声音，口渴了就低声问妈妈，半夜看到火堆，不要跑过去，还有……”\n\n“可是，妈妈，我现在就口渴……”卡米拉略带着哭腔，不过她的眼睛里掉不出一粒眼泪。\n\n“好，好，等我们找到了水，你想喝多少就喝多少。”\n\n“但是，还有……”卡米拉紧紧的靠在妈妈的脖子上。“风好大，沙子又大又多，吹得我眼睛好痛！”\n\n“哦，我亲爱的玛利亚，没事，等妈妈把头巾缠在你的眼睛上，眼睛就都不痛了，不痛了。”\n\n阿玛多尔急忙忙的牵着两匹半死不活的马，但是在马的身后还有一个大篷车；尽管这篷车里只装了五分之一法内加的水，七分之一法内加的面包，但是队伍还得继续前行。在这个大篷车的后面，还零零散散的跟着二十多个人，他们都是跟着阿玛尔多夫妇前往美国的墨西哥人，而原本预计充足的食物和水早就被他们一扫而光了。他们现在距离卡森城，还有80英里。\n\n被蒙着眼睛的卡米拉地声的问妈妈。“妈妈，我知道我们没钱坐火车，但为什么我们不能从道路上前往圣弗朗西斯科，我真不喜欢在这地狱里头野营……”。“这就对了，孩子，换了一种方式进入美国，带你去你喜欢的圣弗朗西斯科，并且，这样或许还能永久的在那里，别人也不会问你，你是怎么……”妈妈的话愈发嘶哑，索性不再说下去了，亦或是又不想说出什么。\n\n加州秃鹰煽动那长达三米的翅膀，从碎石掩盖的山洞中一跃而起，在天空中发出阵阵刺耳的鸣叫，击穿了沙子构成的屏障，传到了阿玛多尔的耳中，卡米拉在饥饿与极度口渴的环境中，已经入睡。\n\n而她在睁眼时，刚摆脱了被老鹰抓走的梦境的她果真又听到了一丝刺耳的叫声-不过这是妈妈发出的。此时太阳已经落山，而艳红太阳感染的地方，露出了一道道人影，以及许多良马的嘶叫声。\n\n几阵枪声，那些人骑着马就飞驰而下，团团围住了车队。大篷车前升起了火焰，只可惜队伍中有人不听劝告，在前两个时辰为了烤熟捕获的野兔，点燃了似乎不起眼的木堆。\n\n谁也不知道卡米拉在当时是否清醒，但当卡米拉回忆这一切的往事时，她只记得一件事。\n\n那个穿着厚风衣的家伙，左手拿着一份有着黑黄相间的纸张，而右手的手枪则一枪打穿了阿玛多尔的脑袋。"
 USA.10038.a:0 "然后，目光所触，到处都在杀人"

 USA.10039.t:0 "家"
 USA.10039.d:0 "奥勒姆，一座因西部铁路扩建而快速开发的新兴城市，尽管这座城市的人口只有9000人，但是新修建的电灯设施铺满了全城，仍让人感受到了些许繁华。\n\n在靠近市中心的一栋装饰精美的公寓楼里，艾比盖尔正准备着晚餐，而儿子仍然窝在书房里不愿离去，真是奇怪，是什么样的书让他这么着迷……\n\n不过，就连男人，也是两周三周不回来。\n\n“啧，想当年老娘还陪着他流浪呢，几天不回家算什么的，自己这么抱怨……”。她随手又拿起了那件半成品衣服，一刻不停地织着。尽管已经进入春季，犹他州开始升温，但早上依旧是略带寒冷，晚上则冷风刺骨，毛衣不可不带。\n\n常在野外骑马的他，虽然已经练就一身好体魄，但是在西部世界已经算得上老大的年龄，是否还能经得住天气和人的无常，在她的心里还是个问号。\n\n“咚，咚咚”。清脆而急促的敲门，一看就知道是男人回来了。\n\n打开木质的家门，一个高大的人物便侧身闪进了家中，身上还带着那种从荒野归来的汗水与粉尘交杂的味道，但同时没有了隐隐约约的干血味-艾比盖尔这种味道很敏感。\n\n“回来了？赶快坐下吧，哎呀，一切都等着呢，看看，晚饭都给你准备好了，这是跟唐斯太太学的，惠灵顿牛排，杰克正在书房，不知道倒腾什么玩意儿”。\n\n“哎哟……啧，几天没见，怎么活成了个贵妇人的模样，你可真忘了，当年在大平原我是……”。男人话没说完，就看见了女人眼中那一闪而过的怨恨；或许是自己在人多的地方生活惯了，人情世故的东西也渐渐懂得，他一下子就闭上了嘴，尽管这严重不符合他的性格。\n\n“唉，不扯了，正好享受享受铁路带来的水缸，啊哈？”。他说完便转身直接打开了书房的门。自己的儿子杰克哪里是在看什么书啊，这是在为公司疯狂记账呢，本来自己就不太受儿子待见，既然有忙的时候。那约翰也不去打扰他了。\n\n用毛巾擦完自己湿漉漉的头发后，约翰一屁股坐在沙发上，这沙发的舒适感，精致的牛皮沙发，可是过去30年从来没享受过的，只可惜，奥勒姆只是一个极小的天堂，只要离开铁路线10公里之外，便是无法无天的西部世界。\n\n“今天又帮该死的缉侦队拿了一伙强盗，一伙子，从老墨马克西米利安来的强盗，二十多个人”。\n\n“嗨，他们或许只是一群可怜的难民，偷渡客，这地界多的是”。艾比盖尔坐在沙发上，对着他说。\n\n“唉，也许吧，强盗拖家带口的可不多，这批人又不像帮派……确实不像，但总有些例外”。\n\n“我答应过所有人，我从来不杀女人与孩子，我只是让他们离开这里，越远越好”。马斯顿点了一支烟，随手在桌上拿起了那瓶熠熠生辉的威士忌，咕噜咕噜几口干完。\n\n家里门窗紧闭，窗户的窗帘几乎24小时掩盖着屋内，墙壁上贴满了约翰的日程表-尽管他几乎从来不会将自己的任务告诉家里，但是艾比盖尔还成天地计算他出走的时间。\n\n夜晚的奥勒姆光辉璀璨，但面对如混沌般的黑夜，就连火车也乖乖的躺在了车站中，有时只能听见远处凄惨的鸟叫，但亦或是被风干扰过的枪声。"
 USA.10039.a:0 "但无论如何，约翰总算又一次的回了家。"

 USA.10040.t:0 "雪线"
 USA.10040.d:0 "当雪花落在窗户上的那一刻，他便知道，自己并不期待的冬季已经完全的到来了。\n\n这里是密苏里州与阿肯色州的交界处，其边界便是一条直直的线-在这条直直的线的两边，人们可以随意穿行，可以去探亲访友，可以去做所有合法的买卖，或者来一场说走就走的旅行；当外国游客探访至此时，看到如此正常的景象，便即将放下疑惑的心，无所谓地看待所谓的“南北分界线”，但大概转眼之间，便能看到在那地平线的尽头，有两个分别安插了自己州旗的哨所，以及不计其数的沙袋与护栏。\n\n当南北过往的行人欢声笑语地，且丝毫不在意军事设施地从房子旁走过，他并不会希望与他们一样穿过那条线；对于普通的人来说，那条线仅仅是存在政治文件和地理概念上的东西，而对于他来说，跨过那条线，迎接自己的便是对方黑洞洞的枪口、子弹亦或是军事法庭的审判-这对于对方的那个人也是如此。\n\n那条线对于哨所内的双方是死亡，冲突，邪恶的象征。\n\n由众多沙带与护栏围起来的军事哨所就这么屹立在边界上，就犹如一个小点在地图上标记那样。同为美国人，由于肩上依然扛着“国民警卫队”的标识，他依然要执行自己每天必须做的任务。他走出屋子，擦了擦刚刚落在脸上的雪，挺直腰板，直面着对面的哨所保持立正姿势，而对方也以同样的方式予以回应。\n\n“呼……”。一位士兵吹开了眼前的雪，并且一直接收着屹立在对面士兵的眼神，那眼神中的冷漠，也同他的一样，传递到了士兵的心里去。而天上的雪似乎不留情，在几阵强风吹过，降雪的势头愈演愈烈，两位士兵的帽子都已经变得雪白，就连睫毛也染上了白色。这风和雪混杂在一起，持续地考验两位士兵的耐力。而两位士兵都不能放弃，他们在雪中站得更直，仿佛对面是敌国一般的竞争对手，他们都在为了自己的美国而站立。\n\n是啊，对于线两旁的人来说，这世间只有一个美国。\n\n最后，两位士兵似乎都有点顶不住，他们纷纷回到自己的屋子内，赶紧烧上一盆炭火烤暖，并且狠狠地点上雪茄。两位士兵不约而同的转过身去，边抽着雪茄，边隔着窗户眺望对方，但谁都已经不愿意在暴雪之中继续站立了，他们现在只想好好的休息一下，并担心如此猛烈的暴雪是否会对哨所构成威胁。\n\n屋外大雪纷飞，云屯雾集，白与灰笼罩了天地，逼着人不得不用灯出行，或者在家蜗居。\n\n一辆卖炭马车靠近了边界线，而其中一位士兵将要出门购置煤炭时，却发现马车早已在茫茫大雪中越过了线；对面的他并没有购买煤炭，而是用眼睛直勾勾的盯着一辆烤饼车越过了边界线，只不过是在对面一边。\n\n两人同时冲出哨所，开始呼叫对面的车往回走，而两边的车都没有听见，不停的往深不可见的雾中行走。但在此刻，双方却听清了在边界对面的呼声。那呼声在风中是多么的清晰，当他们回过头，他们似乎站在了一起，他们的视线不与自己的哨站对齐-州旗被雪所掩埋，用颜料画出的边界线早已被皑皑白雪所覆盖。他们已然分不清自己的哨所位于哪方。"
 USA.10040.a:0 "而此刻，他们正在同一条线上望向对方"

 USA.10041.t:0 "巴拿马城的密会"
 USA.10041.d:0 "1921年的巴拿马城，阳光洒在运河的波光上，映照出一片金色的辉煌，运河边来了一群又一群观望美国总统的当地百姓。哈定总统站在运河边，望着远处繁忙的船只，心中却想着即将到来的会面。他刚刚在城中游玩了一番，品尝了当地富有盛名的龙虾炖汤，然而还没吃完，就收到了法国总理的私人会谈邀请。他深吸一口气，转身进入车内，车开向了那座隐秘的别墅。\n\n别墅内，法国总理早已等候多时。两人握手寒暄，哈定总统微笑着说道：“总理先生，巴拿马城真是个美丽的地方，我刚在城中游玩了一番，感受到了这里的热情与活力。”\n\n法国总理点头回应：“确实，这座城市有着独特的魅力，因为这是我们法国人呕心沥血所建造的美洲天堂之城。总统先生，我们此次会面，是为了解决我们两国之间的一些历史遗留问题。”\n\n哈定总统坐下，神情变得严肃：“是的，总理先生。我们两国自南北战争前后的矛盾一直存在，但我认为现在是时候搁置这些分歧，共同面对未来了。”\n\n“总统先生，我同意您的看法。我们法国也曾经历过战争的痛苦，深知和平的珍贵。我们愿意与贵国达成平等协议，共同发展。”\n\n“很好，总理先生。我们可以在一系列贸易问题上达成共识，促进两国经济的繁荣。同时，我认为我们还可以在更广泛的领域进行合作，比如对抗英国的霸权。”\n\n法国总理微微一笑：“总统先生，您的提议很有远见。英国确实在全球范围内有着巨大的影响力，但我们两国联合起来，完全可以与之抗衡。”\n\n哈定总统点头：“是的，总理先生。我们可以通过合作，打破英国的垄断，为世界带来更多的平衡与公正。”\n\n两人相视一笑，仿佛已经看到了未来的美好蓝图。哈定总统继续说道：“总理先生，我相信我们的合作将会为两国人民带来福祉，也会为世界和平做出贡献。”\n\n而不一会两人却都陷入了一段沉默，哈定总统率先开口：“那个，嗯，今天的晚宴，我想品尝一下巴拿马的龙虾炖汤，听说这道美食在巴拿马地区甚至法国本土广受好评，是吧。”\n\n法国总理听完后先是愣了一下，然后哈哈大笑。"
 USA.10041.a:0 "总统先生游玩的非常愉快，不是吗？"

 USA.10042.t:0 "《迪克西党的谎言大法：南方独立分子的无耻嘴脸》"
 USA.10042.d:0 "听着，你们这帮狗娘养的迪独，你们以为自己是谁？躲在南方的棉花地里，一边啃着炸鸡，一边对着北方的扬基党喷粪？你们这群自以为是的叛徒，整天嚷嚷着“南方独立”，好像你们真能靠那点可怜的政治伎俩和满嘴的谎言把北方人唬住似的。我告诉你们，扬基党可不是吃素的，我们早就看穿了你们那点龌龊的把戏！\n\n你们这群独立分子，整天喊着“南方独立”，好像你们真能靠那点可怜的支持率把南方从美国分裂出去似的。你们以为靠那些煽动性的口号和虚假的承诺，就能让南方人跟着你们走上不归路？做梦吧！你们这群自私自利的混蛋，根本不在乎南方人的死活，只在乎自己的政治利益！只在乎英法扔给你的几个臭钱！\n\n你们身后的那个迪克西党整天在新闻上大放厥词，说什么扬基党“压迫南方”、“剥夺南方人的自由”。放屁！你们这群虚伪的混蛋，明明是自己搞分裂、搞破坏，还反过来倒打一耙！你们以为靠那些贼心剪辑的，断章取义的报道，就能让北方人相信你们的鬼话？省省吧！我们扬基党可不是你们那群被洗脑的南方乡巴佬，我们有脑子，有眼睛，看得清清楚楚！\n\n还有你们那群所谓的“南方领袖”，整天在报纸上装模作样，说什么“为了南方的未来”。呸！你们这群道貌岸然的伪君子，根本就是为了自己的权力和地位！你们以为靠那些花言巧语和虚假的承诺，就能让南方人相信你们是他们的救世主？省省吧，你们这群骗子，你们的口号再响亮，也掩盖不了你们内心的肮脏和卑鄙！\n\n听着，迪克西党的狗崽子们，你们再怎么抹黑扬基党，再怎么煽动南方独立，也改变不了你们是叛徒的事实！你们这群无耻的混蛋，迟早会被历史钉在耻辱柱上！扬基党不会让你们得逞的，我们会用行动告诉你们，什么才是真正的美国精神！你们这群叛徒，等着瞧吧！"
 USA.10042.a:0 "这是谁写的狗屁文章？"

 USA.10043.t:0 "劳动的合奏曲"
 USA.10043.d:0 "纽约曼哈顿，全美劳动联盟-劳动骑士团纽约总部大楼的第10层，主席团会议厅，巨大的水晶吊灯在烟雾中摇晃。保罗·瓦卡莱利用手不停地摆弄雪茄头，而主席团的其他成员都沉默不语。\n\n"你的人在苏圣玛丽矿区埋了十二个骑士，你管这叫意外冲突。"阿诺德·罗斯坦把威士忌杯砸在橡木桌上，冰球弹起来撞碎了一顶吊灯的玻璃罩，"现在跟我说不想碰底特律这滩血，然后让我去管底特律的那堆破事？"\n\n瓦卡莱利的手掌始终贴着柯尔特左轮的蛇纹枪柄。这个西西里人穿着订制的双排扣黑色骑士团制服，胸口金线绣的却不是红十字徽章，而是朵黑色百合——那是他母亲死在热那亚港时手里攥着的花。  \n\n“上个月密歇根大量分总部的运输队被劫，"他吐出的烟雾在罗斯坦金丝眼镜上蒙了层纱，"一车皮硝化甘油，早就做好防备了，但劫匪用的是骑士团内部口令。"匕首尖突然插进地图，"你说巧不巧？"\n\n罗斯坦的拇指摩挲着镀金怀表链。他刚想继续反驳瓦卡莱利，大门的吱呀声突然撕破会议间的寂静。\n\n小约翰·D·洛克菲勒的牛皮靴跟敲击着木地板，传出了如屠宰厂般的噪音\n\n"先生们"。他停下脚步，"暴徒的钢炉刚熔了你们底特律总部的第7个高级领导人了"。他边说边摆弄着他的公文箱，暗格弹开的瞬间，几张支票飞在了地图上，盖住了底特律的标识，也盖住了瓦卡莱利设定的路线，"能出多少人，够拯救多少条命呢，瓦卡莱利先生，罗斯坦先生？"\n\n瓦卡莱利闻到了海风的味道。是纽约港的咸味，二十年前他蜷缩在偷渡船底时，那些濒死者失禁的恶臭，与这些支票的气息相同。\n\n"三小时前，摩根先生往白宫打了电话。"小洛克菲勒漫不经心的拨弄着公文箱。"据我们所了解，底特律的幕后黑手，好像姓...卡洛？，嗨，应该是假名吧"\n\n西西里人的瞳孔收缩成针尖。他想起三个月前寄往底特律的信，想起侄子在码头卸货时突然被海关带走，至今动用关系也没有把他放出来。罗斯坦顿时如毒蛇一般冷笑："现在愿意谈谈出兵的事了？"\n\n主席团全体表决过后，罗斯坦从座位上站了起来。"通知俄亥俄，印第安纳，肯塔基的各分总部。"罗斯坦在月台上扣紧镶着红十字徽章的武装带，"圣诞节要到了，喜庆点，把装甲列车涂上红十字，我们要给底特律的混蛋们送份大礼。"  “纽约州这边用不着你管了，我肯定安排。”瓦卡莱利补充道。\n\n瓦卡莱利握着已发出的电报，望着哈德逊河上的浓雾，河对岸，自由女神像的火炬在雨幕中忽明忽暗，与他的心跳一起同步。\n\n此刻的底特律或者大瀑布城，某个来自意大利或爱尔兰姑娘正在给自制燃烧瓶系上黑百合绸带。她不知道纽约发生了什么，只记得父亲被骑士团拖走时，皮靴在地里划出的一道道血痕。"
 USA.10043.a:0 "他们的身份都有劳动之名"

 USA.10044.t:0 "飞翔的众鹰"
 USA.10044.d:0 "春夏之交，冰山最后的馈赠也即将消耗殆尽。随着烈日的到来，大地的水分开始蒸腾，西部的万物似乎被炎热所点燃，变得躁动不安。\n\n犹他州的荒漠被炙烤成了干片面包。西部第一骑兵师的前线指挥部内，地图上密密麻麻的红蓝箭头交织成网。潘兴站在沙盘前，灰白的胡须微微颤动，手中的马鞭轻敲着桌沿。他的目光如鹰隼般锐利，扫过在场的每一位军官。\n\n潘兴率先开口：“把各位都召集到这里来，不光是为了要统一应对敌人的进攻，更是要借此机会，为西部的我们赢得更多的机会……”。\n\n“将军，后者暂时不用顾虑。”马歇尔上校推了推金丝眼镜，冷静地望着他。“我们应该优先考虑怎样阻止敌人进攻，我已经在事先在骑一师拟定好了方案；根据情报，敌人的主力藏在‘黑石峡谷’，地形复杂，易守难攻。我建议从东侧迂回，切断补给线。”\n\n“迂回？”已经成为师长的临时准将巴顿猛地拍桌站起，军靴上的马刺叮当作响，“马歇尔，你的战术太保守了！不过是缺衣少粮的恶棍而已，我们应该直接冲进去，用骑兵的速度撕开他们的防线，用坦克碾死他们！艾克，你说呢？”\n\n骑一师第一团的艾森豪威尔上校微微一笑，手指在地图上划过：“史密斯，你的勇气无人能及，但这次我支持马歇尔。我们可以用装甲车掩护步兵，从峡谷两侧夹击，逼他们出来决战。”\n\n潘兴环顾一周，发现并没有人想要听自己讲完话。他的目光转向角落里的克拉克中尉。这位年轻的军官正专注地记录会议内容，笔尖在纸上沙沙作响。潘兴开口道：“马克，你只管记我们关于应用战术的谈话，其他碎言碎语就不用了。”\n\n克拉克抬起头，他看了看其他人，对潘兴说：“将军，关于记录的事儿我明白。但我认为可以利用牛仔的内部矛盾，因为他们的头领‘红眼’山姆和副手‘独狼’杰克最近因为战利品分配闹翻了，其队伍是分成两批的，只用少量部队便可以逐一击破。既然要向东部表明我们的态度，为何不同时结合以上的两种方案，以此造大声势呢，难道我们不是有很多相机和录像机吗？”\n\n会议室内一片寂静，随后潘兴大笑起来：“好小子，有胆识！巴顿，你从哪挖来这么个宝贝？……马克，你将来肯定有当将军和政治家的料，指挥千军万马应该不成问题吧？”潘兴将军打趣的说道。\n\n作战计划很快敲定。次日黎明，特遣军兵分两路：艾森豪威尔指挥装甲车从峡谷两侧推进，巴顿则亲率骑兵直插峡谷腹地。\n\n战斗打响时，潘兴的望远镜中映出巴顿的骑兵如旋风般席卷峡谷。艾森豪威尔的装甲车炮火轰鸣，两支部队正逐步压缩敌人的活动空间。然而，真正的转折点来自马歇尔的行动。他成功说服“独狼”杰克叛变，里应外合打开了峡谷的侧门。牛仔的防线瞬间崩溃，“红眼”山姆在乱战中被艾森豪威尔的得力干将布莱德利亲手击毙。\n\n夜晚，正当其他人都在为早晨的胜利而庆祝时，前线指挥部内，克拉克却望着战报上的一片片数字-其中有许多后面是刻意夸大的。他沉默不已。\n\n潘兴走了过来，拍了拍他的肩膀，目光深邃：“战争就是这样，年轻人。我们能做的，就是让每一次胜利都值得。”\n\n夜幕降临，荒漠的风吹过营地，给炎热的大地带来一丝凉意。西部特遣军的旗帜在月光下飘扬，仿佛在诉说着这片土地上无尽的征战与牺牲。"
 USA.10044.a:0 "-1920年5月15日，犹他州"

 USA.10045.t:0 "西部战报"
 USA.10045.d:0 "（打开文件）\n\n美国西部特遣军战报\n发报者：西部特遣军总司令 约翰·J·潘兴\n收报者：美国陆军参谋部\n收报日期：1920年5月18日\n地点：犹他州 贾布县 “黑石山谷”\n\n战报内容如下：\n\n1. 作战概述\n我部于5月15日清晨对盘踞在犹他州黑石山谷的一伙匪帮发动围剿行动。该匪帮长期袭扰铁路沿线，劫掠物资，威胁我西部运输线及其西部各州公民安全。\n\n2. 参战兵力\n我方参战部队：西部第一骑兵师第一团、第二团，及劳动骑士团犹他州分总部的两个中队，总计兵力4,200人。\n敌方兵力：约2000名匪徒，包括反政府游击队、墨西哥偷渡者及印第安武装分子。  敌方首领为西部有名的土匪。\n\n3.战斗结果\n敌方伤亡：击毙1,234人（包括其首领），俘虏450人（包括其副首领），其余溃散。\n我方伤亡（包括我西部特遣军和劳动骑士团）：阵亡105人，负伤152人，其中劳动骑士团阵亡32人，负伤9人。\n武器损耗：消耗弹药约50,000发，损毁步枪支，机枪2挺。\n缴获武器以及物资：共计1,432件枪支，包括长步枪850支、转轮手枪200把，短土枪和轻机枪若干。缴获炸药50箱及大量刺刀。缴获约500匹马及其饲料。\n\n4. 战术总结\n我部利用山谷地形实施包围战术，劳动骑士团从山谷后部突袭，成功切断匪帮退路。敌方虽负隅顽抗，但在我方火力压制下迅速崩溃。\n\n5. 后续行动\n\n已派遣第三骑兵团追击溃散匪徒，确保铁路沿线安全。缴获武器将补充至前线部队，俘虏将移交联邦军事法庭审判。  战斗期间拍摄的照片及录像将会在近日寄送至美国陆军部。此战告捷，祝美利坚合众国万岁！\n\n——约翰·J·潘兴 西部第一骑兵师犹他州前线指挥部"
 USA.10045.a:0 "唉……不得不信啊（签名确认）"
 USA_AUSA.10045:0 "（签名确认）"

 USA.10046.t:0 "美国的金鹰"
 USA.10046.d:0 "纽约，J·P摩根总部大楼。屋顶射出的灯光在轻轻晃动，将阴影投在杰克·摩根那张冷硬的脸上。卡内基坐在他对面，手指紧握着手杖，指节发白。\n\n“皮尔庞特，你不能就这样抽走投资。”卡内基的声音沙哑，像是被铁锈磨过，“密歇根工厂毁了，但钢铁业不会倒。再给我半年——”\n\n摩根抬起眼皮，目光像一只对猎物毫无兴趣的狼。“安德鲁，你我都知道，这不是钱的问题。”他慢条斯理地啜了一口白兰地，“底特律暴动烧掉了半个工业区，你的股票现在比废纸强不了多少，就这么说吧，连那个同样被工人抽了耳光的梅隆，都比你们家的行情好看不少。”\n\n卡内基的胸口剧烈起伏。“你当初收购我的公司时，可不是这么说的。”\n\n“生意就是生意。”摩根放下酒杯，直接靠在自己的软皮沙发上。“联邦军队和劳动骑士团已经开进底特律了，你以为他们是为了救你的工厂？不，他们是为了把暴动的工人吊死在路灯上，然后嘛，洛克菲勒就会用极低的土地收购价，留给你点破产前的补偿。”\n\n卡内基猛地站起来，脸色铁青。“你——！”他的嘴唇颤抖着，突然捂住胸口，踉跄后退。摩根皱了皱眉，朝门外喊了一声：“叫医生。”\n\n两名仆人冲进来，架住摇摇欲坠的卡内基。摩根只是坐在原位，冷眼看着他被拖出去。\n\n秘书快步走进来，低声道：“先生，白宫来电，请您参加经济会议。”\n\n摩根哼了一声。“总统先生终于想起来要救市了？”\n\n“还有消息说，联邦军队和劳动骑士团联手镇压暴动，是洛克菲勒在背后推动。”\n\n摩根的手指轻轻敲击桌面。“果然。”他冷笑，“洛克菲勒这个老头想借机吞掉密歇根。让他去争吧，我们不必掺和。”\n\n“可如果密歇根落入他手里——”\n\n“钢铁业已经完了，至少暂时完了。”摩根站起身，整理了一下西装，“告诉白宫，我会去。至于卡内基……给他安排最好的医生。”\n\n他走向门口，脚步沉稳，仿佛刚才的对话不过是又一场无关痛痒的董事会。"
 USA.10046.a:0 "在这个时代，无论谁都得为摩根财团让路"

 USA.10047.t:0 "外交上的葬礼"
 USA.10047.d:0 "1920年的巴黎，空气中弥漫着红酒的味道。美国国务卿罗伯特·兰辛坐在凡尔赛宫的金色大厅里，手里捏着一枚磨损的金币，仿佛在掂量这场谈判的分量。而他的对面则分别是英国外交大臣寇松勋爵以及法国财政部长克洛茨。\n\n"先生们，"兰辛清了清嗓子，，"让我们像文明人一样，谈谈如何埋葬这个叫'金本位'的老古董。"\n\n寇松勋爵的眼镜片闪过一道寒光："亲爱的兰辛先生，您是想让我们把大英帝国的皇冠也一起埋了吗？"\n\n"恰恰相反，"兰辛露出微笑，"我们提议用纸做的王冠——轻便、流通量大，还能印上您喜欢的任何图案。"\n\n克洛茨突然插话，"美国人的纸，怕是连擦屁股都不够格！"\n\n兰辛假装没听见，从公文包里抽出一叠文件："根据我们的计算，如果三国联合废除金本位，世界经济将在五年内恢复——"\n\n"恢复成什么？"寇松打断他，"一个由华盛顿说了算的游乐场？"\n\n"一个更公平的世界，"兰辛的声音保持着坚定，"一个没有战争、没有饥荒、没有——"\n\n"没有英国和法国的世界？"克洛茨冷笑，"你们的总统是不是还打算把协约国改成'国际联盟警察局'，然后让他来当局长？"\n\n兰辛的额头渗出细密的汗珠。他想起临行前威尔逊的叮嘱："记住，罗伯特，外交就像打扑克——如果你手里没有好牌，就假装在数钱。"\n\n"先生们，"他换上最诚恳的语气，"我们只是想帮助欧洲重建——"。"用你们的条件？"寇松摘下眼镜，露出鹰隼般的眼神，"就像你们'帮助'海地和多米尼加那样？"\n\n谈判桌上的气氛比凡尔赛宫的壁炉还要闷热。兰辛的领结像绞索一样勒着他的脖子，他开始怀疑这场谈判是否比南北战争还要难打。\n\n"也许我们可以先从一个小目标开始，"他试图缓和气氛，"比如...临时..."\n\n克洛茨猛地站起来，椅子在地板上划出刺耳的声响："临时？就像你们在海地和多米尼加的'临时占领'一样？"\n\n寇松慢悠悠地吐了个烟圈："兰辛先生，您知道为什么英国人喜欢金本位吗？因为它不会像纸一样，被政客的谎言吹破。"\n\n兰辛终于放弃了外交辞令："所以你们宁愿看着欧洲在废墟中腐烂，也不愿接受美国的帮助？"\n\n"帮助？"克洛茨的冷笑声像刀片刮过玻璃，"你们管这叫帮助？我们管这叫'经济殖民'！"\n\n寇松优雅地掐灭雪茄："亲爱的兰辛，请转告威尔逊总统：大英帝国宁愿抱着金本位沉入海底，也不会坐上美国的纸船。"\n\n当兰辛走出凡尔赛宫时，巴黎的夜空正下着细雨。他突然觉得它比来时重了许多。\n\n"好吧，"他自言自语，"至少我们不用再假装喜欢法国菜了。"\n\n但至少，他再也不用听克洛茨用蹩脚的英语说"自由市场"了。"
 USA.10047.a:0 "英国佬和法国佬都是坏蛋……"

 USA.10048.t:0 "南方佬叛逃了"
 USA.10048.d:0 "白宫紧急军事简报\n\n日期：1921年6月21日\n\n报告方：美国陆军参谋部和海军参谋部联合报告\n\n尊敬的总统先生：在战争爆发的几天内，我联邦陆军与联邦海军的一些将领做出疯狂举动，率领服从于自己的部队南下叛逃。\n\n陆军一支队伍叛逃前焚毁了我密苏里州军事基地的弹药库，并带走了大量军需物资。其部队约2000人越过南北分界线，由一名南方人将军指挥。 还有一支约1000人的部队，自弗吉尼亚前线闯入南方，并公开宣布效忠南方，其部队包含两个南方人将军。\n\n海军墨西哥湾-南大西洋舰队、加勒比舰队有大量船只擅自离岗，不知去向，或就地加入南方，我墨西哥湾-南大西洋舰队在此次叛乱行动中遭受毁灭性的打击，仅有部分仍然忠于联邦政府的船只正开往北方。而海军上将威廉·薛佛·班森自6月19号起便消失不见，我们极度怀疑此人已经叛逃至南方。\n\n这些将领和士兵绝大部分为南方人，且在北方军队中服役时间较长。但经过调查，他们大多都没有参加南方各州的国民警卫队的经历，但不知为何忠于南方。\n\n建议封锁联邦军队有关叛逃的消息，并加强对剩余南方籍军官的监控和管制。\n\n报告完毕\n\n美国陆军参谋部和海军参谋部\n1921年6月21日"
 USA.10048.a:0 "妈的，我就知道南方佬不可靠"

 USA.10049.t:0 "最后一天的黄昏"
 USA.10049.d:0 "今天，华盛顿的暮色如铅般沉重。白宫椭圆形办公室的壁炉里，火焰舔舐着最后一块橡木，发出轻微的噼啪声。威尔逊总统坐在椅子上，膝上盖着一条绣有密歇根州徽的毛毯，目光透过落地窗，望向远处国会山的尖顶。\n\n哈定站在壁炉旁，手里把玩着一枚镀金的十字徽章——那是劳动骑士团送给他的就职礼物。他的西装剪裁得体，连领带都细心的别上了华丽的领针，整个人散发着一种未经世事的自信。\n\n"沃伦，"威尔逊的声音像从很远的地方传来，"你知道为什么国会山的穹顶是空的吗？"  \n\n哈定愣了一下，随即笑道："为了容纳美利坚的无限可能。"  \n\n"不，"威尔逊的嘴角扯出一丝苦笑，"因为它永远盖不住下面的交易。"\n\n话题从凡尔赛条约的失败转向国内局势。哈定慷慨激昂地谈论着"恢复常态"的计划，仿佛南北分裂、工人暴动和托拉斯的阴影不过是些可以轻易抹去的污渍。威尔逊静静听着，手指无意识地摩挲着轮椅扶手上的一道刻痕——那是1919年他签署戒严令时，被愤怒的自己用钢笔划下的。\n\n"沃伦，"威尔逊突然打断他，"你知道为什么他们选你吗？"\n\n哈定的嘴僵了一下，用了一种模模糊糊的回答："因为人民需要希望。"  \n\n"因为你是张白纸，"威尔逊的声音轻得像叹息，"他们可以在上面写下任何他们想要的故事。"\n\n哈定走近几步，语气突然变得柔和："伍德罗，我知道你在担心什么。04年的那些事...不会有人追究的。"他拍了拍威尔逊的肩膀，"我们都明白，有些决定是不得已而为之。"\n\n壁炉的火光在威尔逊脸上投下跳动的阴影。他想起了底特律街头燃烧的商店与工厂，想起了那些被他送去镇压罢工的军队与骑士团，想起了自己签署的每一份让渡劳工权益的文件，想起了西部仍在矿场梦魇里的公民。哈定的安慰像一把钝刀，剖开了他最后的自欺欺人。\n\n"明天，"威尔逊转动轮椅，背对着哈定，"当你坐在这张椅子上时，记住：白宫的门槛不是权力的起点，而是囚笼的入口。"\n\n哈定只当他是在发泄失意，笑着回应："放心，我会让这个国家重新伟大。"\n\n当哈定离开时，威尔逊从抽屉里取出一封泛黄的信——那是1916年他刚当选时，一位南方老农写给他的："总统先生，请别让我们的希望变成另一场噩梦。"\n\n壁炉的火熄灭了，办公室陷入黑暗。窗外，国会山的穹顶在月光下泛着冷光，像一顶永远无法戴上的王冠。"
 USA.10049.a:0 "寒冰之中，总还得有人燃起火焰"

 USA.10050.t:0 "风雪中的启程"
 USA.10050.d:0 "1920年12月，又是临近圣诞节的日子。纽约的寒风像刀子一样割在斯特朗·贝特曼的脸上。他站在中央车站的月台上，手里攥着一张前往底特律的火车票，心里却像灌了铅一样沉重。\n\n他的行李箱里塞满了骑士团的制服和文件，还有一本他偷偷带上的《回顾》——那是他在证券公司时买的地摊货，因为怕惹祸上身，一直没敢拿出来读。\n\n斯特朗在纽约总部也算是工作了一段时间，高层鉴于他勤奋的工作，便决定把他作为底特律总部补充人手的一部分，连着另外一大堆人一起通过火车运到底特律去。两只脚都踏入车厢后，斯特朗在车门回头一望，发现自己的母亲早不见踪影，仿佛有意无意躲着他似的，但这或许是斯特朗自己的内心想法吧。\n\n火车缓缓启动，斯特朗坐在靠窗的位置，望着窗外飞逝的雪景。车厢里挤满了形形色色的人：有穿着破旧工装的工人，有戴着礼帽的商人，还有几个看起来像是骑士团的成员，正低声讨论着什么。斯特朗竖起耳朵，隐约听到“底特律暴动”、“镇压”、“活埋”之类的词，心里不由得一紧，他的思绪仿佛又回到了两年前的时候。\n\n在那个时候，他也仅仅只是一名纽约的普通职员，虽然确实常常听到底特律暴动的消息。那段时间，他也总认为，这不过一帮暴徒在大城市里烧杀抢掠而已。但加入骑士团的这一段时间里，他对底特律大暴动又有了一些新的看法。或许，只有像他这样的少部分的，或者没经历过的，才能暂时忘记这场浩劫。\n\n到了克利夫兰中转站，斯特朗下车透气。站台上，一群衣衫褴褛的孩子正围着一名骑士团成员讨要面包。那人冷笑着掏出一枚硬币，扔进雪地里，孩子们立刻扑上去争抢。斯特朗皱了皱眉，想上前阻止，却被一名同行的骑士团成员拉住：“别多管闲事，贝特曼。这些小鬼都是暴动者的崽，不值得同情，跟他们亲近，容易被偷东西！”\n\n斯特朗默默回到车上，心里却像被什么东西堵住了。他开始怀疑，自己加入骑士团究竟是为了什么？是为了那份稳定的薪水，还是在简历上写的所谓昭昭天命，亦或是骑士团始终强调的所谓“秩序与荣誉”？"
 USA.10050.a:0 "总得有想出来的那一天"

 USA.10051.t:0 "档案无情"
 USA.10051.d:0 "底特律的冬天比纽约更冷。斯特朗站在底特律。骑士团总部的档案室里，手里捧着明明写着“绝密”，却堂而皇之的放在最上层，且无任何密封保护的一份泛黄的文件，指尖微微发抖。文件上记录着1919年暴动期间，骑士团如何“处理”那些被逮捕的工人领袖——他们的名字被划掉，旁边用红墨水写着“已清除”。\n\n"1919年7月11日，密歇根分部运输队遭劫，实为内部清洗行动..."  \n\n"1919年9月15日，处决罢工领袖12人，尸体投入炼钢炉..."\n\n"1920年10月，底特律暴动镇压记录：处决“暴徒”347人，失踪..."\n\n斯特朗的胃里一阵翻涌。他从未想过，骑士团会做出这种事。在纽约时，他以为那些传闻只是谣言-尽管他真的见过某些骑士团成员在纽约地区做的恶事，但他总认为，这些人只是骑士团最黑暗的一群渣滓，只要有人发现，一定会让他们尽数消灭。在可现在，这些冰冷的文字像一把把刀子，刺穿了他对骑士团的所有幻想。\n\n他跌坐在椅子上，脑子里一片混乱。档案室里堆满了类似的文件，每一份都记录着骑士团的黑暗秘密。斯特朗感到一阵窒息，他抓起外套，决定去附近的酒馆喝一杯。\n\n然而，他刚走出总部大门，就被一根木棍狠狠敲在后脑勺上。他眼前一黑，倒在地上。醒来时，他发现自己被绑在一间破旧的屋子里，面前站着一个红头发的爱尔兰少女，手里握着一把匕首。\n\n“你们骑士团把我父亲抓到哪里去了？”少女冷冷地问。\n\n斯特朗愣住了：“你父亲是谁？”\n\n“西尔莎·奥康纳，”少女咬牙切齿地说，“别装傻，我知道你们骑士团抓了他！”\n\n斯特朗努力回想，却怎么也想不起这个名字。西尔莎见状，气得用匕首抵住他的脖子：“说！不然我就——”\n\n“我，我我真的不知道！”斯特朗吓得脸色发白，“我只是个管档案的和人事的职员，我什么都不知道！”\n\n西尔莎盯着他看了半天，最终松开了手：“你最好别骗我。”"
 USA.10051.a:0 " “我要是能骗，早就在团里高升了” "

 USA.10052.t:0 "自命不凡的背叛"
 USA.10052.d:0 "未来的两天，斯特朗一直被西尔莎囚禁在一间地下室里。尽管这里密不透风，且潮湿的要命，但西尔莎父亲的朋友仍然会每天保证他的三餐，这似乎是西尔莎要求的，这小姑娘的“善心”让斯特朗稍微放松了点，至少，她不会害自己的命。\n\n斯特朗一直试图解释自己只是个等级不算高的学士，但西尔莎根本不信，指了指他镀金的骑士团十字徽章-这是只有高级骑士或者高级学士才能拿到的东西，然而这只是斯特朗在档案室中偶然发现，并挂在身上的而已。\n\n直到前天晚上，外面传来一阵嘈杂的脚步声。西尔莎的父亲的朋友冲进来，慌张地说：“骑士团的人来了！他们怀疑你绑架了他们的成员！”\n\n西尔莎脸色一变，抓起匕首就要冲出去，却被斯特朗拦住：“别去！他们会杀了你的！”\n\n“放开我！”西尔莎挣扎着，“我不能让他们抓到我！”\n\n斯特朗咬了咬牙：“我去解释！我会说你是我的……我的女朋友！”\n\n西尔莎愣住了：“你疯了？”\n\n“我没疯！”斯特朗解开绳子，“我可不想连累你这种笨蛋……哎哟，你别打我呀！”\n\n他在搜寻队震惊的目光中急忙跑回了总部，气喘吁吁地向骑士团解释西尔莎的身份。骑士团的人半信半疑，但最终还是放了她，并严厉警告了斯特朗。西尔莎获救后，警告斯特朗不许泄密，还要求向他父亲的朋友提供骑士团的内部情报。西尔莎很严肃的对斯特朗表示：底特律总部的内部情报对于他们来说真的很重要。\n\n他震惊于这个年轻的女孩居然这么天真-而斯特朗只要摇几号人，就能将这年轻的女孩和他的朋友一起粉身碎骨。斯特朗犹豫了很久，最终答应了。现在的他，开始偷偷将档案室里的文件信息交给西尔莎的父亲的朋友。\n\n然而，斯特朗心里清楚，自己正在背叛骑士团-而背叛骑士团的下场只有死亡。他不知道自己还能坚持多久，但他知道，自己已经无法回头了。"
 USA.10052.a:0 " “我都干了些什么乱七八糟的事儿啊” "

 USA.10053.t:0 "标准生活"
 USA.10053.d:0 "清晨六点整，亨利·沃森的的耳旁都会准时响起那全楼一致启动的，公司特制的闹钟，即使再困再懒惰的人都能在震耳欲聋的声音中愤怒的醒来。\n\n在克利夫兰，员工住房中灰白色混凝土大楼的第七层，属于公司B级员工住宅区，也是亨利所居住的地方。电梯旁的墙上挂着的《洛克菲勒箴言》，旁边涂抹着不知道是谁写的：“效率即美德，勤劳即财富。”的红色油漆字。他的妻子玛丽亚在厨房加热公司配给的早餐——铝箔盒里的炒蛋永远带着一股汽油味，燕麦粥则黏稠得像夹杂着水泥的原油。女儿艾米莉穿着印有标准石油LOGO的校服，正对着镜子背诵《公司幼儿园守则》。”\n\n亨利套上深蓝色，印着标准石油标志的工装时，瞥见窗外那列运送底层工人的敞篷卡车正轰隆驶过。车斗里挤满面色灰败的男人，他们的安全帽在朝阳下泛着铁锈般的暗红。远处是直达地平线，规格与自己公寓一致的其他灰白色公寓，这些公寓在阳光下反而显得有些惨白。\n\n玛丽亚提醒他别误了通勤班车——那是辆装有风扇的银色运输车，车身贴着数不过来的标准石油广告。车驶过中央大街时，亨利望向那些玻璃幕墙的巨塔：克利夫兰洛克菲勒大厦顶端的霓虹钟表，显示着全美统一的企业时间，门外挂着今日油价，而他们部门主管的办公室在第三十二层，那里的人甚至能透过防弹玻璃俯瞰炼油厂火柱组成的“工业极光”-尽管隔着玻璃都能闻到呛鼻味。\n\n午饭时间。在公司食堂里，亨利和同事们在贴着“禁止谈论极端思想”标语的餐桌前，用员工消费券兑换了标准餐盒：两片肉排、土豆泥、以及印着董事头像的汽水。有人嚷嚷着公司餐越来越难吃了，而卫生部的老汤姆嘟囔着城郊窝棚区又爆发了霍乱，死人都快堆成坡了还不来收尸。但话题很快被主管的咳嗽声掐灭。傍晚归家时，亨利在电梯里遇见新搬来的邻居——那个年轻的，满头白发的工程师凯特，他兴奋地展示着刚领到的C级住宅钥匙。“10年。10年了，你看我头发都白什么样儿了，公司果然不亏待我啊，你看，B……妈的，是谁给我把C涂成了B……我肯定知道是C级住宅的，因为之前我早拿到合同了！”入夜后，正要躺在床上的艾米莉忽然指着通风窗户上的某处红光问：“是不是炼油厂又着火了？”，将血色夜空隔绝在外。“是晚霞，亲爱的。”他摸了摸女儿别在衣领上的B级员工家属徽章。回家后，艾米莉还是念念不忘，父亲只好安慰他说：“赶快睡吧，明天你还要参加‘小工程师’比赛呢。” "
 USA.10053.a:0 "每一天”"

 USA.10054.t:0 "标准生活"
 USA.10054.d:0 "深夜，亨利又一次被玛丽亚的啜泣声惊醒。她攥着医院通知单——胃痛诊断书上的言语又一次加重了，而他们的保险等级早在两年前就因迟到记录过多而被冻结——尽管两人一共只迟到了两次，但仍需要缴纳10000美元的保证金才能恢复保险。\n\n窗外，又一辆运送尸体的卡车正悄无声息地驶向焚化厂，车尾灯在雾霾中晕染成两团暗红，像极了员工工牌上那枚永不褪色的标准石油印章。 "
 USA.10054.a:0 "都是如此标准"

 USA.10055.t:0 "西部的反击"
 USA.10055.d:0 "西部，荒原依旧广袤，但空气中弥漫的不再是自由的气息-或者说从来没有这种气息，硝烟与蒸汽的混合味道代替了以往的压抑。匪徒的猖獗让这片土地再一次陷入混乱。铁路线被切断，城镇被洗劫，标准石油的油罐车成为了匪徒的重要目标。\n\n平克顿侦探社的成员们早已厌倦了被动防守。他们的蒸汽摩托车在荒原上咆哮，车轮碾过尘土，喷出的蒸汽在阳光下闪烁着银光。每一辆摩托车都像一匹机械战马，载着两名全副武装的平克顿人；同时，他们以10人为单位组成一个小组，5个小组组成一个大组。成员们穿梭在西部无垠的土地上-任务很简单：找到匪徒，消灭匪徒。\n\n“杰克，你觉得这次我们能逮到‘红眼’山姆吗？”年轻的哈德森一边调整着摩托车的蒸汽阀，一边问他的搭档杰克·莫里森。杰克是个老兵，脸上有一道从眉骨延伸到下巴的伤疤，那是五年前与匪徒交火时留下的。\n\n与此同时，平克顿的武装列车也在铁路上轰鸣前行。车厢经过改装，外覆钢板，车窗被改成了射击孔。车顶上架着轻型火炮和机枪，火力足以让任何试图靠近的匪徒望而却步。列车的燃料由标准石油公司提供，他们的油罐车紧随其后，确保这支机械军团不会因为缺油而停下脚步。\n\n“报告！前方发现匪徒的踪迹！”一名侦察兵骑着摩托车冲回队伍，气喘吁吁地喊道，“他们在十英里外的峡谷设了埋伏，人数大概有300号，准备袭击下一趟油罐车。”\n\n杰克点了点头，转身对队伍喊道：“伙计们，准备战斗！我们不能让那些狗娘养的毁了火车，否则你们这些小子连工资都领不到一美分！”\n\n队伍迅速行动起来。摩托车队分成两路，一路从正面逼近峡谷，另一路则绕到匪徒的后方。武装列车则缓缓驶入峡谷，炮手紧盯着前方的每一块岩石。匪徒的埋伏很快被打破。平克顿的十几个摩托车队从两侧包抄，机枪的火力像镰刀一样收割着匪徒的生命。武装列车的火炮则轰碎了匪徒的掩体，将他们的阵地变成了一片火海。“红眼”山姆试图逃跑，但杰克和汤姆早已盯上了他。他们的摩托车在峡谷中疾驰，蒸汽机的轰鸣声与枪声交织在一起。最终，山姆被逼到了一处悬崖边。\n\n“逃跑是没用的，山姆！”杰克喊道，手中的步枪稳稳地指向山姆的胸口。山姆冷笑一声，举起了双手，但眼中却闪过一丝狡黠。他突然转过身，然后在杰克开枪前纵身跃入峡谷-谁都没有注意峡谷几十米的下方是一条河流，河流的深浅尚不知晓，或许这个头号匪徒已经跌落到河床上或者岸边，致其粉身碎骨。\n\n战斗结束后，平克顿的成员们聚集在峡谷中，清点战利品和伤亡。标准石油的油罐车安然无恙，而平克顿成员的死伤也并不严重-毕竟谁都不愿意让死亡数据过于“严重”，这会导致整支小队就地解散。\n\n杰克拍了拍摩托车的蒸汽阀，对旁边的人打趣“这玩意可比马快多了，不是吗？”\n\n他望向远方的地平线。西部的荒原依旧广袤，但在蒸汽与硝烟的笼罩下，这片土地仍然没有恢复秩序。平克顿的旗帜在风中飘扬，他们的任务还远未结束。但只要蒸汽机还在轰鸣，子弹还在飞驰，西部的故事就远远没有结束。 "
 USA.10055.a:0 "从过去到未来"

 USA.10056.t:0 "西部的反击"
 USA.10056.d:0 "西部荒原上的风依旧凛冽，不过风中除了黄沙与尘土，还夹杂着钢铁的轰鸣与硝烟的刺鼻味。匪徒的猖獗让这片土地陷入了无尽的混乱，铁路线被切断，城镇被洗劫，标准石油的大量石油设施也遭到厄运-而这正是西部特遣军要在接下来的一段时间解决的问题。\n\n潘兴将军站在前线指挥部的地图前，眉头却舒展开来。他的手指慢慢地划过地图上被标记为红色的区域——那是匪徒最新活动的区域，距离标准石油公司的主要输油管道仅有几英里。乔治·马歇尔，站在他身后，目光同样凝重。\n\n“我们不能让他们再靠近输油管道了，”潘兴的声音有些低沉。“放熊出洞，玩这种把戏，一次两次或许可以，但过火了就不行；如果输油管道再一次被切断，那么标准石油就不会再信任特遣军了，重要资金的缺失，可是对我军的重大损失。”\n\n巴顿在桌子转来转去，他的眼神中闪烁着战斗的光芒。“将军，让我指挥第三骑兵师去切断他们的退路。那些匪徒还没见过坦克，我们可以给他们一个大惊喜。”\n\n马歇尔则冷静地补充道：“步兵师可以从侧翼包抄，山地作战是我们的强项。我们可以把他们逼到开阔地带，然后用火力彻底消灭他们。”\n\n潘兴瞄了一眼马歇尔，对着潘兴说：“行动吧，先生们。让那些匪徒知道，西部不是他们的地盘。”\n\n第二天清晨，西部特遣军的装甲骑兵师在巴顿的指挥下，沿着荒原的边缘推进。坦克的履带碾过碎石，发出低沉的轰鸣，装甲车的机枪手警惕地扫视着四周。骑兵们骑着马，跟在这些钢铁巨兽后方，随时准备冲锋。与此同时，马歇尔要求行动的步兵师则悄无声息地进入了山区。他们的任务是找到匪徒的藏身之处，并将其逼出山谷。山地作战经验丰富的士兵像幽灵一样快速穿梭在岩石和灌木之间。\n\n匪徒的营地很快被发现了。他们藏身于一处隐蔽的山谷中，四周是高耸的悬崖，唯一的出口是一条狭窄的通道，匪徒约有三四百人。马歇尔感叹了一声：“他们真的自以为这里是安全的地方吗，如果还有下次，他们最好别这么干了。”\n\n战斗在中午时分打响。步兵师从山顶向山谷中投掷了烟雾弹和手榴弹，匪徒的营地瞬间陷入混乱。匪徒们试图从通道逃跑，但等待他们的是巴顿的装甲骑兵师。坦克的炮火像雷霆一样轰击着匪徒的阵地，装甲车的机枪扫射着任何试图靠近的敌人。\n\n“红眼”山姆，匪徒的头目，试图组织反击，但他的手下早已溃不成军。巴顿亲自驾驶一辆装甲车，几乎冲到了山姆面前。山姆并未做出任何抵抗，而是突然躲进了一处山体裂缝-他骑着马逃跑了！\n\n一场漂亮的歼灭战，西部特遣军的士兵们开始清理战场。标准石油的输油管道安然无恙，铁路线也重新恢复了畅通。潘兴将军站在一辆坦克旁边，望着远方的地平线，对身边的巴顿和马歇尔说道：“干得好，先生们。但我们的任务还远未结束。无论是对于西部的，还是对于华盛顿，只要还出现对西部没有好处的事，我们就绝不会停下前进的脚步。” "
 USA.10056.a:0 "“无论是过去还是未来”"

 USA.10057.t:0 "欠债还钱"
 USA.10057.d:0 "凡尔赛宫仿佛从未沾染战争的硝烟，在建筑之外破败的土地，与他金碧辉煌的建筑形成鲜明的对比。\n\n大厅奢华的装饰被紧张的气氛所笼罩，罗伯特·兰辛坐在长桌的一端，手指轻轻敲打着桌面，眼神平静。他的对面，英国外交大臣寇松和法国财政部长克罗茨并肩而坐，两人的神情显得有些紧绷。\n\n“兰辛先生，”寇松不等罗伯特先开口，缓缓说道，“我们都知道，战争给各国带来了巨大的经济压力。英国也不例外。我们并非不想偿还债务，只是……时机尚未成熟。\n\n“时机？”兰辛冷笑一声，目光如刀般扫过寇松的脸，“战争已经结束两年了，欧陆的‘时机’还要等到什么时候？难道要等到美国的纳税人彻底失去耐心？”兰辛的声音陡然提高，引得大厅内的侍从们纷纷侧目。“你们的困境，难道比我们在南北战争中遭受的屈辱还要深重吗？英法的干涉让我们不得不与南方妥协，联邦的尊严被践踏，而你们现在却在这里谈‘困境’？”\n\n寇松的脸色微微一变，显然没想到兰辛会提起那段历史。他深吸一口气，试图保持冷静。“兰辛先生，过去的事情已经无法改变。我们现在讨论的是现实问题。英国和法国都在努力恢复经济，但这需要时间。我们希望能与美国达成一个更为灵活的还款方案。”\n\n“灵活的方案？”兰辛嗤之以鼻，“你们的意思是，继续拖延？还是干脆赖账？”\n\n克罗茨的脸色也变得难看起来，他在座位上愈发躁动不安。“兰辛先生，这样的指控毫无根据。法国从未有过赖账的意图。看看这窗外的悲惨景象，德国人把我们法国祸害成了什么样子-我们只是希望美国能够体谅我们的实际情况，给予一些宽限。”\n\n兰辛靠在椅背上，双手交叉放在胸前，目光如鹰隼般锐利。“体谅？宽限？先生们，你们似乎忘记了，美国在这场战争中为你们提供了多少支持。我们的物资、我们的贷款，甚至是我们的士兵，都为你们的胜利付出了代价。而现在，你们却在这里讨价还价？”\n\n寇松和克罗茨对视一眼，彼此都从对方的眼中看到了无奈。他们知道，兰辛占据了绝对的优势。美国虽然海军力量不强，但在这场外交博弈中，他们手握债务这张王牌，足以让英法两国低头。\n\n“兰辛先生，”寇松终于开口，声音中带着一丝妥协，“我们会尽快制定一个还款方案，确保三国的根本利益不受损害。但我们也希望，美国能够给予我们一些时间，让我们能够平稳地渡过这段困难时期。”\n\n兰辛站起身，整理了一下西装，目光依旧冷峻。“希望如此。先生们，今天的会议就到这里吧。我希望下次见面时，能看到贵国的诚意。”\n\n他说完，转身离开了大厅，留下寇松和克罗茨坐在原地，彼此无言。凡尔赛宫的金色光芒依旧耀眼，但在这光芒之下，英法两国的外交家们却感到了一丝寒意。\n\n寇松仍然坐在椅子上保持沉默，但随后便和那个法国人开口：“该死的扬基佬，让他等着，等他来找我们废除金本位的时候，就可以好好的干他一仗了，他肯定要来！”\n\n兰辛走出凡尔赛宫，抬头望向天空。他知道，今天的胜利只是开始。美国的外交之路还很长，而他，绝不会让任何人再轻视这个国家。 "
 USA.10057.a:0 "“阴影，”他低声自语，“终将被阳光驱散。”"

 USA.10058.t:0 "远离灰烬"
 USA.10058.d:0 "密歇根中央车站的人潮，不时地因为外面的战斗而骚动起来。\n\n玛丽安·克劳福德在人群中紧紧攥着褪色了的行李箱，不断传来忽大忽小的枪炮声使她愈发恐惧。她的棉布裙边角不但被磨破还沾上了大片灰尘，右脚的皮鞋早在昨夜的奔逃中裂了缝。抬头望去，车站破碎的玻璃顶上挂着被射成筛子的美国国旗，候车区被罢工者打穿的大时钟停在十点十七分。\n\n下午的烈日蒸发着积水，阳光映照在车站到处都是的《底特律新闻报》报纸上，报纸上劳动骑士团的标志异常醒目；加粗大字的头条写着“我爱国人士正进攻暴徒最后的街垒”。而报纸的背面却被罢工者重新印上了煽动性的标语。玛丽安踩过一张被泥水浸透，腐烂透顶的传单，上面写着劳动骑士团对市民的公告，宣称车站有丰富的补给。\n\n似乎是今天最后一列火车到站，站台两边的劳动骑士团成员用枪托分开人群，突然，一个带工帽的男孩突然向着车厢冲去，但随即被刺刀逼退。他怀里掉出的半块面包，不一会儿被十几只脏手撕成了渣。\n\n货运车厢里弥漫着老鼠屎和啤酒的气味。玛丽安蜷在角落，听见后排两个欧洲移民在用粗粝的英语争吵。穿工装裤的那个坚持说摩根银行屋顶架起了重机枪，打死了自己的弟弟，另一个则啐着唾沫咒骂卡内基这个抚恤金骗子。车厢外出现了一丝不对劲的动静，一个婴儿开始啼哭，母亲则慌忙用披肩捂住孩子的嘴——车厢两旁传来了罢工军的呼喊声，但与火车相安无事。\n\n黄昏时列车在郊外急刹。有人掀开篷布尖叫，玛丽安看见远处城市的天际线泛着诡异的橘红。圣安妮教堂的尖塔在浓烟中倾斜，像是被上帝折断的肋骨。一位银行职员坐在草堆上看向车厢外，他又看了看车厢内，左手颤抖但又机械地往弹匣里填入一发又一发的子弹。\n\n流民们在托莱多车站争抢红十字会发放的罐头。玛丽安正要低头打开自己的那一份，却发现自己的银质怀表不见了。那是已经失踪许久的母亲留给她的十六岁生日礼物，或许此刻正躺在某个罢工青年的口袋里，或者和警察局门前的尸体一起沉入底特律河。\n\n她摸了摸空荡荡的脖颈，想起去年圣诞夜，父亲在装配线事故死后，公司送来的抚恤金，似乎刚好抵消了这只表的价格。 "
 USA.10058.a:0 "“唉，等于丢掉了两条人命。”"

 USA.10059.t:0 "1920年新年演说"
 USA.10059.d:0 "同胞们：\n\n新年的曙光中，我们站在一个时代的门槛上。美利坚的土地，历经风雨，却依然坚韧；我们的国家，饱经沧桑，却始终屹立。今天，我站在这里，并非仅仅作为你们的总统，而是作为一个见证者、一个同胞、一个与你们共同承担命运的人。\n\n五十四年前，我们的国家在战火中分裂。那场冲突留下的伤痕，至今仍未完全愈合。南北的对峙，曾让这片土地陷入漫长的阴影；而今日，我们虽未完全统一，却已在共同的苦难与奋斗中找到了前行的方向。我们曾以为，经济的繁荣将自然带来社会的和谐，可事实告诉我们，繁荣若不能普惠于每一个辛勤劳作的公民，便不过是沙丘上的楼阁。\n\n过去的一年，我们目睹了底特律的悲剧。那场风暴，不仅仅是劳资的冲突，更是整个美利坚社会的阵痛。生命的逝去令人痛心，城市的损毁令人扼腕。然而，在这片废墟之上，我们更应看到希望的火种——那些在危机中挺身而出的劳动骑士团成员，他们以秩序与奉献的精神，捍卫了社区的安宁。他们的牺牲与担当，证明了美利坚人面对灾难时的勇气与团结。\n\n我们不应回避现实：企业，作为经济的引擎，推动了我们的工业进步，创造了无数的就业机会。铁路贯通东西，工厂林立南北，托拉斯的组织带来了效率与规模，这是不可否认的成就。然而，效率若以牺牲公平为代价，规模若以忽视人性为前提，那么繁荣便失去了它的灵魂。"
 USA.10059.a:0 "“我们需要的不是对抗，而是合作；不是分裂，而是和解。”"

 USA.10060.t:0 "1920年新年演说"
 USA.10060.d:0 "因此，今天，我宣布一项关乎国家未来的计划——《美丽国家计划》。这一计划将围绕四个核心展开：\n\n第一，整顿经济，确保繁荣的根基稳固。联邦政府将与各州合作，建立更加透明的商业规范，既保护企业的创新活力，也防止垄断的滥用。\n\n第二，提高劳动者待遇，让每一份辛勤付出得到应有的回报。 我们将推动抚恤金与工伤保障的立法，确保工人不再因意外而陷入绝境。\n\n第三，完善地方治安，重建社区的信任。劳动骑士团的经验告诉我们，秩序与正义需要扎根于基层。我们将支持地方警务改革，让执法者成为社区的守护者，而非压迫者。\n\n第四，强化联邦与各州的行政能力。一个高效的政府，必须能够回应人民的诉求。我们将改革文官官体系，消除冗余，让政府的每一分力量都用于服务公民。\n\n第五，推动妇女政治与经济权利改革。在过去100年的事实证明，妇女可以不依赖家庭义务与家庭保护而相对独立生活，因此妇女也应受到和男性公民相近的权利保障。\n\n同胞们，美利坚的伟业从来不是靠少数人完成的。它是农夫在田间挥洒的汗水，是工人在机床旁的坚守，是商人在风险中的抉择，是每一位公民对自由的珍视。我们曾因分歧而对立，却也能因共同的目标而携手。\n\n今天，我们站在新十年的起点。让我们放下过去的怨恨，超越地域的隔阂，共同建设一个更加公正、更加强大的美利坚。这不是一条平坦的道路，但只要我们心怀信念，便没有不可逾越的高山。\n\n愿上帝保佑这片土地，愿祂指引我们前行。 "
 USA.10060.a:0 "“谢谢诸位。”"

 USA.10061.t:0 "密西西比河的出征"
 USA.10061.d:0 "晨雾笼罩着密苏里河，约翰·霍尔特站在圣路易斯郊外的营地边缘，望着河对岸模糊的轮廓。秋冬之交的晨风带着潮湿，吹动他白色大衣的下摆，露出腰间那把崭新的柯尔特手枪——这是骑士团上周才配发给每位骑士的装备。\n\n"霍尔特！归队！"身后传来中队长沙哑的喊声。\n\n约翰转身走向营地中央，靴子踩在潮湿的草地上发出轻微的吱嘎声。营地已经苏醒，数千名身着统一制服的骑士团成员正在拆卸帐篷、检查武器、装载物资，并且把那一身显眼的骑士团日常制服换成骑士团的军装。他们胸前的铜质徽章在晨光中闪烁——被圆圈套住的十字上刻着拉丁文铭文"劳动-荣耀-祖国"。\n\n"您觉得南方佬会抵抗多久？"年轻的学徒威廉·克莱默凑过来问道，他正在笨拙地调整自己步枪的背带。\n\n约翰没有立即回答。他望着远处正在集合的骑兵队，那些有钱人捐赠的阿拉伯混血战马，皮毛油亮，伙食比人还要好。三辆涂着骑士团徽章的坦克轰隆驶过，扬起一片尘土——又是哪位有钱人的"捐款"呢。\n\n"足够长的时间让我们都成为英雄或者尸体。"约翰最终说道，声音比他预想的还要干涩。\n\n"注意！全体立正！"\n\n指挥官布伦南总队长大步走来，他深蓝色的军官制服一尘不染，在他身后跟着两位穿着考究的绅士，他们昂贵的皮鞋上已经沾满了营地的泥土，脸上带着明显的不耐烦。\n\n"骑士们！"布伦南的声音洪亮而做作，"今天，我们响应联邦政府的号召，向南进军！我们不仅是为了统一国家，更是为了秩序与进步！南方那些种植园主和他们的迪克西党走狗，五十多年来一直分裂我们的祖国，他们的产业使得南方停滞，使得南方人民受苦受累，现在，是时候结束这一切了！"\n\n“劳动，荣耀，祖国，劳动骑士团万岁！”人群爆发出欢呼。约翰也下意识地跟着中队长一起敬礼。他瞥见那几位绅士正满意地点头，仿佛这场出征只是他们日程表上的一个财务会议。\n\n布伦南接着说：“骑士团的弟兄们，我们将会在未来踏上艰难的旅程，我们将会驰援战况激烈的密西西比河战场，而德克拉荷马前线则交给了我们亲爱的联邦军队弟兄们。但无论在什么地方前进，在什么地方作战，请牢记，我们都是合众国的一份子，我们都必将拥有一颗团结的心，我们都必将得胜，我们都必将给美国带来光明！”\n\n仪式结束后，部队开始列队出发。约翰所在的中队被安排在队伍中部。当他们穿过圣路易斯市区时，街道两旁站满了沉默的市民，商店橱窗上还贴着去年罢工时被打碎的玻璃修补痕迹，而比市民更加活跃的，反而是维护秩序的其他骑士团兄弟。\n\n"看那边。"威廉小声说，用眼神示意一栋建筑的二楼窗口。\n\n约翰抬头，看见几个穿着考究的男女正举着香槟杯向他们致意，他们展示的旗帜不是星条旗，也不是骑士团的旗帜，而是宾夕法尼亚钢铁公司的标志。 "
 USA.10061.a:0 ""我们的赞助人。"约翰冷笑道。"

 USA.10062.t:0 "密西西比河的远征"
 USA.10062.d:0 "离开城市后，队伍乘坐船只，沿着密西西比河向南行进。约翰的背包里装着配给的口粮、弹药和一本破旧的《瓦尔登湖》——这是他在底特律暴动是捡来的，他总觉得这本书里头的一些语句特别有韵味，就像在看《劳动骑士团哲学名录》那样对物质社会的发展痴迷一般。\n\n傍晚时分，他们在河边扎营。约翰的队伍被安排去站第一班岗。他站在一棵老橡树下，望着西沉的太阳将河水染成血色。远处，几艘驳船正逆流而上，甲板上堆满了军用物资。\n\n营地中央的旗杆上，星条旗与劳动骑士团武装的旗帜并列飘扬。约翰记得几年前加入骑士团时，他们还在底特律的废墟中搜寻幸存者。那时的旗帜上只有大红十字，没有这些华丽的纹饰和军事符号。在40年前，骑士团还自称是"工人的盾牌"，而非现在这样。\n\n"在想什么，骑士？"一个声音从身后传来。\n\n约翰转身，看见学士马丁·奥肖内西站在那里，他灰色的西装外套上别着人事处的徽章。\n\n"在想我们究竟为何而战，学士先生。"约翰回答。"还在想父母呗"。\n\n奥肖内西轻笑一声，从口袋里掏出一个银质酒壶递给他。"为了秩序，为了进步，为了联邦的统一——至少布告上是这么写的。"\n\n约翰接过酒壶，劣质威士忌灼烧着他的喉咙。"而实际上？"\n\n"实际上？"奥肖内西望向南方逐渐暗下来的天空，"为了那些给我们发枪发马发薪水的人能继续在证券交易所玩他们的堆金游戏。"\n\n夜风渐起，吹动河面泛起涟漪。约翰的父亲——一个在芝加哥罢工中被国民警卫队打死的爱尔兰移民。如果他看到今天的骑士团，会说什么？那个曾经发誓保护工人的组织，现在却武装到了牙齿，准备南下为财团们开拓市场？\n\n"你知道吗，"奥肖内西突然说，"我昨天在指挥部看到一份文件。南方有几家大型纺织厂已经承诺，如果我们'解放'他们，就会把35%的股份转让给北方的几个'投资者'，把10%给我们骑士团"\n\n约翰感到一阵恶心"简直就是恶性投机！"\n\n"更准确地说，是带着枪的。"奥肖内西拿回酒壶，喝了一大口，"但别告诉那些小伙子们。让他们以为自己是英雄吧——这样死的时候会轻松些。"\n\n远处传来集合的号声。约翰整了整自己的武装带，明天他们就将进入肯塔基，然后是田纳西，最终到达真正的战场。他不知道自己能否活着回来，也不知道即使活着回来，等待他的会是什么——一个被财团彻底控制的国家？一个伟大的骑士团沦为纯粹私人军队的未来？n\n月光下，他看见威廉和其他年轻的会员正在兴奋地擦拭武器，谈论着即将到来的战斗和可能的荣耀。他们的脸上写满天真，就像几年前的自己。\n\n约翰叹了口气，走向集合地点。靴子踩在潮湿的草地上，发出轻微的吱嘎声。"
 USA.10062.a:0 "“约翰·霍尔特率领小队集合完毕！”"

 USA.10063.t:0 "灰雪中的面包"
 USA.10063.d:0 "冬的杰克镇飘着灰雪。那不是真正的雪，而是从工厂方向飘来的煤灰，落在郊外的补给站棚顶上，积了薄薄一层。人们排成长队，像一条疲惫的蚯蚓，缓慢蠕动在泥泞的土路上。他们大多是妇女、老人和孩童，男人们要么在前线，要么躺在某个无名坟场里。\n\n救济站的木桌排成几列，统一被一位骑士团的学士负责，他的身后站着一群骑士团武装成，白色马甲上别着黄铜徽章，冷峻得像尊雕像。他们身旁堆着印有联邦政府徽记的木箱——面粉、罐头、炼乳，还有用蜡纸包着的硬面包。一个戴圆框眼镜的骑士团成员机械地核对着名单，另一个则用铅笔在表格上勾画，偶尔抬头扫视人群，眼神像在清点牲口。\n\n“每人5磅面粉，两罐豆子，一块面包，儿童多领一盒炼乳。”学士的声音干涩，仿佛这句话已经重复了千百遍。\n\n玛莎·霍尔特攥着皱巴巴的袋子，手指在空中发僵。她前面是个佝偻的老妇人，接过豆子罐头时手一抖，铁罐砸在泥地里，溅起的泥水沾湿了学士的裤脚。学士皱了皱眉，而身后的一个人则将罐子拿了起来。老妇人颤巍巍地接过，用袖子擦着罐子上的泥，嘴里念叨着“上帝保佑美国”。玛莎别过脸去。她知道那罐子里的豆子早被泡发了霉——上周领到的就是这样。\n\n轮到她领面粉了。骑士团的人瞥了一眼，从箱底抽出2袋面粉，袋子角落有个小洞，细白的面粉像沙漏里的流沙，悄无声息地漏进箱缝里。玛莎张了张嘴，学士却已经转向下一个人。她默默接过袋子，用掌心堵住那个洞，随后去领罐头和面包。\n\n队伍末尾传来骚动。几名骑士团的武装成员大步走来，白色大衣下摆沾着机车油污，腰间的左轮手枪随步伐晃动。领头的是个方下巴的骑士，肩上的徽章闪着冷光。\n\n“公民们，实在抱歉。由于靠近前线，物资有限，后面的人明天再来。”\n\n人群里响起几声压抑的啜泣，但没人敢抗议。骑士们开始搬走剩余的箱子，木箱碰撞的闷响里，玛莎听见有人在低声咒骂：“狗娘养的……”\n\n她抱着漏空的面粉袋往回走，而她的现任丈夫正在医院里头躺着，她唯一的儿子在外打拼，却除了寄钱以外毫无音讯。煤灰落在她肩上，像一场永远下不完的脏雪。远处的铁轨上，一列货车正驶向南方，车厢外刷着“联邦统一”的标语，在暮色中红得刺眼。"
 USA.10063.a:0 "唉，不知道儿子过的怎么样了"

 USA.10064.t:0 "密西西比河的远征"
 USA.10064.d:0 "田纳西的晨雾中不时传来怪异的咳嗽声。约翰·霍尔特的小队趴在纳什维尔外围的玉米地里，秸秆上的露水浸透了他们的米色军装。昨夜急行军四十英里，他们成了中西部骑士团中第一支抵达前线的队伍——总队长在电报里称这是"密苏里的荣耀"，但没人告诉这些年轻人，荣耀的代价是磨破的双脚和空空如也的胃-以及即将奉献的生命。\n\n空气湿热难耐，约翰尽力睁眼望向前方。周围时不时传来南北军队的交火声音，干扰着他的思绪。他的小队在此奉命拦截支援前线的南方军装甲车队。他们早早的就在道路上安放了反坦克地雷，并做好了反坦克陷阱。\n\n"队长，那是什么鬼东西？"学徒约瑟夫指着地平线上蠕动的黑影。\n\n在小队前方200米左右，几辆雷诺坦克带领着十几辆施耐德坦克碾过残存的篱笆，法国制造的棱形炮塔上漆着迪克西党的标志。约翰攥紧了望远镜——情报说前线敌军只有六辆坦克，看来情报又错了。坦克后方跟着散兵线，那些穿着土布衣裳的南方兵走路姿势怪异，像是被枪杆逼着前进的牲口。\n\n天上北军的DH.4侦察机又一次掠过约翰的小队，南军也同时看到了它，但丝毫没有反击举动。\n\n"敌方坦克！10:00方向！"威廉的尖叫被爆炸声淹没。\n\n北方军的重型榴弹炮终于开火，炮弹在坦克群中掀起腥红的土浪，那十几辆坦克如玩具般被瞬间撕碎，弹药库在南方军中引发了连环爆炸。约翰看见有个南方兵被气浪掀到空中，像破布娃娃般旋转着落下。不一会儿，骑士团的几辆装甲车从后方冲上来，车顶机枪喷着火舌——这些铁皮盒子挡不住炮弹，但足以吓唬民兵。\n\n"前进！跟紧装甲车！"约翰吹响铜哨。他的小队呈楔形散开，这是他们在圣路易斯训练场演练过上百次的战术。玉米秆抽打着他们的脸，远处再次传来飞机引擎的嗡鸣——联邦的侦察机正俯冲扫射南方军的阵地，机翼上的白星已经被硝烟熏黑。而在地上，约翰的小队和其他兄弟部队一起不顾一切地向着前方的城镇冲锋。"
 USA.10064.a:0 "“小伙子们，不要怕，这就是战场。”"

 USA.10065.t:0 "密西西比河的远征"
 USA.10065.d:0 "月光照亮了停火后的战场。约翰坐在半截炸断的橡树上，从背包里掏出那本《瓦尔登湖》。书页间夹着即将寄给母亲的钱。河流上不时散发着难以忍受的血污和腐臭味。\n\n对岸传来手风琴声。南方佬正在埋葬死者，他们用迪克西民乐代替了安魂曲。听着悠扬的声音，约翰想起白天抓到的那个南方少尉——他戴着金丝眼镜，口袋里同样装着梭罗的诗集。"我们为什么要互相屠杀？"那人被押走前用北方口音问道，并反复说了几遍。\n\n但消停的时刻不过一瞬，北方的重炮群开始发言。约翰远眺着那些155毫米"共和国之锤"们喷出橘红色的火球，十几秒钟后，五英里外的南方火车站就变成了喷发的火山。钢梁和枕木在空中舞蹈，一截蒸汽机车的轮子竟然飞到了他们阵地前沿。\n\n"我们不该这么炸铁路，"学士奥肖内西蹲在约翰旁边整理着阵亡人员名单，"那些铁轨都是洛克菲勒造的，战后还得花钱补偿。"\n\n受到攻击的南军则以中小口径火炮回击，但他们只能打击到联邦军的前沿阵地，约翰小队依照命令暂时向后撤退。在血红色的夜空中划过信号弹的绿光-联邦的补给车队顶着炮前来，三十辆道奇卡车满载着炮弹、血浆和华尔街日报。\n\n"霍尔特小队长！"大队长骑马而来，"明天拂晓进攻火车站，你们队是先锋队，上方会给你们带来最精锐的武器。南方调来了黑人劳工团，他们的人数众多，你们不要对他们留情，他们仍然是联邦的敌人。"\n\n大队长走后，约翰发现威廉正用刺刀在橡树上刻十字架。"给我爸的，"男孩解释，"他死在底特律，但没人告诉他死在哪条街上。"约翰转过头来坐到一旁，“爸爸生前是个很爱国的人，我相信他没有参加暴动，但他就是死了。”\n\n远处，联邦军的履带式拖拉机正在运送前沿阵地的尸体，一具尸体手腕上还戴着骑士团的铜徽——劳动-荣耀-祖国的格言在月光下闪闪发亮。\n\n晨雾再起时，约翰把《瓦尔登湖》塞回背包。新到的坦克引擎已经预热完毕，排气管喷出的蓝烟与雾气交融。他想起书中那句话："我们为何如此急于成功，从事如此荒唐的事业？"但铜哨声刺破了思考，全副武装的小队开始向火车站移动。\n\n头顶上，联邦的飞机正在投燃烧弹，前方的世界一片火红，像敞开的炼狱大门。"
 USA.10065.a:0 "只能继续向前"

 USA.10066.t:0 "密西西比河的远征"
 USA.10066.d:0 "约翰·霍尔特的一个支队已经匍匐在铁路路基的碎石上。他们的汤姆逊冲锋枪在潮湿的空气里泛着冷光，每发弹鼓里都塞满了子弹。昨夜，军需官咧嘴笑着给他们每人发了六枚手榴弹——“先锋的待遇，小伙子们，可别浪费了。”\n\n火车站被炮击炸得千疮百孔，铁路信号灯的上半部分只留下了电丝，放电时就像一只血红的星星。远处，蒸汽机车的喘息声隐约可闻，南方正试图调度这里的最后一列物资。约翰做了个手势，先头十二个人如幽灵般向前推进。威廉和其他成员紧跟着他们，手指扣在扳机上，指节发白。\n\n第一声枪响来自一座水塔上的哨兵。子弹擦过约翰的耳畔，钉进枕木里。下一秒，十二支汤姆逊同时开火，水塔上的身影抽搐着坠落。爆炸声随即撕裂了寂静——约瑟夫投出的手榴弹在沙袋掩体后炸开，残肢和木屑四溅。\n\n“冲过去！占住月台！”约翰吼道。\n\n他们像刀锋般刺入南方军的防线。冲锋枪的嘶吼声中，穿着灰色军服的南方士兵成排倒下。有些人甚至没来得及举起枪，只是茫然地站着，直到子弹将他们掀翻。约翰看见一个皮肤黝黑的男孩跪在铁轨旁，双手高举，可威廉的子弹已经穿透了他的胸膛。\n\n月台近在咫尺。一颗炮弹突然在侧翼炸开，气浪将约翰掀翻。他挣扎着爬起，发现组长之一的约瑟夫不见了，只剩半条腿还留在原地，而许多成员只剩下了一地碎肉。铁路岔道口，一挺马克沁机枪正疯狂扫射，子弹犁过碎石，掀起一串火星。\n\n“手榴弹！掩护！”约翰嘶吼着，扯下插销，用力掷出。爆炸的烟尘中，小队后续支援的人跳上月台，迅速用沙袋和尸体堆出掩体。\n\n远处，骑士团与联邦军的坦克开始出击。其人马正如潮水般涌来，刺刀在晨光中闪烁。南方军从周围浓烟滚滚的城镇里冲出，双方在铁轨和房屋间厮杀。一名联邦军官挥舞着军刀连着砍翻了几个南方军士兵，下一秒却被霰弹枪轰碎了脑袋。\n\n火车站的穹顶在炮击中彻底坍塌，整体落下的声音犹如雷公轰鸣。约翰的小队蜷缩在售票处后，听着子弹凿穿木板的闷响。敌我双方正在疯狂的争夺火车站以及周边城镇的控制权。\n\n“我们得撤了，”他喘息着，“再留在这儿就是送死。”\n\n约翰望向铁轨。联邦军的坦克碾过尸体，炮口喷吐火舌，将车厢轰成燃烧的残骸。骑士团的旗帜插上了火车站信号塔。"
 USA.10066.a:0 "还要……"

 USA.10067.t:0 "密西西比河的远征"
 USA.10067.d:0 "撤退的哨声终于响起。约翰最精锐支队中剩下的人——二十个，包括他自己。约翰的右臂被弹片撕开一道口子，血顺着指尖滴落。他们踉跄着退出战场，背后仍在燃烧的黑烟遮蔽了朝阳。\n\n奥肖内西在后方清点伤亡，嘴里叼着雪茄，漫不经心地记着数字。约翰盯着自己沾满火药和血迹的双手，看着塔下堆满的尸体——北方的、南方的，穿制服的、穿工装的，全都纠缠在一起，像一场荒诞的噩梦。他忽然想起《瓦尔登湖》里的一句话：\n\n“我们为何如此匆忙地浪费生命？”\n\n可没人回答他。只有远处炮火的回响，和铁轨上未冷的尸体。"
 USA.10067.a:0 "还要继续向前……"

 USA.10068.t:0 "密西西比河的远征"
 USA.10068.d:0 "晨雾从密西西比中游的丘陵间流淌而下，浸湿了行军中的队列。约翰·霍尔特踩着泥泞的土路，靴底黏着昨夜的雨水和枯叶。九十多人沉默地跟在身后，枪管上凝结着露珠。\n\n传令兵骑马而来，马蹄溅起泥浆。"霍尔特骑士！"他喊道，递过一封盖着骑士团印章的信笺，"大队长命令，你接替第七中队，即刻生效。"\n\n约翰展开信纸。七中队的中队长三天前在前线渡口被撕成了碎片，连尸体都没找全。现在，这支残缺的部队拥有二百一十九名成员，其中包含5名骑士，13个挂着绷带的学士——归他指挥了。\n\n威廉·克莱默咧嘴笑了。"看来我们死得够多，终于轮到升官了。"\n\n正午时分，他们抵达了集结地。远处，联邦军的列车喷吐着黑烟，车厢里堆满了弹药箱和裹着油布的机枪。偶尔有医护车驶过，帆布帘子缝隙间露出缠满绷带的肢体，呻吟声被车轮的轰鸣淹没。\n\n学士奥肖内西从医疗帐篷里钻出来，白大褂上沾着血迹和碘酒。"欢迎来到地狱的接待处，中队长……不要在意，你知道，我在加入骑士团之前，本来就是医生这行的。"他递给约翰一杯劣质咖啡，杯底沉着未化的糖块。"密西西比河对岸，南方佬调来了三个师，听说还有英国人指挥的炮兵。"\n\n傍晚，炮声开始从地平线传来，闷雷般的震动让地面微微颤抖。约翰的中队被派往河岸增援。他们穿过一片被炸得七零八落的灌木丛。天空上，联邦军的观测气球悬浮在暮色中，宛如巨人之眼般俯视众生。\n\n当他们爬上前线战壕时，战场在眼前铺开——密西西比河在夕阳下泛着血光，浮尸顺流而下。对岸的南方军阵地喷吐着机枪火舌，子弹犁过水面，激起细密的水柱。联邦军众多类型的野战炮疯狂还击，炮口焰在渐暗的天色中闪烁如闪电。\n\n"准备夜袭！"一名联邦少尉猫着腰跑过来，钢盔上沾着泥土，"我们要夺回渡口！"\n\n约翰的中队被安排在第二梯队。夜幕降临后，信号弹升空，惨白的光芒照亮了整片战场。第一波的联邦士兵跃出战壕，呐喊着冲向河滩，随即被机枪收割。尸体堆积在铁丝网前，后续的人踩着同伴继续冲锋。\n\n轮到他们了。约翰吹响铜哨，全中队的人跟着他冲进硝烟。子弹呼啸而过，有人倒下，但没人停下。他们站在半淹没的浮桥上，蹚过齐膝的河水，冰冷的激流裹挟着血腥味。\n\n在对岸的战场上冲刺时，一枚炮弹在约翰附近爆炸，气浪将他掀进弹坑。他挣扎着爬起，发现威廉正用冲锋枪扫射一挺哑火的机枪位。一位联邦医护兵跪在泥水里，徒劳地按压着某个骑士团成员的胸口，直到一颗子弹打穿了他的肩膀。\n\n黎明前，他们勉强守住了滩头。联邦军的增援源源不断地涌来，枪口在晨雾中闪烁。约翰靠在一截炸断的树干上，从口袋里摸出那本《瓦尔登湖》。书页已经被血浸透，梭罗的字句模糊不清。\n\n远处，密西西比河依旧流淌，仿佛这场厮杀与它毫无关系。"
 USA.10068.a:0 "直到每一片山林和青翠的峡谷最后都发出了咆哮之声"

 USA.10069.t:0 "密西西比河的远征"
 USA.10069.d:0 "战线的沉寂比炮火更令人不安。\n\n约翰·霍尔特坐在半塌的农舍门廊前，久久沉默。田纳西冬日的阳光苍白无力，照在新配发的浅蓝色军官大衣上——这是高级骑士-一个真正中队长领导者的象征，随嘉奖令一同送来的还有一盒哈瓦那雪茄和一枚镀金十字徽章。他摸了摸领口的徽章，触感冰冷。\n\n约翰已经领导了整整三个中队。如果从程序上来讲，他现在早就和骑士长平起平坐了，只可惜这三个中队的人数还没有两个正常的中队多。\n\n剩余的残兵散布在农庄周围。有人在擦枪，有人在写信，更多人只是呆坐着，眼神空洞。如今约翰的原小队还剩下十四个人，威廉正用匕首在橡树上不停地刻着划痕。一面树皮已经刻满，新痕叠着旧痕，像无法愈合的伤口。\n\n学士奥肖内西拖着伤臂走来，军医的白大褂换成了沾满药渍的灰毛衣。他递给约翰半瓶威士忌，酒液混着带有裂痕的玻璃，在太阳下闪闪发亮。"敬我们的晋升，"他讥讽地举杯，"用兄弟们的血换来的。"\n\n约翰灌了一口，劣酒烧灼着喉咙。“你到底存了多少这种酒啊，老兄。”约翰抱怨道。远处，联邦军的炊烟笔直升起，与南方军阵地的炊烟在灰白天幕下交织，仿佛战争从未存在。\n\n"你知道吗，"约翰突然说，"我父亲死在芝加哥罢工时，胸前别着劳动骑士团的铁徽章——那时候徽章上还只有地球和倒五角星。"\n\n奥肖内西坐在他的对面，用靴尖拨弄着泥土里半埋的物件——一个南方士兵的铜纽扣，旁边是压扁的罐头盒，印着"XX罐头加工公司1918"字样。"而现在我们戴着十字徽章，为那些这样破烂的罐头厂老板打仗。"\n\n风掠过焦黑的的大地，带起细碎灰烬。约翰从大衣内袋掏出那本《瓦尔登湖》，书脊已经用纱布缠裹。他翻到折角的一页："大多数人生活在平静的绝望中。"\n\n"梭罗该看看这个时代，"奥肖内西冷笑，"他会把笔折断然后跳湖自尽的。"\n\n一声尖锐的呼啸刺破天空。\n\n两人同时扑向地面。炮弹在三十码外炸开，气浪掀翻了晾衣绳上的绷带，碎布如苍白蝴蝶漫天飞舞。哨声凄厉，南方军的灰色身影从树林间涌出，刺刀在冬日阳光下泛着寒光。\n\n"骑兵！东侧！"威廉的喊叫淹没在机枪的咆哮中。\n\n约翰抓起冲锋枪，徽章在奔跑中粘上污泥。他看见奥肖内西拖着医药箱奔向伤员，灰毛衣在硝烟中忽隐忽现。一枚炮弹正中农舍，梁柱坍塌的轰鸣里，那本《瓦尔登湖》被气浪掀起，纸页散落如秋叶，飘向重新燃烧的大地。\n\n当联邦军的增援终于击退偷袭者时，黄昏已至。约翰在废墟间寻找奥肖内西，只找到他的眼镜，镜片裂成了蛛网，映着最后一缕夕阳。\n\n夜风中，未燃尽的纸页还在田野间翻飞。某张残页卡在铁丝网上，梭罗的字句在火光中依稀可辨：\n\n"我们为何要如此匆忙地成功，从事如此绝望的事业？""
 USA.10069.a:0 "无人应答。唯有密西西比河在远方流淌，沉默如亘古"

 USA.10070.t:0 "档案和调动"
 USA.10070.d:0 "斯特朗·贝特曼的钢笔尖在人事档案上悬停了片刻，墨水在纸上洇出一个小小的蓝点。\n\n纽约总部的地下档案室终年不见阳光，只有电灯投下摇晃的光晕。斯特朗推了推圆框眼镜，手指抚过一摞标着"纽约-底特律-1919"的卷宗。十二份档案整齐地码在架子上，可当他翻开时，却发现里面的工作记录、调令和签名卡像是被匆忙拼凑的——墨迹深浅不一，有的甚至用的是不同批次的公文纸。\n\n最奇怪的是第三份档案。照片上的男人明明在照片处写有“迈克尔·科林斯”，可下面的签名却是”弗朗西斯·德雷克”，而背面的体检报告又显示此人左眼失明——但照片里的双眼完好无损。\n\n“见鬼了……“斯特朗喃喃自语。\n\n他抱着档案上楼，敲开了人事处普雷斯顿高级学士的橡木门。办公室里的雪茄烟雾浓得能切开，普雷斯顿正用专用拆信刀，划开一封从另一个劳动骑士团的部门寄来的信函。\n\n“处长，底特律这批调岗档案有问题。“斯特朗把文件摊在桃花心木办公桌上，“至少三份存在身份矛盾，还有——"\n\n普雷斯顿抬起一只保养得当的手打断了他。老学士慢条斯理地戴上金丝夹鼻眼镜，瞥了一眼文件，突然笑出了声。\n\n"亲爱的贝特曼，你一定是眼花了。"他抽出最上面那份档案，随手看了几眼后便扔进壁炉，“纽约总部从来没有叫迈克尔·科林斯的成员，甚至是一名高级骑士。弗朗西斯·德雷克倒是在，可是他早就退伍了啊，你又不是不知道。”\n\n火焰吞噬纸页的瞬间，斯特朗注意到档案袋边缘有个暗红色印记。他赶忙坐在一旁。"可是处长，调岗记录显示一—”\n\n"记录会出错，记忆也会。"普雷斯顿从抽屉里取出一只牛皮纸袋，“不如处理点实际的？第13小队霍尔特队长的调职申请批下来了。"\n\n斯特朗接过文件。约翰·霍尔特的档案干净得反常：出生于芝加哥，现居纽约，母亲改嫁后随继父姓，在1916年纽约游行冲突中表现出色，在1918年的走私打击中一人就端了匪徒据点，去年冬天还制止了布鲁克林码头工人的械斗。照片里的年轻人有着爱尔兰裔的方下巴和一双过分平静的灰眼睛。\n\n"调往密苏里？"斯特朗皱眉，“他可是我们最好的小队指挥。"\n\n普雷斯顿耸耸肩，拆信刀尖戳着信封上未干的火漆：“孝道美德嘛。他母亲嫁的那个密苏里工程师——叫什么来着——对，老克莱默，肺痨晚期了。”\n\n窗外的纽约在下雨。斯特朗回到档案室，鬼使神差地翻出约翰·霍尔特经手过的所有事件记录。在1919年12月那场“布鲁克林码头事件“的结案报告里，他发现页脚有个铅笔写的坐标，后面跟着模糊的"12"这个数字——正是那批问题档案的数量，不过也可能是斯特朗的胡思乱想吧。\n\n当他试图用放大镜细看时，档案室的门突然开了。"
 USA.10070.a:0 "普雷斯顿的助理送来一杯咖啡，热汽模糊了斯特朗的镜片"
 USA_AUSA.10070:0 "眼前的信息都消失了"

 USA.10071.t:0 "火车站的送别"
 USA.10071.d:0 "三天后，斯特朗出抽时间，在火车站送约翰·霍尔特登上西去的列车。年轻的队长只带了一个皮箱和用油布包着的长条物件——根据条例，骑士团成员调岗时应当上交配枪，然而约翰是个例外，因为他从来不带配发的枪。\n\n“听说密苏里那边儿最近在招装甲车驾驶员。“斯特朗递过调令时试探道。\n\n约翰接过文件，手套与纸页摩擦发出沙沙声。"我更习惯骑马。“他笑了笑，眼角挤出细纹，可那双灰眼睛依然平静得像冻湖。\n\n列车鸣笛时，斯特朗突然抓住他的袖口："底特律那十二个档案，不是——哎呀，人！"\n\n"小心台阶。”原本两手插兜的约翰扶住差点跌倒的斯特朗，顺势抽回了手臂。他的外衣在晃动中弹开一条缝，斯特朗瞥见里面塞着一本旧书，烫金的标题在阳光下一闪——《瓦尔登湖》。\n\n汽笛再次响起，吞没了斯特朗未出口的疑问。当列车消失在哈德逊河转弯处时，他摸到衣袖里有一个硬邦邦的东西，抽出来一看，是个书签，上面用铅笔写着:\n\n"有些丛林，走进去就出不来了。”\n\n落款是约翰的签名。"
 USA.10071.a:0 "这是什么鬼？"

 USA.10072.t:0 "密西西比河的终点"
 USA.10072.d:0 "密西西比河裹挟着北方的硝烟，终于流入了新奥尔良。\n\n约翰·霍尔特站在圣路易斯大教堂的台阶上，望着联邦军的旗帜在市政厅楼顶徐徐飘扬，在咸湿的海风中猎猎作响，像某种宣告胜利的野兽。\n\n他如今已是正式的大队长，深蓝色的军官大衣上缀着一枚纯金十字勋章，腰间的镀银柯尔特手枪在夕阳下泛着冷光。可当他回头看向身后列队的新兵时，那些年轻的面孔陌生得令他恍惚——威廉、约瑟夫、奥肖内西，他们全都化为了密西西比河边的泥土，而眼前这些孩子，甚至还没学会正确握枪。\n\n城市在恐惧中沉默。街道两旁的百叶窗紧闭，偶尔有缝隙间闪过的眼睛，又迅速隐没在阴影里。联邦军的巡逻队挨家挨户搜查武器，不时有零星的枪声从巷弄深处传来，随即是军靴杂沓的奔跑与呵斥。空气中弥漫着海水、火药和腐烂橙子的气味。\n\n约翰摘下手套，揉了揉太阳穴。他的公文包里装着一本崭新的《梭罗诗集》，是半小时前在法国区的旧书店买的。书页洁白，散发着新鲜油墨的气息。店主是个独臂老人，当他见到约翰时，尚存一息精神的眼睛瞬间空洞，而接过钞票时更是浑身颤抖起来。\n\n转过杰克逊广场时，他看见一个老妇人摔倒在鹅卵石路上。她的菜篮翻倒，土豆和秋葵滚进排水沟。约翰快步上前扶起她，触到的手臂枯瘦如柴，皮肤下凸起的血管像纠缠的蓝线。\n\n"谢谢您，长官。"老妇人低声道，口音浓重得几乎难以辨认。她试图弯腰捡拾蔬菜，膝盖却发出不堪重负的声响。\n\n约翰替她拾起土豆，发现每个都带着发芽的绿眼。"您的儿子呢？"他问，随即意识到这是个愚蠢的问题——这座城市每扇门后都藏着寡妇与空椅子。\n\n老妇人浑浊的眼睛望向密西西比河方向："雅克，在维克斯堡，皮埃尔在孟菲斯，小路易……他们，雅克死了， 皮埃尔死了，小……"她的声音碎在风里。\n\n约翰沉默地拎起菜篮，搀着她穿过皇家街。夕阳将两人的影子拉得很长，他的军靴与她的木鞋在石板路上敲出古怪的二重奏。\n\n"您不该独自出门，"约翰说，"宵禁后很危险。"\n\n老妇人突然抓紧他的手臂："您见过一个带着怀表的人吗，那个怀表很大，外面是银壳，里面贴着圣徒像？"她的指甲陷进他的制服布料，"他们说，联邦军会归还俘虏的私人物品……""
 USA.10072.a:0 "§R枪声在此时炸响§!"

 USA.10073.t:0 "密西西比河的终点"
 USA.10073.d:0 "第一颗子弹擦过约翰的耳际，打碎了咖啡馆的残窗。他本能地扑倒老妇人，第二发子弹已击中他的下背，滚烫的疼痛如熔铅灌入血管。他翻滚到墙角，抽出柯尔特手枪时，看见一个穿工装裤的瘦高青年从巷口冲出，手中的老式手枪冒着的烟。\n\n"妈妈！快跑！"青年嘶吼着，声音里带着哭腔。\n\n老妇人却僵在原地，菜篮再次翻倒，土豆滚到路中央。"路易？"她颤抖着伸出手，"他们说你逃——"\n\n约翰的子弹先击中了青年的右腿，第二枪空枪。第三发来自青年，它打穿了约翰的公文包，深入约翰的腹部，使崭新的诗集溅上血点。当联邦巡逻队闻声赶来时，青年正拖着伤腿爬向母亲，身后留下一道蜿蜒的血迹。\n\n"是迪独危险分子，处决他！"领队的中尉高喊。十支春田步枪同时上膛。\n\n"等等！"约翰按住流血的腹部站起身，"他——"  \n\n枪声淹没了他的话语。老妇人发出非人的嚎叫，扑向儿子抽搐的尸体时，子弹击中了她的后背。她倒在路易身上，枯瘦的手指终于触到了最后一个儿子的脸，她终于确认这不是又一个噩梦。\n\n约翰的膝盖砸在石板路上。血从指缝间渗出，滴落在翻开的诗集上。奥肖内西的眼镜、威廉刻满划痕的橡树、约瑟夫留在铁轨旁的半条腿——所有亡魂突然在血腥味中浮现。约翰胡乱摸索着老妇人滑落在地的菜篮，发现最底下藏着一把锈迹斑斑的军刀。\n\n巡逻队将毫无气息的约翰赶紧送往最近的医院，而剩余的人开始搜查周围的建筑，踹门声与哭喊此起彼伏。中尉踢了踢青年逐渐冰冷的尸体："迪独的残余真是越来越猖狂了。"\n\n晚霞如血，浸染着圣路易斯大教堂的尖顶。约翰最后的灵魂跪在两具相叠的尸体旁，染血的诗集摊开在膝头。微风翻动书页，停在一首被子弹撕裂的诗上：\n\n"我步入丛林，因为我希望生活有意义……""
 USA.10073.a:0 "残破的纸页间，一颗发芽的土豆静静躺着"
 USA_AUSA.10073:0 "嫩绿的芽尖刺向暮色渐沉的§t天§!§3空§!"

 USA.10074.t:0 "战舰与人"
 USA.10074.d:0 "威尔明顿浑浊的空气里黏着海盐与铁锈的腥气。\n\n放眼望去，码头的木桩被潮水泡得发黑，像一排排烂牙，啃噬着浑浊的水面。巨大无比的干船坞上，龙门正忙个不停的来回移动。那艘大船——工头们叫它“本杰明·哈里森”号——就趴在那儿，灰蒙蒙的，像一头搁浅的抹香鲸。\n\n老汤姆啐了口烟渣，眯眼望着那高耸的炮管。“瞧见没，吉姆？那些铁管子，比教堂的钟楼还粗。”\n\n吉姆用脏袖子擦了擦额头的汗，咧嘴一笑：“装的是啥？大炮弹吧。”\n\n“鬼知道。反正不是装你这个笨蛋的。”汤姆哼了一声，“听说是一艘南北双方的共用舰吧，好像是给南方的。”\n\n吉姆不吭声了。南边——这个词像块烫土豆，谁接了都得在手里颠两下。他的表哥十年前去了南方谋生，再没回来。有人说他犯事儿死在南方佬的牢里，也有人说他成了南方的铁路苦力。真相早和锈铁轨一样，烂在野草堆里了。\n\n起重机在头顶嘎吱作响，吊着一块装甲钢板晃荡。汤姆盯着那钢板，忽然笑了：“三百多毫米厚，吉姆，知道啥意思不？”\n\n吉姆摇头。\n\n“意思是，南方几艘破船的炮弹打上来——”汤姆用拳头砸自己胸口，发出闷响，“屁事没有！可要是打穿了……”他指了指脚下开裂的码头木板，“咱们这些蚂蚁，先被震进海里喂鱼。”\n\n正午的太阳把甲板烤得发亮，几个穿白制服的人影在上头指指点点。吉姆啐了一口：“海军老爷们又在看那些破图纸了。”\n\n“他们爱看看去呗，关咱们什么事？”吉姆伸出手来。汤姆摸出半截皱烟卷递给了他，“知道吗小子？这船的材料不是铁，烧的不是煤，是钱。托拉斯老爷们从咱们骨头里榨出来的钱，可不要以为和你没关系了。”\n\n远处，一艘运煤驳船正喷着黑烟驶过。吉姆忽然问：“汤姆，你说这大铁家伙如果给了北边，真能镇住南边么？”\n\n老工人沉默良久，烟头在指间慢慢缩短。“镇住？哈！它只会让两边老爷们的账本多写几个零。”他踩灭烟蒂，抬头望向战舰桅杆上耷拉的联邦旗，“50多年了，旗子没变，可你瞧瞧——北边的扬基党，南边的迪克西党，中间夹着咱们，还有这堆吞金兽。”\n\n潮水开始上涨，浪头舔舐着战舰的龙骨。吉姆忽然觉得，这钢铁巨兽也不过是另一具浮棺——装着他们的工资、南方的棉花、西部荒原上的白骨，还有那些永远吵不完的协议。它终将沉没，不是被炮弹击穿，而是被锈蚀，被那些无人倾听的、细碎的呜咽。"
 USA.10074.a:0 "但这艘巨舰仍未完工"
 USA_AUSA.10074:0 "舾装完成预计还需389天……"

 USA.10075.t:0 "白宫机密文件"
 USA.10075.d:0 "日期：1921年6月30日\n呈递：沃伦·G·哈定总统\n主题：关于“本杰明·哈里森”号战列巡洋舰的潜在叛变风险评估 \n\n总统先生：\n根据海军情报局及联邦调查部门的最新汇报，我不得不向您紧急报告关于“宪法”级战列巡洋舰“本杰明·哈里森”号（以下简称“哈里森”号）的严重安全隐患。\n\n1. 人员构成风险：\n该舰60%以上的核心船员（包括舰长罗伯特·L·梅森少将）为南方出身，且与迪克西党存在潜在联系。舰长梅森曾在船员之间表露对迪克西党及南方各州的同情，其亦与南军迪克西党人员有密切往来。\n2. 近期异常动向：自6月13日下水以来，该舰未按计划进驻纽约海军船坞进行装备调试，反而以“试航训练”为由滞留切萨皮克湾。南方间谍网络近期频繁联络诺福克港，疑似策划接应。\n3. 战略威胁评估：若“哈里森”号叛逃至南方，其九门14英寸主炮及30.5节的航速的性能组合，将极大增强敌方舰队实力，威胁联邦对东海岸的封锁行动，甚至导致联邦政府海上态势失衡。\n\n建议措施：\n- 立即命令海军部中止“哈里森”号一切行动，强制召回至费城海军基地。\n- 逮捕梅森舰长及涉嫌叛乱的军官，由联邦北方海军官兵接管舰船指挥权。\n- 对南方籍船员实施紧急审查。\n此事务需绝对保密，若泄露可能加速叛变进程。请您即刻批示。\n\n敬礼\n联邦政府 国家安全顾问"
 USA.10075.a:0 "赶快给我控制住她！"
 USA.10075.b:0 "要不一切代价拿下这艘船！"

 USA.10076.t:0 "白宫机密文件"
 USA.10076.d:0 "日期：1921年7月4日\n呈递：沃伦·G·哈定总统\n主题：关于“本杰明·哈里森”号战列巡洋舰的夺舰行动成功简报\n\n总统先生：\n在您的紧急授权下，海军部与联邦调查局联合行动，于7月3日成功控制“本杰明·哈里森”号战列巡洋舰，阻止其叛逃至南方势力。现将行动细节及后续安排汇报如下：\n\n我方行动细节：\n1.我方行动前，先向战舰发送特殊电码，这种电码只有北方船员多数的船只才能破译，而这艘船上的通信组先前隶属于这类船只。\n2.该传通讯组员开始通知船上的北方官兵，并秘密开展行动，北方船员逐渐控制了船上的武器库和动力室。\n3.我方约200名陆战队成员乘坐快艇奔向战舰，而北方船员收到我方行动电报后，随即开始以武力夺取该舰，梅森舰长在战斗中被打死，随后北方船员将战舰调转方向，前往特拉华半岛，完成了与陆战队的接应。\n行动结束：我方陆战队与北方船员将所有南方船员控制，在战斗中约有182名南方船员死亡，而我方陆战队和北方船员共阵亡94人。\n\n我方后续安排：\n1.“本杰明·哈里森”号。将迅速加入我方舰队， 并补充船员。\n2.所有南方船员（现有701名）将被我海军在费城军港就地关押，直到审讯完毕为止。\n3.对于这件事，我们应该积极宣传，彰显联邦政府坚定不移的平叛决心。\n\n敬礼\n联邦政府 国家安全顾问 海军部 海军司令部 联邦调查局"
 USA.10076.a:0 "好！"
 USA_AUSA.10076:0 "一条先进的战列巡洋舰加入§3我方§!"

 USA.10077.t:0 "白宫机密文件"
 USA.10077.d:0 "日期：1921年7月4日\n呈递：沃伦·G·哈定总统\n主题：关于“本杰明·哈里森”号战列巡洋舰的夺舰行动失败简报\n\n总统先生：\n在您的紧急授权下，海军部与联邦调查局联合行动，于7月3日成功控制“本杰明·哈里森”号战列巡洋舰，阻止其叛逃至南方势力。现将行动细节及后续安排汇报如下：\n\n我方行动细节：\n1.我方行动前，先向战舰发送特殊电码，这种电码只有全北方船员的船只才能破译，而这艘船上的通信组先前隶属于北方船只。\n2.但通讯班组疑似已被换为南方人员，在收到未知电码后便直接关停了无线电运行。\n3.而后，通讯班组向我方发来最后一条电报-南方船员抢先控制了船只军火和动力设备，并开始用武力镇压北方船员的暴动。此条信息应当是北方通讯员发出的。\n4.最后，该战舰突然向南疾速行驶，并最终抵达现被南方控制的诺福克军港，而我方接应行动失败。\n\n我方后续安排：\n1.应利用情报机构彻底速查海军人员，避免重演“本杰明·哈里森”号的悲剧。\n2.此事的对外宣传应大事化小，小事化了，稳定北方公民和联邦政府人员的信心。\n\n敬礼\n联邦政府 国家安全顾问 海军部 海军司令部 联邦调查局"
 USA.10077.a:0 "我们怎么这么失败？！"
 USA_AUSA.10077:0 "一条先进的战列巡洋舰加入§t敌方§!"

 USA.10078.t:0 "矿人"
 USA.10078.d:0 "明尼苏达的早晨，乔纳斯·克鲁格望着在矿区大门喋喋不休的寡妇们，把最后一块黑面包塞进嘴里时，面包屑掉进了工装裤的破洞里。他盯着裂缝里露出的膝盖，突然咯咯笑起来。\n\n“瘸腿哥，该下井了！”\n\n升降梯的铁笼子总是卡在三百英尺的位置。乔纳斯把额头抵在生锈的栅栏上，数着钢缆摩擦的吱呀声。下面传来童工们的咳嗽，那些八九岁的孩子负责在岔道举油灯，煤烟把他们的肺叶熏成了腌肉。“像不像死人嘿……嘿嘿，嘿。”他突然转头对身后的俄国人米哈伊尔说，“我娘还是老婆死的时候，棺材板被雨泡涨了，合盖时也是这个动静。”\n\n米哈伊尔往墙角缩了缩。所有人都知道乔纳斯疯了，从玛莎的棺材因为欠缴下葬费被拖走的那天开始-尽管目前工作的时候没看见他有多疯。\n\n进入矿洞，乔纳斯蜷缩在一旁，用指甲不停地抠着炸药库锁眼里扣着渣子。这已经不是他第1次开小差了，按照矿业的规矩，一次一分钟旷工罚款，两次取消当月工资，最后一次就卷铺盖走人。\n\n不知怎么的， 锁还真就给他抠开了。他往帆布包里塞了六管硝化甘油，理论上防水防湿的包装纸被他的汗渍泡得发软。\n\n“妈的，一群混蛋，都是恶棍，没一个好东西！”乔纳斯越说越激动。\n\n“瘸腿哥！叫上米哈伊尔，去把西区坑道的支撑木换了…你在嘀咕什么呢，快去！”\n\n巴克的吼声在坑道里撞出回音。乔纳斯蹲在渗水的岩壁前，看着手里炸药管映出的幽蓝反光。去年圣诞节，矿场给每个工人发了一磅硬糖。小安娜把蓝色的糖纸折成蝴蝶，说要等春天放在玛莎坟头，可是怎么还没到那个时候，安娜就被法院的人抱走了，而自己这个铁废物呢？只换来一张要求证明自己“无能力抚养子女”的证明单。\n\n他的手指突然抽搐起来。岩缝里渗出褐红色的液体，滴在安全灯玻璃罩上滋滋作响。上周死掉的新工人被找到时，半边身子就泡在这种铁锈水里，从里到外看不出是个人。乔纳斯把三管炸药塞进裂缝时，突然听见头顶传来笑声。\n\n那笑声像用砂纸打磨铁钉。三个穿着厚厚雨衣的男人正从视察通道下来，他们锃亮的皮鞋正不停的避开地上的泥洼。最胖的那个戴着金丝眼镜，乔纳斯在矿区墙上的合影里见过他，据说神通广大，能和华盛顿特区的大人物坐在一起抽雪茄。"
 USA.10078.a:0 "“先生们请看，我们矿区的生产效率绝对没有水分……”"

 USA.10079.t:0 "矿人"
 USA.10079.d:0 "矿长的声音被乔纳斯耳鸣般的嗡嗡声吞没。他看见胖子裤子后袋露出半截丝绸手帕，和安娜最后那条裙子一个花色。\n\n安娜被带走那天，乔纳斯死死的拽住了她的裙子，结果被法院的人踹了一脚，而自个手上也就只留下这么一片布了。\n\n乔纳斯先支开了米哈伊尔，然后自己蹲在支撑木旁，引爆器旋钮转动的触感像在拧开骨头的关节。乔纳斯贴着潮湿的岩壁数数，数了几下便听见第一声闷响。但塌方来得比他预想的快几倍，整条主坑道像被握住的锡纸般扭曲。视察团的尖叫声混在钢梁断裂的轰鸣里，但也只是一声，人和声便被轰隆隆的塌方所一齐覆盖。\n\n“快跑！西区要塌了！”\n\n乔纳斯拽着吓傻的米哈伊尔往竖井爬时，他看见了升降梯钢缆崩断的瞬间，一个大胖子的金丝眼镜飞了起来，镜片反射着乔纳斯眼前最后的亮光。\n\n三天后，矿医院的护士给乔纳斯换绷带时，报纸上的主页新闻正写着“联邦军队胜利转进，西部暴徒遭受毁灭性打击”之类的句子。乔纳斯盯着自己缠满纱布的四肢，却闻到窗外飘来焚烧文件的焦糊味，估计是公司正在医院烧毁童工的雇佣记录-下次他们应该把寡妇一起干掉。\n\n“这是对你旷工的免罚单。”护士把盖着蓝章的文件丢在床头，“领导说你救人有功。”\n\n“我救了谁？米哈伊尔，他算什么东西？”乔纳斯抬起头。\n\n“呃，不知道，但就是因为你还活着，也就把矿长给救了……你伤好了还要出庭作证，连带着那个米哈伊尔，反正领导都把锅扔给死人了。”"
 USA.10079.a:0 "“他可不想让上头知道在器材上动手脚的事”"

 USA.10080.t:0 "生而自由"
 USA.10080.d:0 "蒙大拿的北部，风从山谷间呼啸而过，卷起干燥的尘土，扑打在罗伯特·勒罗伊·帕克的脸上。他眯起眼睛，吐出一口混着沙子的唾沫，手指无意识地摩挲着腰间那把磨损的柯尔特左轮。\n\n“卡西帕，”身后的老汤姆咳嗽了一声，嗓音沙哑，“那帮人又来了。”\n\n帕克没有回头，只是微微侧过脸，目光越过山脊，望向远处蜿蜒的土路。几辆摩托车扬起滚滚烟尘，引擎的轰鸣声撕裂了荒野的寂静。\n\n“又是那群疯狗。”帕克低声咒骂。\n\n摩托车队停在了山谷入口，领头的是个戴皮帽的瘦高个，绰号“响尾蛇”杰克。他摘下护目镜，露出一双狡黠的眼睛，嘴角挂着讨好的笑。\n\n“卡西帕！”杰克高声喊道，“我们得再谈谈！”\n\n帕克没有动，只是冷冷地盯着他。\n\n杰克咽了口唾沫，继续道：“底特律那边炸锅了，工人造反，联邦军忙着镇压。现在正是我们的机会！大伙儿都等着你点头，只要你一句话，整个西部都能打起来！”\n\n帕克依旧沉默。风卷起他的旧皮夹克，露出腰间另一把崭新的M1911手枪—上面的血迹说明肯定是从哪个死人身上扒下来的。\n\n老汤姆叹了口气，凑近低声道：“卡西，再这么躲下去，我们迟早会被耗死。要么干票大的，要么……要么等着被潘兴的狗腿子像宰牲口一样宰了。”老汤姆耸耸肩。\n\n“好，你说的对，我早该重新干回屠夫这一行了，用不着他们来。”帕克不明所以的说着。\n\n帕克的目光扫过山谷，扫过那些藏在岩石后、灌木丛中的面孔——他的跟班们，衣衫褴褛，眼神里却燃烧着饥饿的火。他们中的许多人，曾经是农民、矿工、铁路工人，如今却成了亡命之徒，只因为这个世界没给他们留活路。\n\n“自由？”帕克突然嗤笑一声，“我们他妈的哪来的自由？”\n\n杰克愣住了，脸上的笑容僵住。\n\n帕克缓缓站起身，拍了拍裤子上的尘土，走向摩托车队。他的步伐很慢，却带着一种不容置疑的压迫感。\n\n“你们想要我当老大？”他问，声音不大，却让所有人都屏住了呼吸。\n\n杰克连忙点头：“对！只要你——”\n\n“行。”帕克打断他，嘴角扯出一个冰冷的弧度。"
 USA.10080.a:0 "“但我有条件。”"

 USA.10081.t:0 "生而自由的他们"
 USA.10081.d:0 "夜晚的山谷里燃起了篝火。帕克坐在一块平坦的岩石上，面前摊开一张破旧的地图，上面用炭笔画满了标记。十几个匪帮头目围坐在周围，火光在他们脸上跳动，映出一张张或贪婪、或凶狠、或麻木的面孔。\n\n在他们之外，负责守备的土匪来回走动或歇息，从远处眺望，他们的数量仿佛无穷无尽。\n\n“联邦军的补给线从这里经过，”帕克的手指戳在地图上的一点，“每周二，他们会运送弹药和燃油去比灵斯，然后再转到加利福尼亚。”\n\n“抢了它！”一个满脸刀疤的汉子吼道。\n\n帕克摇头：“不，不是抢。”\n\n众人困惑地看向他。\n\n“是烧。”帕克的声音很轻，却像刀锋划过每个人的耳膜，“烧光它，让联邦军知道，西部的土地不是他们的。”\n\n一阵沉默。\n\n“然后呢？”有人问。\n\n帕克抬起头，目光扫过每一张脸：“然后，我们让整个西部记住——‘自由牛仔’不是土匪。”"
 USA.10081.a:0 "“那是什么？”"
 USA_AUSA.10081:0 "“是火。”"

 USA.10082.t:0 "来吾道夫先路"
 USA.10082.d:0 "风卷着焦土掠过龟裂的公路，海勒姆·约翰逊在坑洼中颠簸。后视镜里，五辆满载麻袋的卡车正飞速前进。西部民主同盟党党徽上的标识早被染成黑色，如同那些被烧毁农庄的横梁。\n\n"第三批了。"副驾驶座的艾玛用铅笔划破账簿，"北普拉特河边的镇子，七户人被打死，真惨。"\n\n约翰逊没应声，他茫然地看着前方。上个月政府军清剿土匪时，把整片玉米地烧成了炭。现在连乌鸦都不愿落脚。而在远处，缕缕炊烟映入了海勒姆的眼睛，应该是抵达目的地了。\n\n救济点在镇子里的教堂。但与其说教堂，倒不如说是战场-彩窗只剩锯齿状玻璃，圣像被雨水泡胀的脸孔朝下栽倒。三十几个农民沉默地排成蜈蚣，肋骨在粗布下若隐若现，难以想象铁路破坏后的食物供给匮乏到了什么程度。艾玛解开麻袋时，霉味混着尘雾腾起。而她身后的摄影师正一刻不停的找角度拍照。\n\n"每人十磅豆子，十磅面粉，还要分发一些生活用品。"她喊，"凭党证领，非党员者去我右手边的那位先生处领取物资，放心，你们领到的物资都是一样的，而党员需要进行进一步登记。"\n\n老妇人颤巍巍递上证件。海勒姆注意到她指甲缝里的血痂。"约翰逊主席，"她喉咙里滚着痰音，"我儿子在..."\n\n枪栓声截断话语。\n\n皮靴碾过碎玻璃的声音像骨头断裂。几十名雇佣兵围住教堂，领头的叼着象牙烟嘴，金表链在胸前隐约浮现。"联邦物资管制法第17条，"他用力弹飞烟头，"民间团体不得擅自分配赈灾品。"\n\n艾玛的铅笔断了。\n\n"这些是党员自筹的！"她脖颈涨红。"\n\n雇佣兵头子用枪管挑起麻袋，黑豆瀑布般泻在灰烬里。有孩子扑上去捡，被他踩住手腕。"去年怀俄明州，你们的人用所谓的救济偷运雷管，现在还要再犯罪吗？"他鞋跟拧转，孩子发出田鼠般的尖叫。\n\n海勒姆按住艾玛颤抖的肩膀。他闻到了更危险的味道——雇佣兵皮带上挂着酒壶，是一般走私贩的打扮。这些人根本不是正规军-连雇佣军都算不上。\n\n带头的佣兵头子狠狠的瞪了艾玛和身后的几名党员，随后转过头来对着约翰逊。\n\n“太可惜了，约翰逊先生，我们只能通知您的旅程到此结束。”\n\n深夜的党部地下室。海勒姆正擦拭着手枪，面前的油布上散落着蒙大拿矿工的求救信与照片。门突然被撞开，牧羊人扛着流血少年闯入。\n\n"他们在野牛泉设卡，"少年攥着半截党证，"说领救济粮的...都是土匪同谋..."\n\n当卡车紧急启动时，后视镜似乎映出雇佣兵们的掠夺。装豆子的麻袋被刺刀划破，黑潮在地上蜿蜒成圣经里的灾殃。约翰逊一刻不停的开着车返回起点，而艾玛把脸埋进掌心，党证从指缝滑落。"
 USA.10082.a:0 "但照片中的她依旧坚强"

 USA.10083.t:0 "大地的针线"
 USA.10083.d:0 "迪格斯太太的针穿过毛线时，发出细微的摩擦声。怀俄明的风从木窗缝隙钻进来，吹动桌上那本翻旧的请愿书花名册。她缝的是一件给隔壁家老太太的孙子的毛衣，灰蓝色，领口要织得厚些——西部的冬天总是来得突然。\n\n门是被撞开的。\n\n三个男人闯进来，靴子上的泥蹭脏了地板。领头的那人亮出徽章，金属在煤油灯下反光。"安妮·勒波特·迪格斯？联邦调查局和平克顿侦探社联合搜捕。请跟我们走一趟。"\n\n迪格斯太太的针没停。她抬起眼皮，看见他们腰间的手枪，还有门外站着的平克顿侦探——那些穿黑大衣的佣兵正用枪托敲打她晾在篱笆上的奶酪布。\n\n"罪名呢？"她问，手指绕着毛线打了个结。\n\n"煽动叛乱。与非法组织联络。"\n\n迪格斯太太笑了。她把毛衣搁在膝头，从摇椅旁的篮子里摸出烟斗。"先生们，我今年六十七岁，最远的旅行是去丹佛看关节炎医生。你们说的联盟，上周还在烧我的燕麦田……至于说被抓吧，随便你们，也不是第一次，老骨头还是经受得起的。"\n\n平克顿的人已经不耐烦了。一个戴皮手套的壮汉抓住她胳膊，却突然僵住——窗外传来铁器碰撞的声响。\n\n田埂上站着八十几个农民。有人握着猎枪，有人扛干草叉，老马丁甚至拎着给牲口打烙印的火钳。他们沉默得像秋收后的麦茬地，但探员们认得那些眼神——去年在科罗拉多，就是这样的人用捆麻绳的绞盘吊死了不少个征地代理人。\n\n"放开迪格斯阿姨！"。\n\n平克顿的枪已经举起，但联邦探员按住了同伴的手腕。"撤。"他低声说，"电报里可没说这儿有武装集会。"\n\n他们退出去时，迪格斯太太喊住他们："小伙子！"她举起那件未完工的毛衣，"告诉华盛顿的老爷们——"毛线针寒光一闪，"我们西部人，连补袜子都讲究个公平分配。"\n\n等汽车扬起的尘土散去，瘸腿汤姆帮她捡起掉落的毛线团。"阿姨，要召集委员会吗？"\n\n"不急。"她重新穿好针线，"先帮我把这袖口织完……得让小家伙穿暖和了，才好见证新时代啊。"\n\n风掠过草原，掀动那些钉在谷仓门上的传单，上面最新的墨迹还未干透："自治不是请求，是自然权利。""
 USA.10083.a:0 "针线仍然不停的穿梭"

 USA.10084.t:0 "花花公子扛大梁"
 USA.10084.d:0 "奥马哈的郊区，范德比尔特大宅的枝形吊灯晃得人眼晕，在一英里开外都能看得见亮光。\n\n"先生，科罗拉多支线又被袭击了。"管家站在阴影里哆嗦，而威廉没理他——他提前半小时就站在大门前，像个等待情人的中学生。\n\n远处那黑色的豪华轿车疾驰而来，随之下来了一个高大的身影。\n\n"查理！老伙计！"\n\n威廉与这位洛克菲勒的股东代表拥抱在一起，随后一起走进豪宅中畅谈。\n\n"听说你最近损失不小。"查理直接走向酒柜，给自己倒了半杯波本，"我听说又有一列油罐车被劫了，求证一下，真的假的？"\n\n威廉的笑容僵在脸上。这事今早才发生，连董事会都还没收到消息。妈的，洛克菲勒这老东西的消息这么灵通么。\n\n"我派了装甲列车......"\n\n"装甲列车？"查理嗤笑一声，从公文包里甩出一叠照片。威廉看到烧焦的铁轨上，他引以为豪的"钢铁堡垒"像条被开膛的鱼，连炮塔都不知道炸到哪儿去了。\n\n"知道土匪用的是什么吗？"查理啜饮着酒液，"法国造的75毫米野战炮。去年协约国的剩余物资，这是怎么流入到土匪手中的呢？"\n\n威廉的手串被自个儿扯烂了，白花花的珍珠撒了一地。\n\n晚宴在七点开始。\n\n威廉特意吩咐厨房准备了法式焗蜗牛——查理在巴黎留学时的最爱。但当银餐盖揭开时，蜗牛壳里盛的却是德州牛肉。厨师战战兢兢地解释：运蜗牛的火车在堪萨斯城被劫了。\n\n查理用叉子戳着牛肉大笑，笑声让水晶杯震颤。\n\n"知道吗，威廉？"他擦着眼角，"咱老总当年和你曾祖父斗的时候，用的是股票和律师。现在？"他举起餐刀，刀刃映出窗外护卫队巡逻的身影，"连土匪都用上榴弹炮了。"\n\n威廉盯着餐盘。牛肉渗出的血水在盘底积成小小的湖泊，像条燃烧的铁路向远处延伸。他突然想起小时候，父亲带他乘坐私人列车横穿西部。那时窗外是无边的金色麦浪，而不是如今这般——铁轨旁蹲着拿步枪的农民，眼睛里燃着比探照灯更刺目的恨意。\n\n管家慌张地闯进来，在威廉耳边低语。又有两列货车在怀俄明州失踪，这次装的是给潘兴将军部队的摩托车。\n\n威廉举起酒杯，香槟在杯中嘶嘶作响。他的情妇趁机蹭了过来，与查理一起干杯。而在他们三人的身后，威廉的又一个情妇则恶狠狠的盯着那个女人。\n\n"敬进步！"威廉高声说，声音在空旷的餐厅里回荡，"敬我们伟大的西部开拓精神！"\n\n窗外，汽笛声撕破夜空，列车们仍然如歌勇士般，向着未知的黑暗前进。"
 USA.10084.a:0 "毕竟迟到要罚款，准时总比送命强"

 USA.10085.t:0 "海军部与联邦海军司令部联合报告"
 USA.10085.d:0 "尊敬的总统阁下：\n\n1916年型“宪法”级-“本杰明·哈里森”号战列巡洋舰已彻底完成建造。舾装工程完毕时间：1921.6.1，驶入海面开始试航工作时间：1921.6.3，截止1921.6.10日，该船约搭载700名船员，且船只仍在正常海试。\n\n以下是该船数据：\n\n排水量:33,740 吨空载; 35,285 吨标准; 37,353 吨正常; 39,007 吨满载\n\n尺寸:长 (总长 / 水线长) x 宽 x 吃水 (正常/最大)\n(804.85 英尺 / 787.40 英尺) x 96.78 英尺 x (28.22 / 29.25 英尺)-(245.32 m / 240.00 m) x 29.50 m  x (8.60 / 8.91 m)\n\n2.武器:\n9门14.00" / 356 mm 50.0倍径火炮-每枚炮弹重量1,499.14磅 / 680.00千克 每门炮配备90枚炮弹。\n安装装甲炮座的旋转炮塔-1919Mode，炮塔全部布置于中线，两座3联炮座前甲板均匀分布，一座3联炮座在中线后甲板后部……\n\n3.装甲:\n-装甲带:以下数据为厚（最大），长（平均）高（平均)\n主体:12.0" / 305 mm，419.95 英尺/ 128.00 m，16.40 英尺 / 5.00 m\n艏艉:未装装甲\n主装甲带覆盖 82% 正常长度，没有完全覆盖弹药和动力舱室\n主装甲带倾斜度 20.00 度（向内为正)\n-火炮装甲:以下数据为正面 (最大)，其他炮室 (平均)，炮座/输弹机 （最大)\n主体:16.0" / 406 mm，9.00" / 229 mm，12.0" / 305 mm\n第二组:3.00" / 76 mm，1.00"/25mm，1.00" / 25 mm\n第三组:3.00" / 76 mm\n……\n\n4.机械:\n燃油锅炉, 蒸汽轮机, \n螺旋桨驱动采用电传动, 4轴, 总功率151,948 轴马力 / 113,353 Kw = 30.50节n，在14.00节速度下航程 7,000海里\n最大排水量下的燃料库 = 3,721 吨\n\n人员:应配置1343名-1746名船员\n\n5.船型特征:\n方形系数（正常排水量/水线长。宽。吃水）):0.608 / 0.613\n长宽比:8.14:1\n船长的自然速度:28.06 节\n首舷角 （船头朝前为正):30.00 度\n船尾外伸:0.00 英尺 / 0.00 m\n-首楼:24.50%,  30.22 英尺 / 9.21 m,  19.23 英尺 / 5.86 m\n-前甲板:30.00%,  19.23 英尺 / 5.86 m,  19.23 英尺 / 5.86 m\n-后甲板:25.50%,  19.23 英尺 / 5.86 m,  19.23 英尺 / 5.86 m\n-船尾甲板:20.00%,  19.23 英尺 / 5.86 m,  19.23 英尺 / 5.86 m\n-平均干舷:20.30 英尺 / 6.19 m\n……\n\n-联邦政府海军部 联邦海军司令部\n1921年6月10日"
 USA.10085.a:0 "这艘船可能火力差了点，但还是很均衡的"
 USA.10085.b:0 "看不懂看不懂……一定很厉害"

 USA.10086.t:0 "去丹佛"
 USA.10086.d:0 "安妮·迪格斯的肺像一只漏气的风箱，每呼吸一次都带着细微的嘶鸣。医生警告过她，再这样奔波下去，怀俄明的风雪迟早会灌进她的骨头缝里，把她钉死在病榻上。\n\n"还有多远？"她问车夫。\n\n此刻，她正坐在一辆摇摇晃颠的马车里，膝头摊着西部自治阵线的宣传册，封面就是这位老女士面带微笑的大头照。\n\n"到科罗拉多边境还得两天，"车夫啐了一口烟草渣，"但您真该听汤姆的——坐火车多快。"\n\n迪格斯裹紧羊毛披肩，咳嗽着笑了："人们得看见老太婆骑马赶路的样子……照片洗出来了吗？"\n\n车辕上的年轻人拍了拍相机："昨天那组好极了——您站在风化的界碑旁，简直像《圣经》里带子民出埃及的先知。"\n\n事实上，迪格斯大部分路程都蜷在马车里，膝盖上盖着毯子，怀里揣着热水袋。但摄影师总能找到角度——让她的侧影与荒原上桀骜的野马重合，或是拍下她颤抖的手抚摸贫瘠的土壤。这些照片第二天就会出现在《西部农民报》的头版，尽管或许只是上层人士的饭后谈资，但这报纸却无时无刻激励着最底层的农民与工人奋起反抗。\n\n当平克顿侦探带着一百多名武装佣兵包围科罗拉多红河谷的演讲会场时，他们只见到三千名举着草叉的农民。瘸腿汤姆站在临时搭起的木台上，正朗读迪格斯留下的信："他们以为我们会怕子弹？告诉你们，我已经活得够本了，不差这一条命！"\n\n领头的侦探揪住一个戴草帽的男孩："老太婆人呢？！"\n\n男孩咧嘴笑了，露出缺了颗门牙的牙床："迪格斯阿姨？这会儿该到丹佛啦——"他故意拖长音调，"坐的是太平洋联合铁路的头等厢！"\n\n原来在边境小镇拍完最后一张"风尘仆仆的骑马照"后，迪格斯就换上了体面的呢子外套，用自治阵线募捐的资金买了张火车票。当侦探们在荒原上扑空时，她正靠在丝绒座椅上，往红茶里加蜂蜜。\n\n"真要这么……"年轻的助手斟酌着词句，"戏剧化？"\n\n迪格斯望着车窗外掠过的农场——那些被银行抵押的田地上插满了拍卖木桩。"孩子，"她轻声说，"当你在议会里连张板凳都捞不着时，总得学会用镁光灯当枪使。"\n\n火车鸣笛声惊起一群乌鸦，它们扑棱棱飞过科罗拉多议会大厦的尖顶。"
 USA.10086.a:0 "风暴即将降临"

 USA.10087.t:0 "一位老人的演说"
 USA.10087.d:0 "迪格斯太太乘着一辆运干草的货车，到达目的地时，身上还沾着干枯的草屑。车夫是个沉默的年轻人，只在进城时低声说了一句：“他们盯着车站和旅馆，您最好别走大路。”\n\n黎明前的丹佛的冷得刺骨，但街巷里已有人影晃动——矿工、铁路工人、牧场的短工，他们认得她。有人递给她一杯热咖啡，有人塞给她一条粗羊毛披肩。没有欢呼，没有簇拥，只有沉默的点头，和一双双粗糙的手轻轻碰了碰她的肩膀。\n\n她知道平克顿的人在找她。他们的办公室就在城西，玻璃窗后总有人影晃动，电报机日夜不停地响。但丹佛不是夏延，这里的人太多，街道太杂，而愤怒太明显——他们不敢在光天化日下动手。\n\n上午时分，广场上已挤满了人，没人愿意干活了，他们宁可冒着巨额罚金的风险，也要来听一听这位“西部母亲”的呐喊。\n\n迪格斯太太站在市政厅前的台阶上，风掀起她的灰发，阳光照在她那张被岁月和风沙刻满沟壑的脸上。她没有喊口号，也没有挥拳，只是用那双平静而锐利的眼睛扫过人群，然后开口——\n\n“朋友们，我不是来煽动你们的。”\n\n她的声音不高，但广场上骤然安静。\n\n“我只是个老寡妇，会缝补衣服，会挤牛奶，会算清楚一亩地能打多少麦子。可华盛顿的老爷们怕我——怕一个连火车票都要赊账的老太婆！”\n\n人群里传来低低的笑声，但很快又沉寂下去。\n\n“他们怕的不是我，是你们。”她抬起手，指向远处，“怕矿工知道自己的命多少钱，怕农民算清楚自己的土地被抢走了多少，怕工人问一句——为什么我们流汗，他们数钱？”\n\n风卷起地上的传单，“自治”赫然的印在封面的最上部。\n\n“他们说我们是暴徒，是叛乱分子。可暴徒是谁？是半夜烧别人谷仓的人，还是被烧了谷仓还要交税的人？是拿枪逼人签地契的人，还是守着祖传土地不肯放手的人？”\n\n广场边缘，几个穿黑大衣的探子阴沉地站着，却没敢上前。\n\n“他们用法律对付我们，可法律本该保护我们。他们用子弹威胁我们，可子弹打不完千百万人的愤怒！”\n\n她的声音依旧平静，像在讲述一个再简单不过的事实。\n\n“所以，我今天站在这里，不是为了求他们施舍一点‘权利’，而是要告诉他们——西部的人，从不等别人恩赐自由。”\n\n人群开始骚动，有人高喊起来，但迪格斯太太只是轻轻抬手，示意他们安静。\n\n“我不号召你们拿起武器，但我也不会劝你们放下。我只问一个问题——如果连一个老太婆都敢站在这里说话，你们还怕什么？”\n\n…… \n\n沉默。然后，掌声如雷。\n\n探子最终退走了，消失在街角的阴影里。而迪格斯太太走下台阶时，一个衣衫褴褛的小女孩跑过来——"
 USA.10087.a:0 "她塞给迪格斯一朵鲜艳的野花"

 USA.10088.t:0 "逃出升天"
 USA.10088.d:0 "车站的月台上，风卷着煤灰和雪粒拍打的迪格斯的脸。她不久前在广场上喊破了喉咙，而现在，她的声音还留在那些人的耳朵里，像一块烧红的铁。站内的人群挤在铁轨旁-他们都在观望着迪格斯，同时等待着那列开往怀俄明的火车。\n\n现在，她得走了。但他们的眼睛不停地扫视着站台的老妇人。他们有穿黑大衣的人，有戴圆顶礼帽的家伙，他们的手插在口袋里，像是在摸枪。迪格斯知道，佣兵们不会放过她。\n\n“真难得，你们居然还在遵守美国宪法呀。”迪格斯对搀扶他的骑士团成员说道。\n\n火车缓缓进站，人群骚动起来。迪格斯迈步向前，靴子踩在车厢地板上——就在这时，一只手钳住了她的胳膊。\n\n“迪格斯女士。”那声音又冷又硬，“您得跟我们走一趟。”\n\n她抬头，平克顿的人，他身后还有三个大汉。\n\n“凭什么？”她问，声音很平静。\n\n“涉嫌策划对联邦财产的恐怖袭击。”那人咧嘴一笑，露出整齐的黄牙，“您知道的，那些煽动罢工的，革命啥的……法律可不喜欢这个。”\n\n劳动骑士团的人想上前，但更多的黑大衣从人群中钻出来，枪口若隐若现。迪格斯摇了摇头。她知道反抗没用，随后强行打发走了还想抵抗的助手。\n\n“好。”她说，“我跟你们走。”\n\n他们不顾抗议的人群，把迪格斯塞进一辆黑色马车，车窗钉着铁条。马车穿过丹佛的街道，车轮碾过积雪，发出嘎吱嘎吱的响声。迪格斯透过铁条的缝隙往外看——矿工们站在酒馆门口，沉默地望着马车经过。\n\n马车最终停在一座砖砌的小楼前，看守推着她进去，走廊里点着煤油灯，墙上渗出霉斑。他们把她关进一间地下室，铁门哐当一声锁上。\n\n迪格斯坐在木板床上，听着自己的呼吸。她知道他们会怎么对付她——折磨自己的肺和膝盖，直到她承认那些莫须有的罪名，或者干脆“意外”死在牢里，不会因为自己是一个老太婆而手下留情。\n\n几小时后，铁门开了。一个瘦高的看守站在门口，帽子压得很低。\n\n迪格斯没动。“干什么？”\n\n“跑出去吧，趁他们还没回来。”  看守扶起了迪格斯。\n\n也许看守在广场上听过她的演讲，也许他的兄弟死在矿井里，也许他受够了给铁路公司当狗。  不管如何，迪格斯站起来，跟着他穿过走廊，从后门溜了出去。冷风灌进她的肺里，丹佛的夜空没有星星。\n\n看守在她身后低声说：“快走。别回头。”\n\n第二天，监狱的负责人咆哮了一个早上。\n\n看守们面面相觑。\n\n一个胆大的说，“她撬开了锁，弄晕了警卫，跑了……”\n\n“放屁！”负责人一脚踹翻椅子，“一个老太婆，能放倒一个大活人？！”\n\n负责人也不再追问了-因为整个丹佛的人都知道，迪格斯被平克顿抓了。如果她死了，第二天矿井就会罢工，铁轨会被撬翻，他们走在街上会被石头砸碎脑袋的。\n\n而迪格斯，此刻已经坐在一列开往怀俄明的货车上，裹着破毯子，望着窗外漆黑的平原。她知道，这场戏还没完。"
 USA.10088.a:0 "但至少这回，她赢了"