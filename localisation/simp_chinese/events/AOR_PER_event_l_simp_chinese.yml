l_simp_chinese:
per.0.t:0 "国殇"
per.0.a:0 "多灾多难"

per.1.t:0 "战后会议召开"
per.1.a:0 "开始吧，各位"

per.2.t:0 "对于战后国内形势的讨论"
per.2.a:0 "乱七八糟！"

per.3.t:0 "关于重建工作的讨论"
per.3.a:0 "请安静！"

per.4.t:0 "关于下一步行动的争吵"
per.4.a:0 "你敢想象这是议会？"

per.5.t:0 "大会结束"
per.5.a:0 "真主保佑——"

per.6.t:0 "损失统计的结果"
per.6.a:0 "满目疮痍......"

per.7.t:0 "农业部"
per.7.a:0 "好了，行了。工作吧，灾民还在等着我们..."

per.8.t:0 "农业部拟定对抗饥荒的方案"
per.8.a:0 "看起来没问题"

per.9.t:0 "波斯的土地问题"
per.9.a:0 "不是啥好差事"

per.10.t:0 "通胀委员会"
per.10.a:0 "加把劲！"

per.11.t:0 "贪腐圣战"
per.11.a:0 "金钱——乃身外之物...."

per.12.t:0 "政府机构的混乱"
per.12.a:0 "乱都算夸他们的了...."

per.13.t:0 "军队现状"
per.13.a:0 "一群酒囊饭袋！"

per.14.t:0 "勘探团队的报告"
per.14.a:0 "叛匪？哦，对，听说过——"

per.15.t:0 "施工队的报告"
per.15.a:0 "这咋整呢？"

per.16.t:0 "是游击队"
per.16.a:0 "行了行了，头疼——"

per.17.t:0 "俄语的小册子"
per.17.a:0 "好，知道了——  等等？什么？俄国人？俄国人？！"

per.18.t:0 "吉兰已不在我们掌控中"
per.18.a:0 "该死的异教徒叛匪！"

per.19.t:0 "俄国赤色异教徒登陆恩泽利港"
per.19.a:0 "俄国人来了........俄国人又来了......."

per.20.t:0 "波斯苏维埃共和国宣布成立"
per.20.a:0 "分裂祖国的罪犯将受到最严厉的惩罚！"