  CHI.7.t:0 "四川陷入动乱"
  CHI.7.d:0 "川渝急报！西南的混乱达到了顶峰！在云贵二省被孙大炮的革命搅得天翻地覆之后，川渝这个军阀势力错综复杂的火药桶也点起了滋滋作响的引线。四川危机沉重的打击了总督陈宦的权威，整个相对封闭的四川无可避免的落入完全的动乱。根据狼狈逃窜出川地各个关口的溃兵所言，各道军阀正在集结部队，图谋夺取陈宦川康总督的宝座。肥沃的川渝盆地四分五裂，将官刘存厚和钟体道率领亲兵分别割据西川与嘉陵。前总督陈宦收紧力量，暂时龟缩在重庆周边的东川。苦寒的川西高原也被野心勃勃的刘成勋率领边军控制。鉴于民国政府濒于内战的现状，任凭这些军阀野心狼在川渝盆地里撕咬争权只能是迫不得已的选择。不过，据本报特别途径的秘闻报道，除了层出不穷千篇一律的军阀外，一些非同一般的贫农和逃兵组成的暗流也在川地的浑水下涌动。自罗刹国赤色革命后，所谓“马克思主义”吸引了不少走投无路的无产流氓。也许这次川地混乱的天赐之机下，一些别样的声音也在高喊：“王侯将相，宁有种乎？”"
  CHI.7.a:0 "什么？赤匪作乱？"

  CHI.8.t:0 "保境安民"
  CHI.8.d:0 "都说各省军阀们对政治可谓是春江水暖鸭先知，但如今的民国局势，黎元洪大总统出逃总统府、段祺瑞讨边大军进京反扑、西南军阀混战形势糜烂、俨然已是一锅热油，再笨的鸭子也知道拍翅膀逃命，更何况这些狡黠的军阀！夹杂在冯国璋和段祺瑞这两大北洋派系之间军阀省道还尚摆脱不了强权的控制，但西出关中的广大西域军阀们则彻底摆出了“保境安民”的嘴脸。表面上说是为中立自保，维护全面内乱下的政府，为民营资本和中华公民提供宝贵的庇护。但这群司马昭的膨胀野心很显然是路人皆知，这不过是野心家们公开敛财，创建自己的军阀王国的惯用伎俩罢了。假以时日，割据枭雄们便会在内战倾斜的战争天平上押注自己的筹码，或者……把陷入颓势的两家踢开，成为牌桌上的另一方霸王。"
  CHI.8.a:0 "保自己的境！安自家的民！"
  
  CHI.9.t:0 "奉天自治"
  CHI.9.d:0 "终于，在东北进入长达一周的无线电静默之后，奉天省督办张作霖露出了他的獠牙。奉天扯起“联省自治”的大旗，谄媚的打点好日本主子的关系，在东北军迅速掌控关外的交通要道和工业重镇后，一百万平方公里的沃土就此彻底脱离了所谓民国唯一合法政府的掌控。毫无疑问，张作霖代表的奉系绝不会低头于段祺瑞或冯国璋任何一方，有着日本人的背后支持和发达的南满工业，奉系绝对会是逐鹿中原的群雄中的一方霸主。从南到北，中国将容不下一寸安宁的土地，兵戈将起，胜者为王！唯一值得考虑的是，奉系的入关将在何时？哪怕张作霖在东北经营多年，影响和势力根深蒂固，但是骤然脱离合法政府的混乱还是无法避免。现在所有人都在与时间赛跑，关内的对手咽下耻辱，抓紧一切时间构建防御，关外的新王摩拳擦掌，就等东北彻底抓稳手中。战争不是将要来临，战争就在那里，已经鸣响了预备哨。"
  CHI.9.a:0 "逐鹿群雄几人王？"

