  CHI.15.t:0 "乙末西征"
  CHI.15.d:0 "纵横古今，世界列强无数。唯俄罗斯国恶行最甚。自清廷来，便展獠牙青面，侵我国土，扰我国民。若非聚民族之愤慨，今朝之世便再无中华。然其恶习未改，待长河悲怮、山河怒号，便一展狼子野心，驱民葬海，以取山岳川河。其馀种种罪恶，更难尽书。  今中华为胜，往日阴霾亦应一并扫空，吾等无欲劳国民之筋血、增国事之多艰，以续战黩武。然俄罗斯者秉承恶性，蔑弃耻心，背食和约，视四万报国将士之性命于无物。故地难返，故人难逢，客死他乡之战士，竟永无归乡之时乎？  “以德报德，以直报怨。”今北上讨俄，但求故土安宁，不为弑人恶行。所望凡食民国之禄，事民国之事者，咸激发天良，申兹大义，成海棠秋梦。"
  CHI.15.a:0 "经此一役，梦可成矣？"

  CHI.16.t:0 "段祺瑞的决定"
  CHI.16.d:0 "这一夜，段祺瑞坐在桌前，晚风吹拂着他，却无法带给他半分宁静。他端着军帽，摩挲着军帽上的北洋军徽，几次，他想把军帽放到桌上，可最后，他的动作却都犹豫了。不知多久，他忽的自嘲一笑“除了你吴子玉，再无人能让我段某人，复有这小儿女态了。希望，我没有看错人”段祺瑞端正的带上军帽，做出了决定。"
  CHI.16.a:0 "道路曲折，前途未卜"

  CHI.17.t:0 "东瀛的橄榄枝？"
  CHI.17.d:0 "一则消息在段祺瑞的亲信圈子里流传开来：日人通过政府内的亲日派，向我们释放了愿意合作的信号。对于如今的我们来说，任何支援都弥足珍贵，但世上没有免费的午餐，日人向来贪婪，他们期望的回报，可能是我们的财税，我们的主权，亦或者……我们的灵魂。我们究竟该如何决断？"
  CHI.17.a:0 "只要能笑到最后，我宁愿与魔鬼做交易"
  CHI.17.b:0 "明知为一杯鸩酒，吾为何要闭目一饮尽"

  CHI.18.t:0 "REPLACE_ME"
  CHI.18.d:0 "REPLACE_ME"
  CHI.18.a:0 "REPLACE_ME"

  CHI.19.t:0 "外西北战事暂告段落"
  CHI.19.d:0 "数月前，当时尚在人世的大总统袁世凯力排众议，发起了对外西北失地的伟大收复战争。如今，大总统已然仙逝，而国内局势也日趋紧张起来。各派实力明暗交错，便是西北前线内部，也暗流涌动。而持续几个月的作战，也给本就并不完善的后勤系统带来了巨大的压力，补给线业已濒临极限。显然，继续进行外西北攻略，在如此遥远的前线维持巨大的军事存在，已然不符合我国如今的国情与现状。更值得注意的是，前线的部分部队，由于长期作战已然怨声载道，若不加以处理，恐前线有哗变之忧。因此，为稳定军心，也为减轻后勤和财政压力，从即日起，外西北前线只维持少量驻军稳定当地局势，大军将不日回返。待到返京之日，徐总统，段总理和靳总长将亲自为有功者授勋表功！"
  CHI.19.a:0 "这出大戏，今日到了落幕之时；君之所获，是满堂红还是喝倒彩？"

  CHI.20.t:0 "暂时的同盟？"
  CHI.20.d:0 "中央系方面传来消息，他们原则上愿意与我们合作。当然，他们也提出了他们的条件，但总体来说，双方的分歧不算巨大。我们在统一北洋的道路上，又前进了一步。"
  CHI.20.a:0 "合作愉快？"

  CHI.21.t:0 "中央系拒绝合作！"
  CHI.21.d:0 "即使我们拿出了最大的诚意，中央系还是拒绝与我们有任何合作，他们已经驱逐了我们派去的谈判代表，也许理论上还有联络的可能，但事实上交流的大门已经关闭了。"
  CHI.21.a:0 "执迷不悟只会自食其果！"

  CHI.22.t:0 "四九城的两日（一）"
  CHI.22.d:0 "京兆，陆军部。 陆军总长靳云鹏，国务总理段祺瑞，还有徐树铮，吴光新……北京政府有头有脸的人物，都沉默的注视着短短数行的电报。“……俄寇自知不敌，业已撤出侵占地区……至次日清晨，我骑兵先遣队已抵夷播……随信使送回俄军旗及夷播之水一壶，请诸位长官皆分一瓢饮”“信使如今身在何处？”烟雾缭绕的房间里，段祺瑞最终开了口。“恰逢西北风沙，信使只能借道蒙古返京。昨日，信使抵达库伦后，受到当地驻军极为热情的欢迎，据报喝的不省人事，半夜才勉强醒转。库伦方面不敢怠慢，增派人力加以护送。今晨，车队已沿张库公路回返了。”“呵，如此大费周章的分润功劳，看来这次倒八成是真了”靳云鹏笑道。连带着房间里其他几个人的神态也肉眼可见的放松下来。“电令张家口，信使到达之后不要修整，也不要继续乘汽车返京。让张家口驻军准备几匹快马，安排信使快马加鞭返京。”人逢喜事精神爽，平日里总是严肃板正的段祺瑞，这次也起了玩心。“这戏文总唱‘八百里加急捷报传’，今日，咱们也来演上一演。”内焦外困的北京政府，急需这一强心针，而对段等人来说，这出戏，或许也是如今压力下的小小调剂。几人都轻松的笑着，房间里充满快活的空气。"
  CHI.22.a:0 "“ 得令！”（翻页）"

  CHI.23.t:0 "四九城的两日（二）"
  CHI.23.d:0 "午前，熙熙攘攘的街道上，行人神色匆匆。路上的沙土在如今这个时节是扫不净的，时而路过的轿车或者军车，也从不顾及路旁的种种。它们皆疾驰而过，又总掀起一阵扬沙。前者或许还有人在其后咒骂两句“缺德”，后者却让人噤若寒蝉。无他，军爷若是心情不好，挨上几枪托都算是好的，指不准“叭叭叭”的几声，咱就成了道侧的孤魂野鬼。王法？明眼人都看得出来，乱世将至，如今，枪杆子就是王法！当然，对于身居北城深宅大院的老北京八旗子弟来说，这一切似乎都很遥远。即便铁杆庄稼倒了，也没有激发他们半点的紧迫感。晨起喝茶遛鸟，道个吉祥，日头上来了，再回屋眯一个回笼觉，过日子就图一个舒坦。德内大街旁，庆王府的下人们早已开始了一天的忙碌。即使如今大清已亡，但该有的规矩和排场，总少不了。不惑之年的庆亲王载振，昨夜接着酒劲儿和药劲儿折腾到很晚，而今正搂着自己的侧福晋做着春秋大梦。梦里，自己在戊戌年被西太后立为“大阿哥”，在光绪那个短命鬼突然驾崩后，成为了大清国的皇帝。之后，他智斗慈禧，合纵连横，励精图治，中兴大清，在四十余岁终于带领大清战胜了几百年来纠缠不休的罗刹鬼，收复了祖宗基业。不仅如此，自己当初倾心而不得的那位杨小姐，在大胜后，不仅义演为自己贺功，更是自荐枕席，愿与自己一夜风流……"
  CHI.23.a:0 "“往昔不假辞色，今日扫榻相迎。前倨后恭，看朕今日如何责罚你”（翻页）"

  CHI.24.t:0 "四九城的两日（三）"
  CHI.24.d:0 "“大捷！大捷！西北大捷！”德胜门外，一股烟尘由远及近，伴随人声与马蹄声，打破了四九城的平静。早已收到命令的守城士兵，连骂带拽的驱散门前准备出入城的人群。很快，几骑快速通过门楼，扬起的尘土呛的周围人连连咳嗽，但是此刻，大家都在消化刚刚得到的消息，反倒无人抱怨什么。入了德胜门，骑兵又分成两队，一路沿德内大街南去，另一路则顺着斜街直奔鼓楼。很快，整个四九城都传遍了西北大军得胜的消息，茶楼酒肆里，文人吟诗庆贺，泪沾衣襟；没那份文采的普通人，大多浮一大白，直呼痛快，连带着平日里风评不佳的驻军，门前都能有几个男女学生歌功颂德。“哒哒，哒哒”阵阵马蹄声搅碎了载振的梦，半梦半醒间，他双手发狠，低吼道“是何人纵马，扰朕清梦？”可换来的只是一声娇滴滴的痛呼“王爷，您，您弄疼妾身了……”这一下，载振才算彻底清醒，看着侧福晋身上的红印，他随口应了一声，忙唤来了自己最信任、也是王府里为数不多的太监。“小金子，外面出了何事？为何有人当街纵马，难道是洋人又打过来了”说着，载振的声音竟是微微有些颤抖。“这，奴婢也不知，已吩咐前院奴才们去打听了，想来很快就有消息了，王爷要是着急，我再去前院催催”言罢，得到载振肯定的答复后，小金子快步离去。载振等不及下人伺候，自己换好衣服，在房间中来回踱步。突然，他仿佛想到什么，快步进了后院，在书房的书桌前坐下。摊开访问欧洲时做的笔记，载振翻找着，很快找到了自己需要的东西。一字一顿，他结结巴巴的读着："
  CHI.24.a:0 "“爱，爱慕，普林茨，爱，瑟润德……”（翻页）"

  CHI.25.t:0 "四九城的两日（四）"
  CHI.25.d:0 "不多时，从外院传来喧闹声和金铁碰撞之声。屋外猛然冒出了头顶大铁锅，手拿打狗棍的小金子，他身上挂着从厨房搜刮来的几柄菜刀和斩骨刀，叮叮当当的响个不停。他一边进，一边还兴奋的喊着“王爷，王爷，了不得了，官军在西北打了个大……”他猛然住了嘴，分明是看见了福晋给自己喉咙上抵了一把剪子。“哎呦喂我的福晋奶奶呀，您这是做什么，快，快把剪子搁下，洋人没打来，是官军，官军在西北打胜了，把罗刹鬼从咱大清旧地上赶出去啦！”好说歹说劝住了福晋，小金子刚松口气，突然又一拍脑门“坏了，王爷，王爷哪去了？”福晋指了指后院，小金子又“金戈铁马的杀向后院去也”。走进后跨院，小金子直奔书房而去，只因平日里，庆王爷便爱在书房指点江山。“哟，王爷，您可让我好找，您咋猫在这么个角落里，这是在和几位福晋玩捉戏？”在书房里叮铃咣当转了一圈，小金子在屏风后找到了载振。他这一开口，载振反倒急了：“好啊小金子，平日里我待你不薄，今日你不帮我遮掩就罢了，竟然还带着洋人来抓我，你个奴才，定是想用我的项上人头，向洋大人邀功吧！”听得此话，小金子本就不太灵光的脑瓜子已经烧的冒了烟。载振却以为说中了小金子的心事，又接着骂道：“知人知面不知心，我一直以为你小金子忠心耿耿，没想到这一遭了难，便看出人心难测了……”眼看着王爷越说越吓人，小金子赶紧跪下磕头“王爷，王爷呐，奴婢可从没想过卖主求荣啊，奴婢出了房门就去厨房找家伙，想着拼了这贱命不要，也要护得王爷和福晋周全。后来在前院儿听了官军大胜的消息，奴婢高兴的不得了，就直接跑回来报告了。王爷明鉴呐，小金子生是王爷的奴婢，死也要当王爷的奴才，怎么敢干卖主求荣的事呢……”载振闻听洋人没打过来，是官军打赢了的时候，就已施施然站起身，重新又摆出一副淡定自若的样子。看着小金子一边哭一边磕头，直磕的额头破皮，载振忽的开了口：“行了，本王就是试一试你小金子的忠心，现在看来，你不错，很不错”小金子转而又开始一边谢恩，一边磕头。“行了别磕了，赶紧把从厨子那顺出来的东西给还回去。对了，吩咐下去，官军打胜了，中午本王想吃些好的，九转大肠和油爆双脆都给本王做一做”“嗻”小金子领了命，正欲离去，载振又叫住了他。“王爷，您还有何吩咐？”"
  CHI.25.a:0 "“给我准备一件新下裳，我沐浴后穿”“喳！”"

  CHI.26.t:0 "经改方法之论"
  CHI.26.d:0 "财政部综合经济形势，递交了两份经济改革方案。第一份方案的支持者是交通系的专家；该方案依赖于交通银行的财力，建议财政部与交通银行深入合作，由交通银行联络和组织银行界，提供高息存款和低息贷款业务，并牵头组织优质投资项目，鼓励富裕者积极投资实业，让金钱流入市场；第二份方案主要由财政部提出，方案牵头人是留美的年轻官员刘大钧；该方案同样是吸引投资，不同之处在于，该方案着力于投资“未来”，类似于西方国债或战争债券建立国家统一基金，以未来战胜后大量待分配的工厂、资源、土地为吸引点，鼓励富裕者投资基金，从而促进国内经济改革。"
  CHI.26.a:0 "选方案一吧，听上去更稳妥些"
  CHI.26.b:0 "方案二似乎很有新意"

  CHI.27.t:0 "督军团之议"
  CHI.27.d:0 "会议已然进行到了第二天，段总理和靳总长已发言数次，但在座的各位督军，依旧面色严肃。其中如徐树铮、倪嗣冲等，实为皖系成员，但此时却不好再开口。“搞这个督军团，主要目的其实大家都看得明白，就是统一指挥，精简兵力，提高战斗力”靳云鹏又一次开了口。“如今各省看似兵马众多，实则内部大多混乱不堪，不进行一定的裁汰和整编，未来难堪大用，而我们的对手直系，在这一点拥有优势”他顿了顿，身旁的段祺瑞接过话头。“靳总长所说实为金玉良言，这个督军团不是为了收大家的兵权，而是为了能集中力量，更好的面对吴子玉的威胁，等吴子玉战败下野，各位依旧是可以管理自己的兵马的。当然，战斗不可能没有损失，我段芝泉今日便许诺”段祺瑞制止了身旁的靳云鹏“裁汰的安家费和战胜的封赏，中央一律承担，各位督军所部的兵员损失，战后优先补充”段祺瑞结束了发言，留下了惊讶的各省督军。反应迅速的徐树铮等人立刻开始了声援，而在皖系的鼓噪和各省督军的半推半就下，督军团这一构想，最终得以成形。"
  CHI.27.a:0 "各位督军深明大义，芝泉甚是欣慰"

  CHI.28.t:0 "好事多磨"
  CHI.28.d:0 "短短数日，交通系和北京政府进行了多次会谈和闭门磋商。有时一整个下午的会议，只为了确认一项条款的一个细节。参与会议的双方，尤其是双方最为忙碌的基层官僚，对如此拖沓的会议进程自然颇有微词。年轻人私底下说，会谈双方就好像初次恋爱的青年男女，明明都中意对方，却还要故作矜持，相互试探，害怕太过于投入，太过于迫切，会被对方轻贱。是谓“怕你不来，又怕你乱来”；而老资格们一边斥责着年轻人，一边自己聚会时也犯嘀咕“这小心谨慎的劲儿，不就是麻杆打狼两头怕吗”在纷纷的议论中，会议持续了足足半月有余，今日，双方代表都长舒口气，在最终的合作备忘录上签名留印。"
  CHI.28.a:0 "给枪杆子挂上钱袋子"

  CHI.29.t:0 "吴段会"
  CHI.29.d:0 "有些出乎意料的是，吴佩孚真的接受了我们的邀约，在双方商定好的“中立”地段与我方进行接触。两位北洋巨头在这场私人会谈中到底说了什么并不为我们所知，二人走出会谈室后的神态表情也没有给我们任何信息。但从近几日北洋内部的动向来看，直皖矛盾或许真的得到了缓和。"
  CHI.29.a:0 "牢不可破的北洋？我大抵是在梦中罢"

  CHI.30.t:0 "事不可为"
  CHI.30.d:0 "吴佩孚终究没有接受我们的邀请，他们似乎不相信我们的诚意，并且以段祺瑞一直支持“武力统一”理念为由，宣扬我们这一次的态度转变是“拙劣的骗局”。不管怎么说，直皖的弥合俨然已成笑话，更糟糕的是，我们过去所做的准备全部作废，而现在开始备战，可能已经晚了一些……"
  CHI.30.a:0 "真是棘手的情况"

  CHI.10000.t:0 "北望"
  CHI.10000.d:0 "怀宁六邑中学的后院里，几株老槐树被夏末的日头晒得蔫头耷脑，知了叫得人心烦。我们八九个学生却围坐在石桌旁，汗流浃背也不肯散去，只为争论那桩惊天动地的大事——袁大总统要打俄国人了。\n\n"外西北自古便是中国疆土！"陈志远拍案而起，他生得白净，此刻却满面通红，"当年左宗棠大人抬棺西征，如今正是我们收复故土之时！"\n\n李德明推了推圆框眼镜，慢条斯理道："俄国现在乱得很，甚么白军、红军打得不可开交。依我看，这正是'鹬蚌相争，渔翁得利'的好机会。"\n\n众人凑过去看，啧啧称奇。我却瞥见王步文独自站在槐树下，斑驳的树影落在他洗得发白的长衫上。他比我们大三四岁，眼角已有了细纹，听说他常与那些从蒙古回来的伤兵打交道。\n\n"步文兄怎么看？"我问道。\n\n王步文搓了搓手上的老茧苦笑道："我在伤兵营伺候过老冯，他说蒙古那边，咱们...。"\n\n陈志远立刻打断："冯某人是败军之将，岂能长他人志气！袁大总统这次要组建青年军，用的都是新式装备。"\n\n"新式装备？"王步文从兜里摸出半截烟卷，就着石桌上的火柴点燃，"老冯说..."\n\n李德明皱眉："步文兄未免太灭自家威风。俄国现在两派相争，兵力分散..."\n\n陈志远猛地站起来，长衫下摆扫翻了茶碗："王步文！你这是扰乱民心！外西北有金矿、有沃土，收回来了，国库自然充盈。你整日与那些残兵败将混在一处，眼里就只有些蝇营狗苟！"\n\n王步文不答，只是默默捡起碎瓷片。\n\n"报名处明天就设在府学广场，"陈志远环视众人，目光灼灼，"我第一个去！谁愿同往？"\n\n除了我和老王几个，其他人都举了手。李德明甚至当场吟诗一首，有"不破楼兰终不还"之句。\n\n散学时，夕阳把石板路染得血红。王步文忽然拉住我："你曾读过这本俄国的册子？"见我摇头，他从怀里摸出本油印小册子，"拿去看吧，比给政府效力有用。"\n\n我接过时，发现封面写着很漂亮的俄文，虽然一个都读不懂-而扉页则画着一个大的红旗，书里头的字迹已经模糊，想是被翻看过许多遍。\n\n第二天，府学广场人山人海。陈志远果然排在第一个，他穿着新做的学生装，胸前别着白布徽章，上面墨书"还我河山"四字。我挤在人群里，看见招兵处的军官穿着笔挺呢子制服，桌上的花名册已经写满三页。\n\n秋风吹落槐叶时，前线传来消息：俄军反攻了。"
  CHI.10000.a:0 "就是那个甚么红军"

  CHI.10001.t:0 "旗女"
  CHI.10001.d:0 "夏末的北京城，热得像个蒸笼。王婆子摇着蒲扇，站在"春满楼"门口，脸上堆着笑。她身后站着七八个姑娘，个个涂脂抹粉，却掩不住眼下的青黑。这些姑娘们昨夜接客到三更，此刻被叫起来，个个打着哈欠，眼睛里泛着水光。\n\n"都打起精神来！"王婆子尖着嗓子道，"今儿个可是大日子，政府征召咱们去游街示众，抗俄救国！"\n\n小翠揉着眼睛问："妈妈，什么是'抗俄'？"\n\n"就是打老毛子！"王婆子不耐烦地挥挥手，"上头说了，袁大总统要收复外西北，咱们得去助威。每人发五毛钱，不去扣半月工钱！"\n\n姑娘们面面相觑。她们大多不识字，更不懂什么国家大事。平日里只晓得接客、数钱、挨打，如今突然被拉去"救国"，只觉得莫名其妙。\n\n胡同口来了几个穿制服的，抬着个木箱。为首的瘦高个儿喊道："领旗子！一人一面，游行时举着！"\n\n箱子里是些粗制滥造的小纸旗，红底白字写着"还我河山"、"抗俄救国"之类。\n\n瘦高个儿又拿出几张纸："这是口号，都学着喊。'打倒俄国强盗'、'收复外西北'、'中国青年万岁'..."\n\n姑娘们跟着念，声音参差不齐。小翠偷偷问身边的月红："姐，外西北在哪儿？"\n\n月红撇撇嘴，不作声。\n\n瘦高个儿听见了，厉声道："外西北是咱们中国的领土！被俄国人占了去！袁大总统要派青年军打回来！你们这些...这些..."他扫了一眼姑娘们暴露的领口，咽了口唾沫，"这些爱国群众，得去助威！"\n\n正午时分，游行开始了。前头是学生队伍，举着大横幅，喊着整齐的口号。中间是商会的，抬着袁世凯的画像。最后头就是这些胡同里的"爱国群众"。\n\n小翠举着那面小旗，旗面已经被手汗浸湿了一角。她穿着件借来的蓝布褂子，可这褂子又肥又大，活像个面口袋。月红的更糟，她个子矮，褂子下摆都拖到了地上，走两步就绊一下。\n\n"打倒...打倒..."小翠忘了词，只好跟着前头的人瞎喊。她额头上的汗珠滚下来，冲开了脂粉，在脸上冲出几道沟壑。\n\n路边看热闹的人越来越多。有人指指点点："哟，这不是窑婊子吗？怎么也来游街了？\n\n"啧啧，连窑姐儿都爱国了，这世道..."\n\n人群挤作一团。小翠被人推搡着，手里的旗杆"咔嚓"断了。她踉跄几步，撞到了月红身上。月红本就走不稳，这下褂子被踩住，"刺啦"一声裂了个大口子。\n\n"我的衣裳！"月红尖叫起来。这褂子是借的，回去得赔钱。\n\n队伍更乱了。几个姑娘的旗子掉了，被人踩得稀烂。有人开始哭，有人蹲下来揉脚——她们平日不走路，今日这么一折腾，脚上磨出了泡。\n\n路边看热闹的哄笑起来。有人喊："窑姐儿游行，天下奇观！"\n\n小翠忽然觉得这一切荒唐极了。她看看手里断了的旗杆，又看看周围乱哄哄的人群，不知怎的，竟"噗嗤"笑了出来。\n\n"笑什么！"王婆子一巴掌扇在她后脑勺上。\n\n小翠捂着头，却止不住笑。她想起昨晚那个客人，一边在她身上动作，一边慷慨激昂地说要"投笔从戎"。"
  CHI.10001.a:0 "就是为这样的人去吆喝的么？"

  CHI.10002.t:0 "旗女"
  CHI.10002.d:0 "游行队伍终于散了。姑娘们三三两两地往回走，旗子扔了一路。\n\n接客之前的休息时间，小翠躺在床上，听着外头隐约的口号声——学生们还在连夜游行。她想起白天那个晕倒的学生，苍白的脸上还带着稚气。不知他会不会真的被送上战场，去那个叫"外西北"的地方。\n\n小翠只在耳旁昏昏沉沉的听到，袁大总统在赞赏他，哦不对，是咱们这些姐儿，那可真是为国请命，为国有功。用来当枕头片儿的当日《申报》上还写着“爱国妓女舍身捐款”之类的荒唐话，那一点小钱可是姐儿们的命根子呀。\n\n窗外，太阳正缓缓落山，一弯新月冷冷地照着北京城。不知照不照得到那个遥远的、许多人从未听说过的地方。"
  CHI.10002.a:0 "姑娘们，别睡了，快起来接客喽！"