l_simp_chinese: 
  CHI.1.t:0"袁大总统的国会演讲"
  CHI.1.d:0 "古俄毛纵横，强虏肆虐，血照西北，并呑国土，以壮其势。悠悠华夏，岂堪屈膝俯首，以维旧交，自当厉兵牧马，兴壮志，复故土，拓定边方，以复华夏荣光。今俄毛纷乱，同室操戈，望天下志士，从军报国，共伐俄毛。谁非黄帝子孙？涿鹿中原，会洗蚩尤兵甲。为兹要约曰： \n凡属中华民国之国民，其皆华夏子民，复中华故土，力破外敌，应吾等所为。义一。 \n后立外西北政府，遵民权口号，内外官职，皆由民选，以代表中华民国。义二。 \n罢除一切俄毛所立腐朽制度，以民国先进制度代之，护当地民众权力。义三。 \n兴华语，废俄文，以促汉化，固边疆民众之思想。修现代设施，应民愿，体现民生之精神。义四。 \n外派新军护卫边疆，以防俄毛反扑，内设警察总督等职，保外西北之稳定。内外皆稳，民众自当竭诚欢迎。义五。 \n 建此五义，奉以纲维。义师所指，意在复国土，攘外夷，国土既复，即刻停军护卫边疆。其有党恶朋奸，甘为逆羽，杀勿赦；抗颜行，杀勿赦；为间谍，杀勿赦；故违军法，杀勿赦。如律令。布告天下，迄于满、蒙、回、藏、青海、伊犁之域。 \n凡属中华民国之国民，其皆华夏子民，复中华故土，力破外敌，应吾等所为。义一。 \n后立外西北政府，遵民权口号，内外官职，皆由民选，以代表中华民国。义二。 \n罢除一切俄毛所立腐朽制度，以民国先进制度代之，护当地民众权力。义三。 \n兴华语，废俄文，以促汉化，固边疆民众之思想。修现代设施，应民愿，体现民生之精神。义四。 \n外派新军护卫边疆，以防俄毛反扑，内设警察总督等职，保外蒙之稳定。内外皆稳，民众自当竭诚欢迎。义五。 \n建此五义，奉以纲维。义师所指，意在复国土，攘外夷，国土既复，即刻停军护卫边疆。其有党恶朋奸，甘为逆羽，杀勿赦；抗颜行，杀勿赦；为间谍，杀勿赦；故违军法，杀勿赦。如律令。布告天下，迄于满、蒙、回、藏、青海、伊犁之域。 \n大战以后，中华得胜，旧日阴霾亦应一并扫空，吾等无欲劳国民之筋血、增国事之多艰，以黩武而续战。然今日之赤俄，前承帝制之暴虐，后续而犯我之疆土，吾等虽抱诚恳之心，常以善面之，其不忍情，至今日已忍无可忍，让无可让，古人云：‘得一夕之安寝，而秦兵又至’，四境虽大，物产虽博，却绝无一地嫌广，一人觉多，吾若再馈人以资敌势必将为国际耻笑耳，今日‘东亚病夫’又欲立于国民头颅之上？\n今北上讨俄，不为弑人恶行，但求边土安宁。所望凡食民国之禄，事民国之事者，感激发天良，申兹大义，不惧困苦，踊跃报国，唯求成一海棠秋梦”。\n                                                                                      ——《讨俄檄文》袁世凯"
  CHI.1.a:0"——与天下告"

  CHI.2.t:0"新年，新气象，新…"
  CHI.2.d:0 "项城既克外西北，协约诸国皆贺，而病已入膏肓矣。医者私语左右："元首之肾，已成枯井。"然项城犹日啖参苓白术散，谓是"固本培元"之圣药。\n\n每于昏瞑之际，辄见德皇威廉流徙之状，惊寤汗下。乃密嘱长子克定："速购西洋新式透析器械，勿令外人知。"又闻日本"东洋医士"有换肾奇术，遂遣密使赴东京，然终惧"以夷变夏"之讥，踌躇未决。\n\n尝夜召徐菊人，执其手曰："吾欲效彼得大帝事，奈何..."语未竟，溺血盈盂。"\n\n是夕，英使朱尔典闻之，但笑曰："此所谓'以血洗血'者也。""
  CHI.2.a:0"新总统……?"
  
  CHI.4.t:0 "破舟泛海，各抢木板"
  CHI.4.d:0 "袁公既殁，南北顿成沸鼎。\n\n北洋诸将，尤显同床异梦。段合肥挟中央余威，欲挟天子以令诸侯；曹仲珊、吴子玉则拥兵豫直，虎视眈眈；中央徐菊人辈，唯持印绶周旋其间，然印把子渐冷，终难调停。\n\n粤中陈竞存辈，阴聚兵甲，窥伺岭表，俨然别开新灶之态。而滞留燕蓟之国民党人，亦如失林之鸟，或投皖系，或附直隶，各寻枝栖，不知滇黔孙氏外有何志士与党人共图大业？\n\n天下大势，已非"城头变幻大王旗"可喻，直如"破舟泛海，各抢木板"耳。"
  CHI.4.a:0"袁!大!总!统!"
  CHI.4.b:0"自由!"
  CHI.4.c:0"下一页"

  CHI.40001.t:0 "破舟泛海，各抢木板（第二页）"
  CHI.40001.d:0 "川中陈二庵，昔为项城心腹，今坐镇巴郡，然号令不出督署。杨子惠、刘自乾辈各据要津，俨然"五斗折腰"而互不相服。蜀地兵戈之气，日盛一日。\n\n湘蜀之间，满蒙退卒归来者，渐聚成社，传布"均贫富、共衣食"之说。彼辈操"红灯经"，言必称"均田地，共资本，天下大同"，乡野愚氓竟有箪食壶浆以待者。\n\n当是时也，蜀中军阀尚在"争食鼎中脔"，而满蒙退卒与黔首暗结陈吴之欢。天下未乱蜀先乱，此之谓欤？"
  CHI.4.e:0"三民!"
  CHI.4.f:0"权威!"
  CHI.4.g:0"无产!"


