l_simp_chinese:
 BAV.1.t:0"奥古斯特·倍倍尔"
 BAV.1.d:0"“即使是李卜克内西和卢森堡这样优秀的革命者也难掩社会民主党之颓势，左翼思潮正处风雨飘摇之中。‘斯巴达克斯派被粉碎了!’从《邮报》到《前进报》都发出了这般的欢呼。”\n\n火车自瑞士向巴伐利亚驶去。跨过高山，渐渐能看见田野与炊烟了。窗边的老人把目光自窗外收回来，顿在新收到的报刊上——那是小李卜克内西最近的一次演讲。\n\n“他们今天就已经失败了!因为他们想把那些人当作自己的工具来使用，今天却已经成了那些人的俘虏，而且他们历来都是那些人的工具。”\n\n就像老威廉所了解过的那样，卡尔的性格还是那样冲动。而对于罗莎——她做出的妥协太多，她需要知道一个社会主义者应当在什么时候强硬，就像不久前伊里奇向察里津前线致电时批评的那样。\n\n无论如何，社会民主党经受不起又一次失败。火车上倍倍尔又一次回想起自己把自传托付给考茨基时的那个下午。他一定要看到这红色的种子在欧洲大地上开花结果："
 BAV.1.a:0"“不顾一切。”"
  
 BAV.2.t:0"一场噩梦"
 BAV.2.d:0"灰暗的天幕淅淅沥沥的滴下水珠，空中的雨点组成帘幕遮蔽了前路，发出恼人的，犯恶心的声音。弗朗士的胸口不由得有些发闷，轻按下脖颈，一把抹掉了额头上的雨水，加紧了脚步赶路。\n\n老友现在在巴伐利亚机械制造厂上班，对于现在的弗朗士来说，这段路还是太长了。推开宿舍的门，吱呀吱呀的叫声牵扯着他的神经，眼前有点发黑，不由得身形一矮，捂住脑袋。\n\n“砰!”\n\n天旋地转，这声炸弹的巨响将摇摇欲坠的他推下记忆之崖，前线和手中的武器就在眼前，血肉擦过头顶，浑身粘腻，肺被拽住了一般无法呼吸，枪炮声使他头晕，“声音……阻止……”\n\n弗朗士有气无力的喃喃道，现实的门框和虚幻的记忆交替展现，他脚步虚浮，无法迈过门槛，战友熟悉的声音又一次回响了。\n\n“革命必将取得胜利!”\n\n“不!不!”佛朗士惊醒了起来，而他什么都拦不住，如同那年的那个夏天。\n\n又一声巨响响起，是现实中的？还是当年的炮火正中目标？血肉飞入口中，咸腥的味道直冲口鼻，即使半跪于地面，却依然无法于大地之中找寻安宁。\n\n佛朗士努力起身，迈过门槛，他的军队必须夺下柏林，南方联军必须获胜...\n\n不成人样的尸体横在他的面前，而破碎的话语扎入心灵，给了他最后一击。“暂停作战计划!暂停作战计划!”\n\n耳边只响起友人微弱的喊叫，他彻底瘫倒在地上。"
 BAV.2.a:0"我们...还是输了。"

 BAV.3.t:0"祝福"
 BAV.3.d:0"记忆被生硬的掐断，撕裂，思维被粗暴的搅碎，糅合。身体虚弱的完全不能动弹，勉力挣开的眼睑，目光的尽头也只有模糊的苍白。有那么一瞬，倍倍尔已然忘记了自己是谁，自己身在何处。但他迅速催动生涩的大脑，企图弄清当下处境。\n\n“我最后在工作……”记忆中闪过那张朴素的书桌，“……还有很多工作没有完成……”倍倍尔再次奋力试图坐起，但徒劳无功，身体末梢几无响应。\n\n“巴伐利亚根据地的情况我最清楚，我还需要为年轻人们多做些努力……”柏林城外一夜的火光，腹背受敌，山穷水尽的革命同盟星星点点的闪耀在眼前，划过脑海，虽然巴伐利亚根据地在短短几年的时间里大踏步的向人人有动力，有热情，有信仰的革命热土迈进，但还不够，还远远不够。德意志革命，世界革命的重担仍然悬在肩头……\n\n房门洞开，数个脚步急切的接近，声声话语打破宁静，但无论倍倍尔如何努力地去分辨，去倾听，这些词句都好像远在天边般模糊，只能听出许多熟悉的人，熟悉的同志的呼唤。李卜克内西，卢森堡，梅林，莱文……\n\n“他们不该都在这，他们也都有工作，他们来这干嘛？我估计病倒了……但他们也不该这么摆这么大的阵仗……”倍倍尔为之忧心，为革命的前景忧心，为年轻同志们的指引忧心，“我还有……很多工作……”\n\n心脏骤然传来一阵剧痛，昭示着老革命家的病因，也宣告着生命终点的迫近。老革命家一定要嘱咐同志们些什么，奋力撑起病躯，雾蒙蒙的双瞳扫过一尘不染的病房，终坚定的聚焦在床头人影上，只见得一幅幅年轻的，朝气蓬勃的，洋溢着热情与关切的脸庞。思虑万千，千言万语汇集到嘴边，竟无语凝噎。老革命家最终释然的笑了，他没有，也无需说出条条详尽的嘱咐，只仿若一位慈祥的老父亲，骄傲于自己优秀的儿女，轻声而坚定的道出人生最后一言，不是嘱咐，而是祝福："
 BAV.3.a:0"“世界，正年轻。”"
 
 BAV.4.t:0"一封共产国际的电报"
 BAV.4.d:0"“同志们!我认为，在俄国事变之后，在德国一月斗争之后，特别需要指出，无产阶级运动的最新形式也在其它国家中产生出来，并取得了统治地位。例如，今天我在一份反社会主义的报纸上看到一条电讯，说英国政府接见了伯明翰工人代表苏维埃，并表示愿意承认苏维埃是经济组织...”\n\n第一国际大会的电报自莫斯科发来，斯巴达克同盟知道，在东欧广阔的原野上，也有那样一群人在与反动的帝国主义作斗争——尽管他们的境遇一样的焦灼。倍倍尔当然知道那则新闻——英帝国主义政府做出了妥协，而德国的火种便在于这巴伐利亚苏维埃。于是倍倍尔在木桌前坐下，拿出笔来作出批示。他知道接下来的会议将决定这个政权的走向。\n\n共产国际。一个无产阶级的国际组织。它将打破国界，为全世界受压迫者带去科学的理论与实际的支援。“同志们!我代表俄国共产党中央委员会衷心地欢迎你们。现在我提议选举主席团。请提名。”俄国的同志们说。于是，巴伐利亚回复道："
 BAV.4.a:0"“我们将尽快派代表前往莫斯科。”"

 BAV.6.t:0"乡下见闻"
 BAV.6.d:0"日影高悬，明媚的照亮了慕尼黑郊外的田野，如此澄澈的日光打在卢森堡女士胸前口袋里的钢笔，反射出耀眼的白芒，似能刺破一切丑恶与黑暗。今天的革命之鹰女士一幅干练的记者打扮，心中谨记倍倍尔的教诲：到乡下去，到基层去，深入了解革命的面貌。\n\n一对田野边的身影吸引了“记者小姐”的注意力，年轻的官员正手足无措的宽慰着身型佝偻的老农。“同志，是工作遇到麻烦了吗？”“记者小姐”快步上前，“老先生，苏维埃政权是建立在劳动人民的诉求上的，有麻烦还请您尽管讲。”老农抬起悲苦的面容，缓缓道出了一个辛酸的故事，一个勤劳的德国公民，一个幸福美满的家庭是如何被帝国主义和封建制度抽筋拨皮，挖骨吸髓的故事：\n\n“起先是世界大战的时候，小伙子们高歌着什么‘皇帝的荣耀’，‘再现普法战争的辉煌’奔赴前线，我女儿还甚至给她哥哥唱歌送别。谁知……谁知不到三个月，送回家的就只有冰冷的死亡通知，他们我孩子的尸体都没能找回来……”老农静静的叙述，脸上已无痛苦，只余麻木。\n\n“没办法，生活还得继续，只能找了个容克当雇农！他简直就是个畜生！但我别无选择……”老人眼中似乎要喷出火来，卢森堡女士也赶紧追问：“不会再有封建地主了，您有委屈尽管讲。”“他假借什么‘德国金融崩溃’之类的狗屁的理由威逼利诱我们换用他发行的‘抵债券’，实际上就是把我们和他的地绑死，当他的农奴!”\n\n“真是岂有此理!”卢森堡女士也跟着怒火中烧，转头看向身旁的那个官员：“人呢？追查到了吗，私自发行货币可是重罪。”税务官万般无奈：“是我们南下之前的事情了，这帮封建渣滓们早就卷走一切逃跑了，只剩下无数和老先生一样的破产工农……”"
 BAV.6.a:0"任重道远。"

 BAV.7.t:0"妇女的解放"
 BAV.7.d:0 "幸运小小的顽皮了一下，当米娅转过放学路上的街角时，正好看见信号灯下的交警轻轻拉动调整杆，煤气提灯轻盈的调转，旋即由绿转红。随着气缸与飞轮组成的河流切断了街道，在因重建而日渐繁华的慕尼黑街头，这往往意味着大段时间的等待。米娅烦躁的撇撇嘴，站在街边无所事事的出神。\n\n其实，等红灯并不算是米娅苦恼的原因，老实说，她甚至有些期待这种等待。当同龄的女孩们还痴迷于精致的立体书或洋娃娃时，她却建立了一些不同寻常的爱好，相互啮合的齿轮拉开的大幕和蒸汽柴油的鸣响构筑了她儿时的遐想。如今，这爱好的火苗依然倔强的燃烧，而眼前这些马路上飞驰而过的钢铁猛兽便是她梦中驰骋的骏马。她不惧怕飞扬起的尘土，相反，她踮起脚，伸直脖颈，好想看清一点，再看清一点，直到目光能越过这些轧制的钢板，看清那些驱动猛兽狂奔的迷人心脏。\n\n一阵玩闹的声音打断了米娅的白日梦，是米娅班上的那些成群结队的男孩们，也是她苦恼的原因之一。“我要是真能成一个机械师……必须得和他们一起工作，一起生活……”米娅叹了口气，“他们都是很好的人，这不是他们的问题，但是我爸爸可能不会答应……”想到父亲那张充斥着古板和说教的嘴，米娅只感觉无力感从四面八方袭来。“况且，可能工厂压根就不招女性呢。”自嘲的笑钩上了米娅的嘴角。这时，这一批车流总算顺利的通过，交警一甩栗色的马尾，再轻轻一拉信号灯，靠边休息一刻。\n\n天哪！米娅才注意到这位干练的交警居然也是位女性！警察！这可不是个寻常的职位。当她靠近时，米娅好像终于找到了能解答她疑惑的人：“……事情就是这样。”一番叙述后，米娅扑闪着眼睛期待回答，而交警小姐抹去汗珠，露出了一个劳动女性专有的迷人笑容：“‘现在，女性劳动开始在国民经济中扮演重要和严肃的角色。’这不仅是《妇女与社会主义》的结论，也是我们解放区鼓励并力行的纲领。”交警小姐伸出手，揉了揉米娅的脑门，“想做什么就之努力吧！在苏维埃政府治下，没有旧时代的条条框框！”\n米娅的回应只有郑重的点头，但以她眼里的决心，她一定能做到任何事。"
 BAV.7.a:0 " “傻孩子，你又得等红灯啦！”"

 BAV.8.t:0"李卜克内西的一日"
 BAV.8.d:0"老车工叼着根纸烟，向组长打好招呼后，从车间探出来，长满老茧的手从满是灰尘的口袋里摸出根火柴来，在帆布裤上啪的一下擦燃了，勉强点着了烟，才闭了眼，慢慢呼出一个烟圈来。\n\n昨天他的学徒还在跟人家讨论，说历史的发展是迂回曲折的。现在出现了这样的情况：正是德意志，除了体现无限的扩张欲与高压的专制，同时又体现了纪律、组织、在现代工业基础上的紧密协作以及极严格的计算与监督的原则。\n\n现在，他们——慕尼黑的工人们继承了旧世界的一切——他们的文化，他们的组织，他们的思想。继承了德意志严谨而成熟的工业资源的，一粒革命的种子从资本主义世界一角的废墟中又一次发起芽来。\n\n“而这正是我们所缺少的。这正是我们要学会的。这正是我们伟大斗争由胜利的开始经过许多严重考验而走向胜利的结局所缺少的东西。这正是巴伐利亚苏维埃不再做又贫穷又衰弱的军阀，而永远成为又强大又富饶的国家所需要的东西。”\n\n恍惚间，老车工听见，在中央政府的飞机终于悠然远去时，柏林城下的血海中有人讲起话来。那声音愈来愈响亮，终于爆发成欢呼。那血海中忽而探出一只手来，拍了拍他宽阔而僵硬的背。手中的步枪滑落，成一根未熄的烟头。\n\n“师傅，大伙都在那边听讲演呢。”\n\n“小子!……又是谁来了?”\n\n“李卜克内西!”那学徒拉着他的师傅，要往那人群中跑去，“小李卜克内西到我们厂来了!”"
 BAV.8.a:0"——也许，革命的火焰可能再次燃遍德意志。"

 BAV.10.t:0"会址"
 BAV.10.d:0"斯巴达克大会的会址仍旧选在慕尼黑的老市政厅，这座有着百年历史的典雅建筑再一次熙熙攘攘充满生机。这座比在座的代表们还古老的多的哥特建筑的每一扇剔透的窗棂，每一座高耸的塔尖都见证了德意志的百年兴衰。\n\n最一开始，霍亨佐伦的黑鹰骄傲加冕，为自己赢下德意志帝国之名。前巴伐利亚公国的王侯将相和铁血帝国的行政官僚们端坐在席位上发号施令。财富与野心，眼光下的土地，皆以帝皇的荣耀之名号令路径的公民肃静，臣服。\n\n世界大战的业火炙烤着帝皇的家国，焚灭了钢铁与鲜血铸就的权柄，烧尽了野兽们的理智。军部政变，架空皇帝，一队队身着黑衣头戴钢盔的兵士接管了这里，以枪弹的强权命令路径的公民为德意志的生存，在德意志的土地上效死。\n\n帝国战败，权威崩溃，来到这里的是趾高气昂的英国人和法国人。他们和容克，资本家沆瀣一气，戴上白手套精细优雅的将路径的公民榨干价值，分食殆尽。\n\n而今日，路径的公民自发清理街道上的瓦砾与坑洼，孩子们欢声笑语的经过市政厅门口，不再畏惧于这高耸威严的建筑。因为他们明白，头一次，其中的争吵与辩论时为了他们；头一次，其中的演讲与宣告是讲给他们；头一次，其中的席位，坐着他们自己。"
 BAV.10.a:0"理应如此。"

 BAV.11.t:0"我们的同志…"
 BAV.11.d:0"战争在迫近。随着柏林所谓中央政府的财政在内忧外患下彻底崩盘，其代表德意志地区的最后一丝合法性与本就微乎其微的控制力彻底烟消云散。和它一起陪葬的还有德意志邦联，这可悲的产物!这耻辱的，苦涩的，分裂的产物!这维系德意志最后脆弱和平的产物!战鼓沉重的敲响，为每个尚能呼吸的德意志儿女敲响。\n\n敌人在行动。面前，拦路虎法兰克福已决出笑到最后的赢家，尚不清楚是敌是友；彼端，威州自治区的钢铁巨兽拔锚启航，封锁再无宁静的海疆；中央，柏林政府收拢军队，誓要再次粉碎我们的革命；铁靴踏过，枪弹上膛。\n\n但同时，同志也在召唤。我们的水兵老友，同为共产主义事业而战的袍泽，哪怕远在德国彼端，正被反动派团团包围，正进行艰苦卓绝的斗争，亦正期望我们的团结一致。全德意志的城乡，有组织的，自发行动的赤卫队与游击战士，以及最广大的无产阶级们正高歌，正召唤，正期盼着我们的团结一致。我们又怎能辜负这滚烫的期望!我们要再度擎起革命同盟的大旗，这一次，再无背叛；这一次，再无妥协；这一次，再无失败!"
 BAV.11.a:0"…正踌躇满志"
 
 BAV.13.t:0"我们的革命…"
 BAV.13.d:0"起初，没有人在意我们的理想。当马，恩总结出人类历史的规律时，当封建腐朽的沙俄崩溃时，当星星点点的共产主义者组织起来时，他们都对此嗤之以鼻。而当最进步的革命席卷最封建的俄国大地，而当左翼势力在他们内部壮大到无以复加，而当他们惊骇而恐惧的称我们为盘旋欧洲乃至世界的幽灵时，他们才正视我们的革命。\n\n起初，没有人在意我们的行动。他们侥幸找出我们的弱点，煽动我们的叛徒，瓦解我们的同盟。敌人宣称我们已被粉碎，叛徒叫嚣我们理想之火已然熄灭，所有反动派都认为，我们已人民的怒火与鲜血浇铸的利剑已断成碎片。但我们在南德意志站稳了脚跟，在他们不以为意的地方壮大根据地，到组建南德意志苏维埃，德意志革命同盟。我们撑过了最黑暗的时刻，并以这黑暗磨砺我们的剑锋.\n\n现在，所有反动派都将胆寒于正义的浪潮。但见那德意志大地群雄逐鹿，敌人的鹰犬自相残杀，我们的同志踌躇满志，是时候将我们以拾起的断剑，加以过去的悔恨与教训重铸的革命利刃出鞘，斩向枷锁，寻得解放!"
 BAV.13.a:0"…亦整装待发!"

 BAV.14.t:0"第一次革命之殇"
 BAV.14.d:0"南德意志苏维埃政府致符腾堡政府：\n\n你们好，亲爱的战友与兄弟！这里是来自巴伐利亚苏维埃政府的一封呼吁信，我们希望贵政府能了解我们的想法。\n\n内战后，南方同盟已经土崩瓦解，我们的社会民主党人团体也因为意识形态的不同而四分五裂，曾经我们巴伐利亚政府与贵政府也有过许多冲突，引发了许多的不愉快。而如今，我们双方政府都在帝国主义以及工业资本家的包围下，维持着革命政权；我们的目标是一致的-打倒采用剥削制度的工业资本家，打倒入侵德国以及其他民族与国家的帝国主义者，打倒腐朽的柏林政府。那么是否有一种可能，我们政府双方可以重新联合起来，为了德国人民获得自由而不懈奋斗呢？\n\n我们知道，如果双方政府需要联合斗争，那么必然需要经历一定的磨合，这一点我方政府完全理解。不过贵政府如果同意与本政府重新进行政府和经济层面的交流，那么我们双方完全可以通过边境线的某一处地点进行双边谈判，并达成我们共同的目的。\n\n再次致以诚挚的问候\n\n谨代表南德意志苏维埃的临时主席——"
 BAV.14.a:0"弗兰茨.梅林"

 BAV.15.t:0"新助理"
 BAV.15.d:0"又是巴伐利亚繁忙的早晨，在慕尼黑的政府大楼里，桌子上堆着如山如海的文件，坐在桌子前的弗兰茨.梅林却放下了手中的笔，将一沓白色信封拿起并交给了隔壁的欧根.莱文。\n\n在政府大楼中充当梅林秘书作用的莱文吃惊地看了看梅林手中握着的那一沓文件。“您要交给我这些文件做什么？”莱文疑惑的说道。“很好，莱文同志，给我把这些文件办妥了，我老了，现在处理不了这么多的东西。”梅林露出那大胡子下面的一抹微笑。\n\n莱文平常只是稍微帮梅林处理一些简易文件，可是今天这一沓子文件对他来说着实算一种挑战。“年轻的革命家就是要有作为，面对工作就是要保持一个革命者的精神来去完成。”梅林说道。“像你这样年轻的革命者是我党所需要的，总不可能让我一个人来处理党内的所有事物，所以需要你来帮我。”“我明白了，这些……我现在立马开始处理。”莱文随即接过文件，打开信封并开始浏览这些密密麻麻的高级德文。\n\n两人从早上忙到晚上，但终究还是梅林批阅文件批阅的多-不过他总是容易睡在办公桌上，而现在的莱文可以挑灯夜战，处理老革命家暂时消化不了的东西。一个老人和一个年轻人，一拿和一放，就这么构成了这两间办公室的日常活动。"
 BAV.15.a:0"莱文拿到的文件怎么越来越多了。"

 BAV.16.t:0 "纪律的重要性"
 BAV.16.d:0 "“真是精神病！”卢卡斯像扔沙袋一样把自己疲惫不堪的躯干甩上床铺，引得木头床榻发出几声刺耳的抱怨，就像他自己停不下来的牢骚一样。\n\n“你们说说这有没有天理，”卢卡斯侧身探向临床的班组兄弟“他们就因为老子正步没踢好就让我加练了一倍的训练量！”老兵说着，边夸张地指着自己的腿，用微微颤抖的肌肉证明自己被整的有多惨。\n\n但是班长马提亚斯白了他一眼：“你也是红军中有战斗经验的同志，却带头消极对待训练的纪律性问题，不抓你这个典型抓谁？”“纪律性？纪律性能当饭吃还是能吓死反动派？”没想到班长的话反而激起了老兵的愤慨“我跟着领袖们打柏林的时候没训练过什么纪律性，照样枪放的准，敌杀的多！”班长沉默了半晌，把更多大而空的说教咽下了肚。\n\n“卢卡斯，你知道猎犬吠叫还是不吠叫吗。”班长猛地抛出了一个古怪的问题，愤愤不平的卢卡斯换了个舒服的姿势躺着，但半天没答上问题，也没明白班长的问题意义何在。\n\n“当闲暇在家，无所事事的时候，或者隐蔽伏击，守株待兔的时候，训练有素的猎犬半声呜咽也不会发出。”班长顿了一下，扭过话头再说：“但是开展围捕，需要猎手知道狗群在哪里堵住了猎物的时候，在林子的任何一个角落都能听见猎狗们的嚎叫。卢卡斯，你明白了吗？“马提亚斯再次简短的停顿，注视老兵的眼睛。\n\n没给太多时间，班长自己回答了自己：“猎犬只在猎人命令的时候吠叫，或者说，猎犬们有纪律性的吠叫。“\n\n见卢卡斯若有所思，班长马提亚斯也满意的转向床的另一侧休息。\n\n卢卡斯后来再也没有因为纪律性训练而受过罚。"
 BAV.16.a:0 "没有纪律，不成军队"

 BAV.17.t:0"战鼓渐进"
 BAV.17.d:0"入夜时分，临时政府驻地上层一间不起眼的小窗里还亮着灯，温暖的柔色光晕映出了梅林沉思的身影。一天繁重的公务结束后，这位苏维埃政府的领导人习惯性地端详起白纸铅字的政府报表，就着窗外迷人的万家灯火，思考未来的方向。\n\n尽管我们的革命热忱在邦联遭尽冷眼，尽管帝国主义对我们的满腔义愤不屑一顾，尽管我们接手的巴伐利亚满目疮痍，但我们还是实现了生产力的飞跃。炽热的钢铁，金黄的麦穗，人民久违的笑颜都从一格格跃升的数据，一条条腾飞的曲线理折射出来。再放眼窗外的万家灯火，这岁月静好的一切似要永远维持下去。\n\n“主席先生，莫斯科急电!”梅林赶忙从沉思中惊起，接过欧根·莱文焦急递上的电报。纸上散发着阵阵墨香，摸来也微微发烫，但其上的消息却让梅林如坠冰窟：“柏林中央政府已在事实上经济崩溃，受经济危机刺激，其已无维持正常运转的开销，更绝无余力偿还天价债务与战争赔款……德意志邦联内各邦纷纷开始扩充民兵，甚至公开编组正规军……各国使节已陆续撤离柏林，避免卷入可预见的德意志地区暴力冲突……”寒意紧抓梅林的心脏，刺激的老人发出几声压抑的低咳。“通知代表们明早紧急会议……”梅林以从未有过的严肃向莱文下达了指令，但又微微停顿了一会，想到了根据地近期放缓的军工产业，“对了，现在就叫小李卜克内西过来一趟!”目送秘书匆匆远去，梅林将目光返视窗外，低声自语道：“难道这份来之不易的平静又将被金戈铁马打破吗？”甩了甩头，将这失败主义的想法赶出脑海，“革命根据地的使命从来不是偏安一隅，这来之不易的机会下，我们更要让革命的火光照亮更广大的人民。”"
 BAV.17.a:0"“莫让安逸，消磨斗志。”"

 BAV.18.t:0"电报回复："
 BAV.18.d:0"符腾堡自治区政府致巴伐利亚政府\n\n您好，亲爱的朋友!这是一封关于双方政府进行联合磋商问题的回复信，我们在此阐明我们的立场。\n\n我方经过深度考量后，认为贵政府的方案有可取性：双方政府拥有共同的敌人与共同的奋斗目标，面对内外敌人的层层包围，我们必然要联合起来，为争取德国人民的自由而战。因此本政府已经同意对贵政府采取政府层面的磋商措施。\n\n我们曾经与贵政府产生过许多的不愉快，希望从今往后贵政府可以体谅我们并推动实现双方关系的缓和。在不久的将来，我们将会通过双边磋商实现我们的联合，这必然是德国革命事业的伟大胜利。\n\n再次致以问候"
 BAV.18.a:0"符腾堡自治区政府全体人员"

