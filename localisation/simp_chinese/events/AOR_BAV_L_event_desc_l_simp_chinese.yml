 BAV.20.t:0"电报回复："
 BAV.20.d:0"符腾堡自治区政府致巴伐利亚政府\n\n这是一封关于双方政府进行联合磋商问题的正式回复信，我们在此阐明我们的立场。\n\n我方经过深度考量后，认为贵政府提出了一个完全有悖于当前德意志邦联共识原则的方案，这是不可被接受的。本政府一贯倡导德意志地区的合作与共赢，而绝非试图成为战争的煽动者，起义的掌舵人。\n\n本信将同时抄送于柏林政府，希望您知晓。\n\n符腾堡自治区政府全体人员"
 BAV.20.a:0"那便只有战争了。"

 BAV.50.t:0"民主？"
 BAV.50.d:0"沃尔夫，作为新晋的工厂大车间工头——同时也是工厂中最有文化的一个工人，平日除了工作安排之外沉默不言的他今天却异常活跃起来，时不时的望向工厂大门，似乎在盼望着什么。\n\n一位工友走在他身边，递给他一杯水。沃尔夫喝了几口，说道：“你知道吗，待会儿工厂就要迎接几位大领导了，是要来公布工厂的新管理模式的，听说管理模式是跟巴伐利亚的那帮共产党人学的，很民主!”“什么，民主？我们工人生产还讲民主么，怎么个民主法？”工友疑惑的说。“嘻，等一会你就知道了。”\n\n不一会儿，一个衣着明显不太一样的领导式人物走在中间，和其他人一齐进了工厂。在进行了简单的宣读后，随行的工作人员分发了一批小册子，上面赫然写着“南德意志苏维埃工企业民主管理方法”。工人们大多都有小学学历，但里面许多难懂的词汇，还是让沃尔夫带着大家们一起读了出来。读完后，先是一阵短暂的沉默，随之而来的是一阵又一阵的山呼海啸声-这是这个厂子的工人们第一次有权利可以通过集体会议来决定生产模式和工资制定。\n\n在人群的喜悦中，那位工友用双手紧紧的握着这个小册子，都把封面握皱了，虽然里头难懂的词汇他还是看不懂，不过有了这个册子，已经足够让他开心。"
 BAV.50.a:0"“这就是民主，我可太喜欢了!”"

 BAV.51.t:0"非梦"
 BAV.51.d:0"施密特总被父亲教导:“咱是一个普通的德国人，好好活就是了。”\n\n生活在多重因素的压迫之下。每天，他起早贪黑地工作，辛辛苦苦地为生活奔波。昨天可能被军警敲一笔，明天又被老板找理由克扣工资，时间长了，他感到心灰意冷。就如同他父亲说的，\n\n“咱这种人只能凑合活，让生活变得更好那种事情只能看上帝的意思了。”\n\n施密特渴望转变，但每天，他都有一种被束缚的感觉，仿佛确实有什么东西绊倒他，让他爬不起来，他确信，这是由于他做的不够好，引起上帝的愤慨。于是他和家人一样，每日虔诚的祈祷，寄希望上帝拯救他。\n\n可那天，他像往常向父亲告别，但回到家却不能与父亲拥抱，很快他得知——\n\n他老老实实的父亲被札进机器里，奇迹没有发生，当他出来，很快因为失血过多而死了。\n\n施密特不禁问自己:\n\n“为什么？”\n\n最终，他给了自己一个答案，自己的命运是注定好的。那一刻正是父亲下葬的时候，他一会哭，一会笑，一把抓过神父的衣领，结结实实给了他一拳，然后躺在地上，双手狂乱的抓着空虚，惊得周围人四散而逃。在母亲的哭声中，他堪堪恢复正常，安慰了母亲，之后回了家。\n\n之后他整日酗酒，浑浑噩噩的生活也便这么过下去了，如果上帝觉得他该死，那就他妈的让那小子砸死自己吧!"
 BAV.51.a:0"他不在乎。"

 BAV.52.t:0"春晓"
 BAV.52.d:0"“全体德意志的公民们，同胞们。在此，我们谨代表全体无畏的无产阶级斗士，庄严的宣告……”从勃兰登堡门下的演讲台，到德意志乡野每一台嘶哑的收音机，以至寰宇每处共产主义结社，数不清的民众屏息凝神，翘首以待。\n\n“经由数年艰苦卓绝的武装斗争后，前斯巴达克同盟，现德意志联合共产党，业已一扫百年来我们德意志家园第二次分裂的苦涩过去，解放了德意志大部分地区……”慕尼黑的市民拥抱公义的完胜；法兰克福的青年不必再为混乱的政治无谓流血；莱比锡的孩子无需再受修正主义荼毒；威廉港的思妇在不用凝望无情的大海；故都柏林，再不是帝国黑鹰的老巢，而是革命的摇篮。德意志的儿女，统一，正义，自由。\n\n“但是，革命的使命远未终结。以英法为首的帝国主义环伺我们周遭，甚至窃据了我们亲爱的莱茵兰，梅克伦堡摇摆不定，东普鲁士的封建余孽冥顽不化。由德，俄掀起的革命事业必将遭受阶级敌人们的围追堵截……”面对新生的革命政权，有人擂响战鼓，整顿兵戈；有人冷眼旁观，超然孤立；有人阴暗扭曲，四散赤色妖魔的传言。革命的星火撩起，然终如世界独明的孤灯。\n\n“国内情况亦不容乐观，自大战以来连年的兵灾，反复的分裂，毁灭的田野，停摆的工厂，如片片伤疤折磨我们的德意志母亲，又如条条枷锁束缚着她迈向进步的步伐……”德国的工业，农业产值大幅倒退，远不及大战前的水准。空军，海军等国防尖端力量或停滞不前或损失殆尽。人民在高歌，在废墟上高歌。\n\n“但尽管如此，我们仍坚信德意志的儿女定能克服万难，去争取胜利。”主席团众人微微停顿，为更有力的宣言，“我宣布，德意志社会主义联邦，今天正式成立！”海啸般的欢呼从台下迸发，如春意奋勇挣脱严寒的桎梏，让古木焕发新芽。"
 BAV.52.a:0"这是我们的春晓！"

 BAV.53.t:0"似梦"
 BAV.53.d:0"然而，未来终究是有了转机，巴伐利亚的苏维埃政府成立了，当年逃脱了法律制裁，用一纸道歉信了结事端的混账老板也被工人民兵吊死在路灯上，他觉得这个挂件挺相称的，要不是尸体散发的尸臭惹恼了邻居，他肯定得想办法把这个“挂件”永久化。\n\n“这个路灯还是不空着好啊”施密特看着路灯感叹。\n\n远处的演讲声音引起他的注意，他三步并作两步走到那里，听到一阵激昂的声音——\n\n“有人说，我们穷人生下来就是等死的命，但穷人不是跪着的命。死也得站着不能跪着!他们告诉我们，忍耐与顺从，我们遵循他们，只得到自己的亲人孩子尸体!同胞们，你们答应吗!”\n\n施密特不由得一起喊出了声，合成一句铿锵有力的话——\n\n“不答应!”\n\n“为了子孙后代的幸福，加入扫清他们束缚人的旧渣滓的队伍吧!”\n\n演讲者拿出一份单子。\n\n“我们将成立新文化战斗队，有谁要报名吗？”\n\n吃第一个站出来的不是同盟成员，而是连积极分子都不算的施密特，连他自己都感觉吃惊，但他还是完成他想完成的动作，一把抓住那叠入队申请书，大喊：“我加入!”"
 BAV.53.a:0"一阵掌声响起，施密特突然感觉自己得到了梦寐以求的转变新生。"

 BAV.54.t:0"解放法兰克福"
 BAV.54.d:0"最强大的堡垒，往往是从内部被攻破的。当法兰克福残余的的狂热守军意图绑架着整座城市流尽最后一滴鲜血时，忍无可忍的无产阶级起义粉碎了他们无谓的幻想。\n\n整场战役中最激烈的战斗爆发在美因河两岸，守军的残兵败将在城市各座大桥的桥头堡负隅顽抗，并企图通过炸毁桥梁的方式拖延我军前进的步伐。但在居民与义军的指引下，我军成功达成战略目的，控制城中最主要的铁路与公路桥。临时苏维埃政府也已开始着手恢复秩序，安抚民众。\n\n守军的狂热源于法兰克福本身，其在南方联军分裂后便一直作为最大的反对派老巢存在，军国主义份子、复仇主义者、修正主义叛徒和资本家纷纷臭味相投的在此找到自己的位置。当地政府也一直被认为是德意志群雄中最有望争夺冠军桂冕的几位诸侯之一。但反动派们忽略了显而易见的事实：法兰克福工业基础良好，无产阶级群体广大，十分利于我军开展工作。他们也最终为人民的怒火吞噬。而我们整合了这股力量之后，也真正有实力登上擂台，与北方角逐者甚至所谓“中央政府”一较高下。\n\n不仅如此，这座自建城以来便迅速成为德意志地区最重要的交通枢纽的大城也为我军进军北方提供切实的后勤保障，通往北方的战争之门已然大开。"
 BAV.54.a:0"德意志之心脏已入我手!"
 
 BAV.55.t:0"解放柏林"
 BAV.55.d:0"今日的柏林静悄悄，没有枪炮轰鸣，没有血战厮杀。随着斗志全无的守军或放下武器或被逐出城郊，我们业已完成从未敢轻易设想的目标：解放柏林。\n\n但我们不是面目狰狞的征服者，柏林更不是任我们宰割的战利品，成群的红军士兵秩序严谨的在大街上露宿休息，甘愿忍受风雨也不愿打搅战役中饱受惊恐的民众。而那些参加过一次革命的老兵则眼含热泪，再也不会出现革命功亏一篑的悲剧，再也不会出现赤色孤灯独燃南方的可悲，再也不会有人将我们的解放，我们的梦想从我们面前夺走，当他们重回勃兰登堡门下，当他们轻抚陈旧的弹孔，当他们探望牺牲的同志，柏林的晴空也分明染上肃穆的氛围。和熙的暖风安抚他们的灵魂，也告慰从古到今赤色的英魂。\n\n自柏林一役之后，我们已掌握了德意志群雄中最强大的实力与最稳健主动权。但，我们也要时刻铭记一次革命的教训，稳扎稳打，戒骄戒躁，脚踏实地的将反动派逐出我们的德意志家园，一雪革命之前耻。"
 BAV.55.a:0"宜将剩勇追穷寇!"

 BAV.56.t:0"纪念先驱"
 BAV.56.d:0"胜利了，菲力克斯不敢想象这一切是真实还是梦幻，当他仅凭一腔孤愤加入开进他家乡的红军时，他从未想过有光明正大的走在柏林的大街小巷的一刻。随着德意志革命的春晓到来，整个柏林沐浴在欢庆的海洋里，赤色的锦旗挂满大街小巷，如天穹映火。在这副美景下，菲力克斯不知不觉间走进了一个不甚起眼的广场。\n\n四面包绕着楼宇，中心点缀着些许绿色，唯有东南隅立着一个巨大的铜质书架。风格朴素而整洁，在这片欢庆中显得有些肃穆。广场上有人驻足默哀，有人轻语怀念，菲力克斯不免有些好奇：“这座广场纪念的是那位伟人，怎么只有个书架？”接近，更令菲力克斯讶异的是，这书架不单单是雕塑，而是真切的摆满了本本厚书。一位中年干部随意的坐在一旁，正愉快的和几位年轻人交谈，解答疑惑。\n\n“年轻人，你对苏维埃思想感兴趣吗？”突如其来的热情让菲力克斯有些手足无措：“我……我是赤卫队的一员……”他支支吾吾的答道。“那就更好了，来，读读这本书，肯定对你有好处!”不忍拒绝干部的好意，菲力克斯接过了这本大部头——《妇女与社会主义》。一页，两页，到天色渐晚，菲力克斯对这文字着了迷，他头一次如此清晰的认识到妇女解放的必要性与妇女同志在革命中的建设性作用，正当他依依不舍的打算将书奉还时，中年干部却笑迷了眼：“拿去吧，同志，知识不应是有价的。”\n\n橘色的暖阳照亮了著作的扉页，为作者署名打上了暖色的光彩——奥古斯都·倍倍尔"
 BAV.56.a:0"最好的纪念。"

 BAV.57.t:0"一场谋杀"
 BAV.57.d:0"“请问你知道台尔曼……同志的住所吗？\n\n克吕茨拦下一位途径的警卫，故作随意的打听道，“往前走，这条街16号。”警卫虽有些奇怪，倒也老实回答了克吕茨的疑问。克吕茨干笑几声：“听闻这位革命阵线的新生代将星已久，特来拜访。”警卫虽心有怀疑，但见克吕茨两手空空，身上除了一件不太合时宜的大衣之外别无他物，便收回戒心，继续巡逻。殊不知，一抹意味深长的笑容爬上了克吕茨的嘴角。\n\n“目标地点是一栋低矮的小楼，与冲锋队的情报一致，近门的餐厅亮着灯，壁炉正安静的燃烧，现在是周天午餐时间，目标按往常规律无论公务多繁忙都会与家人此刻聚餐，先听听动静。”\n\n克吕茨反复在台尔曼家门前踱步，竭力让自己显得正常。“叮叮当当”一阵瓷盘碰撞的动静响起，随后是硬质餐具刮刺盘子发出的“刺啦”声，透过窗子，有模糊的黑影在餐桌上闪动。这一切的一切都印证了克吕茨的猜想，更蒙天主保佑的是，餐厅外窗仅是虚掩。时不我待!克吕茨一把扯开大衣，一枚军用集束手雷猛地掌握在克吕茨手中，正午的阳光打在它黝黑的弹头，投下一圈八枚成环的肃杀阴影。这骇人凶器冒着一溜儿白眼如鱼入水般扎入小楼，片刻死一般的寂静后，一声巨响伴着气浪粉碎了整条街的窗户与安宁，行人尖叫着躲避，如四散的玻璃碎片。\n\n不知是因为恐惧还是狂喜，克吕茨颤抖着立在原地，见的小楼里除了阵阵了无生气的白烟外毫无动静，一阵神经质的狂笑冲出了他的嘴。克吕茨笑的上气不接下气，几近摔倒，但，就在这时，一团黄色的毛球发了疯似的窜出小楼。克吕茨的狂笑怔在了脸上，还没等他理解，脑后就挨了重击，随之而来的是台尔曼暴怒的质问："
 BAV.57.a:0"“你就那么讨厌我的猫？！”"

 BAV.58.t:0"客人"
 BAV.58.d:0"卢克利先生很不高兴，自己的午睡计划又被哪个天杀的打搅了。\n\n背靠窗子，自己自入住以来就宣誓过主权的舒服躺椅，那把永远晒着太阳，温暖又松软的大椅子居然被个不识好歹的家伙霸占了。卢克利先生蹲在地下，摇着尾巴，以自己所能想到的最凶狠的眼神紧盯面前晃来晃去的粉色拖鞋。“台尔曼”(对于一只猫来说真是个奇怪的音节），他知道这是他饲主的名字，正忙前忙后招待这位霸占他座位的入侵者，真是罪该万死！入侵者像是心有所感，低头看了看卢克利先生，阳光照耀在他一大把银白的胡子上，熠熠生辉。\n\n“这是你的位子吗？”白胡子老头扑哧一声笑了，“难怪还粘着点毛。”这笑声只叫卢克利先生心烦，那双晃来晃去的可恶粉拖鞋更是在撩拨卢克利先生的耐心。最终，卢克利先生冲了上去，像堂吉诃德冲向风车，用爪子狠狠的拍打鞋面，然后，像堂吉诃德般被打败了。“噢，你想陪梅林先生玩一玩。”天杀的台尔曼给那白胡子老头递上了卢克利先生的逗猫棒，这棒子的确有魔力，可怜的卢克利先生的心跟着它上下跳动，身子和它扭打作一团。饲主和那白胡子老头一齐哄然大笑，空气里弥漫着快活的气息。\n\n被狠狠的戏弄后，卢克利先生在一旁愤愤的吃着猫粮。“这么有活力，肯定没受伤，不愧是只幸运猫。”白胡子老头和饲主愉快的交谈，“等卢克利先生有了小猫，给梅林您也送只过去。”饲主也半开玩笑的回应。“来，到这边来晒太阳。”白胡子老头伸出手作迎接状。"
 BAV.58.a:0"卢克利先生犹豫了一会，还是跳进了梅林怀里。"

 BAV.59.t:0"北海微风..."
 BAV.59.d:0"石勒苏益格的海德，风景秀丽，气候宜人，并且靠近协约国占领区。集市广场仍然人头攒动，市民们安心生活，仿佛没有经历过那场席卷德意志的革命风暴，处在另外一个世界上。\n\n亦或是内地的道路修复工程还没有完成，代表团迟了原定计划两天才到达这个地方，尽管如此，潘涅库克还是对他们表示了热烈的欢迎。\n\n“欢迎我们的革命战友，列宁的朋友！” 潘涅库克在会谈室中带着幽默戏谑的口吻说出了这么一句话，反而让谈判人员陷入了一定的尴尬境地。代表团的领袖、知名的社民党领袖保罗·列维，沉默了一会儿，站起来说：“潘涅库克同志，您实在是小看斯巴达克斯了吧，我们可不是俄国列宁的小跟班，我们和他一样，都是阶级兄弟加战友嘛！”这句话引发了会场的一阵大笑。“潘涅库克同志，俄国革命不会以俄国特有的形式影响到德国革命，德国革命也不是俄国革命的翻版，现实的来讲，我们代表团此次前来就是想要商谈关于如何建立起一个德意志社会主义联邦制的计划。”列维随后说道。\n\n“很好，我们亲爱的国家机器又即将重新建立起来了，是吧？嗯……联邦制说到底还是一种议会制，这种议会制毕竟在你们的设想中是德国无产阶级以及德意志民族夺取并砸碎旧国家机器的一种途径；可事实在于，你们连原先资产阶级的管理体系都没有摧毁，就如此迅速的开始建立起所谓的社会主义联邦制国家，这是变相的保留了资产阶级的政府衙门，对此我是不认同的。” 潘涅库克严肃的说。“我的原则还是如下：摧毁资产阶级的国家机器，包括资产阶级的议会制，资产阶级的官僚体系；确保工人阶级有权利有能力自发的建立起无产阶级性质的的管理组织与经济组织。如果兄弟组织做不到这几点，那我很难对这个"社会主义联邦制"有所认同。”会场又陷入了一阵沉静。\n\n“要给时间。”潘涅库克望了望窗外，转过头来对着列维。“我们不希望我们的阶级组织发生冲突，我们还是要求德意志苏维埃给我们一定的时间，谢谢你们与我们的交谈，谢谢你们给我方的建议。”"
 BAV.59.a:0"行。"

 BAV.60.t:0"...团结第一"
 BAV.60.d:0"经过德意志苏维埃与石勒苏益格苏维埃的多次交谈，以及一段时间的回应期，以潘涅库克为领导的，石勒苏益格苏维埃的无产阶级政党-德国共产主义工人党已于今日早晨通电全国，发表声明，宣布接受德意志苏维埃的所有领导条件，并宣布支持社会主义联邦制计划。这是无产阶级政党之间的胜利联合！\n\n届时，德意志苏维埃将会得到一支保存比较完善的海军力量，这将有助于未来中社会主义德意志的国防建设，并将会成为抵御帝国主义与外部侵略者的强有力武器。"
 BAV.60.a:0"阶级兄弟们团结起来！"

 BAV.61.t:0"柏林的结局"
 BAV.61.d:0"柏林，中欧大地之上的璀璨明珠，在经历了两次革命的风暴后，也最终展现出他苍白无力的一面，将资产阶级政府的破败完完全全地展现在了世人眼前。\n\n柏林政府的主要人员早已逃往国外，国会大厦空空如也，甚至不少椅子沙发也被老百姓拿走，不过这并不妨碍柏林社民党的残余人员以及所谓的激进派在这里开他们的最后一次大会。他们到场不久后，威廉.皮克也走入了会场，紧跟而来的是其他的德意志苏维埃代表-还好，没有让柏林社民党害怕的武装人员。\n\n“朋友们，现在国内战争已经结束，你们本可以跟着社民党的修正主义叛徒或者帝国主义的走狗逃往国外，不过你们没有离开柏林，想必应该是没有买船票的钱，亦或是真的要选择重新参加革命咯。”皮克笑着说，柏林市民党的参会人员也勉勉强强跟着一起笑起来，但他们都把两手插到袖子里，亦或是低头握拳，仿佛皮克马上就要对他们宣判死刑一般。\n\n“大家没必要用敌视的态度来对待彼此，柏林的这个“社会民主党”已经死了，它死在了修正主义叛徒的逆流中，死在了帝国主义对德意志民族的操弄中，它已经彻彻底底的被扫进了历史的垃圾桶里头去了。如今的德意志即将迎来新生，全德意志的无产阶级即将迎来解放，社会主义联邦制也在紧锣密鼓的构建中。我们希望诸位可以正视我们的这个新生的苏维埃政权，如果想要留在本政府工作的，我们当然欢迎，这毕竟是回归组织嘛，如果不想要参加工作的也可以出国或者辞掉一切官职，只要没有反革命的倾向，我们都是欢迎的。”\n\n皮克讲完话之后，柏林社民党的与会人员开始私下交谈起来，交谈随后演变成了争吵甚至于相互斗殴-苏维埃的其他代表人员制止了这次冲突。皮克看着他们，就像看着那曾经深不可测的资产阶级的国家机器，只有一股无奈了。"
 BAV.61.a:0"旧日的最后一场闹剧"

 BAV.62.t:0"重建新社民党"
 BAV.62.d:0"经过德意志苏维埃与柏林政府残余人员的多次交谈，以及一段时间的回应期，柏林方面的所谓“德国社会民主党”的激进派以及其余部分人员已于今日通电全国，发表声明，宣布接受德意志苏维埃的所有领导条件，放弃一切职位并且自愿重新加入巴伐利亚方面的德国社会民主党。同时宣布支持社会主义联邦制计划。\n\n届时，未来的无产阶级执政党的力量将会更加强大，处理不同人群的经验也会更加丰富。"
 BAV.62.a:0"同胞兄弟们团结起来！"

 BAV.63.t:0"好名字"
 BAV.63.d:0"由于国会大厦受到的损害实在过大，各种办公场所的物件都严重缺失(柏林老百姓顺的东西太多了），于是迁入柏林的德意志苏维埃政府就暂时把政府驻地转移到了原柏林邮政局大楼中，使其作为一个崭新政权诞生前的指挥中心。\n\n邮政局的大会议室中，梅林把各种杂乱的文件摊开，用疲倦的眼神看着卢森堡与李卜克内西谈论关于未来德国政党制度的话题——他确实感觉自己老了，衰老无比。况且，他感觉这邮政局的通风真不行，闷得很！\n\n在两拨人日复一日的讨论中，李卜克内西这个社民党的硬骨头最终接受了卢森堡的提案，将那些原来因为各种原因分裂的独立社民党左翼组织召集回来，与斯巴达克斯一同组织成一个不同于原先德国社民党的新政党。而卢森堡给这个政党起了个名字：“德意志联合共产党”。不过，在其他苏维埃成员看来，前面用民族性的称号来称呼本党是否合适还是个问题，反倒不太符合她的风格。\n\n政党名字已经确定下来，这便是德国未来的先锋队。诸位也就只好期待着接下来事态的发展，但从长远来看，德意志革命已经度过了最危险最急促的时期，是该着重考虑考虑建立政权的各项事宜了。"
 BAV.63.a:0"年轻一代开始谋划这个国家。"

 BAV.64.t:0"向未来前进(上）"
 BAV.64.d:0"我是说有没有一种可能？柏林邮政局并不适合作为办公场所来使用-德意志苏维埃的几乎所有中央成员都挤在这栋大楼里，有些许现代化改造的通风系统早已不堪重负，沉闷的空气刺激着每一个人的大脑。很难想象之前的如山海般的职员们是怎么在这里工作的。\n\n作为领袖的梅林甚至将要搬到别的地方去工作了，更准确说，疗养。邮政局的办公设施也开始向国会大厦转移；不过，在这之前，还有一个重要的事情，尚未在德国联合共产党中角逐出来-这关系着他们的未来。\n\n李卜克内西狠狠的敲了敲会议室的大桌子，对着卢森堡说道：“你…你你怎么能放弃集中制呢，卢森堡同志……你可要知道，放弃了无产阶级的集中制，就是放弃了马克思和恩格斯思想的精髓。有多少个修正主义分子、叛徒，俄国孟什维克就不用多说了。德国还有个考茨基和伯恩施坦！就是因为放弃了集中制这个方法，使得自己与党内的其他同志的思路与观点渐行渐远，到最后完全演变成了机会主义者甚至资本主义学说的走卒，咱们不能走这条道。”\n\n“……我敬爱的李卜克内西同志，在民族自决的前提下，为了能够与未来的社会主义联邦制相适应，我们必须要采用这种政党形式。”卢森堡慢慢的说道。\n\n“你是不是被资产阶级学说中所谓的纯粹乌托邦政治宣传给迷惑了？还是说之前德国革命的失败刺激到了你，偏偏要搞分权制？无产阶级政党从来不是庸人口中的极权政治，更不是什么无政府的乌托邦理念，难道我们的革命工作就是为了立马给德国甚至欧洲实现一个乌托邦出来，还是说你把我们的工作看成了布朗基主义甚至是往极权主义的方向走的君主复辟？怎么可能的事情。卢森堡同志，理想主义固然是好的，民族自决更是新的时代条件下的一个真理，但是你的提案也过于绝对化了，就这么把集中制给软化了，无产阶级专政的的实现都没有了保证，我怎么都不能接受。”李卜克内西上气接不了下气的说道。"
 BAV.64.a:0"路线似乎不再统一……"
 
 BAV.65.t:0"向未来前进(下）"
 BAV.65.d:0"“采取社会主义多党制的形式绝对不是放弃集中制，也绝对不会是放弃无产阶级专政这个学说；社会主义的集中制是无产阶级政党以及无产阶级政权引导无产阶级群众组织起来的，它并不是由什么多少个党派决定，而是由整个社会主义政党的先锋队性质决定的。对此，我希望你能好好考量考量……”\n\n“你可能会担心这么多个社会主义党派究竟能不能掌握无产阶级专政这个原则，没错，德国革命的失败确实对我有影响，但是革命失败中也有政党的因素。那我想说的是，德意志苏维埃毕竟掌控在无产阶级、以及我们现在的德国联合共产党手中，我们仍然是领导作用，奉行集中制，并且将社会主义多党制体系和社会主义联邦制体系相适应，明面上是犯了像恩格斯那样“不适合走联邦制”的那条路，但实际上，这又何尝不是一种创新？”\n\n“于是你就是这样把无产阶级政党的专政性质与领导性质给剥离出来了，并把他们置于在庸俗知识分子与资产阶级的国家机器体系的构成之下了吗？政党的碎片化，本质上就是对集中制的破坏，甚至于是对无产阶级之间的分化和内部政治斗争的鼓舞，社会主义联邦制已经是很冒险的一步了，不能把革命完全置于一艘行驶充满风暴海洋的渔船上！”李卜克内西的头发都快要全部炸起来了，露出了从未有过的吓人表情。不过卢森堡也不甘示弱，继续保持她那一如贯之的沉默态度。众人不过只是不希望英雄主义蔓延到无产阶级的政党上面罢了，但他们确实也不敢阻止这两人的争吵。\n\n吵吧、吵吧，吵个天翻地覆，事物的矛盾性可不是一句两句能够说完的！弗兰茨·梅林看着眼前两人的争吵，心中已然有了一个大概的决定……"
 BAV.65.a:0"李卜克内西！"
 BAV.65.b:0"罗莎卢森堡！"

 BAV.66.t:0"梅克伦堡接受整合"
 BAV.66.d:0"经由几轮不咸不淡的磋商与谈判后，梅克伦堡中立区原政府最终同意我方整合条件，放弃武装抵抗，改组并重新并入我国政府。又一块德意志人的土地无需流尽德意志人的鲜血而回归我们的怀抱。\n\n梅克伦堡中立区，为英法帝国主义的虚伪产物，在德意志帝国的焦黑尸体上生硬的切分出一块“中立区”，美其名曰“人道主义保护区”，实则为资本家的游乐园。但无论意识形态如何，中立区都在军阀混战的德意志二次内战中完整的保护了一片净土，罗斯托克港完整的港口设施与梅克伦堡宝贵的谷仓都能再次为德国人民所用。\n\n为保护中立区的安全，当地政府在英法资助下建立了一条令人望而生畏的永固堡垒防线。但所幸，他们迷途知返，顺应了历史潮流与人民的选择，与我们握手言和，避免兵戈相向。当我们的军队经过这些冰冷狰狞的碉堡阵时，不由得庆幸它们无需冷酷的撕裂同为德意志儿女的血肉之躯。"
 BAV.66.a:0"又一道祖国母亲的伤痕痊愈。"

 BAV.67.t:0"给弗兰茨·梅林先生的信"
 BAV.67.d:0"寄信点：美利坚合众国 南方 密西西比州 新奥尔良市 波旁街40号 国际码头邮件快递公司\n\n尊敬的，受到大众拥护的，具有杰出成就的德意志社会主义者-弗兰茨.梅林先生你好，我是一位在美利坚合众国同样拥有跟您相同愿望的人。我们都希望为工人争取到一个崭新的世界，都希望去消除这世界的不平等和压迫的生产方式。只是可惜由于种种原因，我现在还不能说明我是谁。但我真是期盼自己能够早一天重见光明！在这里向您表达我的歉意，但我并非谜语之人。\n\n我在国际新闻中，看到了贵党杰出的领导人奥古斯特·倍倍尔于近日不幸逝世的消息，这令我深感悲痛。德国的工人运动失去了一位优秀的领袖，世界的工人运动同样失去了一位优秀的领袖，这是对广大劳苦人民的重大损失。我将于近日派遣我方人员‘热狗先生’前往慕尼黑参加葬礼，他将代替我参加奥古斯特·倍倍尔葬礼的同时，转告您有关于美国社会运动的一些发展与问题，同时希望联系到国际。希望您能够允许我们的到来。\n\n奥古斯特·倍倍尔离开了我们，但工人的斗志和工人的革命热情不可能离开这个世界，我们衷心祝贺您坚持斗争，为德意志的工人事业持续而有力的奋斗！再次向奥古斯特·倍倍尔致敬，并表达对您的敬意。\n\n[GetDate]"
 BAV.67.a:0"£hotdog_signature"
 BAV_LETTER.hd.2.tt:0"-§Y吉恩·托克维尔·斯巴达克§!。\n§g……以后不要把这人的信拿上来了。§!"

 BAV.68.t:0 "德意志终归一统！"
 BAV.68.d:0 "REPLACE_ME"
 BAV.68.a:0 "Es lebe Deutschland!"

 BAV.69.t:0 "团结我们的兄弟"
 BAV.69.d:0 "\n一封代表着法兰克福最近建立的共产主义政权与南德意志苏维埃最终的外交态度的信笺规规整整的躺在梅林的办公桌上，但是老革命家的脸色看起来并不如信件一样规整。\n\n“嗯哼，法兰克福红线我记得概率调的很低来着，这种小概率事件都给你碰上了。唉，原本红法兰克福要自己建一个阵营，然后还有激动人心的领导权争夺，据说还能看到除你左籍。\n但是目前AOR啥都没做完，为了避免一大堆稀奇古怪的bug和节省工作量，我们直接跳过这堆烦死人的操作，说白了就是：\n红色法兰克福点击就送！核心将领一应俱全！你还在等什么？还不快美美炫完这一大块地然后狂暴鸿儒中央政府！“\n\n“这什么乱七八糟的，拉狄克那小子疯了吗？”可怜的老梅林被这封古怪的信吓得不轻。"
 BAV.69.a:0 "法兰克福，豪赤！"

 BAV.70.t:0 "路线的选择"
 BAV.70.d:0 "\n我们要向世界证明，无产阶级不止擅长摧毁一个丑恶的旧世界，而且更精通于建设一个美好的新世界。近日顺利闭幕的第一届德意志社会主义联邦代表大会里，决定如何更好的建设联邦的路线，也就是主席席位花落谁家，已然无可争议的确定。\n卡尔·李卜克内西，作为目前德意志社会主义联邦最大党派德意志联合共产党的主席，在赢下党内选举之后，自然顺利的成为新生的社会主义联邦的国家主席。在德高望重的梅林隐退后，这位朝气蓬勃的年轻革命家依靠激进的斗争纲领和集权化，计划化的建设路线赢得了党内选举的青睐。可以预见的，这位激进的革命家在成为国家主席后，德意志社会主义联邦将迎来一个坚毅的，大步向前的时代。\n与此同时，罗莎·卢森堡，这位李卜克内西党内最大的竞争对手也表达了她对李卜克内西担任国家主席由衷的祝贺，并且在她的倡议下，其他未并入德意志联合共产党的党派在执政中将起到辅助处理政务的作用。"
 BAV.70.a:0 "向领袖致敬！"

 BAV.71.t:0 "路线的选择"
 BAV.71.d:0 "\n我们要向世界证明，无产阶级不止擅长摧毁一个丑恶的旧世界，而且更精通于建设一个美好的新世界。近日顺利闭幕的第一届德意志社会主义联邦代表大会里，决定如何更好的建设联邦的路线，也就是主席席位花落谁家，已然无可争议的确定。\n罗莎·卢森堡，作为目前德意志社会主义联邦最大党派德意志联合共产党的主席，在赢下党内选举之后，自然顺利的成为新生的社会主义联邦的国家主席。在德高望重的梅林隐退后，这位倡导人道主义辩证法，倾听群众自发性，但同时也被敌人恐惧的称为“血腥玫瑰”的女革命家得到党内多数推举。在这位与列宁和布尔什维克不甚相同的社会主义者的领导下，其他未并入德意志联合共产党的党派将被主席鼓励在执政中起到辅助处理政务的作用，德意志社会主义联邦毫无疑问会走上一条开明而包容的道路。\n与此同时，李卜克内西，这位卢森堡党内最大的竞争对手也表达了他对卢森堡担任国家主席由衷的祝贺，尽管未能胜选，但是他承诺将不遗余力的支持联邦政府的革命，并以自己的组织才华辅助推行政令。"
 BAV.71.a:0 "向领袖致敬！"
 
 
 
 
 BAV_L.1.t:0"差劲的搬运工们"
 BAV_L.1.d:0"窗外的慕尼黑难得放晴，新市政厅走廊的玻璃被阳光打得透亮，照得我们今天的小搬运工李卜克内西的额头渗出细汗。他正抓着那张办公桌的一头，而另一头的莱文却突然停住了脚步。\n\n“我们真是疯了，让那个老中派回来坐这张桌子。”莱文压抑着怒气的拳头砸向松木桌面，震得桌上未固定的墨水瓶险些滚落。李卜克内西赶紧用膝盖顶住晃动的桌腿，几滴墨水还是溅到了他新换的灰呢裤上。“总算，巴伐利亚现在也有一个考茨基了！”\n\n“他写了六篇自我批评，又作了两本自传，还发了无数革命短文！《新时代》都愿意刊登——”\n\n“哈！”莱文突然松手，办公桌猛地倾斜。李卜克内西踉跄着用肩膀抵住。\n\n“你该看看他1914年的投票记录！”莱文又抬起了办公桌，“'弃权'！现在他倒是在瑞士的别墅里想通了？等我们被容克老爷乱枪打死时，他还能回苏黎世写第七篇忏悔录，第五本自传！”\n\n“在他眼里团结高于一切，他一直都是那样的人…再说了，大家都已经投票通过了。”\n\n“跟不上时代的人更可耻！”莱文不屑的说，随后却突然卸了气，“见鬼，你再提那该死的投票，我就真松手了。”\n\n李卜克内西努努嘴，示意对方看自己染黑的裤脚——"
 BAV_L.1.a:0"“那你得赔我裤子。”"

 BAV_L.2.t:0"整训军队"
 BAV_L.2.d:0"办公室里吵得很，莱文烦死这位不速之客了。\n\n“见鬼，你小子就连糖罐都上锁？”卡尔·李卜克内西正趴在地毯上，军装下摆沾满了从书柜底层扫出的灰，“欧根同志，我希望你最好是上错了锁，而不是专门——”\n\n“就是专门防着你。”莱文面朝窗户站着，吐着烟圈，看都不看那个正撅着屁股翻找零食的国际主义战士，“下次你去偷卢森堡的吧，就当我求你了。”\n\n木地板发出刺耳的摩擦声，卡尔顶着一头灰直起身，手里还攥着那个铁盒，“以革命的名义！我要求重新分配新市政厅的零食配额！”\n\n“噢。对了，钥匙在我左抽屉里。”\n\n卡尔放弃了他的演讲，转头去攻打抽屉。窗外的操练口号适时飘进来。自从那个老家伙整顿军队，每天七点就会有正步声准时砸地。莱文终于掐灭了他今天的第三支烟，转过身——该死，李卜克内西那家伙吃还不够，居然还往口袋里装？\n\n莱文盯着这小偷看了三秒，突然拽开抽屉某个小隔间甩出一整盒巧克力，“带着它们出去！”，随后便推搡着卡尔往屋外走去。\n\n“零食只是一部分…我是来转告你老头的新指示的，他让你明早去接管军事，怎么样，这下还对他——”\n\n门砰地关上时，最后一句抱怨挤进了门缝：“小气鬼，不就是几颗巧克力。”\n\n莱文没好气的回到自己的座位上。楼下广场正飘来新兵合唱声，《国际歌》里混着巧克力香。他瞥了眼那些几个月前还是乌合之众的士兵们，不由得点上了第四只烟。"
 BAV_L.2.a:0"“至少这次，老头干的还不错。”"

 BAV_L.3.t:0"熟悉而陌生的交易"
 BAV_L.3.d:0"海因里希·施特劳斯紧了紧他的羊毛大衣领口，站在玛丽亚广场的边缘，望着那座重新开放的证券交易所大楼。发生革命后，这座巴洛克风格的建筑依然屹立，只是门楣上多了几道弹痕，以及一面鲜红的旗帜。\n\n“看看他们，最终还是得求着我们回来。”施特劳斯对身旁的男人说道，声音里带着掩饰不住的得意。\n\n“别太早下结论，海因里希。”卡尔开口，声音低沉，“共产党那些人不是傻瓜。”\n\n施特劳斯嗤笑一声：“他们关闭了交易所整整一年，结果呢？工厂停工，商店倒闭，连他们自己的革命委员会都发不出工资。”他指了指交易所门前排队的人群，“现在他们还不是得重新开放市场，允许我们交易？这说明什么？说明他们撑不下去了！”\n\n交易所的大门打开了，人群开始有序进入。卡尔注意到门口的卫兵正在检查每个人的证件。\n\n“海因里希，”卡尔突然抓住同伴的手臂，“我认为我们应该谨慎一些。今天只观察，不交易。”\n\n施特劳斯惊讶地看着他：“你疯了吗？现在股价跌到谷底，正是抄底的最好时机！卡尔，你的胆量去哪了？”\n\n施特劳斯已经大步走向他惯用的经纪人席位，高声招呼着几个老熟人。卡尔站在原地，感到一阵寒意从脊背爬上来。他环顾四周，发现至少有三个穿制服的士兵站在不同的角落，他们的眼睛不断扫视着大厅。\n\n一位年轻的工人代表走近卡尔：“先生，您需要帮助吗？我们可以为您介绍新的交易规则。”\n\n卡尔勉强挤出一个微笑：“谢谢，我只是先看看。”\n\n“当然，”年轻人点头，“不过请注意，所有超过一万马克的交易都需要特别批准。这是为了防止资本外逃，您理解吧？”\n\n“纸片！这些苏维埃马克就是一堆废纸！”施特劳斯挥舞着一张钞票，“但没关系，等真正的货币回来，我会让那些共党跪着求我贷款给他们！”\n\n周围几个商人发出附和的笑声。卡尔看到附近的士兵明显注意到了这一幕，其中一个迅速离开了大厅。"
 BAV_L.3.a:0"然后，这位老朋友就被赶出了交易所。"

 BAV_L.4.t:0"同一个人，不同的厂"
 BAV_L.4.d:0"霍夫曼又来到了咖啡馆。他摘下帽子，露出日渐稀疏的灰发，目光立刻越过街道，投向对面那栋红砖建筑——霍夫曼纺织厂，或者说，曾经叫这名。现在大门上方悬挂的牌匾已经换成了“巴伐利亚第一人民纺织厂”。\n\n他端起咖啡杯的手微微颤抖。\n\n“复工了？”霍夫曼喃喃自语，声音嘶哑得连自己都感到陌生。\n\n霍夫曼放下杯子，眯起眼睛。工人们正三三两两地走进大门。他的目光被一个熟悉的身影吸引——老穆勒，他曾经的工头，正走向咖啡馆。穆勒穿着整洁的蓝色工作服，胸前别着一枚小小的红色徽章。\n\n穆勒推开门时，咖啡馆里突然安静下来。几个常客好奇地看着这个工人走向霍夫曼的桌子。\n\n“早上好，霍夫曼先生。”穆勒摘下帽子，露出花白的头发。\n\n“穆勒。”霍夫曼点点头，不知该说什么。\n\n“您一定很高兴看到工厂重新开工。”穆勒说。\n\n霍夫曼的嘴角抽动，将咖啡一饮而尽。“那是……唉，产量恢复多少了？”\n\n穆勒随即露出微笑：“现在复工了80%，但效率已经可以把战前比过去了。我们重新组织了生产线，废除了您那个时代的计件工资制，现在大家按技术等级领取固定工资，还有利润分成。工人们更有干劲了，因为他们知道多生产一码布，自己就能多分一杯羹。”\n\n“这…怎么做到的？”他忍不住问。\n\n穆勒微笑着：“当人们为自己工作，而不是为某个遥远的股东时，效率自然会提高。”他看了看怀表，“我得回去了，早班要开始了。很高兴见到您，霍夫曼先生。”\n\n穆勒突然转过头来：“霍夫曼先生，现在政策放开了，您要是还想为新社会尽一份力的话，可以回到工厂，当我们的专家嘛。”\n\n第二天，霍夫曼正对着工厂大门迈步。警卫疑惑地打量他考究的西装。\n\n“我是......”霍夫曼的嗓音卡住了。春风送来车间里蒸汽机的轰鸣，那熟悉的节奏让他眼眶发热。他突然挺直脊背"
 BAV_L.4.a:0"“我是来应聘技术顾问的。”"

 BAV_L.5.t:0"新夫妻关系"
 BAV_L.5.d:0"晚餐桌上，玛丽亚把《巴伐利亚工人报》推到了丈夫卡尔面前。\n\n"看，"她指着头版，“苏维埃要通过同工同酬法案了。”\n\n卡尔正切着一块黑麦面包，头也没抬：“嗯。”\n\n“你不高兴？”\n\n“没什么值得高兴的。”卡尔放下刀叉，“女人力气小，干的活少，凭什么拿一样的工资？”\n\n玛丽亚的手指僵在报纸上。\n\n卡尔是个好丈夫——至少他自己这么认为。他不酗酒，不打人，甚至允许玛丽亚去夜校学会计。但他始终觉得，女人就该待在家里，烤面包，带孩子，偶尔读点诗集。“我不是反对你工作，”他解释道，“但重活累活都是男人干的，对吧？”\n\n玛丽亚盯着他：“我在纺织厂每天站十二个小时，手指被线勒出血，工资只有男工的2/3——这叫‘轻活’？”\n\n“那不一样……”卡尔皱着眉头，一时语塞。\n\n第二天早晨，玛丽亚没像往常一样准备早餐。\n\n卡尔睡眼惺忪地走进厨房：“咖啡呢？”\n\n“自己煮。”玛丽亚的声音从玄关传来，“我要去参加妇女大会。法案下周投票，我们得让更多人支持。”\n\n卡尔突然抓住她的手腕：“别去游行了！世道那么乱，万一以后……”\n\n玛丽亚甩开他的手：“放开我！”“……我是为你好！”\n\n“不，”玛丽亚拉开门，盯着她那迟钝的丈夫哽咽道“你只是害怕——害怕我变得比你强。”\n\n当晚，卡尔在空荡荡的卧室里辗转难眠。\n\n他想起玛丽亚夜校毕业那天，她捧着证书，眼睛亮得像星星；想起她第一次拿到工资时，骄傲地给家里添了新窗帘；想起她熬夜算账的背影，纤细却笔直……\n\n窗外传来游行归来的女工们的歌声。卡尔突然意识到——\n\n他的妻子要的不是保护。" 
 BAV_L.5.a:0"她要的，是和男人一样的人生。"

 BAV_L.6.t:0"让红领巾更长一点"
 BAV_L.6.d:0"瓦尔特踮起脚尖，把红领巾的结又系紧了些，这东西还算是新鲜货，是政府从苏俄学来的。晨雨打湿了他的布鞋，但他一动不动地站在征兵处门外，像一株倔强的小白杨。\n\n“姓名？”征兵官头也不抬地问道。\n\n“瓦尔特·施耐德，十七岁，少先队员。”他的声音比平时低了八度，刻意装出一股大人的腔调。 \n\n征兵官终于抬起头，灰蓝色的眼睛扫过瓦尔特不到一米七的个头，停在他稍显褪色的红领巾上。“你就是跟着第三纵队打过柏林的小鬼？”\n\n瓦尔特感觉有火在领口燃烧，他挺起胸膛，骄傲的说：“我负责看守过好多个俘虏，还击毙了一个敌人呢！”征兵处的铁皮屋顶叮咚作响，开始下雨了。瓦尔特看着墨水在登记簿上晕开，变成一小片蓝色的湖。征兵官突然把印章重重按下去。\n\n“小鬼倒是和我儿子差不多大......欢迎加入苏维埃红军，施耐德同志。”一个鲜红的五角星印在文件上，“鉴于你的实战经验，委员会决定让你担任新兵连指导员。”\n\n  ......\n\n“现在，报数！”“一！”“二！”“三！”喊声惊飞了白桦林里的麻雀，瓦尔特站在队伍最前方，雨水冲刷着他们刚领到的旧军装。\n\n傍晚的营房里，瓦尔特借着煤油灯的光，在新兵花名册上画红星。门突然被推开，一位比他年长许多的新兵端着两杯代用咖啡走进来。“指导员同志，”他放下杯子，突然立正敬礼，“明天能教我们拆枪吗？”瓦尔特看着杯子里晃动的月光，端起咖啡杯轻轻碰了碰对方的杯子——" 
 BAV_L.6.a:0"“都会教给你们的。”"

 BAV_L.7.t:0"操之过急"
 BAV_L.7.d:0"雨水顺着雷恩的帽檐滴落，在泥泞的地面上溅起细小的水花。他站在连队驻地门前，手中紧握着那份盖有红色印章的委任状。远处正传来士兵们激昂的争论声，偶尔夹杂着几声民主选举的口号式的呼喊。\n\n雷恩深吸一口气，推开了吱呀作响的木门。\n\n“同志们，我是弗里德里希·雷恩，奉革命军事委员会之命，担任你们连队的指导员。”\n\n角落里传来一声冷哼。指挥官站了起来，他的左袖空空荡荡，用别针固定在胸前。\n\n“我们已经有自己的指挥官了，同志。”留着红色胡子的指挥官刻意礼貌地说着。“施罗德，连队士兵委员会主席。我们上周刚通过民主投票选出来的。”\n\n“同志们，请听我说完。”雷恩提高声音，“我不是来剥夺你们的权利。但军队需要纪律，需要服从——”\n\n“而不是我们的直接民主？”一个瘦高的青年打断了他，眼镜片后的眼睛闪烁着愤怒的光芒，"这就是你们社会民主党的革命？和那些将军老爷们有什么区别？"\n\n屋内爆发出一阵赞同的呼声。雷恩感到汗水顺着后背流下。他见过太多这样的年轻人——充满激情却缺乏纪律，将革命想象成一场永不结束的狂欢。\n\n“需要服从谁？”施罗德走近一步，独臂在空中划出一道弧线，“服从那些坐在办公室里发号施令的官僚？服从那些从未在战壕里待过一天的'革命家'？我不信倍倍尔的，更不信什么欧根·莱文的！大家，也不看看是谁让我们输了柏林！”\n\n争论持续到深夜。雷恩精疲力竭地发现，这些工人对革命理论的热忱远超他的预期。这种思想无可指摘，但对于目前的苏维埃来说，它很有可能带来失败。新的投票开始了，三十七票对三票，连队决定继续选举自己的指挥官。\n\n雨水再次落下时，雷恩坐在指挥部里写报告。内疚但果断的钢笔在纸上划出深深的痕迹：“...基于上述情况，建议执行第二阶段纪律措施...”" 
 BAV_L.7.a:0"对该连指挥官进行停职处理。"


 BAV_L.8.t:0"纠察队"
 BAV_L.8.d:0"一支连队驻扎在巴伐利亚边境上的一座废弃工厂里，士兵们睡在潮湿的稻草床上，每天的口粮只有几块黑面包和一大锅芜菁汤。\n\n一点饥饿和绝望让纪律迅速崩溃——有人偷走战友的靴子去黑市换酒，有人半夜溜进附近的农庄偷鸡摸狗，甚至有些人干脆开了小差，带着枪翻去法兰克福了。军事委员会发了三道命令，要求各级指战员加强政治教育，杜绝偷盗和抢劫。但没人听。\n\n于是，纠察队来了。\n\n“同志们，”布兰德的声音像铁块砸在石板上，“军事委员会派我们来调查最近发生的违纪事件。”没人吭声。角落里，一个瘦高的士兵——克瑙斯——正慢悠悠地嚼着一块火腿，嘴角泛着油光。、\n\n布兰德的目光落在他身上。\n\n“克瑙斯同志，”他走过去，“今天连队伙食不错呀。”\n\n克瑙斯咧嘴一笑：“农民送的。”\n\n“哪个农民？”\n\n“忘了。”\n\n“送的？”\n\n“送的。”\n\n布兰德没再问。他转向全连：“从现在起，纠察队会监督连队的纪律。偷盗、抢劫、开小差——一律按军法处置。”布兰德从腰间掏出手枪，在这些搜刮民脂民膏之徒的面前晃了晃。" 
 BAV_L.8.a:0"去腐存菁。"

 BAV_L.9.t:0"交接"
 BAV_L.9.d:0"革命后，巴伐利亚苏维埃政府接管了慕尼黑的新市政厅，但由于人手不足，革命委员会只好让前帝国时期的文官一如既往的工作。\n\n财政部的办公室里，老科赫坐在他的橡木办公桌后，慢条斯理地啜饮着咖啡。他在这里工作了二十年，从威廉二世时代开始，历经战争、革命，现在又迎来了什么"苏维埃"。无所谓，他想。反正账本在他手里，文件在他手里，连办公室的钥匙都在他手里。谁来执政，不都得靠他们这些懂行的人？\n\n门被推开，一个年轻人走了进来，穿着皱巴巴的工人装，胳膊上别着红色袖章。“科赫同志？”年轻人说，“我是新派来的财政专员，弗里茨·韦伯。”科赫眯起眼睛，没起身：“啊，欢迎。您需要什么？”\n\n“所有账目，所有文件，所有印章。”韦伯说，“从现在起，这里由苏维埃政府直接管理。”  \n\n  ……\n\n科赫当然不会乖乖就范。  \n\n他拖延，搪塞，把账本藏进保险柜，声称“需要时间整理”；他故意用晦涩的术语解释税收流程，让韦伯听得云里雾里；他甚至暗中指使手下的旧职员们消极怠工，让简单的报表拖上三四天。可最终，还是到了交接那天，科赫终于慌了。\n\n“你们不能这样！”他拍着桌子吼道，“这些账目只有我能看懂！你们会搞垮整个财政系统！”\n\n韦伯冷冷地看着他：“科赫先生，您贪污的每一笔钱，我们都查到了。”\n\n科赫的脸色瞬间惨白。“您以为革命只是换一面旗子？”韦伯凑近他，声音压得很低，“不，我们要把你们这些蛀虫，一个一个挖出来。”\n\n三天后，科赫和他的亲信们被押上法庭。审判是公开的，市政厅广场挤满了人。当法官宣布“死刑”时，人群爆发出震天的欢呼。韦伯站在人群边缘，点了一支烟。他知道，旧时代的幽灵还没彻底消失—" 
 BAV_L.9.a:0"但至少，他们学会了用子弹对付它们。"

 BAV_L.10.t:0"谈话"
 BAV_L.10.d:0"" 
 BAV_L.10.a:0"“好。”"

 BAV_L.11.t:0"谈话"
 BAV_L.11.d:0"" 
 BAV_L.11.a:0"“我会去的”"

 BAV_L.12.t:0"夕阳"
 BAV_L.12.d:0"在又一天的忙碌之后，奥古斯特·倍倍尔走出新市政厅的大门，让助手准备好车，他打算出去转转。\n\n傍晚的慕尼黑，街上有些许行人，不再是他刚刚回到这里时的破败景象。这座城市在苏维埃政府的治理下，已经重新焕发生机。\n\n倍倍尔看着街上的景色，似乎陷入了某种回忆。\n\n“卡尔门……汉斯，你还记得我之前讲过的故事吗？”\n\n“倍倍尔同志，您说的是指……靴子上的奶油的故事？几乎每次到卡尔门，您都会讲一遍。”“哈哈，孩子，你的记性可真不错。我那时可年轻啦，连头发都还是黑的。四处流浪着做工，一路就到了慕尼黑，那时这里有一条笔直的大路，两旁长着茂盛的白杨树。那路可真长，我又没吃饭，走到一半就走不动了。好在——”\n\n“好在有个巴伐利亚农民搭了你一程。”汉斯有些不耐烦的打断了这位苏维埃主席的回忆，他听这故事听到耳朵都快起茧子了。\n\n“对嘛！我就说你记性好！那先生的巴伐利亚口音我当时听也听不懂，想当然的就上车了，他拉着车子一再地往后看我，还尝试对我说些什么。等到了卡尔门，我一下车，你猜怎么着？”\n\n“……你坐在人家的货上了，还一靴子捅进了人家的奶油桶。”花白胡子的老头随即开朗的大笑起来，车内洋溢着欢乐的气氛，仿佛他还是如此年轻，拥有那无穷的力量。\n\n看着在苏维埃治理下重新焕发生机的巴伐利亚，还有仍然在那的卡尔门，倍倍尔一时无言。夕阳正好，一切都未来可期。\n\n一阵剧烈的咳嗽打断了这段美好时光，汉斯急忙停下车来轻拍他的后背，他的身体确实大不如前了。\n\n“倍倍尔同志，还是先回家休息吧……”" 
 BAV_L.12.a:0"青春战胜一切。"

 BAV_L.13.t:0"致奥·倍倍尔"
 BAV_L.13.d:0"[GetDate]于莫斯科。\n\n亲爱的倍倍尔同志：\n\n对你的回归表示祝贺。向你，以及一同奋战在巴伐利亚的工兵们，致以衷心的问候。我们很高兴听到你再次“复活”了，这样的好消息为我们沉默压抑的克里姆林宫带来一阵轻快，高尔察克正要用尽手段摧毁我们的一切。另外，不必过度执扭于过去的中派主义经历，革命探索中有很多错误和经验，共产党人总可以继续拿出如从前一般绝不动摇与妥协的坚定信心。\n\n这个地址是临时的，不必回信。\n\n我的德文不好，请原谅。\n\n致社会民主党，向斯巴达克斯派敬礼！\n\n发往慕尼黑。" 
 BAV_L.13.a:0"£lenin_signature"

 BAV_L.14.t:0"致奥古斯特"
 BAV_L.14.d:0"[GetDate]于德累斯顿。\n\n亲爱的奥古斯特：\n\n我很忙，所以只能简单祝贺你的回归。\n\n你近几年发表的文章我都有读过，那都很好，只是有些地方太糊涂了。不过我不得不说，如今德国社会民主党成了这个样子，是完全错误的。马克思恐怕决不会想到这样的问题将会成为党的问题，而你也站到错误那边去了。我在这不想谈论更多有关民主与两个社会主义派别之间的矛盾的事情了。希望这封信能作出一些微小的贡献。\n\n发往慕尼黑。" 
 BAV_L.14.a:0"£KK_signature"

 BAV_L.15.t:0"致奥古斯特·倍倍尔"
 BAV_L.15.d:0"[GetDate]于基尔。\n\n德国社会民主党主席奥古斯特·倍倍尔同志，我谨代表石荷苏维埃向你致以最高的敬意。\n\n您的回归是历史性的，我们热烈期待着未来与您和巴伐利亚苏维埃一同谱写德国革命的新篇章。\n\n发往慕尼黑。" 
 BAV_L.15.a:0"£anton_signature"

 BAV_L.16.t:0"致倍倍尔"
 BAV_L.16.d:0"[GetDate]于柏林。\n\n尊敬的倍倍尔先生：\n\n我以社会民主党现任主席的身份热烈欢迎您回到祖国。\n\n需要通知的是，德意志国家委员会会议将在近日召开，希望您能作为巴伐利亚自治区主席赏光前来。另外，感谢您多年来的栽培，永远期待着你我之间的一场交心谈话。\n\n发往慕尼黑。" 
 BAV_L.16.a:0"£Ebert_signature"

 BAV_L.17.t:0"致永远的挚友倍倍尔"
 BAV_L.17.d:0"[GetDate]\n\n寄信点：美利坚合众国 南方 路易斯安那州 巴吞鲁日市 乔治大街3号 国际码头邮件快递公司\n\n尊敬的，受到大众拥护的，具有杰出成就的德意志社会主义者-奥古斯特·倍倍尔先生你好，向你表示最由衷的敬意！\n\n我们是老朋友了，只是我最近遇到了一点麻烦，不便以真名现身，相信聪明的你肯定能猜出我是谁！往后的沟通，会由“热狗先生”与您联系！希望我们双方的革命事业都能继续顺利进行下去，期待和你再见面的一天\n\n发往慕尼黑。" 
 BAV_L.17.a:0"£hotdog_signature"
 BAV_LETTER.hd.tt:0"-§Y吉恩·托克维尔·斯巴达克§!。\n§g该死，热狗？奥古斯特仔细端详这封信良久，仍看不出是谁寄来的。§!"
 BAV_LETTER.ll.tt:0"-§Y弗拉基米尔·伊里奇·列宁§!。\n§g倍倍尔感慨万千，笑着将它收进了抽屉里。§!" 
 BAV_LETTER.kk.tt:0"-§Y卡尔·考茨基§!。\n§g他一时无言，只是沉默。而后将昔日旧友的慰问兼恐吓信塞进抽屉。§!" 
 BAV_LETTER.ap.tt:0"-§Y安东尼·潘涅库克§!。\n§g倍倍尔起身将信递给罗莎，二人相视而笑。§!" 
 BAV_LETTER.ee.tt:0"-§Y弗里德里希·艾伯特§!。\n§g信件被稳稳当当的收入抽屉，他不知道该如何回复。§!" 

