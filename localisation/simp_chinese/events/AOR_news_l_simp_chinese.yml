  AOR_news.142.t:0"[Get_title_news_header]                   日本关东军发生暴动 [Get_title_news_pic]"
  AOR_news.142.d:0"一则消息从朝鲜传来-日本驻扎在朝鲜的关东军一部在汉城发生了士兵哗变事件，而士兵哗变随即演变成大规模的士兵暴动。暴动的关东军在汉城与釜山四处收捕未参加暴动的日本军官，并与未参与暴动的日、朝军队发生了激烈交火。\n\n目前日本方面，由日本政府以及日本陆军参谋本部联合发表声明；声明号召暴动分子放下武器，团结军队，并同时呼吁在满洲以及朝鲜驻扎的关东军不要像危险分子靠拢，并要求在短时间内结束这场士兵暴动。\n\n目前此次暴动士兵的政治主张并不明确。此次士兵暴动的根源众说纷纭。主流的观点认为，这是延伸到军队上的日本民主派与保守派斗争；其他观点则认为，这次的暴动与日本当局长期不允许关东军回到日本本土有关，而还有一种观点认为，此次的暴动，实际上是远在日本本土的日本军部，阴谋策划的一次夺取海外军队控制权的军事行动。\n\n目前该事态仍在发展，我方将持续跟进报道。"
  AOR_news.142.a:0"1917年西线的重演？"

  AOR_news.143.t:0"[Get_title_news_header]                     中国总统黎元洪出逃！ [Get_title_news_pic]"
  AOR_news.143.d:0"黎元洪，中华民国第二任正式大总统，曾经的反清主要人物之一。然而1922年的4月5日，黎元洪以中国清明节为由，以个人名义宣称前去河北保定的古祭坛祭拜，据目击者称，中国总统只有少量随从跟随。\n\n然而在前往祭坛的途中，黎元洪及其车队却突然不知所踪，原北京卫戍司令吴佩孚派兵寻找无果；段祺瑞也以中华民国军事委员会的名义，在北京周边四处寻找着黎元洪的车队。但不久新的消息传来，有人在天津的一处码头发现了黎元洪及其随从-而他们早已换上了平民装束，并乘上了一艘前往广州的船只。\n\n此消息一经传出，便震动中国全国。目前主流观点认为，黎元洪之所以化妆逃跑，一是因为不忍受南京冯国璋，北京段祺瑞、保定曹锟之控制，二是心向中国南方的联省主义，并试图与广东的实际统治者陈炯明合流，并伺机北上征讨，光复民国。在保定的中国临时政府并未对此事发表任何声明，而临时政府的社会党成员则以《中华民国约法》规定为由，极力拥戴现任中华民国总理徐世昌代行大总统职位。"
  AOR_news.143.a:0"一国的大总统却要逃离总统府……"

  AOR_news.144.t:0"[Get_title_news_header]                     美国联盟国政府赢得内战！ [Get_title_news_pic]"
  AOR_news.144.d:0"随着美国联邦政府的最后一支在序部队投降，美国联盟国政府以及其军队已经彻底占领了整个美国北方；而联邦政府的诸多领导人物，在此之前就成批向联邦政府投降，亦或随着美利坚总统柯立芝乘船逃往他处。合众国两院宣布解散政府，并集体投降。\n\n历时两年的美利坚内战结束了。虽然战争时间并没有人们预料的那样漫长，这次战争却对美国南方造成了无法想象的破坏，而北方也蒙受了巨大的人员损失以及难以想象的军费开支。\n\n如今的联盟国军队已经控制了北方的各大城市。联盟国政府宣布对北方各州进行无限期的军事管制，大量民众对联邦政府的下一步措施普遍采取观望态度。由于北方农业已经陷入停摆，北方目前的粮食储备已无法维持正常的经济以及居民生活，联盟国政府宣布在未来将开展对南方的粮食救济工作。尽管南北的战争已经结束，但美国的西部地区仍然在混乱之中。"
  AOR_news.144.a:0"一个怪胎重获新生？"

  AOR_news.145.t:0"[Get_title_news_header]                     中国云贵内战结束 [Get_title_news_pic]"
  AOR_news.145.d:0"历时一年多的中国云南内战终于落下帷幕，在过去的一年中，中国云南以及贵州的政局已经发生了翻天覆地的变化。\n\n首先是原先统治云南及贵州的唐继尧，他现在已经和他的下属们流亡到了广州，并寻求广州陈炯明势力的帮助，以支持其反攻云贵两省，但陈炯明并未作出任何声明。\n\n而云南军队的政变势力则彻底控制了云南以及贵州两省。就在不久前，蔡锷在其政变时期紧急创立的玉溪军校前发表声明，宣布将“云南救国委员会”改为“云贵军政委员会”，将会取消在之前设立的紧急状态；同时，蔡锷仍然宣称该政府服从于北京的中央政府。该委员会目前的实际领导人仍是孙中山和他的国民党同僚，而外界预计蔡锷将会退居二线，主管军事教育。\n\n这个新生的政权目前还并没有任何目标明确的公开纲领，而北京方面对于该政府也没有做出任何回应，黎元洪本人只是在要求内战双方保持克制，而陈宦等人则要求中央政府出兵，以挽救“西南危急之政局”。"
  AOR_news.145.a:0"皇帝轮流坐，明日到我家"

  AOR_news.146.t:0"[Get_title_news_header]                     日本与中国国民政府签订和平协议 [Get_title_news_pic]"
  AOR_news.146.d:0"在初期遭受惊人的失败后，日本社会各界已经失去了对这场战争的信心，国内此起彼伏的抗议以四处缠绕的反对声，终于让日本政府屈服于战争胜利属于中国的结局，并以平等的姿态与中国方面开始展开谈判。\n\n经过协商，中日双方代表在南京扬子江饭店举行和平谈判，并召开记者会。苏联方面以特邀代表的身份参会，朝鲜起义军方面并未参加此次会议。会议结果已于昨日下午公布：中日双方从条约签订后的12:10起正式全面停火，日本将旅顺、大连等租借归还中国，同时将青岛等争议地区归还中国；条约签署后，日本将会在这些地区全面撤军。而台湾方面仍然属于条约内的搁置内容。\n\n同时，日本同意废除对中国绝大多数的不对等条约，中东铁路的日方所有权全部归还中国，中国政府方面有权利在海参崴地区驻兵，但不得以任何形式解散已经成立的滨海州政府，也同时不得与苏联在有关滨海州的方面签订任何协定。\n\n尽管实现全中国解放的目标仍未完成，但新生的中国政权依然给那曾经的东亚霸主-日本沉重打击，而如今的日本国内，或许即将经历一场难以想象的政治风暴……"
  AOR_news.146.a:0"东亚的秩序被改写了"

  AOR_news.147.t:0"[Get_title_news_header]                     日本与中国联省政府签订和平协议 [Get_title_news_pic]"
  AOR_news.147.d:0"在初期遭受惊人的失败后，日本社会各界已经失去了对这场战争的信心，国内此起彼伏的抗议以四处缠绕的反对声，终于让日本政府屈服于战争胜利属于中国的结局，并以平等的姿态与中国方面开始展开谈判。\n\n经过协商，中日双方代表在南京扬子江饭店举行和平谈判，并召开记者会。苏联方面以特邀代表的身份参会，朝鲜起义军方面并未参加此次会议。会议结果已于昨日下午公布：中日双方从条约签订后的12:10起正式全面停火，日本将旅顺、大连等租借归还中国，同时将青岛等争议地区归还中国；条约签署后，日本将会在这些地区全面撤军。而台湾方面仍然属于条约内的搁置内容。\n\n同时，日本同意废除对中国绝大多数的不对等条约，中东铁路的日方所有权全部归还中国，中国政府方面有权利在海参崴地区驻兵，但不得以任何形式解散已经成立的滨海州政府，也同时不得与苏联在有关滨海州的方面签订任何协定。\n\n尽管实现全中国解放的目标仍未完成，但新生的中国政权依然给那曾经的东亚霸主-日本沉重打击，而如今的日本国内，或许即将经历一场难以想象的政治风暴……"
