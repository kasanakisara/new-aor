  AOR_news.125.t:0"[Get_title_news_header]                     国民革命政府占领满洲 [Get_title_news_pic]"
  AOR_news.125.d:0"随着战事的逐步进行，中国国民革命军已经占领了满洲的绝大多数城市。拥有日本支持的张作霖军队彻底被击溃；而张作霖本人也选择扔下他的军队，逃往哈尔滨的日本使馆区，但目前下落不明。\n\n拥有大量工业设施以及大量武器装备的，甚至吸纳了一部分日本关东军的满洲奉天政府，遭到了中国北京政府的毁灭性打击，这是让世界都始料不及的事-但有一点可以知道：中国人第一次完全凭着自己的武器和士兵，击败了不可一世的日本和他的跟随者。不过，南满洲的日本企业、中东铁路以及亚瑟港地区都没有在战争中被强制夺取。\n\n日本方面，曾经在国民革命军夺取奉天后保持了相当长时间的静默，但现在，日本政府却以外交公告的方式，公开抗议了国民革命政府因占领满洲导致“东亚的不稳定局面”。同时，滞留在中东铁路的日本军队与国民革命军爆发了大量冲突，中日军队在亚瑟港的对峙情况也不容乐观。似乎新的火药桶马上就要被点燃了……"
  AOR_news.125.a:0"挥动革命旗帜，继续前进！"

  AOR_news.126.t:0"[Get_title_news_header]                      联省革命政府占领满洲 [Get_title_news_pic]"
  AOR_news.126.d:0"随着战事的逐步进行，中国联省军队已经占领了满洲的绝大多数城市。拥有日本支持的张作霖军队彻底被击溃；而张作霖本人也选择扔下他的军队，逃往哈尔滨的日本使馆区，但目前下落不明。\n\n拥有拥有大量工业设施以及大量武器装备的，甚至吸纳了一部分日本关东军的满洲奉天政府，遭到了中国北京政府的毁灭性打击，这是让世界都始料不及的事-但有一点可以知道：中国人第一次凭着自己的武器和士兵，击败了不可一世的日本和他的跟随者，哪怕有其他第三国的支持。不过，南满洲的日本企业、中东铁路以及亚瑟港地区都没有在战争中被强制夺取。\n\n日本方面，曾经在联省军队夺取奉天后保持了相当长时间的静默，但现在，日本政府却以外交公告的方式，公开抗议了联省革命政府因占领满洲导致“东亚的不稳定局面”。同时，滞留在中东铁路的日本军队与联省爆发了大量冲突，中日军队在亚瑟港的对峙情况也不容乐观。法国政府已经承认了联省革命政府为中国唯一的合法政府，似乎新的火药桶马上就要被点燃了……"
  AOR_news.126.a:0"万众共和的意志不可阻挡！"

  AOR_news.127.t:0"[Get_title_news_header]                      中国冯玉祥支持共和革命 [Get_title_news_pic]"
  AOR_news.127.d:0"一则突发的消息从中国前线传来；陕西省督办冯玉祥宣布支持联省革命政府的革命主张，并派遣军队北出长城，东出陕西，进攻盘踞在中国东部的北洋政府。\n\n冯玉祥将军是一位不同于其他中国军阀的特别人物。他早年亲自参与中国的民主革命，在大战中迅速晋升，并最终担任陕西省督办。冯玉祥本应该是依附于中国北洋的一员，然而在北伐战争中，他坚持选择了站在中国民主革命的一方，对着自己曾经的头儿举起了枪。"
  AOR_news.127.a:0"他站到了正义的一方"

