  AOR_news.8.t:"[Get_title_news_header]                 墨西哥革命胜利[Get_title_news_pic]"
  AOR_news.8.d:0"  经过长久的内战，墨西哥的叛军已经占领了墨西哥城与韦拉克鲁斯，前者宣告了墨西哥第二帝国统治的结束，后者象征着法国人在墨西哥的势力土崩瓦解。起义军各方已经决定在墨西哥城召开大会，共同商讨以后的行动计划"
  AOR_news.8.a:0"伟大的胜利！"  
    
  AOR_news.9.t:"[Get_title_news_header]                     夏洛特皇后逝世[Get_title_news_pic]"
  AOR_news.9.d:0"  在六年的统治之后，墨西哥第二帝国的皇后夏洛特于今天在墨西哥城去世。她的死亡标志着一个悲惨的传奇的终结，也引发了人们对墨西哥历史上最动荡和血腥的时期的回忆和反思。\n在墨西哥的继承危机时，夏洛特皇后宣布国家进入紧急状态开始进行摄政，并成功的平息了墨西哥的分离主义骚乱和无政府主义起义，重新统一了帝国。\n夏洛特皇后于今天早上在睡梦中安详地去世，没有留下任何遗嘱，国家再一次进入到了继承危机之中。她的遗体将被安葬回拉肯圣母教堂，与她的父亲利奥波德一世和弟弟利奥波德二世一起。"
  AOR_news.9.a:0"似曾相识燕归来..."
  
  AOR_news.15.t:"[Get_title_news_header]                     中美洲运河公司统一中美[Get_title_news_pic]"
  AOR_news.15.d:0"  今日，中美洲联合安保与运河公司共同管理人塞缪尔·那穆瑞宣布解散中美洲联邦的一切行政与管理机关。与此同时，联合安保的警察在全国范围内抓捕破坏分子，一切事务将由中美洲管理委员会暂时接管。早在中美洲分裂之时，他所带领的武装部是一个几乎没有人看好的干涉势力，可没人想到他最终赢得了内战的胜利，而且在数年后横扫中美各国，甚至将运河公司收入麾下。现在，两个巨型企业踏着中美洲人民的尸骨走上了世界舞台，一场由血泪，轰鸣与炫彩的历史翻开了篇章。"
  AOR_news.15.a:0"天使与财富到来..."
  AOR_news.15.b:0"而随后的便是地狱"
  
  AOR_news.11.t:"[Get_title_news_header]                     1920年安特卫普奥运会[Get_title_news_pic]"
  AOR_news.11.d:0"  历时近五个月的第七届夏季奥林匹克运动会今天在这座受大战摧残的城市落下帷幕。本届奥运会是一次和平与重生的盛会，也是一次创纪录与惊喜的盛会。来自29个国家和地区的2591名运动员参加了22个大项154个小项的比赛，其中包括了首次出现的拳击、马球、橄榄球、曲棍球等项目，以及重新恢复的举重、拔河等项目。冬季项目也再度登上奥运会的舞台，花样滑冰和冰球吸引了众多观众的目光。\n在奖牌榜上，美国队以41金27银27铜的成绩高居榜首，瑞典队以19金20银25铜紧随其后，英国队以15金15银13铜位居第三。东道主比荷卢队也表现不俗，获得了13金11银11铜的佳绩，排名第五。芬兰队则成为本届奥运会最大的黑马，凭借跑步奇才帕沃·鲁米和其他优秀选手的努力，斩获了15金10银9铜的奖牌，位列第四。\n尽管一战刚刚结束不久，各国之间还存在着深深的伤痕和隔阂，但是在奥林匹克精神的感召下，各国运动员展现了高尚的体育道德和人文情怀。可以肯定的是，这届奥运会不仅是一次体育盛宴，也是一次人类文明的盛宴。它将成为人类历史上一个永恒的里程碑，它将激励和鼓舞后人继续追求和平与进步的崇高理想。"
  AOR_news.11.a:0"和平需要勇气!"
  AOR_news.11.b:0"安特卫普…我们的家"
  
  AOR_news.12.t:"[Get_title_news_header]                     1924年巴黎奥运会[Get_title_news_pic]"
  AOR_news.12.d:0"  今天，第八届夏季奥林匹克运动会在巴黎隆重开幕。这是一场历史性的开幕式，标志着奥林匹克运动进入了一个新的时代。\n本届奥运会是巴黎第二次举办夏季奥运会，在今天的开幕式上，法国总统亲自发表了讲话，他对本届奥运会的组织者和参与者表示了热烈的欢迎和祝贺，他还强调了奥林匹克运动对于促进世界和平和友谊的重要意义。随着他宣布本届奥运会正式开幕，一声炮响响彻云霄，万众欢呼。\n在《马赛曲》的伴奏下，各国代表团依次入场，他们身着各自的服装和旗帜，向观众致意。其中引起最大轰动的是美国游泳运动员约翰尼·维斯穆勒，他身穿一件白色泳衣，手持美国国旗，引起了女性观众的尖叫和欢呼。另外，中国代表团也首次出现在奥运会上，虽只是三名网球手参与了表演赛，但仍然引起了人们的关注和好奇。\n在今天的开幕式上，我们感受到了一种新的气氛和活力，也看到了一种新的形象和风格。这是一场历史性的开幕式，也是一场前所未有的盛会。让我们期待接下来的比赛和表演，让我们期待奥林匹克运动的更加辉煌!"
  AOR_news.12.a:0"更快、更高、更强!"
  
  AOR_news.13.t:"[Get_title_news_header]                      视觉革命![Get_title_news_pic]"
  AOR_news.13.d:0"  昨天，在伦敦的一间小实验室里，一场历史性的事件发生了。苏格兰发明家约翰·洛吉·贝尔德成功地用电子信号在屏幕上显示了一个木偶的图像，这是世界上第一次实现了电视的原理。\n贝尔德先生向我们介绍了他的发明，他称之为“电视望远镜”。他说，他利用了一个快速旋转的圆盘，上面有一些小孔，通过这些小孔，可以将一个物体的影像分成许多部分，并将它们转换成电流。然后，这些电流通过电线传送到另一个旋转的圆盘上，上面有一个荧光屏，可以将电流还原成图像。这样，就可以在远处看到一个物体的动态影像。\n贝尔德先生说，他的目标是将电视技术发展到可以传送人类的面部表情和声音，并将其应用于教育、娱乐和新闻等领域。他认为，电视将会给人类带来无限的可能性和想象力。"
  AOR_news.13.a:0"崭新的纪元"
  
  AOR_news.14.t:"[Get_title_news_header]                     伦敦惊现神奇霉菌[Get_title_news_pic]"
  AOR_news.14.d:0"  一种能够杀死多种有害细菌的神奇霉菌在伦敦圣玛丽医学院被发现，这可能是人类抗击传染病的重大突破。这种霉菌被命名为青霉素，是由该院的细菌学教授亚历山大·弗莱明在偶然中发现的。据悉，弗莱明教授在培养葡萄球菌的过程中，发现了一个被青霉菌污染的培养皿。令他惊讶的是，在青霉菌周围，原本生长旺盛的葡萄球菌竟然消失了，似乎被青霉菌分泌的某种物质所抑制或杀死。\n弗莱明教授随即对这种霉菌进行了进一步的研究，发现它的“霉菌液”能够杀死多种有害细菌，如链球菌、脑膜炎球菌和白喉杆菌等。他还发现，这种物质对人体细胞和血液没有任何不良影响，因此有望成为一种安全有效的抗菌药物。\n弗莱明教授今天在圣玛丽医学院公布了他的发现，并在《英国实验病理学期刊》上发表了论文。他表示，他已经将青霉素分离出来，并希望能够提纯和制备出更多的量，以便进行更广泛的实验和试验。\n据了解，弗莱明教授已经与牛津大学和美国农业部等机构建立了合作关系，共同推进青霉素的研究和开发。他还表示，他愿意与世界各地的科学家分享他的发现和经验，共同探索青霉素的更多用途和潜力。"
  AOR_news.14.a:0"天赐神药吗？"
  
  AOR_news.18.t:"[Get_title_news_header]                     加拿大总理博登辞职[Get_title_news_pic]"
  AOR_news.18.d:0"加拿大总理罗伯特·博登于昨日宣布辞职，结束了他长达八年的执政生涯。博登称，他因健康原因无法继续担任总理，同时也对他的政府在第一次世界大战期间和战后所做出的贡献表示感谢。博登的辞职引发了加拿大政坛的震动，也为他的继任者阿瑟·米登带来了巨大的挑战。\n米登是博登政府的内政部长和印第安事务总监，也是保守党的领导人。米登表示，他将继续执行博登的政策，尤其是在加强与英国的关系和保护加拿大的主权方面。米登还承诺，他将努力解决加拿大面临的经济和社会问题，包括高通货膨胀、失业、贫困和罢工。"
  AOR_news.18.a:0"新总理能干好吗？"
  
  AOR_news.19.t:"[Get_title_news_header]                     1921加拿大大选即将开始[Get_title_news_pic]"
  AOR_news.19.d:0"据驻加拿大记者报道，加拿大即将开始的大选风云变幻，各党派争夺激烈，魁北克的征兵问题也成为了焦点。保守党政府在战时联合政府的领导下，强行征召魁北克人参加战争，引发了魁北克人的强烈反对。温尼伯总罢工更是显示了工人阶级对政府的不满。在这样的背景下，各党派都希望在大选中获得民众的支持，但结果如何，还有待观察。\n保守党由米恩领导，他继承了博登的政治遗产，但也承担了博登的政治包袱。他试图维持战时联合政府的稳定，但也面临着自由党和农业进步党的挑战。而自由党反对征兵政策，主张和平解决战争问题。他在魁北克和安大略省有较强的支持基础，但也受到了联盟党的分流。农业进步党由科特领导，他代表了西部农民的利益，主张改革选举制度，提高农民的收入，并反对关税和银行。他在西部省份有较高的人气，但也缺乏全国性的组织和政策。\n可以遇见的是，这场大选将是加拿大历史上最复杂和最重要的一场。它将决定加拿大在战后世界中的地位和方向，也将影响加拿大内部的团结和发展。"
  AOR_news.19.a:0"风雨欲来..."
  
  AOR_news.20.t:"[Get_title_news_header]                       魁北克起义[Get_title_news_pic]"
  AOR_news.20.d:0"魁北克，加拿大的法语区，一直以来都是一个不安分的地方。这里的人民对英语区的统治和联邦政府的政策有着深深的不满，他们渴望获得更多的自治权和文化认同。而在前几日，这种不满终于爆发了，导致了一场规模空前的起义。\n起义的导火索是保守党政府为了参与战争而对魁北克实施的征兵行动。这一行动遭到了魁北克人民的强烈反对，他们认为这是一场与他们无关的战争，他们不愿意为英国王室和联邦政府牺牲自己的生命。在魁北克省内，征兵令引发了大规模的抗议和暴力冲突，许多人被捕或者受伤。魁北克省政府也表示了对征兵令的反对，并要求联邦政府尊重魁北克人民的意愿。\n然而，联邦政府并没有妥协，而是继续推行征兵令，并派遣军队和警察镇压魁北克的反抗。这进一步激化了魁北克人民的愤怒，他们开始组织起义军，准备与联邦政府决一死战。在事发当天，起义军占领了魁北克城和蒙特利尔等重要城市，并宣布成立魁北克共和国。他们还得到了法国和等国家的支持和援助。"
  AOR_news.20.a:0"我不同意你说的话，你也没有说话的权力。"
  
  AOR_news.21.t:"[Get_title_news_header]                     巴西陷入内战！！！[Get_title_news_pic]"
  AOR_news.21.d:0"来自新大陆的消息传到了我们耳边-又是一则极其不幸的消息：巴西的国内骚乱彻底演变成多个势力间的内战。\n\n早在30年前，巴西就已经推翻了本国的君主制并建立了民主共和制，但政权实际上掌握在军事独裁者曼努埃尔·德奥多罗·达·丰塞卡手中；巴西政府曾经向国民许诺的联邦制并没有兑现，甚至频频向外发动扩张，使得巴西成为了南美唯一一个真正的大国。\n\n丰塞卡死后，将总统位置交给了他的侄子埃尔梅斯·罗德里格斯。但当罗德里格斯暴死后，巴西内部的矛盾已经完全不能掩盖并且爆发出来，联邦制的支持者和旧政府的拥护者，以及印第安人的政权已经开始在这个国度上燃起战火。"
  AOR_news.21.a:0"告诉我，这个世界上还有哪里没有战争?"
  
  AOR_news.22.t:"[Get_title_news_header]                     扎格鲁尔宣布埃及独立[Get_title_news_pic]"
  AOR_news.22.d:0"昨日，在遥远的非洲，埃及政府正式宣布独立，结束了长达30年的英国殖民统治。埃及总理扎格鲁尔在开罗的塔里尔广场发表了激情澎湃的演讲，号召全国人民团结起来，建设一个自由、民主、繁荣的新埃及。他还宣布了一系列的政治、经济、社会改革措施，包括发展工业和农业、提高教育和卫生水平等。他表示，埃及已经从英国的枷锁中挣脱出来，将走向一个光明的未来。\n扎格鲁尔的演讲受到了广大群众的热烈欢迎和支持，他们高呼“埃及万岁”、“扎格鲁尔万岁”等口号，挥舞着埃及国旗和华夫脱党旗帜，表达了对新政府的信任和期待。一些民众表示，他们感到自己终于成为了一个真正的国家，有了自己的主权和尊严，有了改变命运的机会。\n然而，扎格鲁尔的演讲也引发了一些争议和质疑。一些反对派人士指出，埃及的独立只是表面上的独立，实际上英国仍然控制着埃及的外交、军事、财政等重要领域，扎格鲁尔只是英国的傀儡，他的改革措施只是为了安抚民心，而不是真正解决埃及面临的深层次问题。一些知识分子和学者也认为，扎格鲁尔缺乏政治经验和远见卓识，他的演讲充满了空洞的口号和不切实际的承诺，他没有提出一个清晰和可行的发展规划和路线图，他没有考虑到埃及内部和外部的复杂形势和挑战。"
  AOR_news.22.a:0"独立是一种幻觉，自由是一种奢望。"
  
  AOR_news.23.t:" [Get_title_news_header]          南非总理博塔去世，史末资接任[Get_title_news_pic]"
  AOR_news.23.d:0"南非联邦政府今天宣布，总理路易斯·博塔于昨日晚间因流感在比勒陀利亚的官邸去世，享年56岁。博塔将军是南非联邦的首任总理，也是一位杰出的政治家和军事家，曾在第一次世界大战中为英联邦立下赫赫战功，又在凡尔赛和会上为南非争取了国际地位。他的去世是南非乃至整个协约国的重大损失。\n根据南非宪法规定，副总理扬·克里斯蒂安·史末资已经自动接任总理一职，并将领导南非党继续执政。史末资也是一位有着丰富经验和卓越才能的政治领袖，曾两次担任国防部长和财政部长，也是国际联盟的创始人之一。他在国内外都享有很高的声望，被誉为“聪明的詹尼”和“詹尼叔叔”。他表示，他将继承博塔将军的遗志，维护南非的团结和稳定，加强与英国和其他英联邦国家的合作，推动国际和平与发展。\n博塔将军的葬礼将于本周五在比勒陀利亚举行，预计有数万民众前来吊唁。英国首相劳合·乔治、澳大利亚总理比利·休斯、加拿大总理罗伯特·鲍登等多位英联邦领导人也将出席葬礼。据悉，博塔将军的遗体将安葬在比勒陀利亚的英雄公墓，与其他为南非建立功勋的人士一同长眠。"
  AOR_news.23.a:0"一代新人换旧人。"
  
  AOR_news.24.t:"[Get_title_news_header]                     南非工人罢工[Get_title_news_pic]"
  AOR_news.24.d:0"南非的兰德地区，以其丰富的金矿而闻名于世，也是南非政府的经济支柱之一。然而，在这片金光闪闪的土地上，却隐藏着无数的苦难和不公。就在早些天，一场声势浩大的兰德罢工爆发了，革命工团主义分子正式宣布对南非政府宣战，要求改善工人的生活条件和工资水平，同时反对政府对白人工人的歧视和压迫。\n我方记者事发当天深入到了现场，亲眼目睹了这一惊天动地的事件。成千上万的工人手持武器，高呼口号，向政府军发起了猛烈的攻击。政府军毫不留情地向示威者开枪，造成了大量的伤亡。"
  AOR_news.24.a:0"无价的命，有价的金。"
  
  AOR_news.30.t:"[Get_title_news_header]                     袁世凯逝世[Get_title_news_pic]"
  AOR_news.30.d:0"今早中华民国袁世凯总统因突发恶疾昏迷，情况不明。为确保安全，宪兵总司令吴佩孚已带兵封锁了总统府，副总统黎元洪也被紧急招去。据悉，袁总统因长期体恤民情、操劳国务，以致患有尿毒症，此次昏迷盖因其而起。\n袁总统是中华民国的伟大缔造者，他在任期内打赢了世界大战并收复了清朝割让的外西北。年关将近，已是辞旧迎新之时。昔人将逝，神州板荡。四方八隅，千舟竞发。前程茫茫，不知何国何家。\n可谓是：\n京口横戈空得意，建康拂袖悦风华。\n淝水挥鞭终一梦，空空梧桐长安家。\n五斗成醉身无物，怎记武陵桃源花。\n今昔广陵明日散，荡到酒尽何处挖。"
  AOR_news.30.a:0"——鲸落万物生。"
  
  AOR_news.31.t:"[Get_title_news_header]                     倍倍尔逝世[Get_title_news_pic]"
  AOR_news.31.d:0"巴伐利亚苏维埃共和国的首席理论家、斯巴达克斯同盟的创始人、国际共产主义运动的领导人奥古斯特·倍倍尔于七天前因病去世，享年82岁。他的葬礼于今日在慕尼黑举行，吸引了数万人前来送别这位革命老战士。\n倍倍尔是德国社会主义运动的重要人物，曾参与过第一国际、德国社会民主工党、德意志革命等历史事件，是马克思主义在德国的忠实传播者和实践者。他坚持反对帝国主义战争，支持俄国十月革命，领导了巴伐利亚苏维埃政权的建立，为无产阶级解放事业奋斗了终生。\n葬礼上，来自世界各地的共产主义者都发表了悼词，赞扬倍倍尔的贡献和精神。潘涅库克，拉狄克等其他德国革命家悉数到场。共产国际的使者称他为“德国革命的火炬”，并代表苏维埃联盟深切缅怀倍倍尔。美国的白劳德也远赴欧洲，代表美国众多革命党派向他表示敬意。远在莫斯科的列宁也在书信内写到：“没有一个人像奥古斯特·倍倍尔那样明显地体现出这个时期的特点和任务。”本次葬礼摒弃了传统的基督教仪式，而改由弗兰茨·梅林，卡尔·李卜克内西和罗莎·卢森堡三日全程主持了这场葬礼。\n葬礼当天，巴伐利亚红军全军在边境紧密巡逻，并对慕尼黑展开了封锁，防止德国当局对葬礼举行进行干扰。在葬礼的最后，所有到场人士共同高唱了国际歌，向这位革命英雄致以最后的敬意。"
  AOR_news.31.a:0"因特纳雄奈尔，就一定要实现!"
  AOR_news.31.b:0"他终于可以闭嘴了。"
  AOR_news.31.c:0"德国人就眼看着恐怖分子在那集会？"
  AOR_news.31.e:0"深切关怀。"

  AOR_news.32.t:"[Get_title_news_header]                      叙利亚起义的被镇压[Get_title_news_pic]"
  AOR_news.32.d:0"就在1920年三月，叙利亚残留的国王势力在他们的领袖——费萨尔国王的领导下掀起了一场反对法国殖民政府的起义，自第一次世界大战以来，叙利亚人民不停的抗争，却未迎来真正的解放，一波接一波的反殖民起义风起云涌...可随着本月费萨尔国王被叛徒出卖，他被法国殖民政府围困在了一片荒漠中。在顽强的抵抗后殖民政府抓住了费萨尔国王，并在昨日将他与他的追随者一同处决。又一场起义被平息了。\n也许这一次将是永远。"
  AOR_news.32.a:0"他向殖民主义发起了必死的冲锋"

  AOR_news.33.t:"[Get_title_news_header]                     叙利亚大起义![Get_title_news_pic]"
  AOR_news.33.d:"1920年，费萨尔国王的起义被镇压，可叙利亚的混乱并未结束。就在几个月前，一名阿拉伯囚犯导致的殖民当局与当地人的冲突迅速演化为一场席卷整个叙利亚的大叛乱。叛乱的领导人是当地久负盛名的贵族：苏丹·阿尔特拉什。国际观察家普遍认为，叙利亚的起义除了当地人的反抗外，还有英国的推波助澜。更令人不安的是，本次起义已经波及到了法属大叙利亚北部地区，库尔德人领袖谢赫说以及奥斯曼军队已经占领了整个叙利亚北部。奥斯曼人正在寻求收复他的失地——很难说这背后没有英国的许可。英国与法国的支援军团已经摩拳擦掌，随时准备加入战局\n这会成为英法冷战的新爆点吗？"
  AOR_news.33.a:0"1920打输了，1922再打一次"

  AOR_news.34.t:"[Get_title_news_header]                     卡内基的新材料![Get_title_news_pic]"
  AOR_news.34.d:"又一则新闻从混乱不堪的五大湖地区传来了，不过这次不是坏消息-美国卡内基钢铁公司及其下属的卡内基实验室于近日成功研制了珠光体可锻铸铁与铁素体可锻铸铁。据报道，这两项铸铁技术的研究成果将极大利于美国铸铁技术的进步；与此同时，标准石油公司也呼吁卡内基实验室尽快向公众开放实验数据，以便为美国钢铁行业贡献福祉-不过也有人认为，标准石油公司的此番呼吁是为了福特公司的“柴油机革命计划”的进行而发出的。但此时的卡内基公司已经江河日下，并受到了底特律大暴动的严重冲击，尚且不知卡内基公司方面会如何回应。"
  AOR_news.34.a:0"有趣"

  AOR_news.35.t:"[Get_title_news_header]                     卡内基之死[Get_title_news_pic]"
  AOR_news.35.d:"大悲报!五大湖地区的动乱不仅伤害了美国人民的心灵，也同时给了美利坚大富翁卡内基重重的一击；曾经的世界富翁安德鲁.卡内基于本月被宣告去世，死因疑似为突发心脏病去世。卡内基自1856年时已涉足钢铁行业，其公司最终于上世纪80年代正式成为美国钢铁行业的巨头，不过，90年代后的卡内基公司由盛转衰，并最终为摩根公司收购主体股份；卡内基本人虽仍然有权管理公司事务，但其多项挽救公司的措施皆以失败告终-其中最为失败的一次便是对五大湖新兴工业城市的投资计划。他的死亡将会对卡内基公司与美国钢铁行业产生何等影响，我们不得而知，但如今巨头的死，不仅是全世界钢铁行业的悲哀，更为其他国家的工业敲响了警钟-谁会重蹈美国人的覆辙，我们现代文明的钢铁之路究竟在何方？"
  AOR_news.35.a:0"危机前兆？"

  AOR_news.36.t:"[Get_title_news_header]                     卡内基公司的倒闭[Get_title_news_pic]"
  AOR_news.36.d:"第2次悲报!曾经的世界第一钢铁公司、美利坚的骄傲、积攒了庞大财富的卡内基公司于今日正式宣告破产。不过最令人出乎意料的，反而是其公司场地以及设备被摩根大通迅速拍卖。目前有消息称，摩根大通拍卖的最大买主是其老冤家洛克菲勒家族的标准石油公司；洛克菲勒是为他的钢铁企业添砖加瓦，亦或是为了扩大福特公司的生产线，目前众说纷纭。除标准石油外，梅隆家族控制的匹兹堡钢铁公司与其他几个独立的钢铁巨头也对拍卖物品提出了兴趣。"
  AOR_news.36.a:0"卡内基尸骨未寒，身躯已被瓜分"

  AOR_news.37.t:"[Get_title_news_header]                     电的奇迹![Get_title_news_pic]"
  AOR_news.37.d:"现代社会可是一个日新月异的时代，而来自遥远彼岸的美国科技消息更是令不少科技爱好者们翘首以盼。近日，由标准石油公司支持建立的特斯拉实验室的领导者尼古拉.特斯拉正式主持了全球第1条长距离无线输电技术的试用启动仪式，其输送电流依靠的装置正是特斯拉引以为傲的“特斯拉线圈”；该输电通道从盛产棉花的拉伯克市延伸到终点的盛产石油的米德兰地区，全长约100公里，输送全程不需要一条电线。该项目的展示，一是为了展示特斯拉线圈技术未来的无限前景，二是为了米德兰油田的电动采油机器提供动力来源。目前该电力工程的电力运输均处于稳定状态，特斯拉本人则宣称这将是一个新电气时代的完美开端；报道分析，该项目的展示预计会为特斯拉实验室带来巨大的声誉与商业利益。"
  AOR_news.37.a:0"人类的主旋律便是变革"

  AOR_news.38.t:"[Get_title_news_header]                     电波也能找到你![Get_title_news_pic]"
  AOR_news.38.d:"尽管远方的美利坚笼罩在战火硝烟之中，但科技的光芒仍然未被浑浊的空气所掩盖。近日，美国通用电气电气工程师阿尔伯特.H.泰勒和 利奥.C.杨在美国北方沿海某地进行了一场“锁定”实验。两位工程师利用了对手企业-特斯拉工作室推出的电磁波发射器与电磁波定位器，结合了另一位科学家阿尔伯特·华莱士·赫尔发明的磁控管，成功组装起了一台“电磁波搜索设备”。海边的搜索实验最终成功定位了一条木制船。据报道称，该技术的发明预计会对船运行业甚至于航空行业产生巨大影响，未来的运输工作人员或许可以在远程实时查看交通工具的运输状态；不过，也有声音表示，如今美国处于战火之中，若该技术用于军事领域，则会带来更大更多难以预料的灾难。"
  AOR_news.38.a:0"所以特斯拉提起诉讼了吗？"

  AOR_news.41.t:"[Get_title_news_header]                      奥斯曼赢得小亚细亚战争[Get_title_news_pic]"
  AOR_news.41.d:"自1683年维也纳之围的失败直到1919年的彻底垮塌，奥斯曼帝国经历了近700年的历史进程后，最终被世界大战打回了突厥人生活的小亚细亚半岛腹地，但希腊人并不满足。\n\n希土战争来到了紧要的十字关头。双方在应属于国际中立区的君士坦丁堡展开了大规模的争夺战。在激烈的战报中，一些外国的前线记者指出：君士坦丁堡地区的希腊军队在陆续撤出，而索菲亚大教堂上则重新飘起了奥斯曼新月旗。我们都知晓希腊人与土耳其人之间的民族仇杀，而如今有大量的希腊人滞留于君士坦丁堡，他们的命运最终如何，我们尚且未知。\n\n在爱琴海上的炮火之间，无数的奥斯曼军队将象征着国家的新月旗插在收复失土当中的山脉之上。正如那句歌词所说：“敌人如风一般逃窜”。"
  AOR_news.41.a:0"突厥武士，精神尚存，土耳其人，永世不亡！" 

  AOR_news.42.t:"[Get_title_news_header]                     希腊赢得小亚细亚战争[Get_title_news_pic]"
  AOR_news.42.d:"从1821年以来，希腊人就一直信着认定他们是那远古的罗马帝国的直接继承人，而如今，他们的梦想似乎已经近在眼前。\n\n近日希腊与奥斯曼的几场战斗中，希腊军队以压倒性的优势击溃了奥斯曼残余的前线部队，并成功占领了安卡拉以及安塔利亚等奥斯曼的重要地区；而奥斯曼的前线总司令凯末尔则下落不明，奥斯曼的行政机构也不知迁往何地。而安卡拉会战则被希腊媒体称为“最后的战斗”，希腊国内举国欢腾于战争的胜利。外界猜测，希腊首相维尼泽洛斯的下一步行动，将摆脱英法所谓的控制，成立一个真正的大希腊甚至光复罗马帝国，而这将会严重危害英法在东地中海的权益。"
  AOR_news.42.a:0"东正的圣战撕毁了人的理性"  

  AOR_news.43.t:"[Get_title_news_header]                     希腊赢得小亚细亚战争[Get_title_news_pic]"
  AOR_news.43.d:"那遥远的东方童话，终究抵不过现实世界的火炮，将土耳其人们的白日梦彻彻底底的在安卡拉击碎。\n\n螳臂挡车，自不量力。奥斯曼的突然进攻令世界各国感到极为惊奇，而希腊则毫不畏惧这个已经近乎残废的东方国家。在成功进行了抵挡后，希腊将20多万军队通通派往了小亚细亚半岛，并在多个地点与奥斯曼军队展开决战。纵使传奇将领凯末尔的指挥能力再高，缺少弹药补给与纪律性和人员的奥斯曼军队最终还是败下阵来，任由希腊人占领安卡拉与安塔利亚。\n\n目前，奥斯曼的行政机关以及凯末尔本人都下落不明，而由于前线战事仍然激烈，我们暂时无法获取太多的信息，但有一点我们可以知道的是-奥斯曼帝国最后一次翻盘的机会，已经在这一次的战争中彻底覆灭了。"
  AOR_news.43.a:0"突厥勇士的悲歌"  

  AOR_news.44.t:"[Get_title_news_header]                     奥斯曼赢得小亚细亚战争[Get_title_news_pic]"
  AOR_news.44.d:"奥斯曼的战犯恩维尔曾经说过：突厥民族不会灭亡，而如今他的话反而成为了现实。\n\n面对希腊强大的攻势，原本被国际普遍认为将会面临灭国之灾的奥斯曼却以力挽狂澜之势在小亚细亚地区与希腊军队展开了多轮会战，在奥斯曼前线总指挥凯末尔的带领下，奥斯曼军队成功击溃了希腊军队的多轮进攻，甚至将战线反推回了博斯普鲁斯海峡一带-而滞留在东爱琴海地区的希腊军队则被迫搜罗大量船只驾驶逃离。\n\n这是一场在世界大战后的军事奇迹，奥斯曼的军事领袖凯末尔，带领着土耳其人走向了无数失败后的最伟大胜利，而如今未来的希土关系将会如何，土耳其将会做出何种新的行动，我们尚不知晓。"
  AOR_news.44.a:0"伊兹密尔群山上，鲜花多灿烂……"  

  AOR_news.46.t:"[Get_title_news_header]                     米骚乱扩大化[Get_title_news_pic]"
  AOR_news.46.d:"日本自去年7月以来，一直处于一场前所未有的米骚乱之中。起因是米价飙升和粮食短缺，导致民众不满。发起者是妇女，后来吸引了工人、农民、学生和士兵等各界人士的参与。他们的诉求是推翻政府，实施普选并改善民生。\n截止今年8月，骚动已经持续了一年多，却没有任何缓和的迹象。相反，骚动的规模和强度都在不断扩大。据不完全统计，全国已经发生了超过2,600起的骚动事件，涉及近百万的人口与数百万日元的财产损失。政府对此无能为力，只能动用军队和警察进行镇压，但效果甚微。\n骚动的影响已经波及到国际层面，引起了外国的关注，英法美德等国家都对日本表示了关切，担心骚动会影响到日本在亚洲的地位和稳定。一些国家甚至暗示，如果日本不能尽快解决骚动，他们将不排除采取干涉的措施。\n面对如此严峻的局面，日本政府是否能够挽回颓势，恢复秩序，还是一个未知数。"
  AOR_news.46.a:0"他们推翻政府就因为一些米？"

  AOR_news.47.t:0"[Get_title_news_header]                      日本米骚乱平息[Get_title_news_pic]"
  AOR_news.47.d:0"在世界大战末期，日本的经济以及税收长期围绕战争服务，国家财政入不敷出，因此只得采取更为紧急也是更为愚蠢的措施：提高税收并主动提高粮食价格，而这导致了席卷全日本的罢工以及农民抗议，这场运动被日本民众称为“米骚乱”。\n\n随着日本政府的几轮换届，以床次竹二郎为首的新内阁控制了日本政局。世界大战结束后，经过床次竹二郎与其他部门的协商合作，日本政府已于最近彻底压制住了“米骚乱”增长的势头，并逐步实现粮食市场的稳定以及降低税收。\n\n不过“米骚乱”给日本带来的影响还远远没有结束，经过了全国数以万计的罢工后，日本的民用工业仍然处于崩溃的边缘，而日本长期落后的农业，也使得后骚乱时期的粮食供应环节十分的不稳定。床次竹二郎于近日发表声明，他宣称日本将会在本届内阁的带领下，重新走出战争和骚乱的阴影，回到新世纪初的日本繁荣时期。对于他的表态，大多日本国民表示充满希望。"
  AOR_news.47.a:0"最大的幸运，就是没有共匪作乱罢了"

  AOR_news.48.t:0"[Get_title_news_header]             法国在青岛问题上支持中国[Get_title_news_pic]"
  AOR_news.48.d:0"在三廿运动引发的重庆血案及抗英义勇军事件后，国际局势再度紧张。法国近日宣布支持中国声张正义，并公开支持将青岛权益归还中国，这一表态引发广泛关注。法国外长表示，中国的主权诉求应得到尊重，青岛问题应通过和平方式解决。\n\n与此同时，英国和日本在国际联盟提出一项争议性提案，建议将胶州湾地区设为“自由市”，由国际联盟监督管理，以确保各国利益平衡。这一提议遭到中国代表强烈反对，称其侵犯中国主权，并呼吁国际社会尊重中国的领土完整。\n\n分析人士指出，法国的支持可能进一步激化英日与中法之间的矛盾，而胶州自由市计划或将加剧国际联盟内部的分歧。随着青岛问题成为国际焦点，中国的主权诉求与列强的利益博弈正进入新一轮角力。"
  AOR_news.48.a:0"世界正在愈发分裂"
  
  AOR_news.49.t:0"[Get_title_news_header]                     中国爆发大规模抗议！ [Get_title_news_pic]"
  AOR_news.49.d:0"自1920年2月初，在协约国首次召开的国际联盟会议上，除了中法等少数国家否决或没有签字以外，大多联盟成员已经表决赞成，将德国战前拥有之中国山东胶州湾租界，以及其在中国山东省的种种特权，转让给日本。此为国际联盟第E-A-1号决议草案。\n\n中国代表对此提出了强烈抗议，并在国际联盟临时会场-即法国凡尔赛宫发表了长篇演讲，重申协约国应该维护中国在《凡尔赛条约》的体系下所有应受保护的合法权利。国际联盟针对此事件开启新一轮谈判，英法等国提出了由国际联盟协调，在原先德国胶州湾租界成立“国际联盟胶州湾托管领”的提案。但中方以及日方都否决了该项提案。\n\n该消息传回中国国内后，引发了中国政界商界的极大震动。早在3月20日前，中国各地各界发表的抗议声明就层出不穷。但直到3月20日这一天，北京以及上海多地的大学生、高级小学生以及之前参加过大战的退伍军人组织开始上街游行示威，要求中国政府拒绝通过国际联盟E-A-1决议草案。\n\n新任总统黎元洪在并没有做出明确表态，但北京的宪兵以及警察已经逮捕了大量学生以及退伍军人，而政府的暴力行为引发了更大规模的抗议，抗议的风潮从北京第二次向全国蔓延。中国的十几个城市已经出现了工商界，甚至包括一小部分地方政府组织的联合抗议。一部分山东的中国抗议群体冲进了胶州湾，与实际占领胶州湾的日本军队发生了些许冲突。"
  AOR_news.49.a:0"几个蠢才点燃了中国的火药桶"

  AOR_news.50.t:0"[Get_title_news_header]                 三廿运动取得成效[Get_title_news_pic]"
  AOR_news.50.d:0"经过激烈的国际谈判，胶州湾问题最终达成妥协方案。在国际联盟的压力下，英日两国选择退让，同意胶州湾成立自由市，但中国政府在行政监督权上取得重要胜利。根据协议，胶州湾自由市的管理委员会成员需由中国政府认可方可任职，其日常行政运作将受到中国政府的直接监督。\n\n尽管胶州湾在决定其命运的重大问题上仍受国际联盟制约，但各国不得在自由市内驻军，这一条款被视为对中国主权的尊重。中国代表在国际联盟会议上表示，这一方案虽未完全满足中方诉求，但标志着中国在国际事务中的地位提升。\n\n东亚胶州湾事件的结局反映了列强在华利益的重新平衡，同时也凸显了国际社会对中国主权诉求的逐步认可。胶州湾自由市的未来将如何发展，仍取决于中国与国际联盟的进一步协作与博弈。"
  AOR_news.50.a:0"中法似乎并未胜利，但英日跌的惨败"

  AOR_news.52.t:0"[Get_title_news_header]                 中国出现抗英义勇军[Get_title_news_pic]"
  AOR_news.52.d:0"英国军队对重庆进行野蛮轰炸，造成大量平民伤亡，其暴行震惊了中国以及全球。\n\n作为报复，一支由心怀不满的军阀部队和当地平民组成的联盟，自称“抗英义勇军”，对英国和日本的居民区以及外资工厂和企业发动了大胆的袭击。这些袭击事件让国际社会感到震惊，许多人谴责暴力事件，而另一些人则对中国抵抗外国剥削表示同情。\n\n这一事件的发生突显了中国日益加深的反帝情绪。在全世界的注视下，重庆的局势清楚地提醒人们，在这个动荡的时代，中国与外国势力之间的紧张局势有可能会改变东亚的格局。"
  AOR_news.52.a:0"如同义和团一般，证明中国尚未衰落"

  AOR_news.53.t:0"[Get_title_news_header]                 京汉铁路工人大罢工被镇压[Get_title_news_pic]"
  AOR_news.53.d:0"就在前段时间，中国京汉铁路工人发起大规模罢工，要求改善工资待遇和工作条件，但最终遭到当局武力镇压，目前已造成50多人死亡 ，数百人受伤。\n\n罢工的导火索是工人长期以来的不满情绪。京汉铁路作为中国重要的交通动脉，工人却面临低薪、超时劳动和恶劣环境。在多次和平请愿无果后，工人们决定以罢工形式表达诉求。然而，当局以维护社会秩序为由，迅速出动军警镇压，导致多名工人伤亡，罢工以失败告终。但众多铁路工人的逃难，也使得中国京汉铁路直到如今仍然没有恢复正常运营。\n\n这一事件反映了劳工权益与政府维稳之间的冲突。当今的中国社会局势逐渐走向混乱，中国政府的神经也愈发敏感，而这次大罢工无疑对于中国政府来说是引爆国内矛盾的导火索。北京方面宣称罢工队伍先挑起了冲突，并且其幕后黑手为中国的红色极端势力；北京方面宣布，将会在今后的一段时间全面查封国内的极端组织，以确保国内的和平与稳定。"
  AOR_news.53.a:0"这种落后的国家也有共产党？"

  AOR_news.54.t:"[Get_title_news_header]                 德意志联合共产党成立[Get_title_news_pic]"
  AOR_news.54.d:"经过德意志苏维埃的多次商讨，斯巴达克斯同盟对外公开宣布：他们将要吸纳原先因为各种原因分离或离开革命中心的独立社民党左翼成员，并成立一个新的政党——德意志联合共产党。这是目前。德意志苏维埃结束内战后的的第一个重大政治活动。\n\n外界推测，这将是未来社会主义德国唯一的执政党，亦或是最大执政党。目前，德国各地的左翼组织已经广泛响应德意志苏维埃的号召，开始大量涌入柏林。"
  AOR_news.54.a:0"魂魄打断枷锁，躯体从此复原。"
  
  AOR_news.55.t:"[Get_title_news_header]                    来自德意志的简讯[Get_title_news_pic]"
  AOR_news.55.d:"经过德意志苏维埃的多次商讨，德意志联合共产党对外公开宣布：如今领导苏维埃政府的联合共产党将会是未来德国社会主义联邦的唯一一个执政党，而其他的社会主义政党可以以和平的形式保留下来，前提是不得破坏政府工作以及革命活动。\n\n德国苏维埃政府的这项声明符合了外界的普遍预测——实行社会主义联邦制的苏维埃在马克思主义的框架下本就是一种冒险的行为，更不用说搞多党制。其中社会民主党著名激进派李卜克内西反对这项意见，这次党派政治制度的最终决定，很大概率与他有关。"
  AOR_news.55.a:0"这也不挺好的吗？"
  
  AOR_news.56.t:"[Get_title_news_header]                    来自德意志的简讯[Get_title_news_pic]"
  AOR_news.56.d:"经过德意志苏维埃的多次商讨，德意志联合共产党对外公开宣布：如今领导苏维埃政府的联合共产党将会成为未来新德国政府的第一个执政党，而其余的社会主义党派可以参与到社会主义联邦的运作中来，并进行选举活动。前提是不得破坏社会主义联邦制，并遵循科学的马克思主义理论指导。\n\n德国苏维埃政府的这项声明有些出乎外界媒体的预料——外界媒体普遍认为，由于卢森堡过于激进的政策，社会主义多党制的政策制定本不应该由她来主导，或许是她在党内已经战胜了另外一位著名的激进派领袖李卜克内西，并取得了政策方向的话语权。"
  AOR_news.56.a:0"巾帼不让须眉"
  
  AOR_news.57.t:"[Get_title_news_header]                  德意志社会主义联邦成立[Get_title_news_pic]"
  AOR_news.57.d:"德意志内战，这场为重新主宰饱受分裂之苦的德意志诸邦而爆发的全面内战已落下帷幕，出乎所有人预料的是，摘得冠军桂冕的并非民主主义者或专制拥护者，而是主要由原巴伐利亚斯巴达克同盟组成的共产主义联盟。在扫平了一切角逐者后，革命派如今正大踏步的行进在德意志的土地，为筹建由无产阶级组成的新政府做好准备。\n\n新组建的德意志联合共产党主席团在历经战火的勃兰登堡门下宣告了新政权的成立。据称，新政府将是一个由数个德意志地区左翼政党组成的社会主义联邦制国家。主席团承诺：“新政权将是真正代表最广大人民利益的政府，并将为解放全世界的工人做不懈努力。”英法尚未对此番宣言发表评论，而苏俄等社会主义国家均派出使节出席了庆祝活动并正式承认新政权合法性。莱茵兰，梅克伦堡，东普鲁士等不在现德国政府控制下的地区爆发了大规模示威游行。全世界的共产主义者都为又一个革命政权的建立而欢欣雀跃。"
  AOR_news.57.a:0"此乃德意志之春晓!"
  AOR_news.57.b:0"这是世界革命的前兆吗？"

  AOR_news.58.t:"[Get_title_news_header]                    什么？一只老鼠？[Get_title_news_pic]"
  AOR_news.58.d:"在这个战火纷飞，世界动荡不安的年代，一部名为《蒸汽船维利》的动画短片在纽约的柯隆剧院首映，给予了美国观众们些许的慰藉。这部动画片的主角是一只名叫米老鼠的黑白老鼠，它在一艘蒸汽船上与船长和其他动物发生了一系列的冒险和笑话。据悉，此部动画片的创作者是华特·迪士尼，一个来自密苏里州的年轻动画师，他在好莱坞创立了自己的工作室，专注于制作有声动画片。\n\n《蒸汽船维利》是迪士尼工作室的第一部有声动画片，也是第一部使用同步声音的动画片。这意味着观众不仅可以看到米老鼠的形象，还可以听到它的声音和音乐。这是一项革命性的创新，让动画片更加生动和有趣。据了解，迪士尼本人使用了一种高亢而可爱的声调亲自为米老鼠来配音，其目的是让米老鼠的性格更加鲜明和亲切。\n\n在柯隆剧院的首映中，观众对《蒸汽船维利》的反应非常热烈，他们为米老鼠的每一个动作和台词欢呼和鼓掌，甚至有人要求重播这部传奇的动画片。《蒸汽船维利》的成功让迪士尼和米老鼠一夜成名，有人预言这甚至会开启一个崭新的动画时代…… "
  AOR_news.58.a:0"“玛丽!你确定这篇报道不会侵权吗？”"

  AOR_news.349.t:"[Get_title_news_header]                     希腊赢得巴尔干战争[Get_title_news_pic]"
  AOR_news.349.d:"希腊胜利：从1821年以来，希腊人就一直信着认定他们是那远古的罗马帝国的直接继承人，而如今，他们的梦想似乎已经近在眼前。\n\n近日希腊与奥斯曼的几场战斗中，希腊军队以压倒性的优势击溃了奥斯曼残余的前线部队，并成功占领了安卡拉以及安塔利亚等奥斯曼的重要地区；而奥斯曼的前线总司令凯末尔则下落不明，奥斯曼的行政机构也不知迁往何地。而安卡拉会战则被希腊媒体称为“最后的战斗”，希腊国内举国欢腾于战争的胜利。希腊首相维尼泽洛斯的下一步行动被外界猜测为摆脱英法所谓的控制，成立一个真正的大希腊甚至光复罗马帝国，而这将会严重危害英法在东地中海的权益。"
  AOR_news.349.a:0"圣罗曼努斯门终于重现于人们的眼前"

  AOR_news.350.t:"[Get_title_news_header]                     土耳其赢得巴尔干战争[Get_title_news_pic]"
  AOR_news.350.d:"奥斯曼的战犯恩维尔曾经说过：突厥民族不会灭亡，而如今他的话反而成为了现实。\n\n面对希腊强大的攻势，原本被国际普遍认为将会面临灭国之灾的奥斯曼却以力挽狂澜之势在小亚西亚地区与希腊军队展开了多轮会战，在奥斯曼前线总指挥凯末尔的带领下，奥斯曼军队成功击溃了希腊军队的多轮进攻，甚至将战线反推回了博斯普鲁斯海峡一带-而滞留在东爱琴海地区的希腊军队则被迫搜罗大量船只驾驶逃离。\n\n我们可以说这是一场在世界大战后的军事奇迹，奥斯曼的军事领袖凯末尔带领着土耳其人，走向了无数失败后的最伟大胜利，而如今未来的希土关系将会如何，土耳其将会做出何种新的反攻态势，我们仍未知晓。"
  AOR_news.350.a:0"伊兹密尔群山上，鲜花多灿烂……"

  AOR_news.351.t:"[Get_title_news_header]                     希腊赢得巴尔干战争[Get_title_news_pic]"
  AOR_news.351.d:"那遥远的东方童话，终究抵不过现实世界的火炮，将土耳其人们的白日梦彻彻底底的在安卡拉击碎。\n\n螳臂挡车，自不量力。奥斯曼的突然进攻令世界各国感到极为惊奇，而希腊则毫不畏惧这个已经近乎残废的东方国家。在成功进行了抵挡后，希腊将20多万军队通通派往了小亚细亚半岛，并在多个地点与奥斯曼军队展开决战。纵使传奇降临凯末尔的指挥能力再高，缺少弹药补给与纪律性和人员的奥斯曼军队最终还是败下阵来，任由希腊人占领安卡拉与安塔利亚。\n\n目前，奥斯曼的行政机关以及凯末尔本人都下落不明，而由于前线战事仍然激烈，我们暂时无法获取太多的信息，但有一点我们可以知道的是-奥斯曼帝国最后一次翻盘的机会，已经在这一次的战争中彻底覆灭了。"
  AOR_news.351.a:0"突厥勇士的悲歌"

  AOR_news.352.t:"[Get_title_news_header]                     土耳其赢得巴尔干战争[Get_title_news_pic]"
  AOR_news.352.d:"在国际评论家的嘲笑声中，在爱琴海上的炮火之间，无数的奥斯曼军队，将象征着国家的新月旗插在收复失土当中的山脉之上。正如那句歌词所说：“敌人如风一般逃窜”。\n\n土耳其人的胜利则更让人感到不可思议。一个已经残废的国家带着一群七零八散的军队，居然依靠不知名的力量打败了20多万人的希腊军队，打破了希腊人的罗马梦；并一路自安卡拉反推至士麦那。这一项项近乎于奇迹的成就都离不开奥斯曼的前线总司令-穆斯塔法.凯末尔的指挥，这位在土耳其人口中“达达尼尔海峡的救星”的传奇将领又一次带领奥斯曼军队击溃了眼前的强敌，而如今奥斯曼将会如何对待风卷残云后的希腊，如何发起新一轮的攻势，甚至重返欧洲大陆，我们仍未知晓。"
  AOR_news.352.a:0"突厥武士，精神尚存，土耳其人，永远不亡！"

  AOR_news.353.t:"[Get_title_news_header]                     一座新的法老陵墓被发现[Get_title_news_pic]"
  AOR_news.353.d:"1922年11月4日，英国考古学家兼埃及史学家霍华德卡特在埃及帝王谷发现了一座先前从未发现过的入口，他拥有保存完好的12阶阶梯，以及外门上的来自3000年前的封印，这象征着这是一座先前从未被发现并探索过的法老陵墓。\n伴随着为期22天的发掘，霍华德卡特与他的团队已经抵达法老陵墓的内门，据霍华德卡特所言，他们已经在法老陵墓的内门发现了象征有图坦卡蒙的皇宫封印，因此，这座陵墓这极有可能是图坦卡蒙的陵墓。\n目前，霍华德卡特与他的团队仍在发掘这座陵墓，他们正在尝试打开被封闭的门道入口，同时，埃及学学者们正在尝试翻译刻在墓旁的铭文，而这场活动的支持者乔治·卡尔纳冯勋爵正在考虑是否追加考古资金。\n同时，对这座陵墓是否继续发掘出现了怀疑的声音，一些担忧的民众认为，刻在墓旁的铭文是对入侵者的警告，倘若继续发掘，霍华德与他的团队将遭受到所谓“法老的诅咒”，对此，霍华德表示“诅咒”为无稽之谈。他认为如果有任何人会被诅咒，那应该是他。"
  AOR_news.353.a:0"这将会是考古史上的一个奇迹"
  AOR_news.354.t:"[Get_title_news_header]                     图坦卡蒙的奇迹[Get_title_news_pic]"
  AOR_news.354.d:"再度历经为期152天的发掘，在全世界的期待中，霍华德卡特与他的团队已经成功开启了被封存的墓道入口，他们已成功进入图坦卡蒙陵墓的内部。\n据报道，卡特与他的团队在梦中首度发现图坦卡蒙王石棺和埋葬的墓穴及陪葬的人偶，这4个房间中有超过5000件以上的豪华奢侈品。\n在图坦卡蒙陵墓被开启后，霍华德卡特再度花了2个月的时间发现了墓室，他在那儿发现一具重约134.3公斤黄金和白金打造的棺木，且找到戴著黄金面具的图坦卡蒙王木乃伊。据悉，图坦卡蒙的木乃伊由三个人形棺与三个外廓层层保护，每一个的大小恰好卡进另一个，手工技艺相当精细。最内一层的人形棺由22K金打造，重110.9公斤。\n同时，由埃及学学家联合翻译的墓室旁的铭文已被证实是对入侵者的诅咒，这使得一些民众变得愈发担忧。\n根据霍华德卡特的表示，他正准备把图坦卡蒙墓中发掘出来的这些稀世珍宝运往英国，同时，英国方面也对此有所准备，但此等行为深深刺痛了埃及，埃及华夫托党人对此事件进行了猛烈攻击，从而引起卡特在埃及的发掘几度中断，英国与埃及的关系再度步入紧张时期。"
  AOR_news.354.a:0"过去的奇迹，现实的悲剧"
  AOR_news.354.b:0"装货上船，我要在大英博物馆里见到这个奇迹!"

