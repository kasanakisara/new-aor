  AOR_news.154.t:0"[Get_title_news_header]                     广州政府消灭四川红军[Get_title_news_pic]"
  AOR_news.154.d:0"广州政府消灭四川红军"
  AOR_news.154.a:0"广州政府消灭四川红军"

  AOR_news.155.t:0"[Get_title_news_header]                     陈宦总督统一四川[Get_title_news_pic]"
  AOR_news.155.d:0"中国四川地区的战争终于落下帷幕，不出所料，掌控着强大的军事力量以及核心地区的陈宦总督，得了这次斗争的胜利，并将自己的总督府再次迁回阔别9年的成都，而曾经在四川地区叱咤风云的将军们，要么流亡，要么俘虏，要么在陈将军的枪炮下灰飞烟灭。\n\n由于中华大地已经四分五裂，陈将军为了保证四川能够在这乱世之中取得长久的和平，便在统一四川后不久宣布成立“川康执政府”，而陈将军自认执政。他宣称，四川将会进入长期的和平发展阶段，而他将会进行一系列改革，使四川重新焕发天府之国的生机。\n\n不过，仍然有一部分残余的军队，在四川的山水之间与陈将军对抗-比如神秘的四川工农军。而陈宦也宣称，他和他的军队将会不留余力的“清剿匪逆”，为四川争取良好的治安环境。"
  AOR_news.155.a:0"换人又换种，换汤不换药的结局"

  AOR_news.156.t:0"[Get_title_news_header]                     巴西总统死亡[Get_title_news_pic]"
  AOR_news.156.d:0"重大消息，巴西总统-埃尔梅斯·罗德里格斯·达·丰塞卡已于前日下午发现在里约热内卢的总统府中身亡，目前死亡原因尚未知晓。但是有关当局隐瞒了这件急迫事件，直到总统府中的管理人员向外国媒体转达了这一消息。\n\n巴西政府已经在今日凌晨宣布进入国家紧急状态，同时由原政府的内阁成员组成国家临时行政委员会，暂行总统职能。\n\n如今巴西各大城市的骚乱不断，罗德里格斯的死或许将会对巴西政局挥出一记重拳。而许多人期盼的是，巴西是否能够实现民主联邦国家的梦想-而更多人担忧的是，这将成为引爆巴西内战的导火索……"
  AOR_news.156.a:0"不需要为独裁国家祈祷"

  AOR_news.157.t:0"[Get_title_news_header]                     美国内战白热化[Get_title_news_pic]"
  AOR_news.157.d:0"美利坚合众国两年的战争仍然牵动着世界的目光。自世界大战以后最恐怖的文明战争已经造成了无数死伤。\n\n但如今的南方再也无法创造他们祖辈在1863年的奇迹了。联邦军队已攻克攻陷了亚特兰大、新奥尔良等多座南方主要城市。联邦军队完成了当年格兰特与舍曼的遗愿-用强有力的战斗将南方分成两大部分，并最终以包围态势进行全面进攻。\n\n而在外界的评价中，而今的南方军队仍有一线反击之力，南方仍然掌控着德克萨斯州以及东南部的各州县。今天，南方叛军政权总统加纳公开宣称南方军队将会重新发起新一轮的大规模反攻，但具体何时并无说明。"
  AOR_news.157.a:0"战争持续不了多久"

  AOR_news.158.t:0"[Get_title_news_header]                     美国内战白热化[Get_title_news_pic]"
  AOR_news.158.d:0"美利坚合众国近一年的战争仍然牵动着世界的目光。自世界大战以后最恐怖的科技文明战争已经造成了无数死伤。\n\n尽管北方在人口以及资源上都占有得天独厚的优势，但北方军队的战斗力以及北方将领的指挥能力，似乎都令我们大跌眼镜。在持续的作战中，南方军队已占领了北方的匹兹堡、克利夫兰以及纽约等大都市，整体将美国北方分成了两大块。这是连李将军时期都未曾达到的巨大军事成就。但南方军队依然没有放松-北方仍然掌控着大量的人口以及五大湖地区的工业中心，北方联邦的总统并未对北方军队的失利举行过任何公开演讲，外界猜测这是为了避免当年林肯总统的覆辙。"
  AOR_news.158.a:0"当年如何打败，今日更加以迎头痛击"

  AOR_news.159.t:0"[Get_title_news_header]                     阿拉伯王国解体！[Get_title_news_pic]"
  AOR_news.159.d:0"仅维持了一年的阿拉伯王国临时政府，在这几周的沙漠动荡中分崩离析。\n\n在世界大战中，英国政府通过与各路势力的协商，成功组建了阿拉伯王国，并建立了一套由各个酋长国代表组成的议会机构。阿拉伯王国主体之一，内志酋长国的统治家族沙特家族，素来与拉希德家族以及圣裔哈希姆家族敌对。由于沙特家族与其他两大家族始终无法弥合宗教上以及统治权上的矛盾，沙特家族已于前段时间退出阿拉伯王国。\n\n随着沙特家族退出阿拉伯王国，阿拉伯的圣裔少了沙特家族这个最大的障碍，于是哈希姆家族在议会中处处打压拉希德家族。拉希德家族在发现圣裔的阴谋后，也选择退出阿拉伯王国。哈希姆家族则恼羞成怒，而正在哈希姆家族准备向北部沙漠调兵遣将的时候，沙特却抢先一步进攻拉希德，拉开了沙漠大战的帷幕。而还有一个局外者-也门的米海亚王国通过处理也门伊德里斯内乱，占领了阿拉伯南部的一部分地区。\n\n英国以及协约国各代表对阿拉伯王国的解体表示十分遗憾和担忧，外界猜测，英国将会通过英国殖民政府的阿拉伯领地以及埃及，重新对阿拉伯展开干预。"
  AOR_news.159.a:0"一群骑骆驼的沙漠乡巴佬，管他们干什么"

  AOR_news.160.t:0"[Get_title_news_header]                     中国四川政府宣布南下[Get_title_news_pic]"
  AOR_news.160.d:0"中国东部地区的战况愈演愈烈，而蛰伏些许时间的中国西部，也开始进入了这场生死斗争中。\n\n就在前些时间，中国川康总督，结束了四川内乱的陈宦，宣布支持冯国璋的中华民国临时政府，并派遣军队南下进攻来自中国南部的北伐军。目前，北伐军与四川军队在云贵边界展开了激烈的交火，而原先支持北伐军的西安冯玉祥政权也调兵南下，在秦岭一带与四川军队爆发战争。\n\n尽管四川对北伐军的进攻没有任何预兆，但北伐军似乎早已做好准备，从容的应对四川军队的进攻；但四川事变将北伐的战线大大拉长，对于北伐军来说，或许不是一件好事。"
  AOR_news.160.a:0"全乱套了"

  AOR_news.161.t:0"[Get_title_news_header]                   朝鲜关东军暴乱平息[Get_title_news_pic]"
  AOR_news.161.d:0"经过几个月的动乱后，在烟火中的朝鲜半岛终于迎来了自己的喘息时机。叛乱的关东军大多已经被日朝联军剿灭，而几个叛乱的头目则押送返回东京受审-迎接他们的不出意外就是死刑。\n\n根据《日韩亲善条约》的规定，日本有权力在朝鲜的任何一个地方驻扎军队。不过，在之前的镇压过程中，日本以“方便镇压叛乱和调集军队物资”的名义，实质上控制了朝鲜南部的三个省份。据说，朝鲜皇帝与日本方面已经举行秘密会谈，商讨请求关东军解除控制这三个省份的事宜。\n\n日本在朝鲜南部的占领激起了朝鲜多地民众的反抗浪潮，日本的应对措施也是一如既往-“协助”朝鲜政府对抗议群众镇压。目前在汉城和釜山等地，朝鲜民众与日本军队的冲突已经造成了大规模伤亡，并且冲突还有继续扩大的迹象。"
  AOR_news.161.a:0"出了力总要填饱肚子不是，啊哈？"

  AOR_news.162.t:0"[Get_title_news_header]                     朝鲜爆发大规模暴乱！[Get_title_news_pic]"
  AOR_news.162.d:0"日朝关于关东军对朝鲜南部解除控制的谈判，仍艰难在进行中，而朝鲜民众早就等不下去了。随着朝鲜各地的反日活动愈演愈烈，日本在朝鲜各地驻扎的关东军都遭到了朝鲜民众的抵制甚至围攻，不断扩大的冲突使得朝鲜社会更加动荡；日本方面也发表声明，要求驻扎在朝鲜各地的关东军保持克制，切勿因躁动扩大流血冲突。\n\n在最近一段时间，朝鲜北部高原以及中部山区出现了许多携带着武器，高举“大韩独立”旗帜的朝鲜游击队；据外界猜测，他们大概率并非来自朝鲜北部的朝鲜义军，而是已经变为武装反抗日本统治的朝鲜普通民众。关东军对他们并不手软。目前，关东军已经调出了一支数量相当的人马，前往朝鲜中部围剿这些游击队。"
  AOR_news.162.a:0"几个虾兵蟹将也敢在中心开花？"

  AOR_news.163.t:0"[Get_title_news_header]                     日本接管汉城[Get_title_news_pic]"
  AOR_news.163.d:0"日朝军队的镇压并未压制怒火。各种主张的朝鲜游击队在朝鲜大地上如野花一般迅速滋长；在朝鲜的山区、平原甚至中心城市中，武装叛乱分子随处可见，他们采用袭扰战打击日本与朝鲜政府的军队，使日朝军队疲于应对。\n\n耐心终究是有限的，就在前几天，朝鲜南部的关东军以及在仁川登陆而来日本本土军队，组成了一支规模庞大的队伍，在极短时间内迅速接管了汉城-而在之前，朝鲜皇帝及其文武百官早早已逃往平壤避难，现在的汉城迎来了一位凶残的主人：日本皇军。\n\n不出所料，自日本军队控制汉城后，在短短的一天之内就发生了多起流血事故，甚至传出大量无辜平民被当作游击队而就地处决的事件；而诸多国际报社的记者被日本军队以“妥善安置”为名软禁在了汉城城郊的酒店，如今的汉城是什么样的情景，我们都不得而知。\n\n今日，汉城地区竟五月飞雪。"
  AOR_news.163.a:0"樱花用血染红汉江"

  AOR_news.164.t:0"[Get_title_news_header]                日本占领青岛，并在南满与中国发生冲突[Get_title_news_pic]"
  AOR_news.164.d:0"近日，远东局势风云变幻，中国北伐军在对北方军阀的征战中取得了显著胜利，成功将势力扩展至满洲三省。然而，正值此际，日本帝国突然采取军事行动，占领了中国主权下的青岛自由市及南满洲铁路沿线地区，此举无疑在国际社会中引起了广泛关注与深切忧虑。\n\n青岛，作为中国的重要港口城市，其地位之重要不言而喻。南满洲铁路则是连接满洲地区的交通大动脉，其沿线拥有满洲的众多矿产以及工业设施，对于区域经济与战略布局具有不可估量的影响。日本的军事介入，不仅挑战了中国的主权完整，也对东亚乃至世界的和平稳定构成了威胁。\n\n国际社会对此事件的反应各异，有的国家呼吁克制，并谴责日本侵犯中国主权的行为，有的则表现出对日本行动的理解，因为日本在中国满洲地区布下了大量的投资。\n\n当前，中日双方的紧张关系尚未升级为全面冲突，但局势的脆弱性不容忽视。国际观察家们正密切关注着这一地区的动态，担忧若处理不当，可能会引发更广泛的地缘政治危机。"
  AOR_news.164.a:0"蠢蠢欲动的旭日武士"

  AOR_news.165.t:0"[Get_title_news_header]                     日本坂本龙马去世[Get_title_news_pic]"
  AOR_news.165.d:0"一则噩耗从日本中部传来：日本的传奇人物，日本现代海军的缔造者之一，日本两朝国策的规划家，伟大的诗人和文学家坂本龙马，于昨日下午在日本京都的私人住宅内去世，享年84岁。\n\n坂本龙马去世，日本帝国举国哀痛，目前日本政府以天皇的名义向全国、驻朝日军、关东军以及日本远东前线发布公告，宣布将会为坂本龙马举行盛大的国葬。坂本龙马去世的消息自日本传遍全球，世界多国领导人向日本政府发来慰问电，表示对这样一位杰出的日本精英的去世而十分惋惜。\n\n坂本龙马的传奇一生早已在世界各地传扬开来。在其去世之前，他便起着维系军政内部派系平衡的作用，并作为日本政府的“终身顾问”为日本的国策建言献策。外人猜测，坂本作为一位深受民众爱戴的政治家，他的离世将打破保守派与自由派之间的力量平衡，未来日本政坛或将进入一段动荡期，各方势力将围绕阪本龙马留下的政治遗产展开激烈争夺，日本的政界、军界以至于社会各界都会产生不可想象的变化；也有人认为，坂本的死，为日本推动民主化进程搬倒了最后一堵墙，日本政界将会迅速地向着维护新宪法的方向发展。"
  AOR_news.165.a:0"再见了，日本最后的豪杰"

  AOR_news.166.t:0"[Get_title_news_header]                中俄签订边境备忘录协定[Get_title_news_pic]"
  AOR_news.166.d:0"在遥远的土耳其斯坦传来了一条消息，中国军方与俄国方面在新疆的阿勒泰共同签订了一份边境备忘录协定。而画押签字的所谓俄国代表，是来自布尔什维克控制的中亚地区的不知名人物。\n\n备忘录的内容声明，中国军队将会于1921年之前全面撤出南贝加尔地区；而中国在1920年前攻占的中亚地区，则需要经过两国进一步的谈判来解决，并不在此次备忘录的讨论范围内，同时，双方约定，暂时不会在本备忘录协定规定以外的任何情况下，签订新的中俄边境条约。不过备忘录中有一条传出的消息令人瞩目-“俄国将会废除与中国的一切有损于中俄两国发展关系的条约”，外界认为，这条信息基本笃定了代表来自俄国布尔什维克方面的事实。\n\n在北京的中国政府方面嘉奖了中国军方对中俄边界的妥善处理，而英法和俄罗斯临时政府等，则强烈抗议中国与俄国布尔什维克的单方面签约行为，认为这将会对协约国在亚洲的行动造成无法挽回的损失。"
  AOR_news.166.a:0"我去，咋和共党走在一起了？"

  AOR_news.167.t:0"[Get_title_news_header]                     朝鲜义军动乱加剧！[Get_title_news_pic]"
  AOR_news.167.d:0"日本军队在朝鲜镇压的残暴行径引发了世界舆论的谴责，而镇压活动的进行却使得朝鲜反抗的火焰愈高愈烈，长期在北部蛰伏的朝鲜义军部队一步步发起更大规模的进攻，而属于朝鲜的平壤将军府军队则无力抵抗日益强大的游击队，平壤将军等人已经从咸镜道逃回了平壤，而整个咸镜道似乎都被游击队所控制。\n\n义军顺着咸镜道的沿海平原南下，犹如无人之境-这些地区都因为动乱陷入了无政府状态，而当日本军队反应过来时，朝鲜义军的先遣队离汉城不过100公里。目前，在朝鲜驻扎的日本军队，将镇压的主要目标放在了对抗朝鲜义军而非地方民众上，大量的军火物资源源不断地从日本本土运往朝鲜，日本关东军和朝鲜政府军队，似乎已经做好了和义军决一死战的准备。"
  AOR_news.167.a:0"三十年河东，三十年河西，如今卷土重来"

  AOR_news.168.t:0"[Get_title_news_header]                     中国西藏发生动乱[Get_title_news_pic]"
  AOR_news.168.d:0"今日凌晨，中国西藏地区的达赖喇嘛的支持者，向现任西藏最高统治者-汉人将军尹昌衡发发动政变。政变方迅速占领包括扎什伦布寺在内的西藏多个重要据点，并宣布要求尹昌衡交出最高统治权。\n\n目前，尹昌衡方面尚未作出明确回应，但其军队已开始集结，局势愈发紧张。西藏各地民众对突如其来的政治动荡感到不安，国际社会亦密切关注事态发展，英国等国呼吁双方保持克制，并邀请双方于英属印度展开和平谈判。"
  AOR_news.168.a:0"中国中心地区动乱的余波"

  AOR_news.169.t:0"[Get_title_news_header]                     西藏达赖喇嘛·土登嘉措重新上台[Get_title_news_pic]"
  AOR_news.169.d:0"近日，西藏地区十三世达赖喇嘛的支持者，以及原先归属于西藏办事长官的噶厦政府成员，对汉人将军尹昌衡发动了大规模。尽管政变未能成功推翻尹昌衡，但迫于压力，尹昌衡最终同意将地方统治权归还给西藏地区的活佛以及嘎厦政府。此次事件标志着西藏政治格局的重大变动，第十三世达赖喇嘛·土登嘉措已经重新掌权。目前，西藏局势趋于稳定，各方正密切关注后续动态。"
  AOR_news.169.a:0"缺少弹药而作出的妥协而已"

