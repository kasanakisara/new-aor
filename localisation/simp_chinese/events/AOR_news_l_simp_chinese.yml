  AOR_news.39.t:0"[Get_title_news_header]                    君士坦丁堡光复[Get_title_news_pic]"
  AOR_news.39.d:0"在国际联盟的外交争端中，希腊总理埃莱夫塞里奥斯·韦尼泽洛斯成功争取到列强支持，将君士坦丁堡纳入希腊版图。尽管该地区主要居民为土耳其人，但土耳其的反对声音似乎被忽略。希腊军队已于昨日清晨进入君士坦丁堡，土耳其政府宣布不承认此次占领，并开始动员军队以示抗议。\n国际联盟尚未对希腊的行动作出正式回应，但全球目光都聚焦于这一地区，担忧此举可能引发更广泛的冲突。同时，土耳其民众对希腊的占领表示强烈不满，和平抗议活动在君士坦丁堡街头蔓延。\n分析人士指出，尽管希腊和土耳其之间存在紧张关系，但通过外交途径解决争端的可能性仍然存在。国际社会呼吁双方保持克制，避免进一步的军事行动，寻求和平解决争端的途径。"
  AOR_news.39.a:0"君士坦丁堡不会和平太久的"
    
  AOR_news.40.t:0"[Get_title_news_header]                    伊斯坦布尔光复[Get_title_news_pic]"
  AOR_news.40.d:0"在国际联盟托管领的紧张局势下，土耳其政府突然宣布对伊斯坦布尔（君士坦丁堡）实行军事控制。土耳其军队迅速而平静地占领了这座城市，声称是为了保护其居民和国家利益。然而，这一行动立即遭到了希腊的激烈反应，希腊政府强烈谴责土耳其的占领行为，并宣布不承认土耳其对伊斯坦布尔的控制权。\n希腊已经开始在边境地区调动军队，准备采取必要措施以回应土耳其的行动。国际联盟尚未对这一突发事件作出正式回应，但全球的目光都聚焦在这一地区，担心这一行动可能引发更广泛的冲突。\n国际社会普遍呼吁希腊和土耳其保持克制，避免进一步的军事行动，并寻求通过外交途径解决争端。尽管存在通过和平对话解决分歧的希望，但双方的军事姿态增加了冲突升级的风险。目前，伊斯坦布尔的未来走向仍不明朗，国际联盟和国际社会正密切关注着这一事件的进一步发展。"
  AOR_news.40.a:0"西亚病夫雄起了？"

  AOR_news.192.t:0 "[Get_title_news_header]                     瑞典入侵奥兰[Get_title_news_pic]"
  AOR_news.192.d:0 "从斯德哥尔摩瑞典-挪威联合王国外交部新闻发布会得到的消息已经证实，由于芬兰共和国近日严峻的政治形势，为保护奥兰群岛上瑞典裔人民的安全，联邦军队已经开进了奥兰群岛，宣布建立奥兰特别行政区，并解除了当地的非军事化。\n\n芬兰共和国政府对此进行了严厉谴责，指责这公然无视了1809年《哈米纳条约》中关于奥兰割让为芬兰领土的条约，和克里米亚战争中奥兰非军事化的条约。俄罗斯临时政府也谴责联邦政府此举是“对北欧和平的重大侵犯”。苏俄政府、英国政府和法国政府未置评。\n\n联邦政府将此次行动定义为“联邦的一大胜利”，称“摆脱了大北方战争的幽灵，有效保护了当地瑞典裔的生命和财产安全。”哈康七世在公开演讲中赞颂此次行动，斯德哥尔摩多地已经展开了庆祝活动。"
  AOR_news.192.a:0 "旧俄罗斯帝国的碎片正在瓦解"

  AOR_news.193.t:0 "[Get_title_news_header]                     芬兰内战爆发！[Get_title_news_pic]"
  AOR_news.193.d:0 "根据来自赫尔辛基和斯德哥尔摩的最新消息，政治形势紧张的芬兰共和国已经陷入内战。左翼控制了芬兰南部，临时政府被军政府推翻，双方已经开始激烈交火。\n\n据悉，从独立开始，芬兰的经济一直萎靡不振，工人运动和抗议示威层出不穷。尤其是在十月革命，俄国布尔什维克掌权发动内战后，芬兰的工人运动更是愈演愈烈。在这种形势下，左翼和右翼的矛盾越发尖锐，在前日陷入了对峙。而在瑞典-挪威联合王国入侵奥兰后，这种矛盾激化到了极点，双方开始了交火。\n\n国际社会谴责这一行为为对北欧和平的严重不负责任，瑞典-挪威联合王国进入了预备动员状态。不过，苏俄政府称如果有必要，他们将驰援红色芬兰。俄罗斯临时政府也发出了同样的声明，不过是针对白色芬兰的。可以预见的是，芬兰内战将会和俄国内战紧密相连。"
  AOR_news.193.a:0 "布尔什维克的烈火正在蔓延"

  #194和195共用这个title
  AOR_news.194.t:0 "[Get_title_news_header]                     芬兰内战结束！[Get_title_news_pic]"
  #红方胜利
  AOR_news.194.d:0 "根据赫尔辛基和莫斯科的消息，持续了有一段时间的芬兰内战已经落下帷幕。在莫斯科的支持下，红色势力赢得了胜利。\n\n据悉，芬兰左派在得到了红军的支持后一路势如破竹，本来占据上风的政府军落入了下风，被革命军穷追猛打，最后仅剩北方拉皮省仍未沦陷，其他地区都已被革命军所掌控。随着革命军向临时政府发起总攻，芬兰临时政府武力抵抗，但是完全无用，甚至不断出现政府军投诚的现象。随着芬兰革命军冲入拉皮并将红旗插上拉皮市政府中心，芬兰右派的临时政府即宣告瓦解，芬兰左派以及红军获得了最后的胜利。\n\n随着左翼赢得了芬兰内战的胜利，芬兰也被染红，成为了世界上第二个社会主义国家。芬兰的未来，已然是红色的未来。"
  AOR_news.194.a:0 "布尔什维克又攻下一城。"
  #白方胜利
  AOR_news.195.d:0 "根据赫尔辛基和莫斯科的消息，持续了有一段时间的芬兰内战已经落下帷幕。在俄国白军的支持下，白色势力赢得了胜利。\n\n据悉，芬兰左派在得到了红军的支持后一路势如破竹，全线压着军政府打，但随后其他同样仇视左派的国家陆续向政府提供支援，得到了充足且先进的武器，战场形势瞬间逆转。在曼纳海姆元帅的带领下，士兵们集中火力向左派的总部赫尔辛基进攻，经过一场惨烈的拉锯战，政府军终于攻下了赫尔辛基，搞毁了这个左派与红军的总部，随后将革命军的势力范围压缩到芬兰西南角。至此，芬兰军政府的胜利已经是板上钉钉的了，在消灭了芬兰土地上最后一部分革命军后，芬兰内战也终于结束了。\n\n军政府赢得了芬兰内战的胜利，但是他们仍然要面对各地工人阶级层出不穷的抵抗，和东方红色俄罗斯的威胁。芬兰的未来，仍然不明朗。"
  AOR_news.195.a:0 "秩序回归芬兰……但愿吧。"

  AOR_news.196.t:0 "[Get_title_news_header]                 芬兰内战扩大化[Get_title_news_pic]"
  AOR_news.196.d:0 "根据赫尔辛基和莫斯科的消息，持续了有一段时间的芬兰内战规模正在扩大。随着战线压力的增大，芬兰军政府向俄罗斯临时政府发出了结盟邀请，得到了后者的支持。在一份新闻公报中，军政府称：“这是反布尔什维克阵线的一大胜利，是秩序和人民的胜利。”\n\n据悉，芬兰左派一路势如破竹，本来占据上风的政府军落入了下风，被革命军穷追猛打。面对红军如潮水般的压力，军政府果断选择向俄罗斯白卫军求援，并得到了热烈回应。就这样，旧俄罗斯帝国的反布尔什维克势力都集结在了一起，如同一个包围网。\n\n此事激起了赫尔辛基的强烈反应，他们决定加入苏维埃统一阵线，并得到了莫斯科的同意。芬兰内战至此彻底扩大，并和俄国内战交织在一起，构成了一场布尔什维克和反布尔什维克势力对抗的全面战争。"
  AOR_news.196.a:0 "布尔什维克的命运是纠缠在一起的。"
  
  AOR_news.197.t:0 "[Get_title_news_header]             约翰·南斯·加纳发动新闻攻势[Get_title_news_pic]"
  AOR_news.197.d:0 "《迪克西日报》头版头条：北方暴动的真相——自由权利的破产\n\n作者：约翰·南斯·加纳\n\n底特律的火焰照亮了北方“自由权利”的虚伪面具！当杨基党高喊“物质权利至上”时，他们的工人却在街头焚烧工厂，高呼“面包与尊严”。北方的垄断巨头们拥抱锁链束缚了劳动者的双手，却用“自由市场”的谎言麻痹他们的灵魂。\n\n南方的朋友们，看看北方吧！他们的“进步”是用血与火铸就的，他们的“繁荣”是用饥饿与绝望堆砌的。而我们南方，坚守着传统与秩序，守护着每一个公民的尊严与生计。北方暴动不是偶然，而是一个腐朽的帝国必然的崩溃。\n\n让我们团结起来，捍卫南方的荣耀与独立！北方的混乱，让世界看到，真正的自由与秩序，只在美利坚的南方！"
  AOR_news.197.a:0 "我又不是美国人，为什么给我看这个？"

  AOR_news.198.t:0 "[Get_title_news_header]                 西奥多·比尔博发表反美言论[Get_title_news_pic]"
  AOR_news.198.d:0 "昨日，南方议员西奥多·比尔博在密西西比州的一次公开采访中，以犀利的言辞痛斥北方“物质暴政”，引发南方社会强烈共鸣。比尔博直言：“北方用所谓‘自由权利’的谎言掩盖他们的贪婪与压迫。他们的工厂是劳动者的坟墓，他们的繁荣是建立在南方血汗之上的谎言！”\n\n比尔博的言论迅速点燃了南方民众的怒火。在查尔斯顿、亚特兰大等地，数以万计的民众走上街头，高呼“南方独立”和“打倒北方暴政”。南北边境线局势骤然紧张，多地报告小规模冲突，南方民兵与北方联邦军队在边境哨所对峙，但好在没有发生走火事件。\n\n北方政府对此反应强烈，指责比尔博“煽动分裂”，并威胁采取“必要措施”维护联邦统一。然而，南方各州议会已开始讨论“自卫法案”，迪克西党领袖约翰·南斯·加纳公开支持比尔博，称“南方的尊严不容践踏”。\n\n随着南北矛盾进一步激化，北美的上空正笼罩着一片即将形成的风暴-比尔博的怒吼，或许将成为这场风暴的第一声惊雷。"
  AOR_news.198.a:0 "哦，我知道，就是那个想把黑人都杀光的傻子？"

  AOR_news.199.t:0 "[Get_title_news_header]                 美国西部动乱愈演愈烈[Get_title_news_pic]"
  AOR_news.199.d:0 "美国西部陷入全面动荡！众多牛仔武装接连袭击铁路公司与矿业巨头，炸毁联合太平洋铁路干线，占领内华达银矿，西部秩序濒临崩溃。目前，西部各巨头的公司私人军队，雇佣兵以及地方武装民兵，联邦军队等，正全力抵抗着叛乱分子的进攻。\n\n美国西部动乱根源在于东部资本对西部土地的疯狂掠夺与劳工的残酷压榨。牛仔武装的著名领袖领袖“红眼”山姆宣称：“我们不为金钱，只为自由！”与此同时，残余的印第安部落与大量墨西哥偷渡者加入反抗，边境冲突频发。\n\n联邦政府紧急调派西部特遣军与国民警卫队镇压，但收效甚微。西部动乱正成为美国最血腥的疮疤，资本帝国的黄昏或许已悄然降临。"
  AOR_news.199.a:0 "都已经乱了多少年了"

  AOR_news.200.t:0 "[Get_title_news_header]          美国西部信息连接疑似被人为切断[Get_title_news_pic]"
  AOR_news.200.d:0 "正值美国西部重新陷入动乱，而西部通讯的中断更是为这场危机再加了一把火。\n\n就在最近一段时间，无论使用何种依靠电力输送的通讯设备-电报，电话乃至无线电，都无法与西部各地区取得信息沟通，仿佛西部的各种通讯站在一夜之间被抹除殆尽。不过根据西部铁路的活动状况以及侦查飞机带回来的消息显示，西部地区的通讯设施并未遭受巨大的打击。我们至今都不知为什么西部的通讯会突然中断，或许在背后隐藏着我们意想不到的秘密和阴谋。"
  AOR_news.200.a:0 "美国总是有这种意想不到的事发生"

  AOR_news.201.t:0 "[Get_title_news_header]                 老洛克菲勒会见美国总统[Get_title_news_pic]"
  AOR_news.201.d:0 "就在近日，美国总统威尔逊会见了美国的商业第一巨头-全球首富约翰·洛克菲勒。此次会面在洛克菲勒的私人庄园内举行，具体的会谈内容尚不为世人得知；不过，美国以及国际媒体猜测，会谈的内容可能包括关于寻求政府的优惠政策，推动政府外交政策的改变以及改善洛克菲勒财团与美国政府的关系。\n\n也有小道消息称，洛克菲勒与威尔逊谈论的乃是科技进步的力量，洛克菲勒有可能要亲自主导一次科技变革，以此给世界带来巨变，而在此之前，他将游说总统并试图改变美国政治的现状。的确，洛克菲勒财团控制的众多美国实验室确实拥有许多高科技产品，而处于耄耋之年的老洛克菲勒是否有如此之魄力，我们还要打上一个问号。"
  AOR_news.201.a:0 "侃大山"

  AOR_news.202.t:0 "[Get_title_news_header]                 法国总理在巴拿马会见美国总统[Get_title_news_pic]"
  AOR_news.202.d:0 "今日，美国总统哈定在巴拿马城与法国总理米勒兰举行历史性会晤。双方共同宣布，搁置自南北战争以来法国干涉美国所产生的分歧，并签署了一系列双边贸易与合作协议，旨在加强两国经济联系与合作。此次会晤被视为美法关系的重要转折点，标志着两国关系的全面回暖。\n\n然而，这一举动引发了英国等国的担忧，担心美法合作可能打破现有的国际力量平衡。分析人士指出，此举或将对全球政治经济格局产生深远影响，进一步加剧大国间的竞争与博弈。"
  AOR_news.202.a:0 "不列颠也有恐惧的时候"

  AOR_news.203.t:0 "[Get_title_news_header]                 美国新一轮反共行动扩大化[Get_title_news_pic]"
  AOR_news.203.d:0 "近日，美国总统伍德罗·威尔逊为应对国内日益增长的红色意识形态威胁，指示司法部长帕默尔牵头，再一次扩大了全国范围的反布尔什维克与反无政府主义行动。美国军队、警察及劳动骑士团联合行动，在全国各地展开大规模搜捕，目标直指红色势力及其支持者。据官方消息，数百个极端分子已经被捕，其相关组织被取缔。然而据民间传闻，已有千人被捕，其中有许多已被秘密处决。威尔逊政府表示，此举只是为了保护美国的民主制度和社会秩序，防止外部极端意识形态的渗透。然而，部分民众和媒体对此表示担忧，认为行动可能过分侵犯了公民自由。此次反共行动引发了广泛的社会讨论，当今美国政治的热点之一。"
  AOR_news.203.a:0 "在美国?不稀奇"

  AOR_news.204.t:0 "[Get_title_news_header]                 法国批判英国在爱尔兰问题上的举措[Get_title_news_pic]"
  AOR_news.204.d:0 "随着世界大战的最后一片灼热的余烬降温成冰冷的飞灰，废墟上摇摇欲坠的旧秩序只剩下两位仍端坐的棋手。不列颠和法兰西，两个横跨世界的殖民帝国紧盯着对方，愈发感觉浩大的世界是如此的狭隘。随着两个庞然大物之间的摩擦愈演愈烈，第一个从看似宁静的水里上升的灼热气泡掀起了全面对抗的涟漪。\n世界大战结束后，愈发激烈的爱尔兰独立问题一直困扰着联合王国政府。愤怒于伦敦政府两百年统治下的二等公民地位，激发于世界大战后经济下滑和系统性歧视，凯尔特人正在将联合王国的爱尔兰后花园变成一块燃烧的白地。行踪猖獗到近乎公开对抗的民兵游击队武装，全面罢工席卷一个又一个聚居点。爱尔兰的联合王国治安体系已经陷入系统性瘫痪，紧急调遣的军队也无法短时间内扑灭沸腾的民怨。\n而近日由法国政府在国际联盟中发表的倡议更是给焦头烂额的联合王国政府背后一计猛刺。倡议中公开的，不留情面的，言辞犀利而尖锐的指向联合王国政府对爱尔兰“系统性压制民族自决权”和近期镇压的残酷，字里行间甚至透露出对爱尔兰独立武装更进一步支持的试探，并暗示将重新评估《英法协约》下的双边关系。哪怕嗅觉最不敏锐的政治家也能知道，这种近乎公开羞辱的通告是什么令人发怵的信号。"
  AOR_news.204.a:0 "“你管这叫什么？冷战？”"

  AOR_news.205.t:0 "[Get_title_news_header]       法国支持爱尔兰，协约国面临解体危机[Get_title_news_pic]"
  AOR_news.205.d:0 "法国议会近日通过一项法案，决定向爱尔兰运送武器和物资，以支持其独立战争。这一举动激怒了英国，后者视爱尔兰为其领土的一部分，并强烈反对任何外部势力干预。\n\n英国首相在紧急会议上表示，法国的行为是对英国主权的直接挑战，并警告这将严重损害两国关系。法国方面则辩称，支持爱尔兰独立是出于对民族自决原则的尊重，并强调其行动旨在促进地区和平与稳定。\n\n随着双方立场的僵化，协约国其他成员国开始表达担忧。丹麦、波兰等国呼吁双方通过外交途径解决分歧，但英法两国的对峙态势未见缓和。分析人士指出，如果争端持续升级，协约国可能无法维持其团结，进而导致这一国际联盟的解体。"
  AOR_news.205.a:0 "东拼西凑的恶棍组织罢了"

  AOR_news.206.t:0 "[Get_title_news_header]                 协约国正式解体[Get_title_news_pic]"
  AOR_news.206.d:0 "在经历了多年的内部矛盾与外部危机后，曾主导一战战后秩序的协约国联盟于今日正式宣告解体。引发这一结局的原因包括但不限于英法两国的爱尔兰问题，金本位制分歧引发的长期对立，以及协约国东欧政策等分歧。\n\n此前，英法两国因法国支持爱尔兰独立问题爆发激烈冲突，导致协约国内部信任崩塌。随后，英法美三国就金本位制问题的会谈破裂，美国率先退出协约国，进一步削弱了联盟的凝聚力。与此同时，协约国在俄国西部建立的“波罗的-白俄罗斯军事共同管理区”因管理疏忽爆发大规模暴乱，爱沙尼亚、拉脱维亚、立陶宛和白俄罗斯等地局势失控，管理区面临解体风险。\n\n一系列事件暴露了协约国内部的深层次矛盾，各成员国在政治、经济和安全政策上的分歧已无法调和。随着美国退出、英法对立加剧以及东欧管理区的崩溃，协约国最终失去了维持其存在的基础。\n\n协约国的解体或将标志着战后国际秩序的重大转折，全球格局或将进入新的动荡期。各国正密切关注这一变化，并试图在新的国际体系中重新定位自身角色。"
  AOR_news.206.a:0 "房子刚搭好，你却把他的主梁炸了？"

  AOR_news.207.t:0"[Get_title_news_header]                       中国北京联合保定政府！[Get_title_news_pic]"
  AOR_news.207.d:0"近日，位于中国北京的段祺瑞将军公开通电全国，宣布合并原北京中央-即现在政府驻地位于保定的中华民国政府。\n\n与此同时，随着保定政府的终结，原先仍驻留在中国各地，且明确服从于中央政府的中国军队，纷纷陷入混乱。冯国璋正在中国东南地区收服愿意投靠于他的军阀；满洲的张作霖也收编了不少军队，并稳定了满洲局势-不过，收编了绝大部分中央军队的，仍然是段祺瑞和他的北京政府。"
  AOR_news.207.a:0"段祺瑞吃到了最肥的鸭子"

  AOR_news.208.t:0"[Get_title_news_header]                 美国退出协约国[Get_title_news_pic]"
  AOR_news.208.d:0"近日，英法美三国就金本位制问题展开会谈，但因意见分歧未能达成共识。英国与法国坚持维持金本位制，认为这是稳定全球经济的关键；而美国则主张采取更灵活的货币政策以应对战后经济挑战。由于双方立场无法调和，会谈最终破裂。\n\n美国随后宣布退出协约国，称其政策方向与英法存在根本性分歧，无法继续维持联盟关系。这一决定引发国际社会震动，协约国内部矛盾进一步公开化。\n\n分析人士指出，美国退出可能加速协约国的解体，并对全球经济秩序产生深远影响。"
  AOR_news.208.a:0"英法霸权的果实不可能让美国摘下"

  AOR_news.209.t:0"[Get_title_news_header]        波罗的-白俄罗斯军管区局势逐渐动荡[Get_title_news_pic]"
  AOR_news.209.d:0"近日，由英法协约国控制的波罗的-白俄罗斯军管区爆发多起骚乱，严重影响了当地秩序。\n\n自一战期间协约国占领立陶宛、拉脱维亚、爱沙尼亚及白俄罗斯后，该地区被划为协约国的军事共同管理。然而，协约国内部分裂及高压统治引发民众不满，导致局势持续恶化。目前，协约国各国及军管区作战联席会议尚未就平息骚乱提出有效方案。"
  AOR_news.209.a:0"连一个玩物都控制不了"

  AOR_news.210.t:0"[Get_title_news_header]             波兰消灭加利西亚分裂势力[Get_title_news_pic]"
  AOR_news.210.d:0"在波兰独立后的动荡时期，加利西亚地区陷入了布尔什维克叛乱的漩涡。波兰临时政府领袖之一的约瑟夫·毕苏斯基，领导波兰清算委员会与政府军紧密合作，经过长时间的战斗，成功平息了叛乱，重新统一了加利西亚。毕苏斯基在胜利后表示，这一胜利不仅巩固了波兰的领土完整，也为地区的稳定与和平奠定了基础；这是波兰人民团结一致的成果，标志着波兰国家复兴的重要一步。"
  AOR_news.210.a:0"他与瓦迪斯瓦夫一世异路同归"

  AOR_news.211.t:0"[Get_title_news_header]             石勒苏益格-荷尔施泰因公投入德[Get_title_news_pic]"
  AOR_news.211.d:0"在一战后由协约国托管的石勒苏益格-荷尔斯泰因地区，中部地区的公投结果最终决定该地区继续归属德国。然而，这一结果并未带来预期的稳定，反而为南石勒苏益格苏维埃政权的渗透提供了可乘之机。\n\n公投过程中，尽管德国成功保留了中石勒苏益格，但当地的政治局势因激进派活动而持续动荡。南石勒苏益格苏维埃政权利用这一混乱局面，迅速扩大其影响力，试图在该地区建立社会主义政权。这一举动引发了德国政府和国际社会的高度关注。\n\n德国政府表示将采取一切必要措施，维护中石勒苏益格的稳定与安全，并防止布尔什维克政权的进一步渗透。同时，丹麦方面似乎不满公投成果，其将大量军队调往丹德边境，而对自己的行为则宣称为维护边界稳定；但大部分分析人士认为，丹麦将会趁着混乱的局势强行夺走这一地区。"
  AOR_news.211.a:0"公投反而成了导火索"

  AOR_news.212.t:0"[Get_title_news_header]             石勒苏益格-荷尔施泰因公投入丹[Get_title_news_pic]"
  AOR_news.212.d:0"在一战后由协约国托管的石勒苏益格-荷尔斯泰因地区，经过一系列波折，中部地区的公投终于得以举行，并决定性地将这片土地划归丹麦王国。这一结果标志着这一地域的政治纷争和动荡告一段落，同时也为丹麦的版图增添了浓墨重彩的一笔。\n\n公投的成功举行，得益于国际社会的共同努力和当地政府的坚持。尽管面临激进派政治党派的挑战和南石勒苏益格苏维埃的政治渗透，但投票机通过一系列精心策划的安全措施和政治对话，确保了投票的稳定进行。丹麦政府对此表示热烈欢迎，并承诺将致力于新领土的发展和融合，确保所有居民的权益得到尊重和保护。\n\n当然，在公投结果出来不久后，现德国艾伯特政府就表示了对此次公投结果的不满，认为公投过程中存在极大的舞弊。而在中石勒苏益格以南的布尔什维克政权蠢蠢欲动，不断将大批军队调往丹德边境，似乎要以武力夺取这一地区。"
  AOR_news.212.a:0"什么，占该地总人口八成以上的德国人相信丹麦？"

  AOR_news.213.t:0"[Get_title_news_header]             石勒苏益格-荷尔施泰因公投作废[Get_title_news_pic]"
  AOR_news.213.d:0"在一战后协约国托管的石勒苏益格-荷尔斯泰因地区，上部地区已顺利通过公投归属丹麦。然而，中部地区的公投却因当地激进派政治党派的活跃，以及南石勒苏益格苏维埃的政治渗透而陷入混乱。尽管国际社会期待通过民主程序解决领土归属问题，但中石勒苏益格的局势使得公投难以如期举行。目前，协约国和当地政府正努力寻求解决方案，以确保公投的公正性和安全性，同时维护地区的稳定。\n\n中石勒苏益格的未来归属仍是一个悬而未决的问题，国际社会对此保持高度关注。"
  AOR_news.213.a:0"他们但凡提出独立建国的想法，都不至于闹到这一步"

  AOR_news.214.t:0"[Get_title_news_header]             丹麦与南石荷爆发战争[Get_title_news_pic]"
  AOR_news.214.d:0"因抢夺对石勒苏益格-荷尔斯泰因中部地区的控制权，南石勒苏益格苏维埃政权与丹麦爆发武装冲突。尽管公投结果已定，但双方仍然试图通过武力控制该地区，并都在力图将对方的在此地影响力和附属势力彻底驱逐出去。\n\n战争爆发后，双方在边境地区展开激烈交火，导致大量平民流离失所，局势迅速恶化。德国中央政府表示将严守中立，但呼吁国际社会干预以制止冲突。协约国和周边国家对此表示严重关切，并敦促双方立即停火，通过谈判解决争端。"
  AOR_news.214.a:0"中欧还能再来一场战争吗？"

  AOR_news.215.t:0"[Get_title_news_header]         丹麦赢得石勒苏益格-荷尔施泰因战争[Get_title_news_pic]"
  AOR_news.215.d:0"经过激烈冲突，丹麦军队在战争中取得决定性胜利，成功击退南石勒苏益格苏维埃政权，并掌控了中石勒苏益格-荷尔斯泰因地区。\n\n丹麦政府表示，此举旨在保护当地亲丹麦居民并恢复地区稳定。战争导致大量平民伤亡和流离失所，协约国成员呼吁丹麦尽快开展重建工作。德国中央政府对战争结果表示关注，但仍然没有作出批评丹麦政府的声明。分析认为，丹麦的胜利将重塑地区格局，但如何安抚当地居民并实现长期稳定仍是巨大挑战。"
  AOR_news.215.a:0"虎落平阳被犬欺"

  AOR_news.216.t:0"[Get_title_news_header]         南石荷赢得石勒苏益格-荷尔施泰因战争[Get_title_news_pic]"
  AOR_news.216.d:0"南石勒苏益格苏维埃政权在与丹麦的战争中取得胜利，成功掌控中石勒苏益格地区。这场冲突导致大量平民伤亡和流离失所，地区局势进一步恶化。丹麦政府表示遗憾，并呼吁国际社会介入以维护和平。\n\n南石勒苏益格苏维埃政权宣布将在此地建立社会主义政权，并将其国名改为石勒苏益格-荷尔斯泰因苏维埃社会主义共和国”。德国中央政府和协约国主要成员对此表示担忧，认为此举将会加剧地区动荡，并使其加紧对欧洲腹地的赤化渗透。"
  AOR_news.216.a:0"丹麦在白日梦中被人揍醒了"

  AOR_news.217.t:0"[Get_title_news_header]     摩根图书馆遭爆破，珍贵史料付之一炬[Get_title_news_pic]"
  AOR_news.217.d:0"昨夜，纽约市标志性的建筑-摩根图书馆遭遇了一场骇人听闻的爆炸袭击。一名乞丐打扮的男子携带大量矿场炸药，潜入图书馆的职工房间并引爆，导致建筑主体严重损毁，大量珍贵书籍和史料化为灰烬，嫌疑人疑似为报复摩根财团而行动。\n\n爆炸发生在晚间10时许，巨大的冲击波震碎了附近建筑的玻璃，火光冲天，浓烟弥漫。消防人员迅速赶到现场，但由于火势凶猛，抢救工作进展缓慢。图书馆内的珍贵藏品，包括中世纪手稿、文艺复兴时期的绘画以及大量稀有古籍，均在这场灾难中遭受严重损失。其中，摩根图书馆珍藏的《古腾堡圣经》和牛顿手稿等无价之宝也未能幸免。\n\n据目击者称，爆炸前曾看到一名衣衫褴褛的男子在图书馆附近徘徊，形迹可疑。据小道消息透露，该男子名为约翰·史密斯（化名），曾是底特律一家建筑公司的董事，史密斯的公司因与摩根财团旗下的建筑公司竞争失败而破产，他因此对摩根财团怀恨在心，策划了此次袭击。\n\n该图书馆管理机构的发言人对此事件表示震惊和悲痛，并承诺将全力配合警方调查，同时启动图书馆的重建工作。纽约市长也发表声明，谴责这一暴力行为，并呼吁市民保持冷静。目前，案件仍在进一步调查中，但警方仍未公布更多细节。"
  AOR_news.217.a:0"他妈的美国佬怎么这么坏"

  AOR_news.218.t:0"[Get_title_news_header]      美国北方少数党派全力支持联邦政府[Get_title_news_pic]"
  AOR_news.218.d:0"美国意外爆发第二次南北战争后，北方政局更加动荡，党派之间仍然互相指责对方的过失。面对南方的叛乱与政党的分裂，总统哈定及其内阁迅速行动，致力于团结北方各派力量。\n\n经过与联邦统一党等少数党派的深入磋商，北方绝大多数党派最终与联邦政府达成共识，支持联邦政府平定南方叛乱。这一决策不仅强化了北方的政治统一阵线，也在国际社会引发了广泛关注和讨论。各国政府及政治团体正密切关注美国内战的进展及其对全球政治格局的潜在影响。"
  AOR_news.218.a:0"你不能等到敌人开枪了才想着团结……"

  AOR_news.219.t:0"[Get_title_news_header]       美国北方少数党派与联邦政府妥协[Get_title_news_pic]"
  AOR_news.219.d:0"美国爆发第二次南北战争后，北方政局仍因党派斗争而持续分裂。尽管总统哈定及内阁积极推动与北方少数党派的谈判，尤其是与联邦统一党的磋商，但谈判进程并不顺利。\n\n经过多轮交涉，联邦政府最终承诺不直接干预州政府的自治权，以换取北方少数党派在一定程度内支持联邦政府的行动。这一妥协虽暂时缓解了北方的内部矛盾，但也为联邦政府的平叛行动增添了不确定性。"
  AOR_news.219.a:0"或许美国人就是喜欢我行我素？"

  AOR_news.220.t:0"[Get_title_news_header]           乌克兰人民共和国灭亡[Get_title_news_pic]"
  AOR_news.220.d:0"随着波苏两军势如破竹般击败乌克兰民族政府的军队，持续四年的乌克兰独立运动宣告失败。众多记者在日托米尔目睹波兰骑兵高举马刀冲散最后一批蓝黄旗帜的守军-而以东的地区已升起了血红的镰刀锤子旗。\n\n"这不是终结，而是二十年的休战。"彼得留拉最后于乌克兰发出了这样一份通报，便匆匆流往海外，但他仍然没有解散名义上的乌克兰政府。据华沙方面透露，波兰议会正推动将西乌地区"波兰"化，强制推行波兰语教育，并鼓励波兰民众向西乌克兰地区迁徙；而布尔什维克当局则开始对哥萨克村庄实施集体化政策，引发多起武装冲突。\n\n随着乌克兰民族政府的灭亡，东欧的局势变得愈发不安。被英法所控制的波罗的-白俄罗斯军管区，面临着拥有统一理想疆域的野心的波苏二国，却因为英法内部的斗争而束手无策，这个怪胎可能就要成为下一个引爆战争的火药桶。苏波两国围绕该军管区的斗争，或许将会深刻改变未来的东欧格局。"
  AOR_news.220.a:0"乌克兰亡了，但谁又关心这个呢？"

  AOR_news.221.t:0"[Get_title_news_header]           美国华尔街发生大爆炸！[Get_title_news_pic]"
  AOR_news.221.d:0"今日中午12点，美国华尔街金融区发生一起严重的炸弹爆炸事件，目前已造成至少30人死亡，超过200人受伤。爆炸发生在摩根大通银行大楼前，一辆满载炸药的马车被引爆，巨大的冲击波震碎了附近建筑的玻璃，街道上布满碎片和血迹，现场一片混乱。\n\n警方初步调查认为，此次爆炸可能是无政府主义者或布尔什维克主义者所为-但多数人认为，此次爆炸案与之前爆破摩根图书馆的嫌疑人高度相关。爆炸前，一封警告信被投递到附近邮局，信中威胁将针对包括摩根财团在内的金融巨头采取行动。尽管警方迅速疏散了部分区域，但仍未能阻止悲剧发生。\n\n此次事件引发了全美范围内的恐慌，各界普遍对激进组织的威胁表示担忧。摩根大通银行暂未发表正式声明，但已加强各分支银行的安保措施。总统威尔逊呼吁民众保持冷静，并承诺彻查事件。据部分民调显示，一些美国公民认为是政府的反共行动过于残酷，而导致极端分子做出过激反应，这些公民要求政府立刻终止仍在进行的反共行动。\n\n华尔街大爆炸目前已成为纽约史上最严重恐怖袭击之一，其影响预计将持续发酵。"
  AOR_news.221.a:0"美国佬就是炸，炸，炸，什么都给你炸完了"

  AOR_news.222.t:0"[Get_title_news_header]             阿富汗战争再起[Get_title_news_pic]"
  AOR_news.222.d:0"近日，阿富汗中部地区再次成为战争的焦点。阿曼努拉政权与纳斯鲁拉政权之间的冲突升级，双方在中部地区集结了大量兵力，准备进行一场决定性的战役。\n\n阿曼努拉政权得到了苏俄的支持，尽管苏俄自身仍处于内战中，但已公开声明支持阿曼努拉政权，并鼓励阿富汗人民继续反英斗争。纳斯鲁拉政权则依赖英国及英属印度的军事支持，试图维持其在阿富汗的影响力。这场战争不仅关乎两个政权的存亡，也可能重新定义阿富汗的未来政治格局。"
  AOR_news.222.a:0"应该下注看看谁能赢"

  AOR_news.223.t:0"[Get_title_news_header]         阿富汗阿曼努拉政权赢得胜利[Get_title_news_pic]"
  AOR_news.223.d:0"阿富汗地区的战事传来捷报，阿曼努拉政权在经过激烈的战斗后，成功击败了纳斯鲁拉以及英属印度的军队，并顺势占领了赫拉特，其军队甚至直接斩首了纳斯鲁拉本人。\n\n这场胜利标志着阿曼努拉政权在阿富汗的进一步巩固，同时其痛击了英国及其附属军队，引发了英国国内的一片声浪，使英国政府狼狈不堪的同时损害了英国的国际形象。苏俄的支持在战争中起到了关键作用，尽管苏俄自身面临内战的挑战，但其对阿曼努拉政权的支持无疑增强了后者的战斗力。\n\n随着纳斯鲁拉以及英印军队的全面溃败，阿曼努拉政正逐步收复全国失地，其在公开声明中说，全国统一后，他将亲自推动阿富汗的政治与社会改革，力图将阿富汗建设成为一个繁荣富强，摆脱贫困与战争的新国家。"
  AOR_news.223.a:0"帝国坟场依旧是帝国的梦魇"

  AOR_news.224.t:0"[Get_title_news_header]         阿富汗纳斯鲁拉政权赢得胜利[Get_title_news_pic]"
  AOR_news.224.d:0"阿富汗地区的战事传来捷报，纳斯鲁拉政权在阿富汗中部的关键战役中取得了意想不到的胜利。尽管面临阿曼努拉政权的强大压力和苏俄的支持，但纳斯鲁拉政权凭借英国及英属印度的军事援助，成功击退了对手的进攻，并顺势攻入了首都喀布尔。据传，阿曼努拉已经在首都的动乱中死亡。\n\n这场胜利不仅暂时稳固了纳斯鲁拉政权的地位，也显示了英国在阿富汗地区的影响力仍然不容小觑。然而，阿富汗人民对于纳斯鲁拉政权的亲英和保守政策的不满情绪依旧高涨，未来的政治局势仍充满变数。纳斯鲁拉政权能否利用此次胜利的余波，进而扫除阿富汗北部的民族武装，镇压叛乱，稳固自己的统治，将是其能否长期执政的关键。"
  AOR_news.224.a:0"阿富汗又回到黑暗时代了"

  AOR_news.225.t:0"[Get_title_news_header]           日本关东地区发生大地震！[Get_title_news_pic]"
  AOR_news.225.d:0"9月1日，日本关东地区发生了一场毁灭性的大地震，震级高达7.9级，史称“关东大地震”。地震发生于当地时间上午11时58分，震中位于相模湾西北部，震源深度较浅，导致东京、横滨等城市遭受严重破坏。目前日本政府及其内阁不停的向受灾群众表示道歉，并宣称政府将会采取行动以挽回损失。\n\n地震引发的强烈震动持续了数分钟，建筑物倒塌、道路断裂，火灾随之蔓延。据统计，地震及其引发的次生灾害共造成约10.5万人死亡，超过200万人无家可归。东京和横滨的市区几乎被夷为平地，经济损失难以估量。\n\n此次地震不仅暴露了日本建筑抗震能力的不足，同时也揭露了日本政府面对自然灾害的无力-在第一波地震后，东京府及其他地方政府并未采取任何有效措施缓解灾情影响，只有少数几个志愿者组织在进行抢险救灾行动。日本各界已逐渐开始声讨日本政府的不作为行为。\n\n据日本传说所言，地震是人间有不仁不义之人作恶，而导致神龟发怒所引发。如今的日本天皇嘉仁身体具有缺陷，且精神失常，并不能正常的管理国家，似乎符合日本神话中的寓言。或许，大地震在未来的影响，会动摇日本的统治根基。"
  AOR_news.225.a:0"太可怕了"

  AOR_news.226.t:0"[Get_title_news_header]          红色德国夺取科隆！[Get_title_news_pic]"
  AOR_news.226.d:0"在苏联的支持下，苏维埃德国逐步收复失地，其军队于昨日跨过莱茵河，进驻科隆，受到当地民众欢迎。然而，在莱茵兰军事区的其他地区，苏维埃军队与驻守法军爆发武装冲突，局势骤然升级。\n\n法国政府宣称，莱茵兰地区为“防止德国军事威胁”而设立，要求苏维埃军队立即撤出。苏维埃德国方面则指责法国非法侵占德国领土，并强调其行动旨在“解放被压迫的德意志同胞”。\n\n目前，双方在科隆至杜塞尔多夫一带交火，伤亡情况尚不明确。国际社会呼吁克制，避免事态进一步恶化。"
  AOR_news.226.a:0"一个敢攻，一个敢守"

  AOR_news.227.t:0"[Get_title_news_header]          匈牙利进攻三一共和国"
  AOR_news.227.d:0"多瑙防御同盟的倒台打破了巴尔干火药桶摇摇欲坠的平衡，每个地区强权，夹缝小国都各怀鬼胎，空气里的火药味日渐浓郁。但匈牙利军事行动的迅捷，仍然让所有人措手不及。\n就在今日早晨，匈牙利军队借清晨的浓雾向多瑙河彼岸原克罗地亚地区的三一共和国发起猛攻。迟迟到来的匈牙利官方通报中将这次军事行动定义为“大匈牙利的神圣统一”，而震惊中的三一共和国部队则拼死坚守萨瓦河-多瑙河天险，虽尚未产生官方通报，但是前线记者报道中的克罗地亚族战士民族热忱以及士气仍然高涨。\n据国际观察家评论，巴尔干地区激烈的民族矛盾领土冲突在世界大战中并未真正解决，克罗地亚地区和匈牙利之间的对立便是经典的一环。而协约国，多瑙河防御同盟等维持地区稳定的联盟接连崩溃，引发的权力真空必然导致流血冲突甚至更大规模战争爆发。\n在多瑙河防御同盟骤然垮塌留下的寂静里，第一个意图接管巴尔干秩序的猎手，瞄准了他心仪猎物的心脏。"
  AOR_news.227.a:0"多瑙河泛起波涛"

