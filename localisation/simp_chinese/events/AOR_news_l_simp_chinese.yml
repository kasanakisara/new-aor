  AOR_news.186.t:0"[Get_title_news_header]                     乌里阿勒格武装暴动加剧[Get_title_news_pic]"
  AOR_news.186.d:0"近日，北非里夫地区的乌里阿勒格部落武装在阿卜杜勒·克里姆的领导下，对西班牙殖民政府发动了大规模起义。起义军利用熟悉的地形和灵活的游击战术，多次袭击西班牙驻军据点，造成殖民军队严重损失。\n\n此次冲突源于西班牙殖民当局的高压统治和经济剥削，激起了当地民众的强烈不满。阿卜杜勒·克里姆号召部落团结一致，反抗殖民统治，争取民族独立。西班牙当局已增派军队试图镇压，但面临地形和补给的双重挑战。"
  AOR_news.186.a:0"什么玩意儿，没听过"

  AOR_news.187.t:0"[Get_title_news_header]                     里夫共和国成立！[Get_title_news_pic]"
  AOR_news.187.d:0"近日，北非里夫地区的民族叛乱不断加剧，当地柏柏尔人武装组织与西班牙殖民当局发生激烈冲突。里夫民族领袖阿卜杜勒·克里姆率众起义，呼吁推翻殖民统治，建立了独立于西班牙的里夫共和国-这个共和国结合了现代法律与伊斯兰教传统，类似于波斯的宪政共和国。\n\n西班牙驻军虽装备精良，但因地形不熟和补给困难，屡遭挫败。此次叛乱已引发国际层面的广泛关注，部分国家呼吁通过谈判解决冲突，  法国政府和摩洛哥朝廷则对里夫地区的叛乱表达了担忧，但西班牙当局表示将坚决镇压叛乱。"
  AOR_news.187.a:0"连一帮骑骆驼的乡巴佬都打不过？"

  AOR_news.188.t:0"[Get_title_news_header]                     法西联军向里夫进军[Get_title_news_pic]"
  AOR_news.188.d:0"近日，法国、西班牙和摩洛哥宣布联合向里夫共和国发起军事行动，旨在镇压当地独立运动并恢复殖民统治。里夫共和国自成立以来一直抵抗殖民地势力，其领导人阿卜杜勒·克里姆领导的军队多次击败西班牙殖民军，成为北非反殖民斗争的标志。此次三国联合行动被视为对里夫共和国的全面围剿。\n\n然而，英国对此次出兵表示强烈反对。英国外交部称，军事干预可能加剧地区动荡，并影响地中海地区的战略平衡。英国呼吁通过外交途径解决冲突，而非诉诸武力。此举引发国际社会关注，里夫共和国的命运或将成为全球反殖民运动的焦点。"
  AOR_news.188.a:0"弱小民族的呐喊"

  AOR_news.189.t:0"[Get_title_news_header]                     美国通过妇女法案[Get_title_news_pic]"
  AOR_news.189.d:0"来自华盛顿的消息，一项旨在保护妇女合法权利并赋予妇女投票权与被选举权的妇女法案正式通过。该法案被视为美国妇女权益运动的重要里程碑，标志着妇女在社会政治生活中的地位得到进一步提升。\n\n然而，法案的通过并未一帆风顺，南方保守派对此表达了强烈反对，认为此举将破坏传统社会结构。尽管面临阻力，法案的通过仍为美国妇女争取平等权利奠定了法律基础，成为推动社会进步的重要一步。"
  AOR_news.189.a:0"奇了，这种国家还能通过这种法案？"

  AOR_news.190.t:0"[Get_title_news_header]                威尔逊宣布《美丽国家计划》[Get_title_news_pic]"
  AOR_news.190.d:0"今日，美国总统伍德罗·威尔逊宣布了一项雄心勃勃的国家改革计划——《美丽国家计划》，旨在稳定美国社会并推动国家全面发展。该计划涵盖政治、经济、军事等多个领域，试图通过政府政策的全面改革，为美国人民建设一个“新的美利坚”。威尔逊在公开演讲中表示，这一计划将致力于解决国内的社会矛盾、经济不平等以及国际地位的巩固，力求使美国成为全球的引领者。\n\n然而，计划的公布并未赢得广泛支持。1919年底特律大爆动中，美国政府的应对措施被普遍认为迟缓且无效，导致社会秩序严重失控，民众对政府的信任度大幅下降。国内外许多人对《美丽国家计划》表示怀疑甚至嗤之以鼻，认为这只是政府为了挽回声誉而推出的空头承诺。批评者指出，计划缺乏具体的实施细节，且未能直面底层民众的迫切需求。\n\n尽管面临质疑，威尔逊政府坚称《美丽国家计划》将是美国历史上的重要转折点。政府发言人表示，计划的核心在于通过制度改革和经济刺激，重建社会信任并推动国家现代化。然而，能否真正实现这一目标，仍有待时间检验。"
  AOR_news.190.a:0"你除了吹牛还会干什么？"

  AOR_news.191.t:0"[Get_title_news_header]                     劳动骑士团参与美国内战[Get_title_news_pic]"
  AOR_news.191.d:0"随着第二次南北战争的全面爆发，美国联邦政府今日宣布，劳动骑士团已正式宣誓效忠联邦政府，并派出近十万名武装人员南下参战。这一决定得益于众多北方财团的强力游说，以及联邦政府承诺的“战后重建优先权”。劳动骑士团众多领袖在宣誓仪式上高呼：“祖国与荣耀高于一切，联邦不容分裂！”。\n\n劳动骑士团的加入为北方注入了强大的战斗力。这支由工人、退伍军人和前牛仔组成的准军事组织，装备精良、训练有素，曾在西部镇压牛仔起义以及东部镇压工人运动中积累了丰富的作战经验。他们的参战被视为北方扭转战局的关键。\n\n然而，南方领袖约翰·南斯·加纳对此嗤之以鼻，称劳动骑士团为“暴君的走狗”。他在政府机构前发表演讲时怒吼：“这些曾经的公民兄弟，如今却为几个恶棍财主的金库卖命！南方的土地与人民绝不会向这些叛徒屈服！”。同时，加纳宣布，南方政府将会取缔所有南方的劳动骑士团组织，并对其进行严惩。\n\n战争的阴云持续笼罩美国，劳动骑士团的参与或许将成为这场内战的转折点。"
  AOR_news.191.a:0"唯利是图的雇佣军罢了"
  
  AOR_news.1.t:0"[Get_title_news_header]         苏维埃社会主义共和国联盟宣告成立[Get_title_news_pic]"
  AOR_news.1.d:0"今日，俄罗斯、乌克兰、白俄罗斯及外高加索联邦的代表在莫斯科签署《苏维埃社会主义共和国联盟成立条约》，正式宣告苏联（苏维埃社会主义共和国联盟）的诞生。这一新政权以社会主义为纲领，实行联邦制，各加盟共和国保留部分自治权，但外交、军事等核心权力归属中央政府。\n\n苏联的成立标志着布尔什维克政权在经历内战和外国干预后进一步巩固。领导人列宁虽出席仪式并发表声明，强调联盟将致力于“无产阶级的联合与社会主义发展”。与此同时，共产国际（第三国际）对苏联的成立表示欢迎，称其为“世界工人阶级的胜利”。\n\n西方国家对这一新政权态度谨慎。英国和法国政府未发表任何声明，部分媒体担忧苏联可能输出革命，影响欧洲稳定。美国国务院则表示将“观察其政策走向”，暂不予以承认。而在亚洲和拉美部分地区，左翼团体对苏联的成立表示支持，认为其可能推动全球反殖民运动。"
  AOR_news.1.a:0"一个大国浴火重生"
  
