  AOR_news.129.t:0"[Get_title_news_header]                   中国宣布出兵中亚！ [Get_title_news_pic]"
  AOR_news.129.d:0"今日早晨，中国大总统袁世凯在北京天坛发表了演说，宣布中国军队将会向西出征，讨伐俄罗斯，收复被中国称为“外西北”的，包括七河地区在内的广大中亚土地。\n\n早在19世纪60年代，从巴尔喀什湖到伊塞克湖之间的广大土地都属于中国，尽管中国对于这片土地的控制，因为中国新疆省的“卡伦”边防线而备受欧洲史学争议，但随着1864年中俄边境条约的签订，这些地区的法理都明明确确的转移到了俄国手上。而如今，大战过后，中国已经彻底摆脱了俄国的噩梦，并在《凡尔赛条约》手中取得了她对俄国的尊严，现在，中国人对收复西北失地充满着信心。\n\n俄罗斯临时政府方面发表强烈抗议，其宣称中国的行为是破坏了俄罗斯与协约国之间的停战备忘录，而俄国的布尔什维克政权对此暂无发表任何言论。"
  AOR_news.129.a:0"这是中国的复兴？"

  AOR_news.130.t:0"[Get_title_news_header]                     英国军舰炮轰中国重庆！ [Get_title_news_pic]"
  AOR_news.130.d:0"自6月以来就有谣言传出，掌控着中国云南以及贵州的军阀唐继尧与英国勾结在了一起，唐鼓励英国通过出售军火物资来换取其在云贵两省的利益。各界对唐继尧作出此番行为不甚理解。\n\n在7月2号，该谣言似乎被印证。在重庆朝天门码头一侧，一艘500吨左右排水量的英国货轮因故障而搁浅在岸上。当地的维修船工无意间发现了该船运载的巨量军火。此事引发了重庆居民的广泛关注，原先四川地区的抗议团体纷纷赶至该地围观以及进行抗议，并随后演变成了与船方的冲突，甚至抢夺武器。\n\n在该船搁浅8天后，英国远东方面派遣四艘内江炮艇到达重庆扬子江畔，英国军方宣称得到了英国议会的许可，要求抗议人群返还船只，释放被扣押英方船员，归还武器；还要求川康总督陈宦公开赔礼道歉。在长达几天的对峙中，由于谈判无果，加之英舰宣称被中国方面的船只所袭，英国军舰向重庆沿江地区的居民区开火，据称发射了上千发的炮弹。而炮击造成了重庆数百人的伤亡。\n\n英国军舰的炮击再度引发了中国全国新一轮的抗议浪潮。各地抗议团体要求北京政府救助重庆受难群众，要求对英舰进行拦截反击，取消外国船只在中国江河自由通航的权利，同时惩治英国的帮凶军阀唐继尧等人。北京方面目前没有任何回应。"
  AOR_news.130.a:0"屠杀不过是民众怒火的助燃剂"

  AOR_news.131.t:0"[Get_title_news_header]                     中国云南爆发政变！ [Get_title_news_pic]"
  AOR_news.131.d:0"近日，中国云南发生了一场巨变，已是万夫所指的军阀唐继尧，被混乱赶到了由其下属刘显世统治的贵州省。而云南的新主人，则是原先滇军的激进派领袖-蔡锷。\n\n蔡锷将军是中国最早的民主革命分子之一，也曾是中国清朝末期的新军将领；其优良的作风以及极高的才能，使得他在云南新军中享有极高的声望。\n\n在中国民主革命胜利后，袁世凯碍于这位将军的巨大声望而把他调往北京软禁起来，不过在世界大战中，蔡锷又舍身挺出，向袁世凯自告奋勇，迎接并指挥北上而来的云南军队。蔡锷将军因此逃脱了袁世凯的束缚，并在蒙古对俄国军队进行了坚决的抵抗。战争胜利后，蔡锷晋升上将军衔，获得云南省荣誉省督办等职-从此蔡锷远离军队，对唐继尧的威胁也大大降低。\n\n不过随着唐继尧因为重庆事件而颜面扫地，滇军内部的激进派势力不断扩大。大量士兵不满于现任云贵总督唐继尧的统治，甚至部分军人已经公开宣称拥护蔡锷为新的云南总督；唐总督为了稳定局势，将大量边境军队纷纷调往昆明。不过贵州发生的动乱，又使他将军队调往贵州镇压叛乱势力，激进派在唐继尧的应接不暇中最终成功发动政变，将唐继尧的军队赶出了云南大部分地区。\n\n新成立的“救国委员会”拥护蔡锷为委员长，而蔡锷则将另一位深藏于昆明的大人物-孙文邀请出来，并邀请他担任救国委员会的委员长一职，这等于变相的将云南地区交给了孙文以及他的国民党。而在种种事件发生后，北京方面只要求双方保持克制，并无进一步的行动。"
  AOR_news.131.a:0"他们会变成新的军阀吗？"

  AOR_news.132.t:0"[Get_title_news_header]                      中国国民政府占领四川 [Get_title_news_pic]"
  AOR_news.132.d:0"在前一段时间，统一四川的陈宦总督为求自保-同时也是为了维系自己的军队生存。他选择重新加入了中国北方的北洋政府，并向中国南方的国民革命军发起了进攻。\n\n不过北伐大势终究势不可挡，国民革命军以极快的速度攻占了四川各个主要城镇，并生擒了总督陈宦，而孙中山则对这位俘虏予以高规格的接见。现在，陈宦已经宣布服从共和，并奉劝跟随北洋政权东逃的川军士兵放下武器，参与国民革命。"
  AOR_news.132.a:0"有意思"

  AOR_news.133.t:0"[Get_title_news_header]                       中国广州政府占领四川 [Get_title_news_pic]"
  AOR_news.133.d:0"在前一段时间，统一四川的陈宦总督为求自保-同时也是为了维系自己的军队生存。他选择重新加入了中国北方的北洋政府，并向中国南方的联省军队发起了进攻。\n\n不过北伐大势终究势不可挡，联省军队以极快的速度攻占了四川各个主要城镇，并生擒了总督陈宦，而陈炯明则对这位俘虏予以高规格的接见。现在，陈宦已经宣布服从共和，并奉劝跟随北洋政权东逃的川军士兵放下武器，参与联省革命。"
  AOR_news.133.a:0"有意思"

  AOR_news.134.t:0"[Get_title_news_header]                      大正天皇驾崩！ [Get_title_news_pic]"
  AOR_news.134.d:0"一则消息从日本传来，统治了日本10余年的大正天皇-嘉仁，在圣诞节前夕的日本皇宫里痛苦的去世，在此之前，天皇饱受各种疾病的困扰。\n\n大正天皇作为日本的伟大统治者-明治天皇的继位者，其才智及胆识却远远不及其父，其从小患有包含精神分裂症在内的多种疾病，也正是因为大正天皇的混沌治理，日本民主派才得以推动立宪改革。\n\n不过，大正天皇的儿子，现在的日本皇位继任者裕仁，却又是一个深不可测且野心勃勃的家伙，他长期在欧洲访问，并在20年代后以皇太子身份代行父亲，作为实际的摄政。据传闻，裕仁实际上是一个支持战争的军国派。不过应验日本国政策的巨变，还要等待着这位皇太子正式登基再说。"
  AOR_news.134.a:0"哦，那个疯子侏儒死了是么……"

  AOR_news.135.t:0"[Get_title_news_header]                      中日战争爆发！ [Get_title_news_pic]"
  AOR_news.135.d:0"从东方传来了一则令人震惊的消息-据奉天国际报社报道，日本驻扎在中国旅顺的关东军公然向中国沈阳地区的军队开火，而日本则在第一时间宣称为中国军队率先挑起冲突，日本军队不过只是尽自卫之责任。\n\n然而据有关消息人士称，已经大约有两万关东军携带着大量军火，自日本从海上开赴旅顺，这很明显不是所谓自卫防御的架势。\n\n中日的紧张局面，让人回想起了1894年的中日战争，那场战争以中国清帝国的惨败告终。而这次的中日危机，中国是否能够赢得自己的生存，而日本在进攻中国后的目标又是什么，敬请期待之后而来的战况报道。"
  AOR_news.135.a:0"东亚的命运在此一决"

  AOR_news.136.t:0"[Get_title_news_header]                  底特律大暴动被平息 [Get_title_news_pic]"
  AOR_news.136.d:0"底特律工人的怒火被美国的军警熄灭了。\n\n随着美国逐步动用联邦军队镇压底特律的暴动工人队伍，暴动最终在激烈无比的战斗中被粉碎。底特律，这一座曾经被视为美国工业繁荣象征的城市，其1/4的建筑物受到不同程度的损坏，2/5的工厂被破坏殆尽，80万市民几乎全部逃往他处。\n\n目前，美国联邦军队仍然在这座城市中进行戒严，记者将大量装甲车辆行动的照片被寄回了新闻界，同时还拍摄到了陆军航空队无差别轰炸建筑物的场景，这引发了美国社会对军队滥用暴力的广泛批评。据前线报道称，仍然有小鼓的暴动工人组织在城市中伺机袭击军警，而最后也是最为棘手的清剿工作，仍在进行中。\n\n美国军警逮捕了大量参与暴动或疑似参与暴动的底特律市民，而这次暴动造成的伤亡人数，美国官方至今没有提供较准确的数字。外界普遍猜测，这次暴动造成的死亡人数不会小于3000，而受伤者将以万记数。\n\n暴动的肆虐，将美国五大湖的工业明珠几乎彻底抹去，这一事件或将成为美国人民永久的伤痛。"
  AOR_news.136.a:0"八十年的传奇就此灰飞烟灭"

  AOR_news.137.t:0"[Get_title_news_header]                     日本与中国国民政府签订和平协议 [Get_title_news_pic]"
  AOR_news.137.d:0"历时一段时间的中日东亚战争已落下帷幕，日本帝国的代表乘坐飞机抵达南京，在扬子江饭店与中方签订了《中日和平协定》。同时，日本还与苏联、大韩临时政府等共同签订了《东亚三方协定》。\n\n协议主要规定，日本完全废除所有与前中国政府签订的不对等条约，中日双方签订一项长达50年的和平条约。日本明确将归还中国旅顺与大连等地区，而台湾及澎湖列岛地区需要稍后举行会议商议-不过由于台湾爆发的起义军几乎控制了台湾，且少量中国国民革命军已经在台驻扎，目前台湾和澎湖列岛由中国实际控制。\n\n苏联问题，经过中日苏三方协定，原俄罗斯滨海州地区所属领土将全部归还苏联，同时中国日本等军队在条约生效后一年内于滨海州撤军。\n\n朝鲜问题，经过此次谈判最漫长的一个小节。日本宣布原《日韩亲善条约》无效，日本将在条约生效后的一年内从朝鲜国内撤军。而朝鲜的统一问题，则交由朝鲜起义军以及大韩临时政府共同商讨决定，不在此次协定讨论的范围内。\n\n日本在这次战争中蒙受了巨大损失，而协定签署的消息传回日本国内，引发了一场又一场的抗议浪潮，看来日本又将再一次陷入危机。"
  AOR_news.137.a:0"东亚的秩序被改写了"

  AOR_news.138.t:0"[Get_title_news_header]                     日本与中国联省政府签订和平协议 [Get_title_news_pic]"
  AOR_news.138.d:0"历时一段时间的中日东亚战争已落下帷幕，日本帝国的代表乘坐飞机抵达南京，在扬子江饭店与中方签订了《中日和平协定》。同时，日本还与苏联、大韩临时政府等共同签订了《东亚三方协定》。\n\n协议主要规定，日本完全废除所有与前中国政府签订的不对等条约，中日双方签订一项长达50年的和平条约。日本明确将归还中国旅顺与大连等地区，而台湾及澎湖列岛地区需要稍后举行会议商议-不过由于台湾爆发的起义军几乎控制了台湾，且少量中国联省军已经在台驻扎，目前台湾和澎湖列岛由中国实际控制。\n\n苏联问题，经过中日苏三方协定，原俄罗斯滨海州地区所属领土将全部归还苏联，同时中国日本等军队在条约生效后一年内于滨海州撤军。\n\n朝鲜问题，经过此次谈判最漫长的一个小节。日本宣布原《日韩亲善条约》无效，日本将在条约生效后的一年内从朝鲜国内撤军。而朝鲜的统一问题，则交由朝鲜起义军以及大韩临时政府共同商讨决定，不在此次协定讨论的范围内。\n\n日本在这次战争中蒙受了巨大损失，而协定签署的消息传回日本国内，引发了一场又一场的抗议浪潮，看来日本又将再一次陷入危机。"
