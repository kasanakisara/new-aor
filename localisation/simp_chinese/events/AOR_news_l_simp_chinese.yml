  AOR_news.242.t:0"[Get_title_news_header]        波兰清算委员会与波兰政府开战！[Get_title_news_pic]"
  AOR_news.242.d:0"在成功平定加里西亚叛乱后，由约瑟夫·毕苏斯基领导的波兰清算委员会今日宣布脱离华沙政府控制，并发动武装叛乱。\n\n与此同时，波兰政府宣布全国进入紧急状态，并进行了新一轮的扩军活动，但波兰陆军的大部分力量都掌握在毕苏斯基手上。\n\n此次冲突源于双方长期存在的意识形态分歧。毕苏斯基一直不满足于波兰现状，他强烈希望可以建立一个强大的波兰国家，而懦弱的波兰文官政府则选择了保守外交，两者的冲突最终成为了引爆此次叛乱的导火索。"
  AOR_news.242.a:0"600年前的内战还要再打一次"

