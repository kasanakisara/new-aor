  AOR_news.310.t:0"[Get_title_news_header]                 捷克经济崩溃[Get_title_news_pic]"
  AOR_news.310.d:0"近日，捷克第遭遇了严重的经济挑战，国内外多重因素叠加导致了经济的急剧下滑。民族矛盾的激化，特别是与德国人之间的紧张关系，以及苏台德地区的领土争端，对国内经济造成了显著冲击。此外，国内政治的分裂和议会的混乱进一步削弱了政府制定和执行经济政策的能力。\n捷克股市昨日出现剧烈波动，经济过热的迹象引起了市场的普遍担忧。外国资本的大量涌入虽然短期内提振了市场，但长期可能对捷克本土企业构成威胁。捷克政府面临着平衡民族关系、稳定政局、制定有效经济政策的紧迫任务。\n捷克的经济崩溃不仅是一个经济问题，它还反映了国内政治的脆弱和国际关系的复杂性。捷克政府如何应对当前的危机，将直接影响到这个年轻共和国的未来发展。"
  AOR_news.310.a:0"这是不祥的预兆……"

  SWE.destruction.t:0"[Get_title_news_header]                瑞典-挪威联合王国内战[Get_title_news_pic]"
  SWE.destruction.d:0 "根据最新的消息，在瑞典紧急摄政委员会主要成员乘坐的飞机全数坠毁后，瑞典已经陷入无线电静默。在此前，紧急摄政委员会已经宣布“将对所有的反对派进行清剿，以求达到保卫联邦的目的。”目前瑞典已经陷入的彻底混乱和全面内战中。"
  SWE.destruction.a:0 "最后的避风港，消亡了？"

  AOR_news.70.t:0 "[Get_title_news_header]                   奥斯陆博览会召开[Get_title_news_pic]"
  AOR_news.70.d:0 "应瑞典-挪威联合王国哈康七世所指示，“为了向世界人民宣示挪威通过快速工业化所取得的显著成就”，挪威发展博览会在挪威首府奥斯陆召开。据称，博览会将会展示“挪威的高新技术发展和让世界瞩目的工业化成就，以及其人民的生活水平，向世界宣告联邦的和平和美好”。"
  AOR_news.70.a:0 "挺好。"
  AOR_news.70.b:0 "赞颂吾王！"

  AOR_news.84.t:0 "[Get_title_news_header]                奥斯陆国家剧院枪击案[Get_title_news_pic]"
  AOR_news.84.d:0 "今日北欧传来了一个悲痛的消息，在奥斯陆国家剧院的《托斯卡》演出中，饰演托斯卡一角的女演员托斯卡·布伦希尔德掏出两把自动步枪，对着观演的观众一通扫射，造成近200人伤亡。\n据调查，本次袭击的主要目标是原定出席的挪威-瑞典联合王国国王哈康七世，但哈康七世陛下因身体原因（据传是突发腹泻，但王室发言人否认这一说法并拒绝透露更多信息）并未能出席，因此逃过一劫。\n王国当局已经将此次袭击定性为恐怖袭击，开始全面的搜捕。"
  AOR_news.84.a:0 "很幸运，不是吗？"

  AOR_news.90.t:0 "[Get_title_news_header]    瑞典-挪威联合王国国王哈康七世遇刺[Get_title_news_pic]"
  AOR_news.90.d:0 "今日于北欧传来了一个无比悲痛的消息！受万民拥戴的瑞典-挪威联合王国国王哈康七世于今日在奥斯陆举办的情人节花车巡游中被极端民族主义者暗杀，撒手人寰。\n哈康陛下一生致力于维护瑞典和挪威两族的和平，在他成为国王前，他就经常参与维护民族和谐的运动，在加冕为国王后更是十分激进地推进联邦化改革，力图确保两族人民的平等地位和神圣权益不受侵犯。他的丰功伟绩将会被人民永世铭记！愿他安息在主的怀抱中。\n不过并不乐观的是，目前联邦政治局势迅速变化，许多极端党派已经开始活动。联邦本届内阁根据哈康陛下时期通过的《联邦继承法》，已经组成联邦特别摄政委员会，根据继承法规定，他们将会开始准备王位的选举继承。但目前对于王位的归属，形势尚不明了。有传言称，联邦已经陷入政治危机，而这只是序幕。"
  AOR_news.90.a:0 "哦，天哪！"
  
