  AOR_news.139.t:0"[Get_title_news_header]                     美国西部再次陷入危机 [Get_title_news_pic]"
  AOR_news.139.d:0"早在几个月前，美国西部地区就不断有消息宣称，美国西部特遣军的潘兴将军在秘密调动军队，但消息未证实。今日上午，美国白宫发言人确认该消息属实，且此种规模的军事调动未经由白宫方面以及美国联邦陆军、美国陆军参谋部同意。\n\n潘兴将军作为一位传奇般的人物，在第2次南北战争中的内战坚定地再次成为了西部的秩序维护者，并在内战结束后完全服从了联邦政府的命令；因此，他和他的特遣军便得以继续留在西部，进行治安任务。一些人曾对潘兴的处理表示担忧，并表示这个性格古怪的将军将会给美利坚带来巨大的威胁。\n\n而如今的潘兴将军确确实实公开与美国联邦政府作对，甚至调集军队展开对峙。谁也不知道他到底想要干什么-他是巨企的傀儡、疯癫至极的称王者，是堂吉诃德式的愚笨勇者，亦或甚至是一个曾经装作苦肉计的布尔什维克？我们静待局势发展。"
  AOR_news.139.a:0"养虎为患……"

  AOR_news.140.t:0"[Get_title_news_header]                     美国哈定总统被刺杀身亡！！！ [Get_title_news_pic]"
  AOR_news.140.d:0"1922年6月12日，正是第一次南北战争爆发51周年，以及第二次南北战争1周年的日子。联邦政府依旧宣称美国的战事正在顺利的推进； 而美国总统哈定也于当日在战时首都波士顿的临时国会大楼前，发表了关于战争的长篇演说。\n\n不过就在演讲即将结束时，哈定总统的演讲台却突然爆炸。总统当即被炸倒在地，随后，两名伪装成大楼警卫的不明分子对主席台开枪射击，但不明分子仅仅几秒钟就被击毙。哈定总统身负重伤，并最终于6月12日中午死亡；据有关消息报道称，哈定总统是在送医治疗的过程中死亡的。\n\n美国副总统约翰·卡尔文·柯立芝在哈定去世后，于12日下午举行紧急会议，并正式接任为美国总统-柯立芝成为了为美利坚合众国第39位总统。柯立芝本人是一个沉默寡言的政治人物，然而他却在哈丁死后的继任仪式上公开发表了演说，他宣称将会严惩幕后凶手，并将联邦政府正义的战争继续下去。目前的北方舆论既对此次突如其来的事件感到恐慌，也产生了对新总统的希望，或者担忧。但一切都会发展，新闻界将会继续动态报道美国消息。"
  AOR_news.140.a:0"像1863年……但死的更为悲壮"

