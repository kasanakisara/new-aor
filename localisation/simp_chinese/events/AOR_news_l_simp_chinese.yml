  AOR_news.148.t:0"[Get_title_news_header]                     中国四川红军南下进攻华南 [Get_title_news_pic]"
  AOR_news.148.d:0"一则突发的消息从中国西南传遍世界-已经占据整个四川地区的中国红军，正在大量派遣部队南下，以排山倒海之势进攻已被广州政府占据的云贵地区。\n\n早在红军大军进攻的前一段时间，广州政府已经发现，有少量来历不明的游击队进入云贵地区，进行侦查或者小规模偷袭，后经证实，这些游击队都来自于四川的红军控制地区。事实证明，这些游击队不过是四川红军南下云贵的预兆与开路先锋。\n\n布尔什维克的火焰开始从中国腹地燃烧到其他地区；英法等国则强烈担忧中国西南的局势发展，而广州政府则开始大规模向外国银行申请贷款，以应对红军的南下。谁也无法知道这支红军的战斗力有多强-但据说他们已经建立了一个前无古人后无来者的新四川。"
  AOR_news.148.a:0"不过是人多的流寇而已"

  AOR_news.149.t:0"[Get_title_news_header]                     中国四川红军统一中国西南！ [Get_title_news_pic]"
  AOR_news.149.d:0"中华狼烟遍地，一波未平，一波又起。而布尔什维克的红色旗帜终于插在了云贵的土地上，并将自东而来的军阀完全驱逐。\n\n中国红军的战斗力以及进军速度震惊了所有人，而广州政府在红军面前的懦弱与溃败则更令世界所震惊，陈炯明目前没有对广州政府在云贵的溃败作出任何声明，而是依然重复请求着外国银行为其提供贷款。溃逃的广州军队在珠江一带布置了新的防线，但中国红军似乎已经没有了再次进军的兴趣，而是选择巩固他们的政权。\n\n广州政府在云贵的全面失败，宣告着一个庞大的红色政权的诞生-即布尔什维克自称的“华西苏维埃”政府，这个布尔什维克政权包括了原先中国的四川省和川康特别区，以及云南、贵州，湖南省西部的一部分，这是自苏俄革命以来亚洲所建立的人口最多，规模最大的红色政权。\n\n目前外界有传言称，英法已经在各自的殖民地边界准备军队，并随时预备向中国红军控制的中国省份进军，而英法官方则宣称“将会时刻注意中国方面布尔什维克势力的动向”。不过目前红军政权与英法并没有爆发任何冲突。"
  AOR_news.149.a:0"……中国人在最落后的地区建立起了最激进的政权"

  AOR_news.150.t:0"[Get_title_news_header]                     中国山西宣布服从联省革命！ [Get_title_news_pic]"
  AOR_news.150.d:0"随着中国南方联省的北伐战争节节胜利，中国北方原先中立的各势力，也开始渐渐靠拢联省主义的大旗。\n\n就在近日，统治着中国山西省的阎锡山宣布服从联省共和，并允许联省军队，以及陕西已服从联省政府的军队进入山西省。据报道称，阎锡山的士兵已经开始和北洋军阀的军队交火，但又有消息报道称，这是阎锡山为了造势而在前线编纂的谎言。"
  AOR_news.150.a:0"哟，山西的小米养人呐"

  AOR_news.151.t:0"[Get_title_news_header]                     中国山西宣布服从国民革命！ [Get_title_news_pic]"
  AOR_news.151.d:0"随着中国南方国民革命军的北伐战争节节胜利，中国北方原先中立的各势力，也开始渐渐靠拢三民主义的大旗。\n\n就在近日，统治着中国山西省的阎锡山宣布服从国民革命政府，并允许国民革命军队，以及陕西已服从国民政府的军队进入山西省。据报道称，阎锡山的士兵已经开始和北洋军阀的军队交火，但又有消息报道称，这是阎锡山为了造势而在前线编纂的谎言。"
  AOR_news.151.a:0"哟，山西的小米养人呐"

  AOR_news.152.t:0"[Get_title_news_header]                     中国山西宣布服从南京政府！ [Get_title_news_pic]"
  AOR_news.152.d:0"随着中国南京政府的统一战争节节胜利，中国北方原先中立的各势力，也重新开始靠拢北洋中央。\n\n就在近日，统治着中国山西省的阎锡山宣布服从南京政府。据报道称，阎锡山的士兵已经开始和反南京势力的军队交火，但又有消息报道称，这是阎锡山为了造势而在前线编纂的谎言。"
  AOR_news.152.a:0"哟，山西的小米养人呐"

  AOR_news.153.t:0"[Get_title_news_header]                     中国山西宣布服从北京政府！ [Get_title_news_pic]"
  AOR_news.153.d:0"随着中国北京政府的统一战争节节胜利，中国北方原先中立的各势力，也重新开始靠拢北洋中央。\n\n就在近日，统治着中国山西省的阎锡山宣布服从北京政府。据报道称，阎锡山的士兵已经开始和反北京势力的军队交火，但又有消息报道称，这是阎锡山为了造势而在前线编纂的谎言。"
