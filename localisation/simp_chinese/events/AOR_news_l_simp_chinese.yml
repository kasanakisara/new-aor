  AOR_news.25.t:0"[Get_title_news_header]                 滨海州政府成立[Get_title_news_pic]"
  AOR_news.25.d:0"今日上午，远东的重要城市-被日本人控制的符拉迪沃斯托克，举行了由日本人主持的“俄罗斯滨海州临时政府成立会”。谢苗诺夫等被红色俄国驱逐至远东的诸多俄罗斯将军们参加了这次会议。\n\n大会主持人为日本关东军司令部发言人，他宣称，滨海州政府的成立将会成为协约国在俄国事态中的重要一步，并且更加有利于远东局势的稳定。\n\n根据大会内容显示，滨海州政府将会以议会制的形式处理政府事务，而且议会的组成人员，大多数是由反对俄国布尔什维克的俄罗斯军人和政府官员组成，其中不乏原克伦斯基政府的成员。\n\n目前，红色俄国方面通过瑞士向日本发出了强烈抗议，而英法等国也表达了对日本进一步插手俄国事务的担忧；外界普遍认为，滨海州政府的成立将会使得日本称霸东亚的野心进一步延伸到东亚腹地，并借此机会更加牢固地控制中国满洲。"
  AOR_news.25.a:0"只不过是搭了个空壳罢了"
  
  AOR_news.26.t:0"[Get_title_news_header]                 菲律宾革命再次爆发[Get_title_news_pic]"
  AOR_news.26.d:0"菲律宾群岛的烈日下，沉寂多年的民族主义柴薪再度被点燃。\n\n曾领导1896年反西班牙革命的埃米利奥·阿奎那多以菲律宾自治领总理身份，对西班牙殖民残余势力发起挑战。尽管名义上菲律宾自1898年后成为西班牙的“自治领”，但实际权力仍由马尼拉的西班牙总督府掌控。为获取真正的独立阿奎那多和各地民族主义者与农民武装，发动了“第二次菲律宾革命”。起义军以“驱逐殖民者，建立真正共和国”为口号，起义军迅速占领了马拉卡南宫，随后各地纷纷起义，西班牙驻军节节败退，事实上，当地驻军可以说是毫无战意，在几场战斗后迅速投降。\n\n虽然为期日短，但起义军迅速解放了全国大部地区，并宣布菲律宾彻底独立，当地人民得以呼吸名为自由的空气。"
  AOR_news.26.a:0"就等着吧，两只老虎就要被放出来了"
  
  AOR_news.27.t:0"[Get_title_news_header]                 菲律宾革命被平息[Get_title_news_pic]"
  AOR_news.27.d:0"群岛终究无法阻挡恶毒的猛兽，属于菲律宾的红蓝白三色旗再次被折断粉碎。\n\n在起义发生后不久，西班牙政府根据日法战争后《马尼拉条约》的规定，只得请求法日两国出兵“恢复秩序”。法国政府以“保护印度支那安全”为由，派遣舰队封锁马尼拉湾；日本则以“维护太平洋安全”为名，从冲绳调集两个陆军师团登陆吕宋岛北部。联军凭借现代化武器对起义军展开围剿。起义军则依托热带丛林进行游击抵抗，尽管在战争初期，起义军取得了上风，但法，日军通过屠杀平民，毁坏村庄，勾结教会等方式逐渐瓦解了民众支持。\n\n1921年12月，阿奎那多在邦板牙省被日军包围，最终选择自杀，起义宣告失败，法日两国以“托管”为名义，事实上瓜分了菲律宾。\n\n但抵抗似乎没有就此消失，有记者收集到了菲律宾渔民中传唱的诗歌-“浪涛拍打，洗去了海滩上的血，但若用心听，便能察觉大海不屈的吼声”。"
  AOR_news.27.a:0"用鲜血凝结了不屈的精神"
  
  AOR_news.28.t:0"[Get_title_news_header]                      芬兰陷入对峙[Get_title_news_pic]"
  AOR_news.28.d:0"根据来自赫尔辛基和斯德哥尔摩的最新消息，在世界大战后从俄罗斯帝国独立的芬兰共和国的政治形势出现了巨大的异变：随着经济的持续低迷和左右派矛盾的逐渐凸显，芬兰各地的工人运动和示威游行愈演愈烈，领导无产阶级的芬兰共产党已经占领了芬兰南部。而对左翼持放任态度的现任政府也遭到了右翼的抨击，右翼试图武力镇压抗议工人，却遭到了更强势的反对声浪。有传言称军队随时会介入，发动政变。\n\n目前双方的冲突已经十分激烈，箭在弦上，不可不发。"
  AOR_news.28.a:0"愿上帝保佑芬兰……"
  
