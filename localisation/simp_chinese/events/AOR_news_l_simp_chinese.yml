  AOR_news.176.t:0"[Get_title_news_header]                     中国云贵内战全面爆发[Get_title_news_pic]"
  AOR_news.176.d:0"随着云南军政府和原云贵总督唐继尧之间的矛盾不断加深，就在昨日，云贵内战已经被确认全面爆发。云南军政府和唐继尧的部队都在全力进行调遣，双方都在力图抢先掌控前线的主动权。但目前没有任何一方有明显的优势进展。\n\n分析认为，如果要论武装实力，唐继尧的残余军队与贵州刘显世的黔军联合在一起，与云南蔡锷的军队数量相当，而在训练以及军队纪律上，据报道称，唐继尧和贵州的军队远远不如蔡锷的新军队-而蔡锷的新军队甚至已经完全根除掉了抽鸦片的恶习，这在中英战争后的中国地方军队中是无法想象的伟大成就。\n\n不过，一切仍然要等待时局的发展，云贵战场，究竟谁能得胜，我们仍然会持续报道。"
  AOR_news.176.a:0"哟吼，打起来了"

  AOR_news.177.t:0"[Get_title_news_header]                     徐世昌代行中国大总统[Get_title_news_pic]"
  AOR_news.177.d:0"今日，中华民国临时政府及临时国会发布公告，就在昨日，中华民国临时政府临时国会已选举徐世昌为代行大总统，而总理则由杨度出任，内阁各组成人员保持不变。\n\n外界猜测，此举是为了削弱陆军部在国家危机中膨胀的影响力，并确保中华民国的权力机构能够运行下去的不得以之策。据报道称，如今中华民国临时政府的实际权力，都掌握在以曹锟和吴佩孚为首的中央军军官手中，而他们或许将会对袁世凯遗留的文官集团造成威胁。不过，曹锟和吴佩孚在选举结果发表的同一时间也发表声明，拥护中华民国政府和临时国会的主张，承认徐世昌为代总统。\n\n但令人惊奇的是，远在南京的长江巡阅使冯国璋也发表声明，宣布支持中华民国国会的决定，他要求中华民国国会立刻宣布段祺瑞叛国，并立刻组织军队北上讨伐。外界猜测，冯国璋此举似乎是想要重新拉近与中央政府的关系。"
  AOR_news.177.a:0"我已经看烂了无聊傀儡政府的把戏"

  AOR_news.178.t:0"[Get_title_news_header]                意大利进攻利比亚诸部落[Get_title_news_pic]"
  AOR_news.178.d:0"就在前天，意大利动员了8万军队，从班加西与的黎波里向昔兰尼加、费赞等地区进军，而意大利政府则在今日早晨公布了此次消息。\n\n熟知非洲局势的人皆知，此次意大利的目标便是消灭盘踞在撒哈拉沙漠中东部的伊斯兰政权-赛努西教团。该宗教政权自19世纪快速发展，在19世纪末成为了撒哈拉东部最为强大的地方政权，几乎统合了整个利比亚；尽管周围的非洲殖民地政府几番发动进攻，但都没有成功消灭教团。大战开始时，赛努西教团站在同盟国一边，趁着英法与奥斯曼在中东激战之际重新扩张土地，一度恢复其原先的极盛领土。\n\n而大战结束后的1919年，协约国早已准备对这个无聊的政权发动最后一击。意大利政府在今日的公告中宣称，协约国也将会参与到这场战争中；英国与法国的军队，已经从各自的殖民地向利比亚进发，他们将会与意大利军队并肩作战。"
  AOR_news.178.a:0"伊德里斯没有前往凡尔赛真是可惜"

  AOR_news.179.t:0"[Get_title_news_header]                利比亚诸部落被协约国击败[Get_title_news_pic]"
  AOR_news.179.d:0"在之前的一段时间，协约国军队在利比亚势如破竹，以极快的速度几乎占领了整个沙漠。意大利政府宣称，对利比亚的战争行动以基本宣告结束。\n\n据前线报道称，利比亚北部的所有部落已经臣服于意大利，而南部则重新回到法国殖民地的统治之下；教团的核心力量已经灰飞烟灭，而教团首领伊德里斯早已逃亡利比亚与埃及的边境，目前下落不明。\n\n不过据部分报道称，意大利实际上完全没有对利比亚腹地实行有效的统治，教团的核心力量依旧留在利比亚，并且仍然有能力组织部落游击队，对意大利和协约国军队发动偷袭战，而目前在利比亚的意大利军队则疲于应付游击队。或许，利比亚人仍然有翻身的机会。"
  AOR_news.179.a:0"意大利人是不是只会在厨房打仗？"

