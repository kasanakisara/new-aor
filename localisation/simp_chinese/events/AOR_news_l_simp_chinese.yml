  AOR_news.590.t:"[Get_title_news_header]                     比利·休斯连任总理[Get_title_news_pic]"
  AOR_news.590.d:"在经历了一场激烈的竞选之后，比利休斯领导的国家党成功击败了休斯领导的劳工党，赢得了澳大利亚联邦的第八届大选。这是比利休斯第三次当选总理，也是他在第一次世界大战后的首次胜选。\n\n据官方统计，国家党获得了36个席位，劳工党获得了26个席位，其他党派和独立候选人获得了8个席位。国家党的得票率为42.5%，劳工党的得票率为36.2%，其他党派和独立候选人的得票率为21.3%。\n\n比利休斯在赢得选举后，于当晚在悉尼的国家党总部发表了胜利演说，感谢了支持他的选民和党员，同时承诺将继续为澳大利亚的和平与繁荣而努力。他表示，他将致力于推动澳大利亚在国际联盟中的地位和影响力，维护澳大利亚的主权和安全，促进澳大利亚的经济和社会发展，改善澳大利亚的教育和医疗系统，以及解决澳大利亚的一些内部问题，如移民、土著和女权等。"
  AOR_news.590.a:0"哥们离开工党照样飞！"
  
  AOR_news.600.t:"[Get_title_news_header]                     1922年澳大利亚大选[Get_title_news_pic]"
  AOR_news.600.d:"在一场惊心动魄的选举之后，国民党和乡村党组成的联盟成功击败了澳大利亚工党，赢得了澳大利亚联邦的第九届大选。然而，这一胜利的代价却是国民党的领袖休斯不得不辞去总理职务，让位给斯坦利·布鲁斯。\n\n据官方统计，国民党-乡村党联盟获得了54个席位，劳工党获得了29个席位，其他党派和独立候选人获得了5个席位。国民党-乡村党联盟的得票率为50.4%，劳工党的得票率为42.8%，其他党派和独立候选人的得票率为6.8%。\n\n休斯在选举后，于当晚宣布了他的辞职决定，同时对联盟的胜利表示了祝贺，对布鲁斯的上任表示了祝福，对自己的支持者和党员表示了感谢。他回顾了自己的政治生涯，对自己的成就和遗憾都进行了坦诚的评价，同时对自己的批评者和对手也表示了尊重和理解。"
  AOR_news.600.a:0"飞不动咯......"
  
  AOR_news.610.t:"[Get_title_news_header]                     1922年澳大利亚大选[Get_title_news_pic]"
  AOR_news.610.d:"在一场前所未有的政治危机之后，工党的领袖马修·查尔顿意外地成为了澳大利亚联邦的新任总理。这一结果是由于国民党和乡村党组成的联盟在赢得了大选之后，却因为休斯拒绝辞职而陷入了内讧，导致总督不得不解散议会，命令工党组成过渡政府，以维持澳大利亚的稳定和秩序。\n\n休斯在选举后，本应按照联盟的协议，辞去总理职务，让位给斯坦利·布鲁斯，以确保联盟的团结和稳定。然而，休斯却因为个人的野心和固执，拒绝了这一要求，坚持要继续担任总理，引发了联盟内部的强烈反对和抗议。乡村党的领导层和议员们纷纷表示，如果休斯不下台，他们就会退出联盟，支持工党组成政府，使得国民党失去了多数席位和执政的合法性。\n\n总督在看到这一混乱的局面后，决定采取行动，于12月26日下午，向休斯发出了解散议会的命令，同时要求工党的领袖查尔顿组成一个过渡政府，直到新的选举举行。休斯在接到命令后，无奈地接受了总督的决定，宣布了他的下台，同时对自己的失败表示了遗憾和愤怒。他表示，他将继续留在国民党，为澳大利亚的利益和荣誉而奋斗，同时对总督和乡村党的行为表示了强烈的不满和谴责。"
  AOR_news.610.a:0"飞不动咯......"
  
  AOR_news.62.t:"[Get_title_news_header]                     澳大利亚维多利亚州警察罢工[Get_title_news_pic]"
  AOR_news.62.d:"在一场罕见的警察罢工之后，维多利亚州的首府墨尔本陷入了一片暴乱和混乱的局面。数千名警察开始了罢工，要求提高工资和改善工作条件，同时抗议政府对警察的不公平和不尊重的态度。罢工导致了墨尔本的治安和秩序的崩溃，一些不法分子和暴徒趁机进行了抢劫和破坏，造成了大量的财产损失和人员伤亡。\n\n据官方统计，罢工期间，墨尔本发生了至少200起严重的犯罪事件，包括抢劫、纵火、暴力袭击、枪击等。罢工造成了至少15人死亡，100多人受伤，数百家商店和住宅被洗劫和焚毁，数千名市民被迫逃离自己的家园。罢工还影响了墨尔本的交通和通讯，导致了火车，电报的中断和停运。\n\n澳大利亚政府采取了一系列的应对措施，包括动员军队和志愿者维持治安，派遣特别调查委员会调查罢工的原因和责任，以及与警察代表进行谈判和妥协以应对罢工。"
  AOR_news.62.a:0"等等，警察罢工？"
  
  AOR_news.63.t:"[Get_title_news_header]                     梅西逝世[Get_title_news_pic]"
  AOR_news.63.d:"新西兰领导人威廉·梅西于今日上午在惠灵顿的家中因心脏病发作而去世。梅西的去世震惊了新西兰和国际社会，许多人对他的贡献和遗产表示了敬意和怀念。梅西的继任者，前副领导人戈登·科茨已经宣誓就职，承诺将继续梅西的政策和理念，推动新西兰的发展和进步。\n\n科茨是梅西的忠实盟友和得力助手，他在1923年被梅西任命为副领导人，负责新西兰的内政和财政事务。他在今日的就职仪式上表示，他深感悲痛和不舍，梅西是他的老师，朋友，和榜样，他将永远怀念他。他还表示，他将继承和发扬梅西的遗志，为新西兰人民谋福祉，为国际联盟的团结和发展贡献力量。他呼吁新西兰人民团结一致，共渡难关，迎接新的挑战和机遇。\n\n梅西的葬礼将于两周后在惠灵顿举行，国际联盟的主席，秘书长，以及多个国家的领导人和代表将出席，向梅西致以最高的敬意和哀悼。梅西的遗体将被安葬在惠灵顿的国家公墓，与他的妻子和儿子相伴。"
  AOR_news.63.a:0"一代新人换旧人。"

  AOR_news.64.t:0"[Get_title_news_header]                     美国内战爆发！！！[Get_title_news_pic]"
  AOR_news.64.d:0"突发，突发！于今年6月18日由新大陆传来的恐怖消息席卷了世界上的所有新闻头条-1921年6月17日夜晚，美利坚南方国民警卫队宣称美利坚合众国军队越过了《西点协议》中所规定的南北军事分界线，并向田纳西州边界的国民警卫队哨站发起了进攻。目前双方前线冲突进展到何等地步，暂时没有任何新的消息传来。\n\n美国自1865年签署《费城条约》以来便饱受自己国家体制的折磨，作为主体的北方政府对国内的社会管控孱弱不已，而南方各州陷入了自身经济与党派的内斗之中，美国西部则成为了两方为了争夺自身权益的的混乱战场。在此之前，一直有传言声称美国北方的资本集团为扬基党秘密制定了一份进攻南方的计划，以此促进美国的统一并巩固资本集团的实力。\n\n也有评论家指出，假如北方成功统一美国，那么美国政府的权威将会大大提高，在统一处理国内事项时也必然会削弱美国资本集团恐怖的力量。但若南方在劣势中统一美国，以南方各党派的政治宗旨，则美国的政治格局将会迎来新的一轮大洗牌，美利坚合众国的定义或许又要更换。"
  AOR_news.64.a:0"糟糕的美洲，糟糕透顶的世界"

  AOR_news.65.t:0"[Get_title_news_header]                     民国的新时代[Get_title_news_pic]"
  AOR_news.65.d:0 "在中国新年即将迎来之际，中国大总统袁世凯又一次在北京国会发表了演说，这也是袁世凯宣布出兵西北后的第一场演说。\n\n在演讲中，袁世凯高度赞扬1919年中国的发展进程，他宣称中国的经济、军事及文化运动都取得了十足的发展。同时，他也高度赞扬了仍在西北地区奋力征战的中国军队，以及曾经在出征募捐活动中积极捐出财产的所有中国公民以及国际友人。\n\n最后他提出：“中华民国已经进入了新时代”。在这个新时代里，所有人都要为了国家的富强而努力，所有人都要团结起来，将中华民族建设成一个强大的民族。\n\n不过有一个小插曲-外国记者发现，袁世凯总统的面色极其糟糕，是袁大总统过度操劳，还是因为曾经不断传闻的心血管疾病，已经完全发作了？"
  AOR_news.65.a:0"扬帆起航！"
  AOR_news.65.b:0"袁大总统吹牛皮，估计能把自己吹走┐(´-｀)┌"

  AOR_news.66.t:0"[Get_title_news_header]                     黎元洪成为中华总统[Get_title_news_pic]"
  AOR_news.66.d:0 "中国新年期间，中国前总统袁世凯因病去世，副总统黎元洪紧急接任，并正式成为中华民国大总统。\n\n然而在中国国内，各派政治力量对黎元洪的领导能力表示怀疑，担心其无法有效整合各方利益，导致国家进一步分裂。国外，列强对黎元洪的外交政策持观望态度，担忧其可能改变袁世凯时期的积极对外路线，影响列强利益。\n\n此外，黎元洪的个人形象也受到质疑。作为前清官僚，他的改革意愿和能力被一些人认为不足以应对民国的复杂局势。同时，他的军事背景也让人担忧可能会加强军队在政治中的角色，影响民主进程。\n\n在这一背景下，社会各界对黎元洪的总统任期充满不确定性。学者们呼吁加强法制建设，确保权力平稳过渡；民间则期待新总统能够倾听民意，推动社会改革。国际社会则密切关注中国的内政外交动向，希望中国能够保持稳定，为世界和平与发展作出贡献。黎元洪的总统之路充满挑战，他能否平息争议，引领中国走向繁荣，仍需时间来验证。"
  AOR_news.66.a:0"中国的民主之路仍然艰巨"

  AOR_news.67.t:0"[Get_title_news_header]                北石勒苏益格公投入丹[Get_title_news_pic]"
  AOR_news.67.d:0"晨雾尚未散尽，丹麦首相zale已站在克里斯蒂安堡宫露台。他手中紧攥的电报上，墨迹未干的字母正无声宣告：历经三个世纪的等待，日德兰半岛南端的石勒苏益格终将重归丹麦王冠之下。这个曾引发普鲁士三次铁血征伐的争议之地，此刻正以全民公决的形式书写历史新章——只是这一次，投票箱取代了克虏伯大炮。\n石勒苏益格地区自1864年普丹战争后脱离丹麦统治，成为德意志邦联北境的前哨。根据1919年《凡尔赛条约》第107-114款，该地区被划为国际联盟特别托管区，其最终归属需通过"当地居民自决"解决。丹麦王国在战后十年间通过灵活外交手腕，逐步获得英法对收复失地的默许支持。当国际联盟观察团进驻时，街巷间飘扬的丹麦克里斯蒂安十字旗与德意志黑鹰旗形成诡异对峙。最终计票结果显示，80%选民选择并入丹麦王国。\n柏林政府发言人指责公投存在"系统性舞弊"，宣称石勒苏益格德意志文化协会多名监票员遭到丹麦民兵恐吓。然而支离破碎的德意志邦联既无实力也无意愿重启战端，艾伯特总理私下向幕僚坦言："我们更需要法国人的贷款而非几块沼泽地。"伦敦《泰晤士报》则以典型英式嘲讽评论道："当柏林连自己议会大厦里的椅子都数不清时，他们自然顾不上北海边的长椅属于谁。\n石勒苏益格市政厅穹顶上，被普鲁士士兵凿去的丹麦王冠浮雕正在工匠锤下重现。但哥本哈根的庆祝香槟尚有余温，日德兰农民联盟已向议会提交请愿书，要求对新边境线造成的牧区割裂进行补偿。新的危机正在酝酿。"
  AOR_news.67.a:0"欢迎回家"
  
  AOR_news.68.t:0"[Get_title_news_header]                 北石勒苏益格公投入德[Get_title_news_pic]"
  AOR_news.68.d:0"石勒苏益格-荷尔斯泰因地区的第1轮公投落下帷幕-令人震惊的是，北石勒苏益格的公投结果显示：多数民众仍然想要回归到德国的怀抱中。\n\n随着北石勒苏益格地区公头的终结，德国与丹麦之间的紧张关系迅速升级，并引发了两国边境地区的骚乱。北石勒苏益格的回归被视为德国在一战后领土问题上的重大胜利，但丹麦国内对此表示强烈不满，认为公投结果受到外部势力干预。\n\n连日来，德丹边境爆发多起抗议和冲突，亲丹麦与亲德国民众相互对峙，部分地区甚至出现暴力事件。两国政府均呼吁克制，但局势仍未得到有效控制。"
  AOR_news.68.a:0"德国佬的同化能力真强！"
  
  AOR_news.73.t:0"[Get_title_news_header]                 纽芬兰公投入英[Get_title_news_pic]"
  AOR_news.73.d:0"经过数日紧张的计票，纽芬兰昨日宣布了其历史性的公投结果：大多数选民投票支持结束独立状态，重新成为大不列颠的自治领地。这一决定是在国内外经济压力和政治不确定性的背景下作出的，反映了纽芬兰人民对于更稳定未来的渴望。\n公投中，支持加入英国的选民比例超过了60%，这一结果立即得到了英国政府的积极回应。英国承诺将向纽芬兰提供经济援助，并确保其在帝国内部享有适当的自治权。\n纽芬兰的这一决定预计将为其带来经济上的稳定和政治上的安全。英国的加入不仅为纽芬兰提供了强大的后盾，也为其公民提供了进入更广阔市场的机会。同时，这也意味着纽芬兰将在文化和自治权方面经历一段适应期。"
  AOR_news.73.a:0"英国人能吃上更便宜的鱼了"
  
  AOR_news.72.t:0"[Get_title_news_header]                 纽芬兰公投入加[Get_title_news_pic]"
  AOR_news.72.d:0"在昨日举行的具有里程碑意义的公投中，纽芬兰通过公投选择了加入加拿大联邦，成为其第十个省份。这一决定是在经历了长期的经济挣扎和政治孤立之后作出的，反映了纽芬兰人民对于经济稳定和政治安全的深切渴望。\n昨日，公投的最终结果显示，57%的选民支持加入加拿大，这一结果得到了加拿大总理的迅速回应，他承诺将为纽芬兰提供必要的经济援助，帮助其建立稳固的财政基础，并确保其在加拿大联邦内享有充分的自治权。\n加拿大政府已经宣布了一系列措施，包括立即的经济援助计划，以及为纽芬兰提供基础设施建设和公共服务改善的资金。此外，加拿大还将协助纽芬兰改善其渔业和木材加工业，这两个行业是该地区经济的支柱。\n随着公投结果的公布，纽芬兰的代表已经开始与加拿大政府进行密切的协商，讨论具体的加入条款和未来的合作方向。加拿大总理预计将在不久后访问圣约翰斯，以庆祝这一联合，并正式启动纽芬兰作为加拿大省份的新篇章。"
  AOR_news.72.a:0"从海到海"
  
  AOR_news.71.t:0"[Get_title_news_header]                 西班牙大流感的终点[Get_title_news_pic]"
  AOR_news.71.d:0"肆虐全球的西班牙大流感，终于在1920年春季宣告终结。这场疫情导致全球数千万人死亡，成为历史上最致命的流行病之一。各国加强公共卫生措施，使疫情逐渐得到控制。全球各地纷纷举行庆祝活动，感谢医护人员的无私奉献和科学家的卓越贡献。此次疫情的终结标志着人类在抗击传染病方面迈出了重要一步，也为未来的公共卫生安全提供了宝贵经验。"
  AOR_news.71.a:0"它消灭的家庭超过了世界大战……"
 
  AOR_news.80.t:0"[Get_title_news_header]                     美国西部动乱加剧！[Get_title_news_pic]"
  AOR_news.80.d:0"美国内战爆发半个月后，内战双方与西部各州的官方联系便骤然下降，民间的通讯也遭到了莫名其妙的中断，南北各方的社会舆论已经开始传言：西部由于陷入了南北混战的无政府状态，其秩序已经开始崩溃。\n\n1921年7月1日后，西部与东部的边界上开始出现了史无前例的逃亡队伍-其逃亡规模甚至要比上世纪90年代的西部大动乱还要再大上几倍。据西部公民的消息，现在的西部已经彻底陷入了多方势力的混战，并且除了达科他州和堪萨斯州政府幸存下来，并分别打着美国政府的旗帜（存疑，且不知支持南北哪方）维护秩序之外，其他已知的西部武装组织都在各自为战，并且相互攻伐-西部特遣军也在其中。\n\n内战爆发后，原本有大量的中西部美国公民逃往南北洲与西部州的交界处避难，但只过了一个月就随着狂奔而来的西部公民反向故乡逃亡-其中不少人遍体鳞伤，可想而知西部究竟发生了什么骇人听闻的事情。"
  AOR_news.80.a:0"为什么美洲的事情总是那么糟糕？"

  AOR_news.81.t:0"[Get_title_news_header]            沃伦·盖玛利尔·哈定当选美国总统[Get_title_news_pic]"
  AOR_news.81.d:0"美利坚合众国1920年总统大选已经结束。由§B美国北方扬基党派§!提名的扬基党总统候选人-沃伦·盖玛利尔·哈定收获25,478,995张选票与253张选举人票，以压倒性优势彻底赢得总统大选。沃伦·盖玛利尔·哈定成为了美利坚合众国历史上第38位总统，同时也是美国扬基党在联邦政府持续连任的第4位总统。他将于1921年1月30日前入主白宫。\n\n哈定在之前曾经成为威尔逊政府的副国务卿。他的竞选内容包括：§0提高妇女地位§!和§0保障妇女权利§!，承诺§0政府对经济继续改革§!，延续威尔逊总统的§0《美丽国家计划》§!等。不过由于美国政坛冲突的持续加深，关于这些竞选口号的承诺究竟能实现多少，外界表示了普遍的怀疑。\n\n同时，此届美国总统大选激起了南方多地的强烈抗议-这是由于北方政党已经连续4次赢得大选，而并执行非原先美国南北政府默认的总统轮换制；自1908年以来，已经没有一位美国南方政党的总统候选人能够当选总统。南方的激进主义者普遍认为，南方的政治权利正迅速从联邦政府流失。南方的抗议者们要求重新进行总统大选，并呼吁联邦最高法院展开对以当选总统的沃伦·盖玛利尔·哈定的投票调查。"
  AOR_news.81.a:0"现存政治的破坏象征着美国的复兴……"

  AOR_news.82.t:0"[Get_title_news_header]                       美国宣布提高关税[Get_title_news_pic]"
  AOR_news.82.d:0"近日，美国现任总统托马斯.伍德罗.威尔逊在白宫宣布了提高关税的计划。该计划行动后，将会使美国的关税税率从现有的28%起步提升至40%起步，届时，美国将会拥有全球最高的海关关税税率。\n\n虽然该计划由于美国宪法的约束，不涉及到美国南方各州，但由于预计了提高关税带来的连锁反应，南方各州都表达了强烈的抗议。同时英法等国政府也向美国政府表达了自己的质疑。\n\n早在世界大战以前，美国就与英国、法国等大国一直在进行旷日持久的贸易战，而如今全球经济疲惫，美国又保有了相当完整的工业体系，部分政治与经济学家猜测，美国此举是为了完全确立自己在全球的经济霸权而做出的关键一步。"
  AOR_news.82.a:0"这头疯驴又想破坏自由市场了……"

  AOR_news.83.t:0"[Get_title_news_header]                  美国重新调整经济计划[Get_title_news_pic]"
  AOR_news.83.d:0"近日，美国现任总统托马斯.伍德罗.威尔逊在白宫宣布了一项调整经济的法案。美国政府下辖的国有银行（美利坚第三银行）以及由摩根集团所建立的美国大陆银行将会开始印刷一定数量的美元。同时，该法案规定要求，美国所有类型的银行在1920年到1924年间，只能吸收一定数量的英镑与法郎作为银行储备。\n\n目前该法案的公布在美国境内引起了部分恐慌，美国南方尤其激烈。大量的美国南方群体走上街头，抗议联邦政府的霸权行为，并呼吁联邦委员会开展对威尔逊总统的调查。\n\n该法案的公布引爆了全球金融界对于美国经济的讨论，外界普遍认为，美国此举是为了摆脱原先美元-黄金制以及英镑-黄金制对经济带来的不良影响，并借世界经济总体疲惫的情况下，进一步输出自己的经济霸权。同时，也有部分观察家提出了自己的疑问-经历了1919年危机的美国，为什么其政府执行力会突然加强，甚至已经可以到了支配美国外部经济的地步了？"
  AOR_news.83.a:0"妈的，你是要搅的世界天翻地覆不成？"

  AOR_news.85.t:0"[Get_title_news_header]                     中国各省宣布保境安民[Get_title_news_pic]"
  AOR_news.85.d:0"随着中国局势进一步恶化，在中国核心地区之外的诸多中国省份选择中立自保，以避免自身卷入冯国璋与段祺瑞的斗争。\n\n而近期，这些省份则更进一步，纷纷宣布“保境安民”，各省宣称将以全省军事管制状态保卫自己省份的人民与产业，并时刻抵御外省军阀的入侵。而中国专家表示，各省的声明只不过是为了公开敛财，并保存实力的惯用手段。"
  AOR_news.85.a:0"就像德意志战争，是吧"

  AOR_news.86.t:0"[Get_title_news_header]                     中国满洲宣布自治[Get_title_news_pic]"
  AOR_news.86.d:0"近日，奉天省督军（在黎元洪总统治理下的中华民国官方称呼中，督军的实际称呼为“督办”）张作霖宣布支持联省主义，在中国奉天省，吉林省以及黑龙江省竖起了联省自治的大旗，目前，张作霖拥有的奉天军队与关内的中国军队，正在中国山海关进行紧张的对峙。\n\n满洲地区的自治引发了整个远东的震荡-这意味着最后一片没有遭到军阀战火波及的中国土地已不复存在，中国已经陷入到了全面内战与动乱的边缘之中。\n\n不过，远东关系学家普遍认为，张作霖宣布满洲自治的根本目的在于讨好远东的日本政府，并促进日本政府对于满洲的开发，而个人目的在于加强自己的权力，成为名副其实的“满洲王”。"
  AOR_news.86.a:0"皇帝和诸侯的关系就是如此"

  AOR_news.87.t:0"[Get_title_news_header]                      中国四川爆发战争[Get_title_news_pic]"
  AOR_news.87.d:0"在中国火药味愈发浓烈的背景下，点点火星终于在中国四川省点燃了第1颗炸弹。前两天，中国四川省各道的领导人宣布进入紧急状态，并互相指责对方为叛国分子，他们已经发动士兵，四处攻占城镇。\n\n中国的川康总督陈宦一直被东方新闻界人所津津乐道-这是一位年龄适中，充满活力且机智灵活，善于调和军阀之间矛盾的领导者。然而四川危机的爆发使得他众叛亲离，并最终只能龟缩在以重庆为中心的四川三峡山中。\n\n不过，在目前打听到的消息中，除了四川省各道的军阀以外，还有一股由下层士兵以及农民秘密结社所组成的军事组织，正在四川泸县发动暴动，外界普遍怀疑这是中国共产党的红色军队，但也有人认为这不过是一支暴动的农民军，目前，共产国际没有做任何回应。"
  AOR_news.87.a:0"黄种人的山沟大戏"

  AOR_news.88.t:0"[Get_title_news_header]                      中国国会发生骚动[Get_title_news_pic]"
  AOR_news.88.d:0"近日，中华民国的国会选举正式落下帷幕，但其结果却不出为人所料。国会中的实力派社会党一马当先，远远甩开了在其身后的进步党，而曾经名义上的第一大党国民党则只能屈居于第三在野党的位置。\n\n早在投票选举结果公布之前，中国的首都北京就发生了大规模的街头冲突，有大量的黑帮组织以及地痞流氓前往各个党派的国会议员住所，进行挑衅甚至殴打国会议员。随后，中国军队的曹坤将军与北京宪兵司令吴佩孚宣布戒严，北京城的动乱被镇压了下来。然而，当选举结果公布后，现任中华民国大总统黎元洪拒绝签署总统令，以个人声明反对此次国会选举，并要求重新进行大选。北京街头又逐渐骚动起来。\n\n对此局面，实际掌控中国军队的段祺瑞则派兵进驻北京，代替吴佩孚等人进行全城戒严与镇压，而另一个同样掌握中国军队的实力派冯国璋则选择将士兵驻扎在首都外郊，有外界猜测，这是因为冯将军不想与段将军发生正面冲突，而想出的冷静对策。"
  AOR_news.88.a:0"他们是把钢枪当成钢笔了吗？"

  AOR_news.89.t:0"[Get_title_news_header]                   中国甘肃发生大地震！[Get_title_news_pic]"
  AOR_news.89.d:0"1920年12月16日，中国西北的甘肃省发生了一场前所未有的大地震，其破坏力在中国近几百年的历史上史无前例，地震震感遍布全球，就连伦敦地震监察局都监测到了地震相关数据。\n\n根据国际地理协会发表的报告显示，此次地震强度为里氏8.5级，强度仅次于里斯本大地震；震中烈度达到12级之高，超过了里斯本大地震。目前，经过中国相关部门的抢救与勘探，初步确定震源在甘肃省的六盘山，中国官方将此次地震命名为“六盘山地震”。\n\n据报道，中国甘肃省约有2/3的农村房屋倒塌，死亡人数无法完全统计；其中甘肃省朔方道的海原、固源两县遇难与伤亡人数位列全省之最，目前两县已确认死亡的就有8万余人。而中国的其余地区则感受到了不同强度的震感，中国西安的大部分电灯泡被震碎，上海海关钟楼的大钟甚至停止转动。"
  AOR_news.89.a:0"天呐……"

  AOR_news.91.t:0"[Get_title_news_header]                        波兰进军东欧！[Get_title_news_pic]"
  AOR_news.91.d:0"则消息从东欧前线传来-由协约国共同管理下的波罗的-白俄罗斯战区已经同意了波兰的请求，将战区境内的比亚韦斯托克与布列斯特两个地区转交波兰政府管辖；目前，波兰政府已经将军队开进了这两个地区。\n\n由于东欧前线愈发紧张，战区委员会一再推迟所控制地区的全民公投，不过，比亚韦斯托克与布列斯特已经另外分别组织了公投活动-投票结果显示，这两个地区的大部分人支持加入波兰。\n\n对于此次的进军事件，许多媒体都有不同的看法。一部分认为，这次的领土转交行动有利于团结波兰留存协约国，巩固东欧的布尔什维克防线。不过也有其他人认为，波兰的行为实质上是趁东欧陷入乱局之中的粗暴牟利，战区委员会将不属于自己国家的领土转移给他国，将会破坏战区的稳定。"
  AOR_news.91.a:0"小事罢了"

  AOR_news.92.t:0"[Get_title_news_header]                       东欧战区进行改组[Get_title_news_pic]"
  AOR_news.92.d:0"近日，波罗的-白俄罗斯战区委员会宣布已经完成了战区改组计划，并已于前一个月左右举行了全民公投，现在，该计划所规定的法案正式在战区生效。\n\n法案规定，依照全民公投的数据，将原先战区的几个部分分别合并为立窝尼亚、立陶宛、白俄罗斯、爱沙尼亚等4个国家；同时，战区的部分区域因为公投而正式加入波兰。\n\n战区北部的萨列马岛理论为爱沙尼亚所有，但实际由英国军队直接控制，同时英国政府享有对该岛的90年租借权。\n\n战区的联席参谋会议负责人宣称，战区的改组将会是民主在东欧的伟大胜利，同时会使反布尔什维克的堡垒更加牢固。"
  AOR_news.92.a:0"蛋糕终于划分好了，但没有打破枷锁"

  AOR_news.93.t:0"[Get_title_news_header]                       东欧战区进行改组[Get_title_news_pic]"
  AOR_news.93.d:0"近日，波罗的-白俄罗斯战区委员会宣布已经完成了战区改组计划，并已于前一个月左右举行了全民公投，现在，该计划所规定的法案正式在战区生效。\n\n在战区政府审议公投数据后，战区政府作出如下决定：在原战区的立陶宛、白俄罗斯等地区分别设立自治区，统辖在一个统一的联合政府中；同时，爱沙尼亚、立窝尼亚、库尔兰与瑟米加4个地区合并为一个由里加德意志人临时政府统治的联邦，目前该联邦的正式名称对外公布为“奥斯特兰德”。\n\n战区北部的萨列马岛理论为奥斯特兰德联邦所有，但实际由英国军队直接控制，同时英国政府享有对该岛的120年租借权。\n\n战区的联席参谋会议负责人宣称，战区的改组将会是民主在东欧的伟大胜利，同时会使反布尔什维克的堡垒更加牢固。不过在该计划完成后，战区的许多地区仍然爆发了大规模骚动。"
  AOR_news.93.a:0"偌大的地区，被日耳曼人人独吞"

  AOR_news.94.t:0"[Get_title_news_header]                         东欧战区进行改革[Get_title_news_pic]"
  AOR_news.94.d:0"近日，波罗的-白俄罗斯战区公布了他们的改革计划，该计划引发了战区与国际上的震动。\n\n在计划中，战区对所有占领的地区统一设立自治区，并建立自治区政府实行自治管辖。但是，自治区的最高立法权以军事管辖权、警察调动权都掌握在战区委员会手中。同时，战区委员会还宣称，战区将会以一种常态化的方式存在于东欧大地上，直到完全清除布尔什维克势力为止。\n\n该计划在战区内部引发了激烈的抵触和骚动，战区部队已经进入这些骚乱地区进行镇压，而俄国布尔什维克政府与法国政府则强烈谴责这项计划。"
  AOR_news.94.a:0"光靠枪和铁蹄可威慑不住人民！"

  AOR_news.95.t:0"[Get_title_news_header]                       东欧战区解体！[Get_title_news_pic]"
  AOR_news.95.d:0"随着东欧危机的愈演愈烈，波罗的-白俄罗斯战区终于迎来了他的结局——战区的全面内战与革命。\n\n目前，战区北部已经完全被当地武装所控制，爱沙尼亚地区宣布成立爱沙尼亚民主共和国，立窝尼亚的斯拉夫武装则控制了里加这座重要城市城市及周边附属地区。战区中部则陷入了全面动乱，战区的大量部队逃亡到立陶宛的港口城市中。\n\n战区的混乱引发了俄国布尔什维克政府以及波兰政府的介入，俄国布尔什维克的红军快速抢占了白俄罗斯的绝大部分领土，以及乌克兰的一部分地区， 而波兰军队取得的进展远不如红军，并在白俄罗斯地区遭遇了白俄罗斯人的强烈抵抗，同时，德意志的普鲁士自治政府趁机抢占了梅梅尔。"
  AOR_news.95.a:0"丑陋的怪物终于死了，流出一地香油"

  AOR_news.96.t:0"[Get_title_news_header]                       中国南京联合保定政府！[Get_title_news_pic]"
  AOR_news.96.d:0"近日，位于中国南京的冯国璋将军公开通电全国，支持以徐世昌代总统、曹锟将军为首的原北京中央-即现在政府驻地位于保定的中华民国政府。\n\n不久后，曹锟将军宣布欢迎冯国璋将军的支持，中华民国临时国会在保定推举冯国璋为副总统，并决定将中华民国临时首都迁往南京。\n\n外界普遍猜测，冯国璋与保定的联合，是为了抵御北方段祺瑞军队的南下，并为直系军阀夺取更多的利益，以增强自身的实力与合法性。\n\n与此同时，随着保定政府的终结，原先仍驻留在中国各地，且明确服从于中央政府的中国军队，纷纷陷入混乱。段祺瑞正在中国东南地区收服愿意投靠于他的军阀；满洲的张作霖也收编了不少军队，并稳定了满洲局势-不过，收编了绝大部分中央军队的，仍然是冯国璋和他的南京政府。"
  AOR_news.96.a:0"冯国璋吃到了最肥的鸭子"

  AOR_news.97.t:0"[Get_title_news_header]                      中国内战全面爆发！[Get_title_news_pic]"
  AOR_news.97.d:0"昨天，在北京及周边地区的段祺瑞军队已经全面开动，向中国的保定以及天津等地发起进攻。冯国璋将军的军队以及曹锟的军队则全力抵抗。中国的内战全面爆发。\n\n与此同时，在中国的南方，控制着广州等省份的华南军阀，一边与西南的中国国民党政府展开充满火药味儿的对峙，一边又宣布将要北上讨伐，复兴中华。中华帝国已经狼烟四起，大量的外国侨民正在逃离这片古老而饱经蹂躏的土地。"
  AOR_news.97.a:0"巨龙又一次撕碎自己的身体"

  AOR_news.98.t:0"[Get_title_news_header]                     东欧战区解体！[Get_title_news_pic]"
  AOR_news.98.d:0"随着东欧危机的愈演愈烈，波罗的-白俄罗斯战区终于迎来了他的结局——战区的全面内战与革命。\n\n目前，战区北部已经完全被当地红色武装所控制，爱沙尼亚地区宣布成立红色爱沙尼亚，立窝尼亚的红色斯拉夫武装则控制了立窝尼亚大部分地区。战区中部则陷入了全面动乱，战区的大量部队逃亡到立陶宛的港口城市中。\n\n战区的混乱引发了波兰政府的介入，波兰军队快速抢占了白俄罗斯的大片领土以及乌克兰的一部分地区；同时，德意志的普鲁士自治政府趁机抢占了梅梅尔。"
  AOR_news.98.a:0"丑陋的怪物终于死了，但迎来了红色魔鬼"

  AOR_news.99.t:0"[Get_title_news_header]                       红色东斯拉夫成立！[Get_title_news_pic]"
  AOR_news.99.d:0"波罗的-白俄罗斯军管区，早在其行政人员被彻底赶出立陶宛后已不复存在，取而代之的是多个信奉布尔什维克主义，并由布尔什维克政党统治的东欧小国。最新消息，由立陶宛地区的“联合苏维埃”组织所召开的所谓东欧大会已经落下帷幕，会议将成立一个在波罗的-鲁塞尼亚地区前所未有的国家-东斯拉夫。\n\n这个共和国涵盖了立陶宛、拉脱维亚（包括立窝尼亚）、爱沙尼亚，以及白罗斯的大部分地区。新成立的东斯拉夫苏维埃执行委员会发表声明，宣布该国家将会以加盟国的形式加入苏联，但同时保留了其他苏联加盟国，未曾被莫斯科布尔什维克赋予的一些权利。\n\n东斯拉夫的成立是个壮举，这个国家囊括了广义上的鲁塞尼亚人、德意志人、犹太人等多个民族，并且所有民族身份地位一律平等-这在波罗的-鲁塞尼亚历史上的政权中是从来没有过的。\n\n国际上不少媒体对该政权的成立表示担忧，一是该政权由布尔什维克统治，势必会被当做苏联向欧洲渗透以及侵略的桥头堡；其二便是对一个信誓旦旦要求民族平等，但困难重重的统合红色国家社会稳定的疑问。"
  AOR_news.99.a:0"毫无疑问，赤匪又赢了一次"

  AOR_news.100.t:0"[Get_title_news_header]                         东欧波罗的诸国灭亡 [Get_title_news_pic]"
  AOR_news.100.d:0"东欧的乱局终于迎来了终结，面对层出不穷的叛乱以及其他国内的不稳定因素，新生的东欧各国选择了最为令人可耻的方式-解散政府并逃跑来摆脱自己的烂摊子。\n\n随着东欧波罗的国家的总崩溃，波兰以及苏联开始进一步控制这些国家。近日，波兰军队已经成功占领了考纳斯以及维尔纽斯，并向着立陶宛为数不多的港口城市进发；波罗的国家的红色游击队宣布成立苏维埃政权，并宣布以加盟国形式加入苏联，整个波罗的地区被两个国家彻底瓜分殆尽。"
  AOR_news.100.a:0"虽然可悲，意料之中"

  AOR_news.101.t:0"[Get_title_news_header]                         中国华南宣布成立广州政府 [Get_title_news_pic]"
  AOR_news.101.d:0"中国已经陷入到了全面动荡之中，而华南地区的独立无疑是为混乱的局面再添上了一把烈火。近日，以广东督办陈炯明为首的中国南方军阀，在广州成立了一个新的中国政府-这个政府拥立南逃而来的中华民国总统黎元洪为总统，并仍然称自己为“中华民国”。\n\n熟悉东方局势的报社以及学者对此做出了如下解释：广东军阀陈炯明的行为早有表现-陈本人是一个外表刚毅，但是性格古怪，信奉类似于美国联邦制制度的开明将军，从这一点上看，他与其他军阀截然不同；但同时，陈炯明又放任中国华南地区的军阀为自己谋权谋利，并时刻扩大广州在中国的影响力。\n\n实际上，他从一开始就在利用其他军阀为自己造势，而黎元洪的加入更是给了他无与伦比的合法性，因此，他改造中国的计划，终于在这乱局之中得以实现。"
  AOR_news.101.a:0"故事讲的很好"

  AOR_news.102.t:0"[Get_title_news_header]                        昆明政府与广州政府爆发战争 [Get_title_news_pic]"
  AOR_news.102.d:0"就在中国广州政府成立不久后，被国民党以及原先云南部队的激进派所控制的云贵两省，也宣布成立新的政府，他们同时也打着“中华民国的旗号”，不过，他们是信奉孙中山三民主义的“国民政府”。\n\n自孙中山被云南军阀唐继尧接纳以来，这位中国共和名义缔造者的伟大政治家，便利用自己的思想，一次又一次的冲击唐继尧统治的根基，并最终利用政变和武力将其彻底击垮。\n\n孙中山与陈炯明相似，他们都要改造如今的中国。不过，两个政权的边境冲突似乎引发了不可想象的火花，目前，两个政权的冲突愈加激烈，双方在云贵高原发生了大规模的战斗，目前尚不知谁能获胜。"
  AOR_news.102.a:0"乱，太乱了"

  AOR_news.103.t:0"[Get_title_news_header]                        奉天政府进入山海关 [Get_title_news_pic]"
  AOR_news.103.d:0"趁着中国内地陷入前所未有的战火时，在中国山海关之外的张作霖奉天政府，不出人意料的宣布“光复民国，南下讨伐”，派遣大量中国满洲士兵进攻山海关,目前，满洲士兵已经攻破了山海关，并向内陆进发。\n\n张作霖或许是这次中国内乱的最大获益者-他既实际获得了先前中国总统袁世凯的空头支票，又得到了日本人的支持，获得了大量的经济以及军火援助。国际媒体们已经得到了一个很清晰明确的事实，张作霖的入关，实际上就是为日本完全独占中国做的准备，毕竟如果没有日本的支持，张作霖仅凭着军队而不是满洲的工业，是难以与内地的军阀们抗衡的。"
  AOR_news.103.a:0"从南到北，中国容不下一片平静的土地"

  AOR_news.104.t:0"[Get_title_news_header]                     中国西南宣布成立昆明政府 [Get_title_news_pic]"
  AOR_news.104.d:0"随着中国局势的日益动荡，近日，中国西南的云南以及昆明两省，即原先中国的云贵总督管辖地区，其控制者，中国云南省临时政府首脑的孙中山，宣布成立国民党云南政府，并同样打出了“光复中华民国”的口号。\n\n孙中山作为中国共和革命的先驱，其所领导的革命党推翻了清帝国的统治，建立了中华民国。然而，中国的国运却随着袁世凯等人的决定而起伏，最终他的革命党四分五裂，本人也被迫前往中国西南军阀唐继尧的府下生存。\n\n早在一年前，由于重庆英舰事件带来的影响，军阀唐继尧被其激进派将领蔡锷所推翻，并流亡贵州；以共和信仰为著称的蔡锷将军吸引了大量中国民主派前往云南。现在，蔡锷将云南的军政大权交给了孙中山以及他的国民党手中，他们似乎意图再次发动一场席卷中华的革命。"
  AOR_news.104.a:0"共和国的缔造者却要亲手推翻共和国"

  AOR_news.105.t:0"[Get_title_news_header]                     中国红军宣布成立四川政府 [Get_title_news_pic]"
  AOR_news.105.d:0"近日，四川极度惨烈的混战终于落下帷幕，从四川逃出的中国以及其他国际报社纷纷带来了一则重磅消息-四川地区已经被中国共产党红军所控制。\n\n中国这支红军的来历极其模糊，但可以知道的是，这支红军的工人人数十分稀少，绝大部分都是先前中国军阀的士兵以及当地农民。现在，中国红军已经在四川成都宣布成立了“四川工农政府”，并采取类似于俄国布尔什维克的苏维埃政治结构来推动政府运行。\n\n无论这支共产党的队伍到底是什么来历，但可以肯定的是，四川的大量富商以及地主都在逃亡-以便躲避或许即将而来的大规模清算，以及农村土地改革运动。"
  AOR_news.105.a:0"我勒个天，农民组成的共产党？"

  AOR_news.106.t:0"[Get_title_news_header]                      昆明政府统一中国华南 [Get_title_news_pic]"
  AOR_news.106.d:0"中国主要战场的华南战场，终于以昆明政府的胜利而告终，以孙中山为首的昆明军队彻底攻占了整个两广地区以及湖南省，粤海关大楼插上了象征昆明国民党政府的青天白日旗。\n\n原先控制两广以及湖南的进步党成员在国民党军队深入腹地前就已经开始逃亡，而陈炯明则选择了在广州临时政府驻地的办公室内自杀；其他拥护陈炯明的文官以及将军们则想出了各种办法逃脱厄运-自杀、投诚、携款潜逃，无所不有。\n\n如今的昆明政府已经统一了中国的华南地区，成为了一股完全不输北方军阀势力的政权。现在，中国北方的统治者们该做何打算？"
  AOR_news.106.a:0"再造共和，指日可待"

  AOR_news.107.t:0"[Get_title_news_header]                     广州政府统一中国华南 [Get_title_news_pic]"
  AOR_news.107.d:0"中国主要战场的华南战场，终于以广州政府的胜利而告终，以陈炯明为首的广州军队彻底攻占了整个云贵地区，昆明云贵总督府插上了象征广州政府的联省旗。\n\n控制原云南昆明政府的孙中山，以及其党派国民党，纷纷在广州军队进入昆明前后四散而逃；而孙中山本人则静静地待在由昆明政府开办的军校里。孙中山本人已经被扣押并送往广州，但陈炯明应该会慎重的对待这位共和的先驱；而以廖仲恺为首的国民党激进派则绕道英属缅甸逃亡暹罗，目前下落不明。\n\n如今的广州政府已经统一了中国的华南地区，成为了一股完全不输北方军阀势力的政权。现在，中国北方的统治者们该做何打算？"
  AOR_news.107.a:0"联邦制难道在中国要成了？"

  AOR_news.108.t:0"[Get_title_news_header]                     中国昆明政府宣布北伐 [Get_title_news_pic]"
  AOR_news.108.d:0"今日，孙中山在昆明政府驻地前发表了长篇演讲，宣布将会北上进行北伐，以此光复民国，并实行新理念的三民主义，以此再造共和。目前，昆明政府的大量军队已经开赴粤汉铁路前线，该消息通过增设在广州的大功率无线电台传遍世界。同时，昆明政府改名为“国民革命政府”，并将政府驻地陆续迁往广州。\n\n如今的中国迎来了南北对决的时刻，也是又一个决定中国的前途与命运的一刻，到底是北方军阀的野蛮武力得胜，还是南方孙中山等人的理想得胜，尚未定局。"
  AOR_news.108.a:0"所有人都在屏住呼吸，聆听中国的呐喊"

  AOR_news.109.t:0"[Get_title_news_header]                     中国广州政府宣布北伐 [Get_title_news_pic]"
  AOR_news.109.d:0"今日，陈炯明在广州政府临时驻地前发表了长篇演讲，宣布将会北上进行北伐，以此光复民国，并实行伟大的联省计划。目前，广州政府的大量军队已经开赴粤汉铁路前线，该消息通过增设在广州的大功率无线电台传遍世界。\n\n如今的中国迎来了南北对决的时刻，也是又一个决定中国的前途与命运的一刻，到底是北方军阀的野蛮武力得胜，还是南方陈炯明等人的理想得胜，尚未定局。"
  AOR_news.109.a:0"所有人都在屏住呼吸，聆听中国的呐喊"

  AOR_news.110.t:0"[Get_title_news_header]                      南京政府在大战中获胜！ [Get_title_news_pic]"
  AOR_news.110.d:0"中国中心地区的战火终于开始熄灭下去，不出所料，掌控着中国经济重要地区以及中国大部分人口的冯国璋势力取得了胜利。目前，段祺瑞的皖系军队已经四散而逃，其本人也早已秘密返回北京，并借助东交民巷的使馆区避难。\n\n直系与皖系之间的战争已经结束，但整个中华大地依然处于风雨飘摇之中。目前，冯国璋已经在南京宣布成立“中华民国临时政府”，并宣称该政府将不遗余力地完成统一中国的伟业，目前，中国的南方以及满洲、西北地区仍然存在着大量所谓中立或互相争夺的军阀，距离中国真正的统一还需要一段时间。"
  AOR_news.110.a:0"亚洲最大的战争结束了？"

  AOR_news.111.t:0"[Get_title_news_header]                     北京政府在大战中获胜！ [Get_title_news_pic]"
  AOR_news.111.d:0"中国中心地区的战火终于开始熄灭下去，曾经让国际媒体持悲观态度的段祺瑞，最终自西北而下，依靠数量庞大的军队取得了胜利。目前，冯国璋以及曹锟的南京军队已经四散而逃，冯国璋以及曹坤早以前往上海公共租界避难，前来采访他们的中国以及国际记者络绎不绝。\n\n直系与皖系之间的战争已经结束，但整个中华大地依然处于风雨飘摇之中。目前，段祺瑞已经在北京宣布成立“中华民国执政府”，并宣称该政府将不遗余力地完成统一中国的伟业，目前，中国的南方以及满洲、西北地区仍然存在着大量所谓中立或互相争夺的军阀，距离中国真正的统一还需要一段时间。"
  AOR_news.111.a:0"亚洲最大的战争结束了？"

  AOR_news.112.t:0"[Get_title_news_header]                     美国联邦政府赢得内战！ [Get_title_news_pic]"
  AOR_news.112.d:0"随着美利坚联盟国政府的最后一支在序民兵部队投降，美国联邦政府及其联邦军队已经彻底占领了整个美国南方；而美利坚联盟国的诸多领导人物，在此之前就成批向联邦政府投降，亦或随着联盟国总统加纳乘船逃往他处。联盟国两院已于一周前宣布解散政府并集体投降。\n\n历时两年的美利坚内战结束了。虽然战争时间并没有人们预料的那样漫长，但这次战争却对美国南方造成了无法想象的破坏，大量新式武器的运用使得美国南方遍地瓦砾，哀鸿遍野，而北方自身也蒙受了巨大的人员损失以及难以想象的军费开支。\n\n如今的联邦军队已经控制了南方的各大城市。联邦政府宣布对南方11个州进行无限期的军事管制，大量民众对联邦政府的下一步措施普遍采取观望态度。由于南方的农业受到了极大破坏，联邦政府宣布开展对南方的粮食救济工作。尽管南北的战争已经结束，但美国的西部地区仍然在混乱之中。"
  AOR_news.112.a:0"一个怪胎重获新生"

  AOR_news.113.t:0"[Get_title_news_header]                     国民革命政府统一中国南北！ [Get_title_news_pic]"
  AOR_news.113.d:0"从南到北，从炎热难耐的海南岛到天寒地冻的满洲，如今的中国主要部分，都已通通团结在了青天白日旗之下-他们都已经被广州的国民革命政府所控制了。\n\n叱咤风云的中国北洋政府在这前所未有的浩劫中灰飞烟灭，连带着冯国璋、段祺瑞、曹锟等等将军以及原先如陈炯明的政府高官们-他们已经通通的被扫进了中国的过往烟云里了。而中国人成功抵御了满洲军阀以及日本人的进攻，第二次在清帝国灭亡后捍卫了自己的主权。孙中山等中国国民党人并未对这前所未有的胜利感到迟钝，他们已经到达了曾经中华民国的革命中心-南京。\n\n孙中山在南京发表了一系列群众性演说，宣告了民国“光复”。同时，原先已经在广州建立临时政府的国民革命政权，宣布在南京组建新的临时政府，并全盘移植早在广州时设置的国会制度。目前该政府的临时大总统仍然由孙中山担任，但孙中山承诺将在半年后举行全民选举，声称只要不反对革命的民主政党都可以参与国会选举以及总统选举。"
  AOR_news.113.a:0"太阳升起，鲜红的光芒铺满中国大地"

  AOR_news.114.t:0"[Get_title_news_header]                      联省革命政府统一中国南北！ [Get_title_news_pic]"
  AOR_news.114.d:0"从南到北，从炎热难耐的海南岛到天寒地冻的满洲，如今的中国主要部分，都已通通团结在了联省旗之下-他们都已经被广州的联省革命政府所控制了。\n\n叱咤风云的中国北洋政府在这前所未有的浩劫中灰飞烟灭，连带着冯国璋、段祺瑞、曹锟等等将军以及原先如孙中山等革命家们-他们已经通通的被扫进了中国的过往烟云里了。而中国人成功抵御了满洲军阀以及日本人的进攻，第二次在清帝国灭亡后捍卫了自己的主权。陈炯明等进步党人并未对这前所未有的胜利感到迟钝，他们已经到达了曾经中华民国的革命中心-南京。\n\n陈炯明在南京发表了一系列群众性演说，宣告了联省主义的胜利。同时，原先已经在广州建立临时政府的联省革命政权，宣布在南京组建新的临时政府。目前该政府的临时大总统仍然由黎元洪担任，但陈炯明承诺将在半年后举行全民选举与政府改革，声称只要不反对革命的民主政党都可以参与国会选举以及总统选举。但与此同时，关于这个联邦制中国的未来，还有太多的事情没有定下来。"
  AOR_news.114.a:0"天下为公，人民主权"

  AOR_news.115.t:0"[Get_title_news_header]                     北京政府占领满洲 [Get_title_news_pic]"
  AOR_news.115.d:0"随着战事的逐步进行，北京政府的段祺瑞军队已经占领了满洲的绝大多数城市。拥有日本支持的张作霖军队彻底被击溃；而张作霖本人也选择扔下他的军队，逃往哈尔滨的日本使馆区，但目前下落不明。\n\n拥有大量工业设施以及大量武器装备的，甚至吸纳了一部分日本关东军的满洲奉天政府，遭到了中国北京政府的毁灭性打击，这是让世界都始料不及的事-但有一点可以知道：中国人第一次凭着自己的武器和士兵，击败了不可一世的日本和他的跟随者，哪怕有其他第三国的支持。不过，南满洲的日本企业、中东铁路以及亚瑟港地区都没有在战争中被强制夺取。\n\n日本方面，曾经在北京军队夺取奉天后保持了相当长时间的静默，但现在，日本政府却以外交公告的方式，公开承认了北京政府为唯一的中国合法政府，这让我们不由的怀疑段祺瑞在几年前与日本人的接触，是否达成了不可告人的秘密。"
  AOR_news.115.a:0"消灭了一个仆人，迎来了又一个奴才"

  AOR_news.116.t:0"[Get_title_news_header]                    南京政府占领满洲 [Get_title_news_pic]"
  AOR_news.116.d:0"随着战事的逐步进行，南京政府的冯国璋军队已经占领了满洲的绝大多数城市。拥有日本支持的张作霖军队彻底被击溃；而张作霖本人也选择扔下他的军队，逃往哈尔滨的日本使馆区，但目前下落不明。\n\n拥有大量工业设施以及大量武器装备的，甚至吸纳了一部分日本关东军的满洲奉天政府，遭到了中国北京政府的毁灭性打击，这是让世界都始料不及的事-但有一点可以知道：中国人第一次凭着自己的武器和士兵，击败了不可一世的日本和他的跟随者，哪怕有其他第三国的支持。不过，南满洲的日本企业、中东铁路以及亚瑟港地区都没有在战争中被强制夺取。\n\n日本方面，曾经在南京军队夺取奉天后保持了相当长时间的静默，但现在，日本的关东军却在中国满洲与南京军队展开了紧张的对峙，日本因干涉中国而滞留在南满洲的关东军，与南京军队爆发了大量冲突。而英国则呼吁双方保持克制-在此之前，英国已经承认南京政府为中国唯一的合法政府。并据消息人士称，英国早在中国内战开始之时便向南京政府提供了大量援助"
  AOR_news.116.a:0"英国的斗牛犬驱逐了日本的看门狗"

  AOR_news.117.t:0"[Get_title_news_header]                      国民革命政府统一全中国！ [Get_title_news_pic]"
  AOR_news.117.d:0"随着中华帝国的最后一个军阀势力被消灭殆尽，一面崭新的旗帜-青天白日满地红的中华民国国旗，被彻底的，也但愿能够永久地覆盖在这片拥有1000多万平方公里、4亿人口的土地上。\n\n当前的中国完全被中国国民党所控制，其首都位于南京。依据国民党主席孙中山的指示，中国将会在未来的20年内经过几个阶段，并最终建设成一个民有、民治、民享，贯彻新理论的三民主义的新中国。而在这之后的一段时间内，中华民国国会将继续履行职责，包括制定宪法、举行选举等活动仍然进行-但是国民党将会半永久性的占据半数席位，并且中华民国国民革命军仍然属于国民党直接控制并指挥。\n\n这个经历过多次大战和内战，千疮百孔的中国，将会在国民党的统治下焕发出怎样的生机？全世界的目光被再次被再次引向中国。收回租界、撕毁条约、改革土地制度、发展工业，这个国家的下一步行动在哪，全世界都翘首以盼。"
  AOR_news.117.a:0"东方巨龙映衬青天，在白日中崛起"

  AOR_news.118.t:0"[Get_title_news_header]                     联省革命政府统一全中国！ [Get_title_news_pic]"
  AOR_news.118.d:0"随着中华帝国的最后一个军阀势力被消灭殆尽，一面崭新的旗帜-白井蓝天满地红的中华联省共和国国旗，被彻底的，也但愿能够永久地覆盖在这片拥有1000多万平方公里、4亿人口的土地上。\n\n当前的中国完全被中国进步党所控制，其首都位于南京。依据进步党主席陈炯明的指示，中国将会在未来经过几个阶段，并最终建设成一个民有、民治、民享，自治、贯彻联省主义的新中国。中华民国的联省会议也建立了起来，其职责包括制定联合宪法、举行代表-但是各地相当一部分的旧官僚机构仍然存在，联省军队也没有被国家统一领导，推动政治以及军事改革，对于这个新生的国家来说，颇有难度。\n\n这个经历过多次大战和内战，千疮百孔的中国，将会在进步党的统治下焕发出怎样的生机？全世界的目光被再次被再次引向中国。收回租界、撕毁条约、改革土地制度、发展工业、彻底建立联邦制度，这个国家的下一步行动在哪，全世界都翘首以盼。"
  AOR_news.118.a:0"东方巨龙在合众巨浪中崛起"

  AOR_news.119.t:0"[Get_title_news_header]                     北京政府统一全中国！ [Get_title_news_pic]"
  AOR_news.119.d:0"随着中华帝国的最后一个地方军阀被吞并，古老的中国恢复了他原本的模样-那面已经飘扬了十几年的五色旗依旧飘扬在拥有1000多万平方公里、4亿人口的土地上，不过，中国似乎将再也没有分裂-这面五色旗只代表着一个政府：中国北京政府。\n\n北京政府的首脑段祺瑞依旧将中国首都定在了古老的北京。在完成了新政府的各项事宜后，段祺瑞宣布改革中华民国国会，并即将召开第一届新国会。新国会将会自由吸纳地方选举的民意代表-但其职权极其稀少，几乎可称为只有请愿的权利；因为真正的权力掌握在可以修改宪法的中华民国政治委员会，以及实际控制军队的军事委员会中，而段祺瑞同时担任这两个委员会的委员长。这两个委员会也只由北京政府的军人所担任。\n\n北京政府已经公布的许多改革计划让人充满疑虑。北京政府宣称将会按照中华传统精神，以及西方先进之文明重塑国人品格-然而，该项政策却被北京教育界批评为尊孔复古的复刻；北京政府也颁布了新的地方民政军事改革计划，宣布将废除省份，将军权统一收归军事委员会-但是段祺瑞手握兵权的大将们是否能够听从他的话，还是一个疑问。\n\n但无论如何，内战已经结束，一个统一的中国，终于展现在世人眼前，中国人都盼望可以得久违的休养生息。"
  AOR_news.119.a:0"五色不褪，中华雄立天地间"

  AOR_news.120.t:0"[Get_title_news_header]                      南京政府统一全中国！ [Get_title_news_pic]"
  AOR_news.120.d:0"随着中华帝国的最后一个地方军阀被吞并，古老的中国恢复了他原本的模样-那面已经飘扬了十几年的五色旗依旧飘扬在拥有1000多万平方公里、4亿人口的土地上，不过，中国似乎将再也没有分裂-这面五色旗只代表着一个政府：中国南京政府。\n\n南京政府的首脑冯国璋将中国首都定在了南京。在完成了新政府的各项事宜后，冯国璋宣布改革中华民国国会，并即将召开第一届新国会。新国会将会自由吸纳地方选举的民意代表；但据相关消息称，南京政府内部实际上已经决定了第一届国会的投票内容-冯国璋等人实际控制的社会党，将会获得90%以上的国会席位，而这种优势几乎将会延续下去，在野人士也无法干涉南京政府的政治操弄。\n\n南京政府已经公布的许多改革计划让人充满疑虑。南京政府宣称将会按照中华传统精神，以及西方先进之文明重塑国人品格-然而，该项政策却被北京教育界批评为尊孔复古的复刻；南京政府也颁布了新的地方民政军事改革计划，宣布将废除省份，将军权统一收归军事委员会-但是冯国璋手握兵权的大将们是否能够听从他的话，还是一个疑问。\n\n但无论如何，内战已经结束，一个统一的中国，终于展现在世人眼前，中国人都盼望可以得久违的休养生息。"
  AOR_news.120.a:0"五色不褪，中华雄立天地间"

  AOR_news.121.t:0"[Get_title_news_header]                      北京政府消灭华南广州政权 [Get_title_news_pic]"
  AOR_news.121.d:0"中国伟大的北伐战争已经按下了暂停键，他的执行者再也无法对抗来自北方的重压。北京政府的军队已经将华南地区的所有城市尽数收下。而陈炯明则选出了最光荣的方式-他在自己最后的逃亡驻地选择了自杀；段祺瑞则明确发出指示，在广州体面的安葬了这位怀揣合众理想的革命家。\n\n由于华南地区的实际行政结构与北方长期不同，价值大量跟随联省政府的南方文官纷纷逃亡，北京政府还需要一段时间才能使华南的行政机构运转正常；现阶段，中国华南地区仍然处于北方的军事控制状态。\n\n不过，北京军队却在华南已经被彻底占领后，陷入了巨大的恐慌-一股不知名的势力开始在华南四处出击，尝试刺杀北京政府军队中的高级将领，人们普遍怀疑，这是国民党的陈其美，以及曾经服从于华南政权的王亚樵联合组成的刺杀队；虽然消息并未得到证实，但北京政府已经单方面宣布国民党以及进步党违法，并派出军警收捕仍然保留在此两党内的党员。"
  AOR_news.121.a:0"革命的火焰熄灭了"

