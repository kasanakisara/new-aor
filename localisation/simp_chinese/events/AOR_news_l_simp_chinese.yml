  AOR_news.2.t:"[Get_title_news_header]                     比荷卢陷入紧张对峙[Get_title_news_pic]"
  AOR_news.2.d:0"比荷卢联合自伦敦倡议创立之初，就意在维护低地地区的和平与稳定。它开创性的采用了一种独特的三等分议会制度，即每三年由三个国家轮流担任联邦主席团，并拥有最高的决策权。\n近日，比荷卢政府迎来了它的第一次换届选举，政府理应按宪法由荷兰方面将权力交接给卢森堡主席团，但是比利时政府却对此提出了异议，认为卢森堡的人口和经济规模与另外两邦相差悬殊，没有能力来管理联邦的事务。比利时政府要求修改三等分议会制度，让比利时和荷兰方面拥有更多的话语权和资源分配，并且修改卢森堡执政的时长。荷兰方面并未做出过多的表态，但也一再拖延交接权力的具体时间。虽然我们尚不清楚具体细节，但可以肯定是，此举导致了联合陷入了一场前所未有的换届危机。\n卢森堡政府对此表示强烈不满，并指责比利时和荷兰两国严重违反了宪法的原则，企图剥夺卢森堡在联合内的权力。卢森堡呼吁国际社会和国际联盟对此事进行调查和干预，并保障卢森堡的尊严和联合的绝对公平。据可靠消息，国联已经派出了一支观察团前往联合进行调查，并表示将尽快提出解决方案。\n目前，比荷卢的局势仍然紧张，三邦之间的关系也处于冰点。比荷卢民众对此感到深感不安，认为这可能会是风雨欲来的信号。比利时和卢森堡地区也在近期发生了多起恐怖分子袭击事件，在街头煽动着分裂主义情绪。"
  AOR_news.2.a:0"荷兰佬还能干的成什么事？"
  
  AOR_news.3.t:"[Get_title_news_header]                     阿根廷内战尘埃落定[Get_title_news_pic]"
  AOR_news.3.d:0"  在历经了近多年的血腥内战后，阿根廷地区工人会今天对全世界宣布了他们的胜利，彻底打败了军政府和其他反动势力，建立了一个以新大陆工团主义为思想纲要的地区，这是南美洲历史上第一次获得胜利的无政府主义革命，也是全球范围内最激进的工人运动之一。\nFORA的领导人西蒙·拉多维茨基在首都布宜诺斯艾利斯的总工会大楼前发表了胜利演说，他高呼“工人万岁!阿根廷万岁!无政府主义万岁!”并宣布将在不久之后召开第一次工人大会，他还呼吁南美洲的其他无政府组织团结起来，共同反抗英法帝国主义对新大陆的压榨和奴役，组织总罢工力图实现真正的自由和平等。\n然而，对于这一历史性的事件，英国、法国都对此保持沉默，或者只是简单地表示关注，并宣布将在几日后从“暴徒”的窝点撤走一切外交使馆。且正在进行社会主义革命的俄国也没有给予任何支持或者承认。邻国巴西、智利、乌拉圭宣布将于一周后展开交流峰会，抵御恐怖势力的渗透。"
  AOR_news.3.a:0"作为庆祝，今晚小酌一杯!"
  AOR_news.3.b:0"暗地里送去祝贺"
  AOR_news.3.c:0"哪里凉快哪呆着去!"
  
  AOR_news.4.t:"[Get_title_news_header]                     马西米连诺一世与世长辞[Get_title_news_pic]"
  AOR_news.4.d:0"  墨西哥第二帝国的皇帝马西米连诺一世于昨日在皇宫中去世，享年89岁。在墨西哥王室内部，他的死亡引发了一场继承危机，因为他没有留下任何合法的子嗣，他的两个养子阿古斯丁·德·伊图尔比德·格林和萨尔瓦多·德·伊图尔比德·马尔赞都声称自己是合法的继承人，而奥地利的哈布斯堡家族和比利时王国也对墨西哥的王位有所觊觎。\n马西米连诺一世与比利时的夏洛特公主没有生育任何孩子。他后来收养了两个墨西哥贵族家庭的孩子作为自己的继承人。\n然而，在马西米连诺去世后，两个养子之间爆发了激烈的争夺战。双方互不相让，墨西哥全国陷入了分裂和混乱，国家已经进入了紧急状态。与此同时，奥地利和比利时也在暗中插手这场继承危机。奥地利认为马西米连诺没有合法的后代，因此墨西哥王位应该归还给哈布斯堡家族。比利时则认为夏洛特公主是马西米连诺唯一的合法配偶，因此墨西哥王位应该由她的亲属继承。两国都派遣了使者前往墨西哥，试图影响局势的发展。\n可以预见，这场继承危机对新大陆的影响是重大的。许多人担心这会引发一场新的内战或者外部干涉，危及到墨西哥第二帝国近60年来建立起来的稳定和繁荣。也有人希望这会给墨西哥带来一次改革和民主化的机会，结束专制和贵族统治。"
  AOR_news.4.a:0"人固有一死…"

  AOR_news.5.t:"[Get_title_news_header]                     夏洛特摄政[Get_title_news_pic]"
  AOR_news.5.d:0"  在墨西哥第二帝国皇帝马西米连诺一世逝世的两个月后，该国陷入了前所未有的动荡和混乱。今日上午，皇后夏洛特宣布进行临时摄政，直到“国家的危机解除”，并试图与法国恢复外交关系，以寻求支持和承认。\n据悉，墨西哥工人总联合会，这一无政府主义与工团主义组织，在混乱中借机起兵，占领了国内多个要点，他们宣布为了一个崭新的新大陆而战，并呼吁全国各地的工人与学生加入他们的革命行列。\n与此同时，墨西哥其他地区也有不少的人蠢蠢欲动，意图在这次危机中谋权篡位。据传闻，墨西哥北部的一些州长和将军已经与美国达成了秘密协议，准备宣布独立或并入美国。墨西哥南部的一些原住民部落也趁机反抗中央政府的统治，要求恢复他们的传统权利和文化。\n在这样的情况下，皇后夏洛特面临着巨大的压力和困难。等待着她的将是国内接踵而至的麻烦，她是否能够挽救这个岌岌可危的帝国，还是会成为历史上又一个短命的摄政者，我们仍需要时间来进一步观察。"
  AOR_news.5.a:0"没有神，也没有主人!"
  AOR_news.5.b:0"新大陆人人有病"
  
  AOR_news.6.t:"[Get_title_news_header]                  墨西哥革命被平息[Get_title_news_pic]"
  AOR_news.6.d:0"  在经历了四年的内战和外部干涉后，墨西哥第二帝国的皇后夏洛特宣布她已经成功地平息了国内的叛乱和分裂，恢复了国家的统一和稳定。然而，她同时也声明国家仍然处于无政府主义不确定的危险之中，因此她将继续摄政下去，直到两位养子有能力接管王位。"
  AOR_news.6.a:0"又是这种话术..."
  
  AOR_news.7.t:"[Get_title_news_header]                 墨西哥内战再起[Get_title_news_pic]"
  AOR_news.7.d:0"  缺文本"
