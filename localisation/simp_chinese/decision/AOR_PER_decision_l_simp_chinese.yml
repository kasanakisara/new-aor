#决议文本#########
PER_Northern_Reconstruction_decision_category:0 "北方重建计划"
PER_Northern_Reconstruction_decision_category_desc:0 "我们北部的国土曾饱受俄罗斯帝国的铁蹄践踏，又在内乱之中遭到摧残。为了让我们的人民重拾安宁，我们必须优先考虑北部的重建工作。根据会议的决策，我们将按照§Y地域§!的划分，实施专项计划，以确保重建工作的§Y有序进行§!。"
PER_Industrial_Development_Plan_No.1:0 "一号工业案"
PER_Industrial_Development_Plan_No.1_desc:0"此案经全国协商议会通过，旨在继续进行落后腐朽的恺加王朝所未能完成的工业化。\n\n项目由政府出资，引进来自欧美的先进技术和设备，重点建设中央地区与其他重点城市的§Y战略工业项目§!。以提高波斯的整体工业能力。"
PER_Fighting_inflation:0 "严重的通货膨胀"
PER_Fighting_inflation_desc:0 "自世界大战开始，我国的经济就陷入了§Y混乱和衰落§!。货币贬值，物价飞涨，民生凋敝，人民苦不堪言。\n\n若政府继续将问题束之高阁，我国必将面临更大的动荡。我们必须采取有效的措施，及时的改革经济制度，消除通货膨胀的影响以缓解国家的困境。"
PER_Agricultural_Jihad_Preliminary_jy:0 "农业圣战"
PER_Agricultural_Jihad_Preliminary_jy_desc:0 "我国的农业已经被战乱和无能的恺加王朝官员破坏，如今饥荒流行，饿殍遍地，甚至已经到了同类相食的地步。\n\n我们必须发动一场§Y农业圣战§!，恢复波斯的农业生产和粮食安全，保障人民的基本生存权利。"
