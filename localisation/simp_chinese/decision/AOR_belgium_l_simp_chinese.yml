l_simp_chinese:
 BEL_prepare:0"雄狮方案"
 BEL_prepare_desc:0"当年比利时政府流亡非洲，随之一同前往的只有少数王国卫队。在随后的日子里，政府为缓解财政上的压力，王国卫队又被反复精简，最终在一战结束后被全部编为警察组织§!。\n\n英国人的背叛让我们仍需在刚果执政数年，为了应对一切可能发生的情况，我们应立即开始重整军备，以期恢复往日荣光。\n\n§Y比利时绝不是一条军事战略上的道路，建设强军，剑指低地！§!"
 Reorganization_the_Royal_Navy:0"重组比利时王国海军"
 The_only_access_to_the_sea:0"扩建刚果出海口"
 Radical_Naval_Studies:0"激进海军研究"
 Why_we_fight:0"扩大征兵宣传规模"
 Maximize_the_use_of:0"加强本地警察训练"
 War_Plans_Department:0"王国战争计划部"
 Inclusion_of_wise_people:0"调度科研人才"
 BEL_Belgian_Griffon:0"建设“狮鹫”"
 BEL_Albert:0"王国内政"
 BEL_Albert_desc:0"根据§Y《比利时宪法》§!九十三、九十四条：比利时联邦议会可以在国王无力继续进行统治时进行§Y摄政§!————而“无力”的具体解释权则掌握在议会手中。\n目前，首相卡尔东·德维亚尔和他所代表的§C天主教党§!已经占据了两院的§Y绝对话语权§!，换言之，只要他执意发起投票，他便可以以此种方式来合法结束阿尔贝的统治，彻底的掌握大权。\n但国王对此也并非束手无策————只要他能在接下来的时间内联合其他党派组成§Y政党联盟§!，对§C天主教党§!发动§Y不信任投票§!，一切就还尚还有转机。\n\n§Y倒计时已经开始，比利时又会走向何方？§!" 
