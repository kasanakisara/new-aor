 PAN.1.t:0 "船底苏醒"
 PAM.1.d:0 "咸腥味比意识更早苏醒。你的视网膜上好像黏着鱼鳞和柴油混合的包浆，二十种语言的脏话在耳道里发酵成酸液。右手摸到某种潮湿的十字形凸起——那是你昨夜（或是三年前？）吐在甲板上的秽物，加勒比的烈日把它烤成了盐晶圣像。\n“货舱C-19，这艘船联合果品公司注册于开曼群岛，上周刚运送过哥伦比亚暴动者的尸体……”\n“看左舷舱壁！那些抓痕是用勒贝尔步枪刺刀刻的法语脏话，第一个词是‘操’……优美又直白的小家伙。”\n“长官！七点钟方向！鳄鱼皮靴摩擦钢板的声响！”"
 PAN.1.a:0 "“喝吧。喝了鲨鱼就能游过海峡……”"
 PAN.2.t:0 "脑子里的先生们"
 PAN.2.d:0 "你蜷缩在腐烂的香蕉堆里，工装裤被发酵汁液泡成了尸衣。铆接钢板外传来热带暴雨的轰鸣，像是法国外籍军团在阿尔及利亚敲响的达姆达姆鼓，你听过那种声音？不记得了。左手下意识摸向腰间——空枪套里塞着半瓶荷兰杜松子酒，瓶颈还沾着某种暗红色结块。脑子里那四个吵吵嚷嚷的声音你已经见怪不怪了，自从不知道多久前你从这里醒来之后，它们就一直在脑子里横冲直撞。【脑干】，【杏仁核】，【前额叶】，【海马体】，这就是它们四个的名字。"
 PAN.3.a:0 "自从醒来之后，你的大脑空空如也，抱歉，这不是什么拐弯抹角说你智商问题的新话术——我的意思是说，你失忆了。"
