 AOR_Panama_brain_conversation_tt_desc_desc_1:0 "当今天第一口辛辣液体灼穿喉管时，舱门突然迸出蓝白色火花。切开钢板的焦臭味让你想起村庄的清晨，共同处可能是都在焚烧些什么吧。两道光柱刺破黑暗，照亮你胸前的褪色刺青：Légion d'Or No.666，金徽旅的鳄鱼纹章在汗渍下扭曲。\n\n“找到你了，逃兵。”\n镶金线的卡其制服，勒贝尔步枪刺刀上的豁口，还有袖口沾染的靛蓝染料——那是海地人血液氧化后的颜色吗，你的思绪还在四处乱飞。两个金徽旅士兵的鳄鱼皮靴碾过香蕉泥，其中一人用枪托砸碎了你怀中的酒瓶。"
 AOR_Panama_brain_conversation_tt_desc_desc_2:0 "你突然呕吐起来。尚未消化的香蕉混合着杜松子酒，在甲板上泼溅出黄绿色地图。就在他们皱眉后退的瞬间，你抓起半截酒瓶捅进右侧士兵的大腿动脉。温热的血喷在脸上时，你发现自己竟在舔嘴唇。\n\n你为什么这么做，就连我都开始好奇了，【前额叶】叫你长官，记得吗？慢慢来，你总会想起些什么，总会想起来为什么这么做。"
 AOR_Panama_brain_conversation_tt_desc_desc_3:0 "“总督正在等你，”被刺伤的士兵瘫坐在血泊里冷笑，“他说要亲手给你颁发铁十字勋章——用烙铁烫在背上那种。”\n\n什么东西的轰鸣突然撕裂雨幕。透过舱门的裂缝，你看见码头工人正被武装监工驱赶着装卸货物。带着镣铐的家伙们，黑人、白人、黄种人，哥伦比亚智利巴西墨西哥海地阿根廷，箱子里是什么？独眼巨人？一只秃鹫？白蜡还是土石？无论如何，这帮被捆着的家伙们在搬运着足够装下他们尸体的大箱子。\n\n哦，那是货轮的汽笛，你刚刚想起来那轰鸣是什么了！\n“圣基茨岛到货了！”监工挥舞藤条抽打人群。"
 AOR_Panama_brain_conversation_tt_desc_desc_4:0 "你选择抓住受伤士兵的步枪。勒贝尔步枪的胡桃木枪托早已包浆，准星缺口处卡着半片指甲——或许是某个马提尼克岛老甘蔗工最后抵抗留下的纪念。当你用枪带勒住另一个士兵脖子时，闻到他领口飘出的科隆香水味。\n\n货轮汽笛又在嘶鸣，它总是那么勤快，【杏仁核】从刚才就一直在咒骂它，叫嚣着单挑之类的话语。在震耳欲聋的声波中，你仿佛听见四个声音首次达成共识："

 brainstem_tt_1:0 "无聊中"
 brainstem_tt_2:0 "【脑干】“跑！像1916年那样跑！”"

 Hippocampus_tt_1:0 "【海马体】“酒瓶先生的本名是什么，我的意思是说，亨利怎么……？”"
 Hippocampus_tt_2:0 "无聊中"

 amygdala_tt_1:0 "【杏仁核】“为我们短暂的挚友，酒瓶先生默哀……”"
 amygdala_tt_2:0 "【杏仁核】“夺枪！杀了他们！全都烧光，直到见到星辉人！”"

 prefrontal_tt_1:0 "【前额叶】“长官，他们靴跟沾着圣多明各红土，说明三天前应该还在多米尼加镇压糖厂罢工，大个的手上是罗萨里奥银矿出品的戒指……”"
 prefrontal_tt_2:0 "【前额叶】“长官，你应该记得，码头第三仓库有炸药，工团分子们的遗留物……”"

 all_think:0 "“去他妈的运河公司。”"


