 bav_pp_trust_change:0 "以信任换取筹码"
 bav_pp_trust_change_2:0 "以信任换取大量筹码"
 bav_pp_trust_change_2_desc:0"我们已经通过各方面的努力重新取得了党内同志的部分信任。有时，我们需要使用这些信任去换取政治筹码，以推动政策的落实。"
 bav_pp_trust_change_factory:0"推动国家建设"
 bav_pp_trust_change_desc:0"我们已经通过各方面的努力重新取得了党内同志的部分信任。有时，我们需要使用这些信任去换取政治筹码，以推动政策的落实。"
 bav_pp_trust_change_factory_desc:0"建设根据地是当前苏维埃的首要任务，为此，我们必须全力以赴。"
 bav_trust_manpower_desc:0"革命的胜利离不开战士的参与。为实现共同的理想，我们必须广泛动员，吸引更多同志加入我们的行列。"
 bav_trust_ideo_1_desc:0"在革命危机四伏之际，考茨基仍在萨克森宣扬其中派言论。尽管我们无法直接干预，但我们可以确保这些流言蜚语不会影响巴伐利亚苏维埃的稳定。"
 bav_trust_coffee_desc:0"也许有一天，我们都会老去，都会退休，在午后的街角共饮一杯咖啡，像懒虫一般晒着太阳。然而，现在时间紧迫，还是一边工作一边喝吧。"
 bav_trust_coffee_2_desc:0"也许有一天，我们都会回到过去，都能拥有未褪的勇敢与似是而非的稚气，将一切推倒再重头来过。然而，现在时间紧迫，还是去喝杯咖啡醒醒神吧。"
 bav_trust_trait_desc:0"随着奥古斯特坚持不懈地工作，流言蜚语也逐渐烟消云散。"
 bav_st_trust_change:0"以稳定换取信任"
 bav_st_trust_change_desc:0"倍倍尔因其坚定且不可被否决的态度而闻名，有时，我们恰恰需要这般的信念来冲破一切障碍。"
 bav_ws_trust_change:0"以战争支持度换取信任"  
 bav_ws_trust_change_desc:0"倍倍尔因其坚定且不可被否决的态度而闻名，有时，我们恰恰需要这般的信念来冲破一切障碍。"


