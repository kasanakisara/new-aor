 BAV_L.205.t:0"指点江山赤色现"
 BAV_L.205.d:0"散碎的金光片片刺穿略显浓厚的云层，为慕尼黑令人惬意的下午装点上更明亮的光泽。两个白胡子老头——当然，也是巴伐利亚革命根据地最有权势的老头：奥古斯都·倍倍尔与弗兰茨·梅林随意的坐在咖啡厅的露天席位上，像两个真正悠闲的退休老者。\n\n梅林面沉似水的灌下一口和德国局势一样深邃的浓咖啡：“倍倍尔，想必你在瑞士也听说过革命的艰难近况，正因如此，我想得聊聊革命形式的时局。”倍倍尔小口品尝了微苦的茶，语调里还带着些打趣的接上话：“我说革命形式实际上相当乐观，你看，全国各地的革命力量都欣欣向荣，革命根据地如雨后春笋，符腾堡，南石荷，如果你不介意，还有萨克森......”\n\n“这个玩笑过了头。”梅林略带烦躁和无奈的打断倍倍尔，“我们今日最重要的讨论就是针对这些‘同志’的革命方针。”倍倍尔则举起双手作投降状：“我倒是愿闻其详，我相信同志们都是革命力量的一部分。”倍倍尔说罢砸吧了下嘴，最近总感觉理应是微苦的茶水却像少了点味道。\n\n“首先是符腾堡”梅林顿了顿，像是酝酿批判的情绪，“这群与革命联系的最紧密的叛徒，分裂时毫无根据的指责巴伐利亚是激进左倾修正主义，最近还搞起代议制民主的假把式，甚至留着相当一部分无政府主义者待在他们内阁里！”倍倍尔连续下压双手手掌，示意平息情绪，“无论如何，他们都是曾并肩作战的同志，哪怕是暂时走了歪路，也不要一杆子把他们都打倒嘛，革命的骨干莫要再伤筋动骨。”梅林有些愤愤的回答：“我倒是觉得你又犯了中派软弱不彻底的旧毛病，不过你既然意有如此，那符腾堡问题我们先按下不表。”倍倍尔揉了揉心脏，耸耸肩示意继续。\n\n短暂的寂静之后，梅林艰难的吐出一个好似千斤重的词：“萨克森。”气氛凝固下来，“我觉得他们可不像什么同志，更像，阶级敌人。”梅林审慎的盯着倍倍尔的眼睛，好像在征求德高望重的革命家的意见。“嗯...我觉得...总体而言...”倍倍尔也有些难开口辩护，“他们还算得上是左翼光谱的一员...所以我们可以尽全力争取和平，哪怕少流革命战士的血，也是极好的嘛。”倍倍尔似乎找到了说服的理由，语气也坚定下来。“那那个叛徒考茨基呢？你不是也公开批判过他的歪理邪说吗？”梅林接着猛攻，倍倍尔则不急不缓的咀嚼了一块可口的曲奇，“那你打算怎么办？总不能让七老八十的老头去游街吧。”“至少也得是劳动改造！”梅林盖棺定论般落下语句，倍倍尔则像是被想象中的银白胡子老头劳改的情形逗乐了，摇了摇头：“让他退休去养老吧，也许还能写两本畅销的回忆录！”\n\n空远蔚蓝的天色逐步被落进大地的赤丸烧红，两位革命家也打道回府，心里默默盘算着革命或激进或包容的未来，并下决心要做出些让它更好的决策。"
