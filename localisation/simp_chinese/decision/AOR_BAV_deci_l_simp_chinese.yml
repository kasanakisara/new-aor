 AOR_Bebel_Trust_desc:0"§Y奥古斯特·倍倍尔§!，德国社民党主席，政坛中不朽的常青树，争取人类社会最美好的制度行动中的§Y代表人物和典范§!。\n§O1907年斯图加特国际社会主义代表大会§!上，倍倍尔罔顾列宁的劝阻，坚持§g中派教条主义§!原则，使社民党在一战中进入了漫长的§Y‘政治休战’§!，在反战的立场下拒绝进一步的行动以确保党内的团结和稳定。\n1918年，在§R十月革命§!的胜利与§k鲁登道夫命运攻势§!的破产之后，倍倍尔幡然醒悟，并在一次会议上§Y辞去了§!党主席的职务。\n1919年，经倍倍尔本人申请，并经巴伐利亚全体社民党人投票后决定，恢复倍倍尔同志的党内身份，并继续担任§Y党主席§!一职。\n\n但篱笆上的伤痕永远存在，丢失过的§Y信任§!再恢复又谈何容易？"
 AOR_Bebel_Trust_A:0"目前的£AOR_trust 信任点数：§Y[?Bebel_Trust]§!"
 AOR_Bebel_Trust_A_tt:0"倍倍尔的£AOR_trust 信任点数会§Y时间§!缓慢增长，也会随着我们的§Y所作所为§!而变化。\n因为§Y倍倍尔辞职案余波§!的影响，由他领头的各项行动将受到一定的§R阻力§!-而£AOR_trust 信任点数正是弥补此类负面影响的§Y绝佳途径§!。\n同时，信任点数的多少也会在一定程度上§Y决定未来的剧情§!，所以，请谨慎对待点数，别把老头的晚节都拿去换酒喝了。"
 AOR_BAV_BEBEL_tt:0"§Y奥古斯特·倍倍尔§!，德国社民党主席，政坛中不朽的常青树，争取共产主义行动中的§Y代表人物和典范§!。他是该党40多年来最有影响和最受欢迎的领导人，西欧社会党历史上最受欢迎的杰出人物之一，被拥护他的群众们誉为§Y“德意志工人皇帝”§!"
 BAV_Bebel_Trust_desc:0"§O1907年斯图加特国际社会主义代表大会§!上，倍倍尔罔顾列宁的劝阻，坚持§g中派教条主义§!原则，使社民党在一战中进入了漫长的§Y‘政治休战’§!，在反战的立场下拒绝进一步的行动以确保党内的团结和稳定。\n1918年，在§R十月革命§!的胜利与§k鲁登道夫命运攻势§!的破产之后，倍倍尔幡然醒悟，并在一次会议上§Y辞去了§!党主席的职务。\n1919年，经倍倍尔本人申请，并经巴伐利亚全体社民党人投票后决定，恢复倍倍尔同志的党内身份，并继续担任§Y党主席§!一职。\n\n...但恢复曾丢失过的§Y信任§!，又谈何容易？"
 
 
