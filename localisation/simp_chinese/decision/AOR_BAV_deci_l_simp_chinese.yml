 bav_trust_ideo_aff_1_desc:0"目前，全国各地的先进势力都正欣欣向荣，如雨后春笋般席卷德意志。虽然我们之间存在较大的分歧，但仍有联合的一线可能。\n通过坚持不断的扩大在该地区的影响力，再加之奥古斯特·倍倍尔的高信任度，我们也许可以在未来达成和统的可能。"
