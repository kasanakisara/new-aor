 AOR_ORA_hu_yv_zong_ba_gong_hu_yv_zong_ba_gong:0"呼吁全阿根廷总罢工"
 AOR_ORA_esc_mission:0"代号：捕鲸船"
 AOR_ORA_esc_mission_desc:0"经行政委员会十位代表讨论后决定（9同意，0反对，0弃权，1缺席）：委员会将会派出一艘在南极附近的§Y捕鲸船§!，协助临时总工会代表西蒙·拉多维茨基离开火地岛监狱。但除此之外，行政委员会很遗憾因总罢工原因§Y无法提供更多支持§!。\n注：相关任务资料将会在几日后以特殊关系网络送达总工会代表手中。"
 
 