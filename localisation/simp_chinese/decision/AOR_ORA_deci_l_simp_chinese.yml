 #####决议#####
 AOR_ORA_committee:0"阿根廷地区工人联合会行政委员会" 
 AOR_ORA_committee_desc:0"§R“工人阶级团结是工人们解放自身的唯一手段。” §!\n\n在地方工会之上，阿根廷地区工人委员会存在一个§Y临时最高行政委员会§!，用以快速掌控§Y总罢工进度§!，取得斗争的最后胜利。 \n\n行政委员会代表共§Y十人§!，由FORA核心成员，地区工会突出代表组成；代表们权力相等，相互监督。而临时总工会代表从十人中选出，作为§Y最高临时代表§!管理行政委员会。\n\n行政委员会将会通过民主投票的方式决定后续发展计划。尽管工人委员会明言反对内部分裂，十位代表们却不可避免地因观念不同而逐渐分化为了五个观点鲜明的§Y派系§!。" 
 AOR_committee_ORA_1_small_desc:0"§Y改革派§!票型预测：（§G0§!-§Y0§!-§R0§!）\n§Y温和派§!票型预测：（§G0§!-§Y0§!-§R0§!）\n§Y激进派§!票型预测：（§G0§!-§Y0§!-§R0§!）\n§Y无派系代表们§!票型预测：（§G0§!-§Y0§!-§R0§!）\n§Y民兵代表们§!票型预测：（§G0§!-§Y0§!-§R0§!）\n\n该议题总票型预测：（§G0§!-§Y0§!-§R0§!）"
 AOR_committee_ORA_1_desc:0"也许代表们的想法相差甚远，争论也时常发生——但我们应当承认，他们都在为了建立一个新世界而§Y努力奋斗§!。"
 AOR_committee_ORA_ref_desc:0"§Y改革派§!以§Y西蒙·拉多维茨基§!为代表。\n他们相信原教旨的工团主义已经无法使用当今的§Y革命形式§!，必须立即着手改革以适应美洲独特的政治气候。\n他们呼吁成立更广意义上的工会,建设农业委员会以解决农业问题，团结可团结的其他工人组织，并吸纳部分§Y来自其他意识形态§!的优秀理论来更好的建设工人国度。"  
 AOR_committee_ORA_mid_desc:0"§Y温和派§!是介于激进派和改革派中间的调和派系，代表人物为§Y迭戈·桑蒂兰§!。\n他们努力尝试在两派之间找到一种微妙的§Y平衡关系§!，最大程度确保委员会的统一。\n他们希望使用更经典的方式来解决问题，但针对具体问题也要具体分析。并与共产主义者们保证§Y正常外交关系§!，但也到此为止。"  
 AOR_committee_ORA_rad_desc:0"以§Y安东尼奥·索托§!为首的§Y激进派§!奉行较为原教旨的工团主义政策。\n他们采取最为激进的方式来获得胜利，将生产资料公有化，用工人的力量来§Y再构世界§!。\n他们呼吁发动总罢工，打倒政府，彻底粉碎宗教特权来构建一个自由平等的社会。若非切要关头，他们将不会考虑和§Y集权政府§!站到一起。"  
 AOR_committee_ORA_non_desc:0"除了三派之外，仍存在着许多其他意见各不相同的委员会代表。\n§Y无派系代表§!们均怀揣着自己各色的政治抱负被选入委员会中。他们大多数没有成体系的思想，亦或者在三派之间摇摆不定。\n他们将会投票给他们认为§Y合理的政策§!，放由他们独立思考当然不错，但我们也有机会将他们§Y收入麾下§!……"  
 AOR_committee_ORA_arm_desc:0"尽管在激进派分子看来，军队不应该存在于工团主义社会当中，工人应该在战时自发的组成卫队来保卫祖国。\n但委员会仍在战争时设立了§Y民兵代表§!这一职位，代表们都来自工人家庭，在没有战争时就投入实际的生产工作。但若§Y常备军法案§!正式被确立，又或者我们被拖入了§Y战争的泥潭§!，他们也可能会成为一股重要的政治力量……"
 
