 AOR_FRA_Millerand_President_decision_desc:0 "毫无疑问，亚历山大·米勒兰并不是一位受国民和反对派待见的总统。他曾经的声誉早就因1899年的米勒兰入阁事件而跌入谷底，而踌躇满志的他指定的政策，也随之一起被埋没在历史的废纸堆里。如今，面对§R法§!§W兰§!§B西§!风起云涌的政治局势和危如累卵的社会危机，为了推动他的政策，拯救他的祖国，这位“叛徒总统”也不得不使出一些*非常手段*来推动他的政策了。"
