 NAU.1.tt:0"\n有关于此的系列决议 §Y同室操戈§! 将被§Y启用§!。"
 NAU.2.tt:0"\n除§Y帝国旧军部§!之外的所有非法派系（§Y德国社民党-右派§!，§Y民族意识士兵协会§!...等§Y其余两项§!）的§L政治影响力§!将§7降低一级§!。\n\n§Y民族意识士兵协会§!，§Y德国社民党（斯巴达克斯）§!的§V武装规模§!将§7降低一级§!。"
 NAU.3.tt:0"\n§Y帝国旧军部（温和派）§!的§L政治影响力§!将§7提升一级§!。\n\n"
 NAU.4.tt:0"\n§Y帝国旧军部（温和派）§!的§V武装规模§!将§7提升一级§!。\n\n"
 NAU.5.tt:0"允许雇佣（§Y军部出身§!）：§Y政府内阁§!，§Y军事参谋§!。"
 NAU.6.tt:0"\n§Y帝国旧军部（温和派）§!的§V武装规模§!将§7提升一级§!。\n\n"
 NAU.7.tt:0"解锁决议：§Y制造个人崇拜§!（§Y£AOR_pp 75§!：使§Y帝国旧军部-温和派§!的§L政治影响力§!§7提升一级§!）"
 NAU.8.tt:0"解锁决议：§Y军队整训§!（§Y£AOR_pp 75§!：使§Y帝国旧军部-温和派§!的§V武装规模§!§7提升一级§!）\n\n"
 NAU.9.tt:0"\n§Y民族意识士兵协会§!，§Y德国社民党（斯巴达克斯）§!的§V武装规模§!将§7降低一级§!。"
 NAU.10.tt:0"有关于此的§V武装规模§!系列决议将被§Y启用§!。"
 NAU.11.tt:0"\n§Y帝国旧军部（极端派）§!的§L政治影响力§!将§7降低一级。§!\n§Y帝国旧军部（极端派）§!的§V武装规模§!将§R提升一级§!。"
 NAU.12.tt:0"有关于此的§L政治影响力§!系列决议将被§Y启用§!。"
 NAU.BLANK.tt:0"\n "
 NAU_local_forces:0"同室操戈"
 NAU_create_FAKE_Division_tt:0 "八个§Y大战时禁卫步兵师§!-§V疑兵番号§!将在法兰克福创立。" 

 NAU_FOCRES_A_2:0"§R德国社民党（斯巴达克斯）§!\n\n领导人：§Y卡尔·拉狄克§!\n\n政治影响力：§Y[AOR_NAU_FORCES_P_KPD_loc]§!\n武装规模：§Y[AOR_NAU_FORCES_M_KPD_loc]§!\n\n受到资助：\n  -§Y[BAV.GetNameWithFlag]§!\n  -§Y[SHL.GetNameWithFlag]§!\n\n当前政策：§Y残酷镇压§!"

 NAU_FOCRES_A_1:0"§R德国社民党（右派）§!\n\n领导人：§Y爱德华·伯恩施坦§!\n\n政治影响力：§Y[AOR_NAU_FORCES_P_SPD_loc]§!\n武装规模：§Y[AOR_NAU_FORCES_M_SPD_loc]§!\n\n受到资助：\n  -§Y[GER.GetNameWithFlag]§!\n  -§Y[SAX.GetNameWithFlag]§!\n  -§Y[WUR.GetNameWithFlag]§!\n\n当前政策：§Y置之不理§! "

 NAU_FOCRES_A_3:0"§R帝国旧军部（极端派）§!\n\n领导人：§Y埃里希·鲁登道夫§!\n\n政治影响力：§Y[AOR_NAU_FORCES_P_L_loc]§!\n武装规模：§Y[AOR_NAU_FORCES_M_L_loc]§!\n\n受到资助：\n  -无\n\n当前政策：§Y接受吸纳§!"

 NAU_FOCRES_A_4:0"§R帝国旧军部（温和派）§!\n\n领导人：§Y马克斯·冯·巴登§!\n\n政治影响力：§Y[AOR_NAU_FORCES_P_JB_loc]§!\n武装规模：§Y[AOR_NAU_FORCES_M_JB_loc]§!\n\n受到资助：\n  -无\n\n当前政策：§Y个人独裁统治§!"

 NAU_FOCRES_A_5:0"§R民族意识士兵协会§!\n\n领导人：§Y格雷戈尔·斯特拉瑟§!\n\n政治影响力：§Y[AOR_NAU_FORCES_P_STLS_loc]§!\n武装规模：§Y[AOR_NAU_FORCES_M_STLS_loc]§!\n\n受到资助：\n  -§Y[HAN.GetNameWithFlag]§!\n  -§Y[PRE.GetNameWithFlag]§!\n\n当前政策：§Y接受吸纳§!§!"

