USA_Civil_War_Resolution_gravity:0"合众国内战-§Y政治决议§!"
USA_Civil_War_Resolution_gravity_desc:0"§9以弗所书2:13-17\n“你们从前远离神的人，如今却在基督耶稣里，靠著他的血，已经得亲近了。因他使我们和睦，将两下合而为一，拆毁了中间隔断的墙，而且以自己的身体废掉冤仇，就是那记在律法上的规条，为要将两下藉著自己造成一个新人，如此便成就了和睦。既在十字架上灭了冤仇，便藉这十字架使两下归为一体，与神和好了，并且来传和平的福音给你们远处的人，也给那近处的人。”§!\n\n合众国的战争意味着美国原有政治的崩坏——自那1865年以来屈辱，与让这个美丽的国家饱受分裂的所有条款，都随着南北的炮火声而迅速的消失在了历史长河中-但这还远远不够，在政治崩坏的另一面，则是联邦政府需要团结绝大多数的美国人民，与支持联邦正义之举的州政府，并使其与祖国§Y并肩作战§!。\n\n同时，政治的延伸导致了社会动荡的加剧，一团乌云正笼罩在千万人在眼前，那正是我们§Y天命结局§!所在的最后考验。现在正是联邦政府应该出手的时候，让我们像石榴籽一样紧紧的团结在一起，去向远方吹响自由的号角！"

