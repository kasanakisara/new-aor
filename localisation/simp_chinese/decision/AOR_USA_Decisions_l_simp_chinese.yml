USA_Civil_War_Military_Resolution:0"合众国内战-§Y军事决议§!"
USA_Civil_War_Military_Resolution_tt_desc:0"§9以弗所书6:11-19\n“要穿戴神所赐的全副军装，就能敌挡魔鬼的诡计。因我们並不是与属血气的爭战，乃是与那些执政的，掌权的，管辖这幽暗世界的，以及天空属灵气的恶魔爭战。所以要拿起神所赐的全副军装，好在磨难的日子，抵挡仇敌，並且成就了一切，还能站立得住。”§!\n\n虽然联邦政府早已于10年前完成了军事改革，但是我们依然含有数量庞大的国民警卫队-即先前的美国州民兵组织。\n\n如今战事紧张，选择大量扩充国民警卫队并招募志愿人员，是应对战争最好的征兵方式。国民警卫队可以与正规部队协同作战，并充当正规部队后备军的作用。\n\n§Y注：进度条进度每周§!§3加1§!§Y；§!§Y进度条进度达100时，§!§3增加5个国民警卫队师§!"
