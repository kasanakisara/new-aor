CSA_Civil_War_Resolution_civilian:0"合众国内战-§Y社会决议§!"
CSA_Civil_War_Resolution_civilian_desc:0"§9新约·彼得前书3：10 - \n“人若爱生命，愿享美福，须要禁止舌头不出恶言，嘴唇不说诡诈的话；也要离恶行善，寻求和睦，一心追赶。”§!\n\n60年的分裂已经重塑了整个美国的格局，其中南方的政治以及经济格局尤为复杂-南方的迪克西党并不如北方扬基党一般，我们拥有太多能与迪克西党竞争的政党，根本§t无法做到团结统一地斗争§!；自由派与保守派正在撕裂的南方这片仅存的土地，以及那些蠢蠢欲动的黑人群体、兴起的共产党等等，都无时无刻妄图瓜分南方的蛋糕。\n\n§Y经济上§!，我们极度依赖来自北方巨型企业的工厂以及外国资本的投资，而迪克西本地的企业微乎其微，我们不得不在经济上听从他人的训导。但我们仍然时刻警惕着，那些来自北方的守财奴，是否会对我们的经济状态进行恶劣的操弄……"
