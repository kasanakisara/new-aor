USA_Civil_War_Resolution_civilian:0"合众国内战-§Y社会决议§!"
USA_Civil_War_Resolution_civilian_desc:0"§9哥林多前书15:58 - \n"所以，我亲爱的弟兄们，你们务要坚固不可摇动，常常竭力多做主工，因为知道你们的劳苦在主里面不是徒然的。"§!\n\n战争的爆发是如此的猝不及防，以至于我们的社会承受了空前的压力。城市到处都挤满了逃亡的难民，生产车间也被工人们所遗弃。别有用心之人，正在推动这种不安的氛围，亦或是企业家们再次兴风作浪，大肆囤积药品、粮食，操纵银行……\n\n但如今的美利坚早已大不相同，千禧使命钟声在我们的心中时时敲响。我们必然要拾起先人§Y昔日的荣光§!，为我们的社会团结一致地构筑坚强的堡垒！"

