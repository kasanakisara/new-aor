###南方决议###
CSA_Civil_War_Resolution_gravity:0"合众国内战-§Y政治决议§!"
CSA_Civil_War_Resolution_gravity_desc:0"§9哥林多后书5：17 -  “若有人在基督里，他就是新造的人，旧事已过，都变成新的了。”§!\n\n千禧之命的信念未死，而北美大陆又将分崩离析。北方的怪物，正如140年前的英帝国一般，用尽各种手段将我们带入了地狱般的牢笼。而现在，我们终将冲破堕落之人的封锁，在迪克西建立我们新的山巅之城——甚至于重塑整个美国！\n\n§t听吧、看吧，这是柯克和洛克在为我们摇旗呐喊，这是杰斐逊与杰克逊之光在闪耀，这是人民主权在这最后堡垒的发怒时刻！§!"
