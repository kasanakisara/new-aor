 SWE_Oslo_Stockholm_Shinkansenn:0 "联邦之梦：奥斯陆-斯德哥尔摩快速铁路"
 SWE_Oslo_Stockholm_Shinkansenn_desc:0 "奥斯陆一词原意为“林中空地”，1624年一场大火烧毁了大半个奥斯陆。这时，丹麦的克里斯蒂安在阿克斯胡斯城堡脚下又兴建新城。新城市在其后的300年间与国王同名，为“克里斯蒂安尼亚”。1815年，随着挪威-瑞典王国的诞生，该城发展迅速，开始了工业化和城市化。在1905年挪威独立运动的高潮时，这座城市重新被称作为奥斯陆。\n而斯德哥尔摩原意为“木头岛”，由于地理位置适中，气候温和，环境优美，在1436年被定为都城，并随着瑞典帝国的发展，逐渐发展成为斯堪的纳维亚半岛上的最大城市。市区分布在14座岛屿和一个半岛上，70余座桥梁将这些岛屿联为一体，因此享有“北方威尼斯”的美誉。\n作为联邦的两个最大城市，奥斯陆和斯德哥尔摩之间的交通仍然依赖于速度缓慢的铁路和公路运输。为了发展我国的经济，我们有必要修建一条连接两座城市的快速铁路。"
