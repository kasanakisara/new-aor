 SWE_Samitinget_decision:0 "联邦之梦：萨米议会和萨米理事会"
 SWE_Samitinget_decision_desc:0 "萨米人（Saamis），亦称“拉普人”（Lapps）或“拉普兰人”，旧称“洛帕里人”，“萨米人”是其自称。原分布地区较广，公元10一14世纪受芬兰人和日耳曼人排挤，逐渐北移，退至挪威海和白海沿岸一带。部分人被后来者同化。从事游牧、养驯鹿，部分从事渔猎。我国北部有着为数众多的萨米人。在过去，他们并不受重视，他们的处境也一直在恶化。但在芬兰内战后，大量的萨米人逃难到了联邦境内。我们有必要设置一个萨米议会和一个萨米理事会，来管理为数众多的萨米人，并赋予他们自主管理的权利。"
 SWE_Samitinget_ongoing_tt:0 "§Y工作期限内：§!\n每日政治点数消耗：§R0.4§!"
 SWE_Samitinget_ongoing:0 "联邦之梦：萨米议会和萨米理事会"
 SWE_Northern_Railway_Plan:0 "联邦之梦：北境铁道计划"
 SWE_Northern_Railway_Plan_desc:0 "“北国风光，千里冰封，万里雪飘。”联邦北部长期冰雪飘飞，人迹罕至。但是我们不能忽视这冻土之下存在的宝藏。无论是矿产资源还是森林资源，拉普兰都可以称作宝库。在这些地方建立矿产工业，不仅对经济大有裨益，也可以鼓励我国人口北移。来吧，让铁路踏上冰原，让列车的轰鸣响彻北境！"
