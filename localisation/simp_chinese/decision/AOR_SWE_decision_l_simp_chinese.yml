 SWE_Gross_Stockholm:0 "联邦之梦：扩建大斯德哥尔摩"
 SWE_Gross_Stockholm_desc:0 "斯德哥尔摩在英语里意为“木头岛”。城市始建于公元13世纪中叶。那时，当地居民常常遭到海盗侵扰，于是人们便在梅拉伦湖的入海处的一个小岛上用巨木修建了一座城堡，并在水中设置木桩障碍，以便抵御海盗，因此这个岛便得名为“木头岛”。\n关于斯德哥尔摩这个名称，传说是古时梅拉伦湖上漂浮着一根巨大的木头，引导来自锡格蒂纳的第一批移民至此，建立了这座城市。另有传说：以前这里一片荒凉，海浪冲来的遇难船只的碎片堆满海滩，当地居民便捞取这些木片搭起简陋的小屋。由于这些木片均不成块，只是一条条木头样的废料，因此，搭起的房子东倒西歪。1250年，这种碎木房屋在小岛上形成了一条街，外国船只开到这里进行商贸活动，看见街上的房屋如此模样，不禁感到好笑，随口喊出“斯德哥尔摩”。“斯德哥”是木头的意思，“尔摩”则是岛的意思，合起来为“木头岛”。由于斯德哥尔摩地理位置适中，气候温和，环境优美，在1436年被定为都城，并逐渐发展成为斯堪的纳维亚半岛上的最大城市。\n如今，随着国家的发展，现有的斯德哥尔摩城市已经不能适应发展的需求了。我们必须扩建大斯德哥尔摩，以适应城市化和工业化的发展。"
