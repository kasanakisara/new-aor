 SWE_Norsk_Bokmaal:0 "联邦之梦：推动新挪威语和书面挪威语合流"
 SWE_Norsk_Bokmaal_desc:0 "根据挪威法律和政府政策，现行的挪威语有两套书写形式，分别是“书面挪威语”(Bokmål)和“新挪威语”(Nynorsk)。两种书写挪威语的形式分别温和地代表着保守和激进的书写表达方式。书面挪威语主要取材来自丹麦语和其他斯堪的纳维亚语言，而新挪威语取材自古斯堪的纳维亚语。由于后者基于乡村方言拼写，所以在19世纪农村色彩浓厚的挪威很受欢迎，但在20世纪城市化开始后快速衰落。如今在联邦化发展中，仍然保有两种挪威语写法是愚蠢且无用的。我国应当立刻推动挪威语书写方式的合流。"
 SWE_Norsk_Bokmaal_ongoing:0 "联邦之梦：推动新挪威语和书面挪威语合流"
