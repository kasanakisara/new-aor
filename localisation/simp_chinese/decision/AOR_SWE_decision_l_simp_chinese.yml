 SWE_Trade_decision_categories_desc:0 "世界大战以来，世界贸易中我国处于并不重要的地位，只能成为全世界的矿场。我们必须扭转这一局面，通过出口工业品来提升我国在国际贸易中的地位。同时，我国的外汇也需要补贴本土工业的发展。\n§Y当前政府对贸易支出：[?SWE_Government_Spending]%总财政收入\n（政府对贸易支出会影响国际市场开放度和生活消费品工厂比例）§!\n\n§Q当前国际市场开放度：[?SWE_Market_Inclusion]\n（国际市场开放度会影响建造速度，稳定度等）§!\n\n§R当前本土工业发展度：[?SWE_Industry_Development]\n（本土工业发展度将决定每个月获得的民用工厂）§!"
