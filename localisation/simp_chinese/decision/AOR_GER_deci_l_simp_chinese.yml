 GER_P_C_tt_desc_tt_1:0"世界大战造成了世界范围内的§Y经济动荡§!，而德国在经历内乱后无疑是§Y通货膨胀§!最为严重的地区之一。但我们还没有完全失去对经济的控制——通过立法和默契般的配合，我们得以将持续走升的国家物价控制住。\n\n这是一项§Y有利于全体邦国§!的提案，因为这涉及到每一个德意志人民的切身利益。国家物价的每一次轻微波动，都能让每个底层百姓都有着深刻的“体会”，只有让通货膨胀处于良性通货膨胀或物价平稳的状态，经济才能得以有效发展。\n\n-若成功：[GER.GetName]的§Y物价指数§!将会§G下降§!，每月§Y财政盈余§!增加§G20§!；其余邦国也将获得§Y经济民族精神加成§!。\n-若失败：§Y无事发生§!。"
 
