 GER_comm:0"德意志国家委员会"

 G_C.1.t:0"德意志国家委员会"
 G_C.1.d:0"上次大战后，德意志地区支离破碎，国家分裂给人民带来的伤害有时不下于战争甚至甚于战争。暴力革命与流血冲突在德国的土地上似乎已经习以为常。除非德皇以外恐怕已经再难有人能压制各个宣布自治的德意志邦国。\n\n德国暂时告别了帝制与专制，但新生的共和国再一次陷入到地方割据的态势之中。战后的德国是一个议会制和总统制共存的邦联政府，但由于继承于德意志帝国的帝制色彩，如今的德国总统权力色彩浓郁，其权力甚至要比总理要强大。议会在政府中处于弱势地位，连带着理论上代表各地民意的帝国议会的权力也得到相对性的削弱。\n\n不过，作为德意志名义上的国家元首，总统弗里德里希·艾伯特将中央防卫军掌控在手中，首先避免了军队分裂。除此之外，他还设立了德意志国家委员会，专门用以倾听各德意志邦国的政治诉求。只是在如今松散的德意志邦联之中，国家委员会到底能维持多久仍未可知……\n\n也许它会在将来的某一天草草收场，亦或者真的成为继续维持现状之璞玉？"
 G_C.1.a:0"派代表团前往柏林。"
 G_C.1.b:0"十分抱歉..."
 G_C.9.a:0"巴伐利亚之外的人民还需要我们的声音！"
 G_C.9.b:0"他们背叛了社民党，我们不会去的。"

 AOR_GER_Comm.1.tt1:0 "现阶段公然反对德意志邦联的决议会影响我们执政合法性，不论我们今后要走何种道路——是坚决跟随中央还是虚以委蛇，都需要北方政府来替我们负担巨额的财政赔款和高额的外交支出。而暂时留在邦联可以为自己谋得一定的§Y利益§!，或是给柏林政府使绊子，维持自身地位。"
 AOR_GER_Comm.1.tt3:0 "无论柏林政府承认与否，我们的政权都只是名义上的邦联成员。南方联军失败迫使我们暂时接受了这一组织形式，但这并不代表我们就要被中央人士牵着鼻子走。北方政府负担着巨额的财政赔款和高额的外交支出，但这一切和我们§Y并无关系§!。\n\n§Y注意：§!如果巴伐利亚没有加入国家委员会，那里极有可能成为柏林政府的§R一言堂§!...（柏林政府将在内战时§Y满血加入战斗。§!）\n\n"
 AOR_GER_Comm.1.tt4:0"§Y奥古斯特·倍倍尔§!决定出席委员会，为了仍处于资本主义治下的德国民众争取权利。\n\n这也意味着我们将暂时被柏林政府所承认，让它们捏着鼻子承认我们为特殊的§Y‘自治区’§!，只要我们所作所为不越过它们的红线...\n\n§Y注意：§!这不是一条常规路线——加入委员会可为巴伐利亚获取大量§Y政治点数§!，并可以借机§Y削弱柏林政府§!；但这将§R大幅降低§!£AOR_trust 信任点数，并对未来的剧情造成一定影响，§R请谨慎选择。§!\n\n"
 AOR_GER_Comm.1.tt5:0"他们不出所料地§Y拒绝§!了我们——实际上，这并不是一件坏事，§R反倒...§!"

