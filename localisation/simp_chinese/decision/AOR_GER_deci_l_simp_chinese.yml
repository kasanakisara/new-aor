 GER_q_inflation:0"§Y提案§!：共同遏制邦联通货膨胀问题"
 GER_q_inflation_desc:0"世界大战造成了世界范围内的经济动荡，而德国在经历内乱后无疑是通货膨胀最为严重的地区之一。但我们还没有完全失去对经济的控制——通过立法和默契般的配合，我们得以将持续走升的国家物价控制住。\n\n这是一项有利于全体邦国的提案，因为这涉及到每一个德意志人民的切身利益。国家物价的每一次轻微波动，都能让每个底层百姓都有着深刻的“体会”，只有让通货膨胀处于良性通货膨胀或物价平稳的状态，经济才能得以有效发展。"

