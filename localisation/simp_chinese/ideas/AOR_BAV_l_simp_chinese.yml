##人物介绍##
K_L_DESC:0"卡尔·李卜克内西同志于1871年生于莱比锡一个红色家庭，在他父亲的影响下，他从小就坚定了革命信仰。1890年左右，李卜克内西同志进入柏林大学攻读法律博士学位，并于1902年进入柏林市政局，成为德国左派中重要的一员，拥有不俗的地位。\n世界大战期间，李卜克内西坚决反对德国政府的帝国主义行径，并在德国大崩溃时正确判断形势，动员起南德革命力量发起针对中央政府的解放北伐。北伐行动迅速开始，在战争中期，提出了攻打柏林，快速取得革命胜利的方案，却在半途中被摇摆的叛徒背叛，德国大革命失败。\n李卜克内西与党内部分同志被迫南撤，回到南德，重新组织建立起巴伐利亚苏维埃。\n李卜克内西同志的信仰从未改变过，他永远是那个德意志革命巨浪的掌舵人。"
BAV_BEBEL_DESC:0"§Y奥古斯特·倍倍尔§!出生于德国科隆，自幼家贫。那时，科学社会主义的火便点燃了这颗见识过帝国社会底层的苦难的心。李卜克内西，第一国际，德国社会民主工党，都见证过这位青春洋溢的革命先锋的努力；1905年俄国革命之“总演习”的传唱，第二国际第七次代表大会之“航向灯”的定位，都为年富力强的革命者厘清航向；革命家的革命性等待一个机会，一个马，恩，列，所有的同志都在等待的机会。\n\n前所未有的世界之战将旧秩序的锁链砸得粉碎，俄罗斯帝国与德意志帝国这两大帝国主义轰然倒地，帝国的残片自相残杀，布尔什维克点起了俄罗斯革命的曙光，德国南方激进派也进军柏林城下，德意志革命的果实似乎也唾手可得。\n\n命运再一次戏弄了这位垂垂老矣的革命家，南方联合在柏林围城战的落败后被迅速粉碎。不得已，怀揣着赤色热情的左派南下组建了巴伐利亚-符腾堡苏维埃。可惜，世界大战时倍倍尔领导的罢工便让修正主义份子愤而独走，如今意志软弱的温和派再一次撕裂了这个新生的革命联盟。倍倍尔最后独自挥舞起斯巴达克斯同盟的大旗，在巴伐利亚独自建立新的苏维埃政权。\n\n如今，疾病与衰老已爬上了这位耄耋之年的老人的眼角。卢森堡的评价无疑是对他一生最好的总结与赞美：“他是党数十年进行的斗争和所遭受的迫害的化身，当然，也是党所取得的胜利和党成长壮大的化身。”\n\n§R但现如今赤色极光的路，在何方？§!"
BAV_Mehring_DESC:0"§Y弗兰茨·梅林§!出生于波美拉尼亚的一个中产阶级家庭，曾作为一位民主主义者的梅林经由1878年俾斯麦政府颁布的针对社会民主党人的非常法令以及残酷的镇压和迫害，彻底转向了社会主义。笔耕不辍是他的代名词，他的政论文短小精悍，文笔犀利，有力的批判了修正主义观点，马克思主义理论家的名号他当之无愧。同时，在机会主义分子的干扰破坏和疾病折磨下，他仍然坚持写作了一系列作品，写作并准备出版的《马克思传》无疑是他研究国际工人运动史的心血结晶，最早的马克思主义史学家的冠冕他亦名副其实。\n\n尽管没能一举摧毁整个德意志地区旧秩序的枷锁，但在德国内战的灰烬中建立的符腾堡-巴伐利亚苏维埃也可成为他大展拳脚的新舞台。年迈的理论家又找到了当年为报纸撰写共产主义理论的热情，用思想将迷茫的工人们凝聚成强大而有信仰的无产阶级斗士们，把马克思毕生的思想总结汇编，让修正主义叛徒不攻自破。\n\n如今斯人已逝，轮到他来擎起大旗了。目送倍倍尔的棺木隐没与新鲜的泥土之下，悲痛之余，梅林亦深感自己时日无多。在生命的终点狂奔而来之前，梅林决心驱动自己为社会主义的胜利最后奋力奔跑一次。他要联合起同志的矛盾，不顾一切的让斯巴达克斯的旗帜插遍德意志的每一个角落，彻底斩断压迫人民的枷锁。\n\n§R毕竟，他不想再见到同志先他而去了。§!"
#历史介绍#
