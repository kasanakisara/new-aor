NAU.15.t:0"元首而非基督"
NAU.15.d:0"特蕾莎修女像往常一样开始礼拜，唱诗，日复一日，年复一年，但一切并不全部如常。自从新上任的总理打出来口号“要以血脉与信仰团结德意志”以后，一切仿佛都变了，主教的手里不仅拿着《圣经》，还拿着一本黄色封皮的小书，她问过主教，为什么要这样，他回答到：“这位先生是主的化身，他要行，我们便跟随，要将血与肉，灵与骨，献给他。”一切都在改变，教堂的门前开始悬挂他们的党旗，那红色是那么的刺眼，就像耶稣受难留下的血一样，每日宣讲的内容也逐渐奇怪，主的善越来越少，反而犹太人所犯下的罪行越来越多，她不知道是在什么时候开始的，她只知道，时代，翻篇了。"
NAU.15.a:0"信仰的力量会改变一切"
