 AOR_FRA_World_owner:0"世界共主"
 AOR_FRA_World_owner_desc:0"无尽的世界呐，\n你壮丽辉煌！\n任那暴风雨肆虐你的心灵;\n任滔滔洪水涤荡你的身躯。\n备受滋润的猛虎呵！\n动起身来：\n将旧的世界一扫而尽,\n新的太阳从法兰西升起！\n“光明的给予者！”"
 AOR_FRA_The_Third_Republic:0"第三共和国"
 AOR_FRA_The_Third_Republic_desc:0"自普法战争的灰烬之上屹立的法兰西第三共和国已经度过了许多岁月。虽然第三共和国的政治体制经常被评价为不稳定，议会倒阁的事件常常发生，政府常常陷入政治危机之中，其甚至从来没有被认为可以长期执政，但是毫无疑问的是，如果没有第三共和国，法兰西的命运只会更加扑朔迷离。\n\n第三共和国确立了议会共和的政治体制，将自由、平等和民主的思潮真正地带入了法兰西每一位公民的心中。第三共和国也是法国第一个长久的共和制政权，象征了法国的经济发展、社会稳定和文化进步。她推倒了主宰法国上百年的天主教权，在世界各地高高举起三色旗宣告法兰西的存在，同时也在世界大战中同邪恶的同盟国集团决一死战，取得了最终的胜利。毫无疑问，没有第三共和国，法国不可能取得如今的荣耀，也不可能成为如今世界上执子的棋手。"
