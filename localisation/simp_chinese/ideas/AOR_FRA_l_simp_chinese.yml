 FRA_WAR_BIG_WHEEL:0 "大战巨轮"
 Alexandre_Millerland_desc:0 "命运给了亚历山大·米勒兰一个机会，而米勒兰紧紧的抓住了它。\n\n我们都知道，米勒兰是法国独立社会者联盟的领袖。年少时便凭一条三寸不烂之舌为人辩护而出名，被誉为“说服人的雄辩家”，而非“哗众取宠的丑角”。而当法国政府残暴镇压工人运动时，他更是挺身而出，义愤填膺的为工人阶级辩护。从此，他号召社会主义各派团结起来，他希望所有的社会主义者“具有一个心灵、一种思想、一种行动”。俨然一颗法国政坛冉冉升起的红星。\n我们也都知道，米勒兰是第一位入阁上位的社会主义者。随着米勒兰主义的成功实践，向现实的妥协，劳资调和的奴颜婢膝，资本同盟的沾沾自喜，社会联盟内部的一片哗然与指责谩骂，都不过是米勒兰步步攀向高位，享用功成名就的盛宴的嘈杂背景音尔。更何况，在米勒兰巧舌如簧的鼓动下，绝大多数社会党党员都相当识时务的站在胜利者一方，成立独立社会党，同米勒兰一齐畅享这来之不易的胜利美酒。只余下一些诸如饶勒斯一类的断脊之犬尚狺狺狂吠，何其可悲。\n我们现在都知道，米勒兰是率领法国洗雪前耻，凯旋结束一切战争的战争之英杰。“不再有工人的权力，不再有社会立法，只有战争。”戴上温和的面具，辅以甜言蜜语的哄骗，施行法国霸权，维稳殖民主义，点燃复仇情绪，一切为战争服务……终在德意志黑鹰与沙皇巨熊焦黑破碎的尸体上三呼公义之完胜。然而那些被铁靴踏上脖颈，几近窒息的民众与土人，可不会再有一位米勒兰为之辩护了。\n\n在那些尚存理想的人心中，米勒兰还有一个人人都明晓的名字：\n\n\n\n§R叛徒。§!"