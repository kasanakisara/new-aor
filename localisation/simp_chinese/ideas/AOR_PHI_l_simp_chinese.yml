 #ideas#
PHI_liangqiang:0 "强权群岛"
PHI_fenlie:0 "脆弱的政府"
PHI_liangqiang_desc:0 "如今的整个菲律宾被两大势力所割据霸占-日本帝国和法兰西帝国。他们疯狂的在岛上掠夺矿产及自然资源，强迫菲律宾人在外资种植园中劳作，而我们的政府却无能为力。"
PHI_fenlie_desc:0 "菲律宾自治政府源于日法战争中，因双方妥协而告终成立的菲律宾自治领。虽然他名义上归西班牙管辖，实际上其经济、政治的命脉都掌握在日法两国的所谓顾问代表团中。同时，菲律宾政府还吸收了大量前菲律宾共和派成员，这使得我们的政府变得十分混乱。"