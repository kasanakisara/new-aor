l_simp_chinese:
#南非
#####民族精神#####
Land_of_diamonds_gold:0"钻石与黄金之地"
Land_of_diamonds_gold_desc:0"自从1880年代开始，我们这便成为了世界黄金供应的一大部分来源，约有50%的已经生产的黄金由南非而来。可上帝并不公平，这巨量的金矿都在布尔人的领地上。布尔人因此有了巨量的筹码。世界上的其他国家亦觊觎着这金灿灿的黄金，着无数人蜂拥而至：白人、黑人、德国人、中国人、日本人、美洲人、聪明人、大亨、疯子...南非的经济也随着国际金价浮浮沉沉。"
Boer_question_mid:0"布尔人问题：§R中度§!"
Boer_question_mid_desc:0"很久以前，南非是荷兰殖民者的土地，然而当日不落的强权降临，它们便被赶到东北并形成了一个新的民族：布尔人，它们大多数是拥立奴隶制的种植园主。随着1908年统一的南非联邦的建立，布尔人以成为了南非重要的组成部分与不可忽视的政治力量。"

Negro_problem:0"黑人问题"
Negro_problem_desc:0"黑人是这片土地的原住民，刚开始，他们受荷兰人的奴役，但英国殖民者却更希望它们成为工厂里的劳工而不是无偿的黑奴，为社会创造经济价值。黑人是南非人口真正的大头，但他们的权益却一直被忽视，也许我们应提升黑人的权益？抑或是建立种族隔离制度？\n§R「一切听从联邦的指示」§!"

Prince_of_Connaught:0"康诺特亲王"
Prince_of_Connaught_desc:0"作为刚来到的南非总督，我们的“康诺特和斯特拉森公爵阿瑟亲王”对南非还缺乏一个初步的了解，但他却曾是加拿大总督，现如今，他还是英国陆军元帅，他的态度也许就决定着英国政府的态度，\n§R「他最好不要找南非的麻烦」§!"

White_mass_unemployment:0"白人大规模失业"
White_mass_unemployment_desc:0"南非联邦成立以后，制造业的振兴、黑人权益的加强是的成千上万的白人不得不离开他们的工作岗位，取代他们的将是24小时不知疲倦的机器抑或是黑人。英国企业家们把这点看的很明白。南非此时陷入了困境，制造业越发展，社会就越不稳定，\n§R「白人们并不愿意那群黑鬼抢了它们的岗位」§!"

Agricultural_crisis:0"农业危机"
Agricultural_crisis_desc:0"作为非洲最南端的大国，南非坐拥着肥沃的土地，在这片土地工作的是勤劳的人民。可是近年来灾害频发，大量的作物盈余使得利润大幅下跌。南非的农业已经走在了崩溃的边缘，大量的农民涌入城市转而成为社会的不稳定因素。也许我们应该改变我们的政策了..."

SAF.broke.1.tt:0"南非社会分裂度：§Y10.0%§!"