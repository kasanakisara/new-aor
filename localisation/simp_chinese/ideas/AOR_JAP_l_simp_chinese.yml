 #ideas#
JAP_lixian:0 "不完全的立宪运动"
JAP_junbu:0 "不合的军部"
JAP_minzhi:0 "明治维新的遗产"
JAP_samo:0 "萨摩海军"
JAP_fanfa:0 "藩阀割据"
JAP_misao:0 "米骚乱"
JAP_misao2:0 "米骚乱的余波"

JAP_lixian_desc:0 "自1912年以来，日本社会的广大国民作出了空前绝后的努力，迫使日本当局做出一定的政治让步，开启了宪法改革的自由化进程。未来日本的前途似乎一片光明-不过，改革仍旧是不完善的，尤其没有触碰到大量保守派的根本利益，致使贵族、华族群体仍然对证据保持着举足轻重的影响力，并且时刻预备反扑……"
JAP_junbu_desc:0 "日本军部在历史上曾经发生过多次重大变动，长洲派大部分被驱逐后，陆军部的地位一落千丈。如今的军部已经变得十分虚弱，没有任何一个主要势力能够牢牢控制日本的陆军。这使得我们陆军的指挥方针与训练方针无时无刻存在的冲突，士兵的行为也不能很好的管控，这无疑对帝国将来的军事行动不利。"
JAP_minzhi_desc:0 "幕府大政奉还后，明治大帝领导日本国民进行空前绝后，大刀阔斧的革新，并最终建立起一个能够屹立于东方的大日本帝国。虽然明治大帝晚年时期的政局十分动荡-本人也驾崩在1912年的多事之夏，但是他的精神以及毅力将会永远地映刻在全体日本国民的心中，并激励着国民向八纮一宇的目标矢志不渝地前进。"
JAP_samo_desc:0 "萨摩藩作为当年倒幕运动中最强大的地方势力，在大政奉还后，自然获得了难以想象的政治地位。如今的萨摩派几乎控制了整个海军和陆军部的一部分，这使得我们的军队不得不在某种程度上要听从萨摩派的指令以及训练方式；同样，萨摩耶对海军的垄断，也使得我国的海军力量得到迅速发展，并成为世界第四海军强国。"
JAP_fanfa_desc:0 "长州藩、 萨摩藩、 肥前藩 、土佐藩。这些地区的部分领导人物，在明治维新中都取得了影响极大的政治地位，并长期统治着日本的政治格局。同样，连带着他们的裙带人物-各藩大贾，也逐渐形成雄霸一方的财阀，控制着难以想象的工业资源以及劳动力。"
JAP_misao_desc:0 "由于粮食的减产和战争的进行，我国曾经在1918年到1919年初爆发过震惊世界的米骚乱。虽然如今动乱渐渐平息，但是米骚乱给我们的冲击，还远远没有停止下来，日本帝国需要一定时间的休养生息。"
JAP_misao2_desc:0 "由于粮食的减产和战争的进行，我国曾经在1918年到1919年初爆发过震惊世界的米骚乱。虽然动乱已经平息，但是米骚乱给我们的冲击，还远远没有停止下来，日本帝国需要一定时间的休养生息。"