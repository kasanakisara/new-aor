 EGY_Crazy_1919_6:0 "疯狂的20世纪"
 EGY_Crazy_1919_7:0 "疯狂的20世纪"
 EGY_Crazy_1919_tt:0 "§R我们必须快速结束这场骚动，否则，他将会带来无法预料的后果。§!"
 EGY_Crazy_1919_desc:0 "看看政府和英国佬给了我们什么吧，奴役与死亡！\n自称平等的和会竟然容不得一句正义的话语，呐喊者遭受他本来不应该遭受的悲惨命运，奋斗者遭受他本来不应该遭受的残忍结局。\n所谓的平等不过是谎言，所谓的公理不过只是空谈，我们唯有团结起来，才能把命运掌握在我们自己手里。\n我们经历了疯狂的大战，疯狂的会议，现在，该让他们见识我们的疯狂了。\n§R“武力夺去的，只能用武力夺回”§!"

 EGY_Puppets_puppetry:0 "木偶戏的木偶"
 EGY_Puppets_puppetry_tt:0 "£trigger_no §Y无法训练部队和改变部队编制§!\n"
 EGY_Puppets_puppetry_desc:0 "你看过木偶戏吗？木偶在木偶师翻飞的手指中变得栩栩如生，纵然他如童话般有自己的灵性，但仍然被木偶师所操控。\n埃及正处于这样的处境，被名叫英联邦的绳索捆绑着，而那位木偶师，叫大不列颠，他动用他的绳索，或者说是武力，将埃及变成了他的傀儡。\n但总有一天，木偶会挣脱他身上所捆绑的绳索，那一刻，便是自由的到来。\n§G“我们必须走这条鲜血铺就的道路。我们别无选择。”§!\n日落之时，自由将近。"

 EGY_YesSir:0 "Yes,Sir!"
 EGY_YesSir_tt:0 "§R当埃及进入战争状态时，数只部队将会部署§!"
 EGY_YesSir_desc:0 "由于英国人在埃及建立了殖民政府，导致我们并不能拥有自己的军队，只能组建出一支安保队伍来维护埃及的问题。\n但同时，无数精壮的青年们加入到英国人的军营中去，他们说英语，吃英国食物，学习去做一个英国士兵，来保卫英国人的利益，在必要时刻，他们甚至可能将矛头转向他们的祖国，可即便如此，他们仍然在军队中位于最底层。\n但英国人也给我们留下了后门，当埃及处于特殊状况时，便可以宣战，同时在英国人的协助下指挥这些军队，但到那时，埃及还有成功捍卫国家的希望吗？\n§R“在那日，人们将纷纷地离散，以便他们得见自己行为的报应。”§!\n希望那一日不会到来"

