 #ideas#
 EGY_Moving_towards_modernity:0"迈向现代"
 EGY_Moving_towards_modernity_desc:0"历史的车轮滚过，在埃及的土地留下了深深的车辙，我们曾经辉煌过，也曾经被历史所抛弃，拿破仑，英国人，大战，这些名词深深地刻在埃及的土地上，成为埃及的耻辱。\n时光仍在变迁，我们虽不能趁机搭上时代的快车，但也要随着车辙继续前行，虽然缓慢，但是我们不会放弃。\n§3“智慧是美的，因为是创造，而创造是美的，因为是智慧。”§!\n路途艰难，但仍要继续前行。"

 EGY_Crazy_1919:0 "疯狂的20世纪"
 EGY_Crazy_1919_0:0 "疯狂的20世纪"
 EGY_Crazy_1919_1:0 "疯狂的20世纪"
