SUD_Under_boots_desc:0 "§R为确保大英帝国的殖民统治，苏丹目前遭受着严格的军事管理。§!"
SUD_Mahdi_Legacy:0 "马赫迪的遗产"
SUD_Mahdi_Legacy_desc:0 "20余年的独立，使得大多数苏丹人不再屈从于帝国的统治之下，而是用一切的方式追求国家的独立。"