#匈牙利
#####民族精神#####
HUN_horthy's_radical_industrialization:0"霍尔蒂的激进工业化"
HUN_Intricate_ethnic_composition:0"错综复杂的民族构成"
HUN_Intricate_ethnic_composition_desc:0"奥匈帝国在我们国家内留下的不只有丰厚的遗产，还有着数不清的麻烦。我们同样继承了奥地利的多民族问题，特兰西瓦尼亚和斯洛伐克人想要从这个国家独立出去，而马扎尔人想要保持国家的统一，民族之间的冲突深刻的影响着匈牙利，也许有一天，民族间的问题会彻底的爆发。"
HUN_Monarchy_Without_Kings:0"无王的君主制"
HUN_Defence_Forces_desc:0"即使帝国已经解体，但帝国的遗产仍然庇佑着我们。匈牙利是旧帝国的军事根基，无数的士兵从这里出发奔向前线，他们在大战的炮火中得到历练，从而成长一个个优秀的士兵或者指挥官，他们将带着匈牙利走向胜利。"
HUN_Defence_Forces:0"帝国的遗产：防卫军"
HUN_Jewish_hatred:0"排犹传统"
HUN_Jewish_hatred_desc:0"犹太人是懒虫！吸血鬼！狡诈的投机分子！他们无时无刻不在吸食着匈牙利的血液，养肥了他们自己，而却使匈牙利落得如此田地，公民们，让我们拿起武器，把这群贪婪的人赶出匈牙利！n§R犹太人滚出去，这不是你的祖国！§"
HUN_HM_DESC:0"匈牙利王国 “摄政王”米克洛什·霍尔蒂         1868年出生在奥匈帝国一个贵族家庭的霍尔蒂，或许从来没有想过自己将会成为大匈牙利王国的摄政王。在他的生命的早年，辗转于各海军学院学习，而使这位海军上将走向政治道路的是“终结一切战争的战争”。   在大战中，这位海军上将并没有来得及大展宏图便接到了国家分裂的消息。而大战硝烟中所获得新生的大匈牙利王国中，这位海军上将迅速嗅到了权力的味道，很快扫清了自己的障碍取得了摄政王的位置，开始了摄政王的旅途。    掌权后，霍尔蒂不断镇压着国内危险的民族起义以防止大匈牙利遭到侵蚀，并且开始了自己雄心勃勃的工业化计划。"
HUN_I_T_DESC:0"“马扎尔先知”伊什特万·蒂萨伯爵         作为匈牙利前首相卡尔曼·蒂萨（Kalman·Tisza）之子。早在奥匈帝国时期，伊斯特凡就担任着帝国的匈牙利首相，持有民族封建观点的伊斯特万·蒂萨伯爵是匈牙利乡绅贵族的典型代表，他在1900年左右主导了匈牙利的政治格局。作为匈牙利首相，他培养出了一种威权主义的行政风格，对维也纳有着冷淡的忠诚，对少数族裔的要求保持着毫不妥协的态度。在匈牙利这个超民族国家里，他是马扎尔民族利益永不妥协的代表人物，这使得他成了王位继承人弗朗茨·斐迪南大公的劲敌，因为斐迪南大公试图降低1867年妥协所建立的马扎尔人特殊地位，并加强中央权威。蒂萨还反对继续推广联邦制，因为进一步的联邦制会让那些少数族裔获得更多的自治权。但就是这样一个保守派，却在一战前最早上书警告皇帝战争的到来，并预知了奥匈帝国的惨败。在那场大战中，伊斯特凡也曾亲自上马参与战斗，在喀尔巴阡防线上保护马扎尔人的领土。然而，帝国还是无可避免地迎来崩溃。匈牙利在战败中重获独立，伊斯特凡也凭借着他雄厚的政治资本与丰富的履历从首相变成总理。然而，强人政客如今已经日薄西山，面对群狼环伺的匈牙利政坛，他必须屹立不倒。"