 AOR_Enchante_cannot_call_ally:0 "你不能召唤盟友或加入盟友的战争，因为民族精神§Y分裂的赢家们§!。"
 AOR_Entente_no_war_desc:0 "从1918年9月20日协约国各国以赢家的姿态参加巴黎和会和伦敦会议瓜分败家起，协约国各国之间脆弱的信任便被利益分配问题摧毁殆尽。如今这个星球上最大的军事集团虽然依旧存在着，但在以英国法国为首的内部分裂趋向的炙烤下，令人生畏的协约国集团早已名存实亡。无论是否拿到自己的蛋糕，给别国自讨的战争出兵？别傻了，没有赢家会这么干。"