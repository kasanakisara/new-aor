 ITA.2.t:0 "风暴前夜"
 ITA.2.d:0 "意大利于1861年由萨丁·皮埃蒙特王国统一为拥有整个亚平宁半岛的意大利王国，从此开始新的历史篇章，然而在第一次世界大战过后，由于奥匈帝国在战时解体，意大利没有取得他们应有的殖民地与同南蒂罗尔的意大利人的民族统一，这使得国内反对政府的声音开始逐渐增加，人民迫切的寻求政府的改革与领土扩张，以墨索里尼为首的战斗法西斯团与以阿门多拉为首的全国民主联盟时刻威胁着政权的安定，而社会主义势力此时正处于分裂之中，无暇顾及革命。也许这个年轻的王国即将就这样毁灭，又或者说难道国王将会成为法西斯主义者的傀儡，但是我们总会有办法的，不是吗？"
 ITA.2.a:0 "朋友，向前看"
 ITA.3.t:0 "进军罗马"
 ITA.3.d:0 "墨索里尼领导着他的支持者们进军罗马，墨索里尼带领着一支由4万名武装士兵和志愿者组成的队伍，向罗马进发。在进军罗马的过程中，墨索里尼遇到了一些反对他的人群和组织。然而，他的队伍很快就镇压了这些反对者，并在之后成功抵达了罗马。意大利政府宣布进入紧急状态，并派出军队试图阻止墨索里尼的队伍。但是，在面对法西斯党员们的决心和士气时，政府军很快就崩溃了。"
