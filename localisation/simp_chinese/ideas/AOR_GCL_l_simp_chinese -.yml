l_simp_chinese:
 #大哥伦比亚
GCL_the_Bannan:0 "香蕉"
GCL_the_Panama:0"《巴拿马城条约》"
 GCL_the_Panama_desc:0"1898年，当时苟延残喘的联邦被迫与法国人签订了城下之盟，即《巴拿马城条约》。我们的国家虽然得到所谓的“新生”，再次举起了先祖们所用过合众国的大旗，但我们却失去了一切的市场地位，只得成为法国人的农田；我们的政府不过财主的傀儡，四方的土地被法国公司肆意兼并，千万的人民从考迪罗的奴役后转变到了法国人奴役，一切的一切仿佛都要使哥伦比亚跌入无底深渊……"
GCL_the_Bannan_desc:0 "在郁郁葱葱的热带雨林中，你总能看见那些遍体鳞伤，骨瘦如柴的混种人在拾取着各类水果……没错，他们当然是拉丁美洲各国的公民，但他们同时也是以法国为首的西方水果公司的雇员。按他们自己的话来说，就是“Arrendatario”。他们背井离乡，只为求一口热汤与栖息之地，并远离动乱。只可惜，他们闯入了地狱者设立的的乐园-他们受到了监禁，他们照样食不果腹衣不裹体，如机械般麻木的收割作物，或许，并在这里将献出他们的一生。"