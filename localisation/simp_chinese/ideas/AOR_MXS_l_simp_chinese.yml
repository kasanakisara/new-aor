MXS_Black_gold_desc:0 "在遥远的50年前，法国人靠着战胜美国所得到的话语权，使得加利福尼亚这片肥沃的土地重新回到墨西哥的怀抱-尽管我们付出了相当沉重的代价。但如今，加利福尼亚仍有余光的金矿以及数量无法估计的油田，为帝国带来了巨大的财富; 同时加利福尼亚优越的经济地位也吸引了大量人口迁移至此，并逐渐形成了以洛杉矶为中心的墨西哥加利福尼亚工业区，这是我们帝国的无上光荣，但或许也是墨西哥普通百姓的阵阵悲歌……"
 POLITICS_Maximiliano_DESC:0"§Y马西米利安诺一世§!，奥地利哈布斯堡王朝成员，曾任伦巴第-威尼西亚王国总督，马克西米连在1857年与比利时国王利奥波德一世之女夏洛特公主结婚。法墨战争之后在拿破仑三世的怂恿下接手了墨西哥的皇位，如今在位已有五十年之久。\n\n皇帝的改革充满着理想，皇帝是一位理想主义者。马克西米连其人如此温和，充满感情，甚至有些愚蠢。但是任何一个阅读过他的作品或者研究过他行为的人都会认同，他真心实意地热爱着他新的祖国，并致力于保护这片土地上的人民。\n\n作为一名空降的皇帝，马克西米利安在刚刚继位的早年间争议不断，虽然他继续保持了胡亚雷斯提出的土地改革、宗教宽容、扩大选举权等自由主义政策，但因为当时墨西哥人普遍反对法国侵略者的情况下，年轻的皇帝困难重重。但好在长达半个世纪的统治已经讲这位皇帝的形象刻在了每个墨西哥人的脑子里。\n\n但，他们不需要下一个皇帝了!\n\n§R“孩子们瞄准了，瞄准正前方!” §!"

