l_simp_chinese:
 #阿比西尼亚
ETH_the_prince:0 "摄政王"
ETH_FOUR:0 "四面楚歌"
ETH_the_prince_desc:0 "经过了几年持续不断的动乱后，我们的佐迪图女皇，所罗门王和示巴女王224代继承者，终于登上了皇位-但真正在皇宫之中坐筹帷幄的则是摄政王塔法里·马康南。摄政王以他雷霆的手段稳定住了混乱的政局，并领导百官开启了阿比西尼亚的改革。谁也不知道塔法里的野心究竟到了什么地步，只能寄希望于他能够在国家彻底安定后大政奉还。"
ETH_FOUR_desc:0 "呜呼！请你们看看四周吧，阿比西尼亚的臣民们，英国人、法国人、意大利人、环顾在我们的国家四周，并且已经将手深深地伸了进去。我们就犹如那餐盘上的骆驼肉，仿佛将要被瓜分殆尽……我们的国家是否能够在混乱之中打破这种无形的封锁，阿比西尼亚是否能够开启伟大犹太民族的复兴之路呢？"