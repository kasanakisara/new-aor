l_simp_chinese:
 #ideas#
 Leung_desc:0"梁启超初步政坛便是维新变法，彼时年轻的他为改变腐朽的清廷竭尽全力，虽不幸失败，但其热忱之心为天下人敬佩。后加入进步党，在对民国虚假共和渐感失望之际，又逢新文化运动兴起，遂与李剑农、熊希龄等人合力掀起华南“联省之风“，共同提出并完善了联省主义思想。随后梁启超以进步党为核心，吸纳进步民主人士，希望能够践行联省主义，为中国带来真正之自由平等。"
 Ming_desc:0"陈炯明在辛亥革命后，稳定了同盟会的政权，在广东先平定民军土匪，又召开惠州陆军军官学校，培养共和派军官，成绩斐然。在北洋咄咄逼人下，毅然发动“拒直援湘”和“讨龙之役，帮助赵、陆二督稳住局势，成功维护了华南的独立和安定，人们称赞其为”共和将军“。不过1917年的“广州事变”使得其的风评蒙上阴影，其驱逐国民党的行为被部分共和分子指责为军阀行径，而其号称拥护联省也因缺乏实际行动而饱受质疑。\n如今三督驱逐了来自北京的进步党中央，联省将走向何方，且拭目以待。"
 Qiao_desc:0"王亚樵以古烈士风闻名黑白两道，其人嫉恶如仇，也是同盟会的资深大佬。进步党在北京时，常常要忍受来自北洋的地痞流氓的骚然和北洋探子的窥探，最终在道上的推荐下，进步党选择招揽王亚樵来负责对抗，随着进步党南渡，中华联省的成立，王亚樵也成为了联省情报机关特调局的局长。可悲的是联省终究没有长久，在经过几场内战后，龙济光在法国的扶持下上台，大肆出卖国家主权。王亚樵深恨此叛国贼残民害国，联合共和军官和爱国军阀组建救国同盟，在诛灭国贼龙济光后，决心进一步荡涤九州身上吸血的水蛭—列强。"
 Long_desc:0"龙济光靠镇压起义发家，大肆屠杀反抗军民，又抓住民初时机投靠袁世凯，方为广西都督。但在任上横征暴敛，大种鸦片，且放纵匪寇劫掠，使得广西民不聊生，最终在“讨龙之役”被驱逐出广西，但龙野心不死，逃亡广州湾投靠法国，并在法国的支持下重建自己的“济”军，最终趁华南三督分赃不均陷入乱战之际，在法属印度支那总督出兵支持下入主广州。"
 
 UPC_Military_intervene_government:0"武人干政"
 UPC_Military_intervene_government_desc:0"自民国建立以来，形成深厚之武人干政恶俗。众军阀视国家制度为无物，以兵强马壮为恃，常常粗暴插手政府。"
 UPC_Central_place_1:"央地关系：§R自治§!"
 UPC_Central_place_1_desc:0"欲实行联省制度，重在厘定央地关。而现今的中华联省外重内轻，权力悉数归于各省，任由地方自治，中央无力管辖。"
 UPC_Under_three_governors:0"三督治下"
 UPC_Under_three_governors_desc:0"华南三省都督当权日久，其亲信党羽势力盘根错节。效忠三督的粤湘桂三系在政界和军方串联，形成大大小小的派系山头。"
 UPC_basic_education_system_desc:0"有赖于华侨和爱国实业家的支持，华南地区的教育发展在整个中国都走在前列，但相比于欧洲列强，我们才刚刚起步，有待发展。"
 UPC_basic_education_system:0"刚起步的基础教育体系"
 UPC_Drink_room_master:0"饮冰室主人"
 UPC_Bodhisattva_president:0"菩萨总统-黎元洪"
 UPC_Bodhisattva_president_desc:0"正所谓时势造英雄，黎元洪恰逢武昌起义之时机，顺势就任湖北大都督，亲手缔造民国。又在南北议和后身居副总统之位，以进步党理事长之位团结北京民主人士，其声望日盛。人们大多羡慕其造化，戏称其一声“黎菩萨“。但自坐上副总统之位，在众进步党人士的簇拥下，黎元洪开始真正接受共和思想，并积极推动联省之风。在袁世凯去世的当今，黎元洪决心抓住时机，去实现心中的共和理想。"
 UPC_Reorganized_Progressive_Party:"初步改组的进步党"
 UPC_Reorganized_Progressive_Party_desc:""
 UPC_use_country_ready_money:"民国储备金"
 UPC_use_country_ready_money_desc:"我们抓住机会，转移了部分存于京兆的国家储备金，这使得联省政府前期的资金储备相当充足，大有可为。"
