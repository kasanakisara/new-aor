#阿拉伯半岛
#####民族精神#####
ARA_Uncompatible_Kingdom:0 "不合的王国"
ARA_Uncompatible_Kingdom_tt:0 "阿拉伯联合王国由以下成员酋长国组成：\n£flg_ARA §G汉志王国§! £flg_SAU §n利雅得酋长国§! \n£flg_JSR §O舍迈尔酋长国§! £flg_IDE §3伊德里西酋长国§!"
ARA_Uncompatible_Kingdom_desc:0 "§Q《大阿拉伯联合王国宣言》§!，或称§Q耶路撒冷宣言§!内容如下(节选)：\n1.各酋长国自治，设立阿拉伯王国议会,国王由各酋长国推举产生。\n2.组建大阿拉伯军队，暂时由英国顾问团负责训练。允许各酋长国拥有一支人数不超过2000人的酋长卫队。\n3.阿拉伯王国议会是各酋长国的协商机构，必须遵守会议通过的所以决定。\n4.如有破坏宣言的行为，大英帝国和法兰西共和国将采取必要措施维护大阿拉伯的稳定。\n5.第一任国王由阿拉伯领袖侯赛因·伊本·阿里担任，设立伊斯兰事务委员会管理境内的宗教事务。\n\n§R他们之间似乎貌合神离，互相敌视，这个联合的王国看起来并不怎么联合。§!"
ARA_Chieftain_Assembly:0 "酋长议会"
ARA_Chieftain_Assembly_tt:0 "§G酋长大会将确保王国处于稳定之中§!"
ARA_Chieftain_Assembly_desc:0 "酋长议会（阿拉伯王国议会）是阿拉伯联合王国的协商机构，也是所谓的“最高权力机关”。各酋长国的代表在这里为王国的大小事务操劳，重大的事务则需要酋长们亲自面谈。\n\n§R酋长议会真的会确保王国处于稳定之中吗？§!"

