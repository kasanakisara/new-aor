l_simp_chinese:
 #南朝鲜民族精神
  Coach_Corps:0"教练兵队"
  Coach_Corps_desc:0"1876年朝鲜开港以后,统治朝鲜的闵妃集团开始实行改革,军事改革是最先进行的部分。1881年(高宗十八年）四月二十三日,在日本驻朝公使花房义质和兵曹判书闵谦镐的建议下,朝鲜王朝正式设立了别技军(“别技军”即精锐部队之意）,教授新式武器及战法,由日本陆军工兵少尉堀本礼造担任教官,负责训练别技军"
  Japanese_occupation_puppet:0"日占傀儡"
  Japanese_occupation_puppet_desc:0"《釜山条约》签订后,朝鲜成为日本的傀儡,没有自由,也没有地位。如今已经过去了9年,我们的情况没有任何变化。但是,我们被日本控制,唯一的好处就是我们可以找日本要各种各样的援助"
  Backward_industry:0"落后的工业"
  Backward_industry_desc:0"我们的自主工业基本上没有啥发展,一直是靠日本人在南朝鲜的投资才能发展我们的工业,因此我们的工业基本上非常落后"
  Oppressive_land_policy:0"压迫性的土地政策"
  Oppressive_land_policy_desc:0"自此日本占领朝鲜以来,朝鲜的农民起义源源不断地爆发。为了镇压这些农民,我们在日本人的帮助下采用暴力的手段去镇压这帮子农民。现在,只要有农民想要起义,我们就能马上去镇压他们"
