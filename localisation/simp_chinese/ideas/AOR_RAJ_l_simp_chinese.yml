 #ideas#
RAJ_NCP:0 "国大党万岁！"
RAJ_Famine:0 "饥荒肆虐"
RAJ_The_monarchy:0 "王公与土兵"
RAJ_Land:0 "愚昧之地"

RAJ_NCP_desc:0 "印度的国大党自成立以来，就一直作为印度人的本土政治先锋而存在，并与英国人进行着无时无刻、无处不在的斗争。世界大战结束后，国大党人愤怒于英国人许下的谎言，发动了一次又一次的城市罢工，给英国殖民当局带来了巨大的冲击，但也使他们获得了镇压国大党的借口。"
RAJ_Famine_desc:0 "世界大战开始后，英国殖民者强制在印度进行征粮运动，这本就使得印度商品粮与储备粮的短缺问题雪上加霜，并最终导致了印度粮食市场的大恐慌以及农村的大饥荒。粮食飞速涨价，农夫余粮净空，饿殍遍野，上百万人印度人随着协约国的胜利而献出自己的生命……"
RAJ_The_monarchy_desc:0 "英国人之所以能够牢牢地统治印度斯坦，无非靠着两件法宝：地方的王公以及印度土兵。对于地方贵族，英国殖民者授予他们统治权，代行殖民者进行统治；对于印度无业游民，则采取大肆征召的方式，将他们纳入到了殖民地军队体系中，使得其最终形成了体量庞大的印度帝国军队。但是，落后的管理也使得印度更加落伍于世界。"
RAJ_Land_desc:0 "古代的印度曾经是举世闻名的智慧之国，而如今他的人民却跌入万劫不复的未开化深渊。如今的印度有占总人口将近90%的文盲，本土的科学家、文学家以及实业家微乎其微，本土的产业也难以和殖民者相抗衡。如果我国的教育水平持续恶化，印度文明可能就会在英国的统治下彻底中断了。"
