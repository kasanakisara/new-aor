 #ideas#
Hermes_Rodrigues_da_Fonseca:0"埃尔梅斯·罗德里格斯·达·丰塞卡"
BRA_wansuifongsaika:0"万岁!丰塞卡？"
BRA_wansuifongsaika_desc:0"自丰赛卡将军推翻巴西帝国以来，他所领导的政府统治新生的巴西共和国已经将近30年，而如今，他的侄子艾尔梅斯.罗德里格斯接替了他的一切职位，成为了巴西的新一任统治者。艾尔梅斯相对开明的执政手段赢得了巴西国内不少人的好感，但是，他能够扭转巴西混乱的局面吗？"

BRA_bujiedebaizang:0"不竭的宝藏"
BRA_bujiedebaizang_desc:0"经过巴西人几百年来的经营，我们早已经把巴西改造成了供应世界的天堂之国。我们的地下拥有大量的铁矿石与铝矿，田野间拥有数不尽的可可与蔗糖，这使得我们的政府获取了巨额财富，也间接改善了巴西人民的生活。"

BRA_shengbaoluoxiedin:0"《圣保罗协定》"
BRA_shengbaoluoxiedin_desc:0"30年前的丰塞卡将军手足无策的时候，法国人伸出了援手。在我们的革命取得成功后，1892年，我们与法国人在圣保罗签订了一项双边协定：我们的市场将会对法国接轨，巴西的贸易将会高度开放。巴西因此而获取了大量极为廉价的工业品，但本土上在起步的工业部门也遭受了盟友的冲击……不过，当法国人把保护协定写在条约中，谁还在乎这个？"

BRA_nanmeidekanshouren:0"南美的看守人"
BRA_nanmeidekanshouren_desc:0"在过去的50年来，我们频频向四周的国家发动进攻。《圣保罗协定》签订后，我们同样也要履行保卫法国利益的任务。我们有权利在大哥伦比亚或者巴拿马地区的任何地方驻军，去镇压那些胆敢反抗盟友的叛军。但这也使得我们的军费开支入不敷出，巴西的军部也变成了一只膨胀的怪物，并逐渐不听指令……"

BRA_yidaobahen:0"一道疤痕"
BRA_yidaobahen_desc:0"在雨林与高原不可见人的地方，总有一群类似牛仔的人四面出击，只为打击政府，他们绝大多数同属于一个团体-联邦派。这些人不满丰塞卡将军在推翻帝制后的所建立的共和体制，他们是地方最为激进的武装分裂势力。尽管巴西政府已经镇压了他们将近30年，但他们仍然像蚊子一般不断的复生，并似乎将燃起一把熊熊的烈火……"

