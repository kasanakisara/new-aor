#奥斯曼干涉部队
####政党####
#####民族精神#####
Turkish_officer_corps:0"土耳其军官团"
Turkish_officer_corps_desc:0"耻辱的大战使伟大的帝国分崩离析，随着世界局势的改变，土耳其有能力收复自己的领土。我们将派出专业的军官团，为亲土耳其反抗者提供一切帮助。"
come_from_comfusion:0"来自混乱"
come_from_comfusion_desc:0"叙利亚起义一声炮响，自由与混乱接踵而至。我们控制的领土极不稳定，战线与指挥系统近乎于无。作为一个割据势力，在统一之前我们无法解除混乱状态。"
Regain_lost_ground:0"收复失地"
Regain_lost_ground_desc:0"奥斯曼曾经是一个横跨亚非欧的庞大帝国，如今却被英法肢解。为了我们国家的伟大复兴，我们必须抓住这个千载难逢的机会，一举收复我们的核心领土。"
