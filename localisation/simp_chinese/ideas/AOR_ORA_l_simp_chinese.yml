 POLITICS_SIMON_DESC:0"阿根廷现任总工会领导，§Y西蒙·拉多维茨基§!1891年出生在乌克兰。因在革命运动中有突出表现，15岁即被选为所在工厂苏维埃的第二书记。1905年俄国革命后，为躲避政府清算，西蒙于1908年3月流亡至§Y布宜诺斯艾利斯§!。\n\n在新的工作环境中，西蒙继续对安那其主义进行钻研，并于同年加入阿根廷地区工人会。在阿根廷工人之间，西蒙迅速积累了起巨大的人望：相较于其他革命者，他为人宽厚且随和，总能和工人们打成一片。\n\n在1909年罢工运动中，他因为对残酷镇压罢工的警察局长投掷炸弹而被§Y判处无期徒刑§!，于所谓“世界尽头”火地岛上的§Y乌斯怀亚监狱§!关押。\n\n年轻的机械师在狱中仍坚持推动革命事业，凭借其人格魅力与过人的智慧构建立了他的情报网，并借此与外界联系，用纸笔指导罢工运动。因为其出众的能力和丰富的斗争经验，缺席会议的西蒙被破例推选为阿根廷地区工人会的§Y总工会领导§!。\n\n随着内战全面爆发，西蒙深知自己无力在狱中指挥如此规模的行动。在确定好总工会行动方针后，西蒙开始了他的第一步行动：\n\n§R越狱。§!"