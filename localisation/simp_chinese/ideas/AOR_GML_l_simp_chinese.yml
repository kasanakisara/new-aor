l_simp_chinese:
 #ideas#
GML_xiangjiao:0 "橡胶天堂"
GML_hetong:0 "不合的政权"
GML_xiangjiao_desc:0 "自19世纪后期的第一粒橡胶种子来到东印度，就迅速在荷兰人的手下茁壮成长，并长成了一片又一片的橡胶种植园-它们既是荷属东印度与现在马来由的骄傲，也是我们最为重要的经济来源，橡胶的盛产使得各路尼德兰公司获益颇多，同时也促进了东印度地区的基础设施发展。"
GML_hetong_desc:0 "如今的东印度殖民政府早已变成所谓的大马来由政府。这是英国给予世界大战后尼德兰的利益之一，即将婆罗洲的英国统治地区转让给东印度。虽然我们的经济实力有所增强，但是该地区与其他东印度地区的不合与冲突，反而加剧了我们治理东印度的难度。"