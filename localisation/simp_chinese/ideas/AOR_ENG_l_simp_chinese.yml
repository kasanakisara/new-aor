 #英国
 #####人物汉化#####
 David_Lloyd_George:0"大卫·劳合·乔治"


 #####民族精神#####
 george_v:0"乔治五世"
 ENG_guard:0"卫道士"
 ENG_guard_desc:0"大战之后，日不落帝国在整个欧陆乃至全世界确立了霸权，为了大英子民世世代代积累的成果，我们必须担负起一个英国人的责任，成为联合王国霸权的卫道士"
 ENG_pioneer_of_interventionism:0"干涉主义急先锋"
 ENG_pioneer_of_interventionism_desc:0"“就算是恶魔，只要他和法国人对着干，我们就要帮帮场子!”随着一战结束后英国内状况恶化与英法矛盾的越发加剧。英国为麻痹民众对国内的感知，用大量的对外干涉持续转移矛盾。被“大英天命”煽动的军队不知疲倦地对外发起强硬粗暴的干涉战争，这使得不少人相信，大英，还是那个“日不落帝国”"
 ENG_Memories_of_the_War:0"大战的记忆"
 ENG_Memories_of_the_War_desc:0"那场惨烈的战争结束后，虽然伟大的英国还是获得了胜利，但胜利都需要有代价。战争严重消磨了年轻人的爱国热情，工厂也开始出现疏漏。我们看似胜利了，但日渐上涨的财政赤字就如同一只恐怖的大手一般在摁着我们的头，让我们去回忆那不堪的战争"
 ENG_Stamp_collecting_the_king:0"集邮国王"
 ENG_The_sun_will_set_on_the_empire:0"日将落帝国"
 ENG_The_sun_will_set_on_the_empire_desc:0"大众的感官可以被麻痹，但是客观的问题可不是所谓“日不落天命”能遮掩的。总有人会发现问题，而有人只是在嘴上打抱不平，但是有人会从物理上“打爆不平”。即便只是现阶段，外部殖民地原住民的起义也足以将“日不落帝国”永远地钉在上个世纪。深谙此事的政治家们只能希望这种事不要愈演愈烈，希望那些两足牲口们不要幡然醒悟，将自己推给地狱的恶魔"
 ENG_the_beautiful_of_market:0 "市场之美"
 ENG_the_beautiful_of_market_desc:0 "总有一些暴徒试图宣传应该对市场进行干预，但那不过是赤匪的做法罢了!只要人民有足够的资金，合规缴税，为何不让他们投资？人民的财产越滚越大，生活也就越变越好，我们政府的腰包也能鼓起来，由此可见，开放而包容的市场有利于经济发展。市场越自由，人民越自由!"
 ENG_the_help_from_brother:0 "兄弟之助"
 ENG_the_help_from_brother_desc:0 "作为唯一与帝国接壤的国家，爱尔兰，钉在帝国的后花园。我们当然不能用暴力去将他们征服——这样的代价对于帝国而言是一种亏损。我们当然应尽兄弟之谊，予以一些可能的援助。小麦、牛奶、坦克、轮船……我们会援助他们所需要的几乎一切物资，并对我们的兄弟严加管教——帝国从不需要不懂得低头的兄弟。"
 ENG_Imperial_Federal_Economic_Recovery_Act:0 "《帝国联邦经济恢复法案》"
 ENG_Imperial_Federal_Economic_Recovery_Act_desc:0 "帝国在战争中已经经历了太多不幸与毁灭，但是不能久久沉溺于过去的悲伤中。逝者已去，生者当自强。我们要让大英帝国的战士们卸甲后有田可耕。新出台的经济恢复法案将协调部分工厂开放更多的岗位以挽救联邦的经济，逐步减少失业人员从而刺激消费。尽一切力量，为大英帝国的社会经济做心肺复苏。"

