#库尔德人

#####民族精神#####
Alone_and_no_help:0"孤立无援"
Alone_and_no_help_desc:0"叙利亚的起义军有英国援助，土耳其人得到的是奥斯曼军队的支持。只有我们——可怜的库尔德人，什么都没有，只能依靠我们自己的力量。更可悲的是，我们割据的地带是贫瘠的山区，这使我们的军事工业近乎没有"
last_kurds:0"最后的库尔德人"
last_kurds_desc:0"如果说哪个民族最希望得到自由，库尔德人肯定首当其冲。我们曾经被奥斯曼帝国残暴的屠杀，如今又被法国人镇压。库尔德人不会顺从，根植在我们脑海中的是仇恨。殖民者必须死去，而库尔德人必须自由。"