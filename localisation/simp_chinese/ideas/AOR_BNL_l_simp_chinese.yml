UK_help:"绳上蚂蚱"
Apparent_equality_desc:0"比荷卢联合在原三国政府的架构之上增设了一个三等分议会作为最高的权力机关，国家内部按照主席团模式轮流主持大会，§Y每三年进行一次换届§!。此举使得比利时，荷兰与卢森堡的所有公民都拥有§Y“完全平等”之政治待遇§!。"
Benelux_Governing_in_Netherlands_desc:0"比荷卢联合目前由§O荷兰政府§!组建联邦主席团，注重与其他自由国家之间的贸易和合作，并以此来巩固国家的地位。"
The_Benelux_Constitution_desc:0"根据《伦敦倡议》，比荷卢联合应尽可能的维护低地的和平与稳定，带领低地人民共造繁荣的未来。而《宪法》就是为了达成这一目的所设立的总纲领，代表了三国人民共同的利益和期望。"
BNL.idea.1.tt:0"无效果，随欧陆局势变化而变化..."
UK_help_desc:0"好吧，毫无疑问。我们的胜利全亏了§E英国人§!的帮助。将冠冕堂皇的废话放在一边，英国人帮助我们的目的就是为了盯梢德法二国。\n英国人的援助正一船接一船的送来，而我们总会为此付出些什么。"