 USA_dazhanzhimo_desc:0"席卷全球的大战已经结束，美利坚也参与其中，并与盟国共享了胜利的荣光，这应该值得每个美国人……庆祝吧？。1919年的夏季，一股恐惧感随之席卷大街小巷。在那热火朝天的底特律，在那遥远的圣弗朗西斯科，在那已经不为人所知的白宫里，命运的齿轮已然开始转动……§R我们静静等待§!"
