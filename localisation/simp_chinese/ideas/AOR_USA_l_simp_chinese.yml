 USA_the_divided_nation10_desc:0"内战爆发，尘埃落定……但人类心中的火焰并没有熄灭，对自由的呼喊却响彻了整个美洲大陆。§R让美国人民与联邦政府去捍卫最后的尊严，同地狱而来的恶鬼-人间的恶徒们展开最后的对抗！§!\n\n§Y我们一定得胜，正义属于我方，“我们信赖上帝。”此语永矢不忘。你看星条旗将高高飘扬，在这自由国度，勇士的家乡!§!"
 USA_sandaliren_desc:0"合众国在费城的阴影中艰难爬行。尽管联邦政府很早就宣布废除《费城条约》及其相关的一切内容，但这只是美国北方一厢情愿的幻想。不过依靠着80年代的南方危机，美国北方迫使南方签订了另外两大协议-即1885年的经济、政治协定《查尔斯顿协议》与1887年的军事协定《西点协议》。\n南北双方在原先《费城条约》内容的基础上进行了延伸，这使得条约体系利于北方，并暂时维护了美国表面的统一。以上三份文件被世人称为后美国时代的“三大立国文件”。不过，暗潮涌动，三大文件所带来的后遗症，时时刻刻影响着南北双方。在新的时代背景中，在仇恨与利益的驱动下，美国即将围绕着它们展开史无前例的斗争……"
 USA_sandaliren1_desc:0"合众国在费城的阴影中艰难爬行。尽管联邦政府很早就宣布废除《费城条约》及其相关的一切内容，但这只是美国北方一厢情愿的幻想。不过依靠着80年代的南方危机，美国北方迫使南方签订了另外两大协议-即1885年的经济、政治协定《查尔斯顿协议》与1887年的军事协定《西点协议》。\n南北双方在原先《费城条约》内容的基础上进行了延伸，这使得条约体系利于北方，并暂时维护了美国表面的统一。以上三份文件被世人称为后美国时代的“三大立国文件”。不过，暗潮涌动，三大文件所带来的后遗症，时时刻刻影响着南北双方。在新的时代背景中，在仇恨与利益的驱动下，美国即将围绕着它们展开史无前例的斗争……"
