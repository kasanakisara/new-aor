 USA_kuangyezhidi_desc:0"虽然美国内战结束了，但前总统林肯所颁布的《宅地法》在费城会议结束后仍然受到南北双方的接受-为了巩固战后的经济发展，也为了南北双方的利益争夺，谁都无法拒绝这一块诱人的蛋糕。大量的东部移民怀揣着他们的西部梦-对于自己新生活的希望，络绎不绝地前往西部开荒；在广阔的土地上挥洒了他们勤劳的汗水。\n梦想远走高飞，而最后被秃鹰撕的粉碎。\n快速的发展则摧毁了一切。众铁路集团在西部肆无忌惮地违反《宅地法》条例，公然强制收购自由公民的土地，并将大量游牧民与农民被迫赶往铁路公司沿线的工厂进行劳动，生活在天外的印第安人也不能幸免。东部的大量公司开始进入西部，在铁路公司的助长下，嚣张着推行着自己的经济压迫。西部人无论如何强烈抗议托拉斯的野蛮行径，并要求联邦政府给予合法的政治权利以反抗托拉斯的经济统治-但从来得到的答复都是空气。联邦为了维护西部的经济稳定，不得不更加有求于铁路托拉斯的支持。这使得他们更加肆无忌惮，仿佛西部已经成为了工厂主与大农场主的血汗王国了。\n不过，总会出现插曲。出没于山间和丛林的，在荒漠与沼泽中留下自己足迹的，他们无时无刻用自己的方式表达了西部人民的愤怒-用枪和炮来宣告自己的自由，这使得东部政府们痛苦不已，并派出了一支由潘兴将军领导的西部特遣军前去维护西部的稳定。佣兵与流氓也随之而来，西部最终依然成为了能够给予所有人最终命运的天堂。但他的故事还远远没有结束……"
 USA_kuangyezhidi_tt:"§R请务必要维护西部稳定！不然会有难以想象的后果……§!"
 USA_wuxunzhidi_desc:0"那涌动暗流的不安与怒火终于化为滔天洪水，摧毁了整个西部的旧秩序。而从这废墟中诞生的一个个团体，都将撕下自己曾经展现的一面。亦或是善良、正义、金钱与邪恶-§R一切的旗帜都可以参与这前无古人后无来者的生存竞技场，供世人观赏。而残忍的战斗，才刚刚开始……§!"
 USA_busidexintuo_desc:0"当今国际上有一句玩笑：托拉斯代表经济，而美国代表托拉斯。\n自从那如潘多拉魔盒般的《第十五修正案》通过以来，美国企业就如脱缰野野狗一般席卷各州。他们犹如鱿鱼和蜘蛛一般侵吞着一切可以看到的东西。商品、工厂、甚至于人和活物们都逃脱不了他们的手掌。从北方到南方再到西部，到处都是闪闪发光的“信托”，无声诉说着他们的不为人知的血肉罪恶。黄金的信徒、人间的怪兽、是那些混沌之人的“救世主”，就这么现于人间。\n进入到了新世纪，美国的资本格局已经十分明了：洛克菲勒家族所控制的标准石油公司与南方开发公司渗入了美国所有的工业经济命脉，摩根家族所控制的美国各大银行成为了美国金融界的坐标，梅隆家族控制了五大湖地区的重要工业设施，而铁路家族们则控制了美国大大小小的交通枢纽。全国几乎都被这些精英们瓜分殆尽，政治、经济变成了他们可以随意摆弄的玩偶，而联邦政府与地方政府对此无能为力。物是人非，夕阳西下，随着不知名的危机到来，他们又将目光飘向了何处呢……"
 USA_busidexintuo_tt:"§Y民用工厂§!的建造速度§R随托拉斯的经济而变动§!"
 USA_busidexintuo_2_tt:"§R您无法更改§!经济法案\n§R您无法轻易更改§!征兵法案"
