 USA_the_divided_nation7_desc:0"内战爆发，尘埃落定……但人类心中的火焰并没有熄灭，对自由的呼喊却响彻了整个美洲大陆。§R让美国人民与联邦政府去捍卫最后的尊严，同地狱而来的恶鬼-人间的恶徒们展开最后的对抗！§!\n\n§Y玉碎还是瓦全，摆在我们面前，自由人将奋起保卫国旗长招展！祖国自有天相，胜利和平在望；建国家，保家乡，感谢上帝的力量。§!"
