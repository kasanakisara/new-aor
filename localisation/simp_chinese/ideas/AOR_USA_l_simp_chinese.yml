 John_Joseph_Pershing:0"约翰·约瑟夫·潘兴"
 John_Joseph_Pershing_desc:0"约翰·约瑟夫·潘兴（John Joseph Pershing）于1860年出生在美国密苏里州，他很幸运地通过自己幼小的年龄躲过了内战的浩劫。然而，他这一生却与战争和冲突结下了不解之缘。\n\n潘兴，是在一个极为尴尬的环境中长大的。密苏里州本应属于南方蓄奴州的一份子，却在内战中加入北方，以此来谋求最大的利益-然而随着南北的停战，密苏里州演变成了所谓的“自由中立州”尽管她仍然保持着蓄奴的传统，但她的议员们却与南方势同水火，被认为是南方的叛徒，同时北方也认为其是“自由州的毒瘤”。\n\n潘兴从第一次踏出密苏里州开始，就一直对自己属于“自由州”的概念感到深深的怀疑，他感受到自己无法融入这个所谓的广大社会，走到哪里都会有人质疑其合法公民的身份-因为他是南北都认为的毒瘤州里头出来的乡巴佬。\n\n于是他选择了逃避。\n\n他选择了进入北方西点军校学习，并参加了联邦军队，逃离这个繁荣的是非之地，奔走至已经混乱不堪的黑暗西部。他在西部用自己一次次摧毁印第安部落和一次次斩下首级的证明，向美国政府证明自己的忠心与勇气，想他自己和其他人证明自己是一个真正的美国人-不会再遭受白眼的美国人！\n\n就这样，在漫天黄沙中摸爬滚打了30年。整整30年，他终于得到了华盛顿传来的金牌，晋升三星中将，统领着一支强大的“西部特遣军”，犹如大象般在西部扎稳脚跟。多年来的杀戮，早已让他麻木冷漠；或许在亲友的前面，他还能保持一丝温情，不过更多的时候，他只不过是把世间万物当成作战计划的一份，并陷入了无穷的空虚。为了作战，他可以去不择手段的搜捕反叛者，可以去用一切有底线的方法养活他的军队，哪怕是不听从华盛顿的命令，他也要在西部稳稳的保持自己的霸权，他早已把这支军队当成了他最终的归宿。\n\n潘兴固然已经成为了美国军事力量中的巨人，但即使是成为巨人的他也有着一颗永远无法挥去的梦魇：他到底是谁、从哪里来、再到哪里去，到底要做什么，究竟还有什么东西能够支持他继续走下去？\n§R或许谁都无法给他答案§!"

 Hiram_Warren_Johnson:0"海勒姆·约翰逊"
 Hiram_Warren_Johnson_desc:0"当东海岸的报纸登报这个名字时，必然又是一篇来自于西部党派活动遭受镇压的消息。海勒姆·约翰逊几乎已经成为了美国最火热的西部政治新闻“名词”，只要有关于他，那必然是各大媒体争相抢报的劲爆消息。\n\n海勒姆·约翰逊（ Hiram Warren Johnson）作为一个地地道道的加利福尼亚移民者，从小便在西海岸生活，他的成长经历可以说代表了美国第一代西部开拓者的形象。不过，随着东部资本的延伸以及铁路公司的推进，不少的“异乡人”开始以一种难看而又恐怖的方式兼并大量土地，小时候与之交谈甚欢的淘金工与牛仔们通通不见了，取而代之的是一座座血汗工厂和一个空白的投票箱-西部人民可没有任何的政治权力能够左右美国。\n\n但谁愿意又屈于这种境地呢，约翰逊从年轻起就开始参加西部的政治运动，他们要求东部联邦政府授予西部中立州完整的政治权利，并设立一个与南北委员会平级的“中立州委员会”。只可惜这些弱小之人最激烈的话语，只不过是华盛顿的耳旁风，再一次又一次的锤炼中，西部党派从最开始的民权党转变到后来统一多数党派的西部民主同盟党，在这其中的约翰逊发挥了不可磨灭的作用。因此，他于1915年被正式选为党总裁。\n\n1919年初的政治镇压使得民主同盟被迫放弃大部分选举，但是真正属于民主同盟的暴力-在约翰逊的强硬领导下，民主同盟建立的所谓“义勇兵”组织，形成了一张有形的蜘蛛网，将西部受压迫的地区逐渐联系起来，并最终在他的引导下，于今天爆发了史无前例的怒火。\n\n这就是西部的自由，§R坚持下去！§!"

 Robert_LeRoy_Parker:0"罗伯特·勒罗伊·帕克"
 Robert_LeRoy_Parker_desc:0 "传奇的美洲强盗，劫掠过无数火车的疯狂匪徒，被西部所有人常常称为“一个混球”，亦或是有点幽默但非常友好的邻居……？帕克就是这样一个人。\n\n罗伯特·勒罗伊·帕克（Robert LeRoy Parker）出生在内战结束后的混乱时期，在他的童年里，除了大批大批来到西部的移民到来，就是无数的牛马与火车飞驰而过。醉酒的邻居以及强征强收的企业家是帕克没有一个不曾经历过的，这魔幻的世界在他心里埋下了野蛮的种子。\n\n将手枪对准黑白两道，自己就成了一个地地道道的匪徒。从南到北，从北到南，帕克无疑不是找到合适的时机去袭击过往的火车，并从中赚取了巨额的金钱-尽管包括美国政府和平克顿侦探在内的缉捕团体从来未能将他抓获，但他自己却毫不警惕，仍然如牛仔般继续漫步在西部的大地上，并最终来到了蒙大拿州这片既荒芜又热闹的地区-这是太平洋铁路北段的重要枢纽。\n\n很快，他的名声就让各路豪杰蜂拥而至，纷纷要求拜帕克为师，甚至组建帮派。帕克是一个独行侠，除了曾经带过一两个同伙作案以外，就没有合作做大的想法，不过，随着西部越来越动乱的局面，帕克的神经似乎被扭转过来了。他的帮派就如滚雪球般越滚越大，并最终成为了美加两国极为头疼的边境悍匪集团。\n\n§R再一次遇到混乱的他，又该如何去攻下自己的黄金之城？§!"

 Annie_Le_Porte_Diggs:0"安妮·勒波特·迪格斯"
 Annie_Le_Porte_Diggs_desc:0"作为一个充满传奇事业的老太太，迪格斯已经在怀俄明州以及其他地区的农民和知识分子团体中得到了极大的推崇和尊重。这也使得这两股政治势力达成了奇妙的和谐合作。\n\n安妮·勒波特·迪格斯（Annie Le Porte Diggs）作为早期的女权主义者与女性知识分子，年轻时期靠着丈夫以及娘家的给他的财产，常年奔走在争取女性权利的道路上，早在二三十岁时就已经在东海岸出了名，只是可惜真正争取到少的可怜。不过，只是顶着一位“保护女士的女士”的头衔并不能让迪格斯感到身心上的愉悦，同时他也逐渐厌恶那些只顾女权而不顾穷苦之人的贵妇们。\n\n在丈夫去世后，迪格斯逐渐接触到了亨利·乔治所编撰关于农民以及经济方面的书籍，她开始向乔治主义者靠拢。为了实现乔治主义的远大理想，迪格斯孤身一人来到西部，以一个老妇女的身份开始在西部进行宣传争取农民权利以及女性平权的游行活动。渐渐的，大量的农民、妇女以及知识分子，被迪格斯坚韧不拔的性格所感动，迪格斯的队伍在1900代后呈几何式发展，并最终形成了“西部自治同盟”的组织：他们要求联邦政府对西部的大农场主以及企业家进行反垄断调查、重新分配土地、授予农民合法的公民政治权利、保障《宅地法》以及中立州权力的实行、并且敦促其实现女性政治权利的平等。他们的要求一一没有得到通过，但自治同盟的阵线的参与人数却越来越大，其在西部的影响力与之相匹只有西部民主同盟党。\n\n如今的老太太已经年过古稀，甚至已经不能稳当的骑上马，眼睛的视线也开始模糊起来。但只要还未亲爱的兄弟们斗争下去，那他的心中就会燃起那年轻时候放荡不羁的火焰，让千万匹战马踏遍西部的污秽……去战斗！"

 William_Kissam_Vanderbilt:0"威廉·基萨姆·范德比尔特"
 William_Kissam_Vanderbilt_desc:0 "作为范德比尔特家族毋庸置疑的第三代传人，威廉·基萨姆·范德比尔特（ William Kissam Vanderbilt）却如自己晚年的父亲一般，开始不再专注于运输事业，反而是以一种报仇雪恨的情绪购置了大量地产与豪宅，这使得范德比尔特家族的财富日益减少。\n\n不过公子哥的花花肠子是有人保得住的-约翰·洛克菲勒作为曾经受到过范德比尔特公司帮助的人，如今早已成为范德比尔特真正的大股东，把控着范德比尔特名下的铁路以及运输公司。眼见传承人如此令人担忧，在老约翰的一声令下，威廉被踢出了东海岸，来到了遥远的西部内布拉斯加州经营自己公司所剩无几的主业。\n\n西部作为传说中的恶魔之地，威廉初来乍到时还感到十分恐惧-不过他很快就深深着迷着西部的独特风景与人文景观。他展现出了他在业务上极其优异的成绩，对于员工罢工以及各种的处理方式也十分果断：不遗余力地向市政府推荐引进骑士团以及本地的那些疯子佣兵，并且改革自己的运输机制，使得范德比尔特的西部运输企业更像是武装运输团。同时，他也没节约着手上剩余的钱，仍然如老家一般在西部购置豪宅，并举办各种舞会，抱着情妇享用无数个美妙的夜晚。\n\n只可惜范德比尔特的遗产，到底怎么样在今天能够保住呢？"

 Thomas_Woodrow_Wilson:0"托马斯·伍德罗·威尔逊"
 Thomas_Woodrow_Wilson_desc:0 "托马斯·伍德罗·威尔逊（Thomas Woodrow Wilson）出生在美国的弗吉尼亚州-从血缘上说他可以是个南方人；不过，随着内战的结束，他那醉心于神学的父亲却带着全家一路北上，来到了美国的宾夕法尼亚州生活。\n\n成长后，威尔逊来到了普林斯顿大学学习，尽管他如他的父亲一样如此热衷于自己的学习事业，但还是被校内的诸多学生扣上了“迪独奸细”的帽子，遭尽众人白眼，但他并没有就在此处折戟，并读完了法学以及政治经济学的硕士学位。\n\n威尔逊最终没有当上一名理想的教师-但他却当上了一名为了美国人民的“权力”而四散奔走的著名学者；他针对西部问题所发表的著名文章《国家-社会-服务者？》引发了当时美国社会的一片浪潮。自19世纪90年代以来，有无数的人为这位英勇发声的学者给予了大量帮助，并最终使得他成功当选了1904年密歇根州州长。\n\n1916年，在绝对性的胜利中，威尔逊接过了上一任北方总统的接力棒，成为了第27届美国总统。他在任前发表了一系列振奋人心的演讲，并宣布了一系列将会在当选后采取的政治改革措施-但，时光已经冉冉三年，这些承诺犹如泡沫般堆积在美利坚的土地上，可触却不见踪影，或许他欺骗了美国人民，欺骗了每一张选票。但无论如何。\n\n§R留给他的时间已经不多了……§!"

 Warren_Gamaliel_Harding:0"沃伦·盖玛利尔·哈定"
 Warren_Gamaliel_Harding_desc:0 "沃伦·盖玛利尔·哈定（Warren Gamaliel Harding）美国第28任总统，出生于1865年的俄亥俄州。据说他们家庭中有着优良的北美革命传统，可以不顾一切随时为联邦政府效命出征；不过，这是据说哈定家族拥有被解放黑奴血脉所造成的……\n\n随着南北战争的结束，哈定一家也归于平常。总统先生在童年时就闯荡社会，并且干的都是些体力活，这养成了他温顺、顺从但坚强的品格。可惜这些工作并不能满足哈定的开支要求，于是他选择了一项挑战自我学习能力的工作-报社记者，还是自己开办。\n\n哈定先生是一位风度翩翩的男士，所以他自然而然的能在困境中解救自己，他居然能够迎娶了一位让他的家人以为是发了神经的富家小姐：弗洛伦丝·克林。自此之后，他的事业犹如矿车蒸汽机般迅速爬升，达到了一个他曾经无法想象的高度。在当选俄亥俄州州长后，他迅速结识了一大票上流人士和有名的企业家，这些人给予了这位“美男子”更多的支持，并最终使得他被威尔逊所在的扬基党提名，成为了1916届的美国副国务卿。\n\n当他才还是副国务卿时，他的政治方针就异于常人-总是关心女人，且总是摆出一副要为女人争夺权利的样子，并且他极度热爱于打扑克牌，甚至常常拿牌局来比喻政治。这些比较幽默的作风却使他赢得了大量女性同胞的赞同，而这些女性同胞们又撺掇他们的丈夫，并最终使得哈丁总统能够取代威尔逊，登上白宫的第一宝座。\n\n这位让人疑惑的总统上台后，想必一定能有“惊天动地”的作为。"


 John_Calvin_Coolidge:0"约翰·卡尔文·柯立芝"
 John_Calvin_Coolidge_desc:0 "约翰·卡尔文·柯立芝（John Calvin Coolidge）美国第29任总统，他的政治崛起堪称奇迹。\n\n1920年，他只是哈定竞选团队中的"新英格兰装饰品"，一个来自佛蒙特州的乡村律师，靠着清教徒式的节俭形象赢得副总统提名。他在外人眼中就是一个平平无奇，且毫无职权的领导人。\n\n然而，第二次南北战争的爆发彻底改变了这一切。当哈定在战事压力下日渐消沉，沉迷于威士忌和白宫的秘密牌局时，柯立芝悄然接管了战时内阁的实际运作。\n\n1922年7月的闷热夜晚，卡尔文·柯立芝在华盛顿特区的圣约翰教堂点燃了第三支蜡烛。烛光映照着哈定总统的灵柩，也照亮了他手中那份沾满血迹的前线电报。这位以沉默寡言著称的副总统——现在应该叫总统，此刻正站在美国历史的十字路口。"

 James_Middleton_Cox:0"詹姆斯·米德尔顿·考克斯"
 James_Middleton_Cox_desc:0 "出身俄亥俄农场主家庭的詹姆斯·米德尔顿·考克斯从未想过自己会站在历史的十字路口。早年作为《代顿每日新闻》主编的经历赋予了他敏锐的洞察力——他能从铅字油墨中嗅到时代的震颤，也能在纷乱的政治漩涡中辨明方向。当扬基党在北方工业废墟上崛起时，考克斯早已是自由建制派的中流砥柱。他目睹了自由党分裂时切斯特·阿瑟的保守主义如何让工人寒心，也见证了克利夫兰的实用主义如何在资本巨鳄的夹缝中寸步难行。最终，他选择接过扬基党的大旗，将“自由精神”重新锻造成一柄既能劈开垄断枷锁、又能缝合南北裂痕的利剑。\n\n第二次南北战争的胜利并未让考克斯感到轻松。作为战后首位总统，他面对的是一个被资本洪流冲垮堤坝的国度：北方财团以“重建”之名鲸吞南方土地，西部边疆的暴动仍在燃烧，而迪克西党残党蛰伏在查尔斯顿的阴影中，伺机点燃新的仇恨。有人说他像林肯般仁慈，也有人骂他是资本家的傀儡，但他只是叼着雪茄在椭圆办公室熬夜，用红笔在文件上批注：“妥协不是投降，而是让破碎的镜子重新映出合众国的脸。”\n\n然而，扬基党内的暗流从未停息。激进派指责他对南方庄园主过于宽容，保守派则恐惧他的劳工改革会动摇金本位根基。当1921年石油危机席卷全球时，考克斯不得不在华尔街的咆哮与工会的怒吼间走钢丝——他既批准了联邦对炼油业的接管，又默许了民兵对罢工者的镇压。这种矛盾让他饱受诟病，却也意外地维系了脆弱的平衡。私下里，他对幕僚苦笑：“自由主义者？我不过是站在悬崖边跳舞的裱糊匠。”\n\n如今，总统的烟灰缸里堆满烟蒂，而历史的判决尚未降临。有人预言他会成为第二个汉密尔顿，用国家银行重塑经济秩序；也有人警告他将重蹈威尔逊的覆辙，在理想与现实的撕扯中黯然退场。但考克斯依然每天清晨阅读来自代顿的家乡报纸，仿佛那些泛黄的纸页中，仍藏着那个坚信“新闻能改变世界”的年轻主编的热望。"

 Charles_Evans_Hughes:0"查尔斯·埃文斯·休斯"
 Charles_Evans_Hughes_desc:0 "在南北撕裂的灰烬中，查尔斯·埃文斯·休斯的名字曾是扬基党人心中一盏冷峻的明灯。他深谙如何在联邦瘫痪的废墟上重建秩序——用金元的链条与宪法的镣铐。当第二次南北战争的硝烟散去，这位冷面律师以“自由重建者”之名登上总统宝座，誓言将联邦从集权的腐沼中拖出，重铸为一个“纯粹的美利坚”。\n\n胜利后的休斯转身背叛了自己的拥趸。他宣称“自由不容垄断”，将矛头对准扬基党内盘根错节的财阀网络。他默许黑人在南方的“合法解放”，尽管那些“自由人”仍在庄园主的债务枷锁下喘息——毕竟，宪法只承诺解放肉体，而非灵魂。\n\n如今，总统休斯站在十字路口。扬基党内的建制派视他为叛徒，迪克西的幽灵在西部蠢蠢欲动，而北方的工人正将他的肖像与洛克菲勒的并排焚毁。他手中的宪法如同一柄双刃剑：一面斩向联邦积弊的集权肿瘤，一面却将自己刻成新的铁腕图腾。阿尔汉格尔斯克的电报不断传来，赤色的浪潮正在旧大陆翻涌，而休斯只是整了整领结，在国会山的阴影下低语—— \n\n**“自由，必须用秩序的钢骨来浇筑。”** \n\n他将成为联邦主义的殉道者，抑或新镀金时代的凯撒？"

 Robert_La_Follet:0"罗伯特.拉福莱特"
 Robert_La_Follet_desc:0 "当《查尔斯顿协议》的墨水尚未干透时，这位威斯康星的雄狮早已嗅到了北方工业财阀的铜臭与南方庄园主残喘的腐朽气息。作为联邦统一党的灵魂人物，拉福莱特从不屑于在扬基党与迪克西党的对峙中选边站队——他的战场在锈迹斑斑的铁路旁燃烧的炼钢厂，在西部自耕农被资本碾碎的土地上，在北方童工布满煤灰的指缝间。\n\n进步主义的火炬在他手中化作一柄双刃剑：一面劈向垄断巨头用《第十五修正案》编织的贪婪巨网，另一面刺穿南方伪善的“废奴改革”背后农奴制的幽灵。他高呼“三权归于人民”，将威斯康星的民主实验推向全国——直接初选制如手术刀般剜去政党机器的腐败脓疮，累进税制则像铁锤敲打着托拉斯的黄金枷锁。\n\n联邦统一党的同僚们敬畏他花岗岩般的意志，却也为他的激进蹙眉。当海斯总统在南北资本夹缝中摇摆时，唯有拉福莱特敢在国会山点燃《宅地法》的残页，质问为何西部移民的血汗成了铁路大亨的私产。他的《进步周刊》字字淬火，将芝加哥大屠杀的枪声化作铅印的惊雷，让劳动骑士团的旗帜在舆论风暴中猎猎作响。\n\n如今，随着扬基党吞并自由党后的急速右转，这位59岁的斗士站在了历史的十字路口。他的眼角已爬上密西西比河般的皱纹，但瞳孔仍燃烧着威斯康星暴风雪般的锐利。北方财阀视他为“红色渗透的毒芽”，南方保守派咒骂他是“联邦主义的狂犬”，而数千名在标准石油阴影下挣扎的工人，正将他的演讲手抄本藏在午餐铁盒底层——正如他们父亲辈曾怀揣《解放宣言》的碎片。\n\n威斯康星的春麦又一次抽穗，拉福莱特知道，这场贯穿美洲大陆的漫长收割，才刚刚开始。"

 William_Jennings_Bryan:0"威廉·詹宁斯·布赖恩"
 William_Jennings_Bryan_desc:0 "他是平原上的雄辩风暴，是锈蚀镰刀旁的炽热火炬。在北方联邦统一党的阵营中，威廉·詹宁斯·布莱恩的名字犹如一记惊雷，劈开了镀金时代的阴霾。出身内布拉斯加农场的他，血液中流淌着西部麦浪的愤怒与理想主义者的偏执。当《查尔斯顿协议》的墨迹尚未干涸，当北方资本家如秃鹫般盘旋在南方破碎的庄园上空时，布莱恩选择了一条荆棘之路——将进步主义的火种播撒在联邦主义的冻土上。\n\n作为农民们的化身，布莱恩的演讲台上永远沾着干涸的泥点。他痛斥《第十五修正案》催生的工业巨兽正将自耕农碾作齑粉，控诉金本位制是"套在农夫脖颈上的铁枷"。在扬基党与迪克西党撕裂国会的年代，这位前众议员挥舞着《宅地法》的残页，高呼"西部不该是东海岸银行家的殖民地"。他的"保地运动"如野火般席卷中西部，让堪萨斯的粮仓与科罗拉多的矿场同时响彻反抗的号角。\n\n然而命运总爱嘲弄理想主义者。当北方财团以重建为名鲸吞南方土地时，布莱恩的调和主张成了两党眼中的异端——激进派斥其向"奴隶制余孽"妥协，保守派讽其为"穿粗布衫的雅各宾党"。就连联邦统一党内部，他的农业税制改革方案也在铁路大亨的游说下支离破碎。有人看见他在国会走廊攥紧《人民宣言》的草稿，纸页边缘被指节压出深痕。\n\n如今，六旬的布莱恩依然站在林肯纪念堂的台阶上。他的嗓音已不如当年清亮，但话语仍如密苏里河般汹涌："若联邦的旗帜不能庇护最小的麦穗，它终将沦为绞死自由的绳索。"暗流涌动的华盛顿政坛间，有人开始窃语——当这位老派改革者的银舌沉寂之时，美利坚的十字路口是否会迎来另一场风暴？"

 George_William_Norris:0"乔治·威廉·诺里斯"
 George_William_Norris_desc:0 "在战后美国支离破碎的政治版图上，乔治·W·诺里斯的名字如同一柄锈迹斑斑却仍锋利的犁刀，固执地切开南方迪克西党与北方自由党对峙的冻土。作为北方联邦统一党的灵魂人物，这位内布拉斯加的进步主义者始终坚信，美国的未来必须建立在“共识而非分裂”的基石上——即便这共识需要从血与灰烬中重新锻造。\n\n早年以反垄断斗士闻名的诺里斯，目睹了《查尔斯顿协议》后南北名义统一下的暗流涌动。他痛斥扬基党与迪克西党将国家拖入“资本与种植园的永恒拉锯”，更对西部边疆在政治博弈中沦为“权贵的棋盘”深感愤怒。当自由党分裂为建制派与激进派时，诺里斯选择了一条更艰难的路：他将北方民主党残部、共和党理想主义者与西部自耕农代表团结在联邦统一党的旗帜下，誓言用宪法修正案与土地改革“缝合联邦的伤口”。\n\n诺里斯的政策充满矛盾的诗意：他既是社会国家主义的倡导者，主张联邦政府主导铁路国有化与农业补贴，又以自由派的口吻抨击“垄断财阀与庄园主的共谋”。在1918年芝加哥大罢工的血腥镇压后，他公开谴责海斯总统“将资本凌驾于劳工血肉之上”，并推动《劳工保护法案》的起草——尽管法案最终在南北委员会的扯皮中沦为废纸。\n\n如今，随着第三次南北大会的尘埃落定，这位年近六旬的政治家站在了更危险的十字路口。他一手促成的“联邦税制改革”虽暂时平息了南方叛乱州的怒火，却让北方工业巨头视其为叛徒；他倡导的《宅地法复兴计划》在西部赢得喝彩，却被迪克西党讥讽为“用北方金币收买边疆的投机把戏”。\n\n诺里斯深知，自己的理想主义正被时代的飓风撕扯。当记者问及联邦统一党能否终结美国的“慢性死亡”时，他只是摩挲着办公桌上裂开的星条旗徽章，低声答道：“我们不是医生，只是掘墓人——但哪怕墓穴深处，也该埋下一粒能发芽的种子。”\n\n联邦统一党党章扉页印着诺里斯的手写箴言——“统一非妥协，而是新生。”"

 Alfred_Emmanuel_Smith:0"阿尔弗雷德·伊曼纽尔·史密斯"
 Alfred_Emmanuel_Smith_desc:0 "出身纽约贫民窟的阿尔·史密斯，曾是北方工业机器轰鸣声中最刺耳的不谐音。这个操着下东区口音的"街头政客"，本不该踏入扬基党精英云集的镀金殿堂——直到他证明自己正是撕裂时代所需的缝合者。\n\n在重建年代的腥风血雨中，史密斯以布鲁克林大桥般坚韧的姿态崛起。当扬基党内激进派叫嚣着用关税铁犁彻底碾碎南方残余势力时，这个戴着圆框眼镜的温和派却握紧了《查尔斯顿协议》泛黄的纸页。他比任何人都清楚，北方的蒸汽机需要南方的棉花，华尔街的金库离不开密西西比的河道，那些在查塔努加化为焦土的铁轨，必须重新连接成国家跳动的血管。\n\n"史密斯妥协"成为了战后词典里最矛盾的词组。他一面允许北方财团以"托管"名义吞并南方破碎的种植园；另一面又默许前迪克西党人在新奥尔良组建"南方发展委员会"。当激进的自由派人指责他豢养奴隶制幽灵时，他指着曼哈顿新落成的摩天大楼反问："让五十万黑人工人饿死在重建区，难道就是你们要的自由？"\n\n这位"酒馆圣徒"的危机正在发酵。华尔街对他向南方农场主发放低息贷款暴跳如雷，伯明翰的工会则举着"史密斯背叛了林肯"的标语游行。更致命的是，扬基党内部正分裂成"镀金派"与"进步派"，而史密斯站在裂缝中央——他既不是摩根财团的提线木偶，也绝非布赖恩式的平民主义煽动家。\n\n华盛顿流传着新的预言：当史密斯完成连接南北的最后一条铁路时，就是这座人肉桥梁崩塌之日。但此刻，他仍站在白宫露台上，望着波托马克河上穿梭的蒸汽船露出招牌式的狡黠微笑——毕竟，这个来自第五选区的小子，最擅长的就是在腐朽梁木间寻找新的支点。"

 Owen_Young:0"欧文·扬"
 Owen_Young_desc:0 "在战后破碎的美利坚，权力总会在灰烬中寻找新的宿主。当南方的种植园主们仍在为崩塌的旧秩序哀叹时，北方的机器已轰鸣着碾过废墟——而欧文·扬正是齿轮间最精密的润滑油。这位来自纽约州的律师兼工业巨头，从未披挂戎装，却用合同与条款征服了比战场更广阔的疆域。\n\n作为通用电气帝国的缔造者之一，扬的指尖缠绕着全美电网的脉搏。他深谙如何让联邦政府的瘫痪成为私人资本的福音：当《第十五修正案》撕碎州权的枷锁，扬的触须便随着铁路与输电塔刺入南方腹地。查尔斯顿的协议桌上，他沉默如影，却让“摩根-洛克菲勒联合体”的名字化作南方庄园主们午夜惊醒的诅咒。那些被北方资本吞噬的棉花田与炼油厂，不过是他账簿上跳动的数字。\n\n但镀金的王座下暗流涌动。扬的野心不止于财富的囤积——他渴望成为“新合众国”的隐形建筑师。当自由党在国会分裂时，是他暗中斡旋，将扬基党的崛起包装成“工业救赎”；当芝加哥大罢工的血迹未干时，也是他在华尔街的沙龙中低语：“秩序，必须比子弹更廉价。” 他相信技术官僚的理性足以驯服革命的野火，却未曾察觉，自己精心编织的电网正将整个国家拖向一场更危险的短路。\n\n如今，站在1924年的十字路口，扬的眼镜片上倒映着两个美国：一个是他用金线与美元缝合的工业巨兽，另一个则是西部暴动的火光照亮的、裂痕斑驳的版图。"

 William_Henry_Davis_Murray:0"威廉·亨利·戴维斯·默里"
 William_Henry_Davis_Murray_desc:0 "在查尔斯顿协议后的灰烬中，南方的政治舞台充斥着分裂与混乱。迪克西党的独立派叫嚣着脱离联邦的狂热，庄园主的腐朽阴影仍笼罩着种植园的残垣，而北方资本的贪婪触手已悄然伸向这片破碎的土地。在这片泥泞的沼泽中，威廉·H·默里如同一柄淬火的利剑，以进步之名劈开了南方的暮色。\n\n作为南方进步同盟的强硬派领袖，默里的崛起近乎一场悖论。他出身俄克拉荷马边疆，亲历过自耕农被庄园主挤压至破产的苦难，也目睹了《查尔斯顿协议》后黑人在“自由”名义下沦为债务奴隶的荒诞。这些经历锻造了他对旧秩序的憎恶，却也让他深谙南方的生存法则——若想终结迪克西党的统治，进步同盟必须比敌人更冷酷、更务实。\n\n1870年代，当罗伯特·李的缓则派仍在与联邦政府讨价还价时，默里已公开宣称：“南方的未来不在查塔努加的石碑下，而在工厂的烟囱与学校的课本里。”他推动进步同盟与北方扬基党秘密接触，以开放南方市场为筹码，换取联邦对奴隶制残余的彻底清算。这一策略激怒了迪克西保守派，却也让他成为南方重建派中唯一能与北方财阀平等谈判的“实用主义者”。\n\n1883年南方危机爆发时，默里的强硬手腕显露无遗。当种植园经济崩塌、黑奴暴动四起，他力主与联邦达成第三次南北协议，以废除奴隶制为条件换取北方对南方民兵合法性的承认。这一决定被斥为“背叛”，但默里的回应掷地有声：“若流血能洗净南方的耻辱，我宁愿让密西西比河染红——但流血必须换来未来。”\n\n至1919年，年逾六旬的默里仍是进步同盟的灵魂。他麾下的南方州议员在国会南北委员会中寸土必争，要求联邦拨款重建南方的铁路与学校，同时坚决抵制北方资本对土地的无节制兼并。“新南方的建筑师”？还是“裹着进步外衣的迪克西狼”？——毕竟，他从未放弃南方州权的底线，甚至默许各州以“治安权”镇压劳工运动。\n\n如今，随着西部暴动与北方自由党的分裂，默里嗅到了历史的转折。他秘密联络田纳西与阿肯色的工会领袖，试图将白人自耕农与黑人劳工的怒火导向共同的敌人：北方托拉斯与迪克西遗老。盟友质疑他的理想是否已被现实腐蚀，对手则虎视眈眈等待他犯下第一个错误。对此，默里只是冷笑：“南方从地狱爬回人间时，容不得圣人的天真。若进步需要与魔鬼共舞，我会跳完最后一支华尔兹。”\n\n没人知道这位铁腕老人能否终结南方的百年轮回，但所有人都清楚——当威廉·穆雷倒下时，他要么成为南方的救赎者，要么化作另一块绊住时代的墓碑。"



 John_Nance_Garner_III:0"约翰·南斯·加纳三世"
 John_Nance_Garner_III_DESC:0 "约翰·南斯·加纳三世（John Nance Garner III）出生于1868年的德克萨斯。作为一个正根苗红的老南方人，约翰当然吸收了来自父母精神中的那份野性。不过，他的学习天赋却异于常人，并在成年之后顺利考入大学，完成学业。\n\n良好的学习掩盖不了他真正的的暴躁属性，在当选县议员后，他咄咄逼人的演讲风格就迅速在德克萨斯州出了名。不过真正使他获得南方普遍赞誉的则是1896年-他与已经如日中天的标准石油之间的薪水论战，这为他赢得了平民的良好赞誉-尽管他后来被人打了黑枪，也没有成功竞选，成为最年轻的德州州长。\n\n加纳那一如既往的脾气和坚持用仙人掌作为德州州花的强硬态度，让他获得了“仙人掌杰克”的美誉。不过，这颗仙人掌终有绽放的时候，当1914年的德州州长选举如火如荼展开时，长期没有参选的约翰却一马当先，通过遥遥领先的票数取得了州长的宝座并一直延续至今，虽然该州的最大产税收入来源于他的死对头标准石油，但此时的约翰也放低态度，试图缓和自己与该公司的关系。\n\n这自然是一位优秀的美国地方领导者，但也只能算作南方：他十分仇视给南方带来灭顶之灾的北方公司，他更加仇视那些不顾南方百姓情感和传统而将其破坏殆尽的北方政客。他无时无刻做着南方重新崛起的美梦，并在为这个目标时刻准备着。\n\n§R而现在，他终于拥有了这个机会§!"

