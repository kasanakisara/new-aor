 USA_zhixuchonggou_knights_desc:0"劳动骑士团曾经作为一个美国政府与企业家们所讨厌的工人团体（LABOR），已经消失在了这个世界上。而取而代之的劳动骑士团（WORK），则是这批组织中最恶劣的渣滓与广泛的社会人群所组成的一批古怪而又庞大，令人生畏的武装兼劳工组织。尽管他们与大家的印象不太一样……\n这个拥有几百万会员，几十万武装的庞大组织，无时无刻渗透着整个美国北方、大半个西部以及部分南方城市的每一个角落，他们的身影总是能被美国人所发现。在社区，他们是负责替代警察的维护治安能手，在打击犯罪活动上，他们是比政府与军队行动更快的执行者；而在工厂与企业中，他们更是随叫随到的能手-处理劳动纠纷的速度就犹如他们打晕罢工者一样迅速。\n是啊，劳动骑士团，你究竟是一个什么样的存在呢？有些人爱戴你，歌颂你，甚至在美国渲染起了一股现代复古的骑士文化，这展现了你最好的一面-而在那些深处的工厂中，在那些不为人注意的企业中，你早已成为了发泄的对象，并且深深为他们所仇恨。矛盾在你的身上回荡。你是为了美国的荣誉与秩序而战的勇士，还是只是为托拉斯所利用的刽子手，一遍遍洗刷着美国公民的血肉之躯，淹没你的灵魂？\n§R这是你的故事，应由你来续写……§!"
