 USA_busidexintuo4_desc:0"当今国际上有一句玩笑：托拉斯代表经济，而美国代表托拉斯。\n自从那如潘多拉魔盒般的《第十五修正案》通过以来，美国企业就如脱缰野野狗一般席卷各州。他们犹如鱿鱼和蜘蛛一般侵吞着一切可以看到的东西。商品、工厂、甚至于人和活物们都逃脱不了他们的手掌。从北方到南方再到西部，到处都是闪闪发光的“信托”，无声诉说着他们的不为人知的血肉罪恶。黄金的信徒、人间的怪兽、是那些混沌之人的“救世主”，就这么现于人间。\n进入到了新世纪，美国的资本格局已经十分明了：洛克菲勒家族所控制的标准石油公司与南方开发公司渗入了美国所有的工业经济命脉，摩根家族所控制的美国各大银行成为了美国金融界的坐标，梅隆家族控制了五大湖地区的重要工业设施，而铁路家族们则控制了美国大大小小的交通枢纽。全国几乎都被这些精英们瓜分殆尽，政治、经济变成了他们可以随意摆弄的玩偶，而联邦政府与地方政府对此无能为力。物是人非，夕阳西下，随着不知名的危机到来，他们又将目光飘向了何处呢……"
