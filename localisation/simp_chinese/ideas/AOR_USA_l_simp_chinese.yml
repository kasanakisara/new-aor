 USA_the_divided_nation_desc:0"自1865年后，尘埃落定。上帝赐予美利坚合众国一切的梦想，都被两只魔鬼撕的粉碎。现如今的美国只是一个虚有体量的畸形怪物-她没有一部可以通行各州的宪法、没有一套与欧洲各国相当的官僚体系、甚至在精神上已不是一个国家；她只有一地鸡毛的地方政府与一位毫无作用的总统、还有两个相互竞争，却带领国家走向分裂的巨型政党，以及他们所代表的§3北方§!和§t南方§!，包括一个徒有其表的国会。\n这台丑陋的机器不断地在世界中哗众取宠，引人嘲笑，而美国人将会随着这股浪潮，迎来自己最终的审判……"
 USA_the_divided_nation2_desc:0"自1865年后，尘埃落定。上帝赐予美利坚合众国一切的梦想，都被两只魔鬼撕的粉碎。现如今的美国只是一个虚有体量的畸形怪物-她没有一部可以通行各州的宪法、没有一套与欧洲各国相当的官僚体系、甚至在精神上已不是一个国家；她只有一地鸡毛的地方政府与一位毫无作用的总统、还有两个相互竞争，却带领国家走向分裂的巨型政党，以及他们所代表的§3北方§!和§t南方§!，包括一个徒有其表的国会。\n这台丑陋的机器不断地在世界中哗众取宠，引人嘲笑，而美国人将会随着这股浪潮，迎来自己最终的审判……"
 USA_the_divided_nation3_desc:0"内战爆发，尘埃落定。上帝赐予美利坚合众国一切的梦想，都被地狱的恶鬼撕的粉碎。 现如今的美国只是一个虚有体量的畸形怪物。\n§R这台丑陋的机器现在已经彻底崩溃……§!"
 USA_the_divided_nation4_desc:0"内战爆发，尘埃落定……但人类心中的火焰并没有熄灭，对自由的呼喊却响彻了整个美洲大陆。§R让美国人民与联邦政府去捍卫最后的尊严，同地狱而来的恶鬼-人间的恶徒们展开最后的对抗！§!"
