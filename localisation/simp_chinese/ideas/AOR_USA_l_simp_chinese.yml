 USA_sandaliren4_desc:0"合众国在费城的阴影中艰难爬行。尽管联邦政府很早就宣布废除《费城条约》及其相关的一切内容，但这只是美国北方一厢情愿的幻想。不过依靠着80年代的南方危机，美国北方迫使南方签订了另外两大协议-即1885年的经济、政治协定《查尔斯顿协议》与1887年的军事协定《西点协议》。\n南北双方在原先《费城条约》内容的基础上进行了延伸，这使得条约体系利于北方，并暂时维护了美国表面的统一。以上三份文件被世人称为后美国时代的“三大立国文件”。不过，暗潮涌动，三大文件所带来的后遗症，时时刻刻影响着南北双方。在新的时代背景中，在仇恨与利益的驱动下，美国即将围绕着它们展开史无前例的斗争……"
 USA_zhiliposui_desc:0"就像饱经风霜的古罗马水晶瓶，在这大风大浪的摧残下彻底粉身碎骨。如今的合众国与联邦政府，已经能够摆脱过去种种强加在她们脖子上的邪恶锁链，§Y让美利坚的复兴之路，在这60年的光阴里第一次显现光明§!。\n\n不过可惜的是，战事的突发以及政府的混乱使得我们的许多§R改革计划§!戛然而止。但对于当前政府来说，全力改革军队与稳定国家秩序，应对南方第二次的叛乱者们，是最为紧迫的事情……"
 USA_West_Point_Accord_tt:0"\n南方州在§0《西点协议》§!中规划了一条军事分界线，联邦军队不得越过此军事分界线，而南方国民警卫队也不能进入到北方州的范围里。\n\n§0《查尔斯顿协议》§!签订后，美国国会进行了改革（即§0《第十六修正案》§!），尽管使其更加贴近于南北双方的实际政治状况，但依旧没有什么有效的用处。\n\n南方接受联邦政府的§0《第十五修正案》§!，放松了各州之间的公司经济活动，并且与北方各州对公司经营的经济政策进行调整，大量的北方公司进入了南方§R（但联邦政府难以估计他们的投资，所以不能控制并使用北方资本在南方的工厂）§!，从而开启了他们的天堂之路……"
 USA_West_Point_Accord1_tt:0"\n南方州在§0《西点协议》§!中规划了一条军事分界线，联邦军队不得越过此军事分界线，而南方国民警卫队也不能进入到北方州的范围里。\n\n§0《查尔斯顿协议》§!签订后，美国国会进行了改革（即§0《第十六修正案》§!），尽管使其更加贴近于南北双方的实际政治状况，但依旧没有什么有效的用处。\n\n南方接受联邦政府的§0《第十五修正案》§!，放松了各州之间的公司经济活动，并且与北方各州对公司经营的经济政策进行调整，大量的北方公司进入了南方，从而开启了他们的天堂之路……\n\n§R以上已全部废止§!"
 USA_shiyouhuanying_desc:0"尽管美利坚四分五裂，但她优秀的体量与丰富的自然资源，仍然能够使其与工业革命共呼吸-尽管这宝贵的财富并不掌控在绝大部分公民手中。南方德克萨斯州以及路易斯安娜州产出的巨量石油为南方各州带来了巨大利润。而随着北方钢铁工业以及其他工业部门的发展，美国的工业产品也开始畅销全球。美利坚的经济开始在80年代后腾飞，最终成就了让欧洲国家瞠目结舌的“美利坚经济奇迹”。\n尽管英法早在19世纪90年代进行了经济制裁，但我们依靠强力的企业仍然挺过了危机。现在的美利坚早已是世界第一大经济体，似乎在将来就要将大不列颠的桂冠摘到自己的头上。而代价……\n§R一笔勾销的白纸，无数血泪与亡魂§!"
