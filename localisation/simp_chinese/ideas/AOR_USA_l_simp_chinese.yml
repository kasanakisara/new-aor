 USA_GreatLakesA_desc:0 "遥远的1886年，在那钢铁与血肉的悲伤剧目中，却向如今的我们射出了一道冷若冰霜的黑色极光……\n\n§R融化了一切的火焰，正在新世纪最伟大的成就之上，肆意践踏着万物的生灵。就连休伦湖也被残余的燃烧物染的乌黑。铁锤的使用者们正在一个个将工厂毁坏殆尽，一步步砸向白墙灰砖的华盛顿特区§!。§Y诸神的黄昏中，魔鬼正在歌唱：“听吧，听吧，来吧，来吧！美利坚，你将在主的指引下，再次踏过这片地狱！”§!。"
 USA_GreatLakes2A_desc:0 "在宛如地狱般的城市战争后，这一场美国有史以来最大的工人暴动就此平息。底特律1/3以上的工厂都被摧毁殆尽，五大湖工业区的其他城市也遭到了不同程度的损伤……我们可以这么说，§R至少在迎来1920年之前，五大湖的主要工业区都将处于停摆状态§!。"
 USA_AmericanAnxietyA_desc:0 "机器正常运转，气压表指数正常，油料充足-好！请诸位现在开始加紧工作吧。\n\n是吗，难道一切都回归正常了吗？难道在所有美丽佳人的记忆中，底特律的屠刀已经变成了虚妄的海市蜃楼，还是死去之人的姓名，为心灵的凭空伪造？万物生灵、前进的历史不会忘记，§R就在这1919年，命运女神为美利坚结下了一个永远无法抹去的苦难历程§!。\n\n§R-血液终究会流淌殆尽，却因大地而留下痕迹§!"
 USA_zanshideweiji:0 "暂时的慰籍-救济"
 USA_zanshideweiji_desc:0 "谢天谢地，国会这次的赞成出奇的多，真是好奇历任总统先生们，到底有没有提过类似于的救济法案……无论如何，威尔逊总统总算是赎了自己的一点罪过。"
 USA_zanshideweiji1:0 "暂时的慰籍-贷款"
 USA_zanshideweiji1_desc:0 "威尔逊总统通过各大银行的窗口，发放了大量的国家贷款。目前来看，我们在慢慢取得成效-经济有所好转，失业率也有所下降。"
 USA_zanshidexuanchuan:0 "战事宣传"
 USA_zanshidexuanchuan_desc:0 "经过游说集团以各大公司的不断活动，联邦政府的战争宣传卓有成效，许多北方公司宣布支持联邦政府，许多年轻人也顺着宣传海报的地址，应征入伍。"
 USA_MartialLawA_desc:0 "戒严令"
 USA_CriticizeA_desc:0 "批评迪独"
 USA_MorganA_desc:0 "与摩根商谈"
 USA_AppeaseA_desc:0 "安抚企业"
 USA_RailwayA_desc:0 "武装铁路网计划"
 USA_PlanOfOperationA:0 "潘兴将军的作战计划"
 USA_jinjizhuangtai:0 "延长紧急状态"
 USA_jinjizhuangtai_desc:0 "听好了，市民们！为了确保美利坚合众国的社会安全，§Y联邦政府修改了紧急状态法令。现禁止该地区的合法公民及移民于§!§P晚上11点至次日4点出门§!。请将该信息传递至您身边的亲朋好友。\n\n什么？你说你要上夜班，哈……不好意思，§R我市有专门的骑士团巡逻队，保证您准时抵达忠诚的工厂或办公桌！§!"


#废案
 #USA_participation_award_desc:0 "美国军队远赴欧洲，这是为了世界和平做出的决定...美国在这次战争中做出了杰出的贡献，获得了属于等同于世界大国的声誉，这是每个美国人都值得庆祝的事情...吧?"
 #USA_the_divided_nation_desc:0 "自南北战争被外界干涉以来，美利坚确定了以扬基党和迪克西党两党选举的制度。这种政策导致了美利坚南北发展的畸形现状，发展重心时常转移极度不平衡，合众，也许从来都只是一个怪异的小丑，大家都在拍手叫好他的拙劣演技，直到矛盾全部爆发的那一天..."
 #USA_Anglo_frech_enterprise_desc:0 "如果说劳苦百姓的主子是政治家与资本家，那么政治家与资本家的主子就是英国和法国。他们开着黑船随着那只“看不见的手”来到美利坚，在这里肆无忌惮地压榨，吸血。英法资本对大多数企业的优势控股已经成为了这里的常态，而政治斗争也往往是英法势力角逐的体现。这自由与希望的新大陆之国徒有超级大国的表，实际上是腐蚀殆尽的里。"
 #USA_steel_and_cotton_desc:0 "对于大部分生活在美国的百姓来说，只有两条选择。要么来到北方，通过12小时的工作赚取只能饱腹的薪水，一辈子当个工奴浑浑噩噩度日。或者去到南方，在无止尽的劳作与采摘只下耗尽你的青春年华，成为那些老爷们的农奴。在棉花和钢铁之下的，是无数百姓的尸骨。"
 #USA_Dollar_bottom_desc:0 "美国的货币金融体系在英法的干涉下失去了独立性，美金大量贬值成为法郎与英镑的垫底货币与中间兑换币，这就导致了美国的货币体系已经事实成为了英法剥削的工具之一，美国的各种金融问题随着英法势力的深入纷来沓至。"
 #USA_Anglo_frech_enterprise:0 "英法资本优势控股"
