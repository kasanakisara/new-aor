l_simp_chinese:
 A_lingering_alliance:0 "苟延残喘的联盟"
 Tiger_of_Silence:0 "沉默之虎"
 Let_the_ambitio_sleep:0 "让雄心沉睡"
 A_lingering_alliance_desc:0 "19世纪民族国家的洪流冲垮了一个又一个君权神授中诞生的“光荣”而“伟大”的帝国。俄罗斯帝国，奥匈帝国，奥斯曼帝国，无不被民族监狱号召下的公民推翻砸碎，只留下同样古老的瑞典-挪威联合王国尴尬、迟缓又恐惧的伫立在20世纪黎明之际的北境。\n1814年1月14日，瑞典在对丹麦的《基尔和约》中光荣的赢下了挪威的统治权，自大北方战争后再没眷顾过瑞典的胜利女神好像终于肯点头给予瑞典帝国应有的一切。百年时光随北方的风雪纷纷而落，却见得帝国荣耀几何？只见到无休止的骚乱，争吵，分裂无时无刻的折磨着蹒跚的王国。\n1905年，瑞典-挪威联合王国内部的抗争达到了新的高潮。惊惧、恐慌和彷徨席卷了北欧，随之而来的则是无穷无尽的荒诞。原为英国和丹麦推动挪威独立而前往的哈康联合瑞典议会发动政变，驱逐旧君奥斯卡二世，结束了贝尔纳多特王朝的统治。而瑞典与挪威终于进行了谈判，一纸《林雪平条约》，将挪威提到联合内前所未有的伟大高度——分列二君！加冕为挪威国王的哈康七世和他加冕为瑞典国王的弟弟古斯塔夫五世，共戴着联邦之君的荆棘王冠，推动着联盟的艰难前进。反抗干涉、十字之争、“神圣联邦”、《哥特堡宪法》……这一切都是试图维系联盟民族调和的现状，让名不副实的联合得以再续百年的光阴。\n然而，这些还远远不够。随着世界大战的结束，东方慢慢升起的红色阴影，和西方英法的貌合神离，又一次开始撼动这“神圣联邦”的根基。当积雪的重量压垮自己，那便是雪崩。若再不做出根本性改变，容忍了百年的人民中烧的怒火可不会再给我们下一个百年的机会：\n\n§R“To be or not to be，that is a question.”§!"
 Tiger_of_Silence_desc:0 "在大北方战争中，瑞典被挤出列强之列；而在拿破仑战争灾难性的战败之后，瑞典的军队几乎彻底失能，其此后唯一一场胜仗是入侵挪威，虽然没人想承认此事。在那以后，每一位君主、每一任政府都对军事事务不管不问，瑞典军队基本上处于半瘫痪的状态，联邦武装力量唯一的作用是在国庆节的时候出来游行，宣告着一个没有人会想要入侵的国家还具有反抗入侵的能力，但也不多。\n1905年订立的《林雪平条约》给死气沉沉的联邦武装力量注入了一点生机。挪威军队作为一支独立于瑞典军队的联邦武装力量出现在了文件之中，但也仅仅只是出现在文件之中。联邦主义政策将主要的财政预算都拨给了经济建设，军事建设则被搁置。挪威军队目前人数两万不到，用以在世界大战中奉行“武装中立”政策，而该政策随着世界大战的结束石沉大海。\n不过，随着世界局势在战后又一次开始混乱，人们尚不知道，联邦的武装力量何时可以恢复到1814年的水平，在这个浪潮汹涌的世界中保卫她的人民。"
 Disable_intelligence_agency:0 "£trigger_no 可以建立情报机构\n"
 Let_the_ambitio_sleep_desc:0 "如果人们重新翻开瑞典的史书，再看向现在的联邦，将会感到莫名的悲伤、惆怅和不现实。史书之中记载的那些光荣历史、伟大战役留下的现实遗产早已经消失殆尽，或许唯一得以苟活的是瑞典-挪威的联合。至于精神遗产，这些看不见摸不着的东西，在由民族主义和理性主义主导的现代世界，还是早点忘了吧。\n人们也并非未曾想过光复旧日荣光，但是现在的世界已经不是过去那个瑞典可以称王称霸的世界了。英法已经雄起，德俄虎视眈眈，内部更有令人头疼的民族问题。历代国王都因为联合内部的民族矛盾而选择维持现状，曾经卡尔马联盟和瑞典帝国的荣光也只是被视作历史，被扫进垃圾堆里。联邦犹如一只昏迷的雄狮，荣光不再，只剩下偏安一隅的忧愁和现实。\n\n但在坚冰之下，也有摧毁铁屋的力量。§g不过这些也都是后日谈了……§!"

 SWE_Left_Threat:0 "汹涌的左翼浪潮"
 SWE_Left_Threat_I:0 "可控的左翼浪潮"
 SWE_Left_Threat_II:0 "轻微的左翼浪潮"
 SWE_Left_Threat_desc:0 "社会主义、共产主义，这些词语最初在北欧有什么意义，已经无从考证了。但是现在，任何在挪威和瑞典两地举起红旗，呼喊着这样的口号的人，无论他们是否真心崇奉马克思的信条，都无一例外，是为了推翻现有的联邦政权。\n挪威的工人运动的历史十分悠久，可以追溯到1814年联合建立之初，瑞典入侵挪威时，工人们就为了他们的国家而展开了斗争。1905年，工人运动随着政治运动的发展而达到高潮，随后暂时衰落。在联邦社民党亲联邦主义的政策领导下，工人运动陷入低谷。\n但事情总是不一帆风顺。如今，在世界大战结束和十月革命胜利的背景下，原先看似铁板一块的联邦社民党中的列宁主义者选择出走，分裂出挪威和瑞典的共产党。他们凭借着世界大战后并不昌盛的经济局势，煽动工人举行罢工，并计划推翻联邦政权。\n\n§R红色的阴影已经近在眼前。§!"
 SWE_Left_Threat_I_desc:0 "社会主义、共产主义，这些词语最初在北欧有什么意义，已经无从考证了。但是现在，任何在挪威和瑞典两地举起红旗，呼喊着这样的口号的人，无论他们是否真心崇奉马克思的信条，都无一例外，是为了推翻现有的联邦政权。\n挪威的工人运动的历史十分悠久，可以追溯到1814年联合建立之初，瑞典入侵挪威时，工人们就为了他们的国家而展开了斗争。1905年，工人运动随着政治运动的发展而达到高潮，随后暂时衰落。在联邦社民党亲联邦主义的政策领导下，工人运动陷入低谷。\n但事情总是不一帆风顺。如今，在世界大战结束和十月革命胜利的背景下，原先看似铁板一块的联邦社民党中的列宁主义者选择出走，分裂出挪威和瑞典的共产党。他们凭借着世界大战后并不昌盛的经济局势，煽动工人举行罢工，并计划推翻联邦政权。\n\n§Y在惊惧和恐慌中，抓紧缰绳。§!"
 SWE_Left_Threat_II_desc:0 "社会主义、共产主义，这些词语最初在北欧有什么意义，已经无从考证了。但是现在，任何在挪威和瑞典两地举起红旗，呼喊着这样的口号的人，无论他们是否真心崇奉马克思的信条，都无一例外，是为了推翻现有的联邦政权。\n挪威的工人运动的历史十分悠久，可以追溯到1814年联合建立之初，瑞典入侵挪威时，工人们就为了他们的国家而展开了斗争。1905年，工人运动随着政治运动的发展而达到高潮，随后暂时衰落。在联邦社民党亲联邦主义的政策领导下，工人运动陷入低谷。\n但事情总是不一帆风顺。如今，在世界大战结束和十月革命胜利的背景下，原先看似铁板一块的联邦社民党中的列宁主义者选择出走，分裂出挪威和瑞典的共产党。他们凭借着世界大战后并不昌盛的经济局势，煽动工人举行罢工，并计划推翻联邦政权。\n\n§f长路两旁的灌木已经被肃清。§!"
 SWE_Eighty_Seventh_Orders:0 "《联邦改革特别委员会法》"
 SWE_Eighty_Seventh_Orders_desc:0 "“自即日起，设立联邦改革特别委员会，为联邦之彻底民族改革工作，可绕过议会，掌管基层，并直接听从国王命令。”\n《联邦改革特别委员会法》，在联邦的三个议会都已高票通过，这意味着联邦的命运重新被国王所掌控了。这位心怀§f「宏伟蓝图」§!的君主，将会带着他的国家走向何方呢·······"
 SWE_K_Plan:0 "卡尔斯塔德计划"
 SWE_K_Plan_desc:0 "早在1905年《哥特堡宪法》颁布的时候，许多有识之士就已经提出了一个国家性的工业计划，通过国家力量补贴挪威工业，以快速进行挪威的工业化，使挪威摆脱“王国渔场”的帽子。这一计划最终结为《卡尔斯塔德宣言》，是为卡尔斯塔德计划。\n但是，因为两个议会的互相扯皮，和官僚系统的极其低下，导致国内并没有一股政治势力愿意支持这个计划。不过好消息是，在《联邦改革特别委员会法》通过之后，全议会都终于愿意支持这个计划了，这对王国来说是一个相当好的预兆！"
 SWE_Encourage:0 "刺激市场"
 SWE_British:0 "英国贸易协定"
 SWE_Francais:0 "法国贸易协定"
 SWE_Further_Reform_Law:0 "全面深化改革"
 SWE_Antisocialistisk_Speciallagen:0 "《反社会党人非常法》"
 SWE_Antisocialistisk_Speciallagen_desc:0 "在19世纪后半叶，马克思主义的影响日益扩大，社会主义运动在各国蓬勃发展。资产阶级专政政府对此深感不安，因此出台了各式各样的反社会主义运动的法律，其中最有名的就是德意志帝国俾斯麦政府出台的§R《反对社会民主党进行普遍危害活动法》(Gesetz gegen die gemeingefährlichen Bestrebungen der Sozialdemokratie)§!，又称§R《反社会党人非常法》(Sozi-alistengesetz)§!。这一法律之中许多的反左翼政党的法律条文依然值得学习，比如一切旨在推翻“现存国家制度和社会制度”而从事社会民主主义、社会主义和共产主义活动的组织均予禁止，其集会、活动、游行予以解散，印刷品予以查禁；禁止为社会民主党印刷宣传品和提供集会场所；在“公共安全受到威胁”的城市或地区宣布实行“小戒严”；“危害公共安全和公共秩序者”要被驱逐出居留地，参与受禁活动的人将被处以罚款或被判刑等。\n联邦政府已经通过学习这一法律颁布了属于我们的《反社会党人非常法》。通过这一法律我们可以更好的进行对抗左翼的运动。"
 SWE_Beyond_Nation:0 "超越民族主义"
 SWE_Beyond_Nation_desc:0 "民族主义，一个梦魇，一直萦绕在我国的天空上。它使得联邦的子民分裂，陷入内斗。但如今这些事情必须被制止！超越民族主义，我们将走向共荣！"
 SWE_Hurt_of_Norway:0 "挪威独立之创伤"
 SWE_Hurt_of_Norway_desc:0 "瑞典-挪威联合王国已经灰飞烟灭，斯堪的纳维亚半岛上，挪威已然独立。\n而这并不是奇迹。\n早在联邦建立之初，挪威独立的隐患就已经出现，因为自那时起，就没有一个瑞典人认为挪威人是一个和自己平等的民族，而是认为是“他者”的民族。因此双方的冲突时常发生，而在新世纪到来之时，这矛盾集中地爆发了。即使统治者们试图重新联合两方，但是这种矛盾最终还是爆发了，并且不可避免地摧毁了联邦。\n如今联邦已经消散，两国不得不从头建构政府，并且都要面对各自国内的极端民族主义情绪。\n\n\n§R联邦一梦，已碎。§!"
 SWE_Hurten_of_Norway:0 "独立之创伤"
 SWE_Hurten_of_Norway_desc:0 "瑞典-挪威·联合王国已经灰飞烟灭，斯堪的纳维亚半岛上，挪威已然独立。\n而这并不是奇迹。\n早在联邦建立之初，挪威独立的隐患就已经出现，因为自那时起，就没有一个瑞典人认为挪威人是一个和自己平等的民族，而是认为是“他者”的民族。因此双方的冲突时常发生，而在新世纪到来之时，这矛盾集中地爆发了。即使统治者们试图重新联合两方，但是这种矛盾最终还是爆发了，并且不可避免地摧毁了联邦。\n如今联邦已经消散，两国不得不从头建构政府，并且都要面对各自国内的极端民族主义情绪。\n\n\n§R联邦一梦，已碎。§!"

 SWE_The_Union_Dream:0 "联邦一梦"
 SWE_The_Union_Dream_desc:0 "瑞典-挪威联合王国，曾经是扭曲的多民族国家的代名词。曾几何时，奥斯陆和斯德哥尔摩的街道上都是抗议游行的人，甚至有人往王宫扔汽油燃烧瓶。在世界大战，奥匈帝国解体之后，人们无一不把目光投向了这个国家，几乎所有权威人士都认为这个丑陋的国家将在很快时间内解体，国内的诸民族甚至也是这么想的。\n但是，在哈康陛下所领导下的全面改革取得显著的成效之后，联邦顿时稳定下来，经济欣欣向荣，人民安居乐业，曾经解体的预言也迅速被人丢到了脑后。\n那么未来呢？人们翘首以盼的未来，那是一个没有贫穷的世界，没有痛苦的世界，没有分化的世界。联邦的人们，聋子搀着瘸子，哑巴扶着瞎子，走出那不完美的洞穴，去追寻那属于每个人的美好世界。\n这是一场§C漫漫征途§!，但这绝不只是一场梦，我们必定会实现它的！"
 SWE_Open_the_door:0 "门户开放政策"
 SWE_Open_the_door_desc:0 "对于我国的工业发展来说，如果不尽可能推动外贸的发展，那么实现全国的繁荣发展终究只会是无谓的空话。实行门户开放的政策，我国和他国进行的贸易将增加，这将推动我们的经济发展，提升我国工业化的速度。"
 SWE_Soviet_Trade:0 "苏联贸易协定"
 SWE_Soviet_Trade_desc:0 "苏联，一个不容忽视的存在。\n即使宣传机器再怎么开足马力渲染社会主义制度的可怕，即使我们的“伙伴”再怎么在我们的耳边诅咒列宁和他的布尔什维克，苏联广大的市场是不可忽视的。她拥有巨大的农业基础，但是这一国家的工业几乎不存在。这是一个十分广大的市场，几乎无人开发。一旦我们开辟这个红色市场，将给我国的经济发展会带来不可忽视的红利。"
 SWE_Soviet_Trade_soviet:0 "瑞典贸易协定"
 SWE_Soviet_Trade_soviet_desc:0 "和瑞典人的双边贸易协定十分顺利。将俄罗斯土地上的农产品和瑞典人的工业品进行贸易，我国许多产业的发展都可以从中获利，同时也可以为刚刚起步的工业发展提供基础。"
 SWE_Germany_Trade:0 "来自瑞典的军火贸易"
 SWE_Germany_Trade_desc:0 "我国和瑞典建立了有关军事合作的贸易协定，他们将在各个方面协助我们的军事工业建设。"
 SWE_Germany_Trade_sweden:0 "对外军事贸易协定"
 SWE_Germany_Trade_sweden_desc:0 "我国与他国建立了军事贸易合作关系，协助对方的军事工业建设，并得以从中获益。"
 SWE_Regulation:0 "金融监管改革"
 SWE_Third_Chioce:0 "第三种选择"
 SWE_Third_Chioce_desc:0 "在大战以后，原先英法组成的协约国几乎顷刻分裂，英国人和法国人开始了冷战。而他们冷战的代价，就是一个世界的分裂，和无数小国的迷茫。不仅是政治上亲英派和亲法派的混乱，原有的贸易体系也被彻底打乱。无数的农业国突然面临了站队或死亡的贸易处境，更别提那些尚处于混乱、动荡和不安的地区了。冷战的波澜甚至尚未触及他们，而他们的人民就已经处于水深火热之中了。\n在这样昏暗的世界之中，联邦试图垂下一根蜘蛛丝，用它那薄弱但有力的工业和矿产帮助每一个处于困境之中的国家和民族，那些被时代所抛弃的人。或许联邦所做的一切都微不足道，但是也可以为那些身处水深火热之地的人们一丝希望。在§B英法冷战的庸庸碌碌§!和§R直面痛苦的死亡§!之间，我们提供了§K第三种选择§!。"

 SWE_In_Revolution:0 "改革进行中"
 SWE_In_Revolution_desc:0 "在哈康陛下的领导下，改革正马不停蹄的开展着。我们终会抵达§C那个终点§!，毫无疑问。\n----------------------\n[SWE_Union_quote]"
