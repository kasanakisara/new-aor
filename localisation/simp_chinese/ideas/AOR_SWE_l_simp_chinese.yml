 SWE_Regency_Council:0 "联邦摄政委员会"
 SWE_Regency_Council_desc:0 "§8“当联邦君主中有一位驾崩时，应当由联邦议会组建摄政委员会，通过选举手段全权负责新君主的产生。若联邦议会此时正处于被解散状态下，则应当立刻组建新联邦议会。在新的君主产生前，由另一位联邦君主代行全部君主权利和义务。”§!\n\n根据哈康七世陛下亲手制定的《联邦继承法》，随着他本人在奥斯陆不幸驾崩，联邦议会于当日立刻选举出了摄政委员会，全权接管王政事务。\n然而，摄政委员会呈现出了一种奇怪的二相性：一方面，摄政委员会似乎并没有什么兴趣处理哈康七世陛下高贵复杂且支系庞多的的家谱，以从中选举新的国王，甚至可以说他们对待王冠的态度比共产主义者还要轻蔑；而另一方面，摄政委员会利用紧急法案快速收敛了大量权力，他们对除了王政之外的一切事物都有莫大的兴趣。似乎哈康七世陛下尸骨未寒，联邦就又要陷入一场新的政治风波了。\n\n让我们祈愿不要如此……"
