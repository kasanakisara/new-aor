 SWE_Ex_Folkhemmet:0 "“人民之家”计划"
 SWE_Ex_Folkhemmet_desc:0 "“人民之家”这一计划来自执政的社会民主党，他们计划通过大量的福利政策来消灭人之间的不平等。无论你的种族，你的阶级，你的各种各样的“特点”，在联邦面前人人平等，你们都享有同等的权利，也同样负有同样的义务。这一计划会带来许多财政负担，也会带来难以避免的高税收，但是毫无疑问，这是维护联邦和平和统一的一个良策。\n如今作为联邦化进程中十分重要的一部分，这一计划已经取得了显著的成果，人民在高福利下安居乐业，政府也没有遭到意想中的财政危机。继续前进吧，联邦的命运已掌握在手中。"
 SWE_Ex_Folkhemmet_tt:0 "\n当前发行国债值：§Y[?SWE_National_debt|%]§!国民生产总值\n当前持有国债值占总国债值比例：§Y[?SWE_has_National_debt|%]§!\n当前国债值提供修正：\n生活消费品工厂系数：§Y[?SWE_Folkhemmet_consumer_goods|%]§!\n工厂产出：§Y[?SWE_Folkhemmet_industrial_capacity|%]§!\n基础生产效率：§Y[?SWE_Folkhemmet_factory_efficency|%]§!\n\n每月额外消耗的政治点数：§R+125.00§!\n如果每月结算时，政治点数小于§Y0.00§!，将承受经济惩罚§Y“人民之家”计划超出预算§!，效果为：\n每日消耗的政治点数：§R+0.20§!\n生活消费品工厂系数：§Y30.00%§!\n稳定度：§R-10.00%§!\n每周稳定度：§R-1.00%§!"
 SWE_High_national_debt:0 "债务危机的步音"
 SWE_High_national_debt_desc:0 "在我国现行的经济体制下，因承受过高的债务，债务危机已经近在眼前。我们必须马上就解决这一问题。"
 SWE_Low_national_debt:0 "停滞的市场"
 SWE_Low_national_debt_desc:0 "因我国的债务率过低，导致我国出现了通货膨胀，经济萎靡，市场不振。我们必须着手解决这一问题。"
 SWE_Samitinget:0 "萨米议会和萨米理事会"
 SWE_Samitinget_desc:0 "萨米议会的任务是为瑞典-挪威联合王国的萨米文化而努力。\n萨米议会由联邦北方的萨米人自行选举建立，任期4年，换届选举与全国议会选举同时进行，是法律认可的国家政府机关，负责处理关于萨米人的事务，保障联邦内全萨米人的权利，也是国家顾问机构，但是无立法权。"
 SWE_United_Norweign:0 "统一的挪威语"
 SWE_United_Norweign_desc:0 "挪威语曾有两套书写形式，分别是“书面挪威语”和“新挪威语”。两种书写挪威语的形式分别温和地代表着保守和激进的书写表达方式。书面挪威语主要取材来自丹麦语和其他斯堪的纳维亚语言，而新挪威语取材自古斯堪的纳维亚语。由于后者基于乡村方言拼写，所以在19世纪农村色彩浓厚的挪威很受欢迎，但在20世纪初城市化开始后快速衰落。现在我们创制了一种结合了两种书写方式的挪威语书写方法，或许有旧时代的残余不愿意接受，但这在未来将会为挪威民族带来不可估量的利益。"
 SWE_Universal_Suffrage:0 "全面普选制度"
 SWE_Universal_Suffrage_desc:0 ""
 SWE_Merged_Parliament:0 "精简的议会组织"
 SWE_Union_Inheritance_Law:0 "《联邦继承法》"
 SWE_Union_Inheritance_Law_tt:0 "§3\n“奉神圣联邦之名，为确保代表联邦之人民的联邦之君万世一系的神圣性，以《瑞典-挪威联合王国宪法》为根基，特制定此法。”§!\n\n“联邦君主由瑞典国王和挪威国王组成，二者作为各自国家的元首，并共同作为联邦的君主，代表联邦人民和联邦的神圣性。”\n\n§8“当联邦君主中有一位驾崩时，应当由联邦议会组建摄政委员会，通过选举手段全权负责新君主的产生。若联邦议会此时正处于被解散状态下，则应当立刻组建新联邦议会。在新的君主产生前，由另一位联邦君主代行全部君主权利和义务。”§!"
 SWE_Union_Inheritance_Law_desc:0 "§V选举会在两任君主之间留下危险的间隙，宛如疾风骤雨。——让-雅克·卢梭《社会契约论》§!\n\n很难想象当初的瑞典议会是如何想出让丹麦格吕斯克堡王朝的那个卡尔王子主持一场震惊全欧洲的政变，加冕为哈康七世的。政变在北欧历史上并不是一种受欢迎的政治举动，更不用说这位支持挪威独立的丹麦王子在一夜之间和他的祖国及支持者站到对立面，开始戴着王冠捍卫他口中的“神圣联邦”，这种大转向在世界历史上都是罕见的。\n但一些有识之士看得更远。瑞典议会希望控制哈康作为他们的傀儡，借此让他们更进一步地控制这个脆弱的联合。但哈康并非他们梦中的软弱之人，他具有以往联邦每一任君主都未曾有的权柄：民主化的激情和人民的支持。在他本人和全联邦坚定不移的推进下，民主化和联邦化已经成为了不可逆转的趋势，只要他尚未身死，而他的制度也尚未崩溃。于此继承法定下以后，只要往后的全民族都继续联邦化和民主化的方针，就不可能有人再拥有如此的权柄反抗这股潮流。\n\n大抵如此。"
 SWE_Inheritance_Law_tt:0 "获得§Y《联邦继承法》§!。\n\n§V警告：“选举会在两任君主之间留下危险的间隙，宛如疾风骤雨。”——让-雅克·卢梭《社会契约论》\n\n但在此之前，且让我们等待……§!"
