l_simp_chinese:
  #朝鲜军政府民族精神
   Decadence_of_industry:0"颓废的工业"
   Decadence_of_industry_desc:0"连完整地武装一支军队都不一定可以，我们军队的武器都是来自日本人的援助。如果我们没有工业化，那我们离灭亡不远了"
   Land_reform_has_not_yet_begun:0"尚未开始的土地改革"
   Land_reform_has_not_yet_begun_desc:0"土地问题，在东亚是一个普遍的问题，尤其是朝鲜历史上爆发过许多起农民起义的国家。如果不进行土地改革，把土地分给农民，我们可能在不久的将来就会在农民和工人的作用下灭亡"
   Flooded_guerrillas:0"泛滥的游击队"
   Flooded_guerrillas_desc:0"朝鲜独立同盟会，是一个诞生于战时的一个反日势力，他们在三三运动之后组建了“独立同盟军”的游击队。他们在刚开始没有多大的势力，仅仅只在深山老林里有点势力。但如今他们的势力越来越大，我们必须想办法去消灭他们才能保障我们的安定"
   Coach_Corps:0"教练兵队"
   Coach_Corps_desc:0"1876年朝鲜开港以后，统治朝鲜的闵妃集团开始实行改革，军事改革是最先进行的部分。1881年(高宗十八年）四月二十三日，在日本驻朝公使花房义质和兵曹判书闵谦镐的建议下，朝鲜王朝正式设立了别技军(“别技军”即精锐部队之意），教授新式武器及战法，由日本陆军工兵少尉堀本礼造担任教官，负责训练别技军"