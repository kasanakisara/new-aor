YEM_the_shiye_desc:0 "经过千万兄弟艰苦卓绝的奋斗与拼杀，我们终于在阿拉伯半岛上拥有了一块供正教与教徒们休养生息的恩赐之土，这是属于真主的荣光！并附上呼喊：万岁，伊玛目叶海亚·穆罕默德·哈米德丁！万岁，真主！"
YEM_the_yedelis_desc:0 "伊德里斯这个挂羊头卖狗肉的异端已经被永远的驱逐出了也门，但是他给我们留下的伤痛至今久久不能恢复-况且，冉冉有一小部分被抛弃之徒，正在伺机组织他们的邪恶计划……"
