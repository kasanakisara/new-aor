l_simp_chinese:
 #ideas#
 Depression_calls_1:0 "§Y令人担忧的经济下行§"
 Depression_calls_2:0 "§B仍在恶化的经济危机§"
 Depression_calls_3:0 "§R淹没国家的大萧条§"
 Depression_calls_1_desc:0 "我们的经济学家在国家经济走向分析中与民生和工业部门呈递的联合调查报告都指向了同一个观点——我们的国家发生了一场区域性经济崩环。此现象导致了国家经济出现下行，但与典型的下行模型不同的是，这场经济崩环从多个经济环节中发展出来，因而目前我们也无法确定第一张多米诺骨牌是何时何地因何而倒的。不过可以肯定的是，目前市场信心正在下跌，许多中小型企业因资金链断裂商品堆积在市场而陆续破产，大企业也因经济波动而开始裁员，失业人数因此加速增长，这些经济上的动荡冲击着我们的国家政治,倘若我们不采取有效措施来遏制，这场经济下行早晚会发展为§R一场经济危机§。"
 Depression_calls_2_desc:0 ""
 Depression_calls_3_desc:0 "如果说劳苦百姓的主子是政治家与资本家，那么政治家与资本家的主子就是英国和法国。他们开着黑船随着那只“看不见的手”来到美利坚，在这里肆无忌惮地压榨，吸血。英法资本对大多数企业的优势控股已经成为了这里的常态，而政治斗争也往往是英法势力角逐的体现。这自由与希望的新大陆之国徒有超级大国的表，实际上是腐蚀殆尽的里。"