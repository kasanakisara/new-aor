 Imprison_in_the_dark:0"禁锢黑暗中"
 Imprison_in_the_dark_desc:0"尽管南方早在《查尔斯顿协议》签订后就废除了奴隶制，但是这些地位低下的黑人群体，在我们南方并不受到人身安全保障与法律保护。我们用强有力的隔离手段及法律规定，将这些不稳定因素牢牢地固定在了他们原来生活的地方。他们仍然是我们南方的奴隶，§R但随着人口的增加，他们在慢慢拖垮我们……§!"
