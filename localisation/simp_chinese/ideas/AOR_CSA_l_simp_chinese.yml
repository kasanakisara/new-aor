 Armament_of_the_Union:0"联盟的武装"
 Armament_of_the_Union_desc:0"南方的军队主要由原先的美国民兵，即现在南北统一称呼的国民警卫队组成。他们受命于南方各州政府，并在名义上统一属于一个南方国民警卫队总部的指挥-而实际上，各州往往各自为政，军队相互之间并不听从调令。这导致了我们南方军队的协调性很差，军事训练也有所欠缺。但各州已经加快了人员武装进程，我们仍有信心打赢这一场保卫战争。"
