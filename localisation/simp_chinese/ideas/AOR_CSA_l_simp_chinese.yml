 Dixie_Goes_Again:0"迪克西再出发!"
 Dixie_Goes_Again_desc:0"遥远的1865年，那悲剧与屈辱交叉的滋味已然逝去。当年的南方义军们不甘心地放下了自己独立的尊严，与北方的叛国者们重新融为一体，操控的这台丑陋的机器，在世界不停的爬行，而南方人的血与泪也随之飘散于美洲大陆之上。不过，胜利的曙光终将会到来，迈入1921年的夏季，就如同60年前……§t既然他们胆敢再次妄图征服我们，那小伙子们就再次拿起我们的枪炮，为了伟大的迪克西而战!§!"
