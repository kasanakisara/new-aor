 Oil_Heaven:0"石油天堂-血肉机器"
 Oil_Heaven_desc:0"上帝虽然不眷顾南方的政治前途，却眷顾了南方这片肥沃的土地。她产出那无穷无尽的黑金，无时无刻地滋润着我们的人民，同时，南方人民的身躯堆砌了数不尽的加工厂-尽管巨企们一手遮天，我们却对此无可奈何。但只要他们还在战争中保持中立，我们便能继续获利……"
