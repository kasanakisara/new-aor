 Fire_Cactus:0"烈火仙人掌"
 Fire_Cactus_desc:0"约翰.南斯.加纳是迪克西党中态度坚决的政治强人，其优秀的政治作风以及坚贞不屈的斗争精神，使得他深受南方人民的爱戴。如今，这只仙人掌将自己锋利的尖刺对准了北方的入侵者们，并时刻给予他们迎头痛击。"
