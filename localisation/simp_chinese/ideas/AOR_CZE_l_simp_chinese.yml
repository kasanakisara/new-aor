#捷克
CZE_T_M_DESC:0"托马斯·加里格·马萨里克。曾经是一个摩拉维亚斯洛伐克贫困工人家庭的小孩，如今已经成为捷克共和国的国父。然而谁能想到，在三十年前，他还只是一个捷克青年党里的毛头小子，即使到了二十世纪初，他为人所知的主张还是将奥匈帝国改组为一个联邦国家。当那场大战爆发，战争永久地改变了帝国的命运，将它化作历史的尘埃，而托马斯也无可避免地被拉入历史的漩涡，不过是被推到了舞台上。大战期间，他带领家人前往瑞士避难，并在此期间意识到：捷克人的权利与独立必须通过他们自己来争取。几乎是一夜间地，他从一个盲目的政客变成了捷克民族运动的领导人。此后，他开始积极组织捷克民族委员会，号召战争中的捷克人为民族而战而非帝国，他的活动为他积攒了大量声誉，将他推上了人生的巅峰——帝国最后一次会议的捷克首席代表。最终，合约签订，相机轰鸣，捷克共和国在帝国的废墟上冉冉升起，国父的名号也被加在他身上。"
#####民族精神#####
CZE_Large_industrial_area:0"帝国的遗产：大工业区"
CZE_Large_industrial_area_desc:0"捷克第一共和国在1915年10月奥匈帝国轰然解体后出现，尽管这个新生的国家大部分西部地区住着外国人，但是他占据着奥匈帝国宝贵的工业区，这成为了经济的基础。"
CZE_soaring_economy:0"狂飙的经济"
CZE_soaring_economy_desc:0"德国崩溃了……如潮水般的资本涌入了这个民主国家，有着丰厚工业基础与大量技术劳动力的捷克，一时间成为了德国资本避险的首要地区，捷克股市由此开始疯涨，每日只有涨停的钟声，一座座工厂在多瑙河沿岸建起，德国的人才涌入捷克，为这个共和国注入了无限的血液，带来的是无限的机遇。但政府的无能让经济开始过热化膨胀，政府显然没有足够的精力管理全国经济，党派纷争不断，联合政治也不被大众认可，一些经济官员的提案扔进了档案箱中，大多数政令甚至出不了布拉格，这繁荣的经济下，外国资本占据了主导地位，捷克人开的工厂被无情的碾压过去，谁也不知这片丰茂的资本草地还能坚持到何时……"
CZE_Merchant_troops:0"军队经商"
CZE_Merchant_troops_desc:0"为了缓解政府的外债压力，托马斯总统进一步削弱了军队的预算，将资金投入到了基础设施的建设上，并依赖多瑙河防御联盟，让军队下海经商，只保留必要的国防军队。在德国崩溃后，这种情况进一步扩大，全国60%以上的军队处于非军事化的管理下，建立了一个个企业，甚至搞起了贩卖军火，开办酒店工厂。但不得不承认军队的开支大幅度的下降了，甚至一度开始为国家贡献税收，托马斯总统为此回应道要建立一个和平的民主国家，第二个欧洲瑞士。此举赢得了国内资本的青睐，并缓和了议会中关于总统专制的质疑。"
