#中美洲
#####民族精神#####
MIA_the_bannan:0 "香蕉"
MIA_yanli:0"严厉的主人"

MIA_the_bannan_desc:0 "在郁郁葱葱的热带雨林中，你总能看见那些遍体鳞伤，骨瘦如柴的混种人在拾取着各类水果……没错，他们当然是拉丁美洲各国的公民，但他们同时也是以法国为首的西方水果公司的雇员。按他们自己的话来说，就是“Arrendatario”。他们背井离乡，只为求一口热汤与栖息之地，并远离动乱。只可惜，他们闯入了地狱者设立的的乐园-他们受到了监禁，他们照样食不果腹衣不裹体，如机械般麻木的收割作物，或许，并在这里将献出他们的一生。"
MIA_yanli_desc:0 "中美洲联邦遭受了比其他拉美国家更加无法想象的盘剥。联邦政府无力控制外国的农业公司大量兼并的土地，同时也无力管理各地区的联邦公民，我国将近60%的人口都在外国农业公司的种植园工作-而且遭受着极度非人的待遇。若有法国人踏上这片土地时，我们中美洲人便成为了二等公民，成为了法国人卑微的奴仆……"