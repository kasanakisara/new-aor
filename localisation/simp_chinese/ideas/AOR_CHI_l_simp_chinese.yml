 Li_Yuan_Hong:0"黎元洪"
 Li_Yuan_Hong_desc:0"黎元洪，字宋卿，湖北黄陂人也。少习水师，及长，投身行伍，累迁至协统。辛亥鼎革，武昌首义，黎公被推为都督，声名鹊起。民国肇建，袁世凯任大总统，黎公虽非北洋嫡系，然以其威望，仍得倚重。时值欧战爆发，袁氏无心专权于国会，黎公遂得以整合政党，联合南方诸镇，创立中国进步党，位列国会第三大党，一时风头无两。\n\n然好景不长，1917年社会党国会丑闻骤起，进步党内地方派心生疑窦，社会党亦复分裂，国会派与地方派势同水火。黎公虽竭力调停，然两派积怨已深，难以弥合。至1920年，袁氏薨逝，黎公继任大总统，矢志推行民主，然其非北洋嫡系，国会中北洋附属政党多所掣肘，加之其晚清官僚出身，民间亦多非议，故其政途坎坷，步履维艰。\n\n黎公虽处逆境，然其志不稍挫，犹欲挽狂澜于既倒，扶大厦之将倾。惜乎时势艰难，终未能尽展其抱负。"


 Xu_shi_chang:0"徐世昌"

 Yuan_Shih_kai:0"袁世凯"
 Yuan_Shih_kai_desc:0"袁世凯，字慰亭，河南项城人也。少负大志，尝游学东瀛，习军事。归国后，历仕清廷，累迁至北洋大臣，权倾一时。辛亥鼎革，袁氏以雄才大略，斡旋南北，遂膺大总统之选。其时国势飘摇，列强环伺，袁氏外联协约，内修政理，卒使中国跻身战胜之列，收复利权，国威稍振。\n\n袁氏虽未僭帝号，然其操控社会党，于国会中独揽大权，实为无冕之王。其政略深沉，手段老辣，虽遭非议，然其功业亦不可没。\n\n至己未年，袁氏犹健在，国人或颂其功，或讥其专，然其于中国近世史之影响，实深远矣。"

 Feng_guo_zhang:0"冯国璋"
 Feng_guo_zhang_desc:0"冯国璋，字华甫，直隶河间人，北洋宿将，历任要职，辛亥后为陆军部长，权重一时。欧战之际，冯氏率师出关，与日军并力抗俄，血战四载，终复东北失地，收回主权，功在国家，誉满天下。其劝地方豪强弃武从文，投身国会，亦显其政治远见。\n\n然冯氏铁腕镇压京汉铁路罢工，手段酷烈，民心尽失。其在国会中扩张势力，不择手段，亦为世人所诟。至壬戌年，段祺瑞南下，冯氏亦挥师北上，北洋内讧，国将不国。\n\n论冯氏，或颂其战功，或责其暴政，然其一生功过，实难一概而论。冯氏虽有过，然其于国难之际，能挺身而出，收复河山，亦不失为一代枭雄。"

 Duan_Qi_Rui:0"段祺瑞"
 Duan_Qi_Rui_desc:0"段祺瑞，字芝泉，安徽合肥人，北洋军阀之翘楚。初以武备学堂出身，历仕清廷，辛亥后为北洋重臣。欧战爆发，段氏奉命督师西北，初因与冯国璋争功，战意消沉，师老兵疲。然自徐树铮等少壮军官得用，士气复振，遂转守为攻，屡挫俄军，终至饮马贝加尔湖，功勋卓著，国人誉之。\n\n然至壬戌年，国会纷争不已，政局动荡。段氏乘机率师南下，强占张北、京兆，此举虽显其军略之能，然违逆民意，激起全国公愤。\n\n论段氏，或赞其战功，或责其专横，然其一生之起伏，实为民国政局多变之缩影。段氏虽有过，然其于国难之际，能振臂一呼，率师抗敌，亦不失为一代枭雄。"

 Tang_ji_yao:0 "唐继尧"

 ni_si_chong:0 "倪嗣冲"
 ni_si_chong_desc:0 "倪嗣冲秀才出生，却先入淮军，后入袁世凯新军。在东三省累转多年后，于民国初年回到家乡安徽主掌军政大权。一笔写不出两个皖字，段祺瑞和倪嗣冲的同乡之谊无人不知。而倪嗣冲手下足有五个混成旅的安武军，更是一支决定性的力量。不管怎么说，倪嗣冲及其所领的安武军,是东南争夺，乃至北方战局中不可小觑的一方势力。而倪氏与段氏之间的关系，也影响着皖省和皖系之间的纽带。"

 li_hou_ji:0 "李厚基"
 li_hou_ji_desc:0 "作为段祺瑞所领导的皖系的一员，李厚基来到福建担任督军可谓肩负责任。但事实证明，李厚基的能力似乎无法胜任，至少暂时无法胜任一省督军之位。福建局势糜烂，段祺瑞忙于西北和北方事务，暂时也无法再提供更多的支援。摆在李厚基面前的只有两条路，拼尽全力搏一把，或者被后继者取代。"
