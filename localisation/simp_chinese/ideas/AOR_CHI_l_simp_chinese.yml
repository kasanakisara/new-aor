 Sun_zhong_shan:0"孙文"
 Sun_zhong_shan_desc:0"孙文，字逸仙，广东香山人，世称中山先生。少怀济世之志，游学海外，倡革命，矢志推翻满清，建立共和。辛亥功成，民国肇建，孙氏以临时大总统之位，让于袁世凯，自退而谋建设，尤致力于铁路之兴，欲以实业救国。\n\n然袁氏擅权，社会党踞国会，共和之基动摇。孙氏不忍见民国之名存实亡，乃重返政坛，力挽狂澜。经此一变，孙氏之思想亦生巨变，始倡新三民主义，强调民族独立、民权自由、民生幸福，尤重民众之觉醒与参与。其言曰：“革命尚未成功，同志仍须努力。”孙氏之新论，为后来之中国革命开辟新径，影响深远。\n\n孙氏虽年逾五旬，然其志不衰，犹奔走呼号，为国为民，鞠躬尽瘁，死而后已。"


 Chen_Qi_Mei:0"陈其美"
 Chen_Qi_Mei_desc:0"陈其美，字英士，浙江吴兴人也。少怀壮志，投身革命，为同盟会健将，辛亥之役，率众光复上海，功勋卓著。民国既建，陈公虽未居显位，然其志在救国，未尝一日懈怠。\n\n1917年，国会丑闻爆发，国民党声威大挫，华南同志多生异心，唯陈公坚守不渝。然此事对其打击甚巨，使其思想渐变，地方主义渐占上风。陈公以为，三民主义需因时革新，唯有联合地方豪强，统合各方势力，方能再造强大中央政府，遂创“联合三民主义”，欲以此振兴民国。\n\n1919年，陈公随孙文赴滇，暗中联络蔡锷等滇军激进派，力保孙文安全，终使蔡锷等人于1921年拥戴孙文为云南救国军政府首领。1920年，陈公返华南，积极拉拢地方实力派，壮大国民党力量。然其为达目的，不择手段，亦招致诸多非议，时人疑其用心，然陈公志在救国，虽千万人吾往矣。"

 Liao_Zhong_Kai:0"廖仲恺"
 Liao_Zhong_Kai_desc:0"廖仲恺，原名恩煦，字仲恺，广东归善人也。少怀济世之志，留学东瀛，习政治经济，辛亥鼎革，投身革命，为同盟会骨干。民国肇建，宋教仁北上组阁，廖公遂于国会内阁履职，历任要职，然1917年国会丑闻爆发，廖公毅然辞去农林总长之职，以示抗议。\n\n欧战告终，廖公得闻俄布尔什维之思想，深感其理之正，虽与孙文分居南北，然仍以电报往来，助孙文处理事务，其忠心可见一斑。1920年末，孙文掌控云贵，廖公南下，于云贵地区宣扬其新思想，名曰“激进三民主义”。此主义主张以暴力革命推翻封建制度，没收地主土地，平均地权，倡工农合作社，联合革命，建立国家资本主义政府，以实现节制资本之理想。\n\n廖公之理想，虽遭反动势力攻讦，其可行性亦受质疑，然其为国为民之赤子之心，昭然若揭，国民党内部无不赞誉。廖公一生，可谓为革命鞠躬尽瘁，死而后已，其“激进三民主义”虽未竟全功，然其勇于革新之精神，亦足为后世所景仰矣。"

 Cai_e:0"蔡锷"
 Cai_e_desc:0"蔡锷，字松坡，湖南邵阳人也。少负才名，留学东瀛，习军事，辛亥鼎革，投身革命，为滇军名将。民国初建，袁世凯忌其才，软禁于京。然欧战骤起，俄国犯我北疆，蔡公请缨北上，率滇军赴蒙古抗俄，屡建战功，声震华夏，战后授三星上将，兼云南省荣誉省督办、议会议长等职。然北洋忌其声望，蔡公遂辞官归里，韬光养晦。\n\n1920年，重庆英舰事件爆发，云贵总督唐继尧失尽人心。时陈其美密邀蔡公，共谋驱逐唐氏，蔡公本心向共和，遂欣然应允。是年末，蔡公联合滇军激进之志士，逐唐继尧出云南，拥戴孙文为领袖，成立云南救国军政府，志在再造共和。\n\n然云南境内军阀未靖，蔡公又罹患重疾，呼吸艰难，滇军前途未卜。然蔡公为国为民之信念，坚如磐石，虽前路荆棘，亦不改其志。蔡公一生，可谓为共和鞠躬尽瘁，死而后已，其精神之伟岸，已无需赘言，足为后世所景仰矣。"

 Song_Jiao_Ren:0"宋教仁"
 Song_Jiao_Ren_desc:0"宋教仁，字遁初，号渔父，湖南桃源人也。少负才名，留学东瀛，习法政，志在救国。辛亥鼎革，投身革命，为同盟会骨干，民国肇建，任农林总长，旋辞去，致力于政党政治，创国民党，欲以议会制衡总统，实现共和理想。\n\n1913年，宋公北上组阁，虽内阁之权未足以制衡袁氏之专权，然其运筹帷幄，国民党稳居国会第一大党，声势浩大。1917年，国会社会党丑闻骤起，国民党内部分崩离析，大量党员脱党，国会势力大挫。宋公遭此重击，心灰意冷，遂渐退居二线，然其心系国事，未尝一日忘怀。\n\n退隐之后，宋公致力于党内整顿，调和各方，力挽颓势，更以笔墨为戈，担国民党宣传之重任，撰文演说，宣扬共和理念，激励同志。其文辞犀利，见解独到，时人誉为“党魂”。虽身处逆境，然宋公不改初心，以国家兴亡为己任，鞠躬尽瘁，死而后已。其一生，可谓为共和理想奋斗不息，亦足为后世所景仰矣。"


 Chen_Chiung_Ming:0"陈炯明"
 Chen_Chiung_Ming_desc:0"陈炯明，字竞存，广东海丰人，初为同盟会健将，辛亥后据广东，为南方一方之雄。丁巳年国会风波起，陈氏竟与同盟会及国民党决裂，联合桂、湘军阀，扩张势力，此举震惊全国，舆论哗然。\n\n然陈氏在粤，亦非全无建树。其致力于铁路之修筑，实业之兴办，粤地经济，因之稍苏。且其宣扬联合主义，欲融各方之力，共谋国是，显见其思想之矛盾与复杂。\n\n今陈氏仍据广东，其建设之功与割据之实，并立于世。论陈氏，或责其背信弃义，或赞其务实建设，然其一生之行迹，实为国家一方诸侯之典型，功过是非，留待后人评说。"

