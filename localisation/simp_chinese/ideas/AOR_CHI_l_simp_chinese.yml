 Republic_of_China_1:0 "中华民国"
 #ideas#
 Unequal_trade:0"不平等的贸易"
 Semi_colonial_economy:0"半殖民地经济"
 AOR_Reclaiming_outer_northwest:0"收复外西北"
 AOR_Reclaiming_outer_northwest_desc:0"俄国已经侵占我国外西北数十年之久，先正值俄国内乱之千载良机，自当收复失地。男儿何不带吴钩，收取关山五十州!"
 AOR_CHI_Military_aid_from_the_Allies:0"协约国的军事援助"
 AOR_CHI_Military_aid_from_the_Allies_desc:0"毫无疑问，俄国的红色匪徒是和平最大的敌人，而我们正在与赤俄交战的最前线，协约国的众位盟友也愿意提供军事援助来帮助我们。"
 AOR_CHI_Northwest_joint_command:0"西北联合指挥部"
 AOR_CHI_debt_of_the_northwest_war:0"西北战事的债卷"
 CHI_Convention_on_China:0"对华公约"
 CHI_Convention_on_China_desc:0"虽然在伦敦会议上签订的《对华公约》各国原则上承诺尊重中国主权，但自1840年以来形成的不平等条约体系，使得中国仍然只能任由列强掠夺原材料和倾销商品。"
 CHI_feudal_economy:0"封建经济"
 CHI_feudal_economy_desc:0"皇帝这个最大的地主也许已经被推翻，但人口占比最高的农民，时至今日依然无时无刻不受到地主阶级的压迫，丰年无存粮，荒年卖儿女。"
 CHI_bureaucrat_capital:0"官僚资本"
 CHI_bureaucrat_capital_desc:0"自洋务运动以来，在官办和官督商办的基础上，资本几乎完全被官僚所掌控，为官僚及其家族的私利服务，这些庞大的官僚资本甚至可以将手伸进政府，干涉人事任命。"
 CHI_Territorial_separation:0"地方割据"
 CHI_Territorial_separation_desc:0"东南互保事件后，地方督抚专政对国家造成了巨大的影响。而今日的地方，督军割据一方，独揽权力，中央的命令常常难以得到落实，税款被地方截留，兵役也无法推行。"
 CHI_soldiers_will_ready:0"兵为将有"
 CHI_soldiers_will_ready_desc:0"自曾国藩编练湘军以来，新军大都按私军的方式建立，兵士不效忠国家，而是忠于将领，各地督军们拥兵自重，对于命令阳奉阴违。"
 CHI_Old_army:0"旧式军队"
 CHI_Old_army_desc:0"我国的陆军是由各大小军阀依托个人威望与小恩小惠聚拢了为利谋的乌合之众组成的。这种军队缺乏现代战争所需要的基础素养，而空军和海军更是几乎从零开始。"
 CHI_Lack_of_education:0"教育匮乏"
 CHI_Lack_of_education_desc:0"我国教育依赖清朝留下的乡塾，而新式学堂方兴未艾，这导致技术工人缺乏，科研水平低下，关键科技依赖进口。"
 CHI_budding_national_consciousness:0"萌芽中的民族意识"
 CHI_budding_national_consciousness_desc:0"即使是世界大战后，我国民众的精神面貌仍然没有得到根本的转变。民众对什么是民族，什么是国家的理解非常粗浅，他们大多只是口头上关心主权和国家利益，事实上将自己目光狭隘地投在生计上。"
 CHI_insecure_society:0"无保障的社会"
 CHI_insecure_society_desc:0"相比于西方普遍在试行的社会保障制度，我国在这方面几乎没有太大的作为，这种状况有待改变，但是并不急切。"
 CHI_care_society:0"扶倾济弱的社会"
 CHI_care_society_desc:0"相比于西方普遍在试行的社会保障制度，我国在这方面几乎没有太大的作为，这种状况有待改变，但是并不急切。"
 CHI_quxionggeju:0"割据群雄"
 CHI_quxionggeju_desc:0"当今天下大乱，群雄蜂起，此乃天赐良机，吾等自当韬光养晦，待时机成熟，横扫中原，定秋叶海棠为一。"
 CHI_junfanjingji:0"军阀经济"
 CHI_junfanjingji_desc:0"正所谓好钢要用在刀刃上，我们治下丰富的资源不能落入反对者的手中，而应当成为我们支持者应得的奖赏。"
 CHI_nanmangongye:0"南满工业"
 CHI_nanmangongye_desc:0"自甲午赔款以来，日本就在东三省的南满地区肆意开采着数量庞大且优质的的矿藏资源，并大量投资设厂。经过们近三十年的经营，现在的南满已经成为了全国真正的工业中心，大量的矿产资源及工业制成品源源不断地从日本公司手中流向世界各地。我们在获得日本的支持后，亦能够从中分到一杯羹。"
 CHI_changjianggongyedai:0"长江工业带"
 CHI_changjianggongyedai_desc:0"自三峡向东流去的长江及其支流所覆盖的地带，是中国经济最为发达的地区，也是中国对外交流最多，接收工业部门最多的地区。江浙沪与武汉三镇地区作为中国经济腹地的掌上明珠，大量的外国企业此地投资设厂，大战时期租借的工业设施也搬迁至此。而如今，我们将会更好地利用这些工业设施，横扫中原，定秋叶海棠为一。"
 CHI_Budding_national_capitalism:0"金融龙头-海关大户"
 CHI_Budding_national_capitalism_desc:0"虽说外国列强的银行及资本依托上海一地，在中华大地肆意横行。但是穿越崇山峻岭来到华南，在大小城市与乡村之间，属于中国人的华南金融业却强大不已。各路开设的地方银行组成了华南经济流通的重要因素，各地区的资金流转，也需要依靠他们才得以维持。不过，过于强盛的地方金融业，也使得中央政府向基层下渗的能力更加薄弱了。\n\n自前清以来，广州便是被称为“天子南库”的中国对外的第一大港。即使在鸦片战争之后中国通商口岸大规模开放，广州被上海和天津等地所取代，但广州依旧是华南的第一大城市和第一大港口。华南地区数量庞大的海关被粤海关所统领，在接收外国倾销商品的同时，也为中央政府和地方赚取了巨额利润。不过，总有那么一些动心思的家伙，会利用这种优势行走私之事。"
 CHI_shandianjingji:0"山巅经济"
 CHI_shandianjingji_desc:0"啊哈，世界最高地！虽然可恶的汉人以及英国人暂且摧毁了我们古老而尊贵的传统。但是佛保佑下的权利仍然传承至今。藏地的主人依旧拥有着大量的人口、土地以及牦牛，藏人依旧生活在天青水绿的高山之上。不用去管山下人所谓的“落后”，人不可有傲气，但不可无傲骨！"
 CHI_hanrenzhujun:0"汉人驻军"
 CHI_hanrenzhujun_desc:0"尹昌衡，一个汉人将军，却史无前例的统治了噶厦。自袁世凯总统发兵西藏后，神圣的活佛制度被雪藏，地方武装被大量解散-祖先赐予我们的制度，实质上已经被被摧毁……尽管尹昌衡和他的军队为藏人带来了新的生产技术以及机器，但他既不能改变我们现存的经济状况，也不能稳定我们的同胞。"
 CHI_yunguixiongshi:0"云贵雄师"
 CHI_yunguixiongshi_desc:0"自清末以来，云贵两省就在响应中央政府的号召训练新式军队，其中以云南最为彻底。共和以后，在蔡锷将军的领导下，云南滇军的主力逐渐被训练成了一支纪律严明、装备优良的强大部队。但与强大的外表相矛盾的是-滇军内部因为政见不和，而逐渐形成了两大派系；一派支持蔡锷以及大战胜利后朱德为代表的少壮派，一派则是支持以唐继尧为首的，清末遗留下来的云贵军官团的“老派”。两派在军队内部的逐渐斗争。将会深刻影响云贵政局……"
 CHI_yunguixiongshi_1:0"云贵雄师"
 CHI_yunguixiongshi_1_desc:0"自清末以来，云贵两省就在响应中央政府的号召训练新式军队，其中以云南最为彻底。共和以后，在蔡锷将军的领导下，云南滇军的主力逐渐被训练成了一支纪律严明、装备优良的强大部队。"
 CHI_gemingtongyizhixi:0"§R革命统一之心§!"
 CHI_gemingtongyizhixi_desc:0"革命统一之心"
 CHI_zuguoguangfuzhixi:0"§R祖国光复之心§!"
 CHI_zuguoguangfuzhixi_desc:0"祖国光复之心"
 CHI_binhuangmaluan:0"兵荒马乱之地"
 CHI_binhuangmaluan_desc:0"中华的西北大地，自古以来就是各方势力相互交织，错综复杂的地区。自晚清的陕甘回乱以及阿古柏入侵以来，中央政府对西北的管控力持续减弱，能够有效控制的仅限于兰州、迪化和天山南部一带；而在其他地区-回人贵族、宗教领袖、地方军阀以及其他形形色色的组织，为了自己所能取得的地盘与理想而不断厮杀。对此乱象，无论是西北政府还是北京政府都束手无策。"
