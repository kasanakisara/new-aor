 #ideas#
 The_Wild_West:0"狂野终章"
 The_Wild_West_desc:0"那涌动暗流的不安与怒火终于化为滔天洪水，摧毁了整个西部的旧秩序。而从这废墟中诞生的一个个团体，都将撕下自己曾经展现的一面。亦或是善良、正义、金钱与邪恶-一切的旗帜都可以参与这前无古人后无来者的生存竞技场，供世人观赏。§R而残忍的战斗，才刚刚开始……§!"
 PAN_XING_Desert_Eagle:0"沙漠雄鹰"
 PAN_XING_Desert_Eagle_desc:0"自19世纪90年代以来，西部特遣军已经在这片土地上战斗、生活了20年。特遣队的领导者潘兴将军是这支部队的灵魂，他与他的军队早已成为美国维护西部地区稳定的中坚力量，并积累了极为丰富的战斗经验-甚至利用自己日益高涨的影响力逐渐渗透了西部政界以及经济部门。如今烽火四起，潘兴与他忠诚的守望者们又该何去何从？没有答案，唯有浴血奋战……"
 DAXIYANG_The_clarion_call_for_sand_freedom_and_independence:0"再度吹响号角"
 DAXIYANG_The_clarion_call_for_sand_freedom_and_independence_desc:0"1776，费城的一张文件划破天际，吹响了新时代的黎明。1865，费城的一份条约犹如乌云压城，笼罩在每个美国人的心里。那曾经带给东部人民梦想与激情的《宅地法》，如今早就成为了时代的垃圾，被政治野心家与工厂主们清扫干净。那繁荣象征着的农场与操作台上，却尽为污秽与鲜血，沾染着西部大地。如今，西部人民终于有了全面反抗的机会，这既是我们的救赎，也是250年前先人的回答，使美洲这片土地重现了一丝自由的曙光。\n\n§R为此，我们将战斗到最后一刻！§!"