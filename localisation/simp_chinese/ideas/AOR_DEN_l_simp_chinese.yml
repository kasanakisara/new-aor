####人物介绍############
Otto_Liebe_DESC:0 "**卡尔·尤利乌斯·奥托·利贝**\n——在破碎的平衡中编织秩序\n当丹麦的石勒苏益格平原上仍残留着战争的硝烟时,奥托·利贝的名字已悄然成为哥本哈根政坛不可忽视的符号.这位出身显赫法学家世子的保守派领袖,以其冷峻的理智与近乎苛刻的务实主义，在战后丹麦的废墟上勾勒出一幅矛盾的图景——既是旧秩序的捍卫者，又是新现实的妥协者。\n1918年的寒冬，丹麦以协约国新成员的身份踏入凡尔赛的谈判场，吞下石勒苏益格北部的战果。利贝的崛起恰逢这一转折：他被视为“冷静的仲裁者”，既能平息国内激进左翼对王室特权的质疑，又能以法律为刃，为丹麦在英法主导的战后秩序中争得一席之地。然而，胜利的代价早已显现——德意志难民如潮水般涌入新划定的边境，石勒苏益格的日耳曼社群以沉默的敌意凝视着哥本哈根。利贝的保守主义在此刻化为双刃剑：他坚信“传统即稳定”，主张以渐进改革巩固王权，却不得不在议会中与社民党人达成苦涩的联盟，以维系丹麦脆弱的多数政府。\n作为临时内阁的核心推手，利贝的野心藏匿于他一丝不苟的西装褶皱之下。他深知，丹麦的“中立”不过是巨人间舞蹈的托辞——英国舰队巡弋厄勒海峡的身影从未远离，而柏林街头复仇主义的低语已随北风渗入日德兰半岛。他的法典修订案在议会中屡遭搁置，反对者讥讽其为“裹着羊皮的容克”，而支持者则暗叹他“在钢丝上为丹麦争取呼吸的缝隙”。\n1920年的选举迫近，利贝的棋局愈发凶险。王室对他的依赖与猜忌并存，农民党与工团的矛盾在他精心维持的平衡下暗流涌动。有人预言，他将是“丹麦的斯托雷平”，以铁腕缝合撕裂的国土；亦有人警告，他的保守之船终将撞上革命的冰山。但利贝仍端坐于克里斯蒂安堡宫的阴影中，钢笔尖划过宪法修正案的草稿——那里写着妥协，写着镇压，写着一位法学家对秩序最后的偏执。\n毕竟，当北海的风暴袭来时，灯塔的守望者从不在乎自己是被称为英雄，还是暴君。\n"
Karl_Theodor_Zale_desc:0 "**卡尔·特奥多尔·扎赫勒**\n作为战后丹麦的掌舵者，扎赫勒是斯堪的纳维亚政治光谱中少见的矛盾体——一位温和的保守主义者，却被迫在破碎的欧洲棋盘上扮演革命者的角色。他的国家刚刚从大战的灰烬中站起，石勒苏益格的归属仍如一把悬剑，割裂着哥本哈根与柏林的脆弱和平。尽管丹麦以“中立”之名避开了战壕的血腥，但北海对岸的英法协约国早已将目光投向这片战略要地，而北方新生的德意志邦联则用饥渴的眼神觊觎着每一寸失落的领土。\n扎赫勒的政权建立在一片微妙的平衡木上：他必须安抚国内躁动的社民党人，他们高呼“全面民主化”；又不得不向保皇派妥协，以维持王室摇摇欲坠的体面。更棘手的是，那些从莱茵兰归来的丹麦裔士兵带回了德式冲锋枪与红色传单，将柏林街头的革命口号散播到日德兰半岛的麦田间。首相的公文包里塞满了英法的密函——或诱惑，或威胁，要求丹麦成为遏制德意志复苏的锁链一环。\n然而，扎赫勒始终记得1918年的那个冬夜：当丹麦国旗在石勒苏益格重新升起时，欢呼的人群中既有工人也有贵族。他坚信，唯有斡旋与克制能让丹麦免于沦为列强的棋子。可历史从不奖赏中庸者——若他无法在选举前平息党内分裂，或是抵挡住“收复全石勒苏益格”的民粹浪潮，哥本哈根的议会大厅终将化作另一座凡尔赛，而斯堪的纳维亚的平静，不过是暴风雨前最后的幻影。\n"
POLITICS_Christian_X_DESC:0"在1912年年，克里斯蒂安听闻自己在汉堡的父亲去世后，便继承了王位，即克里斯蒂安X。在大战中，克里斯蒂安X很好地保持了丹麦的中立避免大战的侵蚀。同时，他也在战争中呼吁挪威和瑞典保持中立。大战期间，在他的领导之下，丹麦逐渐颁布了例如允许妇女参政的新宪法，促进丹麦的发展。在大战的最后一年，他正式宣布了冰岛的自治，使丹麦与冰岛成为了一个共主邦联，在冰岛他被称为克里斯坦X(Kristján X)。而现如今，德国的战败分裂使得克里斯蒂安X似乎可以安枕无忧，不过石勒苏益格回归的麻烦又至国王眼中"
Emil_Piper_desc:0 "**埃米尔·派珀——冰封王座上的守夜人**\n作为丹麦保守主义最后的堡垒，埃米尔·派珀的血管里流淌着日德兰半岛的寒霜与哥本哈根议会厅的羊皮纸气息。这位老派贵族出身的法律学家，曾在战前的和平年代以铁腕捍卫王国的传统秩序，将社会主义的星火掐灭在议会辩论的冷雾中。当1914年欧洲燃起战火时，他像中世纪的维京领主般紧握权杖，以“绝对中立”的盾牌将丹麦隔绝于风暴之外——直到1918年协约国的胜利钟声敲碎了这份脆弱的安宁。\n战争末期投机般的参战虽为丹麦换来了石勒苏益格北部的战利品，却也撕开了王国平静的假面。归乡的士兵带回的不止勋章，还有莱茵河畔的赤色低语；北海对岸的英法巨兽以“国际联盟”之名将哥本哈根拖入新世界的棋局。面对沸腾的街头与分裂的议会，派珀披上保守人民党的黑袍，如同手持《大宪章》的守墓人，誓言用宪法的锁链捆住躁动的时代。\n他厌恶魏玛的混乱，警惕伦敦的算计，更将斯德哥尔摩的社民党人视作裹着北欧毛衣的特洛伊木马。在他眼中，丹麦应是冻结在琥珀中的维京长船——国王的权柄至高无上，教会的钟声涤荡异端，就连北海的浪涛也当遵循《日德兰法典》的韵律。然而现实的裂痕正在蔓延：南方的石勒苏益格德意志人高呼自治，哥本哈根的码头工人用罢工改写《九月法案》，甚至保守派内部也分裂出向英法低头的“实用主义者”。\n派珀站在克里斯蒂安堡宫的露台上，望着议会广场上翻涌的人群。他手中的烟斗明灭如北海的灯塔，照亮不了深海的暗流。这位“冰霜首相”清楚，自己捍卫的不仅是王座，更是一个注定消逝的旧世界——而当春天的融雪来临，哥本哈根的每一块砖石都将见证，守夜人的剑能否斩断新时代的黎明。\n"
DEN_Marie_Sophie_Nielsen_DESC:0 "**玛丽索菲·尼尔森**——丹麦社会主义工人党的“赤色火炬”\n在哥本哈根灰暗的街巷与轰鸣的工厂间，玛丽索菲·尼尔森的名字如同一簇不灭的野火。出身于日德兰半岛的贫苦家庭，她的早年生涯被织布机的噪音与罢工的呐喊填满。1917年俄国革命的惊雷震颤欧洲时，她率先将《共产党宣言》的丹麦译本塞进工人兄弟颤抖的手中，高呼“面包与公社”的誓言。\n作为社会主义工人党的青年派领袖，玛丽索菲的锋芒令党内温和派如坐针毡。她鄙夷妥协，将议会斗争斥为“资本家的木偶戏”，坚信唯有总罢工与街头壁垒能撕碎旧秩序的铁链。1918年丹麦屈从协约国对德宣战的耻辱，进一步点燃她的怒火——她公开抨击政府“用工人的血为银行家的金库镀金”，并组织反战集会，险些被宪兵的刺刀划破喉咙。\n1919年的丹麦深陷战后凋敝的泥潭，失业与通胀啃噬着工人阶级的脊梁。玛丽索菲的演讲台从工会礼堂挪至码头集装箱，她的嗓音因连日的疾呼而沙哑，却愈发铿锵：“国王的冠冕下藏着绞索，议会的圆顶下堆满骸骨！我们的答案不在选票，在街垒！”激进派工人将她视作“北方的卢森堡”，而保守报纸则诅咒她为“哥本哈根的女妖”。\n然而，党内元老们正为她的“鲁莽”忧心忡忡。当玛丽索菲力主将党名改为“共产党”并加入共产国际时，分裂的阴云已盘旋在社会主义工人党总部上空。有人警告她：“丹麦不是俄罗斯，红旗染不上波罗的海的冰。”她却冷笑回应：“若冰层下埋着火药，只需一粒火星。”\n此刻的玛丽索菲·尼尔森站在历史的十字路口。她手中的传单或许会化作燎原的纲领，亦可能成为镇压令上的罪证。但无论如何，这个拒绝低头的女人已注定成为丹麦阶级斗争史上最灼目的烙印——无论那是曙光，还是焚尽一切的野火。
