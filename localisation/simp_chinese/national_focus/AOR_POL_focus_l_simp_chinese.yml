 we_should_protect_her_desc:0 "终于，波兰这个从地图上消亡已久的国家再次出现，但这她依然脆弱稚嫩，需要全体波兰人去保护。"
 focus_on_build_industy_desc:0 "波兰有着美丽的田园风光，但我们的人民用不上工业品,我们的军队拿不到飞机大炮，我们必须立刻开始工业建设。"
 Mainly_military_industry_system_desc:0 "我们的资源有限，在这个尚不安宁的时代中，我们的工业体系应当以军事为主来保护我们难得的独立。"
 Mainly_civilian_system_desc:0 "波兰人民已经在几世纪的煎熬中受够了苦，他们的祖国应当善待他们，组建民用体系工业来减少他们的苦难吧。"
 Opening_up_military_production_lines_desc:0 "我们的资源有限，在这个尚不安宁的时代中，我们的工业体系应当以军事为主来保护我们难得的独立。"
 Open_up_the_introduction_of_civilian_foreign_investment_desc:0 "要建立完备的体系，光靠我们是不够的，为了解决文一问题，我们将打开我们的市场让外资涌入来平衡发展随有机核心"活加2建筑位添加2个民田工厂。"
 National_industry_relies_on_desc:0 "波兰在政治上的独立是脆弱的，除了军事的保护还应该有经济的保护，唯有发展我们自己的民族工业才能让波兰的命运牢牢掌握在波兰人的手里。"
 Fully_invested_in_international_division_of_labor_desc:0 "二十世纪是国家化大分工的世纪，过去的自给自足生活已经落伍，我们应该取长补短，拥抱这一潮流。"
 all_roads_lead_to_poland_desc:0 "现在，波兰的工业雄图已逐渐显现，工业产品源源产出但这些产品需要足够通畅的交通来惠及每个波兰人，故而，华沙建筑局与政府规划部联合提请了基础设施建造工程来作为工业第一阶段的结束。"
 Forcing_farmers_to_enter_the_factory_desc:0 "工业化的机器马力开足，他的产量出乎意料，对原料的需求也令人吃惊，我们不得不用行政的措施将农民赶入城市来保证进步的引整永不停歇。"
 landlords_hand_desc:0 "工业的引擎孜孜不倦地运转着，他的肚子也愈发饥饿，我们虽然必须填饱他但不能像赶羊放牧那样驱使波兰人进入工厂，而地主这一群体恰好可以替我们做。"
 polanes_new_life_desc:0 "终于，工业化问题告一段落，我们的人民终于可以享受到工业化所带来的新风了!"