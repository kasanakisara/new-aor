 SWE_Regency_Conference_focus_tt:0 "执行该国策将召开§Y王政会议§!，讨论联邦新君的人选问题。会议结束时该国策将自动结束。\n§Y请务必在会议期间认真控制会议的走向，这将决定联邦未来的政治走向。§!\n§g而如果会议失控，联邦连同她的子民，也将走上一条命运多舛之路……§!"
