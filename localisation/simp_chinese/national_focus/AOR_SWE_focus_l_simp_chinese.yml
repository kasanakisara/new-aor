l_simp_chinese:
 #「愛してみようぜ」
 #AOR_SWE_focus_tree_1.txt
 SWE_Eighty_Seventh_Order:0 "新思想，新浪潮"
 SWE_Eighty_Seventh_Order_desc:0 "在这片冰封的土地上，一种充满活力的新思想正在萌动，那就是联邦主义。联邦主义的思想内核可以归结为三个信条：联邦是神圣的，民族是平等的，经济是第一位的。在这一基础上，哈康陛下联合联邦社民党组建的政府大力推动联邦的现代化经济建设，建设人民理想的民族平等、经济发达的新联邦。在这一思想的指导下，联邦必将乘着新浪潮，书写新的伟大历史篇章！"
 SWE_Karlstard_Plan:0 "卡尔斯塔德计划"
 SWE_Karlstard_Plan_desc:0 "早在《哥德堡宪法》通过之初，就有一些有识之士提出了“卡尔斯塔德计划”，即通过动用国家的政府力量来快速推进挪威的工业化。此前这一计划因为低效的政府并未实施，但当现在自基层到中央都已全力以赴改革之时，这一计划的实施也势在必行。"
 SWE_Encourage_Capital:0 "鼓励资本市场"
 SWE_Encourage_Capital_desc:0 "生于斯，长于斯，刺激一个资本主义国家经济最好的办法就是刺激资本。只要资本发起进攻，一切都会好起来的！"
 SWE_Found_of_British:0 "与雄狮会面"
 SWE_Found_of_British_desc:0 "大不列颠及北爱尔兰联合王国，与我们隔北海相望。他们已被证明是合适的贸易伙伴，如果和他们签订贸易协定，或许会有利于我国的经济发展。"
 SWE_Found_of_France:0 "高卢鸡的协议"
 SWE_Found_of_France_desc:0 "法兰西第三共和国在欧陆上拥有强劲的工业实力，如今他们正因世界大战的遗产而衰退，或许可以通过和他们签订贸易协定，达成双赢的合作。"
 SWE_Further_Reform:0 "全面深化改革"
 SWE_Further_Reform_desc:0 "请重置"
 SWE_IndustryArea_Oslo:0 "奥斯陆工业区"
 SWE_IndustryArea_Oslo_desc:0 "奥斯陆，意为“神的草坪”，拥有悠久的历史。这座挪威的首都，是联邦内数一数二的大城市，也是挪威最早开始工业化和城市化的地区，人口多，市场需求大。快速推进其工业化，将会对我们的计划大有裨益。"
 SWE_IndustryArea_Bergen:0 "卑尔根工业区"
 SWE_IndustryArea_Bergen_desc:0 "卑尔根，面朝大西洋，挪威的明珠。当华灯初上之时，这里也必将成为联邦的下一个繁荣之地。舞蹈吧，卑尔根！"
 SWE_Develop_North:0 "解封北境"
 SWE_Develop_North_desc:0 "我国的北部地区虽然常年寒冷，但是其土地之下有许多矿藏。通过大规模的发掘，我国将在国际市场上占有一席之地。"
 SWE_Oslo_Exhibition:0 "奥斯陆博览会"
 SWE_Oslo_Exhibition_desc:0 "如今时候以至，挪威的经济发展成果有目共睹。为了扩大投资，挪威政府将在奥斯陆召开一场博览会，向全世界人民宣传我们的胜利成果。"
 SWE_Oslo_news_tt:0 "触发事件“§Y奥斯陆博览会召开§!”"
 SWE_Antisocialistisk_Speciallag:0 "反社会党人非常法"
 SWE_Antisocialistisk_Speciallag_desc:0 "1878年10月19日，德意志帝国议会通过《反对社会民主党进行普遍危害活动法》（《反社会党人非常法》），对德国境内的社会主义运动发展进行了相当严厉的打击。我国或许可以仿照这一法律，立法禁止左翼党派的活动。"
 SWE_Proganda_to_People:0 "宣传，宣传，宣传！"
 SWE_Proganda_to_People_desc:0 "如今繁华盛世已在眼前，但仍有人们不知道我们这一伟大的历史任务。来吧，让宣传机器加足马力，向人们宣告这一切！"
 SWE_All_People_are_King:0 "人人皆国王"
 SWE_All_People_are_King_desc:0 "人人皆国王，在这个历史变革的时代里，只要我们努力奋斗，向着自己的梦想前进，都将会实现自己的目标！"
 SWE_Liberte_Spirit:0 "自由主义精神"
 SWE_Liberte_Spirit_desc:0 "自由主义可以说是当今世界上影响范围最为广泛的一种思潮，虽然起源自启蒙时代，但其主要内涵个人努力奋斗如今依然闪闪发光。让我们以此为鉴，不断前进！"
 SWE_Beyond_Nationalism:0 "超越民族主义"
 SWE_Beyond_Nationalism_desc:0 "民族主义，一个梦魇，一直萦绕在我国的天空上。它使得联邦的子民分裂，陷入内斗。但如今这些事情必须被制止！超越民族主义，我们将走向共荣！"
 SWE_Our_Responsibility:0 "吾辈之责"
 SWE_Our_Responsibility_desc:0 "复兴联邦，推进多元是我们这一代人的责任。前进吧，为了祖国而奋斗！\nLänge leve Federationen!\nLenge leve forbundet!"
 SWE_Abolish_Left_Party:0 "取缔左翼党派"
 SWE_Abolish_Left_Party_desc:0 "“即日起，取缔一切形式的涉及社会主义运动的党派，任何类似的党派，一经创建，立即取缔，其领导人将被判处无期监禁。”《反社会党人非常法》白纸黑字所写下的命令，联邦政府将不遗余力地执行，直到左翼的毒瘤彻底从联邦消失。"
 SWE_Publications_Supervision:0 "斩断喉舌"
 SWE_Publications_Supervision_desc:0 "我国政局不稳的核心问题就是众多思想鱼龙混杂，许多宣扬反政府思想的著作得以大行其道，这一切都是因为我国对出版物的宽容。但这些东西应当被禁止！更为严厉的出版物管理法势在必行。"
 SWE_Rope_Right:0 "拉拢右翼"
 SWE_Rope_Right_desc:0 "对抗左翼的计划十分宏大，如果仅仅依靠哈康陛下自己的影响力依然会有些许无力，更何况依然有大量左翼分子活跃在议会之中。如果我们拉拢议会之中的右翼派别，并且联合发动不信任动议，左翼分子的实力将会显著减少。"
 SWE_Restrictions_on_Gatherings:0 "全面禁止集会"
 SWE_Restrictions_on_Gatherings_desc:0 "在曾经，奥斯陆和斯德哥尔摩的大街上全都是抗议者，他们对联邦的种种政策宣泄着无理的不满，直接导致了社会的混乱。难道我们还能让他们继续这样下去吗！"
 SWE_Imprisoned_Left_Leaders:0 "囚禁左翼领导人"
 SWE_Imprisoned_Left_Leaders_desc:0 "俗话说，枪打出头鸟，擒贼先擒王。这些无法无天的左翼分子，如果将他们的领导人一一囚禁，那么他们将会群龙无首，大难临头各自飞，由此分化他们的力量。"
 SWE_The_Trial:0 "奥斯陆大审判"
 SWE_The_Trial_desc:0 "如今我们已经抓住了这些左翼分子的把柄，并且抓获了许多背叛联邦的叛徒。作为对他们游行示威，危害政府的「回报」，奥斯陆的大街上将会举行一场「盛大的审判」，宣告这些人，和他们不切实际的努力的死亡，以警示后人！"
 SWE_Restructuring_Parliament:0 "重组议会"
 SWE_Restructuring_Parliament_desc:0 "在一大堆左翼党派退出政治舞台之后，联邦议会顿时清静了许多，但是也有许多空缺。重新组建议会将是一个新开始，宣告一个新时代的到来。"
 SWE_Restruct_Parliament_tt:0 "§Y反社会党人非常法§!将从永久性民族精神变为时效性民族精神，持续180天。"
 SWE_The_Dream:0 "联邦大梦"
 SWE_The_Dream_desc:0 "哈康陛下有一个梦，一个联邦复兴的大梦。如今各项改革都在稳定推进，联邦人民生活幸福，工作顺利，往日的游行和争吵都已经消失不见，多么让人欢欣！来吧！让世界和我们一同舞蹈，迎接这盛世！让梦不止于梦，而是成为我们的生活，成为现实！"
 SWE_Viva_la_Union_tt:0 "这将§Y整合§!此前的一些民族精神，并迎接一个§Q崭新的时代§!。\n§g由此，我们踏上漫漫征途·······§!\n\n五日后的§c联邦议会选举§!将决定我们未来的走向，让我们拭目以待……"

 SWE_Beautiful_New_World:0 "美丽新世界"
 SWE_Beautiful_New_World_desc:0 "对于我国快速的工业化进程来说，仅仅是国内市场是不足够的，我们必须为了发展前景寻找外贸伙伴，哪怕是一些*不太合群*的合作者。"
 SWE_Trade_With_Soviet:0 "对苏贸易协定"
 SWE_Trade_With_Soviet_desc:0 "苏联，一个并不被主流意识形态认可的国家，其刚刚自旧沙俄的尸体上重生，极度缺乏工业品。尽管会有一些*名门贵族*反对，但是对苏贸易毫无疑问是有利可图的。毕竟意识形态从来不是阻止金钱流通的高墙。"
 SWE_Trade_with_CSA:0"接入美国市场"
 SWE_Trade_with_CSA_desc:0 "美国人陷入内战了————而这是个好消息！对于南方的联盟国来说，他们是无比地需要工业的支援，而瑞典就可以承担这一职责。大炮一响，黄金万两，这句俗谚从未过时，也永不过时。即使他们失败了，对于瑞典也不是损失，一点也不是。"
 AOR_SWE_USA_civilwar_I:0 "§R美国内战进行中§!"
 SWE_CSA_Trade_tt:0 "有关和联盟国的军火交易的谈判将开始。如果他们同意，有关进一步扩大合作的决议将解锁。"
 SWE_Trade_with_Deutschland:0 "德意志军火贩售"
 SWE_Trade_with_Deutschland_desc:0 "大战一后，德意志就陷入了军阀分裂的局面。每个势力都在积极发展军备，但是许多邦国都找不到合适的卖方。我国正好可以参与这场军火交易，并且从中获益————或许吧，但是至少不会有风险。"
 AOR_SWE_GER_not_civilwar_tt:0 "§Y德意志内战未爆发§!"
 SWE_Trade_with_Germany_tt:0 "我们将依次拜访德意志地区的几个主要势力，并进行贸易接洽。如果他们同意，有关进一步扩大合作的决议将解锁。"
 SWE_National_Regulation:0 "完善金融监管"
 SWE_National_Regulation_desc:0 "金融，资本流通多么重要的中介过程，然而却频繁受到诸多不可控因素的影响。今日金融市场上还存在着许多不安全的投机行为，酿成了许多惨剧。监管毫无疑问十分重要，保证金融市场的稳定将是十分艰巨的任务。"
 SWE_Provide_Third_Choice:0 "第三种选择"
 SWE_Provide_Third_Choice_desc:0 "世界大战以来，许多国家都不得不在英国和法国之间选边站。或许我国没有他们那样强大的军队，但是我国的轻工业和资源开采产业也不容小觑。在庸庸碌碌的冷战之中，是时候为世界提供第三种选择了。"
 SWE_Welfare_New_Society:0 "福利新社会"
 SWE_Welfare_New_Society_desc:0 "“人民之家”这一计划来自执政的社会民主党，他们计划通过大量的福利政策来消灭人之间的不平等。无论你的种族，你的阶级，你的各种各样的“特点”，在联邦面前人人平等，人们都享有同等的权利，也同样负有同样的义务。这一计划会带来许多财政负担，也会带来难以避免的高税收，但是毫无疑问的，这是维护联邦和平和统一的一个良策。"
 SWE_Immigrant_Protection:0 "移民保护"
 SWE_Immigrant_Protection_desc:0 "我国工业的蓬勃发展需求许多的劳动力，这仅仅依靠我国的本土人口是远远不够的，更何况还有许多国人向外移民。开放对外移民毫无疑问是补充劳动力的好办法。诚然这也会带来许多冲突和矛盾，比如文化矛盾等，但是它们并非最大的问题。"
 SWE_unlock_Immigrant_policy_tt:0 "将解锁§Y移民保护§!政策。"
 SWE_Maternity_Allowance:0 "就业补贴"
 SWE_Maternity_Allowance_desc:0 "作为鼓励工作政策的一部分，我国将推行一系列有关就业的补贴政策，鼓励更多人参与工作。无论是制造业，服务业，甚至是农业，你们都是平等的，都受到国家的保护。"
 SWE_unlock_Labor_policy_tt:0 "将解锁§Y工人保护§!政策。"
 SWE_People_University:0 "全面义务教育"
 SWE_People_University_desc:0 "在1847年，瑞典通过了一项有关教育的法令，整个瑞典的教育状况得到了显著的改善。教育事业终于从教会的控制中解放了出来，许多地区的孩子终于可以接受教育了。但是教育中的不平等现象仍然存在，依然有很多孩子不能接受教育。我们势必推行改革，以解决这一情况。"
 SWE_Education_crisis_solve_tt:0 "将解决§Y教育政策§!危机。"
 SWE_Labor_Protection:0 "劳动保护法"
 SWE_Labor_Protection_desc:0 "我国的雇佣企业中仍然有许多不平等现象，比如虐待工人，强令加班，薪酬极低等现象。这些现象严重约束了我国境内的工业和城市化发展。联邦必将直至这些行为，法律的铁锤终将落下。"
 SWE_Labor_crisis_solve_tt:0 "将解决§Y工人保护§!危机。"
 SWE_Everyone_has_Job:0 "人人有所业"
 SWE_Everyone_has_Job_desc:0 "1848年，卡尔·马克思在《共产党宣言》中号召全世界无产阶级联合起来，被认为是世界工人运动的开端。而马克思也给世界留下了一个很不好的印象和理论，那就是工人只有通过武装斗争才能打倒阶级压迫。如今联邦在社会民主主义的引导下，战胜了这一错误的理论，为联邦的工人们谋得了高福利的生活，相信在这一政策的领导下，联邦将越来越进步，工人的生活将越来越好！"
 SWE_Ex_Folkhemmet_change_tt:0 "§Y“人民之家”计划§!追加效果：\n每日消耗的政治点数：§R+0.10§!\n生活消费品工厂系数：§Y+10.00%§!\n稳定度：§G+10.00%§!\n每周稳定度：§G+4.00%§!\n每月消耗的政治点数：§R+75.00§!"

 SWE_Rebuild_New_World:0 "重建新政府"
 SWE_Rebuild_New_World_desc:0 "如同1804年人们推翻了反动腐朽的古斯塔夫独裁一样，刚刚经历了一场重大的政治革命，我国的政府系统需要一场变革，以掀起更大的浪潮。如今议会选举的结果既然已定，那就尽快开始我们前进的步伐，直到将一切反动、腐朽、反人民的东西都扫除现有的政治体制，然后我们才能休息。"
 SWE_Parliament_not_yet_choice_tt:0 "茫茫前路，尚未可知……"
 SWE_Parliament_choice_yet_tt:0 "社会民主党取得了最终的胜利，可以歇息一下了。"
 SWE_Return_Power:0 "将权力回归人民"
 SWE_Return_Power_desc:0 "无论独裁者们怎么说，人民自始至终都是国家的根本，是一个国家里最重要，也是最伟大的势力。任何的政策如果没有人民的支持都不可能实现，任何的政策也都应当来自人民。通过建立全面的普选制度，把治理国家的权力归还到人民的手中，将是我们为之奋斗的目标。"
 SWE_Merge_Parliament:0 "推动一院制"
 SWE_Merge_Parliament_desc:0 "1905年，联邦设立了联邦议会作为联邦最高立法机关，而瑞典议会和斯托庭则分别负责瑞典和挪威各自独立的立法。考虑到目前两个议会仍然都分为上下两院，不利于民主普选制度的进一步深化，推动上下两院合并为一院，在联邦的三个立法机关都使用一院制，将会更好地推进联邦的立法工作。"
 SWE_Amendment_Law_Inheritance:0 "修改继承法"
 SWE_Amendment_Law_Inheritance_desc:0 "1905年，随着《林雪平条约》的签订，联邦进入了“一国二君”的政治体制，即挪威和瑞典各自由一位国王统治，两位国王共同为联邦的君主。现在，联邦君主、挪威国王哈康七世提出了一份继承法草案，将联邦君主的继承的决定权移交给代表联邦人民的联邦议会。让我们进行表决吧！"
 SWE_Reduction_Civil_Servants:0 "裁减公务员"
 SWE_Reduction_Civil_Servants_desc:0 "公务员，顾名思义，是“公仆”，人民的仆人，应当全心全力代表国家为着她的主人——人民服务，尽心尽力建设更好的联邦。但是我们的公务员体系中存在着尸位素餐之人，他们占着俸禄而不尽心工作。一场自下而上的制度改革已经临近。"
 SWE_Hand_Could_Saw:0 "看得见的手"
 SWE_Hand_Could_Saw_desc:0 "亚当·斯密曾经说过，市场是一只“看不见的手”，调控着生产的每一个细节。在此基础上，有很多人都认为政府不应该对社会生活进行太多的干涉，甚至认为政府的一切干涉都是无用的。但在此，我们用雷厉风行的改革证明了，属于人民的政府的伟力将会作为一只可见的大手，为人民的生活保驾护航。"
 SWE_Union_Dream_III_tt:0 "§Q联邦之梦§!走入§YIII时§!"
 SWE_Hand_Could_Saw_effect_tt:0 "将§Y整合§!此前的一些民族精神为§Y可见之手§!（效果为：稳定度：§G+10.00%§!，战争支持度度：§G+10.00%§!，稳定度：§G+10.00%§!，政治点数：§G+10.00%§!，每日政治点数获得：§G+30.00%§!，每日政治点数消耗：§G-20.00%§!）"
 SWE_Beautiful_World:0 "自由和平等的乌托邦"
 SWE_Beautiful_World_desc:0 "1523年，瑞典从卡尔马联邦中解放，步入了独立自主的路线；1721年《政府文书》签署，瑞典步入“自由时代”，开始发展代议制；1804年新《政府文书》修订，结束了漫长的古斯塔夫独裁，瑞典又步入了民主的新时代。\n1814年，我们从丹麦压迫者手中联合挪威民族，组成了联邦；1905年《哥特堡宪法》通过，我们揭开了新篇章。而如今，在哈康陛下的领导下，联邦化政策硕果累累，民族之间的矛盾逐渐减小，人民安居乐业。沿着这条长路，我们将继续前行，直到实现，我们梦中的那个联邦！"
 SWE_Finally_Revolution_tt:0 "§g由此，我们将彻底完成联邦化进程！向宏伟蓝图跃进！§!"


 SWE_Nothing:0 "§R空虚§!"
 SWE_Nothing_desc:0 "联邦已经解体，旧日荣光已经不复存在·······\n\n\n§p那我们活着还有什么意义？§!"

