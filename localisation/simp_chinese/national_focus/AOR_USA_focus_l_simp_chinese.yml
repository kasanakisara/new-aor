l_simp_chinese:  

USA_Thomas_Woodrow_Wilson:0"和气的学者总统"

 USA_WhiteHouseReport:0"白宫评估报告"
 USA_WhiteHouseReport_desc:0"我们非常清楚1919年美国的现状:世界大战肆虐的4年,原本以为会从中获取巨大利益的我们，并没有等来属于美元的黄金时代。国内风云涌起的工人运动时刻冲击着企业家们不安的心,生产陷入停滞，经济衰退。西部的动乱愈演愈烈，南方的野心家们也在时刻妄图撕碎脆弱的平衡。是时候该做出改变了，我们的威尔逊总统!"
 USA_AWhiteHouseReport:0"美国的总统能做什么……"

 USA_challenge:0"直面挑战"
 USA_challenge_desc:0"自南北战争结束以来,美国从没有遭遇过如今天迫在眉睫的经济危机，也没有经历过如此紧张的社会氛围。而被推在风口浪尖上的威尔逊总统，心中已经慢慢扶起了他的一项改革计划……是时候该让我们的“白宫小子”们面对挑战了"

 USA_SanFrancisco:0"旧金山加急"
 USA_SanFrancisco_desc:0"果然,在这混乱的时期，可恶的“牛仔”又在从中作祟了。西部叛乱势力再度发起了对联邦政府的进攻,而且规模比我们想象的要大的多，匪徒袭击案件已呈几何式增长-这使得政府与人民再度陷入悲观。潘兴将军已经发来急电，而身处在东海岸的我们也要赶快为这帮西海岸的英雄们想出对策。"
 USA_ASanFrancisco:0"§t不是吧，又来!§!"

 USA_Eagle:0"美利坚的雄鹰"
 USA_Eagle_desc:0"自九十年代的“牛仔”动乱以来，西部的美利坚公民与士兵们已经对这些烧杀抢掠、无恶不作的叛乱者焦头烂额极了。有些人选择回到了东部的故乡，而有些人则逆行前进-潘兴将军和他的士兵们就是这么一群人。他们在西海岸一呆就是20多年,以身化作白宫的西部雄鹰时刻围剿来自沙漠中的反动分子。而如今混乱的局面下，我们更应该支持与鼓励潘兴将军与其部队在西部的作战热情,并希望他们能为我们带来更大的胜利。"

 USA_Watchman:0"西部的守望者"
 USA_Watchman_desc:0"虽然潘兴将军是一个实打实的爱国者，可是我们不得不对他的10万大军有所忌惮;毕竟，远在天边的军队，是政府中存在的最不稳定因素。倒不如把目光放在那些老西部人-如"西部联合力量"武装集团之类的佣兵组织;或者是初来乍到但扎根极快的劳动骑士团。他们的大部分成员都是土生土长的西部美国公民，早已对这片土地如漆似胶，情投意合。利用他们熟悉的地形与分散的战术去对抗同样分散的“牛仔”组织，并保障西部铁路线的运输安全，是这些西部守望者们力所能及的事;而白宫政府自然会对他们给予一定支持。"

 USA_Railway:0"武装铁路网计划"
 USA_Railway_desc:0"事实证明，西部人关于机动作战的想法不是吹的。这些佣兵公司们很快就提出了一项计划:由相对应的公司改装运输火车，使其车厢本身就具有作战性,而无需多添置不利于作战的车厢，或者专门制造装甲列车以保证运输。同时，随着西部石油工业的日益发展，佣兵们的私人载具也应该加速换装成先进的摩托车或者卡车。这会为佣兵公司的重型武器提供更好的发挥平台。"

 USA_West:0"西部无穷，狂野无限"
 USA_West_desc:0"尽管西部的事情告一段落，但我们仍不可否认:合众国的西部是一个充满了机遇和财富的地方-尽管却又以极端的混乱阻碍着寻梦人的前进。究竟是谁造成如今这种局面的，已是往事烟云，不过供后人评说。"

 USA_Detroit:0"底特律红色风暴"
 USA_Detroit_desc:0"自5月1日以来的五大湖地区一直经历着难以想象的工人罢工浪潮，而在最近，底特律的罢工工人们居然用暴力手段夺取了警察局的武器，在与军、警、骑士团发生激烈交火后占领了底特律市的大部分地区。在美国历史上，从来没有一次罢工能够占领一个城市，况且是一座巨型工业城市。为此，威尔逊总统不得不暂时搁置改革计划,转而全力应对此次前所未有的工人暴动。"
 USA_ADetroit:0"§t好啦，您确实能做什么了……§!"

 USA_Analysis:0"分析工人运动"
 USA_Analysis_desc:0"分析工人运动:很简单，美利坚从来没有如此有计划有预谋的工人暴动出现;那么相对应的，必然有一个工人的幕后组织去指使他们与联邦政府作对;但同时我们也不能忽视工人和那帮企业家的关系。我们要尽快分析这次工人暴动的成因,并将矛头指向我们可以查找的几个毒瘤残渣为止。"
 USA_AAnalysis:0"§R共党？，共党在……共党在哪里？§!"

 USA_MartialLaw:0"颁布戒严令"
 USA_MartialLaw_desc:0"这次的戒严令非同寻常，我们不但要打起十二分的精神去应对这次暴动，消灭红色势力，还要利用戒严令去控制整个北方混乱的局面-包括那些无法无天的企业家们。团结力量大,应对如今的暴动，威尔逊总统鼓励军、警、民兵、骑士团们携手共进，向五大湖与底特律全速进军。"
 USA_AMartialLaw:0"§R决定了，就由你来打头阵！§!"

 USA_Appease:0"安抚企业"
 USA_Appease_desc:0"企业是美利坚的根，如果白宫政府是船帆,那么这些企业们就是船身。底特律的工人们在暴动中毁灭了许多公司、工厂，为了维护美利坚的根基，同时以无息贷款的方式赔偿底特律众多企业的损失,国会只得拿出那点可怜的预算去尽量安抚他们了。但最重要的是稳定他们的情绪,避免市场上更加恐怖的连锁反应发生。"
 USA_AAppease:0"§R这是纳税人的钱，不是你的保险！§!"

 USA_EndTheCrisis:0"再一次结束危机"
 USA_EndTheCrisis_desc:0"暴风已经停息-亦或只是更大危机的一次前兆。但无论如何，现在的合众国终于迎来了一丝喘息之机。只可惜，我们付出的§R代价……§!\n但那又如何？只要能保证这台机器转动。"
 USA_AEndTheCrisis:0"拆毁街垒后的城市将畅通无阻，风暴平息，但底特律已经§R半身不遂§!……\n\n将恢复五大湖的§Y一部分工业生产§!"

 USA_IntelligenceStation:0"路易斯安那情报站"
 USA_IntelligenceStation_desc:0"美利坚什么都不缺，就缺团结。\n这次威尔逊所收到的通知是他忠诚的北方人为他提供的有利情报:信息显示，南方部分州县趁我们处于经济哀退期间开始鼓动极端思想,妄图将我们党派之间的矛盾转为南方民众对我们联邦政府之间的矛盾,并最终促使南方的独立;不过对于这种事情的处理，威尔逊早有准备。"
 USA_AIntelligenceStation:0"§t该死的迪独!§!"

 USA_Criticize:0"批评迪独"
 USA_Criticize_desc:0"所谓舆论战，不过就是双方拿着大把大把的钞票与黄金，通过20世纪的稀奇古怪的发明，向平头百姓的脑袋灌输自己的主张，使其失去了理性思维-如果不是外部势力的干预，我们很难知道，为什么迪独们会凭借着他那一点可怜的财政收入，就敢与北方的小加图们对抗。"
 USA_ACriticize:0"我来§t看看§!……"

 USA_NewYear:0"过个好年，美国人"
 USA_NewYear_desc:0"临近的圣诞节，或许能重新为美国人民带来一丝慰藉？但已经渐行渐远的危机，却使得1920年，美利坚的灰色前景更加扑朔迷离……唉，美利坚的兴衰与否,与1919年的圣诞节亳无关系，祝圣诞快乐，美国，让我们在这难得的时光中§Y睡个好觉！§!"
 USA_ANewYear:0"§Y赞美基督！§!"

 USA_PlanOfOperation:0"潘兴将军的作战计划"
 USA_PlanOfOperation_desc:0"西部特遣军似乎要再一次拯救西部了。我们的潘兴将军早就已经拟定好了一份绝妙的计划-动用新式武器-坦克来进攻“牛仔”们。相信在潘兴将军的指挥下，这些西部的悍匪必将灰飞烟灭!"



USA_2:0"美利坚威尔逊1920年国策"

USA_White_House:0"白宫跨年演讲"
USA_White_House_desc:0"经过了惊心动魄的1919年，美利坚迎来了1920年新的挑战。但美国公民们似乎因没有希望的未来生活，而继续冷漠地苟活。威尔逊总统明白要改变些什么，他预备在春季发表一场白宫演讲，以此来唤醒这些沉睡的美国人对未来的期待。愿总统已经做好一切准备，不要在这个动荡的社会中再次上演1863年圣诞的悲剧了……"

USA_Beautiful_Country:0"《美丽国家计划》"
USA_Beautiful_Country_desc:0"威尔逊在白宫演讲提出的《美丽国家计划》并没有预想中那样，犹如一颗重磅炸弹在死水间泛起一阵波澜-民众表示了不可置信，国内外的媒体则表达了他们对总统执行国家计划而导致美国失控的担忧；而国内的企业组织们对此暂时没有态度表达。威尔逊的骰子已经投下，没有后路可走。"

USA_Pick_up:0 "拾起社会的碎片"
USA_Pick_up_desc:0"我们当然承认，美利坚的社会就是一地渣子的社会，你可以在这里找到各种各样的布道士：他们宣传种族仇恨、宣传内部分裂，带着各种奇怪服饰，甚至是一堆拿着热武器的骑士同志们，都能代替警察去维护秩序。\n而在另一面，多少无家可归的工人冻死他乡，多少家庭因为各种变故而支离破碎；种种问题，美国政府都没有做到应尽的责任。趁着国会还没有把钱乱花的份上，威尔逊总统得赶紧制定一些行动措施啊。"

USA_Compensate_them:0"对他们作出补偿"
USA_Compensate_them_desc:0"美国的工人是这个国家中最辛苦的人-除了南方的黑人工人以外。他们无时无刻都在受着暴发户们的气去干某些人难以想象的困难工作。从南北战争结束以来，美国政府从来没有关心过他们，对于各种所谓的保障措施也熟视无睹。\n如今一次又一次的工人动乱，却让我们警醒起来。如果我们的政府再不有所作为，那么这些家伙必将煽动起更大的风暴去摧毁美国的一切！不过就是钱解决的事儿，批吧……"

USA_Cleaning_again:0"再一次清扫"
USA_Cleaning_again_desc:0"不过，对着他们怜悯又有什么用呢？千千万万个反抗政府的人，不过终究是被几个别有用心的利己主义者给利用起来-既然是如此，那么将他们抓出来，枭首示众，难道不是对社会稳定的最好帮助吗？威尔逊总统当然想要救助社会，但现在他却无力执行天使的任务，值得拿起手中的枪械，为冥界带来盛宴了。§R反贼们，你们等着，美利坚保证你们每个人脑袋都能开花！§!"

USA_Eradicating_the_Cancer:0"根治毒瘤"
USA_Eradicating_the_Cancer_desc:0"这些人无一例外，我们都可以一一细数他们的罪行。犯下了无知之罪的极端组织，妄想之罪的激进民主“党派”，还有那些一天到晚只是盲目着煽动破坏的左翼团体。\n让我们来看看它们吧，看看他们的所作所为，都是些什么天理难容的人！事实已经证明，§R他们就是美利坚暗藏在深处着毒伤疤和脓疮，他们都应该外科手术式的打击，并且立刻从我们的土地上被清除出去。§!"

USA_Take_care:0"护理伤疤"
USA_Take_care_desc:0"虽然美利坚的国家体量在日复一日的膨胀，但他那骇人的伤疤也随之而愈发溃烂。南北冲突、世界大战、亦或是之前的五大湖红色浩劫，一遍又一遍的冲击这个已经不堪重负的国家，让他脓血直流。威尔逊若想成功取回白宫的政府公信力，就必须得付出行动，先把眼前的这堆烂摊子处理才好。"

USA_Negotiate:0"与协约交涉"
USA_Negotiate_desc:0"自大战结束以来，世界各主要国家就靠着以英法为首脑的“协约国”这一组织团结在一起，共同防卫着所谓“邪恶势力”的反扑。但是随着战后复苏，本应该大快朵颐的美国经济却陷入到了更深的泥潭中：渗透进银行骨头中的金本位无时无刻在限制着美国政府的经济实力以及社会资金流动的能力。我们应与对岸的超级大国展开交涉，试图劝说他们废除金本位，促进世界贸易的真正恢复。"

USA_imprisoned:0"退出禁锢之家庭"
USA_imprisoned_desc:0"可惜，不列颠和法兰西的意见不合，最终导致了计划的全面破产。法兰西在自身难保的状态下也要想方设法将我们制衡在美洲大陆上，英国这个老大帝国自不多说，以自己数量多到无法计算的黄金维持着它的金融霸权-但也必定不会长久。为了摆脱即将到来的困境，同时也是为了摆脱美国现存的问题，我们必须要退出与他们一切相关的国际间组织，包括协约国，以此来更好达到我们的目的。"

USA_money:0 "开动印钞机"
USA_money_desc:0"印钞机，已经好久没动，现在是时候给那帮英法银行家们一点美元震撼了！虽然通过美元的大量印刷会降低美元的价值，且在某种程度上破坏了金本位的固定比值-但正是因为这样，我们才能获得源源不断的资金，用来充实我们的国库和社会货币流通；同时，我们也要限制一定的黄金窗口-这需要企业家们的支持。总统相信美国无穷的体量会将这些货币通通吸收，但他也恐惧于南方以及国外势力的极端反应……"

USA_container_gold:0"关上黄金的容器"
USA_container_gold_desc:0"市场的黄金大幅度兑换，或许会引起了国际投资者与我国银行储户的不安，市场将在这一段时间更加动荡。直接用纸钞信用去挑战黄金，在如今来说还是为时尚早的事。既然我们要保证黄金储备，为什么不用国内那些流通的英镑、法郎去购买黄金呢？但就连蠢蛋也看得出来，英法的各大银行不会允许美国以如此大批量的手段去置换黄金，那么，我们只让我们亲爱的企业兄弟去帮我们完成这项任务了……"

USA_Loans_are_issued:0"预备贷款"
USA_Loans_are_issued_desc:0"真是可怜，我们亲爱的1919联邦政府年收入居然只有27亿美元，这笔数目与我国生产总值的比值远远小于其他国家，因此政府也无力利用银行机制大规模发放国家贷款。我们只能求助于美国银行-也就是J.P摩根专门为美国政府参与经济活动所设立的所谓“国家银行”。不过，其他的几个财团的下属银行也对我们的计划发出了邀请，可以代替前者向社会发放贷款以救助企业，我们将会立即与其开展交涉。"

USA_Morgan_idea:0"摩根的计划"
USA_Morgan_idea_desc:0"一手遮天的银行大亨、视钱如命的投机者、无所畏惧的冒险家、美国版的波留希金，还有那家族中令人瞩目的大鼻子。无论给其什么样的外号，都无法否认约翰.皮尔庞特.摩根以及它背后的摩根财团所拥有的强大实力。作为美国东部的最大财团，摩根家族的掌门人早由杰克.摩根接任。他给予政府的放贷计划仍然富有古典自由主义精神-通过对国家贷款的完全放开，使得社会面能够充分的吸收流动资金，并利用市场机制促进经济活力。"

USA_Mellon_idea:0"梅隆的方案"
USA_Mellon_idea_desc:0"被称为世界钢铁之心的梅隆家族，掌控着美国多数的优质钢铁和稀有金属加工、精密机器的生产环节，虽然家族实力不如洛克菲勒与摩根，但势力早已取代卡内基，成为了美国钢铁的领头羊。凭着现任掌门人安德鲁.梅隆对工业部门的长期考察以及银行业的多年耕耘，他向我们提出另外一种计划-政府以自由主义的形式发放贷款，但更加应该专门侧重于企业以及企业的贷款申报名录，有选择性的去支持一些优良企业淘汰劣势企业，以达到美国经济良性循环的目的。"

USA_Raise_tariffs:0"提高关税"
USA_Raise_tariffs_desc:0"这将是整个经济计划中最为险要的一部分。毫无疑问，提高已经不能再高的美国关税（现28%）将会对本就脆弱的世界经济造成巨大打击，甚至可能会招致其他大国的反制措施，并最终导致美国的产品优势受到削弱。但提高关税最终就是一种对冲机制-北方依靠自给自足的工业体系已经能够与英法同时竞争，越是虚弱的时候则越需要保护。\n提高关税后，全美国整体的英法货币流通量与商品流通量将会减少，这势必会影响到南方这个依赖外部经济的地区，甚至让其再不能起，并最后心甘情愿地被北方所接纳……吗？"

USA_Look_out:0"眺望混沌"
USA_Look_out_desc:0"美国拥有不是全民狂欢的最大宴会，只不过是一张圆桌子上十几个人的小晚会。这就是所谓美国曼哈顿中岛两年一度的“美国企业家联合峰会”，地点设在洛克菲勒名下的一栋大楼里。从1902年开张以来，这栋大楼里蕴藏着无穷无尽的宝藏和拥有他们的企业家，这几乎成为了美国企业的象征之地。如今是1920年的峰会举办周，威尔逊总统派出了副国务卿前去参加会议-此举的目的是为了打听他们的虚实，也顺便了解了解美国经济最真实的面目……"

USA_Promise_space:0"许诺“他们”的空间"
USA_Promise_space_desc:0"没想到这些家伙们居然如此放荡不羁，敢在会上就直接对白宫提出一些要求和建议，要知道副国务卿先生可是以私人身份参加的。\n不过，既然将材料都汇了回来，威尔逊总统自然想好好了解这些老财主们都想在盘算着什么阴谋诡计。不过老洛克菲勒出席会议的消息着实让人震惊，老先生早在十几年前就已经隐退了，今日却重出江湖，若不是重大事变，亦或是暗示威尔逊，谁能够让他拥有现身的动力呢？"

USA_Rockefeller:0"洛克菲勒的理想"
USA_Rockefeller_desc:0"想必不用再多介绍：世界石油“皇帝”，世界最大炼油厂与特斯拉工作室的拥有者，最大钢铁厂及最大化工厂拥有者之一的约翰.洛克菲勒先生，就这么在自己隐居的庄园里会见了私人到访的威尔逊总统。\n洛克菲勒在隐退前那天马行空般的工业想象，当然只是为了他的盈利最大化而吹出的牛皮，但现在他旗下的公司却将他的理想一步步变成现实。或许他将给我们一些意想不到的建议……"

USA_Get_staff_support:0"获取参谋部支持"
USA_Get_staff_support_desc:0"众所周知，美国的军事组织体系历来是要比欧洲落后一些的。经过了漫长数年的扯皮，安斯沃斯将军和鲁特老先生终于在1912年促成了联邦军队陆军参谋部的诞生，大战期间，海军参谋部也最终提上日程。\n参谋部的设立与完善是对我国军事体系的巨大变革，但随着参谋部人员的引进，参谋部却逐渐取代了原来的各类军事部门，成为了话语权最大的军事组织。身为总司令，威尔逊当然要完全争取到参谋部对他的支持，确保枪杆子紧紧握在总统手中。"

USA_Western_Eagles:0"赞扬西部之鹰"
USA_Western_Eagles_desc:0"传奇的潘兴将军，如今仍然在西部“忠实”执行着美国政府的计划。不过，他的指挥体系以及训练方式，确实值得我们东海岸这帮兵痞子一学。在西部将近30年的打磨，使得西部军队成为了美利坚真正的铁军，并且灵活运用参谋部的方式，也使得他们的作战效率更比东部高上一截。我们应该多学习学习潘兴的治军方针，同时也可以借鉴特遣军们的作战风格……"

USA_Limit_the_Knights:0"限制骑士团"
USA_Limit_the_Knights_desc:0"连威尔逊总统都不知道如何评价这个组织了。在90年代以前，他们是令美国政府最为头疼的工人组织-而现在他们却成为了美国政府不得不倚仗的最大民间组织。他们拥有完备的武装组织体系和行政组织体系，并利用先前的宪法修正案四处在城市中播撒自己的种子，代替了各种社区工作以及警察职务去维持社会运转。当然，随着组织的扩大，鱼龙混杂是必然的事，现在就应该敦促各州想个办法，限制一下他们的暴力倾向。"

USA_the_east:0 "扶起东部钢铁之躯"
USA_the_east_desc:0"还是老生常谈的问题。我们不能将国家军队未来的方向，交给一个看起来不太能放心的将领。\n威尔逊仍然要利用东部的总参谋部并亲自下手，通过改革参谋部人员配置以及行动机制来提高联邦军队的作战效率。同时，联邦军队也应该要充分利用美国北方工业区的区位优势，采购更多、更现代化的武器装备-尤其是坦克与飞机，把东部军队打造成实实在在的钢铁之师。"

USA_Finally:0 "让我们再去迎接他……"
USA_Finally_desc:0"您为他未来铺好的路，似乎将会发挥出无法想象的功效。但未来的路，§R就在下一个总统的任期中去寻找吧……§!"





USA_3:0"哈定1921年国策"

USA_Take_office_immediately:0 "§Y走马上任§!"
USA_Take_office_immediately_desc:0 "Wow，欢迎美利坚第28任总统 沃伦·盖玛利尔·哈定进入白宫！请稍等！正在为您清理总统办公室，并即将打扮成您喜爱的样式……"

USA_Continuing_Beauty:0 "延续美丽"
USA_Continuing_Beauty_desc:0 "前任总统威尔逊所提出的§P《美丽国家计划》§!，仍然是现任哈定政府所提倡的指导方针。如今哈定总统已经入主白宫，我们必然要将此计划继续执行下去，为创造一个美丽、富强、公正的美国而努力。"

USA_Goddess_flag:0 "女神旗帜，\n高高举起"
USA_Goddess_flag_desc:0 "美利坚的政治体系在风云变幻的时代之中，已经落后太多了……联邦政府的各大部门都被各路政党所把控，文官法案迟迟得不到推进。不过幸好，一阵欧路刮来的风暴吹起了政治的火焰。英国早在1918年就已通过了授予女性公民选举权的法案；而美利坚也必将点燃自己的火把，带领我们的女性朋友走出一条康庄大道。"

USA_Women:0 "§0《妇女保障法》§!"
USA_Women_desc:0 "针对美国妇女权利的提案，其实早在几十年前就已有过。不过由于当时时局混乱，并无人在意女性朋友们的诉求。而现在，哈定总统必将将女性正义旗帜插到美利坚的任何一片土地上，宣扬我们自由的福音。"

USA_Friends_of_the_Republic:0 "共和之友"
USA_Friends_of_the_Republic_desc:0 "法国，与美利坚同为这个时代悠久的共和国。早在独立战争伊始，法国政府与法国人民就给予了大陆军相当慷慨的援助，美法人民携手完成了对英国的打击。尽管在美国内战中的法国独裁政府与美利坚有过许多不愉快，但现在，美法两国都需要给对方一定的空间，并再次携手，商讨美洲的命运。"

USA_Panama_Tour:0 "巴拿马之行"
USA_Panama_Tour_desc:0 "哈定总统同时被法国总统与法国巴拿马公司邀请-邀约前往巴拿马的巴拿马城参加一场盛大的美洲会议，并为我们的哈定总统提供旅游服务。有这种重新深入美洲，并与法国修复关系的机会，我们怎能错过？"

USA_Dealing_with_anger:0 "应对怒火"
USA_Dealing_with_anger_desc:0 "最近几年，南方的独立分子们因为自己政治与经济、道德的堕落，而向北方人民与联邦政府发出了一连串的怒火，南北间的矛盾愈演愈烈。归根结底，如果我们不能压制这些捣乱者，美利坚的根基将再次破裂……"

USA_Military_Reform:0 "军队革新"
USA_Military_Reform_desc:0 "前任总统威尔逊已经为我们选好了军事改革的方向。我们仍然需要吸取先进的作战经验以及军事理念，促进美国联邦军队的建设。"

USA_Perfect_ending_year_1:0 "完美收官第一年？"
USA_Perfect_ending_year_1_desc:0 "已经有一段时间过去了……一切都在计划中稳步有序的进行，这似乎是风暴后最美妙的开头。相信在哈定总统的带领下，美利坚必将迎来自己的复兴！\n\n\n\n-或未知的结果？"

USA_Shocking_waves_rise_with_the_wind:0 "§R惊天骇浪随风起…….§!"
USA_Shocking_waves_rise_with_the_wind_desc:0 "是命运的巧合还是无妄的猜想？从1861年6月12日起，到1921年6月12日止，时光最终给予了美利坚合众国50年的停战宣言。而6月18日，南方的国民警卫队-那些已经成为无耻叛军的人，正在大踏步的迈过南北分界线！我们不能再坐以待毙-人间五十年，如幻亦如梦；面对南北的命运，美利坚人民必将再次应对挑战！"
USA_AShocking_waves_rise_with_the_wind:0"§Y!!!!!增加合众国内战决议!!!!!§!"

USA_pause_button_for_everything:0 "§R一切按下暂停键!§!"
USA_pause_button_for_everything_desc:0 "即使使得南方的党派们停止了政治活动，而挂在美利坚脖子上的锁链依旧没有彻底取下。三大利剑，虽然赋予了我们打击违反协定与修正案的权利，但它却是使美国分裂的根本法律大纲！现在的他们早已成为时代的灰尘，将要留在历史的过往。"

USA_neutrality_of_the_enterprise:0 "确保企业中立"
USA_neutrality_of_the_enterprise_desc:0 "美利坚的巨型企业通常都是横跨南北经营的。如今的南方反动政府已经默认了北方企业的正常运行，但却对明确支持北方政府的企业开展强制没收运动。为了保障美利坚的生命安全-流动的经济，我们必然也要做出相应措施，呼吁所有企业保持中立，使生产不受破坏。"

USA_Welcome_Mellon_joining:0 "欢迎梅隆的加入"
USA_Welcome_Mellon_joining_desc:0 "梅隆这个家伙拉着他的狐朋狗友-杜邦三兄弟一起找上门来，他们将明确支持联邦政府的合法性，并以优惠的价格向联邦政府兜售金属加工品与武器、弹药。虽然他们的加入可能会刺激北方企业的中立动摇，但是他们的工厂却能为我们的战事提供实实在在的帮助。"

USA_Let_s_face_the_storm:0 "让我们面对风暴"
USA_Let_s_face_the_storm_desc:0 "此时此刻正如1861年的场景-美国的自由者们正遭遇着前所未有的困难。为了实现美利坚的持久自由，为了实现美利坚的美丽富强，请北方诸州团结起来，为了我们的明天去战斗！"

USA_supply_of_consumer_goods:0 "维持消费品供应"
USA_supply_of_consumer_goods_desc:0 "战争的扩散使大量职工与劳动力流失，许多保持中立的工厂也被间接摧毁。不仅仅是企业遇到了危机，许多地区因为生产与运输的停滞。也陷入了食品以及其他生活用品的短缺问题。联邦政府应该与铁路公司进行交涉，用政府手段或者军事手段保证消费品的运输，并号召流失的人口返回故乡。"

USA_Ensure_sales_channels:0 "保证销路"
USA_Ensure_sales_channels_desc:0 "工厂的持续生产遭到了前所未有的阻力，就算我们稳定了生产秩序，但是动荡的社会仍然使得美国人民的购买力大大下滑。为了保障企业们能够存活下去，联邦政府将拨出特别资金。设立联邦物资储蓄库，向地方企业购买大量工业制成品，以备救济和物资的正常供应。"

USA_Emergency_production_conversion:0 "紧急转换生产"
USA_Emergency_production_conversion_desc:0 "既然梅隆以及其他部分工业领袖加入我们联邦政府，那我们就必然使得他们全面地为联邦政府的正义战争服务。梅隆将会带头制定方案，领导并支持联邦政府推动企业转换，将原先的民生企业转变为专供军用物品生产的工厂。同时，金属加工企业也将减少民用领域的投入，转而进行包含稀有金属加工的发动机制造。"

USA_Add_military_industry:0 "加设军工业"
USA_Add_military_industry_desc:0 "仅仅只是生产线的转换还不足以解决前线的军需问题，现代战争说明白了，就是一场你死我活的吞金虎斗争。联邦政府将会向支持我们的企业家们拟定一份新的计划-§R美利坚的军工业将迎来伟大的复兴，而这却是用同胞们的血肉堆起来的……§!"

USA_Launch_a_lobbying_group:0 "发动游说集团"
USA_Launch_a_lobbying_group_desc:0 "梅隆周围的人都是一帮肥的流油的企业家。既然他们如此忠心的为联邦政府效命。那我们也只好委托他们干一些烧钱的工作-比如促进针对北方人民或南方人民的宣传工作，发动他们练就一口金嘴的游说人，为我们的联邦政府赢得政治支持。"

USA_Mr_Knight:0 "站哪边，骑士先生?"
USA_Mr_Knight_desc:0 "劳动骑士团作为一个拥有百万会员，十几万武装人员的组织，他们声称要为了维护美国的自由与独立而战。而如今，他们却畏畏缩缩的躲在各地的大楼中保持静默，只有一部分敢于为联邦政府而战。既然脑子不能激发他们的爱国情，那就用企业以及联邦政府的钱去砸动他们的爱国心！"
USA_AMr_Knight:0 "联邦政府将获得一支§R人数众多§!的劳动骑士团武装力量"

USA_walks_to_the_stage:0 "政府走到台前"
USA_walks_to_the_stage_desc:0 "50年前的美国内战之所以以妥协告终，归根结底就在前总统林肯加强联邦政府权力行动的失败，而引发的一系列连锁反应。虽然各州独立的法律效力由人民所授予，但如今战火四起。为了保护可爱的美利坚能够持续生存下去，相信我们能使得美国人民万众一心，汇集到联邦政府周围。"

USA_Emergency_conscription_law:0 "§0《紧急征兵法》§!"
USA_Emergency_conscription_law_desc:0 "美国联邦军队由于先前的体制缺陷，虽然战争已经全面爆发，但是军队所需的兵员仍然存有缺口。既然各州政府已经全力支持联邦政府的工作，那我们就要在各州推行新的兵役法案，全力支持我们的斗争。"

USA_War_Production_Management_Law:0 "§0《战时生产管理法》§!"
USA_War_Production_Management_Law_desc:0 "战争的爆发导致社会的动乱，各州的生产都进入了半瘫痪或无序状态。为了统一自由斗争的步调，联邦政府将在各州推行有关战时生产的管理方案-由政府保障各地生产的进行或暂停，这有利于地方更好的保护企业，并支持战争进行。"

USA_Adhere_to_the_unity:0 "坚持各州团结"
USA_Adhere_to_the_unity_desc:0 "虽然我们需要加强联邦政府的权力。但是各州的法律效力由人民所赋予，这是人民天生不可撼动的权力，联邦政府没有权利对各州指手划脚。我们只能寄希望于各州的爱国者们能够支持我们联邦政府的战争工作，并构建我们在战争中的和谐关系。"

USA_Free_play_arrest_traitors:0 "自由发挥，逮捕叛贼!"
USA_Free_play_arrest_traitors_desc:0 "既然我们已经维护了各州的团结，那就更需要发动各州政府解决战争问题-去动员我们可爱的美利坚人民自发的支援前线的战事，揪出那些隐藏在北方的叛徒们。这是自由的意志，不可阻挡！"

USA_Encourage_joining_the_militia:0 "鼓励加入民兵"
USA_Encourage_joining_the_militia_desc:0 "前线兵员的缺口，导致我们必须加快推进北方各州国民警卫队的建设。同时，联邦政府更应该起到总体宣传的作用，鼓励符合加入条件的美国公民积极参加北方国民警卫队。为捍卫自己的自由与国家的美丽，付出光辉的青春与汗水！"

USA_Hold_France:0 "牵住法国的手！"
USA_Hold_France_desc:0 "之前的关系修复活动，使我们重新结识了法国这个朋友。我们深切的清楚法国与美国的对立与冲突，我们也明白，分裂的美国对于英国来说将会是空前的好处。既然联盟国已经传出了与英国秘密结盟的消息，那我们就公开地宣扬我们与法国的友好关系，让全世界的正义国家都为美国人服务！"

USA_We_need_helmets:0 "需头盔，老铁！"
USA_We_need_helmets_desc:0 "战事的突然发生，使得我们美国孱弱的军工业暂时来不及完全恢复。既然如此，我们就需要动用海外关系，向法国求助。请求他们给予我们联邦政府大量的军火物资。我们知道，法国人可在大战中留下了不少东西……"

USA_Overseas_Fleet_Escort:0 "海外舰队保驾护航"
USA_Overseas_Fleet_Escort_desc:0 "英国那庞大的舰队已经动员起来，秘密保障着南方航线的运输，并打击我方的海上通道。美利坚那弱小的海军不足以对抗不列颠帝国的钢铁之躯。在我们自保港口的同时，联邦政府需要向法国政府再次提出支援，请求他们的舰队也为我们提供护航保障。"

USA_Everything_for_freedom:0 "§Y一切为了自由!§!"
USA_Everything_for_freedom_desc:0 "战争仍然没有停息，但战争却鼓励了美利坚人民万众一心。为了伟大千禧年的丰功伟业，为了上帝给予这片大陆的福音，我们众志成城，向着浑浊之地最后的审判前进！"