l_simp_chinese:
 ENG_No_Dawn_in_Storm:0 "暴雨之中，却不见黎明"
 ENG_No_Dawn_in_Storm_desc:0 "爱尔兰告急！再重复一遍，爱尔兰告急!世界大战后的不列颠并无一点“结束一切战争的战争”胜者的辉煌或骄傲。头一次，战争与每个公民息息相关，如影随形，骑着红马的骑士为帝国烙下的创伤从未如此深重。骤然停摆的战争机器反而夺去了无数人赖以为生的报酬，枯萎凋敝的市场经济更是看起来难以焕发第二春，肉食者们虽都雄心万丈，实际却怀揣着狼子野心党同伐异，不断损害着濒临崩溃的秩序。虽说如此，但若是给予时间，让臣民勠力同心，让首相把稳航向，帝国终归可以沐浴应许的荣光，获得应许的胜利，迎接应许的黎明。然而，爱尔兰人的无耻暴乱粉碎了这一切稳中向好的希望。无论如何，针对叛乱的镇压需要立即被组织起来。但在那之后，雨帘铺落，不列颠帝国却要航向何方？"
 ENG_Who_Catch_our_Bread:0 "是谁夺走了我们的面包"
 ENG_Who_Catch_our_Bread_desc:0 "现状已然崩坏，那么谁应当为此负责？换言之，谁夺走了不列颠公民大战后最基本的权益？谁夺走了我们的工作？谁又夺走了我们的面包？看看海峡对岸燃起的狼烟吧，答案已经不言自明。在帝国需要有人应征参战，为帝国服役时，爱尔兰人拒绝履行他们应尽的义务。当战争如火如荼，血肉横飞时，爱尔兰人却贪婪无耻的篡夺着本应属于不列颠子民的工作。最终当远征将士解甲归乡，正寻觅安宁时，爱尔兰人竟又举起叛旗，打碎了帝国公民的最后期望。是可忍，孰不可忍？这群卑鄙的强盗若是夺走了我们的面包，就要准备好迎接我们的怒火。"
 ENG_The_War_without_Fire:0 "没有硝烟的战火"
 ENG_The_War_without_Fire_desc:0 "没有硝烟的战火"
 ENG_The_Song_of_Prisoners:0 "叛徒们的囚歌"
 ENG_The_Song_of_Prisoners_desc:0 "一遍又一遍，爱尔兰的叛徒们还在恬不知耻的高唱他们呱噪的囚歌,爱尔兰叛徒唱道，他们因寒冷和黑暗点起叛乱之火。但殊不知他们感受的温暖只不过是引上身的烈焰，很快，镇压的灼痛也会一并到来。爱尔兰叛徒唱道，他们为压迫和剥削而上膛枪弹。但他们罪恶的子弹不过是那分裂和耻辱，不列颠帝国在翡翠岛的百年历史，百年秩序，岂容他们随意定义？爱尔兰叛徒唱道，他们要人间的太平和公义升起。那便尽管放马过来，日不落帝国的太阳从未日落，身为新世界秩序的缔造者，公义与我们而不是叛徒同在。叛徒们在阴暗的囚笼里啸叫着囚歌，猖狂一时。但很快，这首囚歌只能鸣响最后一个或不甘、或妥协的休止符。"
 ENG_No_End:0 "航路无头……"
 ENG_Future_in_Hands:0 "未来在我们手中"
 ENG_Future_in_Hands_desc:0 "“在暴风雨面前更加需要冷静，这能铸就帝国前进需要的稳定。”除去机器上的斑斑锈迹，润滑嘎吱作响的齿轮，让帝国这尊钢铁巨兽发动起来。拒绝改变的保守党和异想天开的自由党左派都不适合在危机当头之时团结帝国，就让劳合乔治带领我们，让中间派带来稳定——压倒一切的稳定。擦亮利剑与盾牌，让公义得胜，让叛乱败亡。爱尔兰局势虽已糜烂，但绝不可凭快刀斩乱麻的心态激起更大的对抗。屠戮殆尽不可取，帝国需要的从来不是一片焦土。可纵容分裂更不可取，若曲曲爱尔兰都可挑衅雄狮，那么不列颠帝国的威严何在？分化瓦解他们，以昭昭天理踏平逆反者，怀柔温良者。不列颠的公民们，未来在我们手中，未来在劳合乔治所领导的自由党手中。"
 ENG_Emergency_Lockdown:0 "紧急戒严令"
 ENG_Emergency_Lockdown_desc:0 "够了！一次次的挑衅和不断升级的事态，一场场的抗议与无休止的流血冲突。现在我们不得不承认，帝国现在所面对的就是一场战争。我们绝不能再装聋作哑放任这群爱尔兰分裂者猖狂下去。战争为维持秩序，秩序可赢下战争。立刻宣布紧急戒严英伦三岛！铲平叛徒们生长的土壤！我们要把这群不知帝国尊严为何物的宵小之徒仰仗的所谓“人民战争”给溺死在襁褓里。"
 ENG_Unite_and_Look_Forward:0 "团结一致，向前看"
 ENG_Unite_and_Look_Forward_desc:0 "攘外必先安内——曾领导不列颠帝国在世界大战中的战时内阁的劳合·乔治自然深深明白这个道理。爱尔兰危机从来就不是小打小闹。这是分裂，这是战争，这是关乎帝国生死存亡的时刻。哪怕是硝烟刚刚消逝的世界大战，敌人也从未踏上不列颠群岛半步。但这场爱尔兰叛乱中，叛徒们却将利刃直插入帝国的心脏，威胁着所有帝国公民的生活，更威胁着大不列颠的永世威严。既然情况如此特殊，帝国就必需团结一切良知尚存的公民，各阶级各政党也必须团结在大不列颠的米字旗下。服从政府指挥，方可度过难关。万幸的是，我们的劳合·乔治首相拥有满腹的经验与才华，而且作为帝国政党中的中间派，团结帝国理固应当，也定会顺利。"
 ENG_Closted:0 "密谈"
 ENG_Closted_desc:0 "只要一个人对当下的英国政治稍微有所了解，那么他就会知道——自由党，这个名义上的帝国执政党，实际正处于完全的撕裂对立中。阿斯奎特代表的左倾派系与我们的劳合·乔治首相政见相左，而首相大人则是依靠保守党的支持得以当选的。可现如今，大难当前，如果一个执政党自身无法团结起来，那么又怎样去团结起整个帝国，对抗风浪？邀请阿斯奎特来一场密谈，避开那些呱噪的议员们，让理智和忠诚成为佳话。国难当头，必不能同室操戈。时间宝贵，爱尔兰，爱尔兰等不及了！"
 ENG_Same_Purpose:0 "共同的目的"
 ENG_Liberty_Emperial_Sense:0 "自由的帝国意识"
 ENG_Liberty_Emperial_Sense_desc:0 "迷途的航船需要人引领航向，自由党领导下的帝国需要自由的意识。劳合·乔治首相将从旧时代的教训中重构自由帝国的概念，让自由党领导下的不列颠帝国重新树立自由的信念。内阁会议在即，首相将复苏我们古老而骄傲的价值观，让国家在风雨中团结起来。"
