AOR_ENG_WE_BELIVE_QIAOZHI:0 "我们相信乔治"
AOR_ENG_WE_BELIVE_QIAOZHI_desc:0 "战已熄，洪涌起。伦敦的夜晚依旧美丽，但在璀璨灯光之下，是无数哀嚎的生灵。1919年秋，劳合乔治仍然待在唐人街10号，作为大战胜利者的不列颠帝国应许了他的继任，但如今记忆中的辉煌不能再次复现，浮现的危机正在摇动神器。未来的不列颠在何方，我们的首相先生是否又能兑现他国家计划的诺言？我们唯有与之同行……"
AOR_ENG_Restore_the_economy:0 "恢复经济"
AOR_ENG_Restore_the_economy_desc:0 "大本钟的响起，不列颠即将步入新年，可希望中欣欣向荣并没有出现-国内经济的疲倦成为了矛盾的导火索，从报纸到街道，从富丽堂皇的豪宅到挤满了人的廉价公寓，每个人都在竭尽所能的发出自己的声音，工人，商人，士兵，贵族……一切的声音化为了悲痛的歌声，渴望将祖国带向自己的方向。但现在，我们唯有再度扬帆，才可以让不列颠尼亚再度远航!"
