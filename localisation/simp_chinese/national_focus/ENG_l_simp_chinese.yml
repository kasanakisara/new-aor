l_simp_chinese:
 ENG_National_focus_1:0"战后首年"
 
 #第一阶段国策本地化(国策名字 + 国策本地化）
 ENG_xinnianzhiye:0"新年之夜"
 ENG_xinnianzhiye_desc:0"噩梦已是过去式。\n对从噩梦中惊醒的人们来说，最大的安慰莫过于看见窗外的黎明。1919年的元旦将至，是时候着手扫除二战的尘埃，为大英帝国开辟崭新未来了!劳合·乔治阁下踌躇满志，大英子民万众一心，日不落帝国的前路必将是一片坦途。\n大英帝国的骄阳永不倾!"
 ENG_xiangjiuyouzhixvxuanzhan:0"向旧有的秩序宣战"
 ENG_xiangjiuyouzhixvxuanzhan_desc:0"战争留下的不只满目疮痍，在战争中所孕育的进步以及在这之后的新秩序都在向我们宣告着：旧有的秩序应当被扔进历史的故纸堆。\n崭新的日不落帝国理应由崭新的秩序为之保驾护航，无论在何处，大英的秩序才能被称之为秩序，大英的规则才能被当做规则!"
 ENG_diguolianbangjingjihuifufaan:0"《帝国联邦经济恢复法案》"
 ENG_diguolianbangjingjihuifufaan_desc:0"帝国在战争中已经经历了太多不幸与毁灭，但是不能久久沉溺于过去的悲伤中。逝者已去，生者当自强。我们要让大英帝国的战士们卸甲后有田可耕。\n新出台的经济恢复法案将协调部分工厂开放更多的岗位以挽救联邦的经济，逐步减少失业人员从而刺激消费。尽一切力量，为大英帝国的社会经济做心肺复苏。"
 ENG_qiyedexinquanli:0"企业的新权利"
 ENG_qiyedexinquanli_desc:0"自由，我们需要更加自由的市场。\n战争既然已经成为了过去式，那么统一的调配政策也应随之被扔进坟墓。现在，我们要逐步释放企业的活力，让大英帝国的子民有更加自由的选择权与决策权。企业会自行决定最适合自己的环境，为自己开辟广阔天地，为大英帝国创造难以计量的财富。"
 ENG_zouchujietou_zouxianggongchang:0"走出街头，走向工厂"
 ENG_zouchujietou_zouxianggongchang_desc:0"“唐宁街的官员们，战争胜利了，我们的早餐在哪里”\n曾几何时，那些躲过战争地狱，带领大英帝国走向胜利的老兵们拿着这种牌子在街上游行。他们一定将这视作祖国对他们的背叛。但现在，一切都将结束，大英帝国的工厂将向所有失业者敞开大门，官员们会尽力将国家机器全力运转，以确保每一颗螺丝都能找到他们的位置。\n英雄们将再也不用为早餐发愁。"
 ENG_bianjiangjiushijiehuichensaochu:0"便将旧世界的灰尘扫除"
 ENG_bianjiangjiushijiehuichensaochu_desc:0"这里没有回荡的轰鸣，没有恼人的紧急广播，没有粘稠至令人窒息的空气......战争之后，人们再度拾起了生活。\n欢声笑语再度传入我们的耳畔，桌子上的餐点逐渐丰富起来，视线所及的一切都笼罩绚烂的光彩，美好如清泉般在你我之间流淌。\n我们将战争的灰尘扫除，留下生命的赞歌。"
 ENG_huangjindexinjiag:0"黄金的新价格"
 ENG_huangjindexinjiag_desc:0"若是说我们能确定潘多拉当年打开的魔盒中飞出了什么实质性的东西的话，那一定是黄金没错了。古往今来，多少悲剧皆与这闪亮的金属有关。\n作为世界上最早施行金本位的国家，大英帝国需要把黄金的定价权牢牢掌握在自己手里，而战后的新经济体制，也不能任由战时的黄金价格大行其道。\n正如我们需要新秩序那般，黄金也需要一个新的足够权威的价格。"
 ENG_gengbaorongdeshichang:0"更包容的市场"
 ENG_gengbaorongdeshichang_desc:0"我们无需去教商人们如何做生意，因为更高的自由意味着更大的包容，在现行法律允许的范围内，我们应当打造一个包罗万象的环境。大英帝国的市场内，无论出身，无论人种，都应该享有同样经商的权力，无论何处的合法商品都能找到自己的位置。\n英国的就是世界的，世界的就是英国的。"
 ENG_zhuazhuxinjiyv:0"抓住新机遇"
 ENG_zhuazhuxinjiyv_desc:0"战争结束，百废待兴。\n虽然这么说似乎有些幸灾乐祸的嫌疑，但事实就是，每有一片废墟，就有一栋房子的建筑需求，各行各业皆是如此。大片的市场空白如同一块香气四溢的蛋糕，而大英帝国作为战争的最大赢家，必定要分走其中的绝大部分。时间就是金钱，效率就是生命，机遇就是坦途!"
 ENG_chongshenqiyejiajingshen:0"重申企业家精神"
 ENG_chongshenqiyejiajingshen_desc:0"实干与创新，这是每个企业家应当铭记于心的精神。其内核并非如何复杂，但若真要追求人人施行，便难如登天。但即便是这样，我们的商人也应当牢记这一精神。\n背信弃义者、虚有其表者、固步自封者...时代不会停滞不前，无论何人，无法顺应时代就理应退出舞台。\n是的，无论何人!"
 ENG_shenglitaruxindaolu:0"胜利踏入新道路"
 ENG_shenglitaruxindaolu_desc:0"蓝天之上不再回荡轰鸣，天空便是吾辈之界限；道路之间不再弥漫硝烟，人潮便是时代的流向；大英帝国不再千疮百孔，世界便是我等之野望。\n昂首踏入烈焰吧!在这熊熊燃烧着的世界当中，大英帝国即将发起新一轮的远征!从北冰洋到南极洲，从英伦岛到新大陆，大英的旗帜必将飘扬于寰宇!"
 ENG_jilundianqisuoqvzhifangzhou:0"机轮电器所驱之方舟"
 ENG_jilundianqisuoqvzhifangzhou_desc:0"人类罪孽深重，于是上帝降下洪水涤净世间，却独留善良之人搭载希望之舟至于彼岸。\n如今洪水散尽，时代的巨浪却又奔涌而来，但大英帝国的钢铁雄心不会就此被淹没，且听那震耳轰鸣!我们将以血肉之躯打造钢铁之舟，在风云变幻之际，踏上崭新征途!\n最终的胜利者一定是，也只能是——大不列颠及爱尔兰联合王国，与她忠诚的仆从们!"
 ENG_hanweiyibuzailaogudetongmeng:0"捍卫永远的同盟"
 ENG_hanweiyibuzailaogudetongmeng_desc:0"大战之后，我们屹立于废墟之上，但是新的危机接踵而至，在外交方面，一场针对旧事同盟的无形战争已经开始，对于大英帝国来说，崛起道路不仅仅靠的是钢枪与利刃，更多的还是来自于维多利亚时期其优秀的拉拢分化的外交政策。因此，旧事同盟的维持显得相当的有必要。"
 ENG_shijietiemuzhixia:0"世界，铁幕之下"
 ENG_shijietiemuzhixia_desc:0"自大战结束之后，德意志帝国及其盟友已经被打入了牢笼之中，但是作为大战的胜利者，我们仍然面临他国的威胁，尽管真枪实弹的冲突并未发生，但是一场在意识形态、经济、外交方面的无形战争已经开始。\n整个世界并不沐浴在自由的暖风里，而是身处于刺骨的铁幕之下。"
 ENG_jiushitongmeng:0"旧时同盟"
 ENG_jiushitongmeng_desc:0"法兰西共和国作为我们旧事最强大有力的同盟，尽管大战已然结束，旧世界的苦难已经渐行渐远，但是对于满目疮痍的新世界来说，大不列颠与法兰西的携手并进，必然将取得远胜于旧时的结果。时间将会证明，我们不仅仅会为了旧日的合作而鼓舞，更会为了明日的共赢而庆贺。"
 ENG_jianshewanqiansuowangzhilixiangguo:0"建设万千所望之理想国"
 ENG_jianshewanqiansuowangzhilixiangguo_desc:0"轰隆隆的机器声已经取代昨日的炮声，大英帝国全境的工厂正全速地转动着自己的机器，产出更多的产品输往各地。帝国的未来从未如此光明，在扫去一切障碍的道路上从未如此地平坦，一个以往只存在于笔端之上的理想之地正在逐步形成。"
 ENG_jiangjiushijieyvyichongsu:0"将旧世界予以重塑"
 ENG_jiangjiushijieyvyichongsu_desc:0"旧日的维也纳体系在大战中隆隆的炮火声中遭到摧毁。\n而今日，众国欢聚一起建立了亘古未有的国际联盟，在这样一个联盟之下，我们有能力相信，世界将不再发生大战那般的惨状，新世界的新星正在众人的努力之下冉冉升起。而帝国的未来必将驱散一切阴霾，使得重见日月。"
 ENG_babietajiangzhirutianji:0"巴别塔将直入天际"
 ENG_babietajiangzhirutianji_desc:0"随着国联大会的闭幕，新的世界格局正飞速地建立于废墟之上。\n而国联及新的国际秩序的建立，使得我们已经成为了新世界的领头羊，而今日我们的壮举正如巴别塔那样，使得上帝都为之震撼。"
 ENG_shoucidiguolianbangdahui:0"首次帝国联邦大会"
 ENG_shoucidiguolianbangdahui_desc:0"经过大战洗礼的帝国，殖民地的暴动越来越多，殖民地的民族意识越来越强，显然我们不能再继续使用旧时代的殖民体系了，在新时代来临之际，我们决定将建立一个帝国联邦，将帝国的所有子民永远团结在米字旗之下。"
 ENG_baohuwomenzuiqinjinzhiren:0"保护我们最亲近之人"
 ENG_baohuwomenzuiqinjinzhiren_desc:0"大英帝国将保护那些推崇、敬仰她的诸国，构建强大的体系，保护我们最为亲近之人\n我们将会携手并进，共建开放合作的新平台。在友好的氛围中，大英帝国的力量将会在万国之丛中熠熠生辉，令其所受世间万民所敬仰，永世长存"
 ENG_xiufuposunshuaijiuzhijvjian:0"修补旧时代破碎竖琴"
 ENG_xiufuposunshuaijiuzhijvjian_desc:0"曾经的爱尔兰岛在风波中被无情拍打，而今日，对于大不列颠来说，我们应当重新修复过去的伤痕，以使得帝国获取最多的利益。\n作物、财富、工业，将会源源不断地输送至爱尔兰，绿宝石岛将会发出其应有的闪光。"
 ENG_wanminsuoxiang:0"万民所向"
 ENG_wanminsuoxiang_desc:0"这些在唐宁街中不断被论证的精心政策，将会被正式地实施于爱尔兰，而这些政策一旦如同想象中的成功，便将会发挥出其巨大的力量。\n过往数个世纪的创伤与苦难记忆同样将会一并地被修复亦或者遗忘。爱尔兰的人民将会永远为自己属于联合王国而骄傲。"
 ENG_aierlanrenminzhanxinfuzhi:0"爱尔兰人民崭新福祉"
 ENG_aierlanrenminzhanxinfuzhi_desc:0"新的政策，新的福利。\n这些新的措施足以使得爱尔兰人民更加地相信大不列颠的权威与力量，而他们的幸福将会是爱尔兰岛这种绿宝石之岛持续稳定繁荣的最好保障。"
 ENG_rangwomenzaifengyvzhongtongzhougongji:0"让我们在风雨中同舟共济"
 ENG_rangwomenzaifengyvzhongtongzhougongji_desc:0"在新时代的巨浪之中，仅仅凭靠着帝国的力量是无法远航的。对于我们来说，对他国进行援助，共同战胜巨浪，似乎是更加正确而英明的选择。\n让我们一同在风雨中同舟共济，战胜新时代的考验。"
 ENG_xinshidaidejishi:0"新时代的基石"
 ENG_xinshidaidejishi_desc:0"大不列颠正不断地在风雨中飘摇不定，纠其根本解决之道，即打好其底层的基石，使其永远得以安稳站立。\n今日我们所要做的便是稳固不列颠的地基，使得旧日蔓延的动荡永远告别，从而迎接明日的安稳。"
 ENG_shenglidexiyue:0"胜利的喜悦"
 ENG_shenglidexiyue_desc:0"由于我们精心装备的新政策在爱尔兰的大获成功，大批的独立集会由于缺乏民众的支持而取消。\n尽管爱尔兰的独立运动依然汹涌，但是毫无疑问的是，就目前而言，爱尔兰的状况已经被暂时地稳定了，我们就是当下的胜利者。"
 ENG_wudengzuoweicijianweiyiduoshou:0"吾等作为此间唯一舵手"
 ENG_wudengzuoweicijianweiyiduoshou_desc:"在世界的巨轮之中，米字旗高高飘扬在桅杆之上，新时代的英国毫无疑问的已经成为了这艘巨轮上的唯一舵手。\n我们相信，世界上唯有我们的带领之下，方能在新时代的巨浪下平稳地航行。而英国，必将再次重现维多利亚女王时期的巅峰与辉煌，抹去一切旧日的疤痕。"
 ENG_bianjiujiayushidaijulang:0"便就此驾驭时代巨浪"
 ENG_bianjiujiayushidaijulang_desc:0"昨日的苦难已成为过往，今日，大英帝国这艘庞大的巨轮已经修补了她的所有伤疤，我们必将征服这凶猛的大洋，顺风而行。\n但是，新世界的远征也并不将会全是一帆风顺，帝国的前行依然需要众人戮力同心。"
 
 ##第一阶段国策效果本地化
 ENG_xinnianzhiye_tt:0"元旦已至，在万民欢呼之中，帝国的太阳照常升起，永耀于世"
 ENG_xiangjiuyouzhixvxuanzhan_tt:0"我们制定法律，确立制度，向旧时代的残余发出最后一击，为新时代下的帝国保驾护航"
 ENG_diguolianbangjingjihuifufaan_tt:0"我们尽全力推动的法案一旦实现，将拯救帝国于狂澜之中，令帝国重回属于她的巅峰"
 ENG_qiyedexinquanli_tt:0"让企业获利，这将会使得我们的市场更加充满向上的活力，令旧时磨难湮灭于历史的洪流当中"
 ENG_zouchujietou_zouxianggongchang_tt:0"工人们去往崭新的工厂，将他们的价值发挥，将他们的功绩留存，帝国也会因他们恢复往昔之繁荣与昌盛之中"
 ENG_bianjiangjiushijiehuichensaochu_tt:0"扫除灰尘，满是清新，空气中带有清香，天空愈发湛蓝，一切都在向着人们所向往的生活飞奔过去"
 ENG_huangjindexinjiag_tt:0"订立新价，稳定市价，天下子民都会因这一举措而受益，世界各国都会因这一举措而受益"
 ENG_gengbaorongdeshichang_tt:0"我们变得更加包容，自由的贸易，各异的商品，无时无刻不透露着帝国的包容之心和再次复兴的决心"
 ENG_zhuazhuxinjiyv_tt:0"英国在时代的潮流中一旦抓住新的机遇，便可在新时代的风云变幻中获得坦途，如同我们走在平坦大路一般"
 ENG_chongshenqiyejiajingshen_tt:0"企业家的精神重名于世，市场将变得更加充满激情和热血，年轻的企业者们正在为帝国的新复兴做出最后的冲刺"
 ENG_shenglitaruxindaolu_tt:0"踏入新的道路，帝国的一切都是那么的崭新无比，都是那么的新颖，相信我们定能走出一条最为成功的道路"
 ENG_jilundianqisuoqvzhifangzhou_tt:0"我们将搭乘方舟，在洪水退去的地带，修筑人类的新家园，在风云变幻之际，构筑新世界"
 ENG_hanweiyibuzailaogudetongmeng_tt:0"我们必将捍卫我们的同盟，保卫我们的家园，必将使旧时代的所有盟友重新站立于我们一方"
 ENG_shijietiemuzhixia_tt:0"闸门已然落下，世界铁幕之中"
 ENG_jiushitongmeng_tt:0"我们法兰西的朋友，为我们旧时的合作干杯，为我们的新时代的共赢干杯!"
 ENG_jianshewanqiansuowangzhilixiangguo_tt:0"理想的国度已然来临，随着道路的指引，向前进吧!"
 ENG_jiangjiushijieyvyichongsu_tt:0"我们将摧毁一个旧世界，我们定创造一个新世界，国际联盟既成，帝国日月再起" 
 ENG_babietajiangzhirutianji_tt:0"大会已然闭幕，我们回忆我们的功绩，我们踏在新时代的大路上"
 ENG_shoucidiguolianbangdahui_tt:0"我们组建帝国联邦，构建新时代的殖民体系，为铸成新世纪添砖加瓦"
 ENG_baohuwomenzuiqinjinzhiren_tt:0"给予诸国必要的援助，必将使得我们的地位登上新的高峰，令万民敬仰"
 ENG_xiufuposunshuaijiuzhijvjian_tt:0"我们给予爱尔兰作物，给予钱财，令他们恢复往昔力量，为帝国利益而战"
 ENG_wanminsuoxiang_tt:0"这些精心的政策一旦成功，爱尔兰百万人民，必将是一片感恩之情"
 ENG_aierlanrenminzhanxinfuzhi_tt:0"崭新的政策，优厚的福利，必能使爱尔兰的人们士气高涨，民众幸福"
 ENG_rangwomenzaifengyvzhongtongzhougongji_tt:0"给予援助，制定政策，我们所作一切，皆为重塑新世界的伟大体系"
 ENG_xinshidaidejishi_tt:0"打好地基，固定基石。令动荡告别不列颠，令稳定重返于世"
 ENG_shenglidexiyue_tt:0"我们以胜利者的姿态向全帝国传达我们的喜悦"
 ENG_wudengzuoweicijianweiyiduoshou_tt:0"掌握新时代的方舟巨轮，带领新时代的英国，重回于巅峰!" 
 ENG_bianjiujiayushidaijulang_tt:0"穿越巨浪，乘风奔去，开启新世界的征程，帝国前途尚未可知……"
