AOR_ENG_A_new_atmosphere_desc:0"现如今，我们的工业生产能力依旧处在一个相对较低的状态-同时市场上的企业资金链也出现了紧缺现象，无论是企业还是个人都没有什么积极性来投入到伟大的复兴和梦想上去。为此，我们制定了一项计划，我们在降低企业的所得税同时，由政府亲自发出大量津贴，补充市场，让我的经济更有活力!"
AOR_ENG_dadanxingdong_desc:0"“捍卫你的自由!”这是赤色份子传单上的标志语，近几年随着问题的不断增加，让赤色份子有机可乘，他们通过各种手段干预政令的正常运行，工厂的正常生产以及破坏市场和平，随着越来越多的人加入进来，我们必须通过暴力手段来结束这一切。"
AOR_ENG_fazhanbunengduan_desc:0"根据古典主义经济学来讲，自由确实是对经济发展最好的方式-但这不代表政府只是个存钱罐。如今的劳合乔治开始动用英格兰银行的国家储备对市场进行无利息补助，这反而引起了议会中的一阵反对，反对者甚至开始准备弹劾计划。为了不列颠未来的繁荣，我们必须要通过各种方式让这些老骨头们闭上嘴，让经济政策与发展持续下去。"
AOR_ENG_fuchinanfangmaoyi_desc:0"大战期间，我们的海上运输受到了德国潜艇的严重干扰。这使得我们的贸易路线大规模中断，许多商品久久滞销。如今我们已经走过硝烟，便要通过政府扶持，将这些在本岛毫无有益价值的废物，如同我们的先辈一样，将他们运往遥远的南部，为不列颠创造宝贵的价值。"
AOR_ENG_xiangcundezhenxing_desc:0"大战期间，许多城市人恐惧于德国飞艇或飞机的轰炸，纷纷躲到乡下，而众多企业以及工人们也随之前往农村躲避战乱-这却使得我们发现了巨大的价值。农村剩余的土地拥有极为广阔的前景，我们将低价值的农业产品淘汰，利用我国发达的交通网络，将城市中受到战争干扰的工厂迁移至地价便宜且劳动力开始增长的乡下，或许能够有效促进不列颠的工业繁荣。"
AOR_ENG_jiaqiangyugeguowanglai_desc:0"大战期间，作为“协约国”首领的英国将大半个世界都拉入了自己的阵营，可惜当时迫于形势，我们只注重军事作用。现在……为了促进不列颠以及世界市场的繁荣，我们将加强盟国之间的联系，通过一系列的市场磋商解决我们之间的贸易问题，同时促进各国间的友好往来。"
AOR_ENG_taigaoqiyejiadiwei_desc:0"颂歌又一次响起，让我们赞美不列颠的企业们吧!赞美无形的手，她就如同慈母一样包容我们每一个人，她温柔的抚摸着每一处角落，让我们可以为了自己而努力，让我们可以在自由的世界中创造奇迹，这是一支美妙的舞曲，这是市场的赞歌!"
AOR_ENG_quebaogongrenwending_desc:0"随着战后的重建，大量的问题开始暴露出来。企业为了提高市场收益，开始通过降低工人时薪与产品质量的方式获取更多利润。而企业家本身没有足够的资金来让市场正常运转，工人们的生活则日益贫困。不可否认，一旦这样下去，经济将会万劫不复。因此，我们要告诉工人，他们将会用勤劳为自己创造未来，我们也要告诉企业用真诚来创造奇迹。这将会是一场钢铁的赞美诗，这也是一场充满金光的圆舞曲"
AOR_ENG_fangkuangongzuojianguan_desc:0"几家企业的董事会联手向我们发出了申请，他们愿意承担一大部分的社会保障资金，但代价就是我们要在工人条例的具体实施和监督上稍微放宽一点……以不列颠的经济繁荣为主，没有不列颠的繁荣，哪来不列颠国民的幸福。这是无奈之举，不是吗？"
AOR_ENG_jingjikaoqiye_desc:0"当棍棒落下，便不会有人出声。当鲜血流淌，便不会有人注目。现在，走上伦敦的街头，警察在兢兢业业的检查每一个人，工业与市场纠察局也成为了国家有力的屏障，而在政府方面，在一次又一次的“换血行动”后，我们终于可以宣称我们拥有一个井然有序的社会了，尽管有很多人无法看到……但让经济快速发展吧!"
AOR_ENG_yaoqingqiyejinzhuzhimindi_desc:0"帝国在黑暗大陆的统治范围内部势力盘根错节，野蛮残暴的土著、心怀鬼胎的合作者、贪婪觊觎的其他列强……都意图染指日不落的永恒遗产。我们下达命令，颁布法律，把这些胆敢拦阻帝国向光荣与希望的土地进军的荆棘通通连根拔除，但这还不够。现在，政府将会利用资金引导企业加快在殖民地的工厂迁入，用机器和金钱摧毁这些邪恶家的野兽意志，使得非洲永远成为不列颠的蜜罐。"
AOR_ENG_xiudingyibaofaan_desc:0"医疗保障，一项可以直接看出一国政府对公民的态度脸面，话说如此，我国政府过去几年的社保服务一直……不太好。落后与覆盖面小等因素一直困扰着我们。但现在已经没有时间考虑了，我们必须做出选择，才可以让不列颠的光芒普照世间。"
AOR_ENG_jiujituiwulaobing_desc:0"1919年初的退伍军人抗议事件曾经席卷了整个英格兰，虽然风暴已经平静，但我们不得不在从中得到了许多教训-包括大规模的退伍军人善后事。退伍军人们毕竟曾经是大战的参与者，是不列颠的荣光象征，我们应该继续动用我们的国家储备，使得失业的退伍军人们有一定的生活保障，这也会增加我们的荣光。"
AOR_ENG_chilunbutingzhuan_desc:0"人力、经济、股票，在这些数字之间把玩的不列颠政府已经耗尽了他的精力。我们自然期待我们能将不列颠带出危机到来的阴影中-但这还远远不到，远远不够。劳合乔治决定对内阁进行一次大刀阔斧的革新，以便更好地适应他伟大计划的工作-尽管这会招来更多人的反对。"
AOR_ENG_tuiwujunrenzaijiuye_desc:0"大战后的不列颠经济开始复苏-但员工职位仍然短缺。已经大规模回到农村或流浪于城市间的退伍军人便是我们国家最自由，也是最需要的劳动力。我们只需要鼓励市场新兴的就业培训企业开展对军人的专属帮助，便能为不列颠创造一批又一批的优质人力资源，并投入到英国复兴的动力中去。"
AOR_ENG_jieshourenminyijian_desc:0"工人们的要求已经来到了政府之中，工党也在其中扮演着重要的角色，经过核算，让每一个人都获得完善的保障这将会导致政府的开支大幅增加，可是，如果我们放弃了他们，我们又怎么宣称我们是一个爱民的政府，祖国会保护每一个人，无论是富人还是穷人。"
AOR_ENG_gongshizhidugexin_desc:0"“用1便士便可以支付一人的工资，用10先令便可以找到一个完美的仆人，而100英镑则可以买下一个家庭的性命。”这是英国古老的俗语，也是底层的写照。虽然时光已逝，但其依然提醒着不列颠的每一个人。待遇好的就业岗位的让每一个人挤破了脑袋去求取一个位置，即便如此，他们仍然要工作十几个小时，并领取如今看来微薄的薪水，他们的老板却盆满钵满。为此，以法律形式提高时薪并重申工时度将大大提高工人的生活水平，也可以让不列颠跟安全的航行。"
AOR_ENG_huifuyuanqi_desc:0"以钢铁铸就国家的骨，以石油化为国家的血，滚滚的麦浪化做结实的肌肉，企业与市场将变为我们的眼与耳，议会将成为我们的大脑，在未来，不论阶级，不论民族，不论职业。每一个人都将成为有机社会的一部分。我们将通力协作，迈步未来。"
AOR_ENG_wenzhuguojiahaobanshi_desc:0"“我们相信生活的美好，我们相信政府的高效，我们相信帝国正前行在解决危机的道路上，我们相信金融危机的暴风雨终会退散。”尽情的宣传吧，尽情的歌颂吧，夸大我们解决问题的能力，闭口不谈我们面对的问题，在永不停歇的华丽舞曲里跳起堂皇的舞步，让糜烂的气氛沁入每一个角落，绝不能让帝国机器停转，绝不能我们发动世界霸权的发条暂歇，无论代价如何。我们霸权的道路不会因为经济问题而停下，暴风雨终会退散，被风暴摧折凋零的花瓣终会新生，相信我，一切都会好起来的，风雨一定会退散!哪怕你们只是相信它在退散也无妨。"
AOR_ENG_yidairendeshiming_desc:0"回想起七年战争之中与拿破仑战争中的那些功勋卓著的将军，英勇作战的士兵。为什么大战中的英国军队却没有重现父辈们那光荣的史诗呢？当代的年轻人们怎么能够不为自己感到耻辱？那么，就在劳动与海外的斗争当中为祖国贡献出自己的力量吧，去完成父辈交给我们的使命，飞到不列颠之外的其他地方!"
AOR_ENG_aiguoduwu_desc:0"“我们生于此风云激荡之年代，从帝国时代万世秩序的大厦倾倒到民族年代血色涟漪的滚滚红潮，唯有不列颠尼亚傲立于尘世之首位，只觉得欧陆纷纷扰扰的宵小之徒吵闹。可惜，光荣，孤立，这些曾是帝国外交的代名词，构筑了现今帝国四面受敌的窘境。而现在，梦里最美好的愿望化为最扭曲可怖的梦魇，我们自将义不容辞的捍卫正义与和平的公理得胜。秩序必将长存!”"
AOR_ENG_wendingfeizhou_desc:0"土著管制，部落监视，远远不够。叛徒，就是他们的名字，这些肮脏的土著老鼠们总能以各种各样的借口侵犯帝国的财产，杀戮帝国的子民，破坏帝国的开发成果。既然如此，那他们唯一的价值便是以他们肮脏的鲜血昭示日不落的不可侵犯，不可逆反!无限制开火令会将这至高的正义带到黑暗大陆的每一个角落，直到没有玷污日不落神圣疆土的存在为止。同时，我们还有一个伟大的计划在等着这些未开化的野蛮人……"
AOR_ENG_2c_plan_desc:0"我们不得不提到一位伟大的人物-塞西尔.罗德斯。这位英国知名的征服者曾经明确提出过建立一条横穿非洲大陆的英国铁路的宏伟计划，不过迫于当时的实际情况并未实施。首相先生早已在战后就预想着建立这么一条伟大的铁路-这可不只是修一条铁路那么简单，这将是帝国的财富之路，复兴之路，是给黑暗大陆带去救赎的光明之路。那么由此，方案决议通过!"
AOR_ENG_yushimozijiangjunxieshang_desc:0"史末资将军在南非联邦以及赞比西河以南的英国殖民领地的影响力是无人可比的-我们仍然在战后赋予他管理南非军务的权利。帝国的铁路计划在深入内陆的过程中必然受到阻力，土匪、野蛮人以及一部分野心家的行动无休止境向我们袭来。是时候该呼叫帝国的将军与子民们一同随我们深入未知，捍卫我们强盛的道路!"
AOR_ENG_tinghaole_fuade_desc:0"可怜的埃及苏丹似乎忘记了自己的地位，他居然以他国家领袖的身份要求英国政府放弃挪用埃及土地的的计划，还有那些埃及人的煽动活动-难道他全然不知自己的今天是不列颠人帮助其取得的？雄狮发怒后难以收场，是时候改以强制性措施让福阿德明白：我们能把他一脚踢开并且变成残废，不要挡英国人的道，不然他就是下一个阿拉比!"
AOR_ENG_qiangzhengtudi_desc:0"殖民地的土地不都是英国人的？有些人在报纸上写的东西几乎就是胡言乱语。我们修建这条伟大的铁路是为了给黑暗大陆以及帝国带来光明与财富的前景，为了计划的进行，我们必然要征求一定的土地，不过只是数量的多少罢了……至于所谓土地上土著人的权利，首相先生自有安排，这将是他们改变命运的机会。"
AOR_ENG_kaifayantukuangcang_desc:0"黑暗大陆名为黑暗，却闪耀着数不尽的宝藏，只是没有多少文明人前来开发而已。那些野蛮人嗤之以鼻的宝贵金属，随着不列颠铁路的修建，一批又一批的向远方的海港运输，这些便是不列颠工业建立的重要基石。我们将会加快开发对铁路沿岸的矿产，并给予那些之前阻碍我们的人一些自力更生的途径……"
AOR_ENG_yanxiancunzhenfazhan_desc:0"新伦敦、新科克、新阿伯丁……通过这些地名，你可能以为你身在美国，然而这是炎热到不能再炎热的非洲。大量的英国本土以及欧洲劳工涌入到这片陌生的大陆，深入那些未被开发的草原与雨林，沿着铁路线建立起了一个又一个的小镇。这些小镇逐渐成为所在地经济的中心，并吸引引了大量土著人前来交易或者参与劳动，那我们自然就要利用它，并且发扬光大。"
AOR_ENG_tigaojihuayouxianji_desc:0"太慢了，太慢了!这铁路要修到猴年马月才能完成？首相先生可等不了了。铁路修建之初的甜头已经让不列颠赚得盆满钵满，社会矛盾也有所缓和。现在就将铁路计划提到政府工作的最优先级，并且开动我们的国家宣传机器，大力宣扬铁路计划，让更多的人去到非洲。英国人，拿好你的铁锹和铲子!"
AOR_ENG_guojiajihua_desc:0"大卫·劳合·乔治早在大战前就曾经提出过一个宏伟的国家方案：通过政府对市场以及社会层面的主动运作促进英国的经济与社会的可持续发展，解决贫富差距，建立完善的福利制度以及更平等的殖民地政策等一系列措施，这是使英国能够继续领先于世界；这就是大名鼎鼎的“国家计划”。大战后，首相先生终于有时间去实现这雄心勃勃的目标。当然，这项计划自然有大批大批的老骨头与自由主义者们反对，但不列颠的军舰，正处风头，怎能不破浪前行呢？为了不列颠的未来，就让命运的齿轮开始在我们每一个人运转……"
AOR_ENG_jieshouyindulaodongli_desc:0"这是计划的第一步，我们的重点居然放在了印度……没错，印度人长期在不列颠帝国的体制下被视为下等臣民，但他们的人口数量是如此的惊人，以至于我们英国的工业品根本不够使其彻底消化，但印度人依然长期生活贫困与愚昧中。首相先生将宏伟的计划带向了印度洋，通过国家的财政补贴促使大量英国企业前去印度设厂投资，加快对印度劳动力的就地消化，从而使其有足够的财富能够转移支付回英伦三岛，支持我们的建设。"
AOR_ENG_jiaqianglianbaomaoyi_desc:0"帝国联邦的构想已经成为事实，不列颠将迎来一个新的时代与体系-一个宗主国以及其他殖民地或自治领关系更加特殊的时代，但更加紧密的一个体系。大战期间的德国海军战术严重干扰了帝国的海上运输线，影响持续至今，如今我们将动用不列颠帝国的海上资源去努力使航运业恢复正常状态，同时控制殖民领地的那些不稳定的因素……包括那些胆敢挑战英国本土企业的人。"
AOR_ENG_lengzhanchoulao_desc:0"协约国的英法两国最终还是因为国家利益的冲突而解体了，这是完全无法挽回的结局。首相先生深知这一点，并迅速在拟定了一份军事以及经济的综合计划。我们将会在接下来的几年里与法国逐渐在各个环节展开交锋，并以尽可能避免热战的形式来获取英国的胜利-尽管法国如今孱弱不堪，但他们仍然是我们的最大威胁。同时，关于英国情报机构的建设工作也即将收尾，首相先生期待着他们能发挥更大的作用……"
AOR_ENG_fazhanbentujiaoyu_desc:0"随着工业革命的发展，英国的工业部门已经达到了一个新的阶段。社会上的企业以及各部门单位对于高素质高知识人才的需求越来越大，同时社会上的乱象也时刻在提醒我们要提高人群的教育素质。首相先生早已拟定了一份教育计划-包括实行九年义务教育，进行大学翻新以及建立大学分校等措施，由社会投资以及国家财政承办共同承担。相信这将会使不列颠的教育以及人才素质更上一层楼。"
AOR_ENG_kaishexuexiao_desc:0"教育不光是在本土发展，英国拥有一个史无前例的国家联盟以及极其广阔的殖民帝国。将我们的教育四散开来，为我们落后的盟友带去文明的一些曙光-通过一些“细微的教育”使得他们更加倾向于我们。在我们的殖民地或者自治领上要更不遗余力地推广英式教育，使我们的帝国联盟在思想上万众一心，合为一体。"
AOR_ENG_jiaqiangmengyoutuanjie_desc:0" 协约国仍然作为一个超级联盟存在于地球上-尽管他已濒临解体。如今我们将保全我们自己的盟友，构建一个属于英国的“海陆防御圈”。日本、中国的一部分、以及葡萄牙、希腊等地，都是英国的重要战略据点与合作伙伴。如果我们失去了他们，不列颠的海外利益将会遭受严重打击。首相先生将会很快拟定一个从属于国家计划的，主要以经济和军事交流为主的外交计划，指导新的外交方向。"
AOR_ENG_shijiekewanglodon_desc:0"伦敦固然是世界的超大都市，但实际上经过几十年的发展，伦敦的设计规划早已有许多不合理之处-贫富差距的问题困扰了城市的住房建设，同时外城的急速扩张以及人口的大量涌入造就了数不尽的破烂街道以及居高不下的犯罪率。劳合乔治将会动用英国以及伦敦政府的经济军事手段对伦敦原有的规划进行大刀阔斧的改变，使其变成我们梦想中的繁华都市。"
AOR_ENG_yongshifanrongbuliedian_desc:0"尽管只是第一阶段，但我们的工作已然收尾。在这一段时期的建设成果让人满意，徐徐春风又刮向了英伦三岛……从风暴肆虐的好望角到白雪皑皑的阿拉斯加，从黑金汩汩的尼罗河到天蓝梦幻的多瑙河，从繁荣华丽的香港到戒备森严的直布罗陀，属于大不列颠的大圆舞曲交织在一起，谱写出一曲新时代的壮丽华章。乐曲里，属于不列颠尼亚的治世已经到来，不列颠尼亚，咆哮吧，你生当如此，享万世之荣光!？"
AOR_ENG_dabuliedian_fengyupiaoyao_desc:0"时钟在滴答作响，日落的余晖洒在了窗台之上，一切都在向着不可挽回的方向发展，法兰西没有听从我们的劝谏，而爱尔兰也依旧没有屈服。我们就像一艘大船一样在风暴中航行，随时有可能万劫不复，失去不列颠民族的荣光。旧日的联盟已成幻影，而法兰西与英吉利永远是敌人-这从未改变，我们必须做好准备……"
AOR_ENG_xiongxiongranshaodefeicuizhidao_desc:0"以旧日的幻影为料，以惨烈的变革为引，一场烈火开始燃烧整个翡翠之岛。爱尔兰最终化作了一个可怕的梦魇，共和军已经开始行动，而议院的议员们还在争论不休。这熊熊的烈火已经烧到了伦敦，极端民族主义者和社会主义者也开始蠢蠢欲动，我们就如同大海中的孤舟一样，身陷波涛之中。首相先生，我们该怎么办？"
AOR_ENG_qubaxiaohuozimen_desc:0"终于，经过长时间的准备工作后，我们终于可以向那帮可恶的叛徒展现不列颠的怒火了，让所有部队做好最后准备，谨遵三条原则-所有镇压部队有权逮捕或拘留任何叛乱与独立份子，所有部队可以在必要情况下使用致命手段进行镇压在极端情况下(由战场指挥官自行定义），可以使用重型火力支援，装甲部队，空中支援等等。我们要让他们知道子弹、掩体和意志无法保护他们，只有对不列颠的忠诚才可以!"
AOR_ENG_suqingfaguojiandie_desc:0"现在，未来就在我们眼前，而法国却在一意孤行。我们曾一同抗击凶残的德意志人，我们可以让人类走向永恒，可如今，他们被被激进所裹挟，把往昔的荣光抛弃，我们无法拯救他们，而他们又在这碧绿色的岛屿上对我们痛下杀手……现在只需要一纸密电：凡逮捕或疑似为法国间谍者，可直接由前线指挥官或当地执法机关自行处理。这些毒蛇与猛兽的机关自然会土崩瓦解，去撕下他们虚伪的面具!"
AOR_ENG_yuyanyule_desc:0"鸣中，在罢工潮的呐喊中，《不列颠及大英帝国紧急状态法》在血河中诞生。规定不列颠以及整个帝国将进入如大战一般的战时状态，直至爱尔兰的问题被解决，在此期间，军队将会得到全力的保障以及高度的集中领导，以保证祖国的稳定，而社会也将受到管制，这一切由首相先生亲自操盘。不列颠的子民们，同仇敌忾，共度难关!"
AOR_ENG_butingxiedejingong_desc:0"既然他们想要战争，那么慷慨的帝国就赐予他们战争!进攻!不计代价的进攻!士兵们，我知道你们疲惫不堪，我知道你们弹尽粮绝，我知道你们乡愁缠心，但是你们的对手亦当如此，敌人要取你性命，唯有表现的更顽强，更坚韧才能取得胜利，坟墓里，有的是时间休息!当这群爱尔兰蠢猪无视我们最后一次和谈的善意之时，他们便将明白血与火的恐惧，吾等作为不列颠的雄狮利爪，当以荣耀为忠诚，在这最后一场决定女王王冠明珠去留的战争中抛洒热血，将属于我们的财富，属于我们的荣耀，属于我们的秩序，属于我们的和平，属于我们的和平!"
AOR_ENG_zhengmingzhengfuquanwei_desc:0"随着第二次利物浦会谈谈判破裂，以及大不列颠军队迅速而铁血无情的镇压，燃烧翡翠岛整整一年的战火就此落下帷幕。无论是帝国的铁腕镇压军还是爱尔兰的不屈叛军都筋疲力尽，对帝国尊严忠贞不渝的坚守捍卫，亦或者对翡翠宝岛独立自由的决死行军，是每个人维持着这场血腥厮杀继续下去的唯一理由，而如今随着不列颠军队一路攻坚克难，属于大不列颠的秩序及和平重归于岛。这场名为爱尔兰独立战争的大戏尾声已绝。"
AOR_ENG_zerenerzhi_desc:0"随着第二次利物浦会谈的胜利召开，燃烧翡翠岛整整一年的战火就此落下帷幕。无论是帝国的铁腕镇压军还是爱尔兰的不屈叛军都筋疲力尽，对帝国尊严忠贞不渝的坚守捍卫，亦或者对翡翠宝岛独立自由的决死行军，是每个人维持着这场血腥厮杀继续下去的唯一理由，而如今随着和平协定的成功签署，来之不易的和平终于能抚慰人民心中的伤痛。这场名为爱尔兰独立战争的大戏尾声已绝"
AOR_ENG_womendeweidayindao_desc:0"妥协，争吵，拖延，分歧，但无论如何，和平似乎终于莅临我们之间。《英爱和平条约》如同药膏绷带，缠绕我们流血伤痕；亦如当季好雨，滋养希望之种；帝国收获久违安宁，爱尔兰也获得了他们想要的权利。父母不用再埋葬他们的孩子，妻子不用再埋葬他们的丈夫，孩子不用再埋葬他们的父亲，玩耍的孩童不用再担心翱翔的铁鹰会降下死亡，疲倦的工人不用，农民也不用……也许和平就是这么简单，也许和平就是这么理所应当，也许和平就本应如此，而不单单是所谓的条约中的几条冰冷条款，但它终于屈尊降临，为这场红黑歌剧的最终章，画上一个洁白素美的句号。"
AOR_ENG_diguotongbao_desc:0"在这场战争持续的时间中，无数珍宝已被战火焚毁。那些财富艺术，建设成果，鲜血生命都化为了飘零不列颠群岛的铅色雾霾，深深嵌入每个人的脑海，诉说战争的苦难仍旧徘徊与我们之间。但来之不易的和平让这片蓝天下的每一个人最终能够自由呼吸，当古老的帝国与年轻的政权并肩站立与战火的废墟之上，并在不确定的未来中摸索前行时，希望的阳光从地平线照常升起。也许有一天，两个民族之间深深的隔阂也能沐浴在和解的阳光下，消融殆尽，每个凯尔特人和不列颠孩子都能亲密无间，情同手足…………无论这希望多么渺茫。"
AOR_ENG_posuitongmeng_desc:0"一切都在向着不可挽回的方向发展，法兰西没有听从我们的劝谏，旧日的联盟已成幻影，我们必须做好准备。世间可能再度归于混乱，尽管法国人并不值得信任，但这并不代表其他的国家不值得信任，他们依旧是我们的潜在盟友，只要我们积极游说，他们必然可以明白自己做错了什么。而他们也将成为对抗法国的利剑与坚盾。从南到北或是从东到西，无论是贫瘠的非洲还是辽阔的大洋，无论哪里都有我们的殖民地。相同的法国也掌控着辽阔的土地，一旦联盟破裂法国必然会向我们的殖民地渗透，为此，我们必须未雨绸缪，瓦解他们的诡计……"
AOR_ENG_posuidejiudi_desc:0"那头在大战中已经失去生命力的野兽，如今的德意志邦联，正四分五裂，苟延残喘。他生而不易，死于耻辱!尽管我们对德国发泄了仇恨，并给予了他们严厉的惩罚。但我们仍然需要提高警惕-德国境内的布尔什维克正在迅速的崛起，其他不利于我国的团体也在蠢蠢欲动，大有在中欧掀起山雨来，风满楼的恐怖革命之势。利益总是在平衡中确定，为了欧陆的安全，我们必须要有所作为。"
AOR_ENG_yuandongqingbaozhan_desc:0"维系于袁世凯总统一人威严与斡旋的，名为中华民国的脆弱青瓷终于在内政外敌的重压之下粉碎，赤匪，自由派，北京政府，南京政府互相对峙，硝烟与血腥味萦绕整片中华大地。我们的影响，我们的财产，我们的势力范围危在旦夕!必须立即向我们的直系朋友送去支援，让代表帝国利益的高温淬火，重塑这古老帝国以致我们心仪模样!"
AOR_ENG_liyuanhong_desc:0"冯国璋作为中国的杰出领袖，长期与不列颠政府保持极度友好的关系-我们深知只有他才能领导一个新的中国，并且开展有利于两国的建设。如今的冯国璋正深陷于中国的内战，无法自拔，但他保护英国财产以及继续对对英国政府友好的态度使我们深受感动……为此，我们将倾尽我们能在亚洲使用的一切，哪怕是帝国军队，我们都要为冯国璋挽救中国的未来!"
AOR_ENG_yinglianbangmingzhu_desc:0"Hongkong，你是一座永远不眠的城市，是不列颠海洋中的掌上明珠。大不列颠已经滋养了你80年，将你建成成了全东亚最为繁华的地带、最耀眼的孩子。现在，是时候该贡献出你的力量，回报英国母亲了……将我们的华人特遣队以及志愿军们派往中国内陆，为中国的未来以及英国的未来奋勇拼搏吧!"
AOR_ENG_rishengzhidi_desc:0"“英日同盟百年利好”可不是说说而已，又到了该维护我们远在地图另一端的盟友的关系的时候了。孤悬的旭日与孤傲的鸢尾为太平洋的利益剑拔弩张，我们身为盟友也应尽心竭力的提供支持。日本，远东镇压法国的桥头堡，如今东亚战乱四起，绝对不能有半点闪失，英国绝对是他们需要的坚实后盾。继续维系这场甜蜜的外交联姻吧，希望旭日的光辉能永远照亮雄狮威严的鬃毛。"
AOR_ENG_yingxiangeguo_desc:0"_desc 影响各国"
AOR_ENG_gongtongfangyu_desc:0"伟大的英日同盟啊!友谊的花朵在今天终于开放。东亚的局势固然时刻牵动着不列颠的魂魄，但为了稳定中国以及亚洲的局势，我们必然要加深与日本的进一步合作，并且公开发表我们的正式声明-从此以后，英国日本同为一体，携手出战，击破这世界的一切黑暗，使得欧洲与亚洲连成一片充满自由歌声的伊甸园-而一切逆反之人最终将臣服于我们的脚下……"
AOR_ENG_rising_star_desc:0"冯国璋的不断胜利使得我们充满了自信-这是中国的胜利，也是亚洲未来的胜利。现在我们已经有充分的理由以及足够的勇气公开的宣布我们的目的-将冯国璋政府指认为中国唯一的合法政府，并且公开派遣军队进驻中国长江沿岸地区。这势必会引起整个亚洲乃至世界的震动，但这又如何？为了不列颠未来的亚洲金库，我们甘愿给这道保险门再上一道可靠的闭锁。"
AOR_ENG_buduande_manpower_desc:0"亚洲惊人的人口能够耗干不列颠的所有精力，但这并不代表不列颠就不能利用亚洲的一切区称霸世界。如今中国的残酷战争超出了我们的预想，原先的支援计划几乎全被打乱。如此一来，我们也不必再带上隔空手套；脱下我们的礼服与面具，露出雄狮的獠牙，组建一支强大的亚洲军队。向着大陆内不懈前进!"
AOR_ENG_quebaojiuji_desc:0"让帝国的光辉感召摇摆不定的羔羊。一船船物资便可源源不断的流入大洋彼岸的海港……这是德国人民心中的黄金-小麦、水稻以及白面包，我们能让德国的粮食市场第一次不再紧缺，能让饥肠辘辘的德意志民族焕发生机，并且，我们还要给为柏林政府发行无利国债。这不就是我们帝国应该做的荣耀之事吗？用剑予以敌人惩罚，用面包给予弱者安慰，将团结之力击破黑暗之地!"
AOR_ENG_liuzuoguoneifazhan_desc:0"经济问题就是这么简单，只要紧跟不列颠尼亚的脚步，维护我们的经济地位，他就会轻易的被解决，我们同样能轻易谱写新时代之壮丽华章，藐视那些还在苦苦挣扎于经济问题的无能对手。只要无视那些被当成消耗品榨干的殖民地经济，忽略那些无能为力的赤贫民众，抛弃那些待偿的国家债券，视而不见那些为发动争霸而被作薪柴熊熊燃烧的芸芸众生便可，万事大吉!"
AOR_ENG_baerganlangyan_desc:0"亚德里亚海与爱琴海之间的这片土地上，已经成为了无数次战争的导火索，在这片土地上生活的人们在极度的煎熬中已经不能被称之为人类-而是一台台杀戮机器。如今，巴尔干战火再起，全世界的目光又向此地汇聚。南斯拉夫、罗马尼亚和保加利亚等野心国家。正在希腊与土耳其的战争中作壁上观，敲打算盘，妄图争取更大的利益，而这必然会危害帝国在东地中海的利益。为此，我们将开展与他们深入交流，维持帝国在欧洲的威望。"
AOR_ENG_zhengduoxilazhizhan_desc:0"希腊作为世界大战的胜利者早已不再是曾经的小小弱国-但这种胜利是不列颠与法兰西赐予他的，不过如今希腊人的野心已经超出了我们的预想。在新一轮对土耳其的战争中，希腊已经全然不听国际联盟以及不列颠的调和，如一只疯狗般持续作战、深入内陆，最终触碰到了我们的底线。但恶狗终究需要用骨头来安抚，为了防止希腊完全独立于我们甚至于偏向法国，我们必然要对希腊作出命运的裁决……"
AOR_ENG_qiamiehuomiao_desc:0"欧陆的布尔什维克势力愈发膨胀，红色恶魔即将席卷所有自由的人民……这是不列颠最不愿意看到的事情。一些特殊手段-谍报、暗杀、远程镇压、给予援助。一切一切的手段都可以用得上，不过只是做了有碍于欧陆国家颜面的事，但这对于他们来说又算什么？最终，欧罗巴终将在不列颠的怀抱中重新获得自由。"
AOR_ENG_jiedalu_desc:0"_desc 饥饿大陆"
AOR_ENG_zhengduoxuliya_desc:0"_desc 争夺叙利亚"
AOR_ENG_zhifuxiaochou_desc:0"_desc 制服小丑"
AOR_ENG_fazhankapudun_desc:0"_desc 发展开普敦"
AOR_ENG_weigengweidadeshuwudaxiajichu_desc:0"_desc 为更伟大的事物打下基础"
AOR_ENG_xindaluwaijiao_desc:0"畸形怪胎，美利坚合众国，这个从来都没有被视为是一个正常国度的政府如今迎来终焉。自南北战争以来瘫痪的中央权威神经和托拉斯敲骨吸髓的啃噬让白头鹰之躯骨肉分离。尽管中央政府努力弥合分裂，但如同其前总统林肯说的一般讽刺而又必然的是：一栋裂开的房子是站立不稳的。无人能阻止这些盘根错节的伤痕坏死感染，眼见美利坚血肉模糊……我们就此行动!"
AOR_ENG_nanmeifangyutongmeng_desc:0"大不列颠的雄狮面对敌人金刚怒目，但面对其羽翼之下饱受苦难的人民向来慈眉善目。如今的南美肆虐着红色恶魔与其他的黑暗势力，而称霸一方的法兰西则失去了荣光。我们向战火之地输送人道主义援助，让帝国的光辉感召摇摆不定的羔羊。一船船物资便可源源不断的流入大洋彼岸的海港。当然……援助的物资中成山的军火只是为了协助当地唯一的合法政府镇压叛乱，全副武装的成建制英国陆军也仅仅只是为了确保帝国财产的安全。啊，为南美这片地区带来和平，安抚我们躁动不安的野心!"
AOR_ENG_ganshejianada_desc:0"吹起的焚风引燃全球，即使是不列颠逃脱命运：美利坚疫病缠身，终以血腥战争奏响通往未知前方的交响乐，也许这次她方能真正主宰天命。但魁北克的局势已经动摇了我们前行的方向。一头巨狮发出了他最为猛烈的怒吼，向加拿大进军!我们将在战火中坚守，成为唯一，成为公理之胜者。而我们的帝国孤悬于英吉利海峡之上，终将铸造新世界的美好明天，属于帝国的美好明天!"
AOR_ENG_fengsuokuibeike_desc:0"这些法兰西的遗民不过就是尝到了不列颠政府施舍给他们的一点甜头，就胆敢如此的放纵自己……魁北克的独立必然是对帝国在北美建设计划的巨大威胁，如今的骚乱愈演愈烈，我们不能再以低烈度的战争形式使其屈服了!从现在起，所有通往魁北克地区的航线一律封锁，为了不列颠，我们敢于公开宣称，将会对违反条例的人或船只进行无差别攻击。既然他们如此想见到自己祖先的国家，那就把他们炸死、饿死，去地狱里见到你们的祖先去吧!"
AOR_ENG_zuobishangguan_desc:0"可惜精神错乱的巨人依旧是巨人，我们无意，也无力再卷入一场旷世之战，但我们依旧可以以不那么激烈的手段尽己所能的维护我们的利益。例如，支援我们的盟友，掠夺更多财富，强订苛刻条约，让焚烧整片大地的战火燃烧的更剧烈一点吧。"
AOR_ENG_yingmeihuzhuxieding_desc:0"为什么帝国又要卷入这场毫不相干的战争？为什么帝国要在这场战争中支持什么联盟国？除了我们永恒的利益之外，为自由和公理而战难道不是帝国为维护万世荣光的必要，且合乎天理之举吗？你且驻足倾听：这是一曲宏大的赞歌，由美利坚联盟国丰饶肥沃的田野里工作的农民们谱写出音符曲调，由美利坚联盟国热情高涨的工人们谱写出华美辞藻，由大不列颠自由的人民谱写的这曲华美而宏大至极的赞歌，值得我们所有人颂唱，难道不是这样吗？至于所谓“联盟国的黑暗真相”与“英帝国主义的丑恶嘴脸”，与其思考这些谋逆鼠辈编织的荒谬言论，不如思考……"
AOR_ENG_kuodabeimeishilifanwei_desc:0"北美大陆，这片我们本应最熟悉的大陆，对于帝国却隔绝如坚硬壁垒。曾几何时，我们的父辈首次殖民这片光荣与希望的热土，帝国古老而骄傲的自治领加拿大也坐落与此百年之久。所谓美利坚狂傲白鹰的昭昭天命也由帝国亲手击灭粉碎，但无论如何，我们现在对亚美利加知之甚少，而情报，则是现代战争如同人的五感一般不可或缺的一部分。我们必须刺破这笼罩北美大陆的孤立隔绝之坚硬壁垒，让迷雾揭开面纱。"
AOR_ENG_weiziyouerzhan_desc:0"纵使有太多的毁灭与分歧，鲜血与苦难，但眼泪无法带给人民自由，唯有战士才能捍卫和平。所以，我们不需要面包，需要子弹与枪炮，不需要懦弱，仅需刚毅与坚强。更将有另一批伟大的将士们组成志愿军，这多么美好，多么光荣，多么崇高的词语，我们不求功名，亦不求回报，纵使死于战火的硝烟中，也好过当沉默的羔羊!士兵们，拿起武器跨越大洋!再投目远方，美利坚分裂的土地上，北方邪恶的分裂势力病入膏肓，唯有南方的自由博爱政府才能团结国家，在自由的旗帜之下，伟大的人民团结起，忠于你的家园直到倒下!"
#军事线
AOR_ENG_weiyuanhuijihua_desc:0"鉴于世界大战后的新形势，以及对抗我们的老对头法国人。帝国防务委员会制定了新的军事重整计划，以确保帝国有足够的实力应对法国集团的挑战，维持帝国对于世界的掌控权。"
AOR_ENG_shenshilujunzhengce_desc:0"在世界大战中，我们的陆军规模扩大到了前所未有的地步，这种情况自然不能长期持续。但是对于应该保留何种程度的陆军规模，我们却产生了分歧。一派人认为为了彻底压制法国的挑战，我们应该保证陆军可以随时有能力在皇家海军的投送下干涉每一场战争；而另一派则认为，随着威斯敏斯特-凡尔赛体系的建立，英法冷战下英法间将不会有大规模的直接战争，而更多需要面对海外各地与法国集团的斗争，应该扩充海外卫戍部队以在冷战中抢占先机。两派各有其道理，我们将审视现有陆军政策，并确定采纳哪一方的建议。"
AOR_ENG_chongshendaluyiwu_desc:0"毫无疑问，作为世界的超级强国，英国有能力也有必要承担对欧洲大陆的义务。历史证明，只有欧陆均势才能确保持久稳定的和平，而今法国独霸欧陆，已然成为世界和平的最大威胁，也是帝国安全的隐患，我们需要建立一直足以战胜法国的陆军，可以时刻保卫欧陆乃至世界的和平。"
AOR_ENG_zongjiedazhandejingyan_desc:0"世界大战所展现的总体战颠覆了旧有的陆军学说，而作为这场大战的胜利者，自然会从中领悟到领先的陆军思想。"
AOR_ENG_banxingshinianguize_desc:0"应当假定，在未来的十年内，英帝国不会进行任何大规模的战争，因此无需为此目的组建远征军，陆军主要的职能是为印度、埃及、新的委任统治地和所有帝国统治下的属地(自治的除外)提供卫戍部队，为帝国的盟友提供庇护，以防范冷战中可能来自法国的仆从国和代言人的进攻。"
AOR_ENG_yanxuguizuchuantong_desc:0"贵族充当军官是大英帝国长久以来的传统，在一战中，贵族青年们充任高中低各层军官，恪守了贵族的荣耀。世界大战的胜利证明了我们陆军传统对战斗力的提振，应当继续保证英国陆军传统的延续，让充满荣誉与尊严的帝国贵族担任军官。"
AOR_ENG_tibapinminshiguan_desc:0"在世界大战中，我们基层士官的指挥暴露出很大的弱点。贵族军官接受的教育大多指向宏观的战争和战役，而一线战斗指挥教育缺乏。我们可以提拔基层士兵的优秀者担任士官负责一线战斗，而贵族军官只用负责对战争和战役进行指挥，这也可以激发士兵的士气，使人尽其才，物尽其用。"
AOR_ENG_yuanzhengjunchangbeihua_desc:0"在世界大战中我们成立了远征军，并成功地干涉了欧陆战事，战胜了同盟国集团。这证明远征军是未来英国陆军的方向。我们应当保证远征军的规模，并正式将其常备化，并以其为核心打造一支足以与法国争雄的陆军。在构想中，远征军将可以在欧陆乃至世界的任何地方阻止法国陆军的攻势，制止法国的扩张。"
AOR_ENG_daxueyubeijunguanjiaoyu_desc:0"世界大战证明，在总体战中基层军官的损失会非常严重，而基层军官又是前线士兵士气与战斗力的保证。虽然我们早已在各大学建立过预备军官训练团，但为了未来可能更大规模的总体战，应该建立制度化和普及化的大学预备军官教育体系。"
AOR_ENG_quanqiuganyu_desc:0"毫无疑问，帝国的陆军在一系列改革后实现了脱胎换骨，我们可以自信的宣布，我们的陆军可以在世界的任何一个角落阻止法国及其仆从国的战争行动，甚至直接正面击败法国的军队，维护世界的秩序。"
AOR_ENG_xinbentulujuncaodian_desc:0"后背兵役制度是在军队作战素质的保证，它可以使得在面对巨大伤亡补员后部队仍然可以保持士兵的作战素养。我们虽然较早建立本土军作为后备兵员，但其训练方式在新形势下已经过于宽松和落后，委员会决定集合专家制定新的操典，实现后备兵员的高作战素养。"
AOR_ENG_kuobianhaiwaizhujun_desc:0"以往我们的传统政策大陆均势，成功维护了欧陆的秩序，并保障了帝国的霸权。而今日我们与法国的争霸，已经不再是欧陆这一隅，而是扩展到全世界。在冷战下，我们不会跟法国产生直接冲突，但难免会有法国的仆从国和代理人对我们的盟友和属地下手，为了面对全球性挑战，我们需要扩编海外驻军。"
AOR_ENG_zhenghehuangjialujunxueyuan_desc:0"世界大战中陆军各种种之间的配合更加紧密，这就对军官的指挥素质产生更高的要求。国防部提议将英国皇家军事学院和皇家军事大学两所军校合并，在桑赫斯特成立一所陆军军官学院，培养综合性的陆军军官，面向未来的陆战。"
AOR_ENG_weichixianzhuang_desc:0"在我们的经营下，帝国的每一寸属地、每一位盟友都将得到充分且即使的保障。帝国的影响将如同天上的太阳，稳定持久的照耀着帝国的势力范围。"
AOR_ENG_shouquanhaiwaizhujunsiling_desc:0"在冷战的竞争范围和烈度不断加大中，我们需要让封疆大吏们有足够相机行事权力，应使海外驻军对各种挑战做出及时反应，我们确信这将有助于帝国的利益。"
AOR_ENG_gaijinqingwuqi_desc:0"无论战争怎么变化，轻步兵都是军队构成中不可或缺的部分，改进步兵的武器将是长久的事业。"
AOR_ENG_shiyanmotohua_desc:0"在总体战中，补给线就是生命线。一战中补给运输的困难使前线添加了众多不必要的伤亡。而摩托化的试验可以极大改善前线士兵的补给。"
AOR_ENG_gaoxiaohuopaozhiyuan_desc:0"世界大战中，集中的炮火支援所产生的效果令人震惊。毫无疑问，如果不想在未来的战争中被法国之类的陆权强国压制，强化我们自己的炮火支援是必要的。"
AOR_ENG_liezhuangbubingtanke_desc:0"坦克已经被证明是步兵卓有成效支援车辆，我们作为第一个将坦克投入使用的国家，自然要保持在该领域的领先。"
