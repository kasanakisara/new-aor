 ##第二阶段国策本地化
 ENG_baoyuzhizhong_quebujianliming:0"暴雨之中，却不见黎明"
 ENG_baoyuzhizhong_quebujianliming_desc:0"作为世界大战毋庸置疑的胜利者，从粉碎了美利坚白鹰的昭昭天命，到放干了野心勃勃的德意志黑鹰的硝烟铁血，再肢解了贪得无厌的沙俄灰熊的臃肿肥躯，并安抚了目中无人的高卢雄鸡的逼人傲慢之后，大不列颠理应君临世界，统辖全球，享尽无上荣光!可是，为何从伦敦四通八达的长街到康沃尔广袤的田野，从爱丁堡街巷的灯光到曼彻斯特工厂的轰鸣，寡妇为凄惨死去的丈夫而哭，孩子为层层固化的阶级而悲，工人为不见日月的工时而泣，农民为辛劳乌有的剥削而哀。大不列颠这艘暴雨中的航船，究竟统治何地？究竟统领何人？究竟黎明何方？究竟黎明何方……"
 ENG_shisheiduozoulewmdemianbao:0"是谁夺走了我们的面包"
 ENG_shisheiduozoulewmdemianbao_desc:0"当战火冲天之时，当帝国子民为胜利全力以赴之时，当帝国将士为荣耀浴血搏杀之时，是那些鼠辈拒不赴命，安逸的躲在他们卑劣的鼠巢里隔岸观火？当公理得胜之时，当帝国子民回归生活之时，帝国将士解甲归乡之时，又是那些蛀虫恶意竞争，夺走了帝国公民应得的面包的权利？而如今，这群贪得无厌的凯尔特人还胆敢得寸进尺，从无中生有的压迫中寻求所谓自由的权利。\n很快，这些夺走我们面包的叛匪将在铁与血中得到他们应得的报应"
 ENG_meiyouxiaoyandezhanhuo:0"没有硝烟的战火"
 ENG_meiyouxiaoyandezhanhuo_desc:0"当海峡彼岸响起第一曲自由，平等，博爱的高歌时，爱尔兰何尝不曾艳羡那难以企及的自由；当海峡彼岸飘起第一面蓝，白，红米字战旗时，爱尔兰何尝不想高升绿，白，橙三色的旌旗；当海峡彼岸勇于第一次战胜人民脊背上的王侯时，爱尔兰何尝不愿退却蹂躏酷虐的征服者；似乎从未有人真正聆听我们爱尔兰人的哭泣，从未有人真正直视我们爱尔兰人的苦难，从未有人真正在意我们凯尔特人缄默的悲伤，唯有我们永远温柔慈悲的母亲翡翠岛啊，你昭示灾祸的层层浪涛，预示不详的片片灰云，注解战争的铁灰阴霾，为我们这场没有硝烟的战火与愤怒低唱。母亲啊，别为你的儿女忧怀，战火没有硝烟是烈焰滔天的前兆，而当那火点燃，定会焚尽你的枷锁与苦难。"
 ENG_pantumendeqiuge:0"叛徒们的囚歌"
 ENG_pantumendeqiuge_desc:0"一遍又一遍，爱尔兰岛看守的囚犯们狂热的咆哮着他们煽动人民的囚歌，殊不知囚犯之所以是囚犯，正是他们违逆大多数帝国公民利益的下场!妄图分裂国家，斩断民族，摧毁不列颠尼亚万世根基的叛匪，有什么资格自称代表所谓人民的利益，人民的意愿？处处低唱着或嘶哑或高昂的囚歌的囚牢，是时候迎来彻底的荡涤了"
 ENG_hangluwutou:0"航路无头......"
 ENG_hangluwutou_desc:0"大不列颠拔锚启航，但那期冀中的光荣与希望似乎从未到来……正如结束一切战争的战争，似乎什么都没有结束一般……战争的不详阴霾又一次笼罩帝国方舟的航路，又一场可怖的狂风骤雨不可避免的席卷每一个帝国公民的生活。爱尔兰的卑微农奴们妄图推翻大不列颠的万年治世，不列颠的可悲殖民者们妄图扑灭爱尔兰人自由的滔天烈火。爱尔兰独立危机，正式拉开早就遮掩不住的轻薄帷幕，让好戏在不列颠的不知驶向何方的无头航路上，登场吧!"
 ENG_yiwulizhifutamen:0"以武力制服他们"
 ENG_yiwulizhifutamen_desc:0"爱尔兰的叛徒们自觉聪明的选择在世界大战结束时对他们眼中疲惫不堪的不列颠雄狮发难，以为我们利爪已钝，目光已暮，觉得自己能够轻松的把不列颠主人驱逐出她的后花园。他们这群不知天高地厚的农奴若真这么想，那么他们就会迎来一个他们永生难忘的教训：不列颠精密高效的战争机器已经隆隆作响，铁血磨练的百战之师已经整装待发，君临世界的钢铁意志已经剑指他们可悲的小岛。叛乱，就会被镇压，这是永恒不变的真理。"
 ENG_qudiyiqiebaozhang:0"取缔一切保障"
 ENG_qudiyiqiebaozhang_desc:0"事实上，在此之前，将爱尔兰变为自治领的计划在国内呼声水涨船高，认为我们可以通过给爱尔兰人部分梦想中的自由换取他们对帝国的忠诚。我们一直探索将爱尔兰变为自治领的可能性，并且支援爱尔兰地区再发展。但现在，这些肮脏的爱尔兰蠢猪既然以武力挑战帝国，那么爱尔兰将永远不会是一个国家，而仅仅是一个地名；爱尔兰人将永远不会是帝国公民，而仅仅是不列颠的农奴；爱尔兰岛将永远不再被称为翡翠之岛，她所得到的大不列颠帝国的善意与妥协，一同被战争的业火和镇压的铁靴，化为立于尘埃和灰烬之上的不列颠忠实采邑。"
 ENG_aierlanren_yongshiweinu:0"爱尔兰人，永世为奴"
 ENG_aierlanren_yongshiweinu_desc:0"要怎么做，才能彻底粉碎一场革命？彻底瓦解一个国家的意志？彻底根除一个民族的抵抗？枪炮的硝烟尚只能暂时浇灭抵抗的火光，而永世的奴役才能彻底征服叛贼的魂灵。若其人民从未接受所谓独立之荼毒，若其子民自幼被灌输奴性之光荣，革命的土壤从何而来？这个名为爱尔兰的国家，爱尔兰的民族的文化，精神，灵魂都会在我们高效的奴役下，化为帝国前进的燃料。至于要焚尽多少人的希望，梦想，鲜血，生命……都是他们咎由自取，而我们称之为：必要之恶。"
 ENG_chonghuizhanshizhuangtai:0"重回战时状态"
 ENG_chonghuizhanshizhuangtai_desc:0" 战时状态，这个可怕的名词，上次流传与不列颠的长街短巷还是不久前的旷世之战，战争的可怖铁幕席卷了每一个尚能呼吸的不列颠公民，令他们献上金钱，健康，甚至生命。每一个帝国的子民都不愿再忆起这不堪的过往。可是如今，看来战争的阴霾仍不愿放过不列颠尼亚和她的人民，我们必须再一次放弃来之不易的和平橄榄，武装自己以铁与血的战争之矛。公民们，不是我们挑起战争，是战争挑衅我们!不是帝国意图剥夺生命，是敌国意图掠杀我们!公民们，拿起武器，为帝国的光荣与荣耀而战，为更好的明日而服役!"
 ENG_junduisuishidaiming:0"军队随时待命"
 ENG_junduisuishidaiming_desc:0"爱尔兰独立一事事关重大，不仅关乎世界霸主不列颠尼亚能不能管好自己的后花园的脸面问题，而且更关乎海权帝国不列颠尼亚能否在欧陆风起云涌之际有稳定的前进踏板。单单靠义勇满腔的不列颠志士们肯定不够，必须让帝国星罗全球的百战之师立刻集合待命，制定完备的控制计划，进行应急的管制训练，准备充分的战争宣告，让世界看看不列颠雄狮的利刃实早已擦净世界之战的血污，以意志与钢铁磨练如新，这雄狮利剑开封便要见血，而爱尔兰的可悲叛匪们，就是最好的磨刀石。"
 ENG_daponingjiangdediyiqiang:0"打破宁静的第一枪"
 ENG_daponingjiangdediyiqiang_desc:0"演员即位，翡翠岛的大街小巷中，爱尔兰共和军的战士们擦亮刺刀的锋芒，宣传阵线的工人们校对慷慨激昂的样稿；灰雾沉沉的海面上，不列颠的将士们握紧冰冷的枪膛，舰桥指挥室内的军官团发下道道急令；海域封锁，城乡宵禁，全岛戒严……偷渡武器，突破封锁，群众斗争……这场名为爱尔兰独立战争的大戏万事俱备，起义者，镇压者，游击队员，帝国总督，无不手握名为信念的万钧筹码，意图把这翡翠色的宝岛改造成中意模样。在这打破宁静的第一声枪响后，决定翡翠岛命运的剧本即当上演。"
