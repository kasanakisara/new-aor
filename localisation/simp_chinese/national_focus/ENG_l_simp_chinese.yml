AOR_ENG_xietongfazhanlinian_desc:0 "现在已经不是不列颠一家独大的时代-但是我们仍然希望不列颠强盛永远。考虑到经济实力的不同，首相先生决定调整我们的对外经济方针，以更加缓和合作的方式去调和帝国与其他国家间的经济矛盾，并实现在非战争状态下的利益最大化。而帝国联邦的经济计划将会由英国本土政府来统一筹划，针对不同地区采取不同的经济方针，从而实现帝国联邦的经济一体化。"
