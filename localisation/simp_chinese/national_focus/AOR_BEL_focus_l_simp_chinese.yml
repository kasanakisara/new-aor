l_simp_chinese:  
 ##第一阶段##
 BEL_People_exile_who_cry_with:0"万姓流亡谁与哭?"
 BEL_last_hope:0"最后的希望"
 BEL_last_hope_desc:0"我们的政府没有哪怕一寸的比利时领土，但是比利时人的肉体与灵魂依然存在。随国王而来的比利时众多政党组织及成员继续保持自己的工作态度，为如今流亡政府的勉强运行奠定了坚实基础。在前首相宣布退休后的同时，新任天主教党首相德维亚尔进行了宣誓并开始着手治理比利时政府。"
 BEL_Place_of_burial:0"葬身之地"
 BEL_Long_way_home:0"长路归乡"
 BEL_gears_that_eat_people:0"吃人的齿轮"
 BEL_High_quality_citizen:0"高素质公民"
 BEL_Country_of_Belgians:0"比利时人的国家"
 BEL_Minor_concession:0"微小让步"
 BEL_Elite_first:0"精英先行"
 BEL_Building_Congo:0"建设刚果"
 BEL_Crush_rebels:0"镇压反抗者"
 BEL_Slaves_in_cornfields:0"玉米地上的他们"
 BEL_Only_heart_of_restoration:0"只剩复国心"
 BEL_Rwanda_question:0"原住民问题"
 BEL_to_know_how_much_hate:0"欲知亡国恨多少"
 BEL_Red_chaos_mountains_flowers:0"红尽乱山无限花..."
 BEL_Red_chaos_mountains_flowers_desc:0"转眼间不知不觉度过了几年，流亡政府即将正式结束重建，重新开始复国计划。但明眼人都看得出来，埋藏在似乎平和的刚果之间的不可名状物，却是一片随时将会爆发的火山，只需要一阵风，他便会以排出倒海之势摧毁我们的事业……愿上帝保佑比利时。"
 BEL_government_in_exile_desc:0 "比利时流亡政府国策"
 BEL_People_exile_who_cry_with_desc:0 "在那令人永远无法忘怀的世界大战中，成千上万的比利时人民抛弃了自己世代的家业和乐园，随阿尔贝国王前往了遥远的刚果，只为万众一心争取战争的胜利-然而造化弄人，超级大国的一纸条约就让荷兰人统一低地。无数比利时人的家园被夺去了，无数比利时的珍贵财富变成了女王的私产，在那徒有虚名的联邦制之下，却是比利时无数人希望的破灭。如今的我们仿佛孤魂野鬼，被世界所遗忘，漫无目的哭泣，让眼泪随风飘摇在非洲这片黑暗大陆之上……"
 BEL_Place_of_burial_desc:0 "佛兰德斯人要埋在佛兰德斯，瓦隆人就要埋在瓦隆，比利时人千百年来的魂归故里，却在今天就此完全中断。在旧王国废墟上建立起的共和国，不承认我们的合法地位，哪怕是再不起眼再不卑微的刚果比利时人都回不到魂牵梦绕的故乡。而如今的王国公民们，却要面对的是如地狱试炼般的广袤土地：野蛮人与毒蛇穿梭其间，蒸腾的雨林足以让人窒息，以及那些虎视眈眈的大国领地，一切的一切仿佛都在说：看吧，比利时人，这里就是你们最后的墓地!"
 BEL_Long_way_home_desc:0 "比利时人回到故乡的渴望日益强烈，但我们都清楚，回家的途径只有两种-要不放弃流亡政府身份加入共和国，要不然就打回比利时。事实上，由于新生共和国的名声在外，基本没人愿意回归这个丑陋的国家；而之后的军事行动成功性几乎为零……在所有选项都被排除的情况下，比利时只有一种可能-那就是忍耐，将流亡政府和殖民地建设成比利时的模范，最后在寻求列强的帮助。"
 BEL_gears_that_eat_people_desc:0 "比利时曾经有不少描述过工厂恐怖场景的书籍-但放在刚果都通通不适用。我们在刚果拥有成山成海的劳动力，黑人仅仅需要读懂几个单词，便可以流畅地操作一台机器运行，最后将生产成品以极为廉价的方式由政府发放给民众，至于劳动的原住民们也必然会得到他们极为廉价的薪水。这种经营模式以至于利奥波德维尔传出了一句歌谣：“机器运转，比利时吃饱，黑人工作，被比利时吃掉!”"
 BEL_High_quality_citizen_desc:0 "虽然说比利时的教育在欧洲算是名列前茅，但这并不代表刚果的教育建设，在非洲也能名列前茅。事实就是，我们几乎缺乏任何正常的教育设施，仅有的几座城市中的学校和培训机构完全无法满足如此多的流亡人口。是时候该重视政府的作用了，我们会将流亡政府的一部分财政直接投资于教育，并且“促进”更多的殖民地原住民前往城市，加快我们的教育设施建设。尽我们力所能及之处培养高素质公民。"
 BEL_Country_of_Belgians_desc:0 "拜托，谁告诉你黑人能够在流亡政府获得公民权？走吧走吧!比利时虽然已经孤悬海外，但比利时人依旧是比利时人，比利时政府也只能依靠比利时人的雄伟力量来完成比利时的任务。我们不是要用自私的利益，去锁住人们怜悯他人的内心，但为了比利时的未来，现任政府的安危。我们必须在殖民地重申比利时以及比利时公民的统治地位，只不过，公民内部也分三六九等罢了。"
 BEL_Minor_concession_desc:0 "好吧，高等人和低等人也只是文明国家粗俗的话。比利时公民当然是人人平等的，宪法里写上的!对于参与政府运作以及复国计划的人选，不依靠广大的比利时人民，是根本行不通的。我们决定改变政府的选拔机制，开始降低要求，去吸收更多的比利时公民，以便团结我们的政府，使更多人能够加入推进计划的大流中。"
 BEL_Elite_first_desc:0 "一帮没读过大学的泥腿子，还想来干大活？简直是侮辱学历了。比利时的复国大业是长期性、艰苦性、复杂性的计划，这需要大量高素质人才的统一参与-让普通公民进入最终只会打乱计划的实施，甚至引发政府内部的矛盾。我们的政府应该让计划非公开化，只保留我们的宣传窗口，将机会留给政府的高等人才，以便推进计划实施。"
 BEL_Building_Congo_desc:0 "刚果殖民地虽已接管40年有余，但其60%的领土仍然处于欠缺管理的状态，并且开发程度较低，有大量的资源被我们白白浪费在了江河密林之中。如今比利时政府能够最大限度地调用刚果原住民进行橡胶种植业建设，驱使他们向东进发；亦或是前往各大城市中进行建筑作业。流亡至此的比利时公民自然而然也要负起责任，充当管理原住民的职责。从利奥波德维尔出发，直到遥远的加丹加，将比利时雄狮之旗插满每一片充满黄金的土地!"
 BEL_Crush_rebels_desc:0 "随着比利时人大批大批地来到刚果，各式各样的人也开始涌现出来。有的只是单纯的亡国叛徒，有的是趁火打劫的匪徒，有的甚至与当地土著勾结在一起，洗劫商铺，贩卖人口。我们很清楚的知道，他们都是完全不想回归比利时的人-所以我们采用子弹加铁笼的方式，把他们安家刚果，去过完这放荡不羁的一生吧。"
 BEL_Slaves_in_cornfields_desc:0 "烧毁森林，开垦荒野，一片片如浪花般的玉米地向我们展开画卷；这是刚果殖民地再正常不过的画面-然而这次我们却如此急迫的渴望它们。如今殖民地的粮食需求愈发增长，但我们的粮食产量仍然没有什么增长的迹象。流亡政府拟定了一份计划，我们将会沿着刚果河向东发展，并带领着之前受我们支配的原住民劳动者，开垦出只属于比利时的粮仓。至于黑人们，自然要为比利时的伟大事业作出贡献!"
 BEL_Only_heart_of_restoration_desc:0 "虽然如今的比利时处境艰难，但然支持我们为之奋斗的事业与精神-比利时，以及比利时的爱国之情却丝毫不减。不过似乎已经有几个共和派叛徒建立的小团体，开始密谋推翻王国的统治，并发布一些极其粗俗污秽的言语公告，污蔑我们坚定不移的比利时政府。既然如此，我们只能稍微改动改动拥有的课本，花大价钱去为利奥波德维尔的大街小巷，贴满属于比利时爱国者的海报了。"
 BEL_Rwanda_question_desc:0 "目前我们境内有庞大的有色种族——并且他们十分躁动，该怎么治理他们成为了一个严肃的问题。所以，我们选择了通过这些黑人财产的多少以及部落的生活状况来划分他们的种群，并利用一些黑人酋长来充当我们殖民地的低级官吏。最后，那些不听话的黑人，要不就逃往别处，要不然就只能死在我们的枪下……"
 BEL_to_know_how_much_hate_desc:0 "比利时流亡政府关于如何治理殖民地以及光复国家展开了激烈的讨论，到最后甚至引发了政党间的人员冲突。阿尔贝国王及时出面制止了这场冲突，才让闹剧收场。不过，这场闹剧却给众多比利时中间派人物敲响了警钟-人人都有归乡之心，人人皆有复国之心，但人人也皆有利益的准则……流亡政府并不能改变比利时政局的什么东西，一切仍按照时间描绘的布局在行走他自己的东西，或许，以爱国之名的风暴即将来临。"