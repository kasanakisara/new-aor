l_simp_chinese: 
 BAV_civil_War_gone:0"内战已去"
 BAV_civil_War_gone_desc:0"虽然我们在德意志内战中惨败从而被迫南下，但这并不意味着革命已经走向绝路，相反，倘若我们能及时做出反思与调整，失败的经历就可以是一笔宝贵的革命实践教训，让我们总结经验，从内战的阴影中走出来。"
 BAV_Rebuild_army:0"重建军队"
 BAV_Rebuild_army_desc:0"在柏林围城战中，军队的内讧使我们错过了革命成功的关键时机，所以我们必须重新打造一支不同于资产阶级军队的新式军队来保卫我们脆弱的斯巴达克同盟。"
 BAV_First_Council_Spartacus:0"第一次斯巴达克同盟大会"
 BAV_First_Council_Spartacus_desc:0"德意志革命失败了。我们输掉了柏林之战，也与其他社民党人分道扬镳。德意志的革命力量被迫迁到巴伐利亚，这里百废待兴，革命前途未卜。我们必须召开第一次大会来决定我们的未来。"
 BAV_Training_style_roving_rebels:0"整训流寇作风"
 BAV_Training_style_roving_rebels_desc:0"目前的军队中依旧存在只是为了营生而加入红军队伍的人，他们大多是帝国时期的流浪汉或街头混混，他们的存在也将流寇作风带入了红军之中。\n这些人中不乏奸淫做恶，搜刮民脂民膏之徒。他们进城之后就立马消失，将枪口对准百姓。他们在军中称兄道弟，搞小团体，排三六九等。他们完全不能承担起革命的任务，必须整训！去腐存菁！"
 BAV_Crack_extreme_democratic_ideas:0"打击极端民主思想"
 BAV_Crack_extreme_democratic_ideas_desc:0"目前的军队中，怀揣着共产主义理想的人自然对革命有着无可置疑的忠诚，但他们操之过急，认为军官能且只能由士兵们选举。虽然从理论上来讲，这种思想无可指摘，但对于目前的阶段，这种思想则十分危险，我们必须严肃处理这种危险倾向。"
 BAV_Transformation_labor:0"在劳动中改造"
 BAV_Transformation_labor_desc:0"马克思曾指出，劳动让人与动物区分开来，如果我们要建设一支马克思主义的队伍，那我们也应遵循马克思主义基本原理，通过劳动让那些缺乏规矩和素质的士兵成为可靠的共产主义战士，虽然那些将领并不喜欢让士兵干打仗以外的事情，但我们必须这么做，队伍必须纯正!"
 BAV_Renounce_nobility_once:0"彻底与贵族断绝"
 BAV_Renounce_nobility_once_desc:0"因为历史原因，我们的指挥体系里存在着一些帝国时期的贵族军官，他们的存在庇护着那些流氓行为和兄弟义气。如果我们要彻底终结这种流寇作风，我们必须彻底与那些贵族老爷做分割，让他们知道苏维埃的红军是全新的军队而不是旧的资产阶级军队!"
 BAV_Former_party_member:0"先党员，后军官"
 BAV_Former_party_member_desc:0"毫无疑问，政治性是确保军队忠诚的关键，革命政权的军队不再只是资产阶级发起帝国主义战争的工具，而是参与革命的一份子，故而，我们必须对军队中的领导层做出一定的政治要求，决不能让革命的队伍里出现叛徒!"
 BAV_Army_shepherd:0"军队牧羊人"
 BAV_Army_shepherd_desc:0"毫无疑问，政治性是确保军队忠诚的关键。但军队终究是军队，他们是革命的武器本身而不是革命者，过多的政治干预只会让军官难以作战，党应该成为军队的牧羊人，只需要纠察不忠诚的行为即可，其余不必干涉。"
 BAV_Allied_steel:0"同盟的钢铁"
 BAV_Allied_steel_desc:0"在对军队领导层的改造后，我们虽然还需要时间适应，但无疑这会让我们的革命军队更加具有战斗力，巴伐利亚苏维埃的红军将会是保卫斯巴达克同盟的钢铁!"
 BAV_People_guard:0"人民的卫队"
 BAV_People_guard_desc:0"终于对军队的改造已经初步完成，苏维埃现在终于能被忠诚于她的一支钢铁军队所保卫 无产者也终于有了一支属于他们的人民卫队。"
 BAV_Liquidate_old_government:0"清算旧政府"
 BAV_Liquidate_old_government_desc:0"在内战中，当军官士兵在前线为了德意志的新生而头颅洒热血时，后方的腐败官员们竟然在贪污享乐，他们的存在让苏维埃的命令一道也发不出去，必须要与旧政府做彻底的清算!"
 BAV_Take_knife_to_bureaucrat:0"挥刀向官僚"
 BAV_Take_knife_to_bureaucrat_desc:0"显然，知识分子聚集，行政岗位世袭，脱离生产，这就是目前旧政府旧官僚的特点。他们不为人民服务，他们只是被国家娇生惯养的新贵族，我们若要一步一步改革，那将会浪费大量时间，而苏维埃必须要有一个为她忠诚的行政体系，因此，我们必须将革命之刃向内刺去切除寄生在革命队伍上的肿瘤，即使这样要流不少血..."
 BAV_New_regulation:0"新的工作规章"
 BAV_New_regulation_desc:0"在旧官僚被清算之后，我们的行政部门正处于杂乱无序的状态，只有同盟的机关在临时填补，我们必须制定下新的政府工作规章制度，将马克思主义贯彻到行政当中，将政府的行政对象变成我们的人民。"
 BAV_New_people_waiter:0"新的人民服务员"
 BAV_New_people_waiter_desc:0"在旧官僚被清算后，我们的行政部门正面临人手短缺，只有党员在临时填补，我们必须招揽新的公务员来缓解这种现状。在新的政府里，那些公务员应该摒弃掉为了稳定收入而进入公务员岗位的旧思想，转而将自己投入伟大的构成主义事业中，成为人民的服务员。"
 BAV_New_Soviet_government:0"苏维埃的政府"
 BAV_New_Soviet_government_desc:0"新的制度，新的人员。旧的官僚已经不复存在，现在出现在巴伐利亚这片土地上的是苏维埃的行政体系，她将忠于人民，忠于革命，为我们的革命打下坚实基础。"
 BAV_The_future_Wave:0"浪潮的将来"
 BAV_The_future_Wave_desc:0"尽管我们失败了，但事物的发展是不会因为一次挫折而停滞的——革命也是如此。苏维埃的种子既然在巴伐利亚保存下来，那么他日必将掀起一番巨浪，将旧世界刷洗干净，待她褪去，寰宇必将是赤旗之天下!"
 BAV_trip_to_country:0"乡野之旅"
 BAV_trip_to_country_desc:0"在办公室里看到的都是问题，在乡野里看到的都是答案。作为一名共产党人，脱离实践只坐在办公室里“遥控”革命建设是脱离了马克思主义的实践性的。卢森堡在倍倍尔的提议下，前往巴伐利亚的乡野地区，看看如何在资本主义最不发达的地方建立起社会主义，并在那里寻找建设革命队伍的方法。"
 BAV_Streets_Munich:0"慕尼黑的街道"
 BAV_Streets_Munich_desc:0"在办公室里看到的都是问题，在乡野里看到的都是答案。作为一名共产党人，脱离实践只坐在办公室里“遥控”是脱离了马克思主义的实践性的。李卜克内西在倍倍尔的建议下前往慕尼黑，去考察如何在巴伐利亚苏维埃最繁华的地方，资本主义最发达的地方，建立起社会主义。"
 BAV_Spread_revolution:0"将革命撒播"
 BAV_Spread_revolution_desc:0"虽然巴伐利亚是一个革命政权，但那也仅限于斯巴达克同盟在的地方。在巴伐利亚的农田上，依然存在着旧的封建土地秩序。我们必须进一步扩展我们的革命，将地主贵族的财富都收缴上来，将土地从他们的手中夺走。"
 BAV_Abolish_feudalism:0"将封建拔除"
 BAV_Abolish_feudalism_desc:0"巴伐利亚自神圣罗马帝国时期便是德意志境内最为封建，农民受皇权教权联合剥削最严重的地区，因而也滋生了最为封建的思想，无数女性被束缚在土地和父权下，无法参与到革命建设更无法享受到革命之果，我们必须动用公权力来解放他们。"
 BAV_Fire_out:"用烈火浇灌"
 BAV_Fire_out_desc:0"革命的种子现在已经在农民的耕种下埋入巴伐利亚的土地，在那些地主富农势必会卷土重来，我们必须要建立行之有效的体系来保卫农民的合法权益，为我们的革命事业争取农民的支持，为我们的革命之种浇灌上人民的烈火。"
 BAV_pesticide:0"把婚姻重构"
 BAV_pesticide_desc:0"在资本主义私有制下，有产者的婚姻很大程度上成为了物质投机的对象，男女双方的婚事可以凭借钱和权来敲定;无产者们仅仅是出于最质朴的爱慕而走向婚姻，但这些伉俪都在无止境的失业和疾病之后爆发争吵，最终使得婚姻破裂。资本主义社会无力消除这一祸害和解放妇女，唯有在社会主义国家之中，婚姻才能从枷锁变为真正的爱情殿堂。"
 BAV_peasant_commune:0"农民的公社"
 BAV_peasant_commune_desc:0"公社在巴黎公社时期就得到了实践，它是无产者的生产管理体系，通过集中生产和去私有化，我们可以学习并在巴伐利亚建立起适合我们的公社制度，确保我们在田野的革命成果不会被篡夺或是被那些害虫破坏了。"
 BAV_roar_the_factory:0"工厂的轰鸣"
 BAV_roar_the_factory_desc:0"轰隆隆，许多工厂在内战期间已经被混乱所摧毁，那样的轰鸣自战败后再也未听到。如今，根据地已进入平稳，我们可以重新启用并接管那些工厂，为根据地提供生产力的同时扩大我们的工人基础。"
 BAV_Exchange_bell:0"交易所的铃声"
 BAV_Exchange_bell_desc:0"叮铃铃，交易所在战后反而比以往活跃，要么是大量外资涌入，要么是大量资本流出。然而，对于我们而言，金融的出现本身就是剥削——它是资本主义发展到一定程度足以脱离生产商品的形式来进行剥削的产物，因此它依然是资本主义的残余，是阶级之敌。不过我们也应正确看待它的存在，利用起来。"
 BAV_Democratic_production:0"民主化生产"
 BAV_Democratic_production_desc:0"工人既然是群众中最具有革命性的群体，那么工人和政府也理应通过民主的方式商量决定生产什么，生产多少，毕竟政府官员很少在工厂里干过活，而工人又很少能理解行政力的必要性，二者将通过民主的方式优势互补，创立下巴伐利亚的民主化生产方式。"
 BAV_Command_production:0"指令化生产"
 BAV_Command_production_desc:0"工人虽然是群众中最具有革命性的群众，但他们依然需要先锋队的领导。在我们确立真正的经济体系之前，我们将会组建生产委员会，由委员会发出指令，决定工厂生产什么，生产多少，以此来创立下巴伐利亚的指令化生产方式。"
 BAV_Withdrawal_imperial_exchange:0"摄取帝国外汇"
 BAV_Withdrawal_imperial_exchange_desc:0"虽然我们通过建立革命政权，将资本主义驱逐出了巴伐利亚，但并不意味着世界经济也就没有了资本。我们在与外界的接触中，必须要使用到外汇，这是最佳的逃脱柏林政府经济制裁的方式，我们将通过动用一切手段，将帝国时期的王室资产截留，转而用于购买国际市场上的商品以此来促进苏维埃的发展。"
 BAV_Limited_trade:0"有限贸易"
 BAV_Limited_trade_desc:0"虽然我们通过建立革命政权，将资本主义驱逐出了巴伐利亚，但并不意味着世界经济也没有了资本。我们可以保留下交易所，有限的，在政府管控下的进行有限贸易，以此来促进革命根据地的发展。"
 BAV_Coowned_factory:0"公有的工厂"
 BAV_Coowned_factory_desc:0"生产资料公有化一直都是建设共产主义道路上的一个关键节点，如今，苏维埃已经将城市里的工厂都收为公有，这是我们的一大步，也是世界共产主义运动的一步!"
 BAV_We_never_left:0"我们不曾离开，我们不曾投降，我们仍然挺立!"
 BAV_We_never_left_desc:0"钢铁的军队，人民的政府，乡野的公社，城市的工厂，我们不但没有被内战的失败所打倒，我们反而将巴伐利亚改造为了社会主义的根据地，升起那蓝白红之旗吧，我们共产党人就是那样的，不会离开，不会投降，永远挺立在世界各处!"
 BAV_flames_of_revolution_continue_unabated:0"革命的烈火生生不息"
 BAV_flames_of_revolution_continue_unabated_desc:0"新的巴伐利亚已经完全超过了德意志其他地区的政权，我们现在已经有足够的能力宣战，重新掀起革命!"
 


 BAV_The_pioneer_has_passed_away:0"先驱已逝"
 BAV_The_pioneer_has_passed_away_desc:0"奥古斯特·倍倍尔在德意志革命朝气蓬勃之时因心脏病与世长辞，这无疑是对巴伐利亚苏维埃革命工作的沉重打击。我们回看伟人的历史——他为了无产阶级工人的解放事业而奋斗一生，如蜡烛般燃尽了自己的生命，这值得我们永远铭记。"
 BAV_Baton_transmission:0"传递接力棒"
 BAV_Baton_transmission_desc:0"倍倍尔在革命中献出了宝贵的生命，但他的死亡并不会宣判德意志革命以及巴伐利亚苏维埃的末日。弗兰茨·梅林将暂时担任社会民主党的临时主席一职，将革命继续传递下去。"
 BAV_Cut_off_history:0"斩断过去"
 BAV_Cut_off_history_desc:0"忆往昔，德国革命的失败使得德意志的社会主义革命者与人民群众的心头附上了一层难以抹去的阴影。但如今，苏维埃已重新于巴伐利亚站稳了脚跟，并恢复了她的元气。我们应当斩断悲伤的过去，怀揣无限的信心——书写新的篇章！"
 BAV_Focusing_on_the_inside:0"保卫革命"
 BAV_Focusing_on_the_inside_desc:0"德国革命失败的惨痛经历给了所有革命者一个深刻的教训，并且教导了我们这巴伐利亚革命果实的来之不易。我们必须尽全力捍卫革命的成果，绝不能让同志们的努力付之东流！"
 BAV_The_sacred_flame_will_not_extinguish:0"圣火不息"
 BAV_The_sacred_flame_will_not_extinguish_desc:0"革命先驱马克思与恩格斯曾经阐明了无产阶级革命的历史发展——它必然与历史发展的客观规律相吻合，即不断循环且上升的发展；德意志的先行者们也用生命提示了我们，革命绝不是一帆风顺可以胜利的。如今的德意志革命虽然暂陷低谷，但只要我们团结一心，中欧的赤色极光必然将会显现在德意志大地上。"
 BAV_The_Revolutionary_Heart_of_Germany:0"德意志的革命之心"
 BAV_The_Revolutionary_Heart_of_Germany_desc:0"尽管梅林欠佳的身体以及较大的年龄让同志们所担心，但因目前的形势所迫与倍倍尔同志的遗愿所期，梅林同志将暂时担任临时主席。梅林主席综合实际情况，将大部分领导人职权下放给我们党内的其他同志，力图发挥出整体大于个体的效果。如今的苏维埃重整旗鼓，并为了德意志革命而不懈地奋斗，让我们高举着革命的火炬向敌人进军!"
 BAV_Ideological_revolution:0"思想革命"
 BAV_Ideological_revolution_desc:0"德国社会民主党以及德国革命的发展时刻告诉我们：统一的思想是革命队伍最有力的精神支柱。如今的德国社民党派系林立， 甚至出现了阻碍革命的各种思想，我们[BAV.GetName]的一些同志也被这些眼花缭乱的杂物所迷惑，并逐渐偏离了德国革命的道路。我们将开启一场思想活动，明确我们的革命方针，消除不必要的思想偏移。"
 BAV_Common_industrial_model:0"共同工业模式"
 BAV_Common_industrial_model_desc:0"现在的我们已与其他地区的同志们建立了密切联系，但是经济模式的推广却尚未实施。我们在巴伐利亚试验的民主工厂的运作方式或许可以解决现在其他地区混乱不堪的经济运转问题；将我们的模式推广出去，使得我们的经济相互连通。"
 BAV_Knock_the_alarm_bell:0"敲醒警钟"
 BAV_Knock_the_alarm_bell_desc:0"在共产国际的提醒之后，加紧备战的计划就立马提上了日程。德意志革命在三面包围之下荆棘丛生，[BAV.GetName]若想掀起并保卫德意志革命，首先是要使我们全体同志明白起来：我们必须要拥有一支强大的武装，能够捍卫革命的武装。"
 BAV_Land_nership:0"土地民有"
 BAV_Land_nership_desc:0"长久以来，德意志南方的广大土地和地产被旧德国的容克贵族以及工业资本家们所占有。为了团结革命群众，增强我们的革命力量，现在的[BAV.GetName]要加快土改进程，尽快将土地法理收归国有，并进行农业用地的再分配，以促进农业生产，保障我们的粮食供应。"
 BAV_Industrial_estructuring:0"工业重组"
 BAV_Industrial_estructuring_desc:0"曾经德意志工业分布十分均匀，但经过先前的内战，我们工业体系遭到了干扰，各个工业部门的生产以及程序变得混乱不堪。为了稳定我们的民用工业及军事工业生产的生产秩序，苏维埃需要对现有的工业单位进行调查与统计，并重新组织工业生产活动，同时尽量保障工人的权益不受损害。"
 BAV_shining_new_stars_of_the_times:0"时代，正新星闪耀"
 BAV_shining_new_stars_of_the_times_desc:0"[BAV.GetName]的公民们已经感受到了苏维埃对人民的关怀——我们尽量使当地的生产秩序恢复正常，同时尽量不损害人民群众的正当权益。如今越来越多的人民踊跃报名参军，治下各大城市的生产又重新开始活跃起来；这是我们斯巴达克斯与人民共同奋斗出的成果，这成果在每一位革命者与劳动者身上都得到了体现。"
 BAV_Peipeier_deal:0"倍倍尔之梦"
 BAV_Peipeier_deal_desc:0"我们的伟大先驱倍倍尔曾重新出山领导着我们的斯巴达克斯走上了重新革命的伟大道路。如今我们的革命者们将会再度发扬他永不气馁，为无产阶级革命事业奉献一生的精神：我们将会坚持在内战时期形成的斯巴达克斯精神，英勇地与帝国主义者斗争，作出果断的决定，团结应团结的同志，将各种斗争方式结合起来——与无产阶级群众们走出一条德意志的社会主义革命道路。"
 BAV_Lenin_rther_xpansion:0"列宁的再拓展"
 BAV_Lenin_rther_xpansion_desc:0"列宁的布尔什维克主义给予了我们德国革命者思想的极大帮助。如今的南德意志苏维埃在思想整顿的春风下，必然会参考列宁的模式去走出一条属于[BAV.GetName]的革命道路。我们将会发扬布尔什维克的斗争精神，坚定自己的内心，扩大革命团体，形成强大的革命力量。"
 BAV_Crush_revisionism:0"人民，正踌躇满志"
 BAV_Crush_revisionism_desc:0"在我们全体无产阶级的努力之下，革命已经势不可挡，胜利也已经初具雏形。人民，正踌躇满志，我们将在马克思主义的领导之下取得这场革命的最终胜利！"
 BAV_Full_f_itality:0"提拔青年才俊"
 BAV_Full_f_itality_desc:0"[BAV.GetName]是一个人口众多，同时革命基础较好的的地区；为了加快我们苏维埃的军事建设，我们急需选拔能够忠于革命忠于党的青年才干，并将他们培养成我们优秀的基层军官，为我们的革命事业注入新鲜活力。"
 BAV_1_2_1:0"一!二!一!"
 BAV_1_2_1_desc:0"现如今军事革命的要求是要拥有理解革命并捍卫革命的军事骨干队伍。我们首先要让战士们明白革命的意义与革命的重要性，听从斯巴达克斯的指挥，才能进行下一步训练。"
 BAV_The_lmportance_of_discipline:0"纪律的重要性"
 BAV_The_lmportance_of_discipline_desc:0"革命的军队归根到底是无产阶级工人的军队，人民大众的军队。如果我们的军队还保持着旧军队的官僚主义作风亦或是内战时期的军队流氓气息，我们的革命军事建设必然会遭到巨大的阻碍。如今的人民军队将要进行新一轮的纪律建设，力求培养出一批能打仗能吃苦的战斗队伍。"
 BAV_The_new_germany_people_army:0"新德意志红军"
 BAV_The_new_germany_people_army_desc:0"经过不断的训练与整顿，如今我们的德意志红军兵力充沛，并初步建立了在内战后的军队苏维埃干部体系。"
 BAV_Friends_from_the_North:0"“老友”"
 BAV_Friends_from_the_North_desc:0"倍倍尔在世时曾分析德国革命失败的原因，最后得出了不得不承认的事实——失败的主要原因在于南方联军内部各自为战，一盘散沙，联军战斗力大打折扣。在我们日积月累的对符腾堡地区的影响之下，他们已经可以被视为一个值得信赖的盟友。我们将拍一封电报发往与我们在同一战线上的符腾堡民主邦，共商未来。"
 BAV_enemies_from_the_North:0"“新敌”"
 BAV_enemies_from_the_North_desc:0"倍倍尔在世时曾分析德国革命失败的原因，最后得出了不得不承认的事实——失败的主要原因在于南方联军内部各自为战，一盘散沙，革命队伍的不纯洁性导致了作战的受挫。我们不应再与修正主义者和其他温和社会民主党人同流合污，将迅速且秘密的发动对符腾堡民主邦的革命解放战争，改天换地。"
 BAV_Friends_from_the_SAX:0"“团结”"
 BAV_Friends_from_the_SAX_desc:0"倍倍尔在世时曾分析德国革命失败的原因，最后得出了不得不承认的事实——失败的主要原因在于南方联军内部各自为战，一盘散沙，联军战斗力大打折扣。在我们日积月累的对萨克森地区的影响之下，我们已经取得足够的影响力呼吁当地人民揭竿而起。我们将团结一切可以团结的力量，扩大斯巴达克斯派的实力，让星火燎原。"
 BAV_enemies_from_the_SAX:0"“斗争”"
 BAV_enemies_from_the_SAX_desc:0"倍倍尔在世时曾分析德国革命失败的原因，最后得出了不得不承认的事实——失败的主要原因在于南方联军内部各自为战，一盘散沙，革命队伍的不纯洁性导致了作战的受挫。修正主义者和叛徒们对革命的破坏力是不可估量的。我们将断绝与修正主义者的联系，以充分的不妥协精神扩大斯巴达克斯派的实力，促激浊扬清。"

 