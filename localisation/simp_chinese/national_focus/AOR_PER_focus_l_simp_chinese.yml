l_simp_chinese:
PER_a_national_martyr_0:0 "国殇"
PER_a_national_martyr_0_desc:0 "新生的立宪国家正面临着巨大压力——来自十三年内战与满目疮痍的土地。派系斗争，积贫积弱。我们的要的绝不是这样荒谬的国度——停滞与混乱是绝不会被祖国的人民所接受的。但纳贾夫，立宪波斯的领袖，现在必须把这场自由革命进行到底。妥协或独立，激进或保守，教权或世俗——无论如何，波斯人民的历史都要继续下去。是时候做决断了。"
PER_Northern_Reconstruction_2:0 "北方重建计划"
PER_Preliminary_government_reform_6:0 "初步政府改革"
PER_Preliminary_government_reform_6_desc:0 "一个立宪民主政府在波斯实在是个新奇的概念，盲目地照搬理论家的白纸黑字无疑是幼稚的——饭要一口口吃，政府机关的改革也得一步步来。必须承认，行政机构的改革阻力重重，但我们必须开出这样一个头，在诸多困难中稳中求进。"
PER_Infrastructure_restoration_7:0 "基础设施重建"
PER_civil_construction_team_22:0 "民间施工队"
PER_UK_companies_23:0 "英国企业"
PER_receive_Russian_funded_factories_8:0 "接收俄资工厂"
PER_ume_oduction_29:0 "恢复生产"
PER_Loss_statistics_9:0 "损失统计"
PER_Resettlement_Plan_33:0 "安置百姓"
PER_Conference_on_Postwar_Issues_1:0 "战后问题会议"
PER_Conference_on_Postwar_Issues_1_desc:0 "我们的国家方才经历过世界大战与内战的创伤，正是百废待兴的时节。因此召开一场会议来统筹战后重建工作，并将改革继续下去，是非常有必要的。我们将从产业与行政两方面着手，抓住重难点，打好攻坚战，把波斯建设为一个伊斯兰世界的灯塔。"
PER_Agricultural_Jihad_Preliminary_0:0 "发动农业圣战"
PER_Agricultural_Jihad_Preliminary_0_desc:0 "要彻底发展农业生产力，发动一场彻底的变革显然是在所难免的。尽管这场改革注定困难重重，我们也一定要将一切困难克服。我们将从税制改革与土地问题两个方面集中推动我们的计划，从根源上解决问题。为了波斯，将圣战进行到底！"
PER_tax_reform_10:0 "税制改革"
PER_tax_reform_10_desc:0 "随着生产力不断发展，传统的政府机构及其功能已无法满足社会发展需求，需要重新洗牌，需要产生新的官僚和技术力量以及科学的方法和相关研究来更加理性地治理国家。原有的税收制度已经支撑不起社会的进步了，那么相应的，税制改革也应当迅速展开。"
PER_Land_issues_11:0 "土地问题"
PER_Land_issues_11_desc:0 "宪政革命后波斯封建国家开始解体，土地和财富兼并过程一直剧烈地持续着：贵族阶层损公肥私，中饱私囊；大商人与封建地主、外国企业沆瀣一气，将大量土地用于经济作物种植和房地产领域，严重阻碍农业发展；在连年战乱的破坏下，大量优质土地被破坏以至于无法被正常利用。我们必须就这些问题做出回应。"
PER_pursue_progress_while_ensuring_stabilits_4:0 "稳中求进"
PER_pursue_progress_while_ensuring_stabilits_4_desc:0 "新生立宪波斯的政权尚不稳固，国内矛盾尚且尖锐，诸多工程百废待兴。只有稳固我们的政权，才能为下一步的规划奠定好基石。产业，教育，改革，发展。这是新生波斯迈向现代最初的一步——决定性的一步。"
PER_Promotion_of_Constitutional_Thought_12:0 "传播立宪思想"
PER_Promotion_of_Constitutional_Thought_12_desc:0 "立宪民主尽管先进，却还没有在波斯人民心中扎下根来。既然我们宣传着真理，那么让人们深入学习贯彻落实立宪民主思想便相当有必要了。我们应当从教育，宣传方面下工夫，打好思想阵地的攻坚战。如果我们不用立宪民主去占领人们的思想，反对派就要把老一套制度请回来。我们绝不能允许这种事情发生。"
PER_Industrial_Development_Plan_No.1_13:0 "1号工业发展案"
PER_Industrial_Development_Plan_No.1_13_desc:0 "波斯议会组织召开工业扩建专项会议。会上，纳贾夫指出，各省要高度重视，站在全国的高度看待问题，加强统筹调度，加大对企业的指导力度，工信、统计部门要深入地区做好指导；要深刻认识工业发展的形势，集中精力做好企业培育工作，全力以赴解决企业发展中面临的困难问题，服务全国工业平稳高质量发展。以会议精神为依据，大会通过了“一号工业发展案”。"
PER_higher_education_14:0 "发展高等教育"
PER_higher_education_14_desc:0 "在战后重建的过程中，我们深刻认识到了高等人才匮乏对重建工作开展造成的巨大阻碍。为了缓解这种情况，重建与普及高等教育成为了一个必要的措施。更多的高校将以政府的名义在各地被建立起来。应该指出，这笔开销是相当庞大的。但所有人都相信，从波斯自己的高等院校中走出来的学生们，能为他们的祖国创造远高于这笔投资的价值。"
PER_Scripture_education_15:0 "改革经书教育"
PER_Scripture_education_15_desc:0 "波斯的教育体系要么完全由教会垄断，要么体系过于陈旧，已经适应不了当下发展的需要。而经书教育的根系之庞大，影响之深远，使得成体系的西式的教育一时间难以推行。但这也意味着我们能对传统经书教育作出一些改进，使得它能为我们培育出这个时代所需要的人才。在议会授权的专项小组指导下，经过改进的教育方式很快就会进入到人们的日常生活中。"
PER_Fighting_inflation_16:0 "对抗通胀"
PER_Fighting_inflation_16_desc:0 "重建工作带来的巨大缺口，旧时代显贵的大量出逃，不但令我们的造币厂整日全功率运作，也令它们的价值不断下滑。若放任这种状态的而不加以控制，我们的货币体系将迅速崩溃。绝不能令这种情况继续下去，必须用我们所拥有的最强力、最有效的手段来予以对抗！"
PER_Appease_anti_British_sentiment_17:0 "安抚反英情绪"
PER_Appease_anti_British_sentiment_17_desc:0 "我们国内出现了许多反英的声音——这些言论的确不无道理。但我们必须安抚他们。是的，英国人对我们并不“友好”，我们会永远记得他们在立宪政权建立那一刻的来访。是的，英国人不是稳定的靠山，给自己戴上正义的白手套只是为了更好的盘剥。但我们连这样的发展也要争取到。这是妥协，更是机遇。"
PER_jihad_of_Corruption_Preliminary_5:0 "发动对贪污的圣战"
PER_jihad_of_Corruption_Preliminary_5_desc:0 "民心是最大的政治，波斯人民最痛恨腐败，容不得罪成百上千的腐败分子，就要得罪数千万波斯同胞，这是一笔再明白不过的政治账、人心向背账。要彻底根除掉贪污问题，既要坚决查处不收敛不收手的政府官员，又要坚决整治军队中的腐败问题和不正之风，一刻不停推进廉政建设和反贪污斗争。"
PER_Heavy_fists_government_sector_18:0 "政府领域的重拳"
PER_Heavy_fists_government_sector_18_desc:0 "让一群吸血鬼当了冠冕堂皇的官老爷，荒唐！和这样一群虫豸一起，怎么能治理好国家呢？我们要彻底得清洗我们的衙门，唯有能者能掌握我们国家的未来。我们已经创造出一个新世界，也能把它交给我们的孩子们。但这个世界容不下道德败坏的庸才们，保守派也算在内。"
PER_Heavy_fists_military_field_19:0 "军事领域的重拳"
PER_Heavy_fists_military_field_19_desc:0 "豢养的家属不能保家，差役的士兵不能卫国，更不能指望一手培育出这些乱象的军官们——无论他是家财万贯或是门阀贵族。他们不但起不到任何指挥的作用，反而败坏了军中纪律，挥霍了国家财产。让他们滚！军队中容不下这群蛀虫！"
PER_Chaotic_government_institutions_20:0 "混乱的政府机构"
PER_Chaotic_government_institutions_20_desc:0 "本就陈旧的国家机器已是大厦将倾，动荡的国内局势则一脚把这破房子踹得支离破碎。政府机关内派系林立，各部门的正常运转难以为继。我们不得不发动一场自上而下的、大刀阔斧的改革，好清除前代遗毒，为立宪波斯的重建与发展夯实基础。"
PER_Reform_Provincial_Administrative_Institutions_46:0 "省级机构改革"
PER_Reform_Provincial_Administrative_Institutions_46_desc:0 "在成功完成对中央的改革之后，对地方的控制的强化也已迫在眉睫。与地方豪强相勾结的官员对中央政府可谓阳奉阴违:贵族阶层损公肥私，中饱私囊。作为地方长官，他们把本应上缴国库的税款据为己有，聚敛了大量财富。只要改革还需在推行，就意味着必须把这群地头蛇赶回田地里去。"
PER_National_Advisory_Committee_49:0 "国家咨询委员会"
PER_National_Advisory_Committee_49_desc:0 "根据《国家咨询委员会章程（草案）》，委员会主要职能包括：对重要政策、重大改革事项进行论证评议，提供咨询意见；开展调查研究，对解决改革和发展中的重大理论和现实问题提出政策建议；对国家行政体制改革试点以及重大项目实施情况进行评估，提出报告。在更加科学的指导之下，国家的行政效率将进一步提升。"
PER_Military_evaluation_21:0 "军队评估"
PER_Military_evaluation_21_desc:0 "腐败在军队中蔓延，国家经费鲜有用于军队建设；军中卖官行为泛滥，指挥及训练能力低下，落后的军职继承制度仍然存在，军官豢养大批家眷和差役士兵为其家庭服务；军工厂秩序混乱，生产能力低下，军用设备质量低劣。我们将继承卡比尔的愿景，将全面的改革贯彻到军事领域中，彻底除掉祸根。"
PER_Cossack_50:0 "哥萨克"
PER_Cossack_50_desc:0 "波斯军队中的哥萨克旅以俄罗斯帝国军队的高加索哥萨克军团为蓝本建立的，甚至直到 1920年，它仍由俄罗斯指挥官指挥。在该旅的大部分历史中，它是卡扎尔王朝功能最强大、最有效的军事单位，向来以凌厉的攻势与快速的推进而著称，他们参与的许多战役，拜他们所赐，都出现了经典而精彩的战例，为列强军队所熟习。波斯当然不能不利用这支强大的力量，以一种高效而强劲的手段迅速巩固国防，捍卫新生的立宪民主政府。我们将把哥萨克旅精神向全军进行推广，建设一支能打胜仗的部队."
PER_Gendarmerie_51:0 "宪兵队"
PER_Gendarmerie_51_desc:0 "和其它国家的宪兵一样，波斯的宪兵部队最初是作为一支宪政军队建立的，它雇用瑞典军官指挥伊朗人员，既履行传统的警察职责，又对部落部队进行军事行动。给这群专精维稳的专家们发足粮草武器，让他们全方位、多层次、宽领域地参与进军事改革中来，他们便会专了那群地痞流氓的政，就能为维护我国的稳定，稳步推进我们的改革起到最大的作用。"
PER_with_foreign_guns_52:0 "洋枪队"
PER_with_foreign_guns_52_desc:0 "作为一支建立不久的部队，南波斯步枪队最初是为对抗奥斯曼帝国而组建的预备队。在胜利的天平彻底倒向协约国后，这支多达 11,000 人的军队被重新交由波斯政府进行指挥，用于平息抵抗并维持秩序。即使成立不久，英式的、成熟的指挥体系和在世界大战中磨砺出的经验无疑是波斯军队最好的教科书——这支新生的部队将带着新的思维承担起新生波斯的国防大任。"
PER_Comprehensive_elimination_miscellaneous_taxes_35:0 "消除杂税"
PER_Comprehensive_elimination_miscellaneous_taxes_35_desc:0 "一方面，地方长官们把本应上缴国库的税款据为己有，聚敛了大量财富；另一方面，实物地租开始向货币地租的转变给农民带来巨大伤害：它不但包括了农民的剩余产品转变成地租，甚至也包括其赖以维持生计的那部分收入。不消灭压在农民头上的这两座大山，将其中苛捐杂税尽数免除掉，我国的农业是绝对无法发展起来的。"
PER_Restore_physical_land_rent_36:0 "恢复实物地租"
PER_Restore_physical_land_rent_36_desc:0 "在消除杂税的圣战中，我们取得了可观的成果。负担的减轻在农业发展方面确实起到了一定的作用，但税务的减免并不能解决农业问题的根本——即商品交换关系对自足的农业经济造成的冲击。从表面上来说，对实物地租的恢复似乎是一种不彻底的妥协，但若是连我们的农民同胞连饭都吃不饱，所谓的先进也毫无意义了。"
PER_Land_Purchase_Sale_Regulations_37:0 "土地买卖法规"
PER_Land_Purchase_Sale_Regulations_37_desc:0 "不受约束的土地兼并是一定要被取缔的——这些被用于贸易和房地产的地块带来是更彻底的盘剥，让手工业工人失业，让小商品生产者破产。如果我们不对此做任何反应，单凭这种兼并自由发展，失去了手足的波斯将向着投机的深渊滑落，在一地荒芜中留下蝼蚁般挣扎着的，我们的人民。"
PER_Land_confiscation_by_corrupt_officials_38:0 "没收贪官的土地"
PER_Land_confiscation_by_corrupt_officials_38_desc:0 "买卖官职的历史终结了，贪官们的好日子也到头了。无序的土地兼并需要大量的资金，而这些资金的来源往往是对波斯人民的愈发残酷的压迫。既然这些土地的来源是非正义的，没收它们的土地自然是理所当然的。所谓耕者有其田，土地应该彻底地归劳动者所有。"
PER_Military_industry_39:0 "军工业发展"
PER_Military_industry_39_desc:0 "枪！枪！更多的枪！"
PER_Civil_industry_40:0 "民工业发展"
PER_Civil_industry_40_desc:0 "民工业的发展是国家建设头等大事，必须严肃处理，认真对待，充分发挥实业家生产积极性，鼓励中小工业企业发展，带动本地就业，提高人均收入，推动国民经济稳步增长，高质量地建设好立宪民主波斯。"
PER_Hiring_UK_experts_40:0 "聘请英国经济专家"
PER_Hiring_UK_experts_40_desc:0 "所谓术业有专攻，颇有学术造诣的经济学家们掌握着那颇为高深的经济规律，当然晓得如何让波斯的经济像当世之列强一样繁荣发展。现阶段我们与往来颇多，聘请英国经济学专家自然合情合理。接下来只需要安排好他们，让这些学者给通货膨胀踩下刹车，看着僵硬的公式变成英镑法郎，波斯从此就富起来了！"
PER_Price_control_41:0 "物价调控"
PER_Price_control_41_desc:0 "重建工作带来的巨大缺口，旧时代显贵的大量出逃，不但令我们的造币厂整日全功率运作，也令它们的价值不断下滑。若放任这种状态的而不加以控制，我们的货币体系将迅速崩溃。绝不能令这种情况继续下去，必须用我们所拥有的最强力、最有效的手段来予以对抗！"
PER_supply_management_42:0 "供给管理"
PER_supply_management_42_desc:0 "如果我们的宏观管理部门能够采取科学的措施，从管理层面上提高国内生产部门的生产能力，增加供给量，能缓解当前生产力水平下波斯社会中商品和劳务的短缺状况。有效的管理总是事半功倍的，将这种管理方案普及到波斯各个生产领域是大有裨益的。"
PER_Hanging_buying_selling_officials_45:0 "对买官卖官的绞杀"
PER_Hanging_buying_selling_officials_45_desc:0 "让买官卖官见鬼去吧！我们不但在政治和军事上取得了胜利，而且在文化上教化了波斯人民，当人们生活在这样一个公正的制度下，他们知道怎样的人才能当好他们的领导者。庸人与投机者不得入内，公平的政治是公正者的棋盘!"
PER_The_issue_nomadic_tribal_officials_47:0 "部落官员问题"
PER_The_issue_nomadic_tribal_officials_47_desc:0 "波斯境内尚有相当数量的游牧部落存在，并在地方上形成了强有力的政治势力。对这些不由中央直辖的部落，一方面应当予以承认，尊重其传统的生活方式，另一方面，必须将他们手中的权力请回我们的中央，消灭掉地方的政治实体，以强化立宪政府的权威。"
PER_Headquarters_General_Staff_53:0 "建立总参谋部"
PER_Headquarters_General_Staff_53_desc:0 "与一支有战斗力的军队相匹配的是一个现代化的指挥与管理体系。总参谋部是一支军队的心中，它不但统筹部队的指挥调度，也对军队的现代化管理起到相当的规范作用。尽管国内保守派对该机构的设置仍持反对意见，不过一群乌合之众到底是战胜不了一支军队的。"
PER_Dar_ol_Fonoun_54:0 "精英学院"
PER_Dar_ol_Fonoun_54_desc:0 "迫于旧时代留下的遗毒，军中有能者竟不能与世袭子弟们平起平坐，最终白白地流失了。我们不但要将他们发掘出来，更要着重培养这批人才，通过系统的、科学的继续教育提升其军事才能。精英学院正是为此而生的。相信经过这样一所院校的培养，波斯军队的综合实力将显著提升。"
PER_British_instructor_55:0 "英国教官"
PER_British_instructor_55_desc:0 "尽管一个相对完善的指挥和管理系统被成功建立起来了，岗位的短缺，尤其是教官的短缺成为了一个相当棘手的问题。我们不得不从英国请来一批有经验的教官以着重提升我军现役兵员的素质，学习英国先进经验。虽然这会令我们在军事上更依赖英国——那也比混乱与孱弱好太多了。"
