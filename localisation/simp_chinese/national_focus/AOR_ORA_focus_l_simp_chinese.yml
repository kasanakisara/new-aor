l_simp_chinese:  
 ##内战##
 ORA_strike_going_on:0"总罢工进行时"
 ORA_the_blood_debt:0"讨还血债"
 ORA_Go_to_barricade:0"走上街垒"
 ORA_Union_leader:0"工会领导"
 ORA_Workers_autonomy:0"工人自治"
 ORA_Steel_and_hymns:0"钢铁与赞美诗"
 ORA_daybreak:0"黎明前夜"
 ORA_strike_going_on_desc:0"工团主义者相信总罢工是最有效且唯一的革命手段，工人们通过罢工手段夺得工厂后，仍然需要自发的组成赤卫队，与军政府相对抗。而军政府的工人们，也会或多或少获得影响。"
 ORA_the_blood_debt_desc:0"没有人会忘记军政府曾经采用了怎样的血腥手段镇压工人运动。现如今，阿根廷的工人们已经不再像当初一般手无寸铁，任人宰割。是时候武装起来，夺回我们被资本家强占的劳动果实了!"
 ORA_Go_to_barricade_desc:0"军政府与我们已经势如水火，他们想要扑灭熊熊燃烧的革命之火，但我们不会让他们如愿以偿。工人们即将走上街垒，为我们血腥而正义的斗争拉开序幕。"
 ORA_Union_leader_desc:0"各地区，各职业的工厂都交给当地的工会来分别管理，而各地工会又由一个统一的总工会调控。我们深信，这是确保我们战胜军政府的绝佳举措。"
 ORA_Workers_autonomy_desc:0"全方位的工人自治可以提高工人的生产积极性，再次基础上由工会管理，给予工人最大限度的权力。工人可以各尽其能，共同参与管理事务，是我们相较于军政府的一大优势。"
 ORA_Steel_and_hymns_desc:0"在血与火的革命战争中，我们的战士迅速成长着;在后方的建设中，我们也逐渐摸索出了行之有效的道路。工人们得到了锤炼，正变得如钢铁般坚不可摧。现在，不再是我们惧怕反动派，而是反动派惧怕我们。"
 ORA_daybreak_desc:0"我们的军队势如破竹，直插阿根廷反动政府的心脏。腐朽的敌人不是工人赤卫队和学联武装的对手，他们正在走向灭亡。尽管如此，我们也不能掉以轻心。每个人都应坚守自己的岗位，静候黎明的到来。"
 
 ##重建##
 ORA_Sunrise_of_victory:0"胜利的朝阳"
 ORA_Sunrise_of_victory_desc:0"在工人们的齐心协力之下，我们已经战胜了反动的军政府，推翻了资本家们的残暴统治。现在，我们可以暂时放松下来，享受这属于工人的伟大胜利了!"
 ORA_undone:0"百废待兴"
 ORA_undone_desc:0"长期的战争将阿根廷的社会与民生搅得一团糟，虽然我们已经取得了战争的胜利，但我们距离美洲革命的胜利还有很长的距离要走。我们的当务之急是抖擞精神，处理好战争后的各项事宜。"
 ORA_De_war_status:0"解除战时状态"
 ORA_De_war_status_desc:0"我们与军政府的战争已经结束，战争时的政策已经不利于国家稳定和经济建设。为了恢复民用经济，让人民生活安定，我们要重建和平时期的社会秩序。只有如此，我们的社会才会逐渐步入正轨。"
 ORA_home_rebuilding:0"重建家园 "
 ORA_home_rebuilding_desc:0"旧世界已然倾颓，新世界方兴未艾。在革命战争中，我们的家园化为了废墟。为了让阿根廷重新焕发活力，我们要继续发挥工人群众的斗争精神与创造热情，重建美好的家园，向我们伟大的理想迈出坚定的一步。"
 ORA_revival_civilian_industry:0"民用工业的苏醒"
 ORA_revival_civilian_industry_desc:0"在战争时期，我们将主要精力着眼于军工生产;在革命胜利后，我们应该把工业发展的重心转移到民用工业上来，将人民需求放在第一位上。"
 ORA_Pacify_the_masses:0"安抚群众"
 ORA_Pacify_the_masses_desc:0"由于军政府的丑化宣传，在许多新解放区的人民眼中，工团主义者都是杀人如麻的暴徒。现在，我们要安抚敌视我们的农民和小市民，让他们知道我们不是强盗，而是带来希望与正义的解放者。"
 ORA_Wipe_out_reactionary_forces:0"清剿反动势力"
 ORA_Wipe_out_reactionary_forces_desc:0"尽管我们在军事上击溃了军政府，但他们的残党仍然蛰伏在我们社会的角落中，等待着反扑的实际。我们绝不能纵容这些反动势力威胁解放事业。各地方基层政府与民兵都应动员起来，将他们彻底消灭。"
 ORA_worker_pickets:0"流动工人纠察队"
 ORA_worker_pickets_desc:0"军政府的残余势力已经被我们连根拔起，少量极端右翼分子的暴乱也已经平息。但仍然有工贼和间谍埋伏在我们的周围，搅乱我们生产生活的秩序。为此，我们应在各工作场合建立工人纠察组织，破坏他们的阴谋。"
 ORA_Look_forward_future:0"期许未来"
 ORA_Look_forward_future_desc:0"在劳动人民的努力下，我们的国家已经渐渐抚平了战争带来的伤疤。我们也将把目光投向更为遥远的理想。FORA代表大会的召开近在眼前，我们的国家将驶向何方?每个人都翘首以盼。"