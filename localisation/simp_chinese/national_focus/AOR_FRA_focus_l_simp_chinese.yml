## Poincare & Clemenceau
 AOR_FRA_after_the_war:0 "大战之后"
 AOR_FRA_after_the_war_desc:0 "没人愿意回忆战争中哪怕一丝一毫的细节，但我们无法欺骗自己，必须正视现实存在的问题：如果我们还想制霸欧陆，就需要想办法对祖国血淋淋的伤口进行包扎。\n是时候从混乱的泥淖中拔出腿来了。\n"

 AOR_FRA_The_sorrowful_passing:0 "悲痛埋葬于过去"
 AOR_FRA_The_sorrowful_passing_desc:0 "我们对为法兰西付出血汗的战士报以真切的哀悼与尊敬，可是当今世界的严峻形式却让我们我们不得不向前看，死者长已矣，生者当勉励。\n现在，开始工作吧，为了不辜负战士们用生命换来的明天。\n"

 AOR_FRA_Compassionate_towards_the_living:0 "希望传承至未来"
 AOR_FRA_Compassionate_towards_the_living_desc:0 "我们不能再将法兰西的孩子们因一两个人的愚蠢错误而送上战场，送上那必然的绞刑架。战争的洪流已然退去，对和平的渴望如今是大势所趋，我们唯一能做到的便是顺应民意。\n"

 AOR_FRA_Clearing_war_debts:0 "清算战争债务"
 AOR_FRA_Clearing_war_debts_desc:0 "不得不承认，法兰西的胜利离不开国内外各方面的经济援助，包括贷款。不论出于何种理由、何种目的，他们也都算我们的盟友，理应获得一份战利品。\n"

 AOR_FRA_Mourning_for_the_deceased:0 "哀悼死者，补偿生者"
 AOR_FRA_Mourning_for_the_deceased_desc:0 "在战争中，大量的法兰西好男儿埋骨疆场。我们需要对此做出回应，这不仅包括在口头上所表示的崇高敬意，还包括给予饱受离别之痛家庭那应有的补偿。\n"

 AOR_FRA_Clean_up_the_battlefield:0 "清扫战场"
 AOR_FRA_Clean_up_the_battlefield_desc:0 ""

 AOR_FRA_The_Future_of_Waves:0 "巨浪将至"
 AOR_FRA_The_Future_of_Waves_desc:0 "新世纪给我们准备了一份大礼———一场残酷的大战以及随之而来的无数争端与纠纷。\n可法兰西仍然挺立欧陆。\n现在，阻挡他前进步伐的只剩下海峡那边的敌人。上一次，在他们的干涉下，法国铩羽而归。这一次，法国将重整旗鼓、全力以赴。\n法兰西必将傲立于巨浪之上！\n"

