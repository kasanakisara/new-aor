 AOR_FRA_new_ideas:0 "新思路，新想法"
 AOR_FRA_new_ideas_desc:0 "法兰西如今的经济毫无疑问处于十分紧迫的危机之中：对内，法国正陷入前所未有的通货紧缩之中，无论是政府还是平民都缺少足够的财力支持生产，消费、和其他经济活动；对外，世界大战后法国毫无疑问负债累累，即使是《凡尔赛条约》为战败国施加的赔款也难以抵偿这笔数额巨大的债务。\n面对这样危机的形势，法兰西必须拿出全新的想法和手段来对付。米勒兰总统的幕僚提出了一个想法：增发货币，通过将货币投入资本市场活跃经济。这虽然会造成一些不好的后果，但是毫无疑问是一个权宜之计。幕僚们称这一计划为“雪崩计划”，意为通过制造人为的雪崩，用雪水滋润已是荒漠的法兰西经济。\n然而，这么冒险的货币政策需要经过议会大多数议员的同意，而反对党们似乎对这个计划意见很大……但抛开一切，总统阁下和他的政府也决心要赌上法兰西的国运，以挽救这岌岌可危的祖国！"

