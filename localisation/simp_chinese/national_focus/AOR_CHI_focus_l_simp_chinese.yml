 CHI_Yuan_triping:0"袁大总统的年假"
 CHI_Yuan_triping_desc:0"自1912年就任临时大总统以来，袁世凯总统已经为中华民国及其子民服务了近七载，庚申年的除夕渐渐临近，袁大总统也终于可以享受自己久违的年假。"

 CHI_Assess_s:0"评估国内社会情况"
 CHI_Assess_s_desc:0"自1915年而起的战事，至今业已到了落幕之时。既外患已除，应当收回目光，注视民生多艰。财政部受袁大总统之命，开启了对民国人民生活情况的大规模普查，而针对普查中所发现的问题，各部将统筹规划，进行民国的民生改革。"

 CHI_we_win:0"宣扬对俄战争胜利"
 CHI_we_win_desc:0"近代以来，列强对我华夏蚕食鲸吞，其中尤以俄国最甚。而今，在袁大总统的英明领导下，我们的将士不畏强敌，奋勇向前，击败巨熊，收复故土。今日我们因胜利开怀畅饮，为袁大总统贺，为中华民族贺!"

 CHI_stop:0"遏制诸党政治风潮"
 CHI_stop_desc:0"在对俄作战期间，我们对国会各党进行了一些“小小”的限制。而他们以此为借口，心怀怨望，在背地里上蹿下跳、鼓动串联。即使如袁大总统这般宽宏大量之人，也觉得他们过于聒噪了。如今战事已毕，到了和他们算账的时候了。"

 CHI_forward:0"努力请从今日始"
 CHI_forward_desc:0"民国的前几个年头已然过去。在袁大总统的领导下，对外我们击败了列强俄寇，对内维持了民主共和，相比于清末的风雨飘摇，如今民国的未来可谓充满希望。当然，与列强相比，我们还只是迈出了一小步，工业化进程缓慢，军队日趋落后，人民生活也并未有太大的改观。为了一扫华夏近代之耻，重获往昔天朝上国之荣光，我们必须立刻行动起来，从今天开始，一步步振兴我们的国家。"

 chi_waixibeizhanzheng:0"时机成熟"
 
 CHI_ask_for_loan:0"要求英法借款"
 CHI_ask_for_loan_desc:0"在我们对俄作战开启之前，英法两国不断的向我们许诺，只要我们能够发兵，经济和军事援助绝不会少。今日我们虽然取得振奋人心的胜利，得胜回朝，但无数的华夏儿郎永远的留在了西北边陲，同时，由于对俄作战，国内的经济和发展都受到了不同程度的影响。我们不能白白为协约国流血，袁大总统命令外交部立刻联系英法公使，要求给予我们应得的资助。"

 CHI_hold_on:0"稳定国内局势"
 CHI_hold_on_desc:0"借助军事上的对外胜利和政治上的威权手段，袁大总统让原本暗流涌动的国家重新回到了正轨。国会各派达成了表面上的和解，军队在获得如此辉煌的胜利后，自然也对袁大总统忠心耿耿。面对如此欣欣向荣之景象，袁大总统计划发表一次演说，以向国民彰显其文治武功。"

