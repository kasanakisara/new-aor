 AOR_Gathering_in_Anfu_Hutong_desc:0 "民国本就不稳定的表面平衡，在袁大总统仙逝后，变得更加脆弱。进步党人，南北国民党人，以及一些还依然隐藏在水面下的势力，都开始在阴影中蠢蠢欲动。暗流已经涌动，而作为深受袁大总统器重，甚至是半个女婿的段祺瑞，如今正处在抉择的十字路口。如今，是时候做出决断了。徐树铮已经做好安排，在不日将于安福胡同举行的聚会上，段祺瑞将必须和他的同道一起，做出未来方向的最后决定。"
 AOR_Northwest_Defense_Law_desc:0 "西北战事了结后，大部分前线部队已然返回。此时俄人哥萨克进入蒙古，无疑是对我民国主权的践踏。但今日之形势，再想全国动员，共击俄寇已然不太现实。在此种情况下，建立一支特编蒙古驻军，以在当地稳定局势和进行建设，是最合适的选择。"
 AOR_Northwest_War_desc:0 "袁总统离世前的最后一段时间，最关注的就是西北的对俄战事。即使是在病中，他也多次询问前线战事顺不顺利，官兵将士们的士气如何，能不能吃饱穿暖。如今大总统已逝，我们更要收拾心情，打起精神，牢记总统遗愿，抓准时机，猛击熊腹，血我中华近代之耻！"
 AOR_Pursue_with_victory_desc:0 "在全国资源向西北倾斜的情况下，对俄战事总体平稳。但如今暗流涌动的局势，让对俄战争的进程蒙上了一层阴影。但恰在此时，前方传来了捷报，指挥部慎重考虑，决定乘胜追击，早日驱逐俄寇，防止夜长梦多。"
 AOR_Save_the_fruits_of_the_battle_desc:0 "在国内局势日益不稳后，后方对前线的支援力度逐渐减弱，时断时续，根据汇报，前线的非中央军队已经有不稳的迹象。而由北洋组成的精锐部队，在战场上恰逢其会的获得了一场胜利。指挥部综合考虑前线状态与国内局势，决定转攻为守，守住已有战果。"
 AOR_If_you_dont_catch_me_I_ll_rush_north_desc:0 "屋漏偏逢连夜雨，在政局日益紧张之时，西北又传来了坏消息。仍处于内战的俄罗斯，竟然将我们精锐的西北边防军击溃。尽管敌人出于政治目的和补给限制，没有再向前推进，但毫无疑问，这场战争我们输的很彻底。前线已经出现了不稳的情况，我们必须当机立断，将失利的影响降到最低。"
 AOR_Chasing_after_the_downfall_and_heading_north_drinking_horses_and_spreading_the_power_of_barbarians_desc:0 "似乎没有人预料到我们在外西北能获得如此之大胜，英法，日俄，包括......我们自己。前线传来的捷报让整个陆军部措手不及，前线局势似乎不是小好，是一片大好，俄寇似乎因为种种原因丧失了作战的意志和能力，我军势如破竹，如今已经超额完成了既定任务。陆军部急电前线维持战线，而在反复确认战果无误后，是时候让全国百姓高兴高兴了。"
 AOR_Take_it_as_soon_as_you_see_it_s_good_and_put_it_in_your_bag_for_safety_desc:0 "战争进行了一段时日，我军与俄军互有攻守，但终究落得个取胜遥遥无期，撤军思之可惜的境地。但如今，我们的财政和政局都不允许我们将这场鸡肋的战争再拖延下去了，俄方在与我方秘密接触时，提出可以以维持现状的方式结束这场战争，对双方来说，这可能已经是最好的结果了。"
 AOR_Take_shelter_from_the_sharp_edge_he_will_report_in_the_future_desc:0 "尽管前线将士已经用尽了全力，胜利似乎依旧遥不可及。精疲力尽的敌我双方，在前线相互对峙，而双方的上层，开始了无趣而漫长的谈判，这场战争对于官兵来说，已然结束。继续沉湎于过去已毫无意义，为今之计，莫过于暂避锋芒，来日再战。"
 AOR_bridge_the_gap_desc:0 "即使政见不一，理念不合，我们和吴子玉以及中央系的关系，依旧有着最后一层纽带 ——北洋同袍。如今大总统撒手人寰，国家面临危机，作为曾经的生死弟兄，真的要走到手足相残的那一步吗？"
 AOR_Negotiating_conditions_with_the_Central_Department_desc:0 "既然已下定决心，那就要迅速采取行动。中央系是三方势力中纸面实力最弱的，但是他们实质上控制着北京，犹如心口的一把尖刀。我们应该与他们接触，寻求合作的可能，从而确保京兆地区的安全。"
 AOR_Meeting_with_Wu_Ziyu_desc:0 "吴佩孚在其周围聚拢了一群政见相近的将校，在如今人心惶惶的北洋内部，有另立山头的打算。为了维护北洋团结、共克时艰，是时候开诚布公的和吴子玉进行一次会面，讨论北洋的未来了"
 Internal_Tripartite_Coordinati_on_Meeting_within_Beiyang_desc:0 "在与中央系和吴子玉达成初步协议后，弥合北洋的第一步已经顺利完成。为了能更好的团结北洋，也为了能更好的满足皖-央-直三方的利益，举行一次三方协调会议的计划已经提上了日程。"
 AOR_the_last_try_to_organize_beiyang_desc:0 "直到现在，也有许多人难以相信，北洋真的完成了内部统合，但事实确实如此。这个松散的联盟可能持续不了太久，但仅仅是目前来看，如今的北洋，可谓精诚团结。"
 AOR_Unbreakable_and_unstoppable_desc:0 "民国政府曾经脆弱的平衡，几乎完全系于大总统一人。如今，从国会到地方，分裂和对抗由暗到明，不一而足。而在北洋系内部，由于大总统去世而产生的权力真空，也让野心家蠢蠢欲动。袁世凯在北洋军中的地位和影响力，是独一无二且无法替代的，想要推举另一个可以让大多数人信服的继任者，几乎是天方夜谭。北洋的分裂，已不可避免，既然如此，我们的该早做准备，确保我们能笑到最后"
 AOR_Xu_Shuzheng_s_Northwest_Mission_desc:0 "为了达成袁总统痛击俄寇、收复故土的目标而特别成立的西北军队，几乎集中了全国各方势力的精锐力量。而在当今的局势下，西北诸军必然人心惶惶。此时安排徐树铮北上，不仅可以安顿军心，在可能的情况下，还可以尝试拉拢地方势力里心向中央的官兵，从而为未来多掌握一分筹码。"
 AOR_Jin_Yunpeng_s_Military_Reform_desc:0 "北洋成军时，可谓中华第一陆军，其装备之精良，精神之坚韧，都是旧时代部队所不具备的。但如今，一次世界大战令军事科技和军事战术都得到了长足发展。而北洋却因为内部混乱和军费不充足等原因，一直故步自封。可笑的是，这样一只世纪交接水平的准新式陆军，在二十年代的中华，仍然是一只劲旅。对此痛心的段总理，会同靳总长，制定了一份北洋的初步改革方案。"
 AOR_Attract_the_First_Fleet_of_the_Navy_desc:0 "直系在苏直两省的巨大影响力，以及对豫省的控制力，使我们不得不未雨绸缪，若苏豫直尽数落入敌手，我们的控制区域将直接被截断，保险起见，我们应该拉拢海军第一舰队，以在陆路交通断绝时，通过海上交通线，保证前线的补给。"
 The_concept_of_Tuchun_desc:0 "随着西北战事逐步趋于稳定，原本为其单独设立的西北联合指挥部失去了他的作用。令人意外的是，段祺瑞政府似乎并不打算就此将它解散。根据北京政府内部传来的消息，段祺瑞邀请各省督军召开了一次军事会议，会后，被称作“督军团”的构想，逐渐流传开来。"
 AOR_Reorganize_the_party_affairs_of_the_Socialist_Party_desc:0 "在袁世凯政府时期，国会的权利一直被压制，即使如此，国会中的进步党，国民党， 也一刻也没停止发声。与他们相比，我们社会党可谓一盘散沙，只能靠着拉偏架，才勉强能和他们斗一个旗鼓相当。是时候对我们的党务进行一次彻底的整理，让我们也能通过政党，发出自己的声音。"
 AOR_Encore_influential_individuals_with_real_power_desc:0 "作为以北洋为根基的政治势力，我们在军事力量方面自然有着无可比拟的优势，但与之相对的，在治理国家方面，缺乏足够的文官和基层官员体系，是我们无法避免的硬伤。如今时间紧迫，为了提高我们的执政效率，也为了防止后院起火的悲剧发生，我们应该拉拢议会中的文官集团，以期补齐我们的执政短板。"
 AOR_Unify_the_ideology_within_the_party_desc:0 "在完成了对社会党的初步整顿后，原本党内腐败横行、山头林立的情况得到了缓解。当然，想要一劳永逸的解决党务问题，绝不是朝夕之功。但如今整顿之风余波尚在，党内各股势力暂时不敢轻举妄动，利用好这个宝贵的时间，初步统一党内思想，对我们的事业来说，百利无害。"
 AOR_Recruit_talents_from_the_wilderness_desc:0 "除了从内部对党务进行整顿外，适度引入新鲜血液，也不失为一个好办法。如今在政坛中，有不少能力与品德俱佳的人物，却因为无人发掘，或是被其他党派刻意打压而无法施展抱负。我们要做的，就是在加以甄别的基础上，给他们一个展示自己的舞台。当然，这也是要让党内一些人明白，他们并非不可取代。"
 AOR_The_government_has_planted_confidants_desc:0 "在处理完社会党的内部事务后，我们终于可以放开手脚，在国会内外的政坛上尽情发挥。为了扩大在政局中的影响力，我们应该利用好身为正统中央政府的优势，在各个部门通过培养和收买的方式，建立一支服务于我们的官僚队伍。"
 Promulgate_the_Party_Ban_Law_desc:0 "即使我们不断努力，国内政局依旧日益不稳。除了浮于表面的组织外，背后一定藏着有组织有预谋的黑手。随着调查的深入，每起事件背后，都或多或少发现了共产党人活动的痕迹。北洋方面表现出了超乎寻常的团结，共同施压国会，誓要将扰乱国家秩序，破坏国家安定的破坏分子绳之以法。"
 AOR_To_seek_skin_from_a_tiger_desc:0 "如今的局势下，我们要争取一切可以争取的支持，也要避免一切可能出现的威胁。扶桑托我们政府内部的卧底捎来口信，想与我方商谈合作事宜。政府中的一派人坚决反对，他们认为，若我们接受了这橄榄枝，就免不了在未来背负卖国罪名；但另一派的观点是，直截了当的拒绝日本人，其可能会转而支持我们的敌人，甚至在我们开战时催动奉系背后捅刀，与其这样，倒不如先答应下来，未来取得胜利后，再重新打算。两派争论不休，而最终决定权，在段祺瑞手中。"
 AOR_A_close_meeting_with_the_transportation_department_desc:0 "拒绝了日本人的橄榄枝，增强了我们的内部稳定和凝聚力。在基层官吏和年轻官僚的口中，段总理的威望与日俱增。但当消息传到高层的耳中时，大家大多报以苦笑。“得益于” 北京政府内部大量的留日派，我们轻而易举的得知，日人正在秘密接触直系，而如今他们似乎交谈甚欢。除此之外，日本人当初向我们抛出橄榄枝，也是看准了我们的软肋。中央财政入不敷出，甚至连官员的薪水都发不出来，而今因为拒绝卖国而支持我们的人潮，或许明天，就会因为欠薪而抛弃我们。我们的窘境自然瞒不过有心人，交通系的邀请，或许是我们必须抓住的救命稻草了。"
 Socialization_TO_Socialization_desc:0 "夜幕下的四九城，远没有上海的繁华与喧嚣。大部分平民百姓大多略带饥饿的早早睡下，梦中还要为明日的生计发愁。而在某处院落里正举行的一场社交晚宴中，赴宴的双方面对满桌的山珍海味，却提不起兴致。对社会党背后的北京政府来说，交通系的橄榄枝足以救命，但若过早显露出自己的弱势与急迫，那不免被狮子大开口；而对资金充足，却手无寸铁的交通系来说，投资处于危机的北京政府似乎百利无害，但若是一着不慎，被手握枪杆的对方吃干抹净，那便只能欲哭无泪。双方宛若对弈的棋手，反复权衡筹码和底牌后，才敢谨慎的落子。"
 AOR_Economic_reform_plan_desc:0 "北京政府的经济问题早已是公开的秘密，财政部也一直在为解决这个问题呕心沥血。在与交通系接触后，财政部也与交通系内部的金融专家进行了深入的讨论。面对如今棘手的经济形势，双方在反复研究后，基于国内财富大量藏于民间的现状，提出了两种短期解决方法。"
 AOR_Bank_of_Communications_s_Generous_Disdain_Relief_desc:0 "困扰我们许久的经济问题，在我们与交通系的初步合作后，得到了一定的缓解。交通银行愿意提供一大笔长期的低息贷款，以维持我们政府的正常运转，代价是换取在我们未来的工业基建部门中的话语权（或者说垄断权）。我们别无选择，更何况这个代价本身也不算巨大。"
 AOR_Close_talks_between_Japan_Anhui_and_Fengtian_desc:0 "日本人给出的条件，对于如今深陷经济危机窘境的我们来说，是无法拒绝的。当然，对于我们政府中那些底层官员来说，想要接受和日本人合作，必然需要时间。如今他们有牢骚，也是情有可原，等俸禄发到手里，他们乐呵呵数钱的时候，又有几个人在乎这钱是日本人给的呢。在我们内部亲日派的安排和对接下，双方的合作比想象中更加顺利，我们获取了急需的资金和武器援助，而付出的只是一点“小小的”代价。等未来危机解除，我们获得全面胜利之时，一切质疑之声都会烟消云散的。今日，为了庆祝日皖奉全面合作，也为了共商未来，三方再次坐在了一起。"
 AOR_Anhui_Fengtian_Secret_Covenant_desc:0 "在与日方确定合作关系后，我们和奉天的张大帅如今也算同舟共济。为了在未来与直系的对决中不至于腹背受敌，我们将在日方的见证下与奉天方面签订秘密互不侵犯协定。"
 AOR_Japan_Anhui_Friendship_and_Mutual_Aid_Agreement_desc:0 "作为东亚最早完成工业化的国家，也是列强中唯一的亚洲国家，日国在工业发展中有许多值得我们学习的方面，而其也拥有许多我们急需的技术和设备。在我们提出请求后，日方慷慨的派出一支考察团，与我方洽谈合作事宜。当然，人尽皆知的是，他们肯定不会无偿的帮助我们。"
 AOR_Financial_Suggestions_from_Guisan_Nishihara_desc:0 "针对我们的财政窘境，日本财政专家，与日本政界联络颇深的西原龟三向我们提出了一个建议。日方将根据我方需要，向我方提供足够的借款，以帮助我们度过困境。当然，日本人不是慈善家，它们必有所图，而且通常所图甚广，可木已成舟，如今，这是我们唯一的选择了。"
 AOR_engage_in_arms_expansion_desc:0 "内部各派蠢蠢欲动，外部俄寇又卷土重来，为了在即将到来的风暴中拥有自保之力，我们必须扩充现有的军备实力，以便在未来的战争中拥有更大的胜算。"
 AOR_Establish_a_crash_course_for_military_officers_desc:0 "在直系控制了保定军校后，我们的军官教育体系一直没有得到恢复。利用此次蒙古暴乱的时机，段靳二人决定开设临时军官速成班，以此提高军队战斗力，同时增加对部队的掌控力。"
 AOR_Mongolian_State_of_Emergency_Act_desc:0 "数月过去，蒙古局势并未有所好转，甚至更加危急。多股俄国势力在蒙古兴风作浪，而蒙古贵族因不满我们的统治，正勾结白俄领袖恩琴，妄图分裂蒙古。为了维护国家统一， 击碎蒙古和俄国的阴谋，段总理宣布蒙古进入紧急状态，新组建的西北边防军即刻出发，北上蒙古。"
 AOR_A_white_blade_never_lets_go_desc:0 "西北边防军摧枯拉朽的击败了妄图分裂的蒙俄野心家，如今，曾桀骜不驯的蒙古贵族如同待宰羔羊，等待着他们命运的时刻。对待叛匪，没有怜悯可言，这些蒙古贵族和哥萨克人自诩为“马上民族”，我们正好有些对付骑兵的新武器可以让他们尝尝鲜。马克沁，就位！"
 AOR_Success_in_the_first_battle_victory_in_the_court_desc:0 "袁大总统仙去前最后的愿望，今日终于得以实现。中华健儿收复了被俄寇侵吞的外西北领土，中华的旗帜再次在夷播海旁飘扬。如今，在边疆浴血奋战、九死一生的战士，到了归乡之时了。"
 AOR_Memorandum_of_Understanding_on_Northwest_Affairs_between_China_and_the_Soviet_Union_desc:0 "为了彻底结束外西北战事，我方与苏俄进行了短暂却困难重重的谈判。逼迫高傲的俄国人低头是一件难事，幸而俄国国内的形势让他们不敢长久拖延，结果反复而激烈的磋商，双方最终无可奈何的在备忘录上签下自己的名字。毫无疑问，某一方，甚至是双方都对此不满，但目前的情况下，这已是最好的结果了。"
 AOR_Stable_Jingzhao_desc:0 "作为民国的首都及国家政治中心，京兆对于斗争各方来说，都是争夺的焦点。若是将主力布置在此，不仅可以防备奉系乘乱南下，还可以震慑北洋内部的宵小，防止其祸乱首善之地。牢牢掌控着首都之地，更可以彰显我们的正统性，保障作为中央政府的权威。为此，我们要将我们的精锐主力部署于京兆，以备未来之变。"
 AOR_Interception_of_aid_from_foreign_powers_desc:0 "在向政府要害部门安插人员后，我们对政局的操弄变得更加容易。在一战和对俄作战期间，英法等向我们输入了大量的（过时）武器弹药，其中还有很多至今在仓库里尘封。如今战事已毕，而国内形势紧张，是时候让它们发挥自己的作用了。各个部门的内应已然就位 我们能获得多少，就看他们的能耐，和我们的运气了。"
 AOR_Influence_Congress_desc:0 "利用社会党和其他势力的合作，我们如今在国会已然有了举足轻重的地位。总统选举即将到来，我们理由对国会进行一些“微不足道”的影响，让我们的势力得以获得胜利。"
 AOR_CLEAR_cage_to_exchange_birds_desc:0 "除了公然反叛我们的贵族，还有一些蒙古贵族选择中立或者站在我们身边。新的蒙古秩序正在建立，为了奖励他们的忠诚，我们允许他们夺取反叛贵族的财产和人口，并安排他们出任空缺的位置。当然，他们若想在当地站稳脚跟，就必须向中央政府靠拢；如此一来，中央政府的势力便可以借此名正言顺的进入蒙古。"

