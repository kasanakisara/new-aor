 CHI_gaigebeiyang_desc:0 "经历了一个时期的混乱与阵痛后，段靳二人对北洋的初步改革已经有了成效。剔除和优化了冗余人员和腐化机构，使原本暮气昭昭的北洋军重新焕发出了生命力。但是作为执行者的段靳二人明白，在处理完表面问题，并将北洋改革推进至深水区后，改革只会越来越困难。"
 AOR_Attract_the_First_Fleet_of_the_Navy_tt:0 "未来海军第一舰队将加入北京政府一方作战"
 AOR_shengchengsangexibeibianfangjun_tt:0 "70天后生成三个“西北边防军”师，未来归属于皖系；西北边防军将领（曲同丰、樊钟秀、郭坚）将在未来加入北京政府）"
