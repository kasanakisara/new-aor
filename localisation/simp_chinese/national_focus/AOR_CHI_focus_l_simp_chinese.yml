l_simp_chinese:  
 CHI_Congress_speech:0"民族主义演讲"
 CHI_Congress_speech_desc:0"自1913年4月8日第一届国会召开至今，国会扮演着实现平衡各派系利益、决定国计民生，维护国家统一的重要角色。而现今，在即将召开1919年国会的一次常规会议上，袁世凯大总统放出声来，他将发表自世界大战结束以来第一次演讲，决定民国未来的道路。"

 CHI_Anti_russian_propaganda:0"反俄宣传"
 CHI_Anti_russian_propaganda_desc:0"沙皇俄国是世界上最野蛮，最残忍的国度，林则徐曾言“终为中国患者，其俄罗斯乎!”而今林文正公所忧已成现实，幸我国与协约盟国联合伐俄贼，断其触须，才免此灾。而今恰逢俄贼内乱，我们自当削株掘根，以绝后患。"

 CHI_Young_Volunteer_Army:0"青年志愿军"
 CHI_Young_Volunteer_Army_desc:0"沙皇俄国曾经趁火打劫的抢夺了诸多属于我们中国的土地，而现在正是收复失地的大好时机，热血青年们踊跃参军，报国杀敌。"
 
 CHI_Manipulate_Congress:0"操纵国会"
 CHI_Manipulate_Congress_desc:0"自世界大战以来，总统府不得不将大量权力让渡与国会，以维护国家统一。但即使如此，我们仍不会容些许跳梁小丑干涉朝政，以至误国误民。且等略施些手些段，国会自会乖乖屈服。"

 CHI_Reclaiming_outer_northwest:0"收复外西北"
 CHI_Reclaiming_outer_northwest_desc:0"外西北，自第二次鸦片战争以来，清廷孱弱，竟至于被步步紧逼，割土献民，吾等深以为耻。古语：“天予不去反受其咎”而今天赐良机，自当报国仇家恨，提虎狼之师，光复失地。"

 CHI_Northwest_joint_command:0"西北联合指挥部"
 CHI_Northwest_joint_command_desc:0"在世界大战中，我们曾深受军令不一，令出多门之苦，而为此次征伐外西北，袁世凯大总统决心仿效雍正设立军机处之旧事，于库伦组建西北联合指挥部，以统帅征西诸军。"

 CHI_international_aid:0"国际援助"
 CHI_international_aid_desc:0"我们加入协约国共同讨伐俄贼，而今日吾等出兵伐俄，亦是为防止俄贼卷土重来，作为我们出兵的条件，协约诸国承诺提供我们所需的武器装备，现在正当将承诺落到实处。"

 CHI_Mobilize_workers_help_in_war:0"兴工助战"
 CHI_Mobilize_workers_help_in_war_desc:0"正所谓“兵马未动，粮草先行”，在世界大战中，俄贼深陷补给困扰，我等常以断其补给阻其攻势。俄贼之教训犹在眼前，袁世凯大总统决心发动民夫，囤积物资于库伦，为接下来的外西北战事准备。"

 CHI_war_bond:0"战争债卷"
 CHI_war_bond_desc:0"为维持世界大战的恐怖消耗，我们的国库已经承受了过多的压力，若只靠国库定无力维持再起战端。幸此次伐俄之战，是我民族之战，自当由全民集体承担，政府已决心发行低息债卷以支持战事，而社会各界爱国人士积极响应，真乃吾民国之福。"

 CHI_Hold_down_south:0"压制南方"
 CHI_Hold_down_south_desc:0"长久以来南方那些刺头们就不太听话，这次收复外西北的战事对于他们没有直接的好处，于是便个个阳奉阴违，看来需要给他们些压力来落实政策。"

 CHI_Yuan_is_dying:0"袁大总统的年关"
 CHI_Yuan_is_dying_desc:0"自1912年就任临时大总统以来，袁世凯总统已经为中华民国及其子民服务了近七载，庚申年的除夕渐渐临近，袁大总统也终于可以享受自己久违的年假。"

 CHI_Year_of_Gengshen:0"正值庚申年"
 CHI_Year_of_Gengshen_desc:0"庚申年诚乃开辟新时代之年，袁世凯大总统虽不幸因病逝世，但民国携大战胜利之威，伐俄贼，收西北，聚民心，诚是一个崭新的时代。我等相信在政府的英明领导下，民国将继续取得新的成就。"

 CHI_peoples_democracy:0"人间正道是沧桑"
 CHI_peoples_democracy_desc:0"袁世凯死了。作为中华民国第一任大总统,有人说他是长期控制北京国会的独夫民贼、有人说他是带领中华民族打赢世界大战的英明领导,不过他已经死了,死在一个仍然由列强、资本家、地主、“土皇帝”玩弄的国家。他的死是一个旧时代的落幕，而未来是由在车间拿着工具的工人、田地拿着农具的农民、战壕拿着武器的战士，由千千万万劳动人民来掌握。"

 CHI_National_Revolution:0"尚余遗业艰难甚"
 CHI_National_Revolution_desc:0"民国9年，距离孙中山拜谒明孝陵已经过了8年，孙中山未必想到当初意气风发宣布成功驱逐鞑虏的自己会在几年后困顿于国会的失败中。当初为了国家尽快获得和平，把大总统之位给了袁世凯，只获得了北洋对国民党的打压，国民党无法掌握国家方向，无法组建内阁，导致大量人员脱党，内部分裂。宋教仁离开政坛，孙中山被党内外指责，现在的国民党在袁世凯去世后该何去何从，是继续第一大党之位，还是被政坛各路势力掩盖下去。"

 CHI_United_provincial_republic:0"遂见高撞自由钟"
 CHI_United_provincial_republic_desc:0"自辛亥以来吾等所追求之自由平等，现确系破坏无余。蠹虫满堂，争结党以争私利；武夫干政，视法制为无物；独夫自专，假共和而实独裁，民国诚已病入膏肓。而正所谓“上医医国”，吾等愿继承《革命军》之遗志，撞自由钟，树独立旗，再兴革命，荡涤宇内，尽除民贼，另造自由平等之联省共和国。"

 CHI_Rule_law:0"安福胡同的聚会"
 CHI_Rule_law_desc:0"民国本就不稳定的表面平衡，在袁大总统仙逝后，变得更加脆弱。进步党人，南北国民党人，以及一些还依然隐藏在水面下的势力，都开始在阴影中蠢蠢欲动。暗流已经涌动，而作为深受袁大总统器重，甚至是半个女婿的段祺瑞，如今正处在抉择的十字路口。是分是合，是时候做出决断了徐树铮已经做好安排，在不日将于安福胡同举行的聚会上，段祺瑞将必须和他的同道一起，做出未来方向的最后决定。"

 CHI_law_heavy_light:0"大总统的觊觎者"
 CHI_law_heavy_light_desc:0"在袁大总统离世后，一群有野心的人纷纷将目光盯上了那个空悬的宝座，波诡云谲的北京仅仅保持着表面上的平和。一通电话，让掌握着中央禁军的曹锟第一次意识到自己并不是没有机会触碰总统的宝座。也许曹锟并不能完全弄明白民国的游戏规则，但他认为，只要拉拢到足够的的盟友，谁又能阻止他染指至高权力呢？"
