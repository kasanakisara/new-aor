 CHI_Flag_Independence_0_desc:0 "民国以来，我等长期附庸于袁世凯麾下，处处受其掣肘，令我等始终难以赢取各方信任。而在此乱局渐现之际，我们应抓住时机摆脱附庸地位，旗帜鲜明的打出联省共和的旗帜，团结一切力量，共襄盛举。"
 CHI_cooperate_absolute_sincerity_1_desc:0 "纵观我们与北洋在民国的数次交锋，大多败于叛徒之手。正所谓宁缺毋滥，我们需要重塑进步党团结，清扫投机者，接纳共和派，实现精诚团结，为实现联省共和做好准备。"
 CHI_UN_XHGZJS_3_desc:0 "在京兆局势愈发紧张之际，梁任公先生邀请党内各理事于新会会馆，希望召开进步党的紧急理事会议，讨论我党应如何应对当今局势，并制定下一步的方略。"
 CHI_UN_SLLXPJY_7_desc:0 "立宪派大多是我们的核心成员，但由于各种因素许多立宪派成员仍然选择观望中立，我们需要争取这些中立的立宪派人士，团结整个立宪派，为面对加下来的风暴积蓄力量。"
 CHI_UN_XNTMHYS_8_desc:0 "自1917年国会事件后，不仅国民党内部出现分裂，许多同盟会义士也对国民党感到失望。这些同盟会义士都是共和支持者，我们可以吸纳他们加入进步党，协力再造共和。"
 CHI_UN_CSJBDZY_9_desc:0 "进步党是共和党、民主党、统一党三党合并的产物，这造成进步党的内部混乱。究其原因，是理事的权力不明和理事位的滥授。因此我们需要重新确定理事人员，并重组理事会，由理事会统领政务部和党务部，建立强有力的进步党领导核心。"
 CHI_UN_DZZCWZ_4_desc:0 "民国以来，形成了长期的武人干政的传统，他们破坏共和、视法制为无物、肆意妄为，已然成为吾国之大害。为了应对这种局面，我们需要打造属于我们进步党的忠诚武装。"
 CHI_UN_TJYXGJG_10_desc:0 "粤湘桂的许多军官都是曾经的革命党人，但由于各种原因被迫接受军阀的招揽。我们可以重新联络这些革命军官，引之为我们共和事业的同盟。"
 CHI_UN_JCSYGHP_11_desc:0 "袁世凯为了维持其独裁统治，曾架空众多共和派军官，并将他们招募进总统府看管。而今袁世凯逝世，他生前的独裁措施反而为我们创造了机会，我们可以招募这些共和派军官，邀请他们一起南渡广州，参加联省共和。"
 CHI_UN_LSGMJ_12_desc:0 "在新文化运动中，黎天才将军接触到了“联省主义”思潮，并表达了明确的兴趣。在长期的接触下，黎将军秘密加入了进步党，成为我党的重要臂膀。在局势渐趋紧张的当下，黎将军向我们发密电希望可以南下参加联省共和，我等正可以将之引为忠于我党的军队。"
 CHI_UN_GGJBDDB_5_desc:0 "由汤化龙先生创办的《晨钟报》，在北洋的重压下，为本党多次仗义发声。但松散无组织的报刊无法继续应对现在的局势，我党决心改革《晨钟报》，正式将其作为机关报，并以此为阵地与北洋交锋。"
 CHI_UN_JZNBKJF_13_desc:0 "正所谓“名不正则言不顺，言不顺则事不利。”，我等应当抢先发动，利用党报《晨钟报》争夺舆论制高点，为接下来与北洋的争斗取得先机。"
 CHI_UN_DHJDBJC_14_desc:0 "第二舰队中存在着许多共和支持者，我们可以通过关系网络不断地串联共和派海军军官，争取第二舰队加入未来的中华联省。"
 CHI_UN_XQMZZYF_15_desc:0 "曾经在新文化运动中，我们在华南地区掀起“联省之风”的思潮，扩大了我党在华南的影响力。现趁北洋内斗而无法管辖之际，我们可以开展大规模的联省主义宣传，将我们的主张向全中国传播。"
 CHI_UN_JLHN_35_desc:0 "华南作为进步党和联省主义的大本营，是我们接下来事业的重心，因而最好早做打算，为内战经营华南。"
 CHI_UN_ZQMZXZB_6_desc:0 "无论是革命还是改革都需要有充足的资金支撑。我们可以请求国内的民族资本资助，为联省共和的事业预备资金。"
 CHI_UN_LHMZSYT_16_desc:0 "华南作为民族资本主义发展较好的地区，涌现出众多民族资本家，他们大多认同联省主义的主张，是我们的天然同盟，我们可以试着寻求他们的支持。"
 CHI_UN_YQNYZHQ_17_desc:0 "在近代革命史上，南洋华侨的一直扮演着重要的角色。我们可以邀请南洋华侨加入我们的事业，为我们的中国之自由平等而戮力同心。"
 CHI_UN_CTWQCML_18_desc:0 "在南洋华侨和华南实业家等的帮助下，我们成功打通了海外武器的采购通路，使得可以储备武器以防备可能爆发的内战。"
 CHI_jus_cause_enjoys_abundant_support_2_desc:0 "正所谓“得道者多助，失道者寡助。“，无论是北洋三系还是国民党，都已尽失华南民心，这正是我等大有可为之机遇，正当在华南争取更多支持，以图大业。"
 CHI_UN_FQNFDZB_19_desc:0 "在粤湘桂三省都督的支持下，我们在华南有较大规模的党组织分布，但因顾虑我们限制了党支部的权力。现在应该放权华南党支部，令其自主行事，在华南争取更多支持。"
 CHI_UN_LLDFSQP_20_desc:0 "粤湘桂三省军队中，仍有大量的非进步党实权军官，为了准备可能发生的内战，应当利诱他们加入我党，扩大我党在三省军队中的影响力。"
 CHI_UN_XNGHZJP_21_desc:0 "中华民国的国会相当复杂，但大多都是墙头草，只要我们许以重利，便可获得他们的支持，壮大我党在国会的声势。"
 CHI_UN_KDJBDTM_22_desc:0 "无论在华南地方军队还是中央国会我党都成功的吸纳了更多的盟友，建立了广大的进步党联盟，这必将成为我们的事业之基石。"
 CHI_UN_JJHN_36_desc:0 "在袁世凯去世之际，黎元洪理事长因宪接任总统职。面对北洋内斗分裂的局面，正是在京兆攫取更大的利益的时机。"
 CHI_UN_LLHNSDD_23_desc:0 "华南三省都督“自广州事变”加入进步党以来，长期为我们提供各种支持，现在京兆危局渐露，正当派遣特使拜访三位都督，稳固我党后方。"
 CHI_UN_FXJSXHB_24_desc:0 "在八国联军侵华战争中，东南督抚曾密约互保，使得东南地区免于战火。现在北洋三系虎视眈眈，我们也可以仿照旧事，与云南的国民党势力秘密联络，共同应对来自北方的威胁。"
 CHI_UN_LSJJSHJ_25_desc:0 "未来的内战中，海洋也是重要的环节，关系到物资采购通道的畅通。三位都督决定联合起来，集资收买第二舰队军官。并以高官厚禄许诺，说动第二舰队加入联省政府。"
 CHI_UN_THZJFSJ_26_desc:0 "清末民初大兴团练，使得地方有许多私军存在，形成大大小小的军阀，三督决定正式收编这些杂乱的民军。"
 CHI_UN_ZQFGDYZ_27_desc:0 "法国出于抗衡英日的需要，一直向我们传达支持的意愿。现在应该将这些落到实处了，三督决定向法国要求资金援助。"
 CHI_UN_TTDWQTZ_28_desc:0 "法国作为世界陆军强国，装备速度迭代很快，很多武器设计不再满足法国陆军的需要。但这些武器设计却正好可以弥补我们的空缺，可以从法国引进这些旧式武器图纸，以供仿造。"
 CHI_UN_JDDFJGW_29_desc:0 "法国的陆军训练是世界首屈一指的，我们可以从法国引进顾问来指导我们的军队改革，增强华南军队的战力，逐渐向世界一流陆军看齐。"
 CHI_UN_JCHXCGH_30_desc:0 "曾经龙济光为害广西，引得天怒人怨，陆、陈二督发动“讨龙之役”，将其驱逐。但是何须长久的旧仇所困，法国愿意出面调解，让龙济光和平加入我们，以壮大联省政府的军势。"
 CHI_UN_JNSTDTZ_31_desc:0 "商团作为华南的重要经济力量，其中尤以广东的势力最强。广东商团的代表表达了希望会见三位都督的意愿，希望以献金作为投名状，加入我们的联省事业。"
 CHI_UN_SBSTGWZ_32_desc:0 "商团公所在面对民初较为混乱的局势，购买武器和组建军队，对保护商业曾起到积极作用，但在三位·都督稳定华南后，商团拥兵自重，不愿放下武装。不过在商团与我们结盟后，问题迎刃而解，我们可以正规化商团武装，进一步加强军势。"
 CHI_UN_BZLQZYQ_33:0 "列强的势力长期干涉中国的局势，如果我们想要有一番作为的话，在早期至少不能表达对列强的敌意，应当暂时宣布保证列强特权，以换取国际支持。"
 CHI_UN_YJYMZSW_34_desc:0 "南洋的混乱局势使得当地交叉着密密麻麻的走私网络，其中有些是我们华人掌控的，我们可以暗中支持与收买他们，将这些走私网收至麾下。"
 CHI_UN_QZXXGMD_37_desc:0 "拒直援湘”战役后，虽然赵恒惕都督成功掌控湖南大局，但国民党谭延闿等仍然盘踞在湘西辰沅道。在“广州事变”后，湘西盘踞的国民党更是成为眼中钉、肉中刺，我们趁早清除这些乱党。"
 CHI_UN_DZSGBFX_38_desc:0 "南岭的存在使得两广地区拥有天然屏障，因而可以数次与势力浩大的北洋交锋，但湖南地区的一马平川使得该地防守较为困难，为防备湖南被长驱直入，陈炯明都督拟在韶关北一线打造防线，以便赵恒惕都督可以见机转进防守。"
 CHI_UN_DCGHYSA_39_desc:0 "北洋各派曾经多次操纵选举，留下众多把柄，但迫于武力威胁和袁世凯的威慑，常常不便公开。值此国会选战的关键时刻，正是清算与北洋营私的时刻。"
 CHI_UN_YZZTFQB_40_desc:0 "无论北洋如何不满，现在黎元洪理事长高居总统之位，自当行使总统权力。黎元洪总统决心发动总统的权柄，与北洋诸系好好斗上一斗。"
 CHI_UN_NYGJCBJ_41_desc:0 "在京兆文官系统内，遍布着我们的支持者，这位我们挪动存于首都的储备金营造了机会，正所谓“天予不取，反受其咎”，应当速速行动，转移资金到华南。"
 



 ##########################军阀##############################################

 warlords_Make_a_Name_for_Oneself:0"猛龙过江"
 warlords_Make_a_Name_for_Oneself_desc:0"古有楚庄王一鸣惊人，今我等正如猛虎下山，猛龙过江，要向中原诸侯露一露手中的锋芒。"

 warlords_safety_for_the_people:0"宣布保境安民"
 warlords_safety_for_the_people_desc:0"随着北洋的分裂，南方的自立，中原已经陷入紧张对峙。在强弱胜负尚未明了之际，正当宣布保境安民，屈身守份，以待天时。"

 warlords_Dancing_Together:0"联袂共舞"
 warlords_Dancing_Together_desc:0"春秋战国时文武分设，以各司其职，治国安邦。今我等武人与文人合作，正合各司其职之意，文人治国，武人安邦。"

 warlords_Appoint_people_with_favoritism:0"任人唯亲"
 warlords_Appoint_people_with_favoritism_desc:0"裙带关系才是最可靠的纽带，只有将关系网络渗透军政系统，使得军政权力集中于督军之手，才可在接下来的争霸中占据先机。"

 warlords_Stable_Provincial_Council:0"稳定本省议会"
 warlords_Stable_Provincial_Council_desc:0"昔日袁大总统通过国会粉饰门面，我们亦可以授予省议会一些次要权力，摆出开明的姿态以赢取人心。"

 warlords_Jointly_wielding_power_with_local_gentry:0"联合乡绅掌权"
 warlords_Jointly_wielding_power_with_local_gentry_desc:0"地方乡绅是我们最坚实的盟友，我们可以适度授予其政府官职，吸纳地方乡绅成为我们的共治者。"

 warlords_Buying_Beiyang_generals:0"收买北洋将领"
 warlords_Buying_Beiyang_generals_desc:0"在北洋把持中央的时期，大量北洋派系的将领被安插进我们的军队中，很显然如今北洋已经无暇顾及这些安插的楔子，我们可以吸纳其中的识时务者扩充我们的力量。"

 warlords_Dissolve_the_Provincial_Council:0"解散本省议会"
 warlords_Dissolve_the_Provincial_Council_desc:0"我们没时间听省议会的叽叽喳喳，直接解散议会由政府决策才是高效的选择。"

 warlords_Establish_a_trusted_government:0"组建亲信政府"
 warlords_Establish_a_trusted_government_desc:0"将权力分享给正确的人，是统治的关键，让听话的亲信出任政府要职可以让我们的更加如臂使指。"

 warlords_Clean_the_Beiyang_generals:0"清洗北洋将领"
 warlords_Clean_the_Beiyang_generals_desc:0"先总统袁世凯为了巩固北洋的统治，在各地军队中穿插北洋系的将领，他们已经成为安插在我们军队里的钉子，必须予以剔除。"

 warlords_Military_and_political_unity:0"军政统一"
 warlords_Military_and_political_unity_desc:0"据《春秋公羊传》所载“何言乎王正月？大一统也。”，其所谓大者，尊大之大；一统者，上下一体。而今我们军政合一，权力尽归于督军，正合尊大之大，上下一体之势，诚大有可为。"
 warlords_Build_accumulate_king:0"高筑墙，广积粮，缓称王"
 warlords_Build_accumulate_king_desc:0"一室之不治，何家国天下之为？当优先发展自身，打造模范强省，使我等之德政如风，传遍中国。"

 warlords_Preemptive:0"先发制人，后发制于人"
 warlords_Preemptive_desc:0"《史记·项羽本纪》载：“会稽守通谓梁曰：‘江西皆反，此亦天亡秦之时也。吾闻先即制人，后则为人所制。’”，而今我们所处情形正如殷通一般，必须抓紧时机，先发攻入中原。"

 warlords_Reform_taxation:0"革新税赋"
 warlords_Reform_taxation_desc:0"自民国以来，赋税的混乱导致财政大规模腐败。这一方面是由于列强的干扰，另一方面则是地方的擅权。昔日北京的中央政府面对硕大的中国无法厘清税赋制度，而今我们船小好掉头，正该统一税赋制度。"

 warlords_Increase_education_funding:0"提高教育资金"
 warlords_Increase_education_funding_desc:0"传统的乡塾教育无法满足现代化的需求，我们需要对新式教育进行拨款，培养新式人才。"

 warlords_Pre_tax_collection:0"预征税款"
 warlords_Pre_tax_collection_desc:0"中原诸侯征战不休，生灵涂炭，我等胸怀吊民伐罪之志，自不可坐视。然兵马未动粮草先行，当下只有预征税款，以补军用。"

 warlords_Limited_education_investment:0"有限教育投入"
 warlords_Limited_education_investment_desc:0"在未来扩张中，基层的吏员必将出现大量空缺，为了未雨绸缪，在培养人才方面进行适当投入是可行的"

 warlords_Control_opium_cultivation:0"管控鸦片种植"
 warlords_Control_opium_cultivation_desc:0"自1840年鸦片战争失败以来，鸦片已经成为腐化我国国民，扰乱社会治安的重要因素。诚然我们现在的政府财政仍然需要鸦片贸易的维持，但我们应当对其进行合理管控并逐步摆脱对其的依赖。"

 warlords_New_Teacher_Textbooks:0"新式教师教材"
 warlords_New_Teacher_Textbooks_desc:0"工欲善其事，必先利其器。政府应当拨专款为新式学堂引进教师和教具，提高教学的质量。"

 warlords_Establishing_Provincial_Universities:0"建立省立大学"
 warlords_Establishing_Provincial_Universities_desc:0"落后的教育无法培养新式的人才，唯有设立省立大学才可以帮助我们在技术上打破掣肘，实现进步。"

 warlords_Official_Opium_Industry:0"官营鸦片产业"
 warlords_Official_Opium_Industry_desc:0"我们的财政无法离开种植鸦片的利润，既如此，与其任由劣商洋人滥种鸦片害人，不如由官方主持种植，共同富贵。"

 warlords_Returning_to_traditional_education:0"回归传统教育"
 warlords_Returning_to_traditional_education_desc:0"清朝曾经有发达的地方私塾体系，我们没有必要完全舍弃这种已有的教育体系，只需稍加改良引入科学知识，就可以培养忠诚且能干的人才。"

 warlords_Supporting_local_enterprises:0"扶持本地企业"
 warlords_Supporting_local_enterprises_desc:0"工业产品仅仅依靠进口是不能持久的，我们需要发展自己的民用工业，对本地的工商业进行投资是不错的选择。"

 warlords_Official_Office_for_Enterprise_Collection:0"企业收归官办"
 warlords_Official_Office_for_Enterprise_Collection_desc:0"洋务运动中，清政府通过大规模官办商业实现中兴，后因吏治败坏失败，我们可以取其精华去其糟粕，把民营企业收归官府经营，以实现富国强兵。"

 warlords_Introducing_advanced_drawings:0"引进先进图纸"
 warlords_Introducing_advanced_drawings_desc:0"相比于漫长的成本自研技术，购买来自西洋成熟的技术图纸是更好的选择。"

 warlords_Sit_idly_by_to_see_success_or_failure:0"坐观成败"
 warlords_Sit_idly_by_to_see_success_or_failure_desc:0"纵观天下争霸称雄之辈，大多身败名裂，黯然退场。人贵在自知，不若为北道主人，择中原一雄主投之，确保留下子孙可享之家业。"

 warlords_Initiate_unified_negotiations:0"开启统一谈判"
 warlords_Initiate_unified_negotiations_desc:0"中原胜负已分，不若趁现今仍有余地，倒戈卸甲，以礼而降，仍不失封侯之位。

 warlords_Joining_the_British_camp:0"投靠英国阵营"
 warlords_Joining_the_British_camp_desc:0"近代中国凡掌权者皆不得不向列强妥协以换取支持，我们也是时候选择投靠的列强了。"

 warlords_Seeking_support_from_France:0"寻求法国支持"
 warlords_Seeking_support_from_France_desc:0"近代中国凡掌权者皆不得不向列强妥协以换取支持，我们也是时候选择投靠的列强了。"

 warlords_Accepting_Japanese_aid:0"接受日本援助"
 warlords_Accepting_Japanese_aid_desc:0"近代中国凡掌权者皆不得不向列强妥协以换取支持，我们也是时候选择投靠的列强了。"

 warlords_Zhuolu_Zhongyuan:0"逐鹿中原"
 warlords_Zhuolu_Zhongyuan_desc:0"时机已到，是时候涿鹿中原，成就我们的霸业。"

 warlords_Provincial_Army:0"省立军队"
 warlords_Provincial_Army_desc:0"军权长期掌握在众位将军的手中，并不利于长久的安稳，应当从军费、任免、兵役多方面下手，将军队由私人转为省有。"

 warlords_Loyal_Army:0"忠诚军队"
 warlords_Loyal_Army_desc:0"用乡缘和地缘为纽带，从军官到士兵实现戮力同心，是军队战斗力的保障。"

 warlords_Expand_military_academy:0"扩充讲武堂"
 warlords_Expand_military_academy_desc:0"清末曾规定各省应于省垣设立讲武堂一处，为现带兵者研究武学之所。我们可以掌控并扩大这些讲武堂，使其成为我们未来军官的摇篮。"

 warlords_Introducing_new_weapons:0"引进新式武器"
 warlords_Introducing_new_weapons_desc:0"工欲善其事必先利其器，只有最先进的武器才能保证军队的战斗力，引进新式武器图纸将帮助我们更快实现武器更新。"

 warlords_A_fierce_general_will_strike_upon_death:0"猛将发于卒"
 warlords_A_fierce_general_will_strike_upon_death_desc:0"随着军队的扩大，军官短缺也愈发严重，我们可以提拔作战勇敢的忠诚士兵，这不仅可以充实军官队伍，还可以提高军队的士气。"

 warlords_Quantity_is_better_than_quality:0"数量胜于质量"
 warlords_Quantity_is_better_than_quality_desc:0"我们孱弱的工业水平不允许我们生产高质量的武器，与其少量精械，不如人手一枪。"

 warlords_Improving_the_quality_of_soldiers:0"改良兵员素质"
 warlords_Improving_the_quality_of_soldiers_desc:0"在当下，人数众多的乌合之众不是军队发展的方向，应当简练精兵强将，打造新式强军。"
 warlords_Everyone_can_be_a_soldier:0"人人皆可为兵"
 warlords_Everyone_can_be_a_soldier_desc:0"往常的军阀战斗告诉我们，往往并不需要太多的精锐士兵，只需对民兵稍加训练，便可以投入实战。"

 warlords_Provincial_Weapon_Factory:0"省营武器工厂"
 warlords_Provincial_Weapon_Factory_desc:0"分散、自主的军工业规划，使得我们的军工多是小规模且分散的作坊，这不仅限制了我们军工业规模的进一步扩大，也导致军工产品质量低下，这种情况必须被改善。"

 warlords_Procurement_of_overseas_weapons:0"采购海外武器"
 warlords_Procurement_of_overseas_weapons_desc:0"我们的军队的武器仍有大量的缺口，仅凭我们的制造无法补充这些空缺，从海外采购一些武器或许会有用。"