l_simp_chinese:
#事件
EGY_country_focus:0 "埃及国策"
EGY_looking_forword:0 "向前方看去"
EGY_looking_forword_desc:0 " 大战给埃及留下的只有残肢与绷带，战后的混乱局势又将埃及带入深渊，这个古老的国家再又一次遭受了重创。但现在绝不是悲伤的时候。\n历史翻开了的新的篇章，新的危机已然到来，我们应当做的，或者唯一能做的，就是向前方看去，然后踏入那迷雾笼罩的未来中。"
EGY_Stabilize_the_situation:0 "稳定局势"
EGY_Stabilize_the_situation_desc:0 "我们需要做些什么来维持埃及的稳定"
EGY_Reassure_the_population:0 "安抚民众"
EGY_Reassure_the_population_desc:0 "我们需要做些什么来安抚埃及的民众"
EGY_fire:0 "开火!"
EGY_fire_desc:0 " 但那些暴徒已经严重扰乱了埃及，使得埃及的方方面面都陷入停滞状态，而我们的忍耐也是有限度的，这种无休止的暴动必须得到解决，哪怕以最极端的方式。\n“快去请艾伦比将军！”!"
EGY_tiktak:0 "军靴作响"
EGY_tiktak_desc:0 "军队，象征着铁的纪律，象征着无可撼动的权威，我们需要利用他们，来维护埃及的稳定，来维护国家建立的根本\n当军靴踏在地上时，你唯一听见的只有秩序的沉默"
EGY_the_british_here:0 "英国佬来了!"
EGY_the_british_here_desc:0 "为了应对埃及风起云涌的独立浪潮，顺利解决埃及问题，英国政府已决定派出由米尔纳领衔的代表团，意图与我方就具体事项进行谈判并最终尽可能达成双方都满意的协议。这正是我们打击那些华夫脱分子所需要的"
EGY_Obey_the_Voice_of_Independence:0 "顺从独立之声"
EGY_Obey_the_Voice_of_Independence_desc:0 "政府内部已经达成共识，我们绝不能辜负民众的期望。既然人民要求独立，那我们自然要顺应他们的呼声，但如今混乱的局势显然对谈判来说不甚理想。埃及独立必须，也只能在我们的领导下实现，为此，我们应该联系那些愿意合作的独立领袖，或是颇有名望的民众代表洽谈相关事宜。而对于那些不识抬举的头目，谁知道明天和意外哪个先来呢？"
EGY_Appeal_to_the_public:0 "呼吁民众"
EGY_Appeal_to_the_public_desc:0 "浪潮里，每一朵浪花都有它的作用，都需要被关注。现在，我们要向我们亲爱的人民报告：我们听见了他们的呼声，他们的诉求不会被忽视，我们会带着他们的热情前行。埃及人民们！你们已经做得很好了，接下来就交给我们这些专业人员吧，你们应该好好歇一歇了......"
EGY_Appeal_to_the_public_tt:0 "现在该休息了"
EGY_Publish_Announcement:0 "发布公告"
EGY_Publish_Announcement_desc:0 "只要给予他们蝇头小利，他们便会自行退散"
EGY_Publish_Announcement_tt:0 "只要给予他们蝇头小利，他们便会自行退散"
EGY_No_resistance_allowed:0 "不容一丝反抗"
EGY_No_resistance_allowed_desc:0 " 风起云涌的独立浪潮如同魔鬼的低语，四处活动的煽动家们用鹦鹉学舌蒙蔽了人民，让他们肆意的攻击他们的祖国。时间已经不多，不能让混乱的局势再继续下去了，我们必须当机立断，打出重拳，才能遏制这种激进浪潮的蔓延！"
EGY_No_resistance_allowed_tt:0 "我们将会正面对抗魔鬼"
EGY_Prepare_the_baton:0 "备好警棍"
EGY_Prepare_the_baton_desc:0 " 对如今大量陷入狂热的民众来说，只有啪啪作响的警棍才能让他们冷静下来恢复理智。目前的局势已经十分严峻，为了维持街面的秩序，我们理应扩大警方的执法范围和权力，同时提升他们的待遇，依靠常与普通民众打交道、一线经验丰富的警官们的主观能动性，防患于未然，及时扑灭革命之火。"
EGY_Prepare_the_baton_tt:0 "警察已经握紧了他们的警棍"
EGY_Rifle_loading:0 "步枪上膛"
EGY_Rifle_loading_desc:0 "相比于数量庞大但易于击破的普通民众，那些暴乱的中坚力量各个死硬难缠，警棍可吓不退他们。为此，我们已经秘密在军营里展开了特训，一支支别动队已逐渐成形。既然他们要试试是他们的脑壳硬还是黄铜硬，那我们当然要好好“招待”他们了......\n子弹管够！自由射击！"
EGY_Rifle_loading_tt:0 "士兵已经握好了他的步枪"
EGY_The_shackles_creaked:0 "镣铐作响"
EGY_The_shackles_creaked_desc:0 "除了那些明面上的鼓动家，隐藏在暗处四下串联、组织运动的家伙，才是最危险的一群人。而同样，只要抓住他们，就能重创他们的组织能力和激进程度。通过钞票和严刑，我们在一点点接近他们的领导核心；或许只差几次突击，就能解决这群麻烦......希望那些乱党喜欢银色的手镯，或者是粗糙的麻绳。\n毕竟一经发出，概不退换！"
EGY_The_shackles_creaked_tt:0 "我们将在暗中削弱他们"
EGY_Violators_shall_bear_the_consequences_themselves:0 "违者,后果自负"
EGY_Violators_shall_bear_the_consequences_themselves_desc:0 "鲜血，唯有红得发黑的鲜血、唯有干涸成块的鲜血；泪水，唯有家破人亡的泪水，唯有阴阳两隔的泪水。只有这血泪流淌成河，才能止息那蔓延的混乱；只有这现实触目惊心，才能冷却空想主义者的激情。我们定下了规矩，并展示了违反规矩的后果。由此，我们终于获得了稳定......即使它只是暂时的。"
EGY_Violators_shall_bear_the_consequences_themselves_tt:0 "死亡是暴乱者唯一的结局"
EGY_make_only_superficial_changes:0 "改头换面"
EGY_make_only_superficial_changes_desc:0 "短短时间里，我们的政府便从独立运动汹涌波涛里的扁舟，变成了执掌独立计划巨轮的舵手。如今，人民相信我们能带领埃及前进，原本的独立运动领袖们也大多被我们团结起来，成为我们政府里的助力。现在，新生的埃及政府要开始行动了......"
EGY_make_only_superficial_changes_tt:0 "我们一直是一个体谅民众的政府，不是吗？"
EGY_Hidden_killing_intent:0 "暗藏杀机"
EGY_Hidden_killing_intent_desc:0 "我们顺从独立的做法固然赢得了大部分人的支持和认可，但依旧有一小撮死硬分子不愿意接受我们对独立运动的领导地位。如今，我们已经完成了大部分的计划，是时候给这些不团结分子一些教训，维护我们政府的权威和稳定了。\n至于替罪羊......大概是极端分子吧，毕竟谁会怀疑为他们哀悼，并且下定决心秉承他们遗志的政府呢？"
EGY_Hidden_killing_intent_tt:0 "有奖有罚，才是合理的制度"
EGY_Thinking_about_our_future:0 "思考我们的未来"
EGY_Thinking_about_our_future_desc:0 "汹涌的浪潮逐渐回落到了可控的范围，可我们却不能松一口气。下一个问题已然迫在眉睫：我们的未来该去向何方？为了订立未来发展计划，我们必须先对埃及祖国有彻底而准确的了解。基于此，政府各部门计划分别建立起工作小组：他们将去往埃及的各行各业，各城各镇，对埃及社会的各方面实际情况进行系统性的收集、整理、总结、分析，以期最终汇聚成一份完整的报告，作为我们评估未来发展方向的重要佐证。"
EGY_Thinking_about_our_future_tt:0 "我们将从埃及社会的各个方面收集资料，并评估我们未来发展的方向"
EGY_The_Victory_of_Huafutuo:0 "华夫托的胜利"
EGY_The_Victory_of_Huafutuo_desc:0 "§R独立似乎是一场幻梦，可新的消息似乎将这幻梦带入了现实§!"
EGY_The_Victory_of_Huafutuo_tt:0 "§Y谈判即将开始§!"
 