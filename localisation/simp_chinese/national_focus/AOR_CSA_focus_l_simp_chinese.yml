l_simp_chinese:  

CSA_Declaration_of_Independence:0 "§Y《独立宣言》§!"
CSA_Declaration_of_Independence_desc:0 "乔治·华盛顿、本杰明·富兰克林、托马斯·杰斐逊……一处处洒脱而庄重的签名，一位位山巅之城的至圣先贤。他们在《独立宣言》的历史长河中，他们天堂之上，在那千禧年后归宿的地方-他们正在向我们传出呼喊：\n\n§t喂，哥伦比亚，美利坚人，快快起来，走向与暴君的最终之战！§!"

CSA_Reorganize_the_flag_and_drum:0 "重整旗鼓"
CSA_Reorganize_the_flag_and_drum_desc:0 "曾几何时，自由的南方人民，也曾拥有过一个自由的政府-虽然60年前的联盟国政府已经彻底消失在了历史长河之中，但如今，我们将会再次拾起先辈们的旗帜，并最终完成上帝交给我们的任务。"

CSA_Rise_again:0 "东山再起"
CSA_Rise_again_desc:0 "一个崭新的国家必然需要一个代表人民的领袖-来自德克萨斯州的加纳先生，就是这其中的典范。作为能力优良且极其受欢迎的迪克西党人，相信在他的领导之下，联盟国羽翼下的万千民众必将团结一心，为了维护那天生的权利而战斗！"

CSA_The_Way_of_Neutrality:0 "中立之道"
CSA_The_Way_of_Neutrality_desc:0 "谁都知道联盟国的处境。在这拥有接近3000万人民的国度之下，其经济体系却支离破碎。我们有七成的企业被北方所控制，就连外国资本也渗透了南方的各大城市，属于我们自己的成果则寥寥无几。如今南北双方仍然奉行企业中立政策，那我们最好继续保持……"

CSA_Labor_people:0 "劳动吧，贱民！"
CSA_Labor_people_desc:0 "联盟国的社会是如此的复杂且混乱，以至于产生了大量的流氓群体以及无业游民-包括那些负债累累的黑人。如今，我们可以利用他们与企业主们做一场交换。他们将会以取得他们生存所需的报酬的方式为我们与企业工作，而在这天赐的优惠下，我们必然能够获得更多的物资。"

CSA_Involuntarily:0 "身不由己"
CSA_Involuntarily_desc:0 "即使外部的企业是如此的恐怖，但为了捍卫联盟国来之不易的成果，我们必须出手。虽然我们不能直接公开没收企业资产，但我们可以以特殊时期为由，对一般工厂进行管控，同时对那些已经对我们造成威胁性的企业，则进行全面查封。"

CSA_Can_turns_into_bullet:0 "罐头变子弹"
CSA_Can_turns_into_bullet_desc:0 "既然各州已经获得了一定数量的自主企业，那是时候应该让生产消费品的工厂转变为生产军火的工厂了。"

CSA_Take_charge_of_one:0 "独当一面"
CSA_Take_charge_of_one_desc:0 "迪克西党作为南方以及现今联盟国最大的政党，它他的党员人数最多，并拥有数量第一的本党控制州。如此强劲的政治资本，必然决定了迪克西党将会扛起自由独立的大旗，为联盟国冲锋在前。而其他政党，也自然会成为我们的帮手……"

CSA_only_one_sound:0 "只有一种声音"
CSA_only_one_sound_desc:0 "战争的爆发造成了社会的动乱，各种流言蜚语层出不穷。作为联盟国喉舌的我们，为了维护来之不易的胜利果实，必然要对这帮独裁者的帮凶们进行严厉打击，无论他是白人或者黑人！"

CSA_Measures_for_Black_People:0 "§0《黑人临时管理办法》§!"
CSA_Measures_for_Black_People_desc:0 "黑人作为我们社会存在的最危险因素，在这个节骨眼上，终于集中的爆发出来了。我们无法想象黑人所造成的一切严重后果，但我们可以提前预防。并使他们当中的危险分子，为我们的斗争而服务。"

CSA_Free_command_of_the_gun:0 "自由指挥着枪"
CSA_Free_command_of_the_gun_desc:0 "遥想独立战争，大陆会议组建大陆军，战场上，华盛顿英勇无比，指挥千军万马与英人殊死拼搏，一切一切，仍未离去。联盟国政府应该发挥她领导的作用，我们将统一指挥枪杆子，向北方的独裁政权发起属于我们的怒吼。"

CSA_Reform_the_militia_system:0 "改革民兵制度"
CSA_Reform_the_militia_system_desc:0 "民兵制度是南方各州的护身法宝，但如今战端四起，原先民兵制度下的武装力量，显然无法应对现代战争。既然如此，在联盟国的支持下。我们必然要对民兵制度进行改革。使其更加专业化。"

CSA_Unite_as_one_city:0 "众志成城"
CSA_Unite_as_one_city_desc:0 "人民主权之所以是人民主权，是因为各州以及国家，是人民意志的集中体现，是人民的意志所产生的。联盟属于人民，正是这样，迪克西党就更应该放低姿态，邀请其他政党参与决策，依靠全民的力量解决问题。"

CSA_Extinguish_the_flames:0 "将火苗熄灭"
CSA_Extinguish_the_flames_desc:0 "我们不能总是以暴力的方式去解决社会的问题，许多人认为，正是因为拥有社会问题，所以我们就有机会以治理的角度去解决问题。通过安抚我们的棕色和黑色小兄弟，亦或是那些白人穷鬼们，我们便能收获意想不到的好处。"

CSA_And_throw_it_into_the_trench:0 "并扔进战壕里！"
CSA_And_throw_it_into_the_trench_desc:0 "那么，代价呢？非常简单明了。下等兵黑鬼。现在就给我冲锋！上等兵汤米，你也应该为国家与人民作出贡献了……去前沿挖战壕去！"

CSA_Unity_and_solidarity:0 "团结一致"
CSA_Unity_and_solidarity_desc:0 "十三州殖民地的代表共同决定了北美的前途与命运。如今的众多党派，也势必将会联合起来，决定我们前进的方向。"

CSA_All_the_people_are_soldiers:0 "全民皆兵！"
CSA_All_the_people_are_soldiers_desc:0 "“一分钟”人在列克星顿打响了武装反抗暴君的第一枪，这已将近150年的余晖，却时刻的照耀着我们的思绪。是啊，如果不是依靠人民的支持，我们怎会赢得战争？我们必然不会伤害联盟国人民的爱国情感，但我们应该让他们自发地组织起来，武装自己，让人人都成为捍卫自由的斗士！"

CSA_Lord_listen_to_our_prayers:0 "§t主啊，倾听我们的祷告！§!"
CSA_Lord_listen_to_our_prayers_desc:0 "§9《以弗所书》 3-14-21\n\n“因此，我在父面前屈膝，（天上地上的各家，都是从他得名。)求他按着他丰盛的荣耀，借着他的灵，叫你们心里的力量刚强起来，使基督因你们的信，住在你们心里，叫你们的爱心有根有基，能以和众圣徒一同明白基督的爱是何等长阔高深，并知道这爱是过于人所能测度的，便叫神一切所充满的，充满了你们。神能照着运行在我们心里的大力充充足足地成就一切，超过我们所求所想的。但愿他在教会中，并在基督耶稣里，得着荣耀，直到世世代代，永永远远。阿们！”§!"