 ##########角色##########
 SOV_Lenin:0 "弗拉基米尔·伊里奇·列宁"
 SOV_Lenin_desc:0 "“列宁和其他领导者比较起来不简单是一个领导者，而且是一个最高典型的领导者，是一只山鹰。”\n列宁是为革命而诞生的。他是组织革命的天才和领导革命的伟大能手。米哈伊尔沙皇不因自负而因胆怯而愈发收紧的专治，二月革命轻飘飘的继续战争和沸腾的民意，竟都让列宁的预见成为现实：俄国起义一定会胜利，起义一定会结束帝国主义战争，俄国的起义一定会鼓舞西方受尽苦难的群众，起义的结果一定会成立苏维埃共和国。而苏维埃共和国一定会成为全世界革命运动的堡垒。\n列宁培养了布尔什维克党，把布尔什维克党培养成为世界上最坚固最有锻炼的工人党。沙皇政府及其走狗的打击，资产阶级和地主的疯狂暴行，高尔察克和邓尼金的武装袭击，英国和法国的武装干涉，一切资产阶级报刊异口同声的造谣和诬蔑，——1912年来所有这一切恶毒的攻击都落在党的头上。可是，党像一座石山一样屹立着，打退了敌人无数次的攻击，引导工人阶级向胜利前进。\n这是两种截然不同的领袖特质：一种是风暴时期的领袖，实践家领袖。这是是有自我牺牲和勇敢精神的，但是在理论上薄弱的特质。另一种是和平时期的领袖，这是在理论上很强，但是在组织和实际工作方面却薄弱的特质。而列宁却是一个人，一个无产阶级领袖的通才。\n“......不要陶醉于胜利，不断巩固胜利成果，彻底击溃对手。”劳动王国是可以靠劳动者自身的努力来建立的，劳动王国是应该建立在地上，而不应该建立在天上的。在这个革命还年轻的盛夏，我们要向罪恶的心脏开拔。"
