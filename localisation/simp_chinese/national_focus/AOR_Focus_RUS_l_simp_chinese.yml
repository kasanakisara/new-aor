SOV_Steel.60.t: "出版"
SOV_Steel.60.d: "最后一章终于写就。加莉亚花了几天时间把小说给保尔通读了一遍。\n明天就将书稿寄往列宁格勒，交给州委文化宣传部审阅。如果上面给这部小说发放“出生证”，那就将它送交出版社，这样一来……\n想到这里，他的心不安地跳动起来。这样一来……新的生活即将开始，这是多年紧张而又顽强的劳作换取而来。\n书稿的命运决定着保尔的命运。如果书稿被彻底否定，那么，这将是他的末日。如果书稿局部不成功，有败笔之处，还可以通过进一步加工来加以矫正，那他将立即发起新的攻坚战。\n母亲把沉甸甸的包裹送交到邮局。于是，紧张等待的日子开始了。保尔一生中还从未有过像现在这样痛苦而焦急地等待来信。他从早班信等到晚班信。列宁格勒方面一直没有回音。\n出版社迟迟没有答复渐渐成为一种险情。失败的预感一天比一天强烈，保尔意识到，一旦小说遭到无条件拒绝，那将是他的灭顶之灾。那时，他再也没脸活下去。一死了之得了。\n此时此刻，海边郊区公园的一幕重又浮现在眼前，他一次又一次地问自己：\n“为了挣脱铁环，为了重归队伍，为了使自己的生命更有意义，你是否尽了一切努力？”\n每次的回答都是：\n“是的，好像是尽了一切努力。”\n好多天过去了，正当等待变得无法忍受时，母亲的激动之情不亚于儿子，边往屋里跑边喊：\n“列宁格勒来信了！！！”\n这是州委发来的电报。报文上寥寥数语：\n小说备受称赞。付诸出版。顺祝成功。\n他的心怦然加速欢跳。多年的愿望终于实现了！铁环已被挣断，他重又拿起新的武器，回归队伍，投入新生活。"
SOV_Steel.60.a: "————奥斯特洛夫斯基"