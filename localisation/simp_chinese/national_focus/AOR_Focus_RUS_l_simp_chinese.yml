 AOR_RUS_union_Committee_category_desc:0 "£GFX_AOR_GER_blank £GFX_AOR_GER_blank 苏维埃政权作为在最专制、最反动、最封建的俄罗斯帝国的遗骸上建立的政治实体，却拥有着世界上最为先进的议事制度和最能实现直接民主与间接民主相统一的民主决策程度。\n£GFX_AOR_GER_blank £GFX_AOR_GER_blank §Y列宁§!作为主席团的核心人物，也是贯彻主席团§Y常务决策§!、§Y党内民主§!和§Y落实党员组织生活§!的伟大导师。由他主持的苏维埃主席团是除了全苏维埃人民代表大会之外全俄罗斯及各加盟共和国的常务最高领导集团。"
