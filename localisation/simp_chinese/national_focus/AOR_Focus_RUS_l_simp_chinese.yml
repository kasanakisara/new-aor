 AOR_RUS_Soviet_union_category_desc:0 "£GFX_AOR_GER_blank £GFX_AOR_GER_blank 1917年的俄国十月革命结束了俄国临时政府与工兵代表苏维埃并立、一个国家两个政府的奇怪局面，苏维埃政权正式在俄国建立了起来。然而，迎接苏维埃政府的并不是革命成功的喜悦，铺天盖地而来的各种敌人、此起彼伏的叛乱和规模惊人的内战在全国范围爆发了，这个新生的国家几乎从诞生伊始就面临着夭亡的威胁。"
