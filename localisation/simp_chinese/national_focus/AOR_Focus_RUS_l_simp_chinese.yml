 SOV.1.t: "破除迷信"
 SOV.2.t: "平等教育"
 SOV.3.t: "形式主义的终结"
 SOV.4.t: "支援"
 SOV_Steel.1.t: "出征"
 SOV_Steel.1.d: "清晨，小城和车站早已是空荡荡的，显得十分孤寂。最后一列火车的车头拉响几声汽笛，好像是在作别，留守城里的那个营，在车站后面铁路两侧布起了警戒线。遍地撒满了黄叶，树枝光秃秃的。风卷着落叶，沿路悄悄地飞跑。\n谢辽莎穿着红军军大衣，身上扎着帆布子弹带，和十个红军战士一起，守卫着糖厂附近的十字路口，等待波兰军队的到来。\n阿夫托诺姆·彼得罗维奇敲了敲邻居格拉西姆·列昂季耶维奇家的门。这位邻居还没穿好衣服，从敞开的房门里探出头来，问：\n“出什么事了？”\n阿夫托诺姆·彼得罗维奇指着持枪行进的红军战士，向他的朋友使了个眼色。\n“部队开走了。”\n格拉西姆·列昂季耶维奇提心吊胆地看了他一眼，问：\n“您知不知道，波兰人的标志是什么样的？”\n“好像是只独头鹰。”\n“哪儿能弄到呢？”\n阿夫托诺姆·彼得罗维奇不耐烦地挠了挠后脑勺。\n“他们倒好，啥事没有，”他三思后说，“铺盖一卷，一走了之。可你得费尽心思，考虑如何迎合新政权。”\n突然，一挺机枪嗒嗒地响了起来，打破了四周的寂静。车站附近的火车头拉响了汽笛，同时从那里传来了一声沉重的炮声。紧接着一颗重型炮弹划破长空，呼啸而过，落在工厂后面的大道上。路边的灌木丛立刻淹没在蓝灰色的硝烟里。闷闷不乐的红军战士沿着街道默默地撤退，不时回头看看后边。\n一颗泪珠凉飕飕地顺着谢辽莎的脸颊流落下来。他急忙擦去泪痕，回头向同志们看了一眼。还好，没人看见。\n同谢辽莎并肩而行的是又高又瘦的锯木厂工人安捷克·克洛波托夫斯基。他的手指扣在步枪扳机上。安捷克脸色阴沉，心事重重。他与谢辽莎两眼相对，并向他道出自己的心事：\n“这回咱们的家人可要倒霉了，特别是我的家人。他们一定会说：‘一个波兰人，还去抗击波兰大军。’他们准会把我家老头赶出锯木厂，用鞭子抽他。我劝老人家和咱们一起走，可他就是撇不下这个家。唉，这帮该死的家伙，我巴不得早点碰上他们！”安捷克急冲冲地把遮住眼睛的帽檐往上推了推。\n“再见了，我的故乡，再见了，这脏乱不堪的小城，再见了，这歪歪扭扭的小屋，坑坑洼洼的公路！再见了，亲人们，再见了，瓦莉亚，再见了，转入地下的同志们！凶恶的异族侵略者和杀人不眨眼的波兰白军已经逼近了。”\n穿着油污衬衫的机车库工人们，眼含忧愁目送着红军战士们。\n谢辽莎满怀激情地喊道：“同志们，我们还会打回来的！”"
 SOV_Steel.1.a: "后会有期"
 SOV_Steel.2.t: "战斗"
 SOV_Steel.2.d: "望着奔流的河水，谢辽莎不能不想起昨天的情景。\n昨天中午，谢辽莎满怀愤怒之情参加了攻打白军的反击战。也还是在昨天，他生平第一次面对面地与一个没有胡子的白军匪兵展开肉搏战。那家伙端着步枪，枪上插着像马刀一样长的法国刺刀，一边莫名其妙地喊着什么，一边像兔子那样跳着，向谢辽莎猛扑过来。短短的几秒钟，谢辽莎目睹他那睁得很大、杀气腾腾的双眼。霎时间，谢辽莎刀尖用力一拨，击打着白军匪兵的刺刀。那把明晃晃的法国刺刀被挑到了一边。\n白军匪兵倒下了。\n谢辽莎毫不手软。他知道自己以后免不了伤人。他，谢辽莎，既能柔情似水地爱，也能韧性如钢地捍卫友谊。他既不是一个凶恶的人，也不是一个残暴的人，但他知道，这些怀着禽兽般的仇恨侵犯亲爱的共和国的异族士兵都是受世界寄生阶层的欺骗和派遣而来\n于是，他，谢辽莎，之所以要杀人，就是为了人类大地上不再互相残杀的日子快快到来。\n\n正在这时，帕拉莫诺夫推了推他的肩膀，说：\n“快走，谢辽莎，要不我们很快就被发现。”"
 SOV_Steel.3.t: "水"
 SOV_Steel.3.d: "当部队在摇摇晃晃的浮桥上跑步前进时，从山背后飞来一颗炮弹，只见那炮弹从战士们头顶上呼啸而过，落在水里炸开了。就在那一刻，米什卡一头栽到搭建浮桥的小船底下，让河水吞没了，再也没有浮上来，只有淡黄发的战士亚基缅科看见了，他头戴一顶掉了檐的破军帽，一见这情景，惊叫起来：\n“哎，你说急不急人啊？米什卡掉到水里啦！小伙子不见了，就像泥牛入海一样！”\n他胆战心惊地望着黑沉沉的河水，本想停下跑步，但后面的人撞上他，并推了他一把，说：\n“你这傻瓜，愣着干吗？还不快跑！”\n当时谁也顾不上考虑同伴的安危。他们这个旅本来就落后了，兄弟部队已经占领了对岸。\n米什卡牺牲的消息，谢辽莎四天后才得知。他们旅经过鏖战刚刚拿下布恰车站后，随即战线转向基辅，成功地粉碎了企图攻占科罗斯坚的波军的猛烈进攻。\n队列中，亚基缅科挨着谢辽莎躺下。他停下猛烈的射击后，好不容易才拉开灼热的枪栓，他把脑袋贴着地面趴着，然后转过脸来对谢辽莎说：\n“枪也要缓口气，像火一样滚烫。”\n伴着枪炮的轰鸣声，谢辽莎勉强才听到他说的话。后来枪炮声小了一点，亚基缅科好像漫不经心地说：\n“你的那位老乡在第聂伯河里淹死了。我没看清他是怎么掉到水里的。”说完，他用手摸了摸枪，并从子弹带里拿出一排子弹，一丝不苟地压进了枪膛。"
 SOV_Steel.3.a: "继续前进"

 SOV_Steel.4.t: "篝火下"
 SOV_Steel.4.d: "一堆篝火跳跃着红色的火舌。褐色的烟柱盘旋上升。蠓虫受不了烟熏，成群结队地飞来飞去。战士们围着篝火席地而坐。在篝火的映衬下，他们的脸盘呈现出紫铜色。\n篝火边，淡蓝色的炭火上放着几只铁锅。\n锅里的水正在沸腾着。突然，一条狡猾的火舌从燃烧着的木柴下贼溜溜地往上一蹿，并舔了一下那个埋头看书人的乱发，那人慌忙把头一闪，气呼呼地嘟哝了一句：\n“呸，活见鬼！”\n周围的人都笑了起来。\n一个中年战士，穿着呢制服，留着一撮小胡子，借着火光刚检查完枪筒。悄悄地说：\n“这小伙子看书入了迷，火烧头发都不知道。”\n“喂，保尔，快把你读的东西给我们讲讲呗。”\n那个青年战士摸了摸烧焦了的头发，自己也笑了。\n“你还别说，安德罗修克同志，这可真是本好书，读着让人爱不释手。”\n保尔身旁坐着一个翘鼻子的青年战士，他正在专心致志地修理弹药盒上的皮带，想用牙把一根粗线咬断。听保尔这么一说，他便来了兴致，好奇地问：\n“书里写谁来着？”他把针插在军帽上，又把多下来的线缠在针上，然后补充道，“要是有关谈恋爱的故事，那我倒挺想听听。”\n周围一阵哄堂大笑。马特维丘克抬起他那小平头，狡黠地眯起一只眼睛，对那个小年轻说：\n“谁说不是呢，谈情说爱，可真是件好事，谢列达！你长得这么帅，像油画上的美男子！你走哪儿，身后姑娘跟到哪儿。可你有一处小小的美中不足，就是鼻子太翘了，活像猪拱鼻。不过，有个办法可以补救：鼻尖上挂个十磅重的诺维茨基手榴弹，保证只消一宿，鼻子就不翘了。”\n人群中又爆发了一阵笑声，吓得拴在机枪车上的马打了一个响鼻。\n谢列达懒洋洋地转过身来。\n“问题不在于人长得帅不帅，而在于脑瓜子灵不灵，”他神气活现地拍了一下自己的脑门，说，“就说你吧，嘴不饶人，其实是个十足的笨蛋，而且两只耳朵也不管用。”\n两人你来我往，眼看就要动手，班长塔塔利诺夫赶忙把他们劝开。\n“算了，算了，伙计们，说归说，动什么手呀？我看最好还是让保尔挑几段精彩的给大伙念念。”"
 SOV_Steel.4.a: "念吧"

 SOV_Steel.5.t: "念书"
 SOV_Steel.5.d: "保尔把马鞍搬到火堆前，坐在上面，然后打开一本不算厚的书，放在膝盖上。\n“同志们，这本书名为《牛虻》。我是从营政委那儿借来的。我读了很受感动。要是大伙好好坐着听，我就念。”\n“快念吧！那还用说！谁也不会打岔。”\n当团长普济列夫斯基同志和政委一起骑马悄悄走近篝火时，他看见十一双眼睛正一动不动地盯着那个念书的人。\n普济列夫斯基回过头来，指着这群战士，对政委说：\n“这就是我们团的一半侦察兵，其中四个，都是非常年轻的共青团员，可个个都是好兵。喏，那个念书的，叫保尔。还有一个，看见没？一双狼崽眼，他叫扎尔基。他俩是好朋友，不过暗地里却在较劲。以前保尔是团里头号侦察兵，现在他可碰上实力相当的竞争对手了。瞧瞧，现在他们正在做政治思想工作，不露声色，影响却很大。有人美其名曰‘青年近卫军’。”\n“念书的那个是侦察队的政治指导员吗？”政委问。\n“不是，指导员是克拉梅尔。”\n普济列夫斯基催着马向篝火走去。\n“同志们，你们好！”他大声喊道。\n战士们一齐转过头来。团长敏捷地跳下马，向战士们走过去。\n“朋友们，我也来烤烤火，可以吗？”他问道。只见他笑得合不拢嘴，眼前，他那笑容可掬的脸盘和那双有点像蒙古人的小眼睛失去了往日的严肃。\n团长受到战士们的热烈欢迎，友好之情就像对待亲密无间的战友。政委没有下马，他还要继续前行。\n普济列夫斯基把手枪套推至身后，紧挨着保尔，在马鞍旁坐了下来，提议说：\n“一起抽口烟，怎么样？我这儿有点好烟叶。”\n他卷了一支烟抽起来，转过脸对政委说：\n“你去吧，多罗宁，我就留在这儿了。司令部需要我，通知我一声。”\n多罗宁走了。普济列夫斯基对保尔说：\n“接着念吧，我也听听。”\n保尔念完了最后几页，把书放在膝盖上，望着篝火，沉思起来。\n一连几分钟，谁也不说话。牛虻之死使大家沉浸在追思中。\n普济列夫斯基默默地抽着烟，等待战士们交流感想。"
 SOV_Steel.5.a: "谢列达打破了沉默"

 SOV_Steel.6.t: "感想" 
 SOV_Steel.6.d: "“故事太悲惨了，”谢列达打破了沉默，“这就是说，世界上还真有这样的人。本来个人是无法承受的，但是，当他为理想而奋斗时，一切就能承受了。”\n他说话时，明显很激动。这本书给他留下的印象太强烈了。\n安德留沙·福米乔夫，来自白教堂城，原先是个鞋匠学徒，激愤地喊道：\n“那个神父硬把十字架往牛虻嘴边塞，真该死，要是叫我碰上，立马送他上西天！”\n安德罗修克用小棍子把铁锅往火里推了推，非常自信地说：\n“死，并不可怕，要看为什么而死。明白这一点，个人就会有力量。如果你觉得真理在你手里，你就应当死得从容。英勇气概就是从这里产生的。我认识一个小伙子，叫波莱卡。在敖德萨白匪把他给包围了，他火冒三丈，向一个排的匪军冲了过去。没等刺刀碰着他，就拉响了手榴弹。手榴弹就在他脚下炸开了，他自己血肉横飞，周围白匪也尸体成堆。从外表上看，这个人普普通通，也没人为他写书。可是他的事迹真值得写！咱们弟兄当中，这种人物多了去了！”"
 SOV_Steel.6.a: "真理得胜，九死无悔"

 SOV_Steel.7.t: "信"
 SOV_Steel.7.d: "亲爱的哥哥阿尔焦姆：\n你好！我还活着，只不过身体有点小恙。我大腿上挨了一枪，但很快就要痊愈。医生说，没伤着骨头。请不要为我担心，一切都将过去。出院以后，也许会给我假，到时候我一定回家看看。妈那儿我没去成，结果却当上了红军。现在我是科托夫斯基名下骑兵旅的一名战士，他的英雄事迹你们大概听说过。他们这些人，我还真的从未见过，为此我非常敬佩他。妈回来没有？要是她在家，就说她的小儿子向她老人家问好。请原谅，我让你们操心了。"
 SOV_Steel.7.a: "弟 保尔"
 SOV_Steel.7_tt: "附：阿尔焦姆，请你到林务官家去一趟，并转告以上内容。"
 SOV_Steel.8.t: "重逢"
 SOV_Steel.8.d: "有一天，保尔受旅长之派，到停有装甲列车的车站去送交公文，他碰见了一个无论如何也想不到会碰面的人。他策马飞奔上了路基。到了前面一辆灰色车厢跟前，保尔勒住了马。一辆威风凛凛的装甲车停在那，里面藏着许多大炮，黑洞洞的炮口露在外面。车旁有几个满身油垢的人，正在揭开一块保护车轮的沉重的钢板。\n“请问装甲列车的指挥员在哪儿？”保尔问一个穿着皮上衣、提着一桶水的红军战士。\n“就在那儿。”红军战士指向火车头那边说。\n保尔跑到火车头跟前，又问：\n“哪一位是指挥员？”\n一个脸上长着麻子、浑身穿戴都是皮制品的人转过身来，说：\n“我就是。”\n保尔从口袋里掏出公文，交给了他。\n“这是旅长的命令，请您在公文袋上签个字。”\n指挥员把公文袋放在膝盖上，开始签字。火车头的中间车轮旁边，有一个人提着油壶在干活。保尔只能看到他宽阔的后背和露在皮裤口袋外面的手枪柄。\n“签好了，拿去吧。”指挥员把公文袋还给了保尔。\n保尔抖抖缰绳，正要走，在火车头旁干活的那个人突然站直身子，转过脸来。就在这一瞬间，保尔好像被一阵风刮倒似的，跳下马来，喊道：\n“阿尔焦姆，哥哥！”\n满身油垢的火车司机立即放下油壶，一把抓住这个年轻的红军战士，来了个大熊抱。\n“保尔！小鬼头！原来是你呀！”阿尔焦姆这样喊着，简直不敢相信自己的眼睛。\n装甲列车指挥员用惊奇的目光看着这个场面。车上的炮兵战士们都笑了起来。"
 SOV_Steel.8.a: "“看见没有，兄弟俩喜相逢了。”"

 SOV_Steel.9.t: "重伤"
 SOV_Steel.9.d: "八月十九日，在利沃夫地区的一次战斗中，保尔丢掉了军帽。他勒住马，但是，前面波军阵线已经被切断。这时，杰米多夫从灌木丛中飞出，向下面的河岸冲去，一路上高喊：\n“师长牺牲了！”\n保尔哆嗦了一下。列图诺夫，他的英勇的师长，一个具有大无畏精神的好同志，居然牺牲了。保尔浑身冒火，怒发冲冠。\n他用刀背使劲拍了一下已经十分疲惫、嚼子上血迹斑斑的战马格涅多克，冲向正在厮杀的人群。\n“砍死这帮畜生！砍死他们！砍死这帮波兰贵族！竟敢杀死列图诺夫！”盛怒之下，他扬起马刀，连看也不看，向一个身穿绿军服的人劈下去。全连战士个个怒气冲天，誓为师长复仇，把一个排的波军全砍死了。\n他们一路穷追敌寇，来到一片开阔地，这时，波军的大炮向他们开火了。弹片划过半空，横飞四溅。\n保尔眼前闪出一团绿火，像镁光一样，耳边一声巨响，火红的铁片灼伤了他的头。大地可怕而又莫名其妙地旋转起来，倒向一边。\n保尔像一根稻草似的，被甩出了马鞍，越过马头，重重地栽到地上。"
 SOV_Steel.9.a: "夜幕立刻降临了。"

 SOV_Steel.10.t: "章鱼"
 SOV_Steel.10.d: "一条章鱼睁着一只凸起的、猫头大小的眼睛，四周暗红，中间发绿，不停地闪着变色的光。它伸出几十根触须摸索着爬行，那些触须就像缠在一起的小蛇在蠕动，带鳞的鱼皮发出令人恶心的摩擦声。他看见这条章鱼几乎就在自己的眼旁。触须在他身上爬行，冰冰凉的，像荨麻一样扎人。章鱼伸出吸盘，就像水蛭一样，扎进他的脑袋，一步一步渗入，接着就开始吸血。他感觉到血液正不断地从自己的体内流向章鱼那逐渐膨胀起来的血囊。那吸盘不断吸呀，吸呀，脑袋上的出血口疼痛难忍。\n\n很远很远的地方好像有人在说话：\n“他现在的脉搏怎么样？”\n还有另一个声音，女人的，轻声地回答：\n“脉搏一百三十八次，体温三十九点五度。一直在说胡话。”\n章鱼不见了，但伤口依然疼痛不止。保尔感觉到有人用手指触碰到他的手腕。他努力睁开眼睛，但眼皮发沉，无力抬起。怎么这么热呀？看来，妈妈炉火生得太旺。可又有人在说话：\n“现在脉搏一百二十二。”\n他又试图抬起眼皮。可体内仍在发烧。胸前很闷。\n水，渴死啦！他多想立刻起来，喝个够。但为啥就是起不来呢？他刚想动动身子，可是就觉得身子不是自己的，是别人的，根本不听使唤。妈妈马上就要给他拿水来。他对妈妈说：“我想喝水。”这时，又有什么在他身旁翻动。莫不是章鱼又折回来了吧？果然，你瞧，它那只红红的眼睛……\n\n远方又传来了悄悄的说话声：\n“弗罗霞，快去拿点水来！”\n“这是谁的名字呢？”保尔使劲回忆，但由于用力过度他又陷入黑暗的深渊。等他漂浮回来时，他又想起："
 SOV_Steel.10.a: "“我想喝水。”"


SOV_Steel.11.t: "挺过来了"
SOV_Steel.11.d: "他听见有人在说话：“他好像就要苏醒过来。”\n那温存的说话声越来越近，越来越清晰：“伤病员，您要喝水吗？”\n“莫非我病了，或许这话不是对我说的？哦，没错，我得了伤寒，怪不得。”于是，他试图第三次睁开眼睛。这回终于如愿以偿。首先映入刚刚张开的细小眼缝里的是，他觉得，是一个悬在他头上的红球，但红球又被一个黑乎乎的东西遮挡住了。这黑乎乎的东西正向他俯下身子，于是，他的双唇触到一只杯子坚硬的边缘，接着就是一股沁人肺腑的液体。体内那团火渐渐熄灭了。\n他悄声乐道：“现在好多了。”\n“伤病员，您能看见我吗？”问话的就是站在他面前、向他俯下身子的那个人，眼看他又要昏睡过去，但勉强还能回答一句：“看不见，但能听见……”\n“谁曾料想他还能活下来？可他，瞧瞧，还真的挺过来了。这身板非同一般的结实。尼娜·弗拉基米罗夫娜，您真该为此感到自豪。是您亲手把他从死亡的边缘拉回来的。”\n一个女人的声音，异常激动地说：“哦，我太高兴啦！”\n保尔整整昏迷了十三天，终于恢复知觉了。\n年轻的躯体怎能说死就死，体力和精力正在慢慢地恢复。这是他第一次获得重生，一切都让他觉得新鲜和非同寻常。只是脑袋还沉重无比，绑着石膏，不得动弹。不过，肢体的知觉已经恢复，手指也能伸屈自如了。\n尼娜·弗拉基米罗夫娜，野战医院的见习医生，坐在四方形的房间里，伏案翻阅着一本厚厚的，封面带有丁香花的笔记本。笔记本里写满了细细笔迹的简短日记。"
SOV_Steel.11.a: "（翻开）"

SOV_Steel.12.t: "日记（1）"
SOV_Steel.12.d: "1920年8月26日\n今天救护列车给我们送来一批重伤员。病房窗边角落里的病床上躺着一位头部重伤的红军战士。他只有十七岁。他的一包证件和装在信封里的病历转到我手上，这是从他衣兜里找出的。他姓柯察金，名保尔·安德烈耶维奇。证件包括：一个磨损了的乌克兰共青团团证，编号为九六七，还有一个红军战士证和团部颁发的嘉奖令证书。上面写有：兹因红军战士柯察金出色完成侦察任务而特此奖励。另外，还有一张纸条，估计是柯察金亲笔所写：\n“如果我阵亡，恳请同志们通知我的亲属：舍佩托夫卡，机车库，钳工阿尔焦姆·柯察金。”\n该伤员自八月十九日被炮弹击中那一刻起一直处于昏迷状态。明天将由阿纳托利·斯捷潘诺维奇大夫给他做检查。\n8月27日\n今天医生给柯察金伤势做了检查。伤口很深，颅骨穿透，造成整个头部右侧麻痹。右眼出血。眼球肿大。\n阿纳托利·斯捷潘诺维奇本想切除他的右眼，以免引起炎症。但我劝说他，暂时不要切除，目前还有消肿的希望。他同意了。\n左右我这一想法的是绝对的美感。假如小伙子能活过来，干吗要摘除他的右眼，让他破相呢？\n伤病员不停地说胡话，没完没了地折腾，必须经常有人在他身边守护着。我在他身上花了很多时间。我非常可怜他，年纪轻轻的，因此，如果我能成功，我要把这年轻的生命从死神手里夺回来。\n昨天下班后，我在他的病房里待了几个小时，因为他的病情最重。我仔细倾听他说的每一句胡话。有时他明明是在说胡话，却让人感觉好像是在讲故事。我从中了解到不少他生活的细节，不过其中夹杂着许多骂人的话。谩骂很可怕的。不知为什么，我听了这些可怕的咒骂心里觉得很难过。阿纳托利·斯捷潘诺维奇说，他活不了了。老人家生气地嘟哝道：“我就不明白，部队怎么接受这些孩子参军入伍？简直岂有此理。”\n8月30日\n柯察金仍未恢复知觉。他现在已经转到重症病房，那里躺着的都是些病危者。卫生员弗罗霞日夜守护在他身旁，寸步不离。原来她认识他。他们早先曾经在一起共事过。难怪她对这位伤病员如此上心！现在我也觉得他的病情不容乐观。\n"
SOV_Steel.12.a: "（下一页）"

SOV_Steel.13.t: "日记（2）"
SOV_Steel.13.d: "9月2日晚11时\n今天对我来说是个好日子。我的病人柯察金恢复知觉了，他活下来了。危险期已过。这两天我一直没回家。\n此时此刻，我的喜悦之情简直难以言表，因为我又救活了一位病人。我们病房里又少了一个死讯。在我的繁忙工作中最为高兴的事，那就是病人的康复。他们就像孩子一样与我血肉相连。\n他们的友谊真挚而又纯朴，所以当我们分别时，我有时甚至会哭。这虽说有点可笑，但这是真情。\n9月10日\n我今天替柯察金代笔写了第一封家书。他说他受了点轻伤，很快就康复并回家看看。实际上他失血过多，脸色像纸一样白，身体还很虚弱。\n9月14日\n今天柯察金第一次笑了。他的笑容是那么动人。平常他总是不苟言笑，一副少年老成的样子。他日见康复，速度惊人。他和弗罗霞成了好友。我常看见她在他的床边。显然，她常和他谈起我，当然，过分地夸奖我，所以，当走进病房时病人冲我微微一笑。昨天他问我：\n“大夫，请问您手上怎么有紫色斑块？”\n我无言以对，这是他昏迷时拼命抓住我的手所留下的指痕。\n9月17日\n柯察金额头的伤口看样子好了很多。每次给他换药时，他那无穷的忍痛耐力让我们这些医生感到无比吃惊。\n通常情况下，一般人都会不断地疼得嗷嗷叫，甚至发火。他却一声不吭，而且每次给伤口涂碘酒时，他疼得把身子绷得像根弦。他常常疼得昏过去，可就是哼都不哼一声。\n我们大家都知道，假如他也呻吟了，那一定是他处在昏迷状态。他哪来这般毅力？我不得而知。\n9月21日\n今天柯察金第一次坐上轮椅，被推到医院阳台上。那是一只多么了不起的眼睛在看着花园！他是那么尽情地呼吸着这新鲜的空气！他头上缠着纱布，只露出一只眼睛。而这只眼睛是那么灵动和明亮，凝望着这个世界，仿佛生平第一次见到它。\n9月26日\n今天有人喊我到楼下接待室去，在那儿我会见了两位姑娘。其中一位长得很漂亮。她们要见柯察金。她们一个名叫冬妮娅·图曼诺娃，另一个叫塔吉雅娜·布拉诺夫斯卡娅。冬妮娅这名我熟悉。柯察金有时在昏迷中反复提及过。我同意了他们的会见。\n10月8日\n今天柯察金首次独自在花园散步了。他多次问我什么时候可以出院。我说快了。两位女友每逢探视日就来看望他。现在我终于弄明白，为什么他换药时不叫喊，而且一般情况下从不呻吟。他是这样回答我的问题的：\n“您读一读《牛虻》，就知道了。”\n10月14日\n柯察金今天出院了。我们热情地作别。他眼上的纱布已摘除，但脑门上仍留有。虽然他的右眼瞎了，但表面看起来挺正常。与这么好的同志分别我心里很难过。\n医院往往就是这样：病人痊愈后离我们而去，而且还不希望再次见面。临别时他说：\n“宁愿左眼瞎了，这样我以后怎么开枪射击呀？”"
SOV_Steel.13.a: "他还在想着前线的事。"

SOV_Steel.14.t: "破裂"
SOV_Steel.14.d: "保尔出院后，起初住在布拉诺夫斯卡娅家，冬妮娅也寄居在这里。\n他立刻试想着动员冬妮娅参加社会工作，邀请她参加全市共青团大会。冬妮娅也同意了，但当她换好衣服，走出房间时，保尔紧咬双唇。她打扮得非常讲究，相当出众。他简直不敢带她去见自己的弟兄们。\n于是，首次冲突就这样发生了。保尔问她干吗要穿得这么艳丽，她深感委屈地答道：\n“我历来就不喜欢穿着随大流。你要是觉得带我去不方便，那我不去好啦。”\n那天在俱乐部里，他见她那身与众不同的打扮，别人穿的是褪了色的制服或短上衣，相比之下心里别提有多别扭。同志们都拿她当外人。她，自己也觉察到这一点，且以挑衅和鄙视的眼光看大伙儿。\n潘克拉托夫，货运码头的共青团书记，肩膀宽宽的小伙子，身穿一件粗布衬衣，码头的装卸工，把保尔叫到一边。他毫不客气地瞅了瞅保尔，并瞟了冬妮娅一眼，说：\n“那位美妞是你带来的吧？”\n“没错，是我带来的。”保尔毫不示弱地回答他。\n“嗯……嗯，”潘克拉托夫拉长语气说，“她这身装扮对我们来说可不太合适，这是资产阶级小姐的装束。怎么放她进来的？”\n保尔的太阳穴直跳。\n“她是我朋友，所以我把她带来了。明白吗？她对我们并无敌意，只不过穿着有点问题，这是事实，但不能因为穿戴而老是往人身上贴标签吧。我也知道，能不能带谁来这儿，潘克拉托夫同志，用不着你找茬儿。”\n他本想再来几句难听的话，但想想还忍住没说，他也理解，潘克拉托夫所说的也是大伙的看法，于是，他把一肚子怨气迁怒于冬妮娅。\n“我早就跟她说过！何必要出这种风头？”\n这个晚上成了他们友谊破裂的初始。保尔深怀痛苦和惊讶眼看着他们之间看似牢不可破的友谊渐渐分崩离析。\n几天又过去了，他们之间的关系变得越来越疏远，每一次约会，每一次谈话都带来说不出来的郁闷。冬妮娅身上那种轻浮的个人主义让保尔越来越难以忍受。"
SOV_Steel.14.a: "他们双方都很清楚，断裂已不可避免。"

SOV_Steel.15.t: "别离"
SOV_Steel.15.d: "今天他俩约好一起来到铺满枯叶的库佩切斯基公园，为的是做最后一次交谈。他们站立在陡峭的斜坡上的栏杆旁，脚下是第聂伯河，河水闪闪发光。一艘拖轮身后拖着两只大腹便便的驳船，螺旋桨疲惫地拍打着水面，缓缓地穿过大桥，逆流而上。落日给特鲁哈诺夫岛涂上一层金黄色，把各家小屋上的玻璃窗照得通红。\n冬妮娅望着金色的光芒，满怀忧伤地说：\n“难道我们的友情就像眼前的太阳一样日落西山了吗？”\n保尔眉头紧锁，目不转睛地望着她，轻言轻语地说：\n“冬妮娅，此事我们已经谈论过。固然，你知道我曾爱过你，而且，现在我的爱依然可以失而复得，但，为此你应该和我们同心同德。现在的我已经不是当初那个小保尔。假如你认为我首先应该属于你，然后才属于党，那我就不会是一个称职的丈夫。而我将首先属于党，其次才属于你和其他亲友。”\n冬妮娅忧伤地望着河面上的碧波，眼里泪水汪汪。\n保尔望着她那熟悉的身影和栗色的秀发，心中不禁泛起对这位曾是无比亲密和疼爱的姑娘的惋惜之情。\n他小心翼翼地把一只手搭在她的肩上，说：\n“快扔掉束缚你的一切吧。快加入我们的队伍吧。让我们共同彻底消灭统治阶级。我们当中有很多优秀的女孩，她们和我们一起肩负着艰苦卓绝的斗争的重任，和我们共同承担损失和牺牲，她们，也许，不像你文化水平那么高，但为什么，为什么你就不愿和我们在一起呢？你说丘扎宁想强暴你，但他不是红军战士，而是个堕落分子。你还说大家对你不友好，可你为啥要穿成那样，像是参加资产阶级舞会？虚荣心害死人啊。你还说什么，我不会穿肮脏的军服。你既然有勇气爱上一个工人，却不能爱工人阶级思想。和你分手我也很遗憾，但愿我能记住你美好的……”"
SOV_Steel.15.a: "他没再说下去。"

SOV_Steel.16.t: "归乡"
SOV_Steel.16.d: "一九二零年十二月，一个具有纪念意义的早晨，保尔终于乘车回到了自己熟悉的故乡。\n他下车踏上布满积雪的站台，瞅了瞅“舍佩托夫卡一站”的站牌，立刻左拐，朝机车库走去。保尔向人打听阿尔焦姆，结果他不在。于是他紧裹大衣，箭步穿过森林，朝城里走去。\n母亲玛利亚·雅科夫列夫娜听见有人敲门立刻转身让人进屋。只见一个人身上粘着雪花站在门口，她立刻认出这是小儿子，双手紧捂心口，喜极之情让她一句话也说不出来。\n她把自己那瘦小的身子紧紧地依偎在儿子的胸前，不停地亲吻着他的脸盘，幸福的泪花流淌不尽。\n保尔怀抱着她，凝望着母亲那因担忧和盼望而消瘦了的、布满皱纹的脸。他一句话也没说，一直等着母亲平静下来。\n这位饱经风霜的女人的眼里重现出幸福光芒，连日来这位母亲对儿子是看不够，聊不完，她真没想到还能见到他。三天后，半夜里，阿尔焦姆也背着行囊走进屋里，此时此刻，老人家的喜悦之情真可谓享之不尽。\n柯察金家的小宅子又恢复了往日的生气。经历种种磨难和不幸，弟兄俩死里逃生终于又团聚了。\n“现在你俩打算干些什么？”玛利亚·雅科夫列夫娜问两个儿子。\n“妈，我还是干我的老本行。”阿尔焦姆回答。\n保尔在家待了两个星期又回到基辅去了，那里有工作在等着他。\n\n"
SOV_Steel.16.a: "战斗仍在继续"

SOV_Steel.17.t: "上车（1）"
SOV_Steel.17.d: "酷暑炙烤着大地。车站天桥的铁栏杆被晒得滚烫。热得无精打采的人们懒洋洋地向天桥上走去。这些人不是旅客，多半是从铁道区经过天桥到城里去的。\n保尔从高处台阶上看见了丽达。她比他早些来到火车站，正在观望从天桥下行的人群。\n保尔走向丽达，离她还有两三步就停住了脚步。她没有发现他。保尔怀着一种奇特的好奇心观察她。丽达穿着一件条纹衬衫，下面是蓝布短裙，一件柔软的皮夹克随意地搭在肩上，一头乱发罩着她那晒得黝黑的脸庞。丽达站在那里，微微仰着头，强烈的阳光照得她眯起了眼睛。保尔生平第一次用这样的眼光观察他的这位朋友和老师，也是第一次突然意识到，丽达不仅是团省委委员，还是……这时，他突然反应过来，发现自己身上这种“邪恶”的念头，有点懊悔，于是赶紧招呼她：\n“我已经整整看了你一个钟头，可你还没看见我。该走了吧，火车已经进站了。”\n他们朝通往站台的检票口走去。\n昨天，省委决定派丽达代表省委出席一个县的团代会，并让保尔协助她工作。他们今天必须乘车出发，别看事小，但难度很大。因为车次太少，车站发车的时间，全由无所不能的乘车“五人组”掌控。没有“五人组”签发的通行证，任何人都无权进站。所有的进出口全由“五人组”派出的值勤队把守着。一列火车就是挤破车厢，充其量只能运走十分之一急着赶路的旅客。谁也不愿意留下等下一趟不知何时的列车，说不定一等就是几天。检票口挤满了数千人，谁都想冲向那看得见却摸不着的绿皮车厢。连日来，整个车站水泄不通，时有斗殴事件发生。"
SOV_Steel.17.a: "保尔和丽达挤来挤去，怎么也挤不到站台上"

SOV_Steel.18.t: "上车（2）"
SOV_Steel.18.d: "\n保尔对车站的出入口很熟悉，他领着自己的旅伴穿过行李房到了站台上。费了好大劲，总算挤到了四号车厢门边，这里挤着密密麻麻的一堆人，一个热得满头大汗的肃反工作人员拦住车门，上百次地重复着一句话：\n“我说呀，车厢满了。车厢连接板上和车顶上不许站人，这是上头的命令。”\n发疯似的人群向他涌去，一个个把签发的四号车厢乘车证伸到他鼻子跟前。每节车厢的门前都一样，人们气势汹汹地咒骂着，叫喊着，拼命往上挤。保尔看出，照常规根本上不了这趟车，但，他们又非走不可，否则，就赶不上参会。\n保尔把丽达叫到一边，并把自己的行动计划告诉她：他先挤进车厢，然后打开车窗，把她从窗口拉进去。要不，别无办法。\n“把你的皮夹克给我，它比任何证件都好使。”\n保尔拿过她的皮夹克穿上，又把手枪往夹克口袋里一插，故意让枪柄和枪穗子露在外面。他把装食物的旅行袋放在丽达脚旁，走向车门，毫不客气地扒开旅客，一手抓住车门把手。\n“喂，同志，上哪儿？”\n保尔回头看了看那个矮墩墩的肃反工作人员。\n“我是军区特勤部的。现在要检查一下，车上的人是不是都有签发的乘车证。”保尔煞有介事地说，口吻中丝毫不许他人怀疑他的权力。\n那个肃反人员看了看他口袋里的手枪，用袖口擦掉额头上的汗珠，用无所谓的语调说：\n“还能怎么样，只要你能挤进去，那就查吧。”\n保尔一路用胳膊、肩膀甚至拳头给自己开路，拼命往里挤，最后抓住上层的铺位，把身子悬空，从别人肩上荡过去。他挨了不少谩骂，不过总算挤到了车厢中间。\n“你这个该死的，赶死呀！”当他从上面跳下来时，一脚踏在一个胖女人的膝盖上，她冲他破口大骂起来。这女人像个大肉丸，约摸有七普特重，勉勉强强挤在下铺的边缘上，两条腿中间还夹着一只装黄油的铁桶。各式各样的铁桶、箱子、麻袋、篮筐塞满了所有的铺位。车厢里闷得使人喘不过气来。\n保尔没理睬这个胖女人的谩骂，只是问她：\n“您的车票呢，公民？”"
SOV_Steel.18.a: "“什么？”"

SOV_Steel.19.t: "上车（3）"
SOV_Steel.19.d: "她对这个突然冒出来的检票员恶狠狠地反问了一句。\n一个贼眉鼠眼的家伙从上面的铺位上探出头来，扯着粗嗓子喊：\n“瓦西卡，哪儿冒出这么个混球？去他妈的车票。”\n保尔头上方露出一个人影，估计，这人就是瓦西卡了。小伙子很健壮，胸脯上露着毛，两只牛眼直瞪着保尔。\n“你干吗跟一个女人过不去？什么票不票的，关你什么事？”\n旁边的铺位上耷拉下来四双腿。这些腿的主人们勾肩搭背地坐在上铺，正忙着嗑瓜子。这些人，一看就是一伙经验老道的投机商，常年在铁路上来回倒腾。眼下保尔没有工夫搭理他们。得赶紧把丽达弄上车。\n“这是谁的箱子？”他指着车窗旁的小木头箱子，问一个上了年纪的铁路工人。\n“是那个女人的。”老工人指了指穿着褐色长筒袜的两条粗腿说。\n得把车窗打开。可是箱子太碍事。又没有地方放。于是保尔把箱子抱起来，交给了上铺的主人。\n“请您先拿一下，公民，我要开窗子。”\n“你怎么乱动别人的东西！”保尔刚把箱子放到坐在上铺的塌鼻子女人的膝盖上，她就尖声叫了起来。\n“莫季卡，你看看，这人又在胡闹什么？”她又转过脸来，向身旁的人求援。那个人连铺位也没下，便用穿着凉鞋的脚朝保尔背上踢了一下，说：\n“喂，你这个狗杂种！趁早给我滚开，别让老子动手。”\n保尔背上挨了这一脚，默默地忍着。只见他咬紧牙关，打开了车窗。\n“同志，请您稍微挪挪。”他向那个铁路工人请求说。\n保尔把一只铁桶挪开，腾出点地方，紧贴到车窗跟前。丽达早就在车厢旁等候，并连忙把旅行袋递给他。保尔把旅行袋往那个夹着铁桶的胖女人膝盖上一扔，探下身子，抓住丽达的双手，把她往上拉。这时，一个值勤的红军战士发现了这一违章行为，刚要过来制止，丽达已经爬进了车厢。那个动作迟缓的战士没辙，只好骂了几句，走开了。丽达的出现，引起了那伙投机商的喧嚣，弄得她很难为情，不知道如何是好。她连落脚的地方都没有，只好抓住上铺的把手，站在下铺的边缘上。周围是一片辱骂声。上铺那人低声骂道：\n“瞧这个混蛋，自己爬进来不算，还弄进来一个婊子！”\n上铺看不见的地方，另一个尖声喊道：\n“莫季卡，照他的鼻梁骨给他一下！”\n塌鼻子女人也趁机要把木箱子放到保尔的头上。周围全是些充满敌意、不知羞耻的人。保尔很后悔，不该领丽达到这里来，但总得把她安顿下来呀。\n“公民，请把你的口袋从过道上挪开，这位同志连站的地方都没有。”保尔向那个叫莫季卡的说，但得到的回答却是一句极为下流的话，气得他浑身冒火。他右眉上方的伤疤像针扎一样剧烈疼痛起来。"
SOV_Steel.19.a: "“你这个下流胚，给我等着，回头我找你算账！”"

SOV_Steel.20.t: "上车（4）"
SOV_Steel.20.d: "他强压怒火，对那个流氓说，可就在这时，上面又有人在他头上踢了一脚。\n“瓦西卡，再给他点厉害瞧瞧！”周围的人唆使地叫喊着。\n保尔终于忍无可忍，彻底爆发了，正如往常一样，一旦发起火来，行为就变得鲁莽而又凶残。\n“你们想干什么，你们这帮奸商，想欺负人是不是？”保尔像蹬着弹簧，两手一撑就蹿到中铺上，挥起拳头，朝莫季卡那副蛮横无耻的嘴脸猛力砸去。这一拳真带劲儿，只见那个家伙一头栽下去，落在站在过道上的人们的头上。\n“你们这帮混蛋，统统给我滚下去。不然的话，我就要你们的狗命！”保尔用手枪指着上铺那四个人的鼻子，怒冲冲地吼着。\n这样一来，局面完全改变了。丽达密切注视着周围所有的人，要是有谁敢碰一碰保尔，她就准备开枪。上铺立刻空了，那个贼眉鼠眼的家伙也慌忙躲到隔壁的铺位上去了。\n保尔把丽达安顿在腾空的铺位上，低声对她说：\n“你在这儿坐着，我去跟这帮家伙算账去。”\n丽达拦住他说：\n“你还真要去干仗？”\n“不，我马上就回来。”他安慰她说。\n保尔又把车窗打开，跳到站台上。几分钟之后，他来到铁路肃反委员会，站在他的老首长布尔梅斯捷尔的办公桌前。布尔梅斯捷尔是拉脱维亚人，听保尔谈完情况后，下令让四号车厢的全体旅客下车，检查证件。\n“我说过嘛，火车还没进站，车厢里就挤满了投机商。”布尔梅斯捷尔嘟哝着。\n由十名肃反人员组成的检查组，对车厢进行了一次彻底的大检查。保尔按照老习惯，帮着检查了整个列车。他离开肃反委员会之后，仍然同那里的朋友们保持着联系，而且在他担任共青团书记之后，向铁路肃反委员会输送了不少优秀团员。检查完毕，保尔又回到丽达的车厢。这时，车里已经上满了新的乘客，他们都是出差的干部和红军战士。\n车厢顶头的上铺只留给丽达，其他空处已堆满一捆捆的报纸。\n“行了，好歹咱们安顿下来了。”丽达说。\n火车开动了。\n车窗外面那个胖女人高高地坐在一大堆口袋上，向后退去。只听她喊道："
SOV_Steel.20.a: "“曼卡，我的油桶呢？”"

SOV_Steel.21.t: "上车（5）"
SOV_Steel.21.d: "丽达和保尔挤在一个狭小的空间里，与邻铺之间隔着一捆捆的报纸。他俩一边兴致勃勃地聊着刚不久发生的令人不大愉快的插曲，一边狼吞虎咽地嚼着面包和苹果。\n火车缓慢地爬行着。车辆年久失修，载重过大，不断发出吱吱嘎嘎的响声，每到接轨的地方就震动一下。黄昏给车厢笼罩着一层厚厚的蓝色布幔。稍后，夜幕便遮住了敞开的车窗。车厢里一片漆黑。\n丽达非常疲乏，把头枕在旅行袋上打起盹来。保尔耷拉着两条腿，坐在铺边上抽烟。他也很累，但无处可躺。夜间的新鲜空气从窗外阵阵吹来。车身突然一震，丽达惊醒了。她看见保尔仍在抽烟，心想：“他就这样一直坐到天亮。看样子，他是不愿意挤我，怕我难为情。”\n“柯察金同志！快扔掉您那些封建思想吧，来来来，快躺下休息休息。”她开玩笑说。\n保尔在她身边躺了下来，非常舒服地伸直了两条发麻的腿。\n“明天事情很多，够咱们忙的，快睡吧，你这只好斗的公鸡。”她坦然地用胳膊搂着自己的朋友，保尔也感觉到他的半边脸颊触碰到她的头发。\n在保尔的心目中，丽达是神圣不可侵犯的。这是他的朋友和同志，还是他的政治上的引路人，但她毕竟是个女人。这一点，他是今天在天桥上第一次意识到的，所以，她的拥抱让他激动不已。他感觉到她那均匀的呼吸，她的双唇近在咫尺。这使他产生想要找到那双红唇的强烈愿望。不过他还是凭借顽强的毅力克制住这一愿望。\n丽达好像猜测到了保尔的所思所想，在黑暗中微微一笑。她已饱尝过爱情的欢乐和失掉爱情的痛苦。她先后把她的爱情献给两个布尔什维克，可是，白卫军的子弹却把那两个人从她手中夺走了：一个是英勇的、身材魁梧的旅长，另一个是生就一双明眸的小青年。\n节奏感很强的车轮声很快催促保尔入睡了。\n\n"
SOV_Steel.21.a: "直到第二天早晨，汽笛声才把他唤醒。"

SOV_Steel.22.t: "暴动"
SOV_Steel.22.d: "城里的生活一如既往。五家集市上人头攒动，人声喧嚣嘈杂。统治这里的只有两种欲望：其一是漫天要价，其二是讨价还价。形形色色的骗子都在这里各显神通。数百个眼疾手快的人，像跳蚤一样蹦上蹦下，他们眼里应有尽有，唯独没有良心。这里，像个大粪坑，全城的蛆虫都群集在这里，目的就是为了坑骗那些没有见过世面的新手。很少几趟列车经过这里，扛着大包小包的人群从车厢蜂拥而出，纷纷向集市涌去。\n晚上，集市上已经空无一人，一条条商业胡同、一排排黑黑的货架和商亭显得十分荒凉。\n夜间，就算胆子再大的人也未必敢深入这个死气沉沉之隅，每个商亭背后都隐藏着险情。这里夜间常发生这样的事：突然一声枪响，就像锤子敲在铁板上，有人便应声倒下。等到少数几个警察连同附近岗哨（单独行动不宜）赶到时，除了一具扭曲的尸体外，早已空无一人。凶手早就离开这个血案现场，逃之夭夭，而这一喧闹倒是像一阵风吹跑了集市一带的所有过夜的居民。对面就是一家名为“俄里翁”的电影院，那里的街道和人行道灯火通明，行人成群结队。\n电影院里，放映机在吱吱作响。银幕上两个失败的情敌在相互厮杀，片子一断，观众立刻抱以粗野的嚎叫。原来，无论是市区还是市郊，生活仍未脱离常轨，甚至在革命政权的中枢——省委里，也一切如常。然而，这种平静只是表面现象。\n城里正酝酿着一场暴风骤雨。\n来自四面八方进城的人，其中多数人都知道这场风暴即将来临，他们把枪支笨拙地藏在乡下人常穿的长袍下面。知道此情的还有那些假装的投机商，他们坐在火车顶上来到市里，下车后他们不是直奔集市，而是扛着麻袋直接去记忆中的街道和民宅。\n如果说这些人都知情，那么街区里的工人群众，甚至连一些布尔什维克还蒙在鼓里，不知道暴风雨正在逼近。\n全城只有五个布尔什维克例外，他们知晓这一备战的全部过程。\n被红军赶到白色波兰境内的彼得留拉残匪，同驻华沙的一些外国使团紧密勾结，准备参加这一早有预谋的暴动。\n彼得留拉残余势力还秘密成立一支突击队。\n在舍佩托夫卡，中央暴动委员会也建立了自己的组织。参加这个组织的有四十七人，其中大多数都是过去的反革命活跃分子，只是因为当地肃反委员会的轻信，才让他们得以自由。\n领导这个组织的有瓦西里神父、温尼克准尉和一个叫库兹缅科的彼得留拉军官。神父的两个女儿、温尼克的弟弟和父亲以及混进该市执委会办事机构的萨莫蒂亚负责刺探情报。\n他们决定在夜里发起暴动，用手榴弹炸毁边防特勤处，放出犯人，如果可能，就占领火车站。\n在这座大城市里——即将暴动的中心，白匪军官们正在极其秘密地集结，各路匪帮则纷纷到近郊的树林里集中。另外，还从这里派出了经过严格审查的“极端分子”，分别被派往罗马尼亚和彼得留拉本人那里去。\n\n"
SOV_Steel.22.a: "另一边呢？"

SOV_Steel.23.t: "暴动（2）"
SOV_Steel.23.d: "水手朱赫莱在军区特勤部已经一连六夜没有合眼了。他是掌握全局的五名布尔什维克中的一个。费奥多尔·朱赫莱现在的感觉，就像一个猎人，紧紧盯住一头随时猛扑过来的猛兽。\n此时此刻，既不能叫喊，也不能慌张。嗜血成性的野兽就该击毙。只有到那时才能安心从事劳动，不用回头张望每一片灌木丛。小心才是，可不能把野兽吓跑了。在这场殊死的搏斗中，唯独斗士的耐性和手上的功力才是取胜的法宝。\n决定性的时刻越来越近了。\n就在城里的某个地方，在阴谋活动的迷宫里已形成决定：明天夜里开始暴动。\n那五个掌握敌情的布尔什维克提前警告。不！就在今天夜里。\n晚上，一列装甲列车没有拉汽笛，悄悄地开出了车库，随后车库也同样悄悄地关上了大门。\n直通线路急速地传递着密码电报，电报所到之处，共和国的卫士们顾不上睡觉，连夜一个接一个地捣毁马蜂巢。\n扎尔基接到了阿基姆的电话：\n“各支部的会议都布置好了吗？是吗？好。你跟区党委书记马上来开会。木柴问题比原来想的还要糟糕。你过来一趟吧，咱们合计合计。”扎尔基听着阿基姆那坚定而快速的话。\n“好吧，这个木柴问题快把我们逼疯了。”他嘟哝着，放下了听筒。\n利特克开着汽车，飞快地把两位书记送到了地方，他们下了车，刚登上二楼，立刻就明白了：问题并非在于木柴。\n办公室主任的桌子上架着一挺马克沁机枪，特勤部队的几个机枪手围在一旁忙碌着。走廊上几个哨兵在站岗，他们都是市党团员积极分子。省委书记办公室的门关着，里面正在召开省党委常委紧急会议，会议马上就要结束。\n两部野战军电话的电线，经过气窗，从室外引到室内。\n人人说话都轻言轻语的。扎尔基在房间里会见阿基姆、丽达和米海洛。丽达还是那副装束，跟当连指导员的时候一样：戴着红军的盔形帽，穿着草绿色的短裙和皮夹克，挎着一支沉甸甸的毛瑟枪。\n“这是怎么回事？”扎尔基问她。\n“紧急集合演习，万尼亚。我们马上去你们区，集合地点在第五步兵学校。各支部开完会就直接去那儿。这样做主要是为了不走漏风声。”丽达告诉扎尔基说。\n\n"
SOV_Steel.23.a: "“不会要发生什么大事吧？”"

SOV_Steel.24.t: "暴动（3）"
SOV_Steel.24.d: "大厅里一阵喧哗。米海洛·什科连科登上椅子，喊道：\n“一连的同志在这个大厅集合！快一点，同志们，快一点！”\n这时，朱赫莱、省执委会主席和阿基姆一起走进大厅。他们刚来。\n大厅里站满了列好队的人。省执委会主席登上机枪课教学讲台，举起一只手，说：\n“同志们，我们把你们召集到这里来，是为了完成一项严肃而又艰巨的任务。之所以到现在才说，昨天还不能说，因为这是重大的军事秘密。明天夜里，在这个城市，甚至在整个乌克兰，将要发生一场反革命暴乱。咱们城里已经潜伏进来许多反动军官。城郊也集结了好几股土匪。一小撮阴谋分子甚至打入我们的装甲营，并当上了驾驶员。但是，他们的阴谋被肃反委员会揭穿了，所以现在我们要把整个党团组织全都武装起来。第一和第二共产主义大本营要配合肃反工作人员和军校学员，与这两支经验丰富的队伍一起协同作战。军校的队伍已经出发，同志们，现在该你们了。给你们十五分钟领取武器和整合队伍。这次行动将由朱赫莱同志指挥。指挥员们将从他那里获取具体指令。我认为，当前局势的严峻性已摆在眼前，没有必要再向共产主义大本营指手画脚。明天的暴乱我们就该今天制止。”\n一刻钟后，全副武装的队伍已经在校园里整合完毕。\n朱赫莱用目光扫视着整装待发的队伍。\n站在队列前三步的是两个扎着皮带的人：一个是彪形大汉，乌拉尔的铸工，队长梅尼亚伊洛；与他并肩的是政委阿基姆。左边是一连的队伍。队伍前两步，也站着两个人，他们是队长什科连科和政治指导员乌斯季诺维奇。他们身后站着的是一支肃静的共产主义大本营队伍，一共三百名战士。\n朱赫莱发出命令："
SOV_Steel.24.a: "“出发！”"

SOV_Steel.25.t: "暴动（4）"
SOV_Steel.25.d: "三百人行进在无人的街道上。\n全城人都沉浸在睡梦中。\n队伍在野蛮街对面和利沃夫街停止前进。这次行动就从这里开始。\n所有街区都被悄然无声地包围起来。指挥部设在一家商店的台阶上。\n一辆小汽车亮着车灯，从市中心沿利沃夫街急驰而来，在指挥部跟前刹住了车。\n这一次利特克送来的是他的父亲。卫戍司令从车上跳下来，向儿子用拉脱维亚话交代了几句。汽车猛然向前一冲，转眼就拐向德米特利大街消失了。古戈·利特克全神贯注地望着前方，两只手像是粘在方向盘上，忽而向左，忽而向右，不停地转来转去。\n哈哈，这回，他利特克，终于有用武之处了吧，玩命地开吧！再也没人因为他发狂似的急转弯而关他两天禁闭了。\n于是，利特克像流星一样，飞驰在各条大街上。\n转眼间，他就把朱赫莱从城东送到了城西。朱赫莱不禁夸奖他说：\n“古戈，像你今天这样驾驶，若不出事，明天就奖你一块金表。”\n古戈·利特克兴奋不已地说：\n“我还以为这样开车要关我十天禁闭呢……”\n最先遭到袭击的是阴谋分子的司令部。第一批俘虏和缴获的文件马上送到了特勤部。\n野蛮街上有一条胡同，也叫这个古怪名字，这条胡同的十一号住着一个姓丘尔别特的人。根据肃反委员会掌握的情报，他在这次反革命阴谋中发挥着不小的作用。他手头藏有预定在波多尔区采取行动的军官成员名单。\n卫戍司令老利特克亲自到野蛮街来抓捕丘尔别特。他的住所的窗户朝着花园，与从前的修道院只有一墙之隔，人们没找到丘尔别特。据邻居说，他今天一直没回来。经过搜查，除一箱手榴弹外，还找到了一些名单和地址。老利特克下令埋伏后，自己就在桌子旁边翻阅起搜到的材料。\n花园里站岗放哨的是一个年轻学员。亮着灯的窗户他倒是能看见。但一个人站在这个角落里总不舒服。多少有点害怕。他的任务是监视那堵高墙。可这儿离那个明亮照人的窗户又很远。那个鬼头鬼脑的月亮又很少露面。黑暗中灌木丛给人感觉在晃动。他用刺刀向四周捅了捅，啥也没有。\n“干吗派我到这儿站岗？墙这么高——反正谁也爬不上来。到窗子跟前瞧瞧，如何？”学员心里这样想。他再次望了望墙头，便走出了散发着霉味的角落。他在窗前停了片刻。老利特克正匆忙地收拾文件，准备离开那个房间。就在这时，一个人影出现在墙头上。这人从墙头上看见了窗外的哨兵和屋子里的老利特克。那人影像猫一样，敏捷地从墙头攀到树上，然后溜到地面上，又像猫一样悄悄地接近哨兵，只见他一抬手，哨兵便倒下了。一把海军短剑刺进了哨兵的脖子，只剩剑柄露在外面。\n花园里一声枪响，包围这个地段的人们就像触了电一样。\n皮靴声哒哒响，六个人飞速向这所房子跑来。\n老利特克已经中弹身亡，只见他坐在靠椅上，头贴着桌子，满脸鲜血。窗户的玻璃已被打得粉碎。好在刺客没能把文件抢走。\n修道院墙边响起了密集的枪声。凶手跳到街上，拼命朝卢基扬诺夫旷地方向边跑边不断向后开枪。但他没能逃脱，一颗子弹追上了他。\n彻夜展开逐户搜查。几百号没报户口、证件可疑、藏有武器的人被押到肃反委员会。在那里由审查委员会进行一一审核。\n某些地方，阴谋分子仍负隅顽抗。在日梁大街，安托沙·列别杰夫在一家搜查时，被人一枪打死。\n这天夜里，索洛缅卡营损失了五人，肃反委员会牺牲了一名老布尔什维克，他就是共和国的忠实保卫者扬·利特克。\n暴动被制止了。\n同一天夜里，在舍佩托夫卡，瓦西里神父、他的两个女儿以及他们的同伙全部落网。一场风暴平息了。而，新的敌人又在威胁着这个城市——铁路瘫痪，接踵而至的是饥饿和寒冷。"
SOV_Steel.25.a: "一切都取决于粮食和木柴。"

SOV_Steel.26.t: "破靴子"
SOV_Steel.26.d: "保尔费了好大劲才把腿从泥淖里拔出来，并因感到脚底下刺骨冰凉，才明白那只破烂靴底脱落了。他从到这里第一天起，就一直吃这双破靴子的苦头，靴子总是湿漉漉的，走起路来里面的烂泥咕吱咕吱响，现在倒好，一只靴底干脆没了，一只脚光着脚板泡在刺骨的烂泥粥里。这只破靴子害他掉了队。保尔从烂泥里拔出破靴底，绝望地看了看，禁不住违背自己许下不再骂人的诺言，于是破口骂了一声。他拎着破靴底朝棚子走去。他在厨房边坐了下来，解开沾满污泥的包脚布，把那只冻僵的脚伸到炉子跟前。\n奥达尔卡正在厨台上切甜菜，她是养路工的妻子，在这里给厨师打下手。这个远远未老的女人天生一副好身板：双肩宽得像男人，胸脯丰满，双腿粗壮，切起菜来真见功夫，不一会儿厨台上切好的菜便堆积如山。\n奥达尔卡轻蔑地瞥了保尔一眼，挖苦他说：\n“你怎么啦，等饭吃啊？早了点吧。你这小伙子准是溜出来偷懒的。你把脚丫子往哪儿伸呀？这儿是厨房，不是澡堂！”她把保尔奚落了一通。\n上了年纪的厨师走了进来。\n“我的靴子脱落成两半了。”保尔连忙解释他到厨房来的原因。\n厨师看了看破靴子，对奥达尔卡点了点头，说：\n“她男人是半拉子鞋匠，他能帮您缝合起来，要不，没靴子这可要命啦。”\n奥达尔卡边听厨师，边仔细看了看保尔，感到有点不好意思。\n“我把您错当懒虫了。”她抱歉地说。\n保尔莞尔一笑，以示谅解。奥达尔卡以内行的眼光查看着靴子。\n“我那当家的才不补它呢，补了也不管用。我家阁楼上有一只旧套鞋，大小差不多，我给您拿来，可别冻坏了脚。真没见过遭这种罪呀！明后天严寒即将来袭，那您可遭罪啦。”奥达尔卡不无同情地说道，她放下菜刀，走了出去。\n不一会儿，她拿来一只高统套鞋和一块亚麻布。当保尔用布包好的，并烤得热乎乎的脚穿上暖洋洋的套鞋时，他抱以感激之情，默默地望着这位养路工妻子。\n\n"
SOV_Steel.26.a: "“谢谢”"

SOV_Steel.27.t: "退出"
SOV_Steel.27.d: "棚屋里挤满了人。一百二十人把棚子塞得满满的。人们靠板壁站着，有的爬上桌子，还有的甚至上了灶台。\n潘克拉托夫宣布开会。托卡列夫讲话不长，但是最后一句让大家大失所望：\n“明天全体共产党员和共青团员都不得回城。”\n这时，只见老人家抬手在空中一挥，以示这一决定不可改变。这一挥手可把大家挣脱污泥和回城团聚的希望一扫而空。他话刚落音，顿时一片叫喊，什么也听不清。人群涌动，连带那盏半明半暗的油灯也跟着眨巴眼。夜幕遮住了人脸。喧闹声此消彼长。有些侃侃而谈“家中舒适”，有些人愤愤大喊“疲劳过度”。多数人保持沉默。唯独一人声称离队。他恼羞成怒，连喊带骂，从角落里交替发声：\n“去他妈的！这儿我一天也待不下去啦！发配犯人干苦役，那是因为他们罪有应得。可凭什么罚我们？强迫我们干了两星期，也就够了。这年头傻瓜不多见。谁做的决定，谁自己来干。谁乐意就让谁来刨这烂泥巴，我的命只有一条。明天我就走人。”\n这个大喊大叫的人就站在奥库涅夫背后。奥库涅夫划着一根火柴，想见识见识这个逃兵。火柴点燃的瞬间，穿透黑暗顿时照亮了那张气歪的脸和张大的嘴。奥库涅夫认出他是省粮食委员会会计的儿子。\n“你瞅什么？我没藏着，又不是贼。”\n火柴灭了。潘克拉托夫直挺挺地站立起来，说：\n“谁在那儿胡说八道？这是党交办的任务，谁说是苦役？”他瓮声瓮气地说，咄咄逼人的目光扫视着站在周围的人群，“弟兄们，咱们说什么也不能回城去，咱们的岗位就在这儿。要是咱们溜之大吉，城里的人就得冻死。弟兄们，咱们加紧干，早干完早回去。当逃兵，像这个讨厌鬼一样，咱们的思想和纪律绝不容许。”\n这个码头工人不喜欢发表长篇大论，但是，就是这么短短的几句话，也被刚才那个人的声音打断了：\n“这么说，非党团人员可以走喽？”\n“是的。”潘克拉托夫不无粗暴地答道。\n那个小青年穿着城里人常穿的短大衣，朝桌子挤了过来。他扔出一个小本本，像蝙蝠一样在桌子上方翻了一个筋斗，撞在潘克拉托夫胸口上，弹回立着落在桌子上。\n“这是我的团证，收回去吧，我可不为这个小本本毁掉我的健康！”\n他的后半句话被横贯棚屋的责骂声淹没了。\n“你扔掉了什么？”\n“你，出卖灵魂的家伙！”\n“我看你钻入团，图的是这块温暖之隅！”\n“把他撵出去！”\n“你这个伤寒虱子，看我们不给你暖和暖和！”\n扔团证的那个家伙低着头朝门口挤过去。大伙儿像躲避瘟神一样闪向两旁，给他让路。他刚出去，门“吱呀”一声关上了。\n\n"
SOV_Steel.27.a: "再也不见"

SOV_Steel.28.t: "匪徒"
SOV_Steel.28.d: "马在软绵绵的雪地上小心翼翼地迈着步子。有匹马偶尔踩上雪下的枯枝，树枝折断，发出劈啪的响声，这时马打起响鼻。它闪到一旁，但耷拉着的耳朵挨了一枪托后，又急步赶上前去。\n大约有十个人骑着马，穿过一片起伏不平的丘陵地带，这一地带没被雪覆盖，地面呈黑色。他们在这里勒住了马。马镫相互撞击，叮当作响。领头的那匹公马使劲抖动全身，由于长途奔跑使它浑身冒汗。\n“他们来的人真够多的，”领头人用乌克兰话说，“咱们得给他们点颜色看看。老爷子有令，务必要让这群蝗虫明天全都滚蛋，因为这帮乌合之众眼瞅着就要把木柴弄到手了……”\n他们沿着窄轨铁路两侧朝车站鱼贯而行，一步一步靠近学校旁的空地，但没敢露面，隐藏在树后。\n一阵枪声打破了黑夜的寂静。一个雪团像松鼠似的，从那棵被月光照成银白色的桦树上滚落下来。短筒步枪在树林中火光四射，子弹打在墙上，泥灰纷纷落下，潘克拉托夫他们运来的玻璃窗也被打得粉碎。\n枪声惊醒了睡在水泥地上的人，他们立即蹬腿而起，但一见房间里子弹横飞，又都卧倒了。\n有几个相互倒在对方的身上。\n“你去哪儿？”杜巴瓦一把抓住保尔的军大衣。\n“出去。”\n“快趴下，你这个白痴！只要露头，就会被撂倒。”杜巴瓦气急败坏地低声说。\n他俩紧挨着躲在大门旁边。杜巴瓦趴在地上，一只手握着手枪，伸向门口。保尔蹲着，手指紧张地摸着左轮手枪的弹槽，里面只有五发子弹。他摸到空槽，便把转轮转了过去。\n射击突然停止。接下来是一片出奇的寂静。\n“小伙子们，有枪的都到这边来。”杜巴瓦悄声指挥那些伏在地上的人。\n保尔小心地打开门。空地上连个人影也没有，只有雪花在漫天飞舞，飘向地面。\n十个人策马飞奔向林中逃去。"
SOV_Steel.28.a: "不堪一击"

SOV_Steel.29.t: "访问"
SOV_Steel.29.d: "朱赫莱来了。\n朱赫莱察看了小山包，然后同托卡列夫、帕托什京坐上雪橇到伐木场去了一趟，又转了回来。斜坡上的人还在一如既往地挖土。朱赫莱望着闪光的铁锹，望着弯腰奋力的人群，轻声对阿基姆说：\n“动员大会用不着开了。这儿谁也不需动员。托卡列夫，你说得对，这些人都是无价之宝。钢铁就是在这里炼成的。”\n朱赫莱默默地看着这些挖土的人，眼里饱含赞赏、疼爱和肃然起敬的自豪感。就在不久前，也就是那次反革命叛乱的前夜，他们当中的一部分人，曾经扛起钢枪参战。现在，他们又为了一个共同目标，要把钢铁铸成的大动脉铺设到无比珍贵的木柴宝藏——温暖和生命的源泉。\n帕托什京工程师彬彬有礼，但又令人信服地向朱赫莱证明：要挖通这个小山包没有两个星期是不可能的。朱赫莱边听他的计算，边做自己的打算。\n“您把坡上的人撤下来，调到前面去修路，这个小山包我们另作安排。”\n朱赫莱在车站的电话机旁待了很久。霍利亚瓦在门口警卫，他听见身后的朱赫莱那嘶哑的嗓音：\n“以我的名义立刻给军区参谋长挂个电话，请他立刻把普济列夫斯基那个团调往筑路工地。一定要把这个地区的匪徒全都剿灭。另外，再从基地派一列装甲车和几名爆破手来。其他事情我自有安排。我夜里回去。让利特克在十二点前带车到车站接我。”\n在棚子里，阿基姆简短地讲了几句开场白之后，朱赫莱接着讲起来。在亲切友好的交谈中，一个小时不知不觉地过去了。最后，朱赫莱要求与会工人，原定元月一日竣工，工期不得延误。\n“从现在起，我们把工程队转入战时状态。所有党员编成一个特勤中队，中队长指定由杜巴瓦同志担任。六个小组分别承担固定任务。剩下的铺轨工程平分成六段，每组分摊一段。全部工程必须在元月一日前结束。提前完成任务的小组可以回城休息。此外，省执行委员会主席团将要向全乌克兰中央执行委员会呈报，给这个小组优秀工人授予红旗勋章。”\n各组组长均已确定：第一组——潘克拉托夫同志，第二组——杜巴瓦同志，第三组——霍穆托夫同志，第四组——拉古京同志，第五组——柯察金同志，第六组——奥库涅夫同志。\n“工程队队长、思想工作和组织工作的总负责人，”朱赫莱最后说，“理所当然是安东·尼基福罗维奇·托卡列夫。”\n人群举手鼓掌，仿佛一群候鸟展翅飞翔，一张张刚毅的脸上露出了笑容。一向不苟言笑的朱赫莱，他那最后既亲切又诙谐的一席话缓解了全场长时间的注意力并使大家爆发出持久的笑声。\n\n"
SOV_Steel.29.a: "革命之钢，坚不可摧"

SOV_Steel.30.t: "重逢"
SOV_Steel.30.d: "这时，一列客车缓缓驶进车站，火车头上气不接下气，勉强把它拽到这里，因为煤水车上的劈柴一无所有，炉膛里的余火奄奄一息。\n“给我们劈柴，马上开走，没有的话，那就趁它还能动弹，请把它停到辅道上去！”司机向站长喊道。\n列车被停放在辅道上。旅客得知停车原因后一脸沮丧。挤得满满的车厢里顿时响起了一片嚎叫声和骂娘声。\n“你们去跟那个老头说说情，喏，就是在站台上走着的那个，他是工地负责人。工地上有当枕木用的木头，他可以下令用雪橇给火车头运点来。”站长给乘务员们出了个主意。乘务员们立刻迎着托卡列夫走去。\n“要木柴可以，但不能白给。要知道，这是我们的建筑材料。眼下我们这儿积雪成堆。你们车上有六七百乘客。妇女、小孩可以留在车上，其他人都得拿起锨来铲雪，干到晚上，就给你们木柴。要是不愿意干，那就让他们等到新年再说。”托卡列夫对乘务员们说。\n“瞧！伙计们，来了这么多人！看，还有女的呢！”保尔身后有人惊奇地说。\n保尔扭头看过去。\n“给你一百人，请给他们分配任务。盯着点，别让他们偷懒。”托卡列夫走到跟前对他说。\n保尔给这些新来的人派了活。有个高个子男人，身穿毛皮领铁路制服大衣，头戴羔皮帽，正在跟身旁的一个青年妇女说着什么，那女人头上戴着一顶海狗皮帽，帽顶上还有个绒球。只见他愤愤不平地玩转着手里的木锨，嘴里在连声抗议：\n“我才不去铲雪呢，谁也没有权力强迫我。要是请我这个铁路专家指导指导，那还差不多，铲雪嘛，你我都没有这个义务，这不符合规章制度。这老头违法乱纪。我要追究他的责任。谁是这儿的工长？”他问身边的一个工人。\n保尔走上前去，问：“公民，您为什么不干活？”\n这男人轻蔑地把保尔从头到脚打量了一番，问：\n“您算老几？”\n“我是工人。”\n“那我跟您没什么可谈的。把工长给我叫来，别的领导也……”\n保尔皱起眉头，白了他一眼，说：\n“不想干活，那可不行。火车票上没我们的签字，您就别想上车。这是工程队长的命令。”\n“您呢，女公民，也不愿干？”保尔转过身来问那个女人。刹那间，他愣住了。"
SOV_Steel.30.a: "站在他面前的是冬妮娅·图曼诺娃"
SOV_Steel.31.t: "重逢（2）"
SOV_Steel.31.d: "冬妮娅好不容易才认出衣衫褴褛的保尔。他身穿破烂不堪的衣服，脚穿两只稀奇古怪的鞋子，脖子上围着一条脏兮兮的毛巾，脸好久没洗了，保尔就这副模样站在她面前。只有这双眼睛，还同从前一样，炯炯有神。他的眼睛……就是这个像流浪汉一样衣衫褴褛的小伙子，不久以前还是她热恋的人。真可谓沧海桑田，斗转星移啊！\n她前不久才和丈夫完婚，然后准备和他一起迁居到一个大城市，她丈夫在那里的铁路管理局担任要职。真想不到，她竟会在这种情况下遇见少年时代的恋人。遗憾的是她甚至不便和他握手。谁知道瓦西里会怎么想呢？保尔竟如此穷困潦倒，真叫人心里不是滋味。看来，这个火夫一直没什么长进，只能挖挖土。\n她犹豫不决地站着，窘得满脸通红。那个铁路专家则被这个叫花子的、在他看来是厚颜无耻的行径——目不转睛地盯着他的妻子——给气得发疯。他把木锨往地下一扔，走到冬妮娅跟前，说：\n“咱们走，冬妮娅。这个拉查隆尼真叫人受不了，我实在看不下去。”\n保尔读过《朱泽培·加里波第》这部小说，知道拉查隆尼是何许人也。\n“如果说我是拉查隆尼，那你也只不过是奄奄一息的资本家。”他粗声粗气地回敬了铁路专家一句，然后把目光转向冬妮娅，一字一句冷冰冰地说：“图曼诺娃同志，拿起木锨，站到队伍里去吧。别学这头肥牛。请原谅，我不知道他算是您的什么人。”\n保尔看着冬妮娅那双毛皮高筒靴子，冷笑了一下，又顺便补充说：\n“我劝您还是别待在这儿，前两天土匪还来光顾过呢。”\n说完他转过身，朝自己人那里走去，脚下那只套鞋“啪哒啪哒”直响。\n最后一席话对铁路专家起了点作用。\n冬妮娅也说服了他一起去铲雪。\n傍晚，收工之后，旅客们纷纷回到车站。冬妮娅的丈夫走在前面，急急忙忙地上车抢占座位。冬妮娅停下来，让工人们先过去。\n走在最后的是保尔，他一路拄着木锨，累得精疲力竭。\n“你好，保夫鲁沙！老实说，没想到再次见到你是这个样子。难道你就不想在当局弄个一官半职的，干什么也比刨土强吧？我还以为你早就当上了委员，或者之类的什么呢。你这一生经历太不顺……”冬妮娅边说，边和他并排走着。\n保尔站下，用诧异的眼光打量着冬妮娅。\n“我也没想到你会变得这么……酸臭。”保尔想了想，终于找到这个比较温和而又合适的字眼。\n最后两字让冬妮娅脸红到耳根。\n“你还是这么粗鲁！”\n保尔把木锨往肩上一扛，迈开大步向前走去。刚走几步，他回答道：\n“图曼诺娃同志，说句难听的话，我的粗鲁远比您的礼貌更宜人。我这一生没什么可担心的，一切都很好。可您这一生比我原来想象的还要糟。两年前你还好一些，不耻与一个工人握手。可现在呢，你浑身都是樟脑丸的熏人味。说句大实话，我和你没什么可谈的。”\n\n"
SOV_Steel.31.a: "埋葬过往"

SOV_Steel.32.t: "倒下"
SOV_Steel.32.d: "这一天，保尔两腿发软，像喝醉酒似的，踉踉跄跄地走回车站。他已经发烧好几天了，但今天的热度比前几天都高。\n肠道伤寒，吸尽工程队的血后，又让保尔染上了。但他那健壮的身体一直在抵抗，一连五天，他都打起精神，竭力从铺着干草的水泥地上爬起来，和大家一起去上工。他身上穿着暖和的皮大衣，冻坏的双脚穿上了朱赫莱送给他的毡靴，可是这些东西都救不了他。\n他每走一步，胸口都觉得刺痛，浑身发冷，上下牙直打架，两眼昏黑，树木像是奇怪的旋转木马在打转。\n他好不容易才走到车站。异常的喧闹声让他为之一震。仔细一看，一个列车组占满整个车站。各节平板车上载有小火车头、铁轨和枕木，随车来的人们正在卸车。他又向前走了几步，终于失去了平衡。他迷迷糊糊地感觉到头撞到地上。冰凉的雪沾在他那灼热的脸颊上，一丝凉意好不舒服。\n几小时后，保尔才被人偶然发现。人们把他抬到棚子里。他呼吸困难，已经认不清周围的人了。从装甲车上请来一位医生，诊断后说：“他是肠道伤寒，并发大叶性肺炎。体温四十一点五度。关节炎和脖子上的痈疽，就不值一提了，小毛病。前两者就足以送他上西天。”\n潘克拉托夫和刚回来的杜巴瓦尽一切可能抢救保尔。\n保尔的老乡，阿廖沙·科汉斯基受托护送病人回故乡。\n只有在保尔小组的全体队员的帮助下，更主要的是靠霍利亚瓦的威逼，潘克拉托夫和杜巴瓦才得以把阿廖沙和不省人事的保尔塞进了挤得满满的车厢。车上的人怕斑疹伤寒传染，怎么也不肯让他们上车，并且威胁说，车开动后，就把病人扔下去。\n霍利亚瓦用转轮手枪指着那些不让病人上车的人的鼻子，喊道：\n“这个病人不传染！就算把你们全都撵下车，也得让他走！你们这帮自私自利的家伙，记住，我马上通知沿线各站，要是谁敢动他一根毫毛，就把你们统统撵下车，关起来。阿廖沙，这是保尔的毛瑟枪，给你拿着，谁敢动他，你就照准谁开枪。”霍利亚瓦最后又威胁地加上了这么一句。\n列车徐徐开动。站台上空荡荡的，潘克拉托夫走到杜巴瓦身旁，问：\n“你觉得他能活吗？”\n潘克拉托夫并没得到回答。\n“走吧，米佳，随其自然吧。咱俩现在得全面负责。今天连夜把机车卸下来，明天早上就试车。”\n霍利亚瓦给沿线各站做肃反工作的朋友们打了电话，恳求他们不要让乘客把柯察金弄下来，直到每个同志都答应“一定办到”后，他才去睡觉。\n在一个铁路枢纽站，从一列客车的车厢里抬出一具黄发青年的尸体，直接放在站台上。他是谁，怎么死的，谁也不知道。站上的肃反工作人员想起霍利亚瓦的拜托，赶忙跑到车厢跟前阻止，但确认该小伙子已经死亡后，只好叫人把尸体抬到停尸房。\n他们立刻打电话到博亚尔卡，通知霍利亚瓦，他所担心的那个人已经死亡。"
SOV_Steel.32.a: "博亚尔卡方面向上级报告了保尔的死讯。"

SOV_Steel.33.t: "最后的日记"
SOV_Steel.33.d: "\n1月9日\n为什么心情如此沉重？刚坐下，拿起笔就痛哭一场。谁能想到丽达会失声痛哭，还哭得这样伤心！难道眼泪一定是意志薄弱的表现吗？今天之所以流泪是因为巨大的悲痛。为什么悲痛会突然来到？为什么悲痛是今天，这样一个大喜的日子，可怕的严寒已经被战胜，铁路各站堆满了宝贵的木柴，我又刚从庆祝大会回来，市苏维埃为祝贺筑路英雄们而召开扩大会议，为什么悲痛恰恰在这个时刻降临呢？我们是取得了胜利，但两位英雄为此献出了生命：克拉维切克和保尔。\n保尔的死揭示了我内心的真情：对我来说，他比我原先所想的更珍贵。\n日记到此结束，不知道哪天再提笔重写。明天写信给哈尔科夫，告诉他们我同意去乌克兰共青团中央委员会工作。\n\n"
SOV_Steel.33.a: "泪流满面"

SOV_Steel.34.t: "冲破死亡"
SOV_Steel.34.d: "青春无往而不胜。伤寒没能击倒保尔。这是保尔第四次冲破死亡的封锁，返回人间。卧床仅一个月后，苍白而又瘦弱的他终于站立起来，迈着颤巍巍的双腿，扶着墙壁，在房间里试着走动。在母亲的搀扶下，他走到窗前，久久地凝望着窗外的道路。\n路上的积雪融化了，一个个小水洼泛着银光。外面已是乍暖还寒的早春季节。\n紧挨窗前的樱桃树枝上，站着一只神气十足的灰麻雀，一双贼溜溜的小眼睛端详着保尔。\n“怎么样，我和你都把今冬熬过来了吧？”保尔用指头敲着窗户，低声说。\n母亲惴惴不安地望着他问：\n“你在那儿跟谁说话？”\n“我在跟麻雀说话……它飞走了，小家伙真调皮。”\n\n"
SOV_Steel.34.a: "他无力地笑了笑。"

SOV_Steel.35.t: "人的一生..."
SOV_Steel.35.d: "保尔不知不觉来到松林前，在岔路口驻足。往右，前面是阴森森的旧监狱，一道高高的尖头木栅栏把它和松林隔开。监狱后面是医院的白色楼房。\n就是在这里，在这空旷的场地上，瓦莉亚和她的同志们被绞死。保尔在当年设立绞架的原地默默地站了一会儿，然后走向陡坡，顺坡下去，来到烈士陵园。\n不知道是哪个有心人，在一排坟墓四周摆上用云杉枝编织的花圈，仿佛给这块小小的墓地修了一道绿色的围墙。陡坡上一棵棵挺拔的松树高耸入云，谷地斜坡上绿草如茵。\n这里是小城的郊区。这里是静寂而又忧伤之地。松林在低语，大地在复苏，散发着春天的泥土气息。烈士们当年就是在这里英勇就义，为的是让那些出身贫穷和生来为奴的人们能过上美好的生活。\n保尔慢慢地摘下帽子。于是，忧伤之情，莫大的忧伤充满了他的心府。\n\n人最宝贵的是生命，生命每个人只有一次。人的一生应当这样度过：当他回首往事时，不因虚度年华而悔恨，也不因碌碌无为而羞愧；只有这样，临终时，他才能够说：“我的整个生命和全部精力，都献给了世界上最壮丽的事业——为解放全人类而奋斗。”\n\n因此，必须趁现在还活着，抓紧时间工作，殊不知，抑或一场怪病，抑或一个意外的悲剧都将断送生命。\n"
SOV_Steel.35.a: "保尔怀着这些想法离开了烈士陵园"

SOV_Steel.36.t: "再一次再见"
SOV_Steel.36.d: "家里，母亲在给儿子收拾出门的行装，她很难过。保尔望着妈妈，发现她在偷偷地流泪。\n“保夫鲁沙，你别走啦，行吗？我岁数大了，孤零零的一个人过日子多难受啊。不管养多少孩子，长大后就都飞了。城市生活有什么可向往的？这儿一样可以过日子嘛。是不是看中了哪只短尾母鹌鹑了？唉！你们什么也不跟我这个老太婆说。阿尔焦姆成亲，一句话也没说。你呢，更不用说了。总要等你们生病住院了，我才能见到你们。”妈妈边低声诉说，边把儿子的几件简单衣物装到一只干净的行囊里。\n保尔抱住母亲的肩膀，把她拉到自己怀里。\n“好妈妈，没有什么母鹌鹑！你老人家不是不知道，只有公鹌鹑才找母鹌鹑做伴。照你那么说，我不也成公鹌鹑了吗？”\n他的话把母亲逗得笑起来。\n“妈妈，我发过誓，只要全世界的资产阶级还没消灭光，我就不谈婚论娶。你说什么，要等很久？不，妈妈，资产阶级的日子长不了啦……为了全体百姓，一个新的共和国即将建立起来，你们这些老头老太太，都是些劳苦大众，将来都送到意大利去养老。那个国家可暖和了，就在海边。那儿根本没有冬天，妈妈。到时把你们安顿在资本家住过的宫殿里，让你们在温暖的阳光底下晒晒老骨头。我们再到美洲去消灭资产阶级。”\n“孩子，你所说的那个童话世界，我是等不到那一天了……你爷爷就是这样的人，一点都不靠谱，在海里游了一辈子。一个真正的海盗，上帝宽恕我吧！那年他在塞瓦斯托波尔打仗，回到家里，只剩了一只胳膊一条腿。胸前倒是戴上了两枚十字勋章，还有挂在丝带上的两枚五十戈比银币，可是到后来老头还是穷死了。他性格可倔了。有一回他用拐棍敲了一个官老爷的脑袋，为这事差不多蹲了一年大牢。十字勋章也不管用，人家照样把他关了起来。我看你呀，跟你爷爷一个样……”\n“妈，瞧你说的，不就是离别嘛，我们何必弄得如此感伤呢？把手风琴给我，好久没拉了。”\n保尔低下头，俯在珠母制的琴键上，奏响一首新乐曲，那新鲜曲调让母亲感到十分惊奇。\n如今，他的演奏和过去大不一样。一扫从前那种轻浮大胆的曲调和放荡不羁的节奏，也不再现那种曾使这个青年手风琴手闻名全城的、令人如醉如痴的奔放旋律。如今这乐曲听起来让人觉得更加悦耳，但仍不失力度，似乎更有深度。\n保尔独自来到火车站。\n他劝说母亲留在家里，免得她临别时又伤心落泪。\n人们争先恐后地拥进车厢。保尔占了一个上铺，他坐在上面，观看着下面过道上吵吵嚷嚷的，激动不安的人群。\n还是和以前一样，人们扛着大包小包，拼命往座位底下塞。\n列车开动之后，人群才安静下来，这时，乘客们按惯例一个个狼吞虎咽地吃起东西来。"
SOV_Steel.36.a: "保尔很快进入了梦乡"

SOV_Steel.37.t: "归来"
SOV_Steel.37.d: "\n保尔已经走得精疲力竭，总算到了潘克拉托夫家门口。他敲了敲曾经油成红褐色的门，暗暗下了决心：“要是他也不在，我就不再跑了，干脆钻到小船底下睡一宿。”\n一个老太太开了门，她头上扎着一块朴素的头巾，这是潘克拉托夫的母亲。\n“大娘，伊格纳特在家吗？”\n“他刚回来，您找他吗？”\n她没认出保尔，回头喊道：“伊格纳特，有人找你！”\n保尔跟她走进房里，把行囊放在地上。潘克拉托夫嘴里边嚼着面包，边从桌子旁边转过身来，对客人说：\n“既然是找我，你就坐下谈吧，我得先把这碗汤灌下去。从大清早到现在，只喝了点白开水。”潘克拉托夫手里拿着一只大木勺。\n保尔在他旁边的一张破椅子上坐下来，摘下帽子，习惯地用帽子擦了擦前额，心想：\n“难道我变化这么大，连伊格纳特都认不出我来了？”\n潘克拉托夫喝了两勺汤，没听到客人说话，又转过头来，说：\n“说吧，你有什么事？”\n他拿着一块面包，正往嘴里送，突然手在半空中停了下来。他一下愣住了，眨了眨眼说：\n“嘿……快打住……讨厌！你可真胡闹！”\n保尔看见潘克拉托夫紧张得满脸通红，忍不住哈哈大笑起来。\n“保尔啊！我们都以为你失踪了呢！……等等，你叫什么名字？”\n潘克拉托夫的母亲和姐姐听到他的喊声，从隔壁房间跑了过来。他们三个人一起，终于认出了站在他们面前的确实是保尔。\n家里人早都睡了，潘克拉托夫还在给保尔讲四个月来发生的各种事情。"
SOV_Steel.37.a: "奇迹"

SOV_Steel.38.t: "讲话"
SOV_Steel.38.d: "托卡列夫身后挂着《共产党宣言》的天才作者的画像，绿色松针编织而成的画框里的头像像头雄狮。当奥库涅夫宣布开会时，托卡列夫一直注视着站在后台过道上的保尔。\n“同志们，在我们讨论当前团的任务之前，有一位同志要求先说几句，我和托卡列夫都认为应该让他发言。”\n会场里响起一片赞同声，于是奥库涅夫立刻宣布：\n“现在有请保尔·柯察金向大会发表致辞！”\n大厅里一百人中，至少有八十人认识保尔，所以，当大家所熟悉的，这个面色苍白的高个子青年出现在舞台上，并且开始讲话的时候，会场里立即响起了热烈的掌声和欢呼声。\n“亲爱的同志们！”\n保尔的声音是平和的，但也无法掩盖内心的激动。\n“朋友们，事情正如你们所见的，我又回到你们中间来了，又回到自己战斗岗位上来了。回到这里，我感到非常幸福。在这里我见到许多老朋友。我在奥库涅夫那里翻阅了不少材料，得知咱们索洛缅卡区增加了三分之一的新团员，铁路工厂里和机车库里再也没人经营打火机之类的私活了，报废的机车又从废铁堆里拖出进行‘大修’。所有这些都表明，我们的国家正在复兴，正在鼓足干劲。活在这个世界上大有可为！你们说，在这种时刻，难道我能死去！”说到这里，保尔脸上露出了幸福的笑容，两眼熠熠生辉。\n保尔在一片欢呼声中走下舞台，朝安娜和塔莉亚就坐的地方走去。他很快和几个人握了手。朋友们挤出一个位子，让他坐下。塔莉亚把手放在保尔手上，紧紧地握着。\n安娜睁大眼睛，睫毛微微颤动着，她的目光中含着惊喜和敬意。\n\n"
SOV_Steel.38.a: "钢铁不死"

SOV_Steel.39.t: "舞蹈"
SOV_Steel.39.d: "不久，保尔就把自己的东西搬到机车库的集体宿舍，和伙伴们住在一起。几天后，在安娜那里举办了一场既无佳肴又无佳酿的联谊晚会，亦即庆祝塔莉亚和尼古拉联姻的共产主义婚礼。这是一次大家追忆往事，诵读名著的晚会。晚会上大家一起高歌数曲，无不尽兴。战斗的歌声飘向远方。后来，卡秋莎·泽列诺娃和穆拉·沃伦采娃拿来了手风琴，于是整个房间响彻了手风琴奏出的银铃般的乐曲声和浑厚的男低音和声。这天晚上，保尔演奏得异常精彩，当大个子潘克拉托夫出乎大伙意料地跳起舞时，保尔更是忘怀一切，手风琴一改时尚风格，如火如荼地演奏起来：\n嘿，街坊们，老乡们！\n坏蛋邓尼金犯愁啦，\n西伯利亚的契卡\n把高尔察克处决啦……\n手风琴演奏着往事，讲述着那战火纷飞的年代，歌唱今天的友谊、斗争和欢乐。可是，当手风琴转到沃伦采夫手里时，这位钳工马上使劲奏出了热烈的“小苹果”舞曲，跟着就有一个人旋风似的跳起舞来，这个人不是别人，正是保尔。只见他跺着脚，疯狂地跳着，这是他一生中第三次跳舞，也是最后一次跳舞。"
SOV_Steel.39.a: "嘿，街坊们，老乡们···"

