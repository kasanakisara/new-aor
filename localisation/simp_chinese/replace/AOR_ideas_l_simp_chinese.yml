#奥地利
aus_political_center:0"帝国的遗产：政治势力"
aus_political_center_desc:0"即使帝国已经解体，但帝国的遗产仍然庇佑着我们。\n奥地利继承了帝国最为繁华的内核，他不但是金融汇聚之地，还是旧时帝国的政治中枢，因此，我们得以拥有足够的权威来组建多瑙联盟。\n而这份宝贵的遗产，也将会在处处为我们提供便利"
aus_new_republic:0"新生的共和国"
aus_new_republic_desc:0"奥地利是一个自一战崛起的新共和国。\n纵使我们已经确定了先进的民主制度，但旧帝国的梦魇仍然徘徊在这个国度，人们对于国家的信心极度缺乏，至少现在是缺乏的。\n新生政府的权威虽然有了一定的巩固，但仍然不足，我们需要拥有我们自己的力量，来保卫新生的共和国，让他不受那些可怕外敌或者狡诈叛徒的侵犯。\n政治，经济，军事，每一个名词都是压在奥地利政府头上的大山，我们需要尽快完成现代化的改革，把人民从摇摆不定的中立地位拉入政府的阵营中。\n但倘若我们无法完成人民的期望，梦魇将会吞噬这个国度。\n§R“伟大的事业降临到渺小人物的身上，仅仅是短暂的瞬间。谁错过了这一瞬间，它绝不会再恩赐第二遍。”——茨威格§!"
aus_The_Age_of_Miracles:0"奇迹年代"
aus_The_Age_of_Miracles_desc:0"战后的奥地利轻易且迅速地扫除了大战的阴霾，恰到好处的政府计划与公共设施建设使人民的生活水平达到了新的高峰。大战苦痛的回忆似乎已经消失了，取而代之的是经济的快速恢复与财富的高度增长，在这萧条的战后世界，奥地利成为了一个奇迹———一个经济的奇迹。\n百货大楼一栋又一栋的兴建，证券交易所门前车水马龙，每个人脸上都洋溢着自信的笑容。当不列颠人和法兰西人为结束配给制而欢呼时，一顿顿大餐早已是奥地利人的家常便饭；当俄罗斯人和普鲁士人还在为自行车而发愁时，奥地利已然成为了汽车的国度。无数的作品被创作出来：古老的，新颖的，展现在纸张上的，呈现在银幕上的，都在歌颂这繁荣的年代！\n奥地利，我伟大的祖国，我繁荣的祖国，我对你的爱直到永远！"
aus_Shame_on_Austria:0"奥地利之耻"
aus_Shame_on_Austria_desc:0"军队一直是奥地利这个伟大的国家最难以启齿的部分，无论是19世纪以前的种种败绩，还是19世纪军队改革时期的混乱局面，抑或是大战时期难堪的表现，都为人们留下了一个印象———奥地利人不擅长战斗\n改革几乎葬送了奥地利军队的基础，对贵族军官的遣退，使得我们丧失了一大批拥有丰富军事基础的将领们，议会的不作为，这使得我们的军队还在沿用上个世纪的装备，极低的工资，更是使士兵成为一个耻辱的职位，这让本来战斗力就低的军队，更加雪上加霜。\n纵然奥地利一个美好且浪漫的国度，但美好，也需要钢枪来维护。"
