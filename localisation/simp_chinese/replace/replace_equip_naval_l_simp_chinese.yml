 ship_hull_submarine_3_desc: "世界大战中的潜艇深刻证明了自己的价值，这类廉价高效的水下杀手在破交作战中的交换比挑战了传统的海军作战方式，以至于辅助舰艇必须学会反潜这一新课题。但是水下指数型增长的阻力限制了潜艇的航速，声纳的发展更是为她们的生存蒙上阴影。水面与水下的对抗不像战斗，反倒像一场致命的猫鼠游戏，而潜艇只有更安静，更隐蔽才能胜出。"
