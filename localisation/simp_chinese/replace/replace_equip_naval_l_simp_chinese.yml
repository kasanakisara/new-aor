l_simp_chinese:
 naval_equipment: "舰船"
 submarine_1: "早期潜艇船体"
 submarine_2: "大战前潜艇船体"
 submarine_3: "大战潜艇船体"
 submarine_4: "远洋潜艇船体"
 cruiser_submarine: "$ship_hull_cruiser_submarine$"
 cruiser_submarine_desc: "$ship_hull_cruiser_submarine_desc$"
 fleet_submarine: "$ship_hull_fleet_submarine$"
 fleet_submarine_desc: "$ship_hull_fleet_submarine_desc$"
 midget_submarine: "$ship_hull_midget_submarine$"
 midget_submarine_desc: "$ship_hull_midget_submarine_desc$"
 rocket_submarine: "导弹发射潜艇"
 rocket_submarine_desc: "配备了导弹和发射系统的新一代潜艇，为我们创造了出其不意地打击敌人战略目标的机会"
 nuclear_submarine: "$ship_hull_nuclear_submarine$"
 nuclear_submarine_desc: "$ship_hull_nuclear_submarine_desc$"
 nuclear_missile_submarine: "核导弹潜艇"
 nuclear_missile_submarine_desc: "有能力携带和发射核导弹以攻击敌方目标的潜艇。真正的死神，世界的毁灭者——我们甚至看不到它是如何到来的。"
 submarine_1_desc: "在水下航行的船只”这一概念早已出现，然而直至19世纪80年代，随着材料学与机械动力的实现，潜水艇才真正成为一种实用的船只出现。这种隐蔽无声的特种船只迅速引起了各国海军的兴趣，早期潜艇多为实验性载具，她们受限于艇体材料的强度潜深尚浅，武备偏弱。主要职能是近海潜航，并为后辈积累技术经验。"
 submarine_2_desc: "随着技术与材料的进一步发展，大战前潜艇们得以初具远洋能力。虽然她们并不能与传统水面舰艇一般为海域提供货真价实的控制，也无力加入舰队决战争夺制海，但她们绝对是深海中最安静可怕的猎手。她们在打击对手的海上交通线，封锁原料进口，毁灭登陆计划方面无人能及，潜航水下的眼睛更能提供对手主力舰的宝贵动向，甚至给予麻痹大意的主力舰致命一击。"
 submarine_3_desc: "世界大战中的潜艇深刻证明了自己的价值，这类廉价高效的水下杀手在破交作战中的交换比挑战了传统的海军作战方式，以至于辅助舰艇必须学会反潜这一新课题。但是水下指数型增长的阻力限制了潜艇的航速，声纳的发展更是为她们的生存蒙上阴影。水面与水下的对抗不像战斗，反倒像一场致命的猫鼠游戏，而潜艇只有更安静，更隐蔽才能胜出。"
 submarine_4_desc: "柴油引擎在潜艇上的运用使她们能够进一步向大型化，远洋化发展。她们将能出现在海洋的每一个角落，对每一条敌国的海上咽喉架上利刃。更快的水下潜航让她们如虎添翼。她们是是海权强国不得不学习和对抗的新兴强敌，也是后发海军国家挑战海权的别种方式。"
 ship_hull_submarine_1_desc: "在水下航行的船只”这一概念早已出现，然而直至19世纪80年代，随着材料学与机械动力的实现，潜水艇才真正成为一种实用的船只出现。这种隐蔽无声的特种船只迅速引起了各国海军的兴趣，早期潜艇多为实验性载具，她们受限于艇体材料的强度潜深尚浅，武备偏弱。主要职能是近海潜航，并为后辈积累技术经验。"
