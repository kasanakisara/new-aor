 destroyer_1: "重型鱼雷艇船体"
 destroyer_2: "大战前驱逐舰船体"
 destroyer_3: "大战驱逐舰船体"
 destroyer_4: "远洋驱逐舰船体"
 destroyer_1_desc: "自白头鱼雷诞生以来，这种廉价而致命的武备迅速获得各国的青睐，使其成为了近岸海防的重要力量，鱼雷快艇就此应运而生。为高效应对这种近海的新式威胁，吨位更大，火力更强的鱼雷艇驱逐舰，或可称为重型鱼雷艇也便应运而生。她们作为鱼雷艇编队的领导者，既可猎杀对手的鱼雷艇，亦可向对手的主力舰领导致命的鱼雷弹幕。"
 destroyer_2_desc: "大战前驱逐舰已经脱离了近岸快艇的行列，成为了一种新兴的辅助舰种。但受限于燃料与补给，她们大部分时间仍在近海活动。侦察、布雷、反潜、对岸支援等繁复细碎的任务便以她们为主力军。对于一支蓝水海军，她们是不可或缺的可靠助手，对于一支绿水海军，她们是廉价高效的海岸守卫军。"
 destroyer_3_desc: "世界大战期间的驱逐舰们为应对越发繁重的辅助任务，顺理成章的继续向大型化，远洋化发展。但受制于轮机效率，她们仍不会长时间伴随主力舰行动。从大范围侦察到救助落水水兵，从反潜护航到雷击作战，她们是一支现代化海军勤勉的工蜂。如果说主力舰使海权的象征，那么广布四海的驱逐舰便是海权灵敏的触角。"
 destroyer_4_desc: "重油锅炉蒸汽轮机在驱逐舰上的成功运用同样使她们产生革命性的发展。在航速上她们远远甩开了主力舰，航程的飞跃让她们能从容的执行远洋任务。她们不再局限于近海，而是可以在远海大洋机动作战的舰队驱逐舰。远洋驱逐舰是海上真正的多面手，能独立执行基本所有辅助任务，更加强大的鱼雷武备也能让轻视她们的主力舰付出沉重代价。"
 ship_hull_light_1_desc: "自最初的白头鱼雷诞生以来，这种廉价而致命的武备迅速获得各国的青睐，使其成为了近岸海防的重要力量，层出不穷的鱼雷快艇就此应运而生。为高效应对这种近海的新式威胁，吨位更大，火力更强的重型鱼雷艇，或可称为原型驱逐舰也便应运而生。她们作为鱼雷艇编队的领导者，既可猎杀对手的鱼雷艇，亦可向对手的主力舰领导致命的鱼雷弹幕。"
 ship_hull_light_2_desc: "大战前驱逐舰已经脱离了近岸快艇的行列，成为了一种新兴的辅助舰种。但受限于燃料与补给，她们大部分时间仍在近海活动。侦察、布雷、反潜、对岸支援等繁复细碎的任务便以她们为主力军。对于一支蓝水海军，她们是不可或缺的可靠助手，对于一支绿水海军，她们是廉价高效的海岸守卫军。"
 ship_hull_light_3_desc: "世界大战期间的驱逐舰们为应对越发繁重的辅助任务，顺理成章的继续向大型化，远洋化发展。但受制于轮机效率，她们仍不会长时间伴随主力舰行动。从大范围侦察到救助落水水兵，从反潜护航到雷击作战，她们是一支现代化海军勤勉的工蜂。如果说主力舰使海权的象征，那么广布四海的驱逐舰便是海权灵敏的触角。"
 ship_hull_light_4_desc: "重油锅炉蒸汽轮机在驱逐舰上的成功运用同样使她们产生革命性的发展。在航速上她们远远甩开了主力舰，航程的飞跃让她们能从容的执行远洋任务。她们不再局限于近海，而是可以在远海大洋机动作战的舰队驱逐舰。远洋驱逐舰是海上真正的多面手，能独立执行基本所有辅助任务，更加强大的鱼雷武备也能让轻视她们的主力舰付出沉重代价。"
 light_cruiser_1: "防护巡洋舰船体"
 light_cruiser_2: "大战前防护巡洋舰船体"
 light_cruiser_3: "大战巡洋舰船体"
 light_cruiser_4: "远洋巡洋舰船体"
 torpedo_cruiser: "重雷装巡洋舰"
 torpedo_cruiser_desc: "以拆除一些主炮和防空炮为代价，搭载着大量鱼雷发射管的轻巡洋舰。"
 JAP_torpedo_cruiser: "北上级"
 light_cruiser_1_desc: "“巡洋舰”一词源自于风帆时代维护远洋制海的快帆船。进入铁甲舰和速射炮的时代，这类中型舰艇开始承担重要的远洋辅助与侦查任务，并在舰体内部布置平甲或穹甲提供基本的防护，因而被称作防护巡洋舰。她们通常拥有优美流畅的舰体线形，在主力舰力有未及的远海巡视海疆。"
 light_cruiser_2_desc: "随着驱逐舰的兴起，防护巡洋舰除了承担巡视远洋的职责外，屏卫主力舰成为了她们最重要的任务。她们填补了小型辅助舰艇与主力舰之间的空白，列装的速射炮能够有效压制抵近雷击的驱逐舰，领导前卫舰队进行必要的侦察也是她们职责的一环。在海权体系中，她们是拥有广大海外利益的列强海上霸权的缩影"
 light_cruiser_3_desc: "随着她们的同僚装甲巡洋舰彻底脱离辅助任务，跃升成次等主力舰后，依然忠实于为主力舰提供宝贵支援的防护巡洋舰便独占了此名词解释权。6英寸主炮被证明是满足压制更小舰艇的火力密度下兼具毁伤能力和射速的最佳选择。加长的航程也为她们执行远洋任务提供保障。尽管最主要的任务依旧是护航，但单枪匹马的对敌方海上交通线进行破交也成为成熟的战术。"
 light_cruiser_4_desc: "重油锅炉燃气轮机同样深刻的影响了巡洋舰们的发展。极大扩展的航程和堪称迅疾的航速让巡洋舰们能更加有力的承担远洋巡逻任务。她们在对对手海上补给线进行破交作战的任务中也被广泛的运用。但她们最主要的功能依旧是为主力舰提供必要的屏护，改进的速射主炮能够轻易撕碎来犯的鱼雷威胁。她们是主力舰队忠实的护卫，也是远洋辅助任务的先锋。"
 heavy_cruiser_1: "装甲巡洋舰船体"
 heavy_cruiser_2: "大战前装甲巡洋舰船体"
 heavy_cruiser_3: "重巡洋舰 III型"
 heavy_cruiser_4: "重巡洋舰 IV型"
 heavy_cruiser_1_desc: "这种自巡洋舰蜕变而来的奇特舰种实质上是一个无奈的妥协。要么是无力承担主力舰高昂的造价，要么是技术受制于人，总之，装甲巡洋舰们脱离了她们巡洋舰同僚辅助舰种的地位，以水线覆甲和崭新的速射炮将自己武装为了“次等主力舰”，承载后发海军国家的野望。但在面对真正的主力舰时，她们尚无力挑战海上霸主的威严。"
 heavy_cruiser_2_desc: "速射炮短暂的时代迅速被无畏舰革命后统一大口径主炮的趋势取代。为应对日夜迫近的世界大战，以及适应海军革命性的变革，这些“次等主力舰”们同样开始跨越式发展。尽管依然难以胜任加入战列舰线列的任务，但她们在对抗辅助舰艇时真正拥有了压倒性优势。她们是后发海军国家追求海洋霸权的重要之路。"
 heavy_cruiser_3_desc: "由于越来越多的国家开始无视条约的限制，人们现在可以建造装甲更重更平衡的重巡洋舰了。更好的防空武器能使它们在对空战斗中发挥更大的作用。"
 heavy_cruiser_4_desc: "这些重巡洋舰的最终型号往往更长、更大也更重，它们还装备有高射速的速射武器。"
 ship_hull_cruiser_1_desc: "这种自巡洋舰蜕变而来的奇特舰种实质上是一个无奈的妥协。要么是无力承担主力舰高昂的造价，要么是技术受制于人，总之，装甲巡洋舰们脱离了她们巡洋舰同僚辅助舰种的地位，以水线覆甲和崭新的速射炮将自己武装为了“次等主力舰”，承载后发海军国家的野望。但在面对真正的主力舰时，她们尚无力挑战海上霸主的威严。"
 ship_hull_cruiser_2_desc: "为应对日夜迫近的世界大战，以及适应海军革命性的变革，这些“次等主力舰”们同样开始跨越式发展。速射炮短暂的时代迅速被无畏舰革命后统一大口径主炮的趋势取代。尽管依然难以胜任加入战列舰线列的任务，但她们在对抗辅助舰艇时真正拥有了压倒性优势。她们是后发海军国家追求海洋霸权的重要之路。"
 ship_hull_cruiser_3_desc: "当世界上的巡洋舰变得更加强大和能干，她们将需要更新和更大的船体以容纳新增的设备。"
 ship_hull_cruiser_4_desc: "通过实战中获得的经验影响，最新世代的巡洋舰重新安排了上层建筑的结构以获得更宽广的防空火力射界，并更新了内部的布局以支持雷达的使用。"
 Modern_armored_cruiser: "现代大型巡洋舰船体"
 Modern_armored_cruiser_desc: "随着军备竞赛陡然升级，一种采用现代船体，且排水量较大的巡洋舰应运而生-其主炮口径在十英寸或以上，可以轻易的撕碎任何轻中型舰船；极速相比装甲巡洋舰大为提升，不过装甲相对薄弱。这种巡洋舰被定义为可大量制造，并代替战巡与装巡进行破交任务的新型舰艇，但在海军竞赛如此激烈的今天，这种船只实在没什么突出优势，或许对于海军薄弱的国家是个不错的选择。"
 battle_cruiser_1: "早期战列巡洋舰船体"
 battle_cruiser_2: "大战战列巡洋舰船体"
 battle_cruiser_3: "战列巡洋舰 III型"
 battle_cruiser_4: "战列巡洋舰 IV型"
 battle_cruiser_1_desc: "尽管和其名字真正的定义相差甚远，但以此称呼这种“高速主力舰”也意外的合适。这种为维护海权和航线而生的次级主力舰虽然仍然难以对抗主力舰，但是紧跟无畏舰革命的统一大口径主炮和蒸汽轮机给予的充沛动力，让她们能轻易毁灭对手辅助舰艇。对于海军大国，她们是补充远洋海权的优惠之选，而对后发海军国家，她们是能真正争夺远洋海权的第一步，亦是当之无愧的海权象征。"
 battle_cruiser_2_desc: "到世界大战年代，这些“高速准主力舰”与构想中的“高速主力舰”的差别已经相当模糊。她们都拥有统一火控观瞄指挥下的大口径主炮组，与常规战列舰差别不大的防护，同样的高速长航程，也同样会被作为主力舰编队作战。她们是海军大国维护庞大海外权益的补充，也是后发海军国家足以施展海权利益的象征，更是这场漫长的后发海军国家追逐主力舰革命的最后一步。"
 battleship_1: "前无畏舰船体"
 battleship_2: "无畏舰船体"
 battleship_3: "超无畏舰船体"
 battleship_4: "快速战列舰船体"
 battleship_1_desc: "在无畏舰的曙光出现之前，前无畏舰们便是前无畏时代最后辉煌的黄昏。她们最大的特征便是拥有火控观瞄系统互不统一的一级、二级主炮，前者是射速缓慢，用于主力舰对抗的主炮；后者则一般是大口径速射炮，用于压制辅助舰艇兼以打击主力舰的非主防护区。两种主炮的运作往往互相干扰，造成火控混乱而导致作战范围和效能的双重低下。属于双头的安菲斯比纳的时代已经结束，无畏舰时代再不会有她们的位置。"
 battleship_2_desc: "以英帝国1905年下水的“无畏号”为名，这种划时代的设计彻底颠覆了主力舰发展的方向。她们统一口径且在统一火控观瞄指挥下的主炮组，能在更远距离发挥前所未有的威力。蒸汽轮机的应用更是使非接触作战成为可能。无畏舰革命让所有前无畏舰都被扫进了时代的垃圾桶，她们是新时代主力舰的唯一标准，是维护海洋霸权，统御四海波涛的唯一强权。新一轮海军革命已然打响，强国不想落后于人，则必要加入这场竞赛。"
 battleship_3_desc: "顾名思义，超无畏舰便是更大，更快，更强的无畏舰。超无畏舰的家族谱系庞杂，从真正意义上的“战列巡洋舰”到“战列舰”，“快速战列舰”，都是超无畏舰的组成部分。但无论名词释义有何不同，重油锅炉在她们身上的普及使长程维护海权成为可能，口径大于13.5英寸的重型火炮赋予了他们无与伦比的破坏力，她们将凭绝技寻求舰队决战，或打破封锁，或巡弋海外维护制海，她们是海权体系绝对的主力舰。"
 battleship_4_desc: "高效蒸汽轮机的普及让主力舰平衡航速，航程，火力与防护成为可能，新一代的战列舰实现了对她们前辈的完全超越。她们既是这个时代海洋上最迅疾的剪影，又拥有这个时代海洋上最锐利的矛与最坚固的盾。主力舰的高速化发展使她们拥有了无与伦比的综合性和主动性。她们是制大海理论最完美的践行者，是一支蓝水海军必不可少的中流砥柱。"
 ship_hull_heavy_1_desc: "在无畏舰的曙光出现之前，前无畏舰们便是前无畏时代最后辉煌的黄昏。她们最大的特征便是拥有火控观瞄系统互不统一的一级、二级主炮，前者是射速缓慢，用于主力舰对抗的主炮；后者则一般是大口径速射炮，用于压制辅助舰艇兼以打击主力舰的非主防护区。两种主炮的运作往往互相干扰，造成火控混乱而导致作战范围和效能的双重低下。属于双头的安菲斯比纳的时代已经结束，无畏舰时代再不会有她们的位置。"
