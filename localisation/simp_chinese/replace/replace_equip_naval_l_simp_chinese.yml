 carrier_1: "早期航空母舰船体"
 carrier_2: "战后航空母舰船体"
 carrier_3: "航空母舰 III型"
 carrier_4: "航空母舰 IV型"
 carrier_5: "航空母舰 V型"
 carrier_6: "航空母舰 VI型"
 carrier_1_desc: "当第一架舰载机摇摇晃晃的从伯明翰号上起飞时，人类追逐天空的梦想就此进军海上。最早期的航空母舰往往是由小型军用甚至民用船只改造而成，即使是专为航空作业而设计的直通甲板船体也难以承担过重的航空器起降任务。她们在舰队中主要担任的任务是远距离侦察，以及通过小当量航弹和航空鱼雷进行骚扰打击。"
 carrier_2_desc: "随着专业化大型化的航空母舰船体在大战后的建造，拥有穿甲能力的大当量航弹和更有效的航空鱼雷使航空母舰真正拥有了对主力舰的威胁，上百千米的作战半径更是令传统的大舰巨炮望尘莫及，但无法夜战与难以直接摧毁主力舰的表现让她们尚不能引领时代，真正成为唯一的海军主力舰。让时代滚滚向前吧，未来属于翱翔天际的海燕！"
 carrier_3_desc: "改进的建造方式以及诸如甲板边升降机这类的更加专业的系统使这些航空母舰可以更高效的携带更多飞机。"
 carrier_4_desc: "随着海军条约被越来越多的国家所无视，我们现在可以建造能携带前所未有的数量的飞机来确保制空权的航空母舰了。"
 ship_hull_carrier_1_desc: "很多军事理论家相信未来是属于海军航空兵的。老旧的主力舰以及邮船改装的航空母舰将是这些新理论的第一个试验场。"
 ship_hull_carrier_2_desc: "第一种专用航空母舰的设计工作开始了，我们必须确保这种航空母舰在不违反海军条约的前提下，有足够远的航程和足够快的速度来跟上舰队中其他的军舰。"
 ship_hull_carrier_3_desc: "改进的建造方式以及诸如甲板边升降机这类的更加专业的系统使这些航空母舰可以更高效的携带更多飞机。"
