 ship_hull_pre_dreadnought: "前无畏舰船体"
 ship_hull_pre_dreadnought_desc: "在无畏舰革命的曙光点亮崭新的时代前，前无畏舰们便是前无畏时代最后辉煌的黄昏。她们最大的特征便是拥有火控观瞄系统互不统一的一级、二级主炮，前者是射速缓慢，用于主力舰对抗的主炮；后者则步入速射炮时代，用于压制辅助舰艇兼以打击主力舰的非主防护区。但看似美好的两种主炮的运作往往互相干扰，造成火控混乱而导致作战范围和效能的双重低下。属于双头的安菲斯比纳的时代已经结束，无畏舰时代再不会有她们的位置。"
 armored_cruiser: "大型巡洋舰船体"
 armored_cruiser_desc: "随着军备竞赛陡然升级，一种采用现代船体，且排水量较大的巡洋舰应运而生-其主炮口径在十英寸或以上，可以轻易的撕碎任何轻中型舰船；极速相比装甲巡洋舰大为提升，不过装甲相对薄弱。这种巡洋舰被定义为可大量制造，并代替战巡与装巡进行破交任务的新型舰艇，但在海军竞赛如此激烈的今天，这种船只实在没什么突出优势，或许对于海军薄弱的国家是个不错的选择。"
 ship_hull_cruiser_coastal_defense_ship: "岸防舰"
 ship_hull_cruiser_coastal_defense_ship_desc: "对于真正的远洋作战来说，它太小了。这种相对便宜的船只为了重型武器和装甲而牺牲了航程。"
 ship_hull_torpedo_cruiser: "重雷装巡洋舰"
 ship_hull_torpedo_cruiser_desc: "以拆除一些主炮和防空炮为代价，搭载着大量鱼雷发射管的轻巡洋舰。"
 ship_hull_super_heavy_1: "超重型战舰船体"
 ship_hull_cruiser_submarine: "巡洋潜艇船体"
 ship_hull_cruiser_submarine_desc: "巡洋潜艇-这些水中巨物是军备竞赛中的可怕产物。她们配备了更多的人员，搭载着一般潜艇所不具备的中型火炮与水上飞机，且航程较远，但是可靠性欠佳。这种潜艇的隐蔽性并未大打折扣，她依然可以隐蔽地在黑暗中出击，且可以毁灭更多的船只。"
 ship_hull_midget_submarine: "袖珍潜艇"
 ship_hull_midget_submarine_desc: "由少量乘员操作的小型潜艇。高产量弥补了航程和武器装载量的不足。"
 ship_hull_fleet_submarine: "舰队潜艇"
 ship_hull_fleet_submarine_desc: "由于其长距离的作战范围，这些潜艇可以作为水面舰队的护航和支援力量。"
 ship_hull_nuclear_submarine: "核潜艇"
 ship_hull_nuclear_submarine_desc: "由于配备了核反应堆，我国的潜艇可以在水下长时间高速运行，成为我国武器库中极其致命的工具"
 ship_hull_mega_carrier: "冰航母"
 ship_hull_mega_carrier_desc: "一种巨型航空母舰，使用派克瑞特等实验性的冰复合材料建造船体，使得非舰载机也可以在甲板上起降，从而增加了我们海军航空兵的航程"
 screen_ship: "屏卫舰"
 capital_ship: "主力舰"
