l_simp_chinese:
  infantry_equipment:0"步兵装备"
  infantry_equipment_short:0"步兵装备"
  infantry_equipment_desc:0"个人和部队使用的步兵武器，以及士兵所需的其他装备。"
  infantry_equipment_0:0"00年一战班用武器"
  infantry_equipment_0_short:0"前栓动式步枪"
  infantry_equipment_0_desc:0"大战前的步枪普遍为转动式闭锁原理的栓动步枪，枪械结构基本上是19世纪80年代的产物，但子弹的装填方式以及弹仓结构各有不同。因此各国之间的步枪性能大致相同，同时火力较弱，但相对于前装枪和杠杆步枪来说，栓动式步枪的射击性能得到了极大提高。"
  infantry_equipment_1:0"大战末期半自动式步枪"
  infantry_equipment_1_short:0"大战末期半自动式步枪"
  infantry_equipment_1_desc:0"世界大战的进程极大刺激了半自动武器的发展，大战中的法、俄、德、英等国都纷纷推出了自己的半自动武器以希望于能够改变战局，在此期间半自动武器不断发展。至大战结束的1919年，已经出现了设计成熟的枪管短后座原理的半自动步枪，但尚未普遍装备。"
  infantry_equipment_2:0"初代全自动武器"
  infantry_equipment_2_short:0"初代全自动武器"
  infantry_equipment_2_desc:0"早在大战末期，一些国家就已经研发了自动步枪，这些枪械在战后的新一轮军备竞赛中不断改进。其主要采用枪管短后座原理，枪身延续了栓动步枪和半自动步枪的外形结构-且仍然采用和早期步枪通用的大型步枪弹。与此同时，冲锋枪开始被各国批量装备。"
  infantry_equipment_3:0"初代突击武器"
  infantry_equipment_3_short:0"初代突击武器"
  infantry_equipment_3_desc:0"采用导气式原理的自动步枪开始出现在了各国的军队中。他们的枪身与先前的早期自动步枪有了很大的不同，更加现代化。虽然绝大部分的自动步枪仍然装备着老式的步枪弹，但部分国家结合了曾经法国的8毫米子弹以及瑞士的新型子弹，推出了全新的小口径子弹以适应自动武器的行进间射击。"
  infantry_equipment_4:0"改进型突击武器"
  infantry_equipment_4_short:0"改进型突击武器"
  infantry_equipment_4_desc:0"采用小口径子弹的自动步枪开始装备部队，他们有了一个更为响亮的名称-突击步枪。现代的突击步枪能够极大的提高单兵火力，并且可以同时肩负步枪手、轻机枪手的任务。同时突击步枪相较于之前的早期自动步枪来说，射程更远，后坐力更小，同时枪械结构也更加紧凑，生产更为简易。"
  infantry_weapons2:0 "火药改进"
  infantry_weapons2_desc:0 "随着武器的不断发展以及大战的实践，各国对火药技术以及子弹炮弹技术都有了更多的改进要求。通过改进底火工艺以及火药的制作技术，使得弹药故障率得到降低；并且火药的燃烧效率更好，更加不易腐蚀枪管，方便维护，可以提高射程，以适用于自动武器的装备。"
  improved_infantry_weapons_2:0 "复进机构"
  improved_infantry_weapons_2_desc:0 "复进簧是实现枪械自动化的关键零件之一，1863年由美国人皮龙首先使用。在枪机后退时，复进簧吸收枪机的部分动能，被压缩，伸张时释放出来，作为枪机复进、供弹和闭锁的能源。复进簧有单根和多根的用法，单根簧还有单股和多股钢丝扭制之分。多根较小刚度的弹簧并联使用，可得到刚度较大的复进簧；使用多股簧做复进簧，可提高使用寿命。"
  improved_infantry_weapons_3:0 "枪托改进"
  improved_infantry_weapons_3_desc:0 "枪托进行了改进，能够做到伸缩与折叠，方便士兵将枪托调整到最适握持和射击状态，进一步提升了枪械的战斗便捷性。不仅如此，这款步枪上还设计了可调节式贴腮斜面，士兵能够自主调节脸颊接触枪托的高度，使得眼睛时刻保持在最佳瞄准位置。"
  improved_infantry_weapons_4:0 "快慢机"
  improved_infantry_weapons_4_desc:0 "快慢机是全自动武器上用来切换全自动射击、半自动射击的一个机构。士兵可以通过切换快慢机来调整射击效率，以做到更精准的杀伤敌人。"
  infantry_weapons3:0 "锥形刺刀"
  infantry_weapons3_desc:0 "锥形刺刀大多为三棱刺刀或四棱刺刀。三棱刺刀截面为三角形，四棱刺刀截面为十字形。刃与刃之间都开有与血槽，便于刺刀的刺与收，并减轻重量，能够对敌人造成极大的伤害。"


  machine_equipment_1:0 "水冷式机枪"
  machine_equipment_1_desc:0 "枪管在短时间内射击大量子弹后，会因为自身的高热降低机械强度，甚至发生变形。为了延长射击时间和精度，枪械设计者们在枪管的外围做了一个大水桶用作对枪管起到降温作用，极大延长了枪管的使用寿命。"

  machine_equipment_weapons1:0 "改进套管"
  machine_equipment_weapons1_desc:0 "气冷式是在水冷式机枪上的变形，通过散热片进行枪管的散热。同时将机枪的重量减少至20公斤，在一些缺乏水资源的地区，气冷式机枪无疑是最好的选择。"

  machine_equipment_weapons3:0 "轻量化"
  machine_equipment_weapons3_desc:0 "在原先气冷式机枪的基础上改进了机枪的重量，使得机枪的重量更加轻便，可以加装在车辆及飞行器上。"

  machine_equipment_weapons4:0 "机枪瞄具"
  machine_equipment_weapons4_desc:0 "加装在机枪上的机枪瞄具，让枪手可以远距离压制或打击目标。"
  
  machine_equipment_weapons5:0 "三角支架"
  machine_equipment_weapons5_desc:0 "三角支架上加装了方向轴，机枪拥有了更加宽阔的射击视线。"

 machine_equipment_2:0 "气冷式机枪"
 machine_equipment_2_desc:0 "气冷式是在水冷式机枪上的变形，通过散热片进行枪管的散热。同时将机枪的重量减少至20公斤，在一些缺乏水资源的地区，气冷式机枪无疑是最好的选择。"
  machine_equipment_3:0 "通用机枪"
  machine_equipment_3_desc:0 "通用机枪，又称轻重两用机枪，是一种是可由单人携带、气冷设计、弹链供弹、可快速更换枪管、附有两脚架亦可装在三脚架上或车辆上的中型机枪。它既具有重机枪射程远、威力大，连续射击时间长的的优势，又兼备轻机枪携带方便、使用灵活，紧随步兵实施行进间火力支援的优点的一种机枪。"

  Infantry_uniforms:0 "基础制服"
  Infantry_uniforms_desc:0 "基础制服是军队日常穿着的标准服装，通常包括上衣、裤子和帽子，设计简洁实用，颜色多为军绿色或米色，便于隐蔽。材质耐磨，适合日常训练和任务。"
  Infantry_uniforms2:0 "夏季制服"
  Infantry_uniforms2_desc:0 "夏季制服注重透气性和舒适性，采用轻薄、吸汗的面料，如棉或混纺材料，颜色较浅以反射阳光，帮助士兵在高温下保持凉爽。"
  Infantry_uniforms3:0 "冬季制服"
  Infantry_uniforms3_desc:0 "冬季制服强调保暖，使用厚实、防风防水的材料，如羊毛或棉，通常配备保暖内衬、手套和帽子，颜色较深以吸收阳光，帮助士兵在寒冷环境中保持体温。"
  Infantry_uniforms4:0 "迷彩制服"
  Infantry_uniforms4_desc:0 "迷彩制服灵感源自18世纪的英国一位名叫吉利的猎户，他发明了一款极易伪装的制服，被人们称为吉利服。正是在吉利服的基础上，迷彩通过保留吉利服的元素启到了一定的伪装作用。"




    support_weapons:0 "00年一战班用武器"
    support_weapons_desc:0 "大战之前的步兵武器仍然以老式栓动步枪为主。但随着军事工业的不断进步，在1908年已经出现了枪榴弹，为步兵提供了便捷的火力支援，并且重机枪开始广泛装备部队，研发轻机枪的事宜也在各国的军备竞赛之间如火如荼的展开。"
    support_weapons2:0 "20年战后班用武器"
    support_weapons2_desc:0 "经过大战的洗礼，各国的步兵装备已经发生了巨大的改变。半自动步枪逐渐进入到军队当中，轻机枪开始大量装备-且人们对重机枪提出了更多改进要求，促使了重机枪向轻量化发展；步兵的个人装备套件增多，确保士兵更好地在战场上保持作战能力。迫击炮的大量装备也增加了班组重火力。"
    support_weapons3:0 "25年改进型班用武器"
    support_weapons3_desc:0 "单兵装备在这一时期得到了质的飞跃。包括不限于改进手榴弹、新式军服、个人医用装备以及一系列作战装备的改进，极大地提高了士兵的生存能力。同时轻机枪的大量普及使得军队班组火力得到极大提高。栓动步枪与半自动步枪都得到了或多或少的改良。"
    support_weapons4:0 "27年先进班用武器"
    support_weapons4_desc:0 "自动武器的浪潮开始席卷世界各国。如今的班组部队已经能够装备了大量的半自动步枪与轻机枪。老式重机枪甚至已经退出了一部分国家的舞台-取而代之的是新型的轻量化机枪。同时自动步枪的研制开始在各国的军备竞赛之间提上日程。"
    support_weapons5:0 "30年现代班用武器"
    support_weapons5_desc:0 "现代通讯设备改变了原有的作战格局。现在各国的士兵可以依靠手中的无线电台进行沟通，这极大提高了作战效率。早期迷彩服的出现提高了士兵的生存能力，自动步枪开始列装部队，极大提高了单兵火力。同时为了适应现代战争，班组内的人员配置逐渐专业化，分工明确。"
     infantry_at:0 "集束手榴弹"
     infantry_at_desc:0 "集束手榴弹是反坦克的一种手段，但其效率是很低的。集束手榴弹属于集团装药，爆炸能量是向四周扩散的，所以需要用很大的炸药量，实际破坏效果却不高，而且必须针对动力舱盖、炮塔和车体之间缝隙、履带等薄弱部位进行爆破才有可能让坦克失去战斗力。"
     infantry_at2:0 "K弹与反坦克火药"
     infantry_at2_desc:0 "所谓K弹，为穿甲弹。这种炮弹于工业革命时期已经出现于舰炮上，步兵所使用的的小型穿甲弹于大战末期出现，通常装备在重机枪以及反坦克步枪上。同时，为了应对坦克这类新型军用载具的出现，拥有更高燃烧效率以及更强推进力的反坦克火药出现，但通常装备在炮弹上。"
     infantry_at3:0 "反装甲器材"
     infantry_at3_desc:0 "反坦克步枪，射击装甲目标的专用枪械。也称战防枪。用于装备步兵，打击远距离的坦克和装甲车辆，也可用于射击远距离的土木工事和火力点。"
     infantry_at4:0 "单兵反坦克手雷"
     infantry_at4_desc:0 "反坦克手榴弹是集束手榴弹的一种改进，比原先的集束手榴弹装药量大，爆炸威力大，不仅能摧毁轻型载具，也可以瘫痪坦克等车辆，其装药量能够炸毁一个地堡或者杀伤一个排的敌军。"
     tech_trucks:0 "军用运输卡车"

     horses:0"马匹"
     horses_desc:0"马匹作为文明出现后不久的第一种载具动力，陪伴了人类4000年的历程，出现骑兵种类数不胜数，创造了辉煌的历史。虽然历经世界大战，但马匹在现代化的浪潮中依旧屹立不倒，他仍是各国部队在战场上的最为重要的载具与运输工具；同时，部分国家仍然保留相当数量的骑兵部队。"
     Modification_of_civilian_vehicles:0"改装民用运输载具"
     Modification_of_civilian_vehicles_desc:0"随着汽油发动机的不断发展，早期汽车的动力与稳定性得到了提高；大战前，已经能够快速生产的汽车开始大量出现在人们的视野中。同时在大战时期，军队开始大量采购民间的运输车，改造成可以运送士兵的军用车辆，大战后，这一行为已经成为了各国军队的惯例。"
     Field_motorcycles_with_cars:0"野战摩托与汽车"
     Field_motorcycles_with_cars_desc:0"小型汽油发动机、小型蒸汽发动机与悬挂系统的不断改进，使得摩托车这一交通工具的性能得到了飞跃式的进步。在大战期间就大量采购的军用摩托车，在战后得到了改进，使其更加适用于野外运输以及侦查活动。发动机的进步与悬挂系统、底盘、车辆布局、制造流程的改进同样惠及了汽车，使得现在的各类车辆都拥有比较良好的性能。"
     Multi_person_armed_armored_vehicle:0"多人武装装甲车"
     Multi_person_armed_armored_vehicle_desc:0"军事战略的发展和汽车技术的发展，使得装甲车这一武器拥有了更大的改造空间。各国根据在大战的经验设计了多种可运载武装人员的装甲车。这种装甲车与军用卡车不同，其设计的主要目的是通过多个承载人员的操作发挥装甲车的最大功效，所以其可承载人员相对较少，但是防御力相比卡车以及早期装甲车更强，越野能力与操作灵活性更好，武器搭配更加多样化。同时这些多人装甲车的外形普遍不再以汽车为标准，更趋向于坦克。"
     motorized_equipment_desc:0"随着汽油发动机的不断发展，早期汽车的动力与稳定性得到了提高；大战前，已经能够快速生产的汽车开始大量出现在人们的视野中。同时在大战时期，军队开始大量采购民间的运输车，改造成可以运送士兵的军用车辆，大战后，这一行为已经成为了各国军队的惯例。"
     armored_vehicles:0"装甲车"
     armored_vehicles_desc:0"大战期间，各国才开始真正重视起装甲车在现代战场的作用。大战期间诞生和改进的装甲车普遍以中型越野车为原型，将原有的车辆底盘保留的前提下，重新改变车辆布局并且安装装甲板，同时在车辆侧面或者车顶安装武器位，以供装甲车有足够的火力穿越火线和战壕。但是其越野能力依然较弱，且绝大部分装甲无法抵御大口径武器的侵袭。"
     armored_vehicles_2:0"野战摩托与汽车"
     armored_vehicles_2_desc:0"小型汽油发动机、小型蒸汽发动机与悬挂系统的不断改进，使得摩托车这一交通工具的性能得到了飞跃式的进步。在大战期间就大量采购的军用摩托车，在战后得到了改进，使其更加适用于野外运输以及侦查活动。发动机的进步与悬挂系统、底盘、车辆布局、制造流程的改进同样惠及了汽车，使得现在的各类车辆都拥有比较良好的性能。"
     Military_transport_trucks:0"军用运输卡车"
     Military_transport_trucks_desc:0"随着军事运输需求的不断提高，专用的军用卡车研发开始提上日程。军用卡车的性能一般好于普通的运输卡车，同时油箱更大；由于受到军事化改装，车辆一般可以安装武器以供车辆人员防御亦或战场巡逻。军用卡车一般以人员运输为主要任务，通常可运载十几人到二十人，极大提高了部队的运输效率以及移动速度。"
     Armored_transporters:0"装甲运输车"
     Armored_transporters_desc:0"军用卡车的不断改进，使得装甲运输车这一新型军事运输工具最终成型。装甲运输车的雏形早在大战期间就已出现，但并不完善。如今的装甲运输车在原有军用卡车的基础上进一步改进了发动机以及悬挂系统、轮胎等，以更好的适用于装甲改装和前线运输。装甲运输车的载人数虽然相较于军用卡车的少，但是其车载火力更强，可供安装的武器更多，且车身覆盖了一定装甲，可以在一定程度上充当进攻与运输兼备的前线战车。提高了车辆在前线的生存率。"
     Mobile_artillery_armored_vehicles:0"机动火炮装甲车"
     Mobile_artillery_armored_vehicles_desc:0"随着车辆悬挂系统的断改进，如今装甲车的空间设计与火力搭配有了更多的选择。装备有中小口径火炮的装甲车开始出现在了军队中。这种装甲车相较于多人装甲车的乘员更少，人员活动空间变小，但速度更快。其普遍装备的快速旋转炮塔可供搭载大口径机枪或者轻型火炮，如果将车辆顶部装甲进一步减弱，还可以安装中型火炮。这种装甲车能为前线提供有效的支援，且具有比坦克更强的灵活性。"
     Anti_tank_armored_vehicles:0"反坦克装甲车"
     Anti_tank_armored_vehicles_desc:0"坦克的发展，使各国对拥有良好反坦克性能的载具的需求不断提高。搭配上最新的载具以及武器技术，反坦克装甲车应运而生。这种装甲车的武器普遍以小型火炮为主，但火炮射速较快，且普遍装备K型（穿甲）弹，主要用于打击坦克以及敌人的防御设施。同时设计的不断优化，使得该型装甲车的综合驾驶性能得到了质的飞跃，防护水平进一步提升，几乎摆脱了与汽车相似的设计格局，底盘可以安装大型橡胶轮胎或者履带等滚动制品。"

     motorized_equipment_1:0"野战摩托与汽车"
     armored_vehicles_1:0"多人武装装甲车"
     armored_vehicles_2:0"机动火炮装甲车"
     armored_vehicles_3:0"反坦克装甲车"
     motorized_equipment_2:0"军用运输卡车"
     motorized_equipment_3:0"装甲运输车"
     motorized_equipment_1_desc:0"小型汽油发动机、小型蒸汽发动机与悬挂系统的不断改进，使得摩托车这一交通工具的性能得到了飞跃式的进步。在大战期间就大量采购的军用摩托车，在战后得到了改进，使其更加适用于野外运输以及侦查活动。发动机的进步与悬挂系统、底盘、车辆布局、制造流程的改进同样惠及了汽车，使得现在的各类车辆都拥有比较良好的性能。"
     armored_vehicles_1_desc:0"军事战略的发展和汽车技术的发展，使得装甲车这一武器拥有了更大的改造空间。各国根据在大战的经验设计了多种可运载武装人员的装甲车。这种装甲车与军用卡车不同，其设计的主要目的是通过多个承载人员的操作发挥装甲车的最大功效，所以其可承载人员相对较少，但是防御力相比卡车以及早期装甲车更强，越野能力与操作灵活性更好，武器搭配更加多样化。同时这些多人装甲车的外形普遍不再以汽车为标准，更趋向于坦克。"
     armored_vehicles_2_desc:0"随着车辆悬挂系统的断改进，如今装甲车的空间设计与火力搭配有了更多的选择。装备有中小口径火炮的装甲车开始出现在了军队中。这种装甲车相较于多人装甲车的乘员更少，人员活动空间变小，但速度更快。其普遍装备的快速旋转炮塔可供搭载大口径机枪或者轻型火炮，如果将车辆顶部装甲进一步减弱，还可以安装中型火炮。这种装甲车能为前线提供有效的支援，且具有比坦克更强的灵活性。"
     armored_vehicles_3_desc:0"坦克的发展，使各国对拥有良好反坦克性能的载具的需求不断提高。搭配上最新的载具以及武器技术，反坦克装甲车应运而生。这种装甲车的武器普遍以小型火炮为主，但火炮射速较快，且普遍装备K型（穿甲）弹，主要用于打击坦克以及敌人的防御设施。同时设计的不断优化，使得该型装甲车的综合驾驶性能得到了质的飞跃，防护水平进一步提升，几乎摆脱了与汽车相似的设计格局，底盘可以安装大型橡胶轮胎或者履带等滚动制品。"
     motorized_equipment_2_desc:0"随着军事运输需求的不断提高，专用的军用卡车研发开始提上日程。军用卡车的性能一般好于普通的运输卡车，同时油箱更大；由于受到军事化改装，车辆一般可以安装武器以供车辆人员防御亦或战场巡逻。军用卡车一般以人员运输为主要任务，通常可运载十几人到二十人，极大提高了部队的运输效率以及移动速度。"
     motorized_equipment_3_desc:0"军用卡车的不断改进，使得装甲运输车这一新型军事运输工具最终成型。装甲运输车的雏形早在大战期间就已出现，但并不完善。如今的装甲运输车在原有军用卡车的基础上进一步改进了发动机以及悬挂系统、轮胎等，以更好的适用于装甲改装和前线运输。装甲运输车的载人数虽然相较于军用卡车的少，但是其车载火力更强，可供安装的武器更多，且车身覆盖了一定装甲，可以在一定程度上充当进攻与运输兼备的前线战车。提高了车辆在前线的生存率。"


     Stormtroopers:0"突击队 Ⅰ"
     Stormtroopers2:0"突击队 Ⅱ"
     Stormtroopers3:0"突击队 Ⅲ"
     Stormtroopers_desc:0"突击队作为所有部队中的先锋，其使用历史源远流长。世界大战时期，德国军队将敢死队战术与其工兵技术结合起来，创造出了风暴突击队-这种突击队以其迅猛的进攻和精湛的野战工程技术而闻名于世界，同时他们还可以肩负侦察与渗透的任务。"
     Stormtroopers2_desc:0"世界大战后，参战各国总结了战争期间创造的特种突击战术以及应用，发展出了形态各异的突击队。但无一例外，所有突击队战术的发展重点，都放在了增强突击队单兵火力与前线渗透战术上，力求发挥作战中个人最大的战斗力。"
     Stormtroopers3_desc:0"随着战后科技的加持，突击队战术越来越强调个人的作用，每一位突击队成员都将获得军中最好且最适合自己的装备，尽其所能在作战中发挥个人特长，大量先进的装备也将会在突击队员上测试。此时的突击队几乎无所不能，但唯一的缺点是培养成本史无前例的提升。"

     Free_sniper:0"自由狙击手 Ⅰ"
     Free_sniper2:0"狙击小组 Ⅱ"
     Free_sniper3:0"狙击小组 Ⅲ"
     Free_sniper_desc:0"古老的猎兵战术曾在全球各地流行-猎兵们使用便于精确射击的步枪，采取分散作战的方式活跃于各个战场上，专注于渗透与击杀敌方重要人员。世界大战期间，各国军队将阵地狙击手与猎兵战术结合，创造出了自由狙击手战术。狙击手将不再局限于防守某一阵地，而是在阵地中，轮流移动作战，各国军队甚至成立了专门的自由狙击手组织，他们是战场上最为恐怖的猎手。"
     Free_sniper2_desc:0"大战过后，各国军队都意识到了军队缺乏专业狙击手的问题，于是，各国军队将善于精确射击的士兵集合起来，组建起数量庞大的狙击小组。狙击小组一般在某一区域集体行动，主要对敌方进行冷枪作战以及中远距离侦察。他们不再是临时组建的队伍，并且会为军队源源不断的贡献神枪手。"
     Free_sniper3_desc:0"随着技术的发展，狙击小组的个人通讯能力与单兵生存得到了极大提升，其作战方式不再依附于大部队前进。他们可以直接向敌方隐秘出击，从不同方位对敌方进行侦察，冷枪打击。枪械与瞄准器具工艺的进步也使培养狙击手的成本相对降低，使得中小国家也能运用这种特种部队。"

     Modern_electronics:0"现代电学，电磁学"
     Modern_electronics_desc:0"20世纪初，电学和电磁学取得了显著进展，电学与电磁学理论和实验进展为现代电子技术和通信系统的发展铺平了道路。"
     Modern_electronics2:0"1920真空二极管"
     Modern_electronics2_desc:0"真空二极管是一种早期的电子器件，具有两个电极：阳极和阴极，内部为真空环境。其主要功能是允许电流单向流动。其能将交流电转换为直流电，在无线电中用于信号解调，为后续电子器件的发展提供了基础。"
     Modern_electronics3:0"固定式大型电子管无线电"
     Modern_electronics3_desc:0"固定式大型电子管无线电是20世纪广泛使用的无线电通信设备，依赖电子管进行信号处理和放大，主要用于广播、通信和军事领域。"
     Modern_electronics4:0"改进型无线电调制"
     Modern_electronics4_desc:0"改进型无线电调制通过优化传统调制技术，提升了信号传输的效率、可靠性和频谱利用率，广泛应用于现代通信系统。"
     Modern_electronics5:0"短波大功率电子管发射器"
     Modern_electronics5_desc:0"短波大功率电子管发射器是一种用于短波频段（3-30 MHz）的高功率无线电发射设备，广泛应用于广播、通信和军事领域。其核心部件是大功率电子管，能够产生和放大高频信号，在远距离通信和广播中发挥着重要作用。"
     Modern_electronics6:0"便携式无线电"
     Modern_electronics6_desc:0"便携式无线电是一种轻便、易于携带的无线通信设备，广泛应用于个人通信、应急通信、户外活动和军事行动等领域。其设计紧凑、操作简单，能够在移动中提供可靠的通信能力。"

     Classic_optics:0"二十世纪经典光学"
     Classic_optics2:0"改进型远望式瞄准具"
     Infantry_sights:0"改进型十字瞄准具"
     Infantry_sights2:0"精准型十字瞄准具"
     Classic_optics_desc:0"20世纪是光学领域取得重大进展的时期，光子概念的提出与现代光学仪器的发展推动了光学技术进步。"
     Classic_optics2_desc:0"大战前，德国等国家对早期望远瞄准具进行了改进，提高了光学性能和耐用性；大战中，狙击战术兴起，望远瞄准具成为狙击手的标配，帮助他们在远距离精确射击。"
     Infantry_sights_desc:0"十字瞄准具的核心是带有十字线的分划板，帮助射手更精确地瞄准目标；其广泛应用于狙击步枪、机枪和火炮，提升了射击精度。"
     Infantry_sights2_desc:0"光学技术的进步，使瞄准具的清晰度和耐用性显著提升；部分瞄准具增加了照明功能，便于在低光环境下使用。"

     Artillery_observation_technology:0"现代炮兵观测技术"
     Artillery_observation_technology2:0"改进型炮兵校对具"
     Artillery_observation_technology_desc:0"现代炮兵使用高倍率望远镜和潜望镜观察目标，评估炮击效果。使用光学测距仪测量目标距离，帮助计算射击参数。在通信设备不足时，使用信号弹和旗语进行通信。"
     Artillery_observation_technology2_desc:0"炮兵观测员使用气象气球收集气象数据，如风速、风向和气压，帮助修正射击参数。航空观测员使用航空摄影技术获取敌方阵地的高清图像，帮助制定炮击计划；通过侦察机观察敌方阵地，提供目标信息和炮击效果评估。"


     Hot_air_balloon:0 "热气球"
     Hot_air_balloon_reconnaissance:0 "军用气球"
     airship:0 "军用飞艇"
     Hot_air_balloon_desc:0 "19世纪，热气球主要用于科学实验和探险，帮助科学家研究大气层和气象现象。20世纪后，随着技术的进步，热气球逐渐应用于体育、旅游和广告等领域。现代热气球采用更轻便、耐用的材料，飞行安全性和操控性显著提升。"
     Hot_air_balloon_reconnaissance_desc:0 "军用热气球的发展始于19世纪，最初用于军事侦察和通信。热气球被用作高空观测平台，帮助军队侦察敌方阵地和部署。"
     airship_desc:0 "军用飞艇的发展始于19世纪末至20世纪初，早期主要用于侦察和监视。大战期间，飞艇成为重要的军事工具，德国齐柏林飞艇被用于远程轰炸和海上巡逻，展示了其长航时和大载重优势。"
     
     Improved_locomotive_technology:0"改进动力技术 Ⅰ"
     Improved_locomotive_technology_desc:0"改进动力技术 Ⅰ"
     Improved_locomotive_technology2:0"改进动力技术 Ⅱ"
     Improved_locomotive_technology2_desc:0"改进动力技术 Ⅱ"
     Improved_locomotive_technology3:0"改进动力技术 Ⅲ"
     Improved_locomotive_technology3_desc:0"改进动力技术 Ⅲ"
     Specialized_supply_classes:0"补给链 Ⅰ"
     Specialized_supply_classes_desc:0"补给链 Ⅰ"
     Specialized_supply_classes2:0"补给链 Ⅱ"
     Specialized_supply_classes2_desc:0"补给链 Ⅱ"
     Specialized_supply_classes3:0"补给链 Ⅲ"
     Specialized_supply_classes3_desc:0"补给链 Ⅲ"
     
     tech_paijipao1:0"迫击炮 Ⅰ"
     tech_paijipao1_desc:0"15世纪，最早的迫击炮雏形出现在欧洲，主要用于攻城战。这些早期武器通过高角度发射炮弹，攻击城墙后的目标。20世纪初，现代迫击炮在日俄战争中首次亮相。俄军使用的“利霍宁迫击炮”被认为是现代迫击炮的前身。大战中，各国开始制造不同形态的迫击炮"
     tech_paijipao2:0"迫击炮 Ⅱ"
     tech_paijipao2_desc:0"大战中，迫击炮成为步兵的重要支援武器，其被各国广泛使用。英军的“斯托克斯迫击炮”成为现代迫击炮的模板，具备轻便、高射角和曲射弹道的特点。"
     tech_paijipao3:0"迫击炮 Ⅲ"
     tech_paijipao3_desc:0"大战后，迫击炮成为步兵不可或缺的支援武器，广泛用于各种战斗环境。通过采用新材料，减轻重量，新型迫击炮更便于携带和快速部署。部分迫击炮配备特种弹药；高爆反坦克弹药用于对抗轻型装甲目标；烟雾弹和照明弹则用于掩护和夜间作战。"
     tech_paijipao4:0"迫击炮 Ⅳ"
     tech_paijipao4_desc:0"通过改进弹药和炮管设计，迫击炮射程显著增加。无线电通讯设备和观瞄技术的进步使迫击炮在火力反应速度、射击精度和多任务能力上都有显著提高，增强了作战效能。"


     iw_small_airframe:0"航空原型飞行器"
     basic_small_airframe:0"1922年航空驱逐机"
     improved_small_airframe:0"1926年战斗机"
     advanced_small_airframe:0"1930年战斗机"
     iw_medium_airframe:0"1919年轻型轰炸机"
     basic_medium_airframe:0"1923年轻型轰炸机"
     improved_medium_airframe:0"1927年俯冲轰炸机"
     advanced_medium_airframe:0"1930年俯冲轰炸机"
     iw_large_airframe:0"1918年远程轰炸机"
     basic_large_airframe:0"1923年远程轰炸机"
     improved_large_airframe:0"1926年战术轰炸机"
     advanced_large_airframe:0"1930年战略轰炸机"


     Gas_Preparation:0"毒气弹制备"
     Gas_Preparation_desc:0"毒气弹是一种使用化学毒剂作为杀伤手段的武器，主要通过释放有毒气体对人员、动物或环境造成伤害。"
     Gas_Preparation1:0"窒息性毒剂"
     Gas_Preparation1_desc:0"窒息性毒剂是一类主要通过干扰呼吸系统功能，导致受害者缺氧甚至死亡的化学毒剂。这类毒剂通常通过吸入进入人体，对肺部和其他呼吸器官造成严重损害。"
     Gas_Preparation2:0"糜烂性毒剂"
     Gas_Preparation2_desc:0"糜烂性毒剂是一类通过接触皮肤、眼睛或呼吸道引起严重化学烧伤和组织损伤的化学毒剂。这类毒剂不仅对接触部位造成直接伤害，还可能通过吸收进入血液循环，影响全身器官"
     Gas_Preparation3:0"中毒性毒剂"
     Gas_Preparation3_desc:0"中毒性毒剂是一类通过干扰人体生理功能，导致中毒甚至死亡的化学物质。这类毒剂可以通过吸入、皮肤接触或食入进入人体，对神经系统、呼吸系统、循环系统等造成严重损害。"
     Gas_Preparation4:0"失能性毒剂"
     Gas_Preparation4_desc:0"失能性毒剂是一类旨在使人暂时丧失行动能力或战斗力的化学物质，通常不会致命，主要用于军事、执法或控制骚乱等场景。其通过影响中枢神经系统或身体机能，使人暂时失去行动能力或意识，但通常不会造成永久伤害或死亡。"
     Gas_Preparation5:0"神经性毒剂"
     Gas_Preparation5_desc:0"神经性毒剂是一类剧毒的化学物质，通过干扰神经系统的正常功能，通过抑制神经系统中的关键酶，破坏神经信号传递，导致肌肉失控、呼吸衰竭，最终死亡。"
     Gas_Preparation6:0"植物杀伤剂"
     Gas_Preparation6_desc:0"植物杀伤剂是能使植物枝叶凋落、不育乃至枯死的化学药剂；对人、畜有一定的毒性。军事上可用于农业与生态袭击，能够极大破坏敌国的生态环境，引发敌国的生态灾难甚至饥荒。"
     Gas_mask:0"防毒面具研究I"
     Gas_mask_desc:0"19世纪中期，防毒面具的雏形出现。大战中，为应对毒气战，防毒面具设计进一步改进，增加了对多种化学毒剂的防护；同时其形态与制作工艺也逐渐规范。"
     Gas_mask1:0"防毒面具研究II"
     Gas_mask1_desc:0"现代防毒面具采用轻便耐用的材料，过滤系统更加高效。其不仅防毒，还具备防尘、防烟雾等功能，广泛应用于工业、消防等领域。"


