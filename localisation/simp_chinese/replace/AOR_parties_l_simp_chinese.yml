 #无政府主义子意识形态#
 anarchism:0 "安那其主义"
 anarchism_desc:0 "无政府主义包含了众多哲学体系和社会运动实践。它的基本立场是反对包括政府在内的一切统治和权威，提倡个体之间的自助关系，关注个体的自由和平等；其政治诉求是消除政府以及社会上或经济上的任何独裁统治关系。对大多数无政府主义者而言，“无政府”一词并不代表混乱、虚无、或道德沦丧的状态，而是一种由自由的个体自愿结合，以建立互助、自治、反独裁主义的和谐社会。"
 syndicalism:0 "革命工团主义"
 syndicalism_desc:0 "革命工团主义思潮兴起于20世纪初期，其追随者主张由工会或工人委员会领导国家，并由委员会直接将剥削制度下的生产资料私有制转变为直接可供工人组织使用的生产资料公有制。革命工团主义者们反对政党以及先锋队政治，他们将总罢工视为最有力的革命武器。革命工团主义者们力图在旧世界中建立新的制度，呼吁不分国籍、种族和性别的工人大联合，建立起一个以工人自治为基础的新社会。"
 new_syn:0"新大陆工团主义"
 new_syn_desc:0"新大陆工团主义是革命工团主义的一种独特衍生形态。大批自西班牙，法国，意大利移民来到美洲的工人们将工团主义传播开来，并将其理论与美洲独特的社会结构相适应，最终形成了这一特殊的思潮。支持者们通常在革命工团主义之上更进一步，通常呼吁直接行动，打倒政府，粉碎宗教特权，最终力图实现一个平等且自由的工人社会。"
 new_ten:0"温和新大陆工团主义"
 new_ten_desc:0"温和新大陆工团主义者努力在新大陆工团这种本土化特色主义与原教旨的工团主义之间寻求平衡，力求做到调和折衷，并尝试与共产主义者们保持正常的外交关系，给予工人之外的从业者一定权力。"
 new_ref:0"改革新大陆工团主义"
 new_ref_desc:0"改革新大陆工团主义者在新大陆工团主义之上着手进行改革以适应地区国情，吸纳委员会共产主义的部分理论，使总工会逐渐演变为一个专职的中央工会来领导地区工会。并同时领导农民委员会，科学院工会，艺术协会等多种异于传统意义的工会组织。为实现平等而不断斗争。"
 
 
 #革命社子意识#
 revolutionism:0 "革命马克思主义"
 revolutionism_desc:0 "革命社会主义，是狭义的马克思主义的别称，指无产阶级通过暴力革命同资产阶级做不调和的斗争，建立无产阶级专政，最终建立共产主义社会，解放全人类的一套系统的思想。\n\n马克思和恩格斯在19世纪40年代创立了马克思主义的学说，揭示了资本主义生产方式的固有的矛盾和资本主义社会的特殊运动规律，证明了资本主义必然崩溃、共产主义必然胜利，指出无产阶级是资本主义制度的掘墓人和共产主义社会的创造者。为了建立共产主义社会，无产阶级必须通过暴力革命，粉碎资产阶级专政，建立无产阶级专政，并在向共产主义社会过渡的整个历史时期中巩固和加强无产阶级专政。为了建立和巩固无产阶级专政，必须有共产主义政党的领导。这一学说在后来不断的与各种机会主义思想的斗争中发展，最终形成现有的革命社会主义。革命社会主义者主张通过暴力革命建立无产阶级专政，不接受与资产阶级任何形式的阶级调和。他们的“革命”只有血和坚定的意志。"
 leninism:0 "马克思列宁主义"
 leninism_desc:0 "马克思列宁主义又称列宁主义、布尔什维主义。列宁等人把马克思主义同俄国革命的具体实践结合起来，发展了马克思主义，创立了马克思主义的帝国主义理论；发展了马克思、恩格斯关于无产阶级革命和无产阶级专政的理论，制定了关于建立新型无产阶级政党的学说。\n\n无产阶级专政是马克思列宁主义者的目标。列宁等人指出，无产阶级必须通过暴力革命，粉碎资产阶级专政，建立无产阶级专政，并在向共产主义社会过渡的整个历史时期中巩固和加强无产阶级专政。\n\n马克思列宁主义者与古典马克思主义最大的不同在于，列宁主义者在党派上坚持先锋队理论，认为无产阶级在当前社会条件下必须建立本阶级的代表党派以推动和保卫革命。为了建立和巩固无产阶级专政，必须有共产主义政党的统一领导，先锋队是其中一个形式也是最重要的成分，是无产阶级集中意志的体现。先锋队的成员不仅仅局限于之前社会层面广泛的无产阶级组织中，政党革命的主体主要是无产阶级中的少数革命家与理论家，但其坚持政党人员地位平等的民主集中制原则，而非资产阶级党派或社会主义运动中机会主义党派的精英政治。马克思列宁主义者认为，通过建立先锋队式的政党，有利于集中革命最大的力量，推动无产阶级革命的进行。\n\n马克思列宁主义者比古典马克思主义者更加执着于暴力革命，并逐渐尝试脱离议会斗争，转移到单一的武装斗争上，总的来说，马克思列宁主义的斗争是同资产阶级不做任何调和方法的斗争。"
 stalinism:0 "斯大林主义"
 stalinism_desc:0 "虽然斯大林一直以列宁的学生自居从未使用过这个名词，但斯大林上台后的一系列政策作为对马克思列宁主义在政治上的继承和发展，被卡冈诺维奇称为斯大林主义。斯大林主义重视快速工业化与集体化，以及一个强而有力的社会主义国家去肃清一切反革命分子。"
 trotskyism:0 "托洛茨基主义"
 trotskyism_desc:0 "托洛茨基主义是由托洛茨基提出的马克思主义理论，托洛茨基主义坚持独立的工人运动与阶级斗争理念，坚持工人阶级民主与无产阶级专政这两个实现社会主义的理论。支持苏联的民主权利，倡导工人民主和政治自由，反对与帝国主义势力进行损害国际工人阶级利益的政治交易，反对秘密外交，主张世界革命。"
 committee:0 "委员会共产主义"
 committee_desc:0 "委员会共产主义是工人阶级进行斗争和革命的理论，它认为工人委员会将是工人们用来对抗资本主义、推翻资本主义、建立和管理共产主义社会的手段。"
 luxemburgism:0 "卢森堡主义"
 luxemburgism_desc:0 "卢森堡主义是一种马克思共产主义、自由意志主义、反战、激进女权主义和极其进步的意识形态。它认为马克思主义提出的无产阶级专政应该由民主的工人委员会和工会管理，而不是社会党。此外，妇女权利对她至关重要。"
 PRCrevolutionism:0"中国革命思想(先锋队理论）"
 PRCrevolutionism_desc:0"最早接触到马克思主义的中国人是从俄国人身上知道的，大规模了解马克思主义也是由俄国人带来的。与其他国家不同，马克思主义在中国最早的大范围传播是在战场上，来自五湖四海和不同阶级的青年士兵被马克思主义的思想内核和美好的愿景感染，决心与马先生和恩先生为伴，作为解放中华民族和万千穷苦百姓的理论武器。。"
 REV_soc:0"革命社会民主主义"
 REV_soc_desc:0"革命社会民主主义一词，来源于俄国社会民主工党的前身-俄罗斯马克思研究小组中，针对一些激进主义的称呼。而这个词最终则被引用回马克思的故乡德国，并赋予了新的含义。\n\n原先的“革命社会民主主义”被视作广义上的激进社会主义派别-这些社会主义者中包含着原先德国社会主义阵线的马克思派、拉萨尔派与其他大大小小非马克思学说的激进社会主义，又包含着俄国的社会民主工党以及第二国际的左派组织。但是到20世纪的，尤其是第二国际右派掀起变革浪潮的如今，革命社会民主主义者，专指那些接受了马克思主义的指导或接受了马克思主义作为其思想的主体，认同马克思主义哲学，绝不放弃暴力革命，并将其视作革命胜利唯一途径的社会主义者。他们有区别于当今列宁的布尔什维主义，因此他们又有另外一个称呼“古典马克思主义”。\n\n但无论怎么称呼，革命社会民主主义最显著的一点在于坚持阶级斗争且不放弃暴力革命路线，反对阶级调和。如今从加利福尼亚的矿井到西伯利亚的原野，信奉革命社会民主主义的政治家以及群众们愈发增多，他们即将转换为社会主义者追求的世界革命不可或缺的一环。"
 Leftmilitarism:0"左翼先军主义"
 Leftmilitarism_desc:0"左翼先军主义者认为，若想实现社会主义社会，则在社会主义革命中必须将革命军队作为主体，其将革命军队视作革命组织中的最高形式和机构。通过革命军队，能有效的进行社会主义改造和镇压反革命，保护革命政权；军队的运行方式可以使得政令通畅，上下一心，可使地方更加服从党中央的命令，有利于社会主义建设。"
 
 #温和社子意识#
 councilism:0 "议会社会主义"
 councilism_desc:0 "马克思对“议会社会主义”的概括性描述一词来源于法语，该词本意是一个极为有趣的名称-“克汀病”，指一种先天性让人矮小痴呆的疾病。但在马克思的眼中，议会社会主义就是一部分小资产阶级所痴呆狂热般追求的目标。\n\n议会社会主义主要指社会主义思想体系中放弃暴力斗争而全面转向议会斗争，亦或是一开始就以议会斗争作为主要目的社会主义派别，其广泛涵盖的类别从第一国际成立之初的费边社到第二国际的伯恩斯坦主义以及考茨基主义，以及他们所影响或其他的右翼派别层出不穷。议会社会主义者宣传通过资产阶级代议制途径改造国家并进入社会主义的政治目的，他们共同的特点都在于或多或少的放弃了暴力革命、武装斗争的道路，并且极为崇拜资产阶级的国家机器，认为社会主义脱离资产阶级国家就无法正常进行斗争。议会社会主义者们大多在经济上没有明确的目标，更多偏向于改良主义的经济观点。\n\n议会社会主义者对社会主义进行修改的行径包括鼓吹阶级合作论，向资产阶级在政治上妥协，通过对党组织内部的改组使得党派政治倾向不断机会主义化、资产阶级化。这使得他们在激进革命者的眼中很快成为了受唾弃的对象。不过，一部分的议会社会主义者政党仍然给其他资产阶级政党造成了压力，在客观程度上为无产阶级争取到了一定的权利。"
 demsoc:0 "民主社会主义"
 demsoc_desc:0 "民主社会主义的形成源自于改良主义的发展和第二国际时期伯恩斯坦主义的流行，可以视作第二国际的右倾社会主义与改良主义流派的结合体。由于多数民主社会主义者公开反对马克思主义的特性，因此其在公共视野中被排除在了所谓的科学社会主义之外，并不与其他社会主义流派存在大量交流。\n\n民主社会主义者在政治上坚持所谓的“阶级联合”，鼓吹阶级合作，甚至否认阶级的存在与阶级斗争。认为可以通过工人阶级的“议会多数”实现工人掌握政权，在保留资产阶级多党制和议会制的前提实现无产阶级和资产阶级的共同专政。在经济上，民主社会主义者不认同消灭私有制，并宣传混合所有制经济，要求在农业和工业上建立合作制和私有制并行的所有制体制，并通过混合所有制经济体制逐步扩大资产国有化，建立国家经济。在社会上，民主社会主义者鼓励建立国家干预与市场经济并行的经济体制，建设社会保障制度与福利国家。\n\n民主社会主义的另外特点在于作为社会主义流派，民主社会主义理论却全盘接受了资产阶级式的人文观念，一般将资产阶级人文主义的道德观念作为自己的行动指南。同时民主社会主义者又完全“尊重”宗教原则，鼓吹党员宗教信仰自由。在现实的行动方面，民主社会主义又鼓吹实用主义，认同大部分资产阶级学术观，反对马克思的唯物史观。\n\n民主社会主义者的行径包括鼓吹阶级合作论，向资产阶级在政治上妥协，通过对党组织内部的改组使得党派政治倾向不断机会主义化、资产阶级化。这使得他们在激进革命者的眼中很快成为了受唾弃的对象。不过，一部分的民主社会主义者政党仍然给其他资产阶级政党造成了压力，在客观程度上为无产阶级争取到了一定的权利。"
 PRCcosmopolitanism:0"大同主义"
 PRCcosmopolitanism_desc:0""
 socialism_mid:0"社会民主主义（中派）"
 socialism_mid_desc:0 "社会民主主义思想源于第一国际期间，欧洲各国发生思想变动的马克思主义研究团体。社会民主主义在考茨基修正主义与伯恩斯坦修正主义的推动下，于第二国际时期如雨后春笋般迅速在欧洲铺展开来，并向其他地区延伸。\n\n社会民主主义者对马克思的态度取决于社会民主主义者团体成立之初的状态-一部分社会民主主义者仍然打着马克思的旗号去宣传所谓的“科学社会主义”，另外的只是接受了马克思主义的一部分观点，还有一部分则完全否定马克思的理论成果。他们的理论对马克思主义和国际共产主义运动的影响极其深远，严重打击了革命社会主义者的影响力。\n\n社会民主主义者们通常进行了对马克思主义的全面修正。他们与革命的社会主义者区别最大的一点在于：社会民主主义者通常反对暴力斗争，或者讲暴力斗争作为“革命最后的底线”；社会民主主义者通常坚持议会斗争路线，鼓吹“阶级调和论”，片面的宣扬无产阶级的力量的弱小与资产阶级力量的强大。社会民主主义者绝大多数都信奉资产阶级国家学说，迷信于资产阶级国家机器与与资产阶级议会政体，鼓吹保留资产阶级议会，反对对旧有国家体制的打破；通过选举斗争的方式使工人阶级获得多数，并逐步改造资产阶级国家过渡到社会主义。考茨基社会民主主义者与其他社会民主主义思想不同的一点在于，考茨基主义者要求国家政权完全掌握在无产阶级-工人阶级手中。\n\n对于经济，社会民主主义者普遍宣传通过议会斗争之后的经济改革，实现国有经济与一部分私有经济的混合所有制，并通过国有经济对社会经济的主导实现国家经济发展，其中在社会主义中影响力较大考茨基学派吸纳了一部分马克思的工人在经济领域的专政观点，但并没有将马克思主义的公有制原则完全阐明。在社会层面上，社会民主主义者与民主社会主义者以及改良主义者类似，都是宣传建立社会保障体系，改善工人待遇，并建成福利国家。"
 #宗教社子意识#
 liberacion:0 "基督教社会主义"
 liberacion_desc:0 "基督教社会主义 ，又称僧侣社会主义，是十九世纪中叶欧美教会人士把基督教的社会原则运用到现代工业生活的思潮或运动。基督教社会主义者认为，基督教及其道德是社会进步的主要动力，应把基督教的平等、博爱、慈善原则弘扬普世，使社会主义基督教化；鼓吹人们彼此相亲相爱，反对私有制和国家权力；谴责资本主义的贱买贵卖、多取少予违反基督教教义原则；对当时工厂和工场工人的悲惨处境表示同情，反对这种非基督教精神。他们主张以“真正的基督教友爱精神”，依靠国家和上层开明人士的资助，建立生产协作社摆脱资产阶级的经济剥削，改善工人的处境。马克思、恩格斯指出基督教的社会主义，只不过是僧侣用来使贵族的怨愤神圣化的圣水罢了，僧侣的社会主义也总是同封建的社会主义携手同行的。"
 islamsocialism:0 "伊斯兰社会主义"
 islamsocialism_desc:0 "伊斯兰社会主义(Islamic Socialism)在调和伊斯兰教义与社会主义思想的基础上而创造的一种思潮。穆斯林中的社会主义者认为，《古兰经》和“穆罕默德圣训”中的思想与社会主义中追求社会平等和财富再分配的原则存在相通之处。§7信道而且行善，并谨守拜功，完纳天课的人，将在真主那里享受报酬，他们将没有恐惧，也不会忧愁。§!"
 
 
 #农业社子意识#
 revoway:0 "革命路线"
 revoway_desc:0 "面对农民对少数人垄断土地的不满，革命派农业社会主义采取激进主义亦或是马克思主义所提倡的暴力革命的方式，通过武装斗争将土地从地主富农手中解放出来实现土地农民所有制。"
 counway:0 "议会路线"
 counway_desc:0 "面对农民的诉求，议会派农业社会主义者采用议会斗争的路线，争取选票赢得大选，通过政策的方式限制地主富农对土地的垄断，将土地逐渐转化为农民所有制。"
 rad_san:0 "激进三民主义"
 rad_san_desc:0 "激进三民主义思想是以廖仲恺为核心的左翼国民党人，在汲取社会主义的思想并结合中国的国情，提出的一种激进的三民主义派生思想。\n\n激进三民主义思想认为，三民主义的重点在于“民生”，且为了发展民生，必须要依靠暴力革命，扫除中国阻碍三民主义实现的一切障碍。其认为中国社会的最大矛盾在于封建土地所有制，主张对封建制度进行革命，采取没收再分配的方式改变中国的农村现状；同时，其倡导工农结成经济与政治的联盟，通过国家领导下的合作社形式推动中国的工业化进程。\n\n激进三民主义者在政治建构方面较为集权，其认为只有一个统一的政府，总揽全局的政党，才能维护国家的稳定并推动工业化发展。"
 
 
 #保守民子意识#
 conservatism:0 "保守主义"
 conservatism_desc:0 "保守主义是自由主义的相对面，资产阶级保守主义的概念形成于法国大革命。其描述的适用性可以概括如今的大半个欧洲，甚至于半个世界。\n\n在政治上，保守主义者一般对政治改革比较敏感，而是更求于政治体制运行的稳定。保守主义下的资本主义政权或其他形式的政权仍然采用资产阶级代议制的政体保证国家运行，但其选举方式则更加倾向于古典主义者所提倡的资格选举制，即通过对个人保有的财产或社会地位来授予公民选举权，这样可以保证公民有足够的能力治理国家，但其选举制度明显的限制了公民参与政治的人数与渠道。\n\n在经济上，保守主义者并不反对市场经济，但其对于经济改革也同样敏感，因此保守主义者治理下的同级别市场存量往往基数不大，且市场资金流通相较自由主义不利。对外，保守主义者通常奉行对本国的贸易保护政策，提倡高关税，且抗拒外国商品大量流入本国，这阻碍了世界市场的发展。\n\n但保守主义由于其稳妥的特征，仍然受到了资本主义世界的极大欢迎，同时也是部分新生国家寻求进步的良好途径。"
 federalism:0 "英式保守主义"
 federalism_desc:0 "保守主义的形式有多样，而英帝国的保守主义则是资产阶级保守主义中最有代表性且最为独特的一个。\n\n英国作为拥有古老议会制传统的国家，以及后来成为光荣革命中《权利法案》所缔造的新生国家，其一开始就在君主立宪制的框架下运行-这创造了英国独特的政治氛围，即从诞生之初就偏向保守的资产阶级代议制。上院的保留和下院新贵族的大量涌入，辉格党的壮大及其霸据议会的50年，低效的选举以及严苛的投票资格，让这种氛围迅速感染了整个英国政界，直到20世纪，无论是英国的保守派还是激进派政坛，所表现出的政治氛围依旧是不明觉厉的保守-即对于英国以外政治、经济新事物的抵触。\n\n真正将其发扬光大的是大英帝国的扩张，英联邦民主主义以英国君主立宪制为蓝本，在英联邦国家中广泛使用。英联邦民主主义将蕴含着英国本土的法律，政治，哲学，经济思想在全世界铺展开来，极大影响了英语世界以及英国殖民地世界的发展历程。\n\n但当英国的经济车轮停下脚步时，原先可以用黄金掩盖的落后政治体制便会全如火山般爆发出来，以英国为代表的政体再不进行符合战后时代的改革，那么他们的政治或许就要在战后的泥潭中逐渐消亡了……"
 Jeffersonian:0 "南方杰斐逊主义"
 Jeffersonian_desc:0 "“杰斐逊主义”一词是指自美国独立战争后，以开国元勋及美利坚第3任总统托马斯·杰斐逊为首的自由主义者，再结合了洛克条件等早期自由民主思想所形成的一种意识形态亦或是文化体系。\n\n尽管杰斐逊主义强调自由主义精神，但在实际的描述中，杰斐逊主义包括但不限于具有浓烈的新大陆定居者文化（反欧洲传统制度）以及反帝国文化（反种族法律的平等以及反对中央集权政治）。杰斐逊主义宣扬法律平等，将财产权利与个人的天然政治权利脱钩，倡导天赋人权；但是，杰克逊主义对国家的构建导致其有强烈的排外性，包括对国家扩张的敏感、外来移民的低接受度以及承认本土公民在国家体制内的优越性等。\n\n杰斐逊主义者认为，国家在内部以及外部的扩张本质上是封建制度的延续和复辟，是国家走向专制化的方向；杰斐逊主义要求必须以政治和经济制度保障公民的合法权利，倡导进行土地制度改革、保障农业经济、限制工业扩张，拒绝授予外来移民合法的政治权利和经济权力，限制联邦政府的行政权力等。由于北方联邦主义的盛行，杰斐逊主义在北方已经完全被联邦主义溶解其中并形成了北方文化的一部分，但在南方，杰斐逊主义却因为其保守的外交、经济、政治准则而异常盛行，这两种意识形态的对立最终引发了美国内战。而内战结束后，这种思想又进一步的移植到南方，并最终形成了南方独特的南方杰斐逊主义。\n\n南方杰克逊主义虽然在农业和工业的态度上有所缓和，但是在政治上则更加激进。其将美国早期“自由即自治”的小生产者思想完全切入到了如今的南方州体系，认为南方与联邦政府的脱钩是符合资产阶级民主精神“天赋人权”的最好制度，为此，他们极力拒绝联邦政府对其政治经济的授予权，提倡各州联合自治，提倡完全自由的州经济体制。\n\n随着北方财团的南下，经济的冲击使得南方杰斐逊主义遇到了一次又一次的挑战，尽管其迫随着实际情况而发生了一些改变。不过在如今的美国政局中，亦或是美利坚的南北两大势力及其代表思想，究竟谁能够在新的世界取得美利坚的主导权，还要等时间的推进来揭示结局。"


 #自由民子意识#
 liberalism:0 "自由主义"
 liberalism_desc:0 "“自由主义”一词在资产阶级国家诞生的几百年间不断的被各种政府滥用，这导致它早已失去了原来的单纯含义-即尊重公民发展的权利，保障公民利益。\n\n如今的自由主义作为资本主义的代言词，其外在更多表现为政治与经济两部分。在政治上，自由主义者们宣称公民权利自由，普遍采用资产阶级代议制政体统治国家，并采用资格选举制或普选的选举方式保障公民的政治权利。通常在经济上，自由主义国家对于商业活动的开放持支持态度，政府本身也在鼓励商业活动，并减少政府工作的开支，使社会治理更加依赖经济活动运转。自由主义者通常在国际上呼吁减少贸易保护主义，建立开放自由的全球市场，但也有的为了保护本国的企业发展而选择了保守贸易。\n\n但自由主义的定义并不是一成不变的，对于强国来说，自由主义是他们进行海外扩张的有利工具，而对于弱国来说，实现自由主义则是实现国家进步的有利途径，尽管多数时候的自由主义经常给其他不稳定国家带来无穷无尽的治理问题。"
 
 market_liberalism:0 "市场自由主义"
 market_liberalism:0 "市场自由主义"
 market_liberalism_desc:0 "“自由主义”一词在资产阶级国家诞生的几百年间不断的被各种政府滥用，这导致它早已失去了原来的单纯含义-即尊重公民发展的权利，保障公民利益。\n\n如今的自由主义作为资本主义的代言词，其外在更多表现为政治与经济两部分。在政治上，自由主义者们宣称公民权利自由，普遍采用资产阶级代议制政体统治国家，并采用资格选举制或普选的选举方式保障公民的政治权利。通常在经济上，自由主义国家对于商业活动的开放持支持态度，政府本身也在鼓励商业活动，并减少政府工作的开支，使社会治理更加依赖经济活动运转。市场自由主义者在国际上呼吁减少贸易保护主义，建立开放自由的全球市场。\n\n但自由主义的定义并不是一成不变的，对于强国来说，自由主义是他们进行海外扩张的有利工具，而对于弱国来说，实现自由主义则是实现国家进步的有利途径，尽管多数时候的自由主义经常给其他不稳定国家带来无穷无尽的治理问题。"
 
 sanminism:0"三民主义"
 sanminism_desc:0"国民党内保守派信奉着三民主义。民族主义，反对清朝封建专制和列强的侵略，打倒与帝国主义相勾结之军阀，求得国内各民族之平等，承认民族自决权。民权主义，实行为一般平民所共有的民主政治，而防止欧美现行制度之流弊，人民有选举、罢免、创制、复决四权以管理政府，政府则有立法、司法、行政、考试、监察五权以治理国家。其核心观念强调直接民权与权能区分，亦即政府拥有治权，人民则拥有政权。民生主义，其最重要之原则有两个，一为平均地权，二为节制资本。"
 
 USA_federalism:0 "美利坚联邦主义"
 USA_federalism_desc:0 "“联邦主义”一词是指自美国独立战争后，以汉密尔顿和麦迪逊为首的美国北方联邦党人提出的联邦主张。该意识形态的最初目的是为了团结北美各州，在新大陆建立起统一的联邦制国家，而在随后的制宪过程中，联邦主义者逐渐滑向了建立集权政府的目标，并与各州的保守主义者发生了激烈冲突。\n\n联邦制最终在第一部美国宪法的诞生中确立起来，但是美国的定居者文化、反帝国文化（包括选举权利平等和种族平等）倾向以及古典自由主义意识形态之间的争夺使得联邦混乱不堪。北方工业的快速扩张与南方高度依赖种植园经济以及外部出口之间的矛盾，最终引发了美国空前的内战。以各州为纽带的联邦制最终在内战的泥潭中分崩离析，取而代之的是自南北停战以来，由《费城条约》、《查尔斯顿协议》、《西点协议》三大文献所组成的新联邦体制。然而这一体制使得美国社会更加割裂，并最终使得杰斐逊主义南方化，且使其完全与北方意识形态对立。\n\n在20世纪的美利坚联邦主义已经不同于立国之初的联邦主义-美利坚联邦主义者在工业与农业发展的问题上要更为激进，强力主张通过建立以工业为主导的经济体制，提倡内外完全的自由经济，但同时又需要提高关税以保护本国的贸易。联邦主义者渴望恢复自1787年《美利坚合众国宪法》所制定的联邦制，甚至更进一步-将联邦的纽带，即各州的最高经济政治权利的授予权，完全转移到以联邦为中心的政治体制上。\n\n不过在如今的美国政局中，亦或是美利坚的南北两大势力及其代表思想，究竟谁能够在新的世界取得美利坚的主导权，还要等时间的推进来揭示结局。"


 #威权民子意识#
 authoritarianism:0 "威权民主制"
 authoritarianism_desc:0 "威权民主主义与政治家口中的独裁政治并无关系，更不能单纯的归纳于保守主义，而是资产阶级代议制的异化成果。\n\n从广义上看，这是一种高度集权，且限制了多数公民参与政治活动的资本主义政体。在政治的表现中，威权民主主义政府信奉集权政治，认为统一而高效的资产阶级国家机关是资产阶级国家运行的最有利方式。为达到这个目的，威权民主主义者会鼓励吸纳国家精英进入政府工作，且录用有利于国家政府工作的公民作为行政人员，同时会以某种形式间接或直接地阻止没有“经验”的公民参与政治活动，威权民主主义者认为这是对秩序的稳定措施。\n\n在经济上，威权主义者并没有明确的经济概念，无论是自由主义经济或保守主义经济，都可以被威权主义者所采纳-且不用受到议会机制所带来的干扰，国家经济可以在一个政府或少数政治团体所组成政府的干预下运行，这是威权民主主义者认为威权民主主义最大的好处。\n\n为了维持威权民主主义政体，其支持者大多会采用相对强硬或带有强迫性质的手段规范社会秩序，包括反对自由言论。镇压游行示威，宣扬国家认同的价值观等等。但无论如何，威权民主主义并没有做到真正意义上的独裁统治，仍然有一套可以运行的资产阶级代议制作为国家的中枢机构运行，相对来说，它是限制了公民一部分权利的民主主义。"
 patriarch:0 "家长制政府"
 patriarch_desc:0 "顾名思义，政府就像大家长一般保护着公民，但同时。这个“家长”所带来的不仅仅只是慈爱，还有严厉打下的棍棒。\n\n家长制政府所表现出来的最大特征就是如同威权民主主义一般的政治体制，甚至要比威权民主主义的集权程度更进一步，相对来说，家长制政府已经破坏了传统资产阶级政治的代议制，更多的倾向于一个或几个团体的政治操盘。\n\n虽然家长制政府的权力是如此的高度集中，但家长治政府的另外一个特点则是坚持对公民的负责-这些所谓的负责是家长制政府拥护者换取统治的合法地位而对公民做出的妥协，包括维护私有财产不可侵犯的权利、对公民的生命提供保障、国家有义务保障公民的正常生活以及活动安全。在种种条件的加持下，家长制政府需要在社会经济层面对公民作出巨大的让步，通过加强政府的干预增进公民的福祉，提高公民的生活待遇。 在家长制政府的治理下，公民的一般生活保障与社会治理、基础建设要高于其他同量级资本主义国家。\n\n但同时，家长制政府也是社会秩序的坚定捍卫者。家长制政府通常在社会层面上采用各种强制性的手段以及严厉的刑罚规范公民的权利与义务，并限制了公民一部分的自由权利以及政治权利。家长制政府会毫不犹豫地清除社会的不稳定因素，以维护社会的正常运行。家长式政府通常会宣扬与有利于维系政府与公民关系的国家价值观，以宣扬政府认同的思想与价值，鼓励公民更好的为个人以及国家服务。"
 oligarchy:0 "寡头政治"
 oligarchy_desc:0 "西方寡头政治的源头来源于古希腊时期，“寡头政治”的概念与独裁政治类似，且与独裁政治的某些成分高度重合，但在具体的表现上拥有自己的特色。\n\n寡头政治与独裁政治的最大区别在于，寡头政治本身不含有世袭也不含有一人独裁的意味。寡头政治在古典时代多表现为选举君主制、贵族议事团制或罗马共和国早期的财产选举制；而在现代，寡头政治则通常泛指极少数人或团体统治绝大多数人的政治制度-且通常与经济、宗教方面的垄断角色挂钩。寡头政治在针对公民方面与独裁政治类似，都是通过法律或其他社会形式限制公民的自由权利，以各种形式破坏了资产阶级政治概念中的资产阶级代议制度，使公民的选举权缺失，亦或是选举被操弄。政府重要职位的选举以及分配流程只为极少数人服务。\n\n通常来说，寡头政治的经济路线非常不明确，几乎是由统治者或统治团体对经济路线的阶级和个人意愿所决定的。同样的，寡头政治不光光表现在执政政府身上，在选举过程中的选举机制以及社会的各个层面都有可能拥有寡头性质；选举的舞弊或选举团队的聚合并最终服务于少数人，可以算作寡头性质，资本主义或近代社会的经济机构与服务机构的少数人对多数人的管理，也拥有一定的寡头性质；财产者通过自己保有大量社会资产的优势影响社会发展，干预政府，是当今资本主义世界最明显的寡头行为。"
 confuism:0"新儒学"
 confuism_desc:0"在中国这片土壤上，儒家和儒学已经存在了上千年。儒家思想早已浸透了这片土地的每个角落。想长久而稳定的统治这片土地，就绕不开儒学和儒家。显而易见的是，这个延续千年，致力于维护封建帝制的体系，如今已难以满足如今时代的要求。但这并不意味着我们要把它完全摒弃，只需要适当的修饰和改造，它仍然能成为最符合中国国情的治理方法。作为晚清少数留德武官的一员，段祺瑞在德意志接触到了容克和他们的思想。军功与土地、垄断资本主义、以及还在发展中的社团主义思想，对他产生了极大的影响。如今，面对波涛汹涌的国内局势，段祺瑞和他的僚属，提出这样了一个全新的“复古”理念。政治上，是基于传统儒学的礼义纲常，又融合近代西方政治思想的中央集权和精英阶层有限民主政治；军事上，是借鉴自普鲁士容克，但被称作“秦之故智”的军功爵与军功授土制度；而经济上，则是诞生于西方，如今仍然在发展，但被牵强附会为“明之遗计”的资产阶级垄断和社团主义制度。"
 uni_san:0 "联合三民主义"
 uni_san_desc:0 "联合三民主义是以陈其美为首的右翼国民党群体所提倡的对三民主义的修改思想。他们几乎完整保留了大部分旧三民主义内容，主张联合进步军阀统一中国。"
 limited:0"有限民主主义"
 corporatism:0"合作主义"
 warlord:0 "联省自治"
 warlord_desc:0 "联省主义是一种中国本土化的改良主义思潮。其中联省自治是保障本省事务由本省自理，并在各省都督的监督中推进地方自治，联合各省都督以实现国家统一的思想。"
 
 
 #伊斯兰民主子意识#
 constitutionalismv:0 "伊斯兰君主立宪制"
 constitutionalism_desc:0 "伊斯兰国家的君主立宪力图用宪法的准绳将神权加持下的王权约束起来，剥夺君主的宗教权力和世俗权力。君主仍是国家的元首但失去了绝对的权力，需遵循伊斯兰教法的指引及世俗宪法的规定。§G谁服从真主和使者，真主将使谁入那下临诸河的乐园，而永居其中。这是伟大的成功。§!"
 islamdemcratic:0 "伊斯兰式民主制"
 islamdemcratic_desc:0 "伊斯兰式民主希望在民主的框架下将伊斯兰教的原则应用在不同的政治决策及公共政策中。他们的主张有三点：政治领袖应该由人民选出，选出的领袖应该遵循伊斯兰教法的指引，以及领袖不能独裁行事。但在不同国家和不同教派中有着不一样的理解。因此，执行的不同导致伊斯兰教法对不同国家的人民的日常生活有不同的影响。§G对于漠视真理、视信仰为儿戏之人，大可不必理会他们，你应当劝诫他们，但他们的结局，交由真主掌控。§!"
 
 
 #进步主义子#
 socialism_right:0 "社会民主主义（右派）"
 socialism_right_desc:0 "社会民主主义思想源于第一国际期间，欧洲各国发生思想变动的马克思主义研究团体。社会民主主义在考茨基修正主义与伯恩斯坦修正主义的推动下，于第二国际时期如雨后春笋般迅速在欧洲铺展开来，并向其他地区延伸。\n\n社会民主主义者对马克思的态度取决于社会民主主义者团体成立之初的状态-一部分社会民主主义者仍然打着马克思的旗号去宣传所谓的“科学社会主义”，另外的只是接受了马克思主义的一部分观点，还有一部分则完全否定马克思的理论成果。他们的理论对马克思主义和国际共产主义运动的影响极其深远，严重打击了革命社会主义者的影响力。\n\n社会民主主义者们通常进行了对马克思主义的全面修正。他们与革命的社会主义者区别最大的一点在于：社会民主主义者通常反对暴力斗争，或者讲暴力斗争作为“革命最后的底线”；社会民主主义者通常坚持议会斗争路线，鼓吹“阶级调和论”，片面的宣扬无产阶级的力量的弱小与资产阶级力量的强大。社会民主主义者绝大多数都信奉资产阶级国家学说，迷信于资产阶级国家机器与与资产阶级议会政体，鼓吹保留资产阶级议会，反对对旧有国家体制的打破；通过选举斗争的方式使工人阶级获得多数，并逐步改造资产阶级国家过渡到社会主义。\n\n对于经济，社会民主主义者普遍宣传通过议会斗争之后的经济改革，实现国有经济与一部分私有经济的混合所有制，并通过国有经济对社会经济的主导实现国家经济发展，在社会层面上，社会民主主义者与民主社会主义者以及改良主义者类似，都是宣传建立社会保障体系，改善工人待遇，并建成福利国家。但是由于社会民主主义者对资产阶级的普遍同情，这些理念在实践中很多都未能正面提出。"
 unionism:0 "工联主义"
 unionism_desc:0 "工联主义是国际工人运动中一种改良主义思潮。 因最早出现于英国工人联合会而得名。在雇佣劳动制度范围内改善工会工人的经济条件和法律地位，不要求推翻资产阶级的统治。 工联主义主张阶级调和，宣传资本家和工人的利益是协调一致的。 主张进行纯经济的斗争。 注重工人眼前的和暂时的利益，忽视工人阶级的整体利益和最终目的。"
 meliorism:0 "改良主义"
 meliorism_desc:0 "改良主义是一种典型的小资产阶级激进思想，最早可以追溯于法国大革命时期。经过各历史的不断演变，改良主义已经变成了一个从小资产阶级激进派到保守派混合于一体的庞大概念，英国的费边社及其欧洲各国的部分工党是其中的典型代表。\n\n改良主义者大多拥护资产阶级统治和资本主义制度的存在，并且将市场经济作为自己实现社会改革的根本经济制度。在政治上，改良主义者仍然希望依靠“议会多数”来实现无产阶级和人民大众的民主。在引入了拉萨尔主义右翼流派与第二国际的机会主义派别后，改良主义又开始鼓吹“阶级调和论”。在经济上，改良主义者普遍认同对资本主义的生产关系进行改良，认为需要提高工人们的工资待遇，改革社会保障制度，并建立起一套完备的公民福利制度。\n\n虽然改良主义者并未触及资本主义生产关系的根基，但是改良主义者的大量涌现，使得统治阶级对广大人民群众做出了一定的让步。马克思并不反对在革命斗争中的改良，并认为改良是统治阶级对无产阶级的让步，但马克思反对改良主义者将改良作为革命斗争的最高形式和最终目标，认为这是对资产阶级的全面妥协与对无产阶级革命斗争的错误引导。"
 newdemism:0 "新民主主义"
 newdemism_desc:0 "新民主主义是一种特殊的意识形态，并非社会主义，也区别于传统的资产阶级民主主义。是社会主义革命的前阶段。"
 surrenderism:0 "右倾社会主义"
 surrenderism_desc:0 "右倾社会主义在第一国际成立之初时就已经呈现，他们是马克思所批评的拉萨尔主义流派与与之相联系的德国社会主义右倾党派。到了第二国际成立以及恩格斯逝世后，最具代表性的考茨基与伯恩斯坦等人进行了马克思主义理论的修正，右倾社会主义又随即扩大到对马克思主义的修正派别与几乎所有社会主义思想的右翼派别。\n\n在最具有代表性的右倾社会主义理论，即19世纪90年代后的考茨基主义中，右倾社会主义者否定马克思主义的基本原理。在哲学上背弃辩证唯物主义和历史唯物主义，鼓吹唯心论和形而上学；在政治经济学上修改马克思主义的剩余价值学说与阶级斗争学说，将工人的剥削鼓吹为革命胜利的必要准备，将暴力革命认为是工人阶级斗争的最后手段，宣传和平进入社会主义的理念。\n\n在政治上，右倾社会主义者普遍拥护资产阶级国家体制，并将确立资产阶级国家体制作为无产阶级夺取资产阶级国家机器后的唯一途径，认为无产阶级政权需要对资产阶级国家机器进行全盘照搬式的模仿以进入“社会主义社会”。同时，右倾社会主义者仍然有许多坚持议会多数，宣传通过议会的方式使得工人阶级夺取国家政权，一部分甚至已经开始鼓吹“阶级调和论”。\n\n经济上，右倾社会主义与社会民主主义和民主社会主义者的政治观点类似。右倾机会主义者更加偏向于建立无产阶级直接控制的经济体制，在保留一部分市场经济的前提下利用国有企业与国家计划发展经济，建立“社会主义经济”。社会上，右倾社会主义者宣扬资产阶级对工人的提高待遇，要求建立完备的社会保障体制。但是由于右倾机会主义者对资产阶级的普遍同情，这些理念在实践中很多都未能正面提出。"
 PanAfricanism:0"泛非主义"
 PanAfricanism_desc:0"泛非主义是全世界黑种人反对种族歧视和殖民统治的一个声势浩大的思潮.泛非主义积极致力于非洲文化复兴和民族自觉，在相当程度上唤醒了非洲人民的民族意识和民族尊严，塑造了非洲大陆特有的区域意识和历史使命感。"
 lianshengism:0 "联省共和"
 lianshengism_desc:0 "联省主义是一种中国本土化的改良主义思潮。其中联省共和在接纳了来自西方的联邦共和思想后，进行本土化的改良，对内主张运用联邦制度调和央地关系，颁布联省宪法保障国家统一，授权文官政府进行国家治理。对外则主张修约废约，摆脱不平等条约的束缚，保护本国工商业。联省共和希望通过发展民族资本主义，实现中国社会的变革和民生的改善。"
 new_san:0"新三民主义"
 new_san_desc:0"新三民主义是以孙文为首的老国民党核心人物与国民党少壮派所提倡的,介于社会民主主义与新民主主义之间。是孙中山对其三民主义思想作出的改进，是联俄联共、扶助和依靠农工的思想体现。新三民主义有了明确的反帝反封建内容，并且同联俄联共扶助农工三大政策结合起来，民权为平民所共有和节制资本的口号。这表明对三民主义建立资本主义社会和资产阶级专政的思想，采取了批判的态度。“反对帝国主义”和“耕者有其田”的口号，使它有明确的反帝反封建的政治内容。"
 social_liberalism:0"社会自由主义"
 social_liberalism_desc:0"社会自由主义的兴起来源于1848欧洲革命时期，但其最早可以追溯于法国启蒙运动时期。社会自由主义强调社会的公平与正义，在强调政府需要保护人民的同时，也需要尊重个人的意志，并保障公民的自由权利。\n\n社会自由主义在政治上追求所谓的“公平”。社会自由主义者为了让资产阶级民主表现并执行的更加彻底，通常通过政府手段调和平衡资产阶级议会的各方势力来达到政党政治公平，反对一党独大。在资产阶级选举制度上，社会自由主义者们追求普遍民主，反对资格选举制，推广普选制。社会自由主义者们在经济上并没有固定的选择，无论是自由主义或保守主义思想都可以为社会自由主义者所用，但社会自由主义者会更加偏向于自由主义，同时反对社会的资本垄断行为。\n\n社会自由主义者在社会上也强调人与人之间的公平正义，通过完善的法治建设来强化社会治理，建立社会保障制度，保障公民的生活水平。进入到二十世纪，社会自由主义者们大多反对种族歧视，提倡种族平等与各民族融合。社会自由主义者们对国家的观念并不强烈，但同时也宣传维护国家统一，国家人人平等的资产阶级价值观。\n\n二十世纪的社会自由主义是资本主义发展到一定程度的产物，它象征着资产阶级的部分进步，但它并不会改变资本主义的生产方式，也不会改变或消除资本主义制度的固有矛盾。"
 
 
 #法西斯主义子意识#
 strasser:0"斯特拉瑟主义"
 strasser_desc:0 "斯特拉瑟主义是纳粹主义中一股较纳粹主义更为激进、以工人和群众行动和为基础的国家社会主义思潮。这股思潮建立在强烈的反犹太主义的民族主义立场上，反对金融资本主义。斯特拉瑟主义一词来源于斯特拉瑟兄弟格雷戈尔·斯特拉瑟和奥托·斯特拉瑟。"
 fascio:0 "原始法西斯主义"
 fascio_desc:0 "法西斯主义是一种结合了社团主义、工团主义、独裁主义、极端民族主义、中央集权形式的军国主义、反无政府主义、反自由放任的资本主义、和反共产主义政治哲学。有着强烈的民族主义、经济的社团主义，一个权力极大的军事领导者，将民族、国家、集体的地位置于个人或团体之上的特征。"
 NSDAP:0 "纳粹主义"
 NSDAP_desc:0 "纳粹主义滋生于国家社会主义德国工人党，并非社会主义政党。其意识形态的精神是“属于一个民族”，纳粹主义的基本理论包括：种族优秀论，“优等种族”至上；一切领域的“领袖”原则，“领袖”是国家整体意志的代表；反对英法资本主义体系以及共产主义思想体系，抵制共产主义理论。"
 nationalism:0 "极端民族主义"
 nationalism_desc:0 "极端民族主义乃源自对世界主义的厌恶。极端民族主义指在政治上特别强调用牺牲其他国家的利益和不顾其他价值观念，如戒绝杀戮，遵守国际法以及通过双边或多边条约维持国际合作，以此寻求本民族的利益。"
 troopism:0 "军国主义"
 troopism_desc:0 "军国主义异化了军队与国家的关系，军国主义者认为，国家应该服从于军队的需要，而这种异化的实现主要是通过军人干政的方式实现。军国主义有着民族主义，沙文主义，扩张主义，帝国主义的成分，也同样具有极大的反动性。"
 nationalsoc:0 "国家社会主义"
 nationalsoc_desc:0 "国家社会主义强调：国家是绝对物，所有个人和集团都是相对的，国家是个人真正的理性和自由意志的体现，个人必须绝对服从国家。虽然在某些方面与社会主义相似，但其本质仍然是法西斯主义的派生。"
 
 szegedism:0"塞戈德思想"

 #专制主义子#
 miliciagov:0 "政府独裁"
 miliciagov_desc:0 "从遥远的奴隶制到如今的军阀，独裁政治所表现的形式可以说是横贯古今，多种多样。并为后人一遍又一遍的复制使用着。\n\n关于独裁政府的定义极其广泛，包括了从奴隶制时期的国王独裁，封建时代的封建君主独裁，近代与现代的军政府独裁亦或是接受改良的君主独裁。但在欧美以外的其他地区，仍然有不少国家，亦或是受外国统治的殖民地政权保留了这种落后的制度。\n\n现代的独裁政府通常由极少数团体或军人组织组成。军人独裁制度是由军政府来控制国家，其政治体系完全破坏了资产阶级代议制，政府组织者由军人担任，执行者由少部分文官担任，依靠军事管制控制国家。在部分资产阶级国家中，由于受到自身或外部的历史因素影响，其采取的资产阶级代议制也遭受了独裁政治的严重破坏，几乎由极少数的团体统治国家，并通常采用文官独裁的方式治理国家，就算是拥有资产阶级代议制，其公民投票权也遭受了极其严格的限制。\n\n尽管野心家们对独裁政府的甜头仍然不减，但随着民族风潮的席卷，越来越多的独裁政体被推翻，相信在不久的将来，他们自己就会被迫做出改变。"
 despotism:0 "个人独裁政治"
 despotism_desc:0 "个人独裁统治是分类最为广泛的一种独裁政治。从奴隶制时代到近现代的个人独裁层出不穷，因此难以比较，不同时代的个人独裁，也有不同的表现方式。\n\n19世纪后的资本主义世界，个人独裁统治又被称为“波拿巴政治”或“波拿巴主义”。这是一种资产阶级式的个人独裁统治，其本质是欧洲早期资本主义政权的危机所催生的一种独裁政治。资产阶级不得不将改良国家机器，在保留资本主义制度以及资本主义生产方式的前提下，将暴力机关完全置于其他国家机关之上，并推举出个人或极少数团体统领暴力机关与其他国家机关。这时的统治者或统治集团不得不向广泛的统治阶级寻求帮助，以换取其统治的合法性。波拿巴主义者的政权形式表现多样，从大革命时期的拿破仑帝国到19世纪70年代后的德意志帝国都可以称作波拿巴主义政权，拿破仑皇帝的专断独裁与德意志的集权立宪君主制度也可以称作波拿巴主义制度。\n\n但是，也有一部分因为各种经济以及历史要素而产生的个人独裁，这种例外就是在欧洲之外的：“考迪罗体制”。这种独裁政治的名字来源于拉丁语的“大地主”之意，主要发端于拉丁美洲地区。考迪罗体制是一种极度妥协的资产阶级独裁政治，它的政府包含了从资产阶级到残余或仍然强大的地主阶级的统治人员，包含了从文官独裁到军政府独裁的各种要素，但最为显著的仍然以一人为中心的独裁性质，考迪罗体制自身带有的半殖民地半封建性质，几乎代表了除波拿巴主义以外的所有现代的个人独裁制度。"
 soltanism:0 "伊斯兰君主制"
 soltanism_desc:0 "伊斯兰国家的君主拥有的权力涉及行政与宗教，有的伊斯兰国家君主是政教合一的领袖而有的伊斯兰国家的君主只有世俗权力。不同地区在继承方面存在不同，一些国家的继承人由部落族人推举产生，也有国家通过各个部落联盟选举产生或世袭产生，部分国家由宗教领袖来担任君主。§G谁违抗真主和使者，并超越他的法度，真主将使谁入火狱，而永居其中，他将受凌辱的刑罚。§!"
 monarchism:0 "君主专制"
 monarchism_desc:0 "自苏美尔人建立世袭王国以来，君主制至今延续不息。这种古老的制历经了奴隶社会、封建社会与如今的资本主义社会，在一次又一次的危机中粉身碎骨，却能一次又一次的死而复生，并在20世纪的世界上仍为主流。\n\n君主制的管理方式以君主的继承方式多种多样，从东方式的皇帝专制到西方的等级制，从绝对的世袭制到选举制层出不穷，但所有的君主制国家通常为世袭君主制。君主国家的统治方式由国内的经济组织作为导向，从以前的奴隶主、封建主或现在的资本家，君主制的内涵以及外在一遍又一遍的被他们所改变。如今的西方君主制大多是君主立宪制，君主实权偏少甚至无权，只作为国家象征存在。但这个世界上仍然存在着具有封建特色的君主专制国家，也同样存在着名为立宪，但是掌握极大实权的君主制国家。\n\n君主的权力大小并不与自己国家的强弱、发展有关，君主的权力本质上是统治阶级因统治诉求而产生的一种异化的暴力手段，即加强君主权力，提供对统治者与被统治者的保护。因此，又有部分国家的君主甚至共和统治者转而推崇德国式政治或日本式政治，渴望将君主制这种政治制度再次发扬光大。"
 
 
 #非传统子意识#
 revengism:0 "复仇主义"
 revengism_desc:0 "复仇主义由民众强烈的爱国心，民族主义情绪，对软弱政府的失望以及对战胜国的愤怒组成。力图通过一切手段将自己曾遭受的苦难让施加苦难的人体会到，以此来达到复仇。"
 nazboh:0 "民族布尔什维克主义"
 nazboh_desc:0 "民族布尔什维克主义受到俄国十月革命影响，主张把德国一切民族主义分子，包括资产阶级在内，都吸引到共产党方面来，在“民族布尔什维克主义”的旗帜下，同协约国作战。但又反对国际主义，主张民族主义，将民族的利益放在世界革命的利益之上。"
 militarism:0 "先军主义"
 militarism_desc:0 "先军主义将先军政策融会贯通到了各个方面。先军主义者提倡国家为军事服务，发展依靠已经或未来将要发生的战争的经济体系，在政治上排斥文官统治主张军人参政施政，将沙文主义与民族主义融合并力图用武力征服的方式实现本国利益。"
 mysticism:0"神秘主义"
 mysticism_desc:0"神秘主义的基本信条就是世上存在着秘密的或隐藏的自然力，能够理解并操作神秘的自然力的人，必须接受过神秘知识的教育，富有浓重唯心主义色彩。"
 Megacorp:0"企业国家"
 Megacorp_desc:0"“巨型企业”一词来源于中美洲人对巴拿马公司的形象调侃：Canal caudillo.\n\n接踵而至的法国公司，使得该词使用范围逐渐扩大化，并最终波及到了中美洲国家本身的特质。\n\n在政治上，巨型企业者奉行公司化的精英主义和威权主义，通常将资本公司的运作方式与当地的政治体系相结合，强调利用技术官僚建设经济服务型政府，并推动企业型社会的常态化管理；巨型企业者通常以强硬手段肃清体系中的不稳定因素。\n在经济上，巨型企业者认同社会达尔文主义，强调社会内的自由竞争，巨型企业者认为政府与国民是一种有机形态， 将政府与国民看作是同一个经济体制中的上下行关系；与之相对应的，政府与企业具有统一性，因此常常会用贸易保护政策维护本国政府的稳定统治，同时也会用极端暴力的手段去管理非统治阶层，以确保这套一体化经济体制的有效运行。"
 wangism:0 "汪氏极端思想"
 wangism_desc:0 "汪氏极端思想是汪精卫自日本归来后，以旧三民主义为蓝本，加入其个人对日本制度思考与学习的的一种极端思想。"



