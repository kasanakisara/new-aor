l_simp_chinese:
 LOADING_TIP_0:0 "赢得了时间就是赢得了一切。\n§Y弗拉基米尔·伊里奇·列宁§!"
 LOADING_TIP_1:0 "国家就是从人类社会中分化出来的管理机关。\n§Y弗拉基米尔·伊里奇·列宁§!"
 LOADING_TIP_2:0 "马克思认为理论的符合于现实是理论的唯一标准。\n§Y弗拉基米尔·伊里奇·列宁§!"
 LOADING_TIP_3:0 "一般的东西只在个别的东西之中，通过个别的东西才能存在。\n§Y弗拉基米尔·伊里奇·列宁§!"
 LOADING_TIP_4:0 "真正建立共产主义社会的任务正是要由青年担负。\n§Y弗拉基米尔·伊里奇·列宁§!"
 LOADING_TIP_5:0 "群氓接受了精神价值，就会破坏它。\n§Y弗拉基米尔·伊里奇·列宁§!"
 LOADING_TIP_6:0 "全世界的无产者，联合起来!§!"
 LOADING_TIP_7:0 "必须有勇气正视无情的真理。\n§Y弗拉基米尔·伊里奇·列宁§!"
 LOADING_TIP_8:0 "革命在德国不仅是必然的，而且是历史上所无法避免的。\n§Y库恩·贝拉《匈牙利社会主义革命》§!"
 LOADING_TIP_9:0 "同志们，前进吧！当沙皇专制制度动摇的时候，我们的责任就是准备坚决冲击！是复仇的时候了！\n§Y约瑟夫·维萨里奥诺维奇·朱加什维利§!"
 LOADING_TIP_10:0 "西方革命无疑地会进一步推动东方革命运动，给它灌注奋发精神和胜利信心。\n§Y约瑟夫·维萨里奥诺维奇·朱加什维利《不要忘记东方》§!"
 LOADING_TIP_11:0 "无论乌鸦怎样用孔雀的羽毛来装饰自己，乌鸦毕竟是乌鸦。\n§Y约瑟夫·维萨里奥诺维奇·朱加什维利§!"
 LOADING_TIP_12:0 "市场是资产阶级学习民族主义的第一个学校。\n§Y约瑟夫·维萨里奥诺维奇·朱加什维利§!\n§Y《马克思主义和民族问题》§!"
 LOADING_TIP_13:0 "你怕狼，就别到树林里去。\n§Y弗拉基米尔·伊里奇·列宁§!"
 LOADING_TIP_14:0 "无产阶级的解放应当是无产阶级自己的事情。——这就是马克思恩格斯经常教导的。\n§Y弗拉基米尔·伊里奇·列宁§!"
 LOADING_TIP_15:0 "在多数情况下，至少在现代的文明国家内，阶级通常是由政党来领导的。\n§Y弗拉基米尔·伊里奇·列宁§!"
 LOADING_TIP_16:0 "贻误时机或张惶失措，就等于丧失一切。\n§Y弗拉基米尔·伊里奇·列宁§!"
 LOADING_TIP_17:0 "为了罢工的胜利，必须建立储金会来维持工人罢工期间的生活。\n§Y弗拉基米尔·伊里奇·列宁§!"
 LOADING_TIP_18:0 "我们已经设定了一个目标，并将为之努力奋斗，直到死亡!\n§Y弗拉基米尔·伊里奇·列宁§!"
 LOADING_TIP_19:0 "没有革命的理论，就不会有革命的运动。\n§Y弗拉基米尔·伊里奇·列宁§!"
 LOADING_TIP_20:0 "凡是只靠刺刀才能维持的政府，凡是不得不经常压制或遏止人民愤怒的政府，都早就懂得一个真理：人民的不满是无法消除的，必须设法把这种对政府的不满转移到别人身上去。\n§Y弗拉基米尔·伊里奇·列宁§!"
 LOADING_TIP_21:0 "亲爱的苏菲，你不能死，你要为了我们的孩子活着。\n§Y奥匈帝国皇储——斐迪南大公§!"
 LOADING_TIP_22:0 "一小部分只代表他们自己观点的固执的人们使伟大的美国政府变得卑微无助。\n§Y伍德罗·威尔逊§!"
 LOADING_TIP_23:0 "余觉中国破弃中立，良足自招祸乱。\n§Y孙中山§!"
 LOADING_TIP_24:0 "这次，这个病夫真的死了。\n§Y阿奎斯（英国首相）
 LOADING_TIP_25:0 "那么德国就得灭亡。\n§Y鲁登道夫（回答“如果进攻失败会发生什么”）§!"
 LOADING_TIP_26:0 "也许你对战争毫无兴趣,但是,战争对你却兴趣甚浓。\n§Y列夫·达维多奇·托洛茨基§!"
 LOADING_TIP_27:0 "有理想的人,生活总是火热的。\n§Y列夫·达维多奇·托洛茨基
 LOADING_TIP_28:0 "亲爱的,我希望你有勇气。坚信生活的美好,保持乐观的态度,要知道革命总是无往不胜的。\n§Y瓦列里·萨布林§!"
 LOADING_TIP_31:0 "由来征战地，不见有人还。\n§Y李白§!"
 LOADING_TIP_32:0 "君主是至高无上的法。\n§Y德意志第二帝国皇帝 威廉二世§!"
 LOADING_TIP_33:0 "一场战斗中两只狗的大小并不重要，重要的是两只狗打斗的激烈程度。\n§Y德怀特·D·艾森豪威尔§!"
 LOADING_TIP_34:0 "爱国主义怎么会和悲观主义一样呢？爱国主义的支柱是希望。\n§Y乔治·劳合§!"
 LOADING_TIP_35:0 "战争在你愿意时开始，却并不在你厌战时结束。\n§Y尼可罗·马基雅维利§!"
 LOADING_TIP_36:0 "爱情和战争都是不择手段的。\n§Y弗·斯梅德利§!"
 LOADING_TIP_37:0 "唯独革命家，无论他生或死，都能给大家以幸福。\n§Y鲁迅§!"
 LOADING_TIP_38:0 "青年永远是革命的，革命永远是青年的。\n§Y闻一多§!"
 LOADING_TIP_39:0 "即使智慧远在中国，人们也会想方设法去寻找。"
 LOADING_TIP_40:0 "幸福，就在于创造新的生活，就在于改造和重新教育那个已经成了国家主人的、社会主义时代的伟大的智慧的人而奋斗。\n§Y尼古拉·奥斯特洛夫斯基§!"
 LOADING_TIP_41:0 "社会主义是科学和文化的社会。要成为社会主义社会的当之无愧的成员，应当努力地和好好地学习，获得很多的知识。 \n§Y米哈伊尔·加里宁§!"
 LOADING_TIP_42:0 "你有那么一块地方，资源那么丰富，又听说搞了个社会主义，据说是有优越性，结果你搞了五六十年还不能超过美国，你像个什么样子呢？那就要在地球上开除你的球籍。\n§Y毛泽东§!"
 LOADING_TIP_43:0 "判断一个人当然不是看他的声明，而是看他的行动，不是看他自称如何如何，而是看他做些什么和实际上是怎样一个人。\n§Y弗里德里希·恩格斯§!"
 LOADING_TIP_44:0 "热爱劳动吧，没有一种力量能像劳动，即集体、友爱、自由的劳动的力量那样使人成为伟大和聪明的人。\n§Y马克西姆·高尔基§!"
 LOADING_TIP_45:0 "幽默是表明工人对自己事业具有信心并且表明自己占着优势的标志 。\n§Y弗里德里希·冯·恩格斯§!"
 LOADING_TIP_46:0 "批判的武器不能代替武器的批判，物质力量只能用物质力量来摧毁。\n§Y卡尔·马克思《黑格尔法哲学批判》§!"
 LOADING_TIP_47:0 "唯有爱情和咳嗽无法掩饰。\n§Y卡尔·马克思§!"
 LOADING_TIP_48:0 "无产阶级的少年，你肩负着解放全人类的重担。\n§Y卡尔·马克思§!"
 LOADING_TIP_49:0 "你的名字无人知晓，你的功绩永世长存。\n§Y无名烈士墓（莫斯科）§!"
 LOADING_TIP_50:0 "德国的明天就指望你们了，德国的青年们！\n§Y阿道夫·希特勒§!"
 LOADING_TIP_51:0 "德国在我们脚下，德国为我们骄傲，德国让我们勇往直前。\n§Y阿道夫·希特勒§!"
 LOADING_TIP_52:0 "这是战争中一条万古不易的公理，确保你自己的侧翼和后方，而设法迂回敌人的侧翼和后方。\n§Y腓特烈§!"
 LOADING_TIP_53:0 "人民战争必须向云雾一样，在任何地方也不凝结成一个反抗的核心。\n§Y克劳塞维茨§!"
 LOADING_TIP_54:0 "作战基本原理，切勿完全处于被动地位。\n§Y克劳塞维茨§!"
 LOADING_TIP_55:0 "一将无谋，累死三军。\n§Y克劳塞维茨§!"
 LOADING_TIP_56:0 "战争是强迫敌人服从我们意志的一种暴力行为。\n§Y克劳塞维茨§!"
 LOADING_TIP_57:0 "一身转战三千里，一剑曾当百万师。\n§Y王维（唐）§!"
 LOADING_TIP_58:0 "胜败兵家事不期，包羞忍耻是男儿。 \n§Y杜牧《题乌江亭》§!"
 LOADING_TIP_59:0 "报君黄金台上意，提携玉龙为君死。\n§Y李贺《雁门太守行》§!"
 LOADING_TIP_60:0 "最爱发牢骚的人就是没有能力反抗，不会或不愿工作的人。\n§Y马克西姆·高尔基§!"
 LOADING_TIP_61:0 "它用公开的、无耻的、直接的、露骨的剥削代替了由宗教幻想和政治幻想掩盖着的剥削。\n§Y共产党宣言（评价资本主义时）§!"
 LOADING_TIP_62:0 "真正的爱国主义是不分党派的。\n§Y托·斯摩莱特§!"
 LOADING_TIP_63:0 "任何战术都只适用于一定的历史阶段；如果武器改进了，技术有了新的进步，那么军事组织的形式、军队指挥的方法也会随着改变。\n§Y米哈伊尔·瓦西里维奇·伏龙芝§!"
 LOADING_TIP_64:0 "他们绝对无法通过!\n§Y—凡尔登要塞司令 菲利普·贝当§!"
 LOADING_TIP_65:0 "圣诞节在柏林相会!\n§Y法军一战出征口号§!"
 LOADING_TIP_66:0 "我不管你们是什么阶级，什么关系，在此时此刻，我们都是德意志兄弟!\n§Y德皇威廉二世（在一战开始前夕）§!"
 LOADING_TIP_67:0 "现在，国王需要你!\n§Y一战英国征兵海报§!"
 LOADING_TIP_68:0 "我们这些该死的船今天有点毛病!\n§Y戴维贝蒂中将（在玛丽女王号爆炸后抱怨道）§!"
 LOADING_TIP_69:0 "打得好!要发发见血!\n§Y英国海军中将胡德（说完后座舰弹药库被击中）§!"
 LOADING_TIP_70:0 "狂热者的脑袋里没有理智的地盘。\n§Y拿破仑·波拿巴§!"
 LOADING_TIP_71:0 "战略若太复杂，必然失败。\n§Y西乡隆盛§!"
 LOADING_TIP_72:0 "敌人不投降，就要消灭他。\n§Y马克西姆·高尔基§!"
 LOADING_TIP_73:0 "我们是党的剑与盾。\n§Y克格勃§!"
 LOADING_TIP_74:0 "将来胜利之日，我们可能活着，可能已死去，但我们的纲领是永存的，它将使全人类获得解放。\n§Y卡尔·李卜克内西§!"
 LOADING_TIP_75:0 "我愿化作一根两头燃的蜡烛，照耀人们前进!\n§Y罗莎·卢森堡§!"
 LOADING_TIP_76:0 "我不会半心半意。我要么把整个心都献出来，要么就什么也不给。\n§Y菲利克斯·捷尔任斯基（契卡缔造者）§!"
 LOADING_TIP_77:0 "战争是死神的盛宴。"
 LOADING_TIP_78:0 "呜呼！欧美十九世纪之文明，果文明乎?一则自由竞争之激烈，人类不胜其惨酷之祸；一则高尚正义之理想信念亦全堕地。\n§Y幸德秋水§!"
 LOADING_TIP_79:0 "名人名言字幕条累了...休息会 嘿嘿"
 LOADING_TIP_80:0 "战争重要的是求取政治是的成果，而不是军事上的成功。\n§Y蒙森§!"
 LOADING_TIP_81:0 "恶徒也认识真理，只不过他见了真理就害怕。\n§Y美国总统托马斯·威尔逊§!"
 LOADING_TIP_82:0 "国家之本，在于人民。\n§Y孙中山§!"
 LOADING_TIP_83:0 "政治是不流血的战争，战争是流血的政治。\n§Y毛泽东§!"
 LOADING_TIP_84:0 "存人失地，人地皆存；存地失人，人地皆失。\n§Y毛泽东§!"
 LOADING_TIP_85:0 "其人短处固所不免，然不顾一身利害，为国家勇于负责，举国中恐无人能比。\n§Y梁启超评价段祺瑞§!"
 LOADING_TIP_86:0 "时局至此，皆误在今日不和，明日不战，忧民成痼疾，中流砥柱失元勋。\n§Y吴佩孚§!"
 LOADING_TIP_87:0 "远看泰山黑糊糊，上头细来下头粗。如把泰山倒过来，下头细来上头粗。\n§Y张宗昌《游泰山》§!"
 LOADING_TIP_88:0 "忽见天上一火链，好象玉皇要抽烟。如果玉皇不抽烟，为何又是一火链。\n§Y张宗昌《咏闪电》§!"
 LOADING_TIP_89:0 "如有天孙锦, 愿为君铺地. 镶金复镶银, 明暗日夜继. 家贫锦难求, 唯有以梦替. 践履慎轻置, 吾梦不堪碎。 \n§YW.B.叶芝§!"
 LOADING_TIP_90:0 "铁肩担道义，妙手著文章。\n§Y李大钊§!"
 LOADING_TIP_91:0 "生活就是斗争，就是热情地克服危险和障碍\n§Y埃米勒·维尔哈伦§!"
 LOADING_TIP_93:0 "为将者的首要条件是“勇气”。没有勇气，其他条件都没有多大价值，因为没有勇气，其他条件都无法发挥作用。\n§Y阿道夫·萨克斯§!"
 LOADING_TIP_94:0 "爱国主义在美国是很容易理解的;它意味着用警惕你的国家的方式警惕自己。\n§Y卡尔文·柯立芝§!"
 LOADING_TIP_95:0 "我们这一生都在关后门。当你关门时，也把过去的一切留在了从前，然后你又可以再次前进了。\n§Y大卫·劳合乔治§!"
 LOADING_TIP_96:0 "这家伙很有卵蛋，可惜不是他自己的-我就算一条腿进了棺材，也还有另一条来踢他的屁股!\n§Y克莱蒙梭对政敌演讲的评论§!"
 LOADING_TIP_97:0 "一个二十岁时不是自由派的人没有良心，一个四十岁时不是保守派的人没有头脑。大学生从年龄上来说大概是天然的自由派……\n§Y乔里·克莱蒙梭§!"
 LOADING_TIP_98:0 "在一切能够接受法律支配的人类的状态中，哪里没有法律，那里就没有自由。\n§Y约翰·洛克 《政府论》§!"
 LOADING_TIP_99:0 "行使权力的“人民”和被人民行使权力的人民，不会总是同一类人。\n§Y约翰逊·斯图亚特·穆勒§!"
 LOADING_TIP_100:0 "取他人的巧，舍自己的拙；取他人之长，补自己的短。\n§Y木户孝允§!"
 LOADING_TIP_101:0 "我从头到脚都是布尔什维克，而且我以此自豪。人民的日子到来了！\n§Y尤金·维克托·德布斯§!" 
 LOADING_TIP_102:0 "我们希望越来越广泛的人们成为我们思想的拥护者，让我们怀着希望行动起来，一往无前！\n§Y奥古斯都·倍倍尔§!" 
 LOADING_TIP_103:0 "我知这世界，本如露水般短暂，然而，然而。\n§Y小林一茶§!" 
 LOADING_TIP_104:0 "不要倾倒垃圾！\n§Y列夫·托洛茨基§!" 
 LOADING_TIP_105:0 "墨写的谎言，决掩不住血写的事实。\n§Y鲁迅§!" 
 LOADING_TIP_106:0 "共和政体者，采大众意思制定完全法律，而大众严守之，若法律外之自由，则共耻之。\n§Y袁世凯§!" 
 LOADING_TIP_107:0 "我最大的能耐是躺着不动。\n§Y弗兰茨·卡夫卡§!" 
 LOADING_TIP_108:0 "控制了人的生计，也就控制了人的意志。\n§Y亚历山大·汉密尔顿§!" 
 LOADING_TIP_109:0 "当一个人受到公众信任时，他就应该把自己看作为公众的财产。\n§Y托马斯.杰斐逊§!" 
 LOADING_TIP_110:0 "就价值而言，地球上只有两种生物，一种是会坚持的，还有一种是指望别人坚持的。\n§Y约翰.亚当斯§!" 
 LOADING_TIP_111:0 "每个人心中都有继续向前的使命感 努力奋斗是每个人的责任 我对这样的责任怀有一份舍我其谁的信念。\n§Y亚伯拉罕.林肯§!" 
 LOADING_TIP_112:0 "尊重的欲望是人类天性的最深刻的冲动。\n§Y约翰.杜威§!" 
 LOADING_TIP_113:0 "人生在世如乱麻，谁为圣贤谁奸邪？霜雪临头凋蒲柳，风云满地起龙蛇。\n治丝乱者一刀斩，所志成时万口夸。郁郁壮怀无人识，侧身天地长咨嗟。\n§Y袁世凯§!" 
 LOADING_TIP_114:0 "勿因我见而轻起政争，勿尚空谈而不顾实践，勿兴不急之物而浪用民财，勿信过激言行而自摇邦本。\n§Y段祺瑞§!" 
 LOADING_TIP_115:0 "推动地球运转的不是思想，而是经济。\n§Y坂本龙马§!" 
 LOADING_TIP_116:0 "广兴公议，万机决于公众；公卿与武家同心，以至于庶民，使各遂其志，人心不倦；破旧来的陋习，立基于天地之公理正气。\n§Y明治天皇§!" 
 LOADING_TIP_117:0 "爱国主义应该和爱自己的家一样。为了国家，我们不仅要牺牲财产，还要牺牲生命。这就是报国的大义。\n§Y福泽诏吉§!" 
