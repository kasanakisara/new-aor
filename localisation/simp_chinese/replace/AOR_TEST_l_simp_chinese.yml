ORA_country_information_loc:0"在军政府的高压统治蔓延到阿根廷的每个角落时，工人的斗士们站了起来，他们高呼着正义、自由与公平，把手中的铁锤向压迫者死命地砸去，阿根廷革命爆发了。在国土的北方，名为“阿根廷工人联合会”§的组织已经建立起来，我们将扯断长久以来禁锢我们的枷锁，太阳神的荣光将会庇护这片土地下的万千工人！\n但迈向革命胜利的道路上总不是一帆风顺的，1915年，阿根廷地区工人联合会在它的第九次代表大会上分裂，这个组织分裂成了FORA与CORA。CORA在革命爆发前前往乌拉圭，只留FORA独自迎敌。而FORA那年轻的领袖，西蒙·拉多维茨基，尚且被羁押在火地岛的狱中。军政府训练有素的军队可以轻而易举的击溃我们工人的武装，而农民的不信任则让我们举步维艰。可我们相信勇敢的人们定将自街垒边集结，自斗争中学习，将反动派永远踩在脚下！\n Si la vida te da limones, hacé limonada\n(如果生活只给了你柠檬，那就用它来做柠檬汁吧!)\n工团的战士，工人的同胞们，定要把未来死死抓住，要把这斗争进行到底!"

Our_mod_information_loc:0 "欢迎试玩国产钢铁雄心MOD—AOR“赤色极光—从废墟中崛起”！\n\n本MOD处于演示版阶段-我们删除了大量可能会引发恶性bug的代码，这使得游戏体验并不完整；大量国家路线以及游玩特色仍然处于施工中，在此我向期待我们模组的玩家表示遗憾。\n\n但演示版还有以下几个国家路线相对完整：\n巴伐利亚苏维埃（至1924），瑞典-挪威联合王国（至1924），美利坚合众国（至1924）（二四年之后的内容被删），苏维埃俄国（至1924）（文案体验不完整），中国主要势力（至1924）（美工以及文案体验不完整），比利时流亡政府（至1923），阿根廷工团（至1921），波兰（至1921）。\n\n我们删除了以下国家路线-因为她们并未彻底制作完成，极易可能引发恶性bug：英国，法兰克福，德意志中央政府，萨克森，德意志帝国海军残余势力，石勒苏益格-荷尔斯泰因，保加利亚，罗马尼亚，匈牙利，奥地利，南斯拉夫，希腊，土耳其，意大利，伊朗，埃及，巴西，墨西哥，加拿大，暹罗，印度，日本，朝鲜。\n\n目前模组正在加急制作的国家路线：法兰西，挪威-瑞典联合王国的最后路线，巴伐利亚苏维埃的最后路线。\n\n同时，为了给玩家展示MOD各国的具体流程，AOR制作了将近7年的事件链，我们可以说，尽管这只是一个经过大量阉割的展示板，但整个世界依旧充满生机！您可以选择看海，观摩动荡时代中各国的命运。"