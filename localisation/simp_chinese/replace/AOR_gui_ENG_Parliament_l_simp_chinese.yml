 ENG_Parliament_teast_motion_desc: "测试用例：\n英国议会下议院(House of Commons of the United Kingdom），又称为下院、平民院或庶民院是英国国会的下院。英国国会由三大部分组成，它们分别是君主、作为上院的上议院，以及下议院，当中又以下议院最具影响力。下议院是一个通过民主选举产生的机构，里面共有650名成员，称为国会议员，常用的英文简写则是“MP”(Members of Parliament）。下院议员是经由‘得票最多者当选投票制’选出，国会每届不可长于5年，每5年之内就要宣布解散，而国会解散之时，也就是下院议员任期的终结。每一位下院议员都是由一个选区的选民选出，议员当选后，也就在议会代表该选区。现今英国政府的内阁阁臣，绝大部分皆来自下院，而自1902年起，历任的英国首相也同样是下院议员。仅在1963年的时候，来自上院的休姆伯爵获任命为英国首相，不过，他在任命后不久，即放弃了贵族爵位，并成功以亚历克·道格拉斯-休姆爵士之身份选入下院。\n下议院大约在14世纪出现，并且一直延续。在历史上，下议院的权力曾远逊于上议院，下议院在两院中占主导地位。现时下议院的立法权力能够超越上议院，而根据《1911年国会法案》，上院驳回大部分议案的权力被削减为仅仅拖延议案通过。此外，英国政府亦需要向下议院负责，首相如果失去了下院的支持，就要下野。"

