#经济欠发达，人口又少的地方就拿当地的中心城市当做当地的唯一一个胜利点。（或当地的交通枢纽，军事地位重要城市）

#经济发达，人口少，则胜利点主要考虑当地经济发达城市。

#经济发达，人口多，可以把当地多个重要城市作为胜利点。

#经济欠发达，人口多，胜利点主要考虑当地的中心城市和交通枢纽型的城市。

#如果某一省份的面积过于广大，则依据该地区某一点的人口，经济发展程度以及战略地位来决定是否增设胜利点。

#如果某一省份的某城市对于该国或者该地区来说有重要的政治意味或战略地位，交通地位，则可以考虑在该城市的物质基础之上提高胜利点点数。
#（例如美国-纽约州-奥尔巴尼。为州首府，原先有3点胜利点，后增加到5点）。
#（例如中国-江苏-丹徒，原先为3胜利点，因为其位于长江咽喉，且是长江两岸重要的交通枢纽，故此增加2个胜利点数，变为5胜利点）。

#如果对于一个洲内部的某地区，其在本大洲的该区域来说是一个较大的城市，则建议将其设为20点胜利点。(该区域其他不符合标准的城市则建议将其设为20胜利点以下)。
#（例如东亚-中国-汉口 20点）。
#（例如北非-法属阿尔及利亚-阿尔及尔 20点）。

#如果该城市在世界范围内都可以被纳入为主要城市，则建议将其设置为30点胜利或以上，主要列强首都建议将其设置为35点胜利或以上（视全球经济，人口，政治影响力而定）。
#（例如世界-北美-美国-芝加哥 30点）。
#（例如世界-东亚-日本-东京 40点）。

###记住，中，日，韩，越胜利点为 中 国 大 陆 繁 体 汉 化 ，请用繁体字搜索。

