 TUR_diplomatic_petitioning_decision: "外交斡旋"
 TUR_diplomatic_petitioning_decision_desc: "通过向协约国各代表团晓之以理，动之以情，我们能够影响部分代表的内心决断，最终在决定命运的表决中额外吸引几张赞同票。\n\n§Y该决议每30天可执行一次§!"
 TUR_present_bloody_evidence_decision: "呈上血腥凭证"
 TUR_present_bloody_evidence_decision_desc: "联进委成员，赤色分子，各路民族主义者......这些人都是协约国所不希望见到的。只要借走一批此类反贼的项上人头，就能够极大程度平息协约国怒火，让事态向有利于苏丹国的方向发展。\n\n§Y该决议每45天可执行一次§!"
 AOR_ottoman_ruins_category: "帝国余烬"
 AOR_ottoman_ruins_category_desc: "完了，全完了。我们将最高朴特的前途赌在了世界大战的胜利上，而这一切都已随着德意志的崩溃与俄罗斯的革命而化为了泡影。我们别无他法，只能静静吞下这耻辱的苦果，让协约国自顾自地庆祝所谓“公理战胜强权”的胜利。而且，我们现在还要处理一团乱麻的国内局势。\n"
 TUR_loan_from_entente_decision: "申请协约国贷款"
 TUR_loan_from_entente_decision_desc: "苏丹国已经站在崩溃的边缘，如今唯有协约国能救我们于水火之中。尽管求助于世界大战的敌人似乎有损气节，但苏丹国及其臣民必须活下去。\n\n§Y该决议仅可执行一次§!"
###事件###
 TUR.1.t: "对希腊国，开战！"
 TUR.2.t: "迈向社会主义的大路"
