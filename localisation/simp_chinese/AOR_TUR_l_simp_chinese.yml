 TUR_Sultan_Mohammed_VI_idea: "苏丹穆罕默德六世"
 TUR_Sultan_Mohammed_VI_idea_desc: "花瓶君主\n----------\n\n\n\n\n\n\n£GFX_TUR_Muhammad_VI_sultan \n\n\n\n\n\n\n----------\n在战争的最后，穆罕默德六世在英法军队的监管下加冕为新苏丹。但是，很快迎接他的是战争的失败与帝国的终结。希腊占领了奥斯曼帝国的大批土地，伊斯坦布尔也遭到所谓的“国际共管”，同时还要支付庞大的战争赔款。  对于穆罕默德六世来说，这是危机四伏的一刹那，国内民怨沸腾，青年军官蠢蠢欲动，国外资本正磨刀霍霍地向着江河日下的帝国。\n\n似乎他正在一个巨大的绞刑架上，而绞绳正慢慢收紧......"
 TUR_treaty_mudros_idea: "穆德罗斯停战协议"
 TUR_treaty_mudros_idea_desc: "奥斯曼帝国向协约国投降后，其领土被剥离，工业被摧毁，就连帝国称号也遭到虢夺——不过对苏丹国如今的领导人而言，他们只能咽下这一联进委酿成的苦果，并向未知的未来前进。"
 TUR_complete_econ_collapse_idea: "国民经济完全崩溃"
 TUR_complete_econ_collapse_idea_desc: "协约国已经占领爱琴海沿岸的全部帝国领土，富饶的黎凡特与新月沃地也离我们而去。如今残存的苏丹国不但要面对工业尽数沦丧的悲惨现实，还需要喂饱刚逃难到安纳托利亚中部的数百万饥民。国民经济已经无以为继。"
 TUR_national_econ_collapse_idea: "国民经济崩溃"
 TUR_national_econ_collapse_idea_desc: "协约国已经占领爱琴海沿岸的全部帝国领土，富饶的黎凡特与新月沃地也离我们而去。如今残存的苏丹国不但要面对工业尽数沦丧的悲惨现实，还需要喂饱刚逃难到安纳托利亚中部的数百万饥民。国民经济已经无以为继。"
 TUR_loans_from_entente_idea: "协约国贷款"
 TUR_loans_from_entente_idea_desc: "协约国大发善心，向走入绝境的苏丹国伸出援手。他们提供了急需的资金用于购买指定企业生产的粮食与工业品，让政局稳定得以暂时存续。"
