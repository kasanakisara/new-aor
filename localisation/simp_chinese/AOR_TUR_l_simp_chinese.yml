 TUR.8.t: "处置苏丹"

 AOR_TUR_events.1.t: "请高抬贵手"
 AOR_TUR_events.1.d: "先前的穆德罗斯停战协议过于严苛，苏丹国根本无法在当前条件下生存下去。不过，仍有两件事值得庆幸：首先，我们如今的宗主国——英国，不会眼睁睁看着我们就此崩溃，尽管以失去独立为代价获得的资助总会显得耻辱透顶；其次，停战协议并非最终条约，而真正涉及到最终条约方面，最关键的问题——海峡托管领仍有近一年的托管期。在这一年间，苏丹国应当尽力争取，在托管解除时重新获得一部分土地。\n\n当然，海峡土地事关苏丹国的将来，但眼下的麻烦同样严重，我们同样可以利用外交场合争取一次性的小规模援助，以渡过眼下的难关。诚然，外交资源有限，长远目标重要，如果把外交官派去寻求援助，就一定会被迫放弃进一步争取在海峡问题上的有利条件，但只有活过当下这一天，才是眼下最要紧的烦恼。"
 AOR_TUR_events.1.a: "向协约国求助，希望他们能够考虑苏丹国对海峡的法理。"
 AOR_TUR_events.1.b: "短期援助对生存至关重要！"
 AOR_TUR_events.2.t: "土耳其外交官的陈词"
 AOR_TUR_events.2.d: "“马里马拉海沿岸与科斯坦丁尼耶理应是苏丹国的合法领土。”"
 AOR_TUR_events.2.a: "我们能够利用这一反应。"
 AOR_TUR_events.3.t: "移交塔拉特"
 AOR_TUR_events.3.d: "柏林夏洛滕堡车站的拱顶下，弥漫着浓重的煤烟与人群的汗味。塔拉特帕夏被夹在两名头戴红色菲斯帽、身着深色制服的奥斯曼宪兵中间，穿过攒动的人流。他的脚步虚浮，昂贵的西装外套在肘部磨出了不易察觉的褶皱，仿佛这身流亡者的体面盔甲，正被无形的手一点点剥落。每一次迈步，皮鞋都拖曳在冰冷的水磨石地面上，发出滞涩的摩擦声，如同命运的锁链在拖行。周围尚未走出战败阴云的，金发碧眼的柏林人投来或漠然或好奇的一瞥，旋即又匆匆移开——这个面色灰败、眼神空洞的东方人，不过是这座庞大都市里又一个即将消失的过客。\n\n站台尽头，一节孤零零的车厢在蒸汽的薄雾中静候，车门敞开，如同怪兽沉默的巨口。那车厢并非寻常的旅客车厢，其窗口被粗重的铁条分割，透出囚笼的森然。一名佩戴帝国鹰徽的德国警官面无表情地递过一份文件，纸张在潮湿的空气里发出轻微的脆响。这个奥斯曼宪兵队的军官接过文件，指尖在墨迹未干的签名上顿了一下，随即利落地签收。整个过程没有一句多余的话，冰冷的交接仪式在蒸汽机车的嘶鸣中完成。“该走了，帕夏。”宪兵军官的声音不高，却带着不容置疑的钢铁质地，清晰地穿透了站台嘈杂的背景噪音。那声“帕夏”听起来不再是一种尊称，更像是一句裹着冰渣的讽刺，狠狠砸在塔拉特的心上。"
 AOR_TUR_events.3.a: "塔拉特只能沉默着侧过头，目光穿透站台朦胧的蒸汽与煤烟，投向柏林城铅灰色的天空。"
 AOR_TUR_events.4.t: "赤匪的末路"
 AOR_TUR_events.4.d: "穆斯塔法·苏普希被处决"
 AOR_TUR_events.4.a: "一声枪响后，树林一片沉寂。良久，协约国观察员们鼓起掌来。"
 AOR_TUR_events.5.t: "凯末尔在萨姆松"
 AOR_TUR_events.5.d: "咸涩的海风裹挟着硝烟的气息，撕扯着萨姆松港残破的奥斯曼旗帜。第九军团督察官穆斯塔法·凯末尔帕夏倚在军舰班德尔马号的桅杆旁，目睹军舰悄然靠岸，也扫视着因协约国占领而破败不堪的北方重镇。这位加里波利英雄的使命本是奉苏丹之命“整饬安纳托利亚秩序”，但在他军装暗袋中，却藏着一份截然不同的计划——那是用密码写就的《阿马西亚通告》草案，字句如刀锋般指向伊斯坦布尔的卖国政府。\n\n码头上，秘密集结的地方军官与民兵头目在阴影中向他致意。远处山丘间，协约国间谍的望远镜反光在屋顶闪烁。凯末尔深知：从这里向西是正在焚毁的士麦那，向东是库尔德人高举的复仇之剑，而苏丹的敕令要求他解散抵抗组织、向协约国上缴武器。安纳托利亚的最后军队，第三集团军，此刻正等待他的抉择。"
 AOR_TUR_events.5.a: "他看向船舱边的军械局长比赫·埃芬迪，两人对视一眼，心中已有决断。"
 AOR_TUR_events.6.t: "丧钟为谁而鸣"
 AOR_TUR_events.6.d: "安卡拉的空气沉重得令人窒息，仿佛每一次呼吸都吸入了铅块。艾哈迈德·陶菲克帕夏坐在大维齐尔的高背椅上，背后是象征着奥斯曼帝国辉煌的华丽拱窗，然而窗外的天空，却如同此刻帝国的命运，铅灰一片。他刚刚从巴黎归来，怀揣着那份名为《色佛尔条约》的耻辱文书，那份将帝国肢解、主权践踏至尘埃的判决书。他的指尖似乎还残留着签署时那冰冷的触感，每一次翻动文件，都带着若有似无的颤抖。\n\n会议室里，长桌两旁端坐的部长们，目光如刀锋般锐利，无声的质疑几乎要将他钉在椅背上。最终，是达马特·费里德帕夏率先打破了这令人窒息的沉默。他身体微微前倾，眼神里没有同情，只有冰冷盘算：“帕夏阁下，”他声音不高，却字字清晰，敲打着每个人的耳膜，“恕我直言，在巴黎，您是否真正倾尽了所有心力去争取英人的谅解？我们需要的不仅是生存，更需要能倚靠的支柱！”他的话像两把钝刀，反复切割着陶菲克帕夏早已紧绷的神经。\n\n帕夏的辩解尚未出口，另一侧如同压抑火山般的阿里·雷扎帕夏猛地拍案而起，震得桌上银器嗡嗡作响。“空间？谅解？”他怒极反笑，声音因激动而嘶哑，“费里德帕夏！睁开你的眼睛看看这份文件！”他抓起桌上条约副本，狠狠摔在光洁的桌面上，纸张散开，如同帝国碎裂的版图。“看看这上面写的是什么！是割让！是赔款！是枷锁！是最高朴特的灵魂永远跪在异教徒脚下的镣铐！”他怒视着陶菲克，眼中燃烧着屈辱的火焰，“帕夏阁下，您签下的不是条约，是帝国的墓志铭！您从巴黎带回的不是和平，是整个民族的耻辱！连您的每一次呼吸，都沾满了背叛的味道！”雷扎帕夏带着血腥气的话语如同风暴席卷整个房间，将陶菲克帕夏钉在了“叛国者”的耻辱柱上，无处遁形。\n\n就在这绝望的死寂几乎要凝固的瞬间，会议室侧门被无声地推开。苏丹穆罕默德六世的身影出现在门口。他穿着庄重的素色长袍，脸上没有任何表情，只有一种深不见底的疲惫。他没有看任何人，径直走向长桌尽头自己的位置。苏丹抬起手，那是一个极其轻微的动作，却吸引了所有目光。他用戴着戒指的手指，几乎是漫不经心地在空中挥了一下，声音不带一丝波澜，却带着最终审判的冰冷：“陶菲克帕夏，你......累了。你需要休息了。”没有解释，没有感谢，甚至没有再看一眼那位刚刚替他背负了所有骂名的大维齐尔。这便是这位帝国最后掌舵人的全部盖棺定论。"
 AOR_TUR_events.6.a: "随后，苏丹看向达马特·费里德帕夏，点了点头。"
 AOR_TUR_events.7.t: "兵变"
 AOR_TUR_events.7.d: "在萨姆松，穆斯塔法·凯末尔帕夏召集了一批民族主义知识分子与军官。他们自称“大国民议会”。议员们宣布自己是土耳其唯一合法政府，并要求废除安卡拉苏丹政府与协约国签订的条约。议会随即通过两项决议：向占据安纳托利亚的希腊军队宣战；同时也向屈从于协约国的奥斯曼帝国政府宣战。\n\n各路人马均已向萨姆松看去，凯末尔领导的国民议会显然已经成为土耳其抵抗力量的核心，正式接管了反抗外国占领及旧政权的军事与政治领导权。"
 AOR_TUR_events.7.a: "那苏丹国又该如何呢？"
 AOR_TUR_events.8.t: "入城式"
 AOR_TUR_events.8.d: "安卡拉街道冷清，空气中还残留着烟尘味。不久前希腊军队在撤退时纵火焚烧，许多建筑只剩焦黑的框架，包括被毁的议会大厦。店铺大多空置，物资匮乏，人群衣着褴褛，脸上刻着战争的疲惫与饥饿的痕迹。低沉的议论声在人群中蔓延。远处传来马蹄声，由远及近。凯末尔帕夏的骑兵队出现了，他们穿着朴素的军装，神情严肃。没有华丽的仪仗，只有风尘仆仆。\n\n帕夏本人骑在马上，裹着那件熟悉的土黄色军大衣。他目光扫过这片饱受蹂躏的土地和伤痕累累的人群。就像在灰烬中投入了一块石头激起涟漪，人群中开始响起压抑已久的呼喊，声音越来越大，汇聚成一股力量，驱散了些许阴霾。一个孩子挣脱母亲的手，跑到了路中央。凯末尔勒住马，俯身将他轻轻抱起。他看着孩子清澈的眼睛，脸上露出一丝温和。这短暂的互动，让紧绷的人群瞬间爆发出更响亮的欢呼。人们挥舞着能找到的任何东西，眼中第一次燃起了久违的光亮。\n\n队伍在被毁的议会大厦前停下。凯末尔帕夏转身，向这片满目疮痍的土地和它的人民，行了一个庄重的军礼。寒风卷过废墟的尘土，吹动他朴素的衣角。在这片被战火摧残、百废待兴的土地上，一个艰难但充满可能的新时代，正随着这个人和他身后沉默而坚定的人群，开始了它的第一步。"
 AOR_TUR_events.8.a: "是时候看向未来了。"
 AOR_TUR_turn_neutral_tt: "§Y[TUR.GetNameWithFlag]§!将退出§B协约国§!势力范围"
 AOR_TUR_events.9.t: "在密林间"
 AOR_TUR_events.9.d: "柏林冬夜阴冷的雨雾终究没能成为他最后的归宿。塔拉特帕夏站在小树林深处，脚下薄雪被踩成污黑的泥泞。他仰头看着安纳托利亚夜晚的寒星，那微弱的光点穿过枯枝，像一场迟来的审判，刺透了他流亡岁月里层层叠叠的侥幸与幻梦。冰冷的空气带着腐朽落叶和泥土的气息，每一次吸入都像细小的冰棱刮过咽喉——这就是他最终呼吸到的故国气味了。\n\n两名宪兵立在他身后，军大衣的粗呢在寂静中发出轻微的摩擦声。他们沉默着，眼神刻意避开他，只盯住自己脚下那片被踩实的雪地。塔拉特的目光扫过他们年轻、紧绷的下颌线，扫过他们肩上那曾经代表他无上权力的帝国徽记——如今，这徽记正沉默地执行着他的死刑。他嘴唇微动，似乎想发出一个音节，但最终只化作一缕转瞬即逝的白气，迅速消散在黎明前凛冽的黑暗中。他闭上了眼，柏林那些豪华旅馆里水晶吊灯刺目的光芒、议会大厅震耳的喧嚣、流亡途中火车单调的轧轨声……所有浮华与权柄的碎片，都在此刻被这片寒林死寂的黑暗彻底吞没了。“行刑准备！” 口令声短促而坚硬，像一块冰砸在冻土上。\n\n枪栓冰冷的撞击声清脆地响起。枪口喷出的火焰短暂而剧烈地撕裂了浓重的黑暗。巨大的冲击力将他向后掼倒，沉重地砸在冻结的林地上，发出闷响。塔拉特仰面躺着，深色制服的前襟迅速被一种更深的、温热的液体浸透，在严寒中蒸腾起微弱的热气。他最后看见的，是头顶几棵细瘦白桦光秃的枝桠，交错着切割灰白冰冷的天空。\n\n林中军官缓缓抬起手，动作滞重地行了一个标准的军礼。空气里只剩下寒风吹过枯枝的呜咽，还有雪霰落在僵硬尸体上那细微得几乎听不见的、沙沙的声响。霜晶在枯草茎上悄然凝结，在微光里闪烁，像无数双骤然睁开的、冰冷的眼睛。"
 AOR_TUR_events.9.a: "刽子手走上了属于他自己的断头台。"
 AOR_TUR_events.10.t: "国民议会首次选举"
 AOR_TUR_events.10.d: "随着大国民议会与左翼民兵击败安卡拉政府，曾经团结一致的三股政治势力如今逐渐走向分化瓦解。安纳托利亚明显承担不起又一次内战的代价，于是三方在穆斯塔法·凯末尔帕夏的提议下决定举行大国民议会选举，决定土耳其的新未来。尽管三派都主张废除苏丹，建立共和国，但其意识形态存在不小的差异。\n\n左翼的前身是曾经穆斯塔法·苏普希与埃德姆·内贾特的奥斯曼社会党，现如今整合了各路工会与社会民主主义者，改名为土耳其社会主义工农党(Türkiye İşçi ve Çiftçi Sosyalist Fırkası)，并得到第三国际的政治支持。他们推举年轻的党内理论家谢菲克·许斯努为候选人，希望让土耳其加入共产国际，与苏俄正式结盟，并彻底扫除国内资本主义与封建残余。\n\n联进委的军国主义激进派与“突厥之家”组织的图兰主义者们已经走向合流，建立复兴党(Teceddüt Fırkası)并要求土耳其以中立姿态向协约国发动复仇战争。他们的极端军国主义，复仇主义与泛突厥主义言论令许多国民议会议员感到不安，但恩维尔帕夏在军中声望极高。\n\n相比于左右翼反对派，如今暂时当权的穆斯塔法·凯末尔帕夏也已经组建了自己的政党，土耳其人民党(Türkiye Halk Fırkası)。该党目前没有明确的政治诉求，仍是围绕在凯末尔帕夏周围的军官、文官与联进委部分成员组成的政治联盟，但也已经开始提出自身的纲领，如反帝国主义，世俗主义，共和主义等。人民党成员在三派中数量最多，但其组织松散使得凯末尔帕夏无法完全控制大国民议会。\n\n很显然，土耳其只能有一位领导人。在一轮投票后，当选大国民议会临时议长的是——"
 AOR_TUR_events.10.a: "谢菲克·许斯努！"
 AOR_TUR_events.10.b: "伊斯梅尔·恩维尔帕夏！"
 AOR_TUR_events.10.c: "穆斯塔法·凯末尔帕夏！"
 AOR_TUR_events.11.t: "屈塔希亚公社"
 AOR_TUR_events.11.d: "萨姆松与锡诺普军队叛乱后，安纳托利亚中部驻军几乎被抽调一空。我们本以为协约国与希腊能够帮助控制我国乡村，但他们直接扔下流血中的苏丹国撤退得一干二净。终于。在今天，我们最害怕的事情发生了。\n\n屈塔希亚的工人们在社会主义煽动者伊斯梅尔·哈基与谢菲克·许斯努带领下组织起来，并得到当地警备司令、前联进委成员埃德姆·内贾特贝伊的军事支持。在一天不到的时间内，屈塔希亚已经打起红旗，并宣布受“土耳其社会主义工农党”领导。该党公开宣称自己是共产国际的安纳托利亚支部，可见莫斯科对我国政治干预日渐加深。此外，屈塔希亚紧邻安卡拉，而受此影响，城内聚集的大量失业工人们也开始躁动不安起来，而阿菲永、埃斯基谢希尔等小城的工人也有样学样地开始了夺权尝试，并自发组织起工农党支部。"
 AOR_TUR_events.11.a: "该死的暴徒！"
###国策###
 AOR_TUR_bitter_remains: "苦涩残余"
 AOR_TUR_bitter_remains_desc: "我们战败了！德意志崩溃后，同盟国已经不再进行抵抗，而这也意味着协约国能够肆无忌惮地在帝国尸骨上分一杯羹。现如今，帝国称号不再，领土残破，人民被赶出世代居住的家园。不过，只要苏丹陛下仍在维持神圣的最高朴特，我们就不会灭亡。"
 AOR_TUR_crackdown_Ittihadists: "镇压联进委残部"
 AOR_TUR_crackdown_Ittihadists_desc: "将帝国拖入那场可怕世界大战的联进委军国主义政府已经崩溃，但仍有不死心的军国主义分子活动在军中与乡间，妄图恢复旧日独裁统治。在苏丹与自由协约党通力合作下，他们将被无情铲除。"
 AOR_TUR_apply_refined_treaty: "申请调整条款"
 AOR_TUR_apply_refined_treaty_desc: "很明显，如今过于严苛的条约已经成为我们生存的首要障碍。苏丹国将派遣一批外交代表团前往科斯坦丁尼耶，与协约国代表讨论苏丹国的生存问题。当然，其具体讨论事项仍需作出规定。"
 AOR_TUR_salvage_economy: "重整国民经济"
 AOR_TUR_salvage_economy_desc: "爱琴海沿岸的工业区，黎凡特的商业都市与两河流域的良田如今都离我们远去，但苏丹国的臣民仍需要生存。我们应当寻求各种手段，保证涌入安纳托利亚腹地的各路难民尽可能活下来——这些人口都将成为帝国未来复兴的重要资源。"
 AOR_TUR_GER_prisoner_exchange: "对德引渡条款"
 AOR_TUR_GER_prisoner_exchange_desc: "今年3月，随着帝国逐渐崩溃，军国主义政权头目、“三帕夏”之首、前大维齐尔穆罕默德·塔拉特帕夏逃往德国。对他不幸的是，德国也几乎立刻在法军的进军中瓦解。现如今，虚弱的德意志邦联无法拒绝我们引渡这个战犯回国的要求。他将暂时被关押，最终得到应有的审判。"
 AOR_TUR_Ankara_worker_rescues: "安卡拉工人救济处"
 AOR_TUR_Ankara_worker_rescues_desc: "相较于分散到乡间继续耕作的农民，流入我国目前控制区的工人更加难以处理。如今的领土内缺乏工业产业，更缺乏建立工业所需的时间。为了不让苏丹落得沙皇那样的悲惨下场，我们必须优先将救济资源倾斜给工人，防止这些有组织失业者尝试策应莫斯科，发起革命。"
 AOR_TUR_focused_taxation: "集中征税举措"
 AOR_TUR_focused_taxation_desc: "国库日渐干涸，但财源迟久不能开辟。显然，目前的经济状况不允许我们再采用松散落后的包税制管理目前的狭小领土。为了保证国家财政状况不再恶化，我们必须废除包税制，让官僚体系尝试集中征收安纳托利亚各地税款。"
 AOR_TUR_approach_Lenin_sultanate: "秘密接触苏维埃"
 AOR_TUR_approach_Lenin_sultanate_desc: "与协约国合作能够带来什么呢？很明显，什么都没有。苏丹国不能指望他的死敌法外开恩来放我们一条生路。相反，我们可以秘密接触俄国的革命者，帮助他们绕开贸易限制，并从途径我国的物资中抽成以保障国民生活。"
 AOR_TUR_reward_for_loyalty: "凭效忠以获利"
 AOR_TUR_reward_for_loyalty_desc: "协约国正在封锁苏维埃俄国的切要关头中。我们倘若在此时查禁社会主义政党，并处决几个赤党领导人，一定能够让协约国方面满意，不但能够获取一批物资，还可以在海峡问题上取得宝贵的筹码。"
