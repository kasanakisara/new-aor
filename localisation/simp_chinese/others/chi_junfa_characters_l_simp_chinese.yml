l_simp_chinese:
 ni_si_chong:0 "倪嗣冲"
 ni_si_chong_desc:0 "倪嗣冲秀才出生，却先入淮军，后入袁世凯新军。在东三省累转多年后，于民国初年回到家乡安徽主掌军政大权。一笔写不出两个皖字，段祺瑞和倪嗣冲的同乡之谊无人不知。而倪嗣冲手下足有五个混成旅的安武军，更是一支决定性的力量。不管怎么说，倪嗣冲及其所领的安武军,是东南争夺，乃至北方战局中不可小觑的一方势力。而倪氏与段氏之间的关系，也影响着皖省和皖系之间的纽带。"
