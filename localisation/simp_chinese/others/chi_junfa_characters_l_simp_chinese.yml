 lu_yong_xiang:0 "卢永祥"
 lu_yong_xiang_desc:0 "虽然在政治上倾向于段氏的皖系，但卢永祥本人的在直皖二系间依旧摇摆不定。而作为立宪派和自治运动活跃的大省，浙江省内对督军治下的专制统治颇为不满。卢永祥如裱糊匠一般，一面安抚地方，另一面又维系中央，在央地矛盾中充当调和剂。但如今，袁大总统已逝，中央权威下降，地方蠢蠢欲动。卢永祥作为如今浙江的掌舵人，在如今一触即发的局势下，又将把浙江这个东南财税大省带向何方？"
