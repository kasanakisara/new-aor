 li_hou_ji:0 "李厚基"
 li_hou_ji_desc:0 "作为段祺瑞所领导的皖系的一员，李厚基来到福建担任督军可谓肩负责任。但事实证明，李厚基的能力似乎无法胜任，至少暂时无法胜任一省督军之位。福建局势糜烂，段祺瑞忙于西北和北方事务，暂时也无法再提供更多的支援。摆在李厚基面前的只有两条路，拼尽全力搏一把，或者被后继者取代。"
 wang_yong_quan:0 "闽台亲善会-王永泉"
 wang_yong_quan:0 "年不及不惑的王永泉，已然是一旅之长，而且很明显，他很快又获得了更进一步的机会。四十岁的一省督军，在平时匪夷所思，但如今恰逢乱世，各方势力你方唱罢我登场，在秋海棠叶的舞台上各显神通。而此时，坐拥八闽之地的王永泉，突然收到了来自海峡对岸的善意。对方的条件虽不算非常诱人，但胜在风险极小。同时，留日归国的王永泉也了解对方国内如今自顾不暇的情况，料定对方不会大规模干涉。既然如此，那段大总理都做得，我王督军做不得？"
