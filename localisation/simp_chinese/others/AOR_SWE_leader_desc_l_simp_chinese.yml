 SWE_Haakon_VII:0 "哈康七世"
 SWE_Haakon_VII_desc_1:0 "哈康七世，瑞典-挪威联合王国的首位拥有挪威血统的君主。生于丹麦，长于丹麦的年轻王子从未想过能戴上北境王国的冠冕。曾入军旅，情绪内敛的“海员王子”亦深深明白，1905年那场闹剧般的加冕不过是迟暮帝国为粘合开裂的国疆而演出的盛大马戏。但他自即位起便对政治深感兴趣，从宫廷议会的架构组成，到瑞典挪威不同民族的团结，这位立宪君主发挥的作用似乎不只是单纯的花瓶。\n转眼十余载光阴流转，世界咆哮着迎来了二十世纪的黎明。世界大战、赤色革命、民族意识无不撕扯着联合王国的联合。端坐王位上的哈康雄心万丈，誓要发扬自己天赋君权的义务，继承先祖光辉的功业，用联邦化的良方，让迟暮的北境雄狮不甘温和的走向解体的良夜。\n但是联合王国各地心怀鬼胎，民众大臣疑窦丛生，哈康陛下的联邦大计定会阻力层层。烈焰炙烤下留下的是黄金还是灰烬，还需拭目以待……\n\n§V极夜之中，哪里是出路？§!"

 SWE_Haakon_VII_desc_2:0 "哈康七世，瑞典-挪威联合王国的首位拥有挪威血统的君主。生于丹麦，长于丹麦的年轻王子从未想过能戴上北境王国的冠冕。曾入军旅，情绪内敛的“海员王子”亦深深明白，1905年那场闹剧般的加冕不过是迟暮帝国为粘合开裂的国疆而演出的盛大马戏。但他自即位起便对政治深感兴趣，从宫廷议会的架构组成，到瑞典挪威不同民族的团结，这位立宪君主发挥的作用似乎不只是单纯的花瓶。\n转眼十余载光阴流转，世界咆哮着迎来了二十世纪的黎明。世界大战、赤色革命、民族意识无不撕扯着联合王国的联合。端坐王位上的哈康雄心万丈，誓要发扬自己天赋君权的义务，继承先祖光辉的功业，用联邦化的良方，让迟暮的北境雄狮不甘温和的走向解体的良夜。\n天佑吾王！天佑吾邦！哈康陛下如今无可争议的是为瑞典-挪威联邦青史留名的圣君，是两族人民精诚团结的象征，是赤色威胁下北境守护者的荣耀。北欧人民团结在一起，北境雄狮无惧新世纪的考验，繁荣发展就此延绵至永远……永远……\n\n§Q天佑联邦！天佑吾王！§!"

