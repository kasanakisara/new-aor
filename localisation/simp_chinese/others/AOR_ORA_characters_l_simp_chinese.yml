 #借一段EGY角色
 EGY_Independent_leader_of_Egypt:0 "…从工厂间到学校里，无数人欢庆他的归来，他是埃及的雄狮，是埃及独立的希望，人们相信，在华夫脱的领导下，埃及将会迎来真正的解放。而一切，都将向着最美好的明天进发…疾病缠身§R（会随着扎格鲁尔的身体情况变化）§!…但只有扎格鲁尔自己清楚，早年的斗争与近期的流放与重病，已经将这具身体摧垮，他的健康情况不容乐观。这具身躯到底能撑多久？恐怕只有扎格鲁尔自己知道了。"
 EGY_The_ruler_of_the_country:0 "埃及之主..."
 EGY_The_ruler_of_the_country_desc:0 "在开罗阿比丁宫斑驳的穹顶下，新月与十字架在波斯地毯上撕扯出变形的光斑，恰如这位君主毕生困守的权力棋局：既要扮演殖民者与民族主义者间的斡旋者，又企图在沸腾的民意之上重建穆罕默德·阿里王朝的绝对威权..."
 EGY_Hidden_ambitions:0 "...深藏野心"
 EGY_Hidden_ambitions_desc:0 "...福阿德深谙符号政治的魔力。他将伊斯兰绿色植入国旗，却允许皇家纹章中的欧洲百合与阿拉伯弯刀并置。这种分裂的美学恰是其统治术的缩影：他一面假装独立或顺从，一面秘密扩充王室特权。英国大使馆的电报讥讽其为“裹着议会绸缎的法老裹尸布”，而扎格鲁尔则在日记中写道：“他给自由套上了黄金镣铐。”\n\n §G“无论如何，王朝不可动摇。” §!"
 EGY_general_of_old:0 "昔日将军..."
 EGY_general_of_old_desc:0 "1919年开罗暴动的硝烟里，艾伦比勋爵胸前的巴勒斯坦星勋章仍沾着加沙战场的黄沙。他将三年前奇袭贝尔谢巴的骑兵战术化为殖民铁网：尼罗河三角洲的巡逻路线如同棋盘经纬，每个村庄都被标注为铜质望远镜中的坐标，扎格卢勒支持者的集会点成了地图上刺目的血色图钉。而他像落在焦土上的雪花——看似柔软，实则预兆着更严酷的寒冬。"
 EGY_Commissioner_for_today:0 "今日专员"
 EGY_Commissioner_for_today_desc:0 "马穆鲁克宫殿的土耳其咖啡杯底，黏着石油管道路线图的糖渣。他微笑着为阿拉伯长老斟满咖啡，杯沿的鎏金花纹恰好遮住苏伊士运河增兵计划的坐标。在妥协自主的外表下，夹着一缕大英帝国军舰的锚链——福阿德一世每展开一次文书，便无声勒紧一寸。艾伦比在地中海沙盘上推演：将西奈的贝都因部落领地化作沙漏细颈，让时间与石油一同流向帝国的玻璃腔体。"
 EGY_Egyptian_Independence_Leader:0 "埃及独立领袖"
 EGY_Egyptian_Independence_Leader_desc:0 "…从工厂间到学校里，无数人欢庆他的归来，他是埃及的雄狮，是埃及独立的希望，人们相信，在华夫脱的领导下，埃及将会迎来真正的解放。而一切，都将向着最美好的明天进发…"
 EGY_be_eaten_up_with_diseases:0 "疾病缠身"
 EGY_be_eaten_up_with_diseases_desc:0 "…但只有扎格鲁尔自己清楚，早年的斗争与近期的流放与重病，已经将这具身体摧垮，他的健康情况不容乐观。这具身躯到底能撑多久？恐怕只有扎格鲁尔自己知道了。\n§R（效果会随着扎格鲁尔的身体情况变化）§!"
 POLITICS_Saad_Zaghloul_DESC:0 "村长的儿子，起义的参与者，埃及前教育大臣，华夫脱党的旗手———扎格鲁尔。\n65岁的他终于坐在了首相的位置上。现在，是时候开启一场大变革了…"