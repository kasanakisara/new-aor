l_simp_chinese:
 JIZ_chen_guangyuan_desc:0 "生于：1873年；大清帝国 顺天府武清县崔黄口\n军旅生涯：陈光远1892年入天津武备学堂。毕业后出任武卫右军队官。1902年任北洋常备军军政司总务处总办。后来调任北洋第4镇第8协统领。1911年武昌起义爆发，陈光远作为冯国璋的部下随冯国璋讨伐革命派，升任第4镇统制。1912年，陈光远任陆军中将兼总统府咨议官。1913年，改任热河巡防营统领兼赤峰镇守使。"
 JIZ_zhou_yinren_desc:0 "生于：1884年；大清帝国 深州直隶州武强县\n军旅生涯：周荫人毕业于陆军速成学堂后考取公费补助至日本留学。1908年入陆军士官学校第6期炮兵科。学成归国后，被任命为陈光远所职掌的陆军第四镇教练官。后来一度转任至云南陆军讲武堂教官。1913年，返回北京任北京政府陆军部炮兵监。1918年，改任第4师的旅长。1919年，任江西督军陈光远的参谋长。"
 JIZ_fang_benren:0 "生于：1880年；大清帝国 黄州府黄冈县团风马曹庙镇\n军旅生涯：1908年，方本仁自北京陆军军官学校毕业，入陆军大学。此后，方本仁历任将校讲习所所长、江西督军署参谋长。1917年，方本仁被任命为赣西镇守使。"
 ZHE_lu_yongxiang_desc:0 "生于：1867年；大清帝国 济南府济阳县\n军旅生涯：1887年，卢永祥考进天津武备学堂，1891年（光绪十七年）毕业，后投入李鸿章的淮军，开始了军事生涯，以劳绩递升至提督总兵简放，加授墨尔赓额巴图鲁勇号暨陆军副都统。卢永祥还曾任武卫右军各营管带、山东武卫右军先锋队右营帮带等职，后历任陆军第六镇第11协统领、陆军第三镇第5协统领、北洋第二十镇协统。因镇压革命党有功，卢永祥先后升任总兵、提督、副都督。1912年，卢永祥任陆军第24师师长，获授中将军衔。1914年，任陆军第10师师长。"
 ZHE_fan_jinbiao_desc:0 "生于：1882年；大清帝国 东昌府馆陶县南彦寺村\n军旅生涯：范金标1904年因家乡卫河水灾而被迫投军，加入北洋军第四镇，后被选拔入天津北洋陆军讲武堂炮兵科学习，毕业后任炮兵连长。中华民国建国后，范加入国民党，但仍服役于北洋军中，被逐级提拔为第四师参谋长，属于皖系浙江都督卢永祥和第四师师长陈乐山麾下。"
 ZHE_he_fenglin_desc:0 "生于：1873年；大清帝国 泰安府平阴县\n军旅生涯：何丰林毕业于北洋武备学堂，此后加入新建陆军，昇任陆军第四镇第8协第15标标统。1912年5月，他昇任陆军第四镇第8协协统。1913年，他任第4师第7旅旅旅长。袁世凯死后，何丰林投靠卢永祥。"