# Ο Αργαλειός του Πεπρωμένου

### 挪威独立运动 ###
 SWE_Norweign_Independence_decision_categories:0 "挪威独立运动"
 SWE_Norweign_Independence_decision_categories_desc:0 "早在联邦建立之初，挪威人就一直在寻求独立，从联邦的怀抱中脱离。最近的苏俄革命和世界大战后的“新秩序”使得§R左翼分子§!同样蠢蠢欲动。如今，为了联邦的稳定，我们有必要开始镇压这一运动了。"
 SWE_Norweign_Independence_text:0 "目前§R挪威独立运动§!发展程度：§R[?SWE_Norweign_Independence_value]§!"
 SWE_Norweign_Independence_text_tooltip:0 "§R每日增长：[?SWE_Norweign_Independence_add]§!\n\n每日增长将会随马克思主义支持度、民族精神和特色决议而修正，同时越高的挪威独立运动发展度将会产生不同的修正。"
 AOR_SWE_Norweign_Independence_dynamic_modifier:0 "挪威独立运动发展度修正"
 SWE_modifier_add_localisation:0 "§R挪威独立运动每日增长将增加！§!"
 SWE_modifier_down_localisation:0 "§G挪威独立运动每日增长将减少§!" 
 SWE_Norweign_Independence_add_localisation:0 "§R将增加挪威独立运动发展度§!"
 SWE_Norweign_Independence_effect_localisation:0 "§G将减少挪威独立运动发展度§!"

### 联邦化 ###
 SWE_Union_decision_categories:0 "联邦一梦"
 SWE_Union_decision_categories_desc:0 "瑞典-挪威联合王国，已经在风雨飘摇之中走过了许多岁月。从1905年哈康七世在“联邦演说”中提出§Q“神圣联邦”§!的构想以来，联邦的人民守望相助，为了实现更加伟大、更加美好的联邦而奋斗，已经将近二十年。这期间，世界大战曾经阻碍我们的脚步，十月革命曾经迷惑我们的路线。但我们仍然坚定着向前，一步又一步，推动工业化和民族平等，和人民的敌人不懈斗争，试着实现我们共同的梦想。\n如今，时代前景无比明朗，世界似乎已经为联邦的伟大复兴铺好了前路。让我们继续奋斗，抓住这个梦想，奔向自由平等、民族和谐的新联邦！"
 SWE_Union_num:0 "当前联邦化进程进度：§Y[?SWE_Union_progress_value]§!\n\n每周增长：§Q[?SWE_Union_progress_value_add]§!\n\n----------------------\n每周增长会随着我国§Y多个方面的成就§!而改变，在每个联邦化阶段，我国都会获得一系列的修正。\n[SWE_Union_ideas_tt]"
 
 SWE_Union_GUI_Enable_tt:0 "§C联邦化系统将启用。§!"
 SWE_Union_enable_quote: "[SWE_Union_quote]"

 SWE_Union_quote_1:0 "§Y时针正指向I时。\n知识和文化的圣光刺穿乌云，黎明穿透千年黑暗，世界得以复兴。§!"
 SWE_Union_quote_2:0 "§Y时针正指向II时。\n当哥伦布在清晨醒来，新大陆的曙光照耀在船头，我们第一次看见未来。§!"
 SWE_Union_quote_3:0 "§Y时针正指向III时。\n人们打破桎梏，击碎冠冕，主的荣耀超出教廷所制约照耀祂的子民。§!"
 SWE_Union_quote_4:0 "§Y时针正指向IV时。\n波西米亚的布拉格，把“帝国”“贵族”和“权威”掷出窗外，哪怕再战三十年。§!"
 SWE_Union_quote_5:0 "§Y时针正指向V时。\n遗世独立，群岛之上“不流血的革命”，君主屈居幕后，民主的光芒开始照耀。§!"
 SWE_Union_quote_6:0 "§Y时针正指向VI时。\n欧陆的土地上，人们呐喊，人们呼告，天赋人权，理性万岁，专制的阴霾渐渐驱散§!"
 SWE_Union_quote_7:0 "§Y时针正指向VII时。\n举起锤子，击碎锁链，巴士底狱的呐喊，为欧罗巴送来了自由，平等，与博爱。§!"
 SWE_Union_quote_8:0 "§Y时针正指向VIII时。\n法兰西横扫欧陆，又被困于锁链之中。皇帝虽已逝，遗产存千年。§!"
 SWE_Union_quote_9:0 "§Y时针正指向IX时。\n未曾成功亦未曾结束的革命，斯人已逝，空留河畔，民族主义的浪潮不止息。§!"
 SWE_Union_quote_10:0 "§Y时针正指向X时。\n熊熊燃烧的维也纳，与富丽堂皇的凡尔赛宫，黑鹰旗飘扬的德意志，辉煌的一日将尽。§!"
 SWE_Union_quote_11:0 "§Y时针正指向XI时。\n欧陆的鲜血尚在流淌，土地母亲的惨叫绕梁不绝，黑云蔽日，硝烟不止，至暗之时。§!"
 SWE_Union_quote_12:0 "§Y时针正指向XII时。\n联邦旗帜高高飘扬，太阳依旧如昨日般升起。\n我们的故事方才开始。\n\n联邦万岁！人民万岁！§!"

 AOR_SWE_Union_gui_info_tt:0 "[SWE_Union_gui_info_tt]"
 AOR_SWE_Union_gui_info_open_tt:0 "§Y点击§!打开§Q联邦之梦§!时刻界面\n\n§Q联邦之梦§!任务系统由三个主体构成，完成后都会增加§Q联邦发展度§!。\n§V联邦之梦§!是由哈康陛下领导的政府按照“神圣联邦”计划，按照§Q联邦之梦§!的时刻固定推进的建设项目；\n§c梦游时刻§!是在完成国策后，为了更进一步地推动联邦化和民主化政策的实行而推动的一系列政治改革；\n§G梦中呓语§!是人民要求推动的一些内政和外交项目，如果可以在期限内达成所需条件就可以完成，反之则会受到惩罚。"
 AOR_SWE_Union_gui_info_close_tt:0 "§Y点击§!关闭§Q联邦之梦§!时刻界面\n\n§Q联邦之梦§!任务系统由三个主体构成，完成后都会增加§Q联邦发展度§!。\n§V联邦之梦§!是由哈康陛下领导的政府按照“神圣联邦”计划，按照§Q联邦之梦§!的时刻固定推进的建设项目；\n§c梦游时刻§!是在完成国策后，为了更进一步地推动联邦化和民主化政策的实行而推动的一系列政治改革；\n§G梦中呓语§!是人民要求推动的一些内政和外交项目，如果可以在期限内达成所需条件就可以完成，反之则会受到惩罚。"

### 摄政危机 ###
AOR_Regency_Economic_tooltip_text: "当前§4经济§!状态数值：§4[?SWE_Regency_Economic_value]§!\n§4经济§!当前处于§4[SWE_Regency_Economic_state]§!状态下\n\n----------------------\n§4经济§!是国之根本，民生所系。本次危机的根本原因就是外资撤出导致的经济震荡，使得极端分子有了可乘之机，兴风作浪，危害联邦。因此，稳定经济局势是摄政委员会的第一要务。\n§4经济§!的数值会影响§Y秩序§!和§V政权§!的数值。当§4经济§!状态达到§4饿殍遍地§!时，联邦将面临彻底的崩溃，而命运的综丝也将不知去向。"
AOR_Regency_Order_tooltip_text: "当前§Y秩序§!状态数值：§Y[?SWE_Regency_Order_value]§!\n§Y秩序§!当前处于§Y[SWE_Regency_Order_state]§!状态下\n\n----------------------\n§Y秩序§!是体现一个国家安定水平的最重要指标，一旦失去，国家将陷入彻底的无政府黑暗状态之中。摄政委员会需要通过一系列的手段恢复联邦内的秩序，保障联邦人民的生命安全和政权的稳定。\n§Y秩序§!的数值会影响反对分子的行动。当§Y秩序§!状态达到§Y崩溃前夜§!时，联邦将面临彻底的崩溃，而命运的综丝也将不知去向。"
AOR_Regency_Political_tooltip_text: "当前§V政权§!状态数值：§V[?SWE_Regency_Political_value]§!\n§V政权§!当前处于§Y[SWE_Regency_Political_state]§!状态下\n\n----------------------\n§V政权§!本质是摄政委员会和整个国家机关内部的团结状态，也代表人民对摄政委员会近乎独裁的统治的认可度。政权稳定，摄政委员会的法令方能实行。\n§V政权§!的数值会影响执行决议、国策时消耗的政治点数。当§V政权§!状态达到§V众叛亲离§!时，联邦将面临彻底的崩溃，而命运的综丝也将不知去向。"

