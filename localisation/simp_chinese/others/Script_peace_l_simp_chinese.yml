##战争结语
 SP_WARPEACE_DEFAULT_T:0 "战争能被终结，但战争不能终结一切"

 SP_WARPEACE_ORA_ARG_WT:0 "“他们不是革命的， 而是保守的。 不仅如此， 他们甚至是反动的，因为他们力图使历史的车轮倒转。”"
 SP_WARPEACE_ORA_ARG_LT:0 "当无产阶级还陶醉于为它开辟的伟大前景并且认真地埋头讨论各种社会问题时，旧的社会力量却在集结、联合、醒悟，并获得了国内群众的意外支持。"

 SP_WARPEACE_USA_CSA_WT:0 "“正直人的纯正，必引导自己。奸诈人的乖僻，必毁灭自己。”"
 SP_WARPEACE_USA_CSA_LT:0 "恶人的强暴，必将自己扫除。"

 SP_WARPEACE_NAN_MON_WT:0 "敌可摧，旄头灭，履胡之肠涉胡血。\n悬胡青天上，埋胡紫塞傍。胡无人，汉道昌。"
 SP_WARPEACE_NAN_MON_LT:0 "杀尽江南百万兵，腰间宝剑血犹腥。"

 SP_WARPEACE_PRC_DCD_WT:0 "“严守秘密，服从纪律，牺牲个人，阶级斗争，努力革命，永不叛党！”"
 SP_WARPEACE_PRC_DCD_LT:0 "两地恩荣真赫奕，四川父老定欢呼。"

 SP_WARPEACE_US1_US2_WT:0 "“凡动刀的，必死在刀下。”"
 SP_WARPEACE_US1_US2_LT:0 "伟大的试错，让西雅图流尽了自由的血。"

 SP_WARPEACE_SWE_DEN_WT:0 "斯堪的纳维亚的三顶王冠终于成真。"

 SP_WARPEACE_FIC_FIN_WT:0 "白芬兰的雄狮再无复苏之日。"
 SP_WARPEACE_FIC_FIN_LT:0 "在芬兰和东卡累利阿获得自由之前，我不会把剑放回剑鞘！"

 SP_WARPEACE_RUS_ARU_WT:0 "同志们你们必须要记住：\n我们只有一条出路，那就是§Y胜利§!。\n还有一条出路：§g死亡§!。\n§R死亡不属于工人阶级！§!"
 SP_WARPEACE_RUS_ARN_WT:0 "兵行险道，鼠目寸光。"
 SP_WARPEACE_RUS_ARR_WT:0 "爱国者未必是胜利者，败北者亦不是殉道者。"
 SP_WARPEACE_RUS_URS_WT:0 "反动的俄罗斯死去，哥萨克匪帮亦为她陪葬。"
 SP_WARPEACE_RUS_TCG_WT:0 "我们不是输给布尔什维克，\n而是输给这个拒绝温和的时代。"
 SP_WARPEACE_RUS_DON_WT:0 "而静静的顿河继续流淌。"
 SP_WARPEACE_RUS_IUS_WT:0 "跨过高山，越过那平原……"
 SP_WARPEACE_RUS_CAU_WT:0 "群山之间回响不绝。"
 SP_WARPEACE_ARU_TMS_WT:0 "风会抹去足迹，但带不走故事。"
 SP_WARPEACE_RUS_KHI_WT:0 "死灰复燃的王公残梦……"
 SP_WARPEACE_RUS_UZB_WT:0 "……寻不到黄沙中的旧王朝。"

 SP_WARPEACE_Germany_civilwar_BAV_LT:0 "我们的纲领是永存的，它将使全人类获得解放。"
 SP_WARPEACE_Germany_civilwar_GER_LT:0 "服从，永远不是自由的代名词。"
 SP_WARPEACE_Germany_civilwar_NAU_LT:0 "叛徒终将被审判，这是亘古不变的真理。"

 SP_WARPEACE_Ukraine_civilwar_WRU_LT:0 "覆巢之下，安有完卵。"
 SP_WARPEACE_Ukraine_civilwar_RPS_LT:0 "子弹射穿我们的胸膛，但理想永存街垒之上！"
 SP_WARPEACE_Ukraine_civilwar_TRZ_LT:0 "人的幸福，是一片要用鲜血、\n牺牲和劳动来播种的田地。"
 SP_WARPEACE_Ukraine_civilwar_UPR_LT:0 "凶手彼得留拉的血已经喷溅在基辅，这将提醒人们他对乌克兰犯下的残暴罪行。"

 SP_WARPEACE_ITA_LBA_WT:0 "求你使我在后人中间享受美誉，\n求你使我进入善人的乐园。"