PER_country_targets_loc:0 "§G独立线：纳杰夫-库利汗·巴赫蒂亚里在举国谩骂中，顶住压力，带领波斯走向独立自主的道路，利用法国与苏俄牵制英国带领波斯走向伟大复兴。§!\n§B保守线：通过与英国的谈判，博弈，争取削弱英国对波斯的控制，让波斯与英国坐在一张桌子上对话，提高波斯在伦敦协约的地位。§!\n§O激进线：礼萨·巴列维对自由派失去信心，铤而走险，勾结民族派，发动政变，推翻立宪政府，走向独裁建立强人政治的波斯。§!\n§R吉兰线：正义党面对国家的破败，决定团结所有可以团结的力量，改组成波斯共产党，在库切克汗和海德尔汗的带领下，苏俄与共产国际的帮助下，带领波斯走向共产主义道路。§!"





