ORA_country_information_loc:0"在军政府的高压统治蔓延到阿根廷的每个角落时，工人的斗士们站了起来，他们高呼着正义、自由与公平，把手中的铁锤向压迫者死命地砸去，阿根廷革命爆发了。在国土的北方，名为“阿根廷工人联合会”§的组织已经建立起来，我们将扯断长久以来禁锢我们的枷锁，太阳神的荣光将会庇护这片土地下的万千工人!\n但迈向革命胜利的道路上总不是一帆风顺的，1915年，阿根廷地区工人联合会在它的第九次代表大会上分裂，这个组织分裂成了FORA与CORA。CORA在革命爆发前前往乌拉圭，只留FORA独自迎敌。而FORA那年轻的领袖，西蒙·拉多维茨基，尚且被羁押在火地岛的狱中。军政府训练有素的军队可以轻而易举的击溃我们工人的武装，而农民的不信任则让我们举步维艰。可我们相信勇敢的人们定将自街垒边集结，自斗争中学习，将反动派永远踩在脚下!\n Si la vida te da limones, hacé limonada\n(如果生活只给了你柠檬，那就用它来做柠檬汁吧!)\n工团的战士，工人的同胞们，定要把未来死死抓住，要把这斗争进行到底!"

PER_country_information_loc:0 "波斯，由于其地理位置一直深陷列强博弈的漩涡。二十世纪初，卡扎尔王朝沙阿向沙俄借款，沙俄借此机会出兵波斯，在英俄博弈中占得先机，但1905年，沙皇遇刺导致的俄军撤军和波斯国内反俄情绪的高涨，给了英国支持的立宪派绝佳的机会。在成功的立宪革命后，波斯成为了亚洲少有的立宪共和国。但成功并非没有代价，革命后英国对波斯的敲骨吸髓，可谓变本加厉。一战期间，波斯加入协约国阵营作战，导致国内被俄土联军大肆破坏，而战后作为战胜国的些许补偿，根本无法抹平战争带来的创伤。1919年，内焦外困的波斯面临新的抉择，这是属于世界十字路口的十字路口。"

FRA_country_information_loc:0 "法兰西第三共和国是世界霸权，在付出了如此代价之后。世界大战风波未平。共和国在塞纳河畔艰难的阻挡德意志的兵锋，在巴尔干，高加索，中东，同俄罗斯浴血搏杀。终划下布列斯特之和，兵临柏林城下，彻底击溃大陆同盟，洗雪普法战争之耻。然北法兰西化作一片焦土，甚至共和国之心脏——巴黎，的半壁亦沦为火海。法兰西是大战当之无愧的胜者，但为何这胜利如此苦涩？冷战阴云一波又起。法兰西可憎的盟友，大不列颠及爱尔兰联合王国，日渐狂傲。在德意志内战后，其大陆均势政策宣告破产，而为维系其所谓“日不落帝国”的荣光，共和国自然成为其眼中钉肉中刺，协约国“精诚团结”的外表下早已暗流涌动。英国将在全球范围内对共和国进行围追堵截：从通过国际联盟进行外交博弈的暗争，到争夺势力范围，扶植傀儡，发动代理人战争的热斗。这冰冷的第二次百年战争，我们称之为——冷战但不幸的是，法兰西内部亦矛盾重重，从如何振兴战后千疮百孔的经济，到如何养精蓄锐冷战对弈；从如何回应人民的夙愿，到如何左右共和国的命运，共和国的每一派都有自己的答案。而府院之争，宪政危机，就将是这些答案的外化。有人高呼：现状已被打破，共和国为何裹足不前？支持乐土党，支持修宪，支持总统制，支持法兰西进步；有人冷眼：共和与稳定的堡垒尚存人间。支持杜伊勒里派，维持万年不变的现状，维持法兰西天赐的至耀时刻；有人嗤之以鼻：共和的混乱闹剧，需要帝王的凯旋来荡涤!斐扬派，立宪的捍卫者，法兰西帝国的掌舵人。而共和国分属总统与总理的大权，正是大戏绝佳的唱台。但他们要小心，在绅士们光鲜亮丽的决斗台下，有人正怒不可遏，有人正蠢蠢欲动……究竟是人民的呼声，还是昂首阔步的迈进，亦或保守的现状，甚至王政的复古，能带领法兰西前进，直达下一个十年，直达胜利……亦或者相反的方向。法兰西的命运，仍悬而未决……"

EGY_country_information_loc:0 "因为处于横跨三洲之地，所以自古以来，埃及一直都是各国争夺的对象，无论是法国还是英国，都曾前往这个古老国度寻求财富，无一例外的，他们都满载而归，但他们留下的苦难，却让埃及人民深陷其中。\n大战后，埃及遭受了重创，与此同时，埃及人民的怒火正愈演愈烈，他们独立的诉求也在逐步增加，埃及正如他的地理位置一样，正站在命运的十字路口，是新生的华夫托党赢得胜利，还是旧秩序的霸权继续稳固，一切都将交予时间定夺。"

USA_country_information_loc:0"美国：美国本身作为一个经济与领土大国，其综合国力却因为国内动荡的政局以及社会关系而变得孱弱不堪。\n从政治上看，美国南北方实际上已经成为两个大的政治集团以及相对对立的政治实体，双方因为各种利益的纠纷而经常发生矛盾，但又因为经济与国际环境要素被迫承认国家统合；至于在默认轮换制下选出来的总统，除了调动军队以外，毫无行政作用。\n从经济上看，美国是战后当之无愧唯一可以匹敌英国工业的国家，但美国几乎所有的经济命脉都掌握在工业托拉斯与铁路卡特尔手中，政府对经济的把控能力也基本为零。但正是由于全国垄断资本的扩张，将原本极度分裂的美国北部、南部、西部以有形或者无形的方式更加紧密地连接在一起-但其并不能消解分裂美国的根本矛盾。"




